body:
  text: 紫山大全集卷十四元胡祇遹撰表賀正表履端正始禮莫重於三朝祈天惠民數無先於百榖八風應律萬物更新欽惟皇帝陛下體元乾綱立正人統巍巍乎與天為大蕩蕩乎使民無名德冠百王功垂億代不寶逺物而逺物畢至懷柔百神而百神效靈無嵗不年有生咸遂不以富庶易恭儉之德不以强武出爭鬭之兵祚維繼於守成功愈光於創業握乾中之大一統徹海外而無二家太寧綿綿和氣皡皡臣某等逺叨貴職遙拱圵宸歡溢赤心班阻丹陛願祝無疆之聖夀敢陳有斐之蕪辭隂陽寒暑之一周斗寅參午嵗月日時之四始律應風從調元不愆履端正序實萬類惟新之慶旦正一人端拱之華辰欽惟皇帝陛下德覆堯天聖躋湯日無一物之失所煦萬國以回春雍穆九重之深提封四海之外竒珍異寶發天地之祕藏百譯千言窮古今之未見度外有苖之弗率坐致蠻荆之來威質不朴而文不華兵不窮而武不黷千官之文武無敵羣工之技巧殊精聞逺近不謀之僉言有乾坤以來之聖世鴻休永賴至樂何窮某等叨任外臺阻陪英列逺瞻天表喜倍恆情日月風雲同四目四聰之明逹雷霆雨露儘八荒八極之沾濡福履遐齡祝後天而不老神孫聖子同旭日之方升賀聖夀表五通端拱圵辰頓訝新秋之光潤祥蒸南海久無今嵗之清寧天生聖人物呈異應紹皇基之千萬祀協嘉運之五百年太平初基命世斯作星光月潔天清地寧賀九龍捧日之辰實四海無疆之福欽惟皇帝陛下天地覆載雨露涵濡得萬國之歡心無一物之失所分寶玉展親於伯叔菲飲食致孝乎鬼神九族交歡百靈昭假風從雨若時和嵗豐聽擊壤之歌喧息犬吠之夜警臣某幸逢慶旦喜倍恆情逺離遐域之海隅來上萬年之聖夀輒伸荒頌齊助歡聲祚開昌運懷望者莫不知榮天祚聖人有目者疇非樂覩共是升平之臣妾洞攄歡抃之聲容欽惟皇帝陛下誕集百祥光承五葉明命久符於雲瑞慶源何啻於河清聖冠百王仁及四海際天所覆重譯來庭好問致察於邇言大政必咨於元老紀綱法度莫不具舉禮樂刑政燦然一新發揮先業功多於前人壯固洪基訓明乎慶裔躬示儉德謀懷永圖不口惠而恩浹乎民心不貨殖而富藏乎天下九州奠枕庶官得人大開明堂永膺遐福臣某幸逢聖誕喜倍恆情輒助歡心敬陳荒頌五星聚奎瑞應誕彌之吉月六龍捧日祥開雍睦之嚴宸昌運啓而八風和聖人作而萬物覩龍顔天表氣清萬里之長河乙瑞雲禎慶集千年之異應實宗廟社稷無疆之福同國交歡得聰明睿智繼世之君普天均慶駭星流而電繞覺地闢以天開月行金氣之秋神降嵩呼之夀恭惟皇帝陛下堯仁天覆湯德日新明四目以逹四聰采片言而求片善蓄威昭德不矜號令於雷霆浮海踰山坐受東南之玉帛幾事無虞而有備內難不怒而自消公私之倉廪俱豐禮樂與文明丕變選良吏於二千石革久弊於三十年和氣格天歡聲沸海幸逢聖旦獲造丹墀願賡擊壤之歌更祝後天之算實無任於歡抃不自揆其荒蕪仰瀆聖聰上陳口號明命格天髙靈為之下墮昌圖啓祚率土莫非王臣致頌禱於僉同豈仙凡之有間河清瑞於萬里山獻夀於三呼百神懷柔一人有慶恭惟皇帝陛下日新聖德天縱生知佩孝文之儉節至仁藴太宗之英謀逺略動無過舉尚致察於萬幾安不忘危務敦睦於九族用人不求備見善能力行風雨時而百榖登財用足而萬民實㺯孫抱子樂郊多黃髮之人坐甲休兵逺戍無緑林之警日光月潔天清地寧凡曰有知欣逢盛旦臣遐居南極遙拱北辰常思帝德之瞻光欲進天階而無路幸三秋之過半慶萬夀之佳辰載整華簮上陳荒頌金氣司天開神武擴清之昌運瑞雲拱日賀欽明文思之御辰不世之逢有生同慶欽惟皇帝陛下功邁禹湯而不足聖踰堯舜而弗居允執謙冲克自抑畏際日月之臨照奉玉帛以來庭試厯推受命之祥未有如今日之盛克配上帝守一德不二之恭永佑聖躬享萬嵗無疆之夀臣阻塵法從出領憲司切傾葵藿之懷遐想庭墀之列身雖在外如臨咫尺之威誠發於中同罄華封之祝賀尊號表聖德難名久執不居之謙讓臣𠂻激切允懷仰報之忠貞溢光華之無窮豈揄揚之能罄既正徽號宜進賀章伏惟皇帝陛下德邁唐虞功參天地服上古不臣之土遂有生咸若之心萬國交歡普天同慶天眷彌厚聖夀無疆當從容中道之年享垂拱無為之福叛王請罪聖嗣班師股肱柱石繼踵而還歸貔虎熊羆守邊以鼓舞際天所覆同我太平臣某等職居外郡列沮庭班均䝉雨露之恩遙下軒墀之拜賀冬至表五隂方盛届一陽來復之辰八音克諧奏四海㑹同之樂一人有慶萬順駢臻兹蓋伏遇皇帝陛下動合民心奉若天道乾綱振於神馭下情得以上通黜尸居貪祿之冗員進敢諌直言之多士政由俗革令若風行開張聖聰恢𢎞士氣戒守成而不怠酌先業以增光文德武威逺來近悅臣等叨居詞職主頌聖功幸逢鼓舞之同歡敢以荒蕪為自棄敬陪百辟仰祝萬年賀平江南表天命大一統可能交質為鄭周帝業不偏安豈以長江限南圵顧兹孱宋得自僞周失位中天偷生炎海以寖微而寖滅尚自大以自尊不畏天威不歸王政少發雷霆之震怒奚有蠻荒之蘖芳憫念民生不忍兵取遣信使以溫諭賜詩書以優容迷心纍卵之危恃險一舠之水久留我命毒我邊氓誘我叛亡竊我疆土事至於此兵不能巳而命將出師以順討逆摧枯拉朽破竹燎毛小人漿食進於壺簞君子𤣥黃實於筐篚不下益州之鬭艦坐受石城之降幡萬世峻功普天同慶欽惟皇帝陛下聖神文武順天應人衆皆曰可而行兵不得巳而用越湯武之不殺躋堯舜之至仁德髙百代之前恩漸四海之表非平吳平陳之可比視格苖格越而益雄盡地之維邁古昔區域之廣際天所覆無日星雨露之偏聖祚無疆上天永眷有生萬類同我太平臣某等叨列外臺賀逹陛禮鼓舞餘樂倍百恆情題題夢嵓所藏東坡帖東坡手簡行書為第一自得之妙雖晉唐諸賢有不能及者小楷次之大字又次之草書又次之龍圖二帖非公平生致意書南方比之周鼎秦符其為大賢寶重也若此得之者宜如何哉某年月日某觀題懷素自叙帖晉賢墨跡嵗久腐敗不存唐學士虞禇諸人臨摹逼真唐賢法書宋蘇米輩復臨之故得流傳至今懷素自叙帖余所見凡五六本帖書如出一筆不曰聖人吾不得而見之矣得見君子者斯可矣某年月日某觀題晦庵易卦橫圖易圖甚多不唯不能發明易之藴奧牽强穿鑿通滯合離不見伏羲畫卦本末生成自然之全圖惟邵康節先天圖原委條貫以類相從然以圓方位置使人不易曉晦菴此圖自下而上大極兩儀四象八卦分隂分陽迭用柔剛而六十四卦粲然成列乾一至坤八自然生成易之全體無毫髮紊亂虧缺此圖一出前人皆廢乾端坤倪軒豁呈露六子萬象咸具于中原始要終不出乎一隂一陽考諸文王周孔之辭則合求諸伏羲一落筆而卦變皆備驗諸天地鬼神而不悖象辭變占不言而喻學易者當玩之終身而不可厭題梵隆述古圖寫萬象易寫人物難山水雲煙昆蟲草木皆有定質惟人也得二五最秀最靈之精英自有生人以來而至於今後至無窮面面不同上而大聖大賢下而至愚至賤賦分禀受又復天壤每觀畫師寫塵俗之人則十九得真寫髙人勝士則百不得其一二蓋髙人勝士又得天地之竒氣雖造物不易生成畫工塵臆豈能得其髣佛非李龍眠則不能形容蓮社諸英賢蘇東坡黃山谷米南宫李伯時蘇黃門朝無咎張文潜秦少游劉巨濟僧圓通王仲至陳碧虛鄭靖老蔡天啓王晉卿李端叔十六人想見風采一時龍鸞唯龍眠能儀形之梵隆此幅亦庶幾欲造龍眠之門墻者歟跋跋仲謀提刑家訓圖道一也駁雜者自分之尊無二上汚下者自卑之太史公以儒雜九流漢室遂以王道霸術相雜公孫𢎞以儒術飾吏事法律為詩書自汚雜也近世遂以庸俗儒吏並稱又曰儒吏兼通周官胥史供給呼召指使代筆簿書督責期㑹而巳非二岐也非並肩也先生當金室垂亡進則不可隱德于法律脫免里胥之侵凌處心行巳則儒者也諸公贊稱非知先生者也不可以不辨某頓首謹題跋臨王右軍帖絹素經三百年則壞紙可延五百嵗晉人墨跡至唐恐不能傳逺虞禇名公以硬黃紙摹之此帖不惟全不失真在右軍諸帖當為得意書山谷題後後來者復何言跋禇遂良臨黃庭經唐太宗喜王右軍書故一時學士大夫皆好尚以不能寫字吟詩為可恥向使太宗能以不及堯舜禹湯文武為不足篤好而祖述之觀天文以察時變觀人文以化成天下都俞之際詠敕天之歌垂朽索之誡立朝大臣則必以臯䕫稷契伊傅周召為巳任奚逰戲翰墨裁剪律詩而巳耶工書者評蘭亭帖惟禇遂良臨本最為得真然則所臨黃庭經亦當為貞觀朝士之冠惟其有之是以似之學者能舍外而工內不及人不為憂矣跋宋徽宗書前賢有言文章字畫似其為人余謂曰似不若曰是形諸外者即其中也晉武唐太之字畫創業王天下之英氣浩蕩不可掩宋徽之柔懦纎麗欲不亡國可乎髙宗而下亦苟延嵗月者也跋間間公字字畫瘦徑則易肉豐滿而氣清雄則難間間公贈萬松秀一帖當為顔平原大字東方朔畫贊碑隂入室之賔方知任南麓如飽豨肉醉黃酒村學究耳某謹題跋鹿庵字士大夫讀書立言之暇游戲翰墨者多而氣禀拔俗者寡放筆落紙凡鄙百出去胥史雜流為不逺永年王先生人品髙邁心畫當為本朝獨步然世無楊凝式孰以豫言為不妄跋魯公字魯公擘窠大字見於石四中興頌離堆記東方朔畫贊八開齊舍記畫贊離堆結密清雄㸃畫全作𨽻書中興頌齊舍記嚴正開豁㸃畫全作二篆以四本相較畫贊優於離堆中興頌優於齊舍記竊意妄料書丹不傷其真模勒者頗失筆意嵗月風雨離堆巳十壞八九中興頌剝裂不完又不易得但恐數百年後一再勒石去真愈逺如兹石者又不得而見之矣前人有言物聚於所好詩云蔽芾甘棠勿剪勿伐敬其人而愛其物尚且如是况賢者之心畫歟珍護珍護跋山谷字余幼學山谷書先人之命也先人嘗曰汝髙祖善黃書染楮以屋漏水人莫辨其真贋汝當致力故僕於黃書徑窺其門墻但山谷天資髙間冥鴻野鶴行雲流水氣質凡下者不可企及長年以來坐自廢棄今觀立之帖雖非黃氏得意書亦虎革之一斑也党竹溪跋黃書以謂韻勝失之柔媚然則蕭散間雅落落不凡不出瘞鶴銘之下此黃氏之三昧也竹溪之言恐未工耳跋雪齊字軸雪齊公學懷素書至於危不忘乎目故能成就如此介胄虎雄之將與野服黃冠之人態度意韻各有所得不可以類觀雪齊公書似欲不食煙火食矣跋王提刑書明白開朗如青天白日豈弟樂易如惠風時雨正大流行如長江大河跋東坡儲祥墨迹東坡大字忠義清雄如顔平原小字韻勝緊結如李圵海儲祥宫碑奉敕撰并書文理正大因事納諌字畫謹密中雍容自若不為金注所動跋宋髙宗臨二王帖志怪者有假尸返魂之說又有人為鬼物所憑四體百骸不變而神色辭氣則非其人矣以類觀之在字學中臨書者實似之髙宗當枕戈嘗膽之際而不廢翰墨異哉跋遺山墨迹詩文字畫不學前人則無規矩凖繩規規於前人陳迹則正若屋上架屋僕自兒童時見先生酒間得筆不擇美惡漫不加意十幅一息迅若掣電當時止知喜其神速飄逸先生胸中自得之妙則不知也近年來時時復見先生墨妙於河東士大夫家每一展卷覺塵俗鄙吝渙若氷釋此又非書奴輩所知也年月日觀跋元遺山書槀汝絳石刻法帖皆前賢與家人輩書槀所取者以瓦注之巧也跋張長史帖以秋深不審四字比較郎官石帖若不相似此帖疑栁誠懸臨二王書也跋元李詩軸武帝欲霍去病讀孫子去病曰用兵不學古兵法顧方略何如耳士之學書亦如良將之用兵不必模寫古人之陳迹顧氣韻何如耳李謫仙欲學書於張長史長史觀其筆力曰此書亦不必學大扺我輩自有胸中之妙古人筆法固當遍參直至自成一家乃有真態世人於遺山皆不以知書見許是豈效顰學者所能識哉跋畫馬圖韓幹馬多為後人臨摹形模雖在而百萬里掣電追風神駿滅沒之氣則無矣此幅前馬天骨開張如虎如龍負三疊之中半日百戰而其氣不少挫後馬馴順承銜雙目後顧錦韉玉勒喜出天廄依依于人而有良德非韓子絶筆他人不能為也某年月日某觀跋陽關圖畫至龍眠别立新意不襲朱碧故智水墨溶化而物物意態自足陽關一圖去者有離鄉辭家之悲來者有觀光歸國拜父兄見妻子之喜挽輅援車驅馬引駝祖餞迎迓一貌一容紛紛擾擾恍然在京師門外塵坌羣動中一漁父水邉垂釣悠然閒適前人以為得動中之靜僕自垂髫聞有此圖今得一見清甫吾友冝珍藏之某年月日某觀跋謫仙泛舟圖每觀畫工寫神大凡形模市井庸人則十似八九及遇髙人勝士雖加意容繪終不得其髣佛斯蓋卑凡之氣味相同則相得相合也亦易中人以下不可以語上也謫仙泛舟圖世固多本寶之主事此幅頗有髙風絶塵之態定非庸工之所作也跋杜莘老畫赤壁圖赤壁圖少見絶筆士大夫以道德勳業而不屑為畫工胸次塵俗淺陋而不能為惟髙人勝士不得志於世時一游戲能盡其妙莘老前身無乃不能相從二客之一耶跋李伯時孝經圖龍眠寫人物不惟工畫者不能及雖造物之巧亦不易若是之竒偉也雖經臨摹終可珍愛跋賀真畫賀真之畫元氣淋漓學李營丘寒峭瘦徑學許道寧雖不見收于神妙能之九列而徽宗題其端蓋可愛而不可忽其亦商訓周曾李茂之流未能絶俗耳年月日紫山題又士大夫之畫如寫草字元氣淋漓求渾全而遺細密畫工則不然守規𨗳矩拳拳然如三日新婦專事細密而無渾全之氣賀真畫巖樹蒼老固隂沍寒與夫野橋平逺塞門隱見胸次自得之渾全殿閣界畫近林梢際盡細密功夫之巧置之能品可也年月某觀跋姚安仁畫山水卷姚安仁畫謂之名筆則不情謂之畫工則太刻細密中得閒逺趣所謂以俗為雅者也跋界畫畫語界畫在畫學自為一科然不多見無乃非畫史之髙致而不屑為也抑亦難工而學者寡也繪事寫真須當對照范寬住終南山十有九年蓋他人之筆不足憑也乃知雄樓傑閣層臺危榭一木一甓自有馴度惟帝王家所有非白屋寒士可得而窺雖老於圬墁工於梓匠亦不能盡其巧况畫史哉嚮於長春道宫見玉帝觀魚橫披今觀此圖緻密大同而華麗過之武安胡某觀題跋李文靖公傳後竊嘗誦老𣆀之言吾所以大患者為吾有身也及吾無身吾有何患真名言也人心夲無憂患才有此身憂患叢至所謂身之患者饑渴寒凍疾痛勞苦耳目口鼻四肢百骸之欲一有不遂皆為心病外而至於飬父母榮妻子庇九族髙宫室廣田宅子女玉帛聲色輕肥之欲不可勝計過此一間者又有為學進級功業名譽者著書立言焦思勞神死而後巳然則此身一日全存諸患一日不息其嗜欲深者雖尸骸僵息魂魄游散人化而為貪厲為虎豹豺狼為倀鬼久久不泯然則身為心患豈虛言哉故顔子簞食瓢飲破瓦陋巷而此心之樂未嘗少奪孔子許之以好學者正謂此耳不知今之為學所學者何事去聖人之學不亦逺乎冬一日讀李文靖公傳見公淡然無欲因以書此銘滴漏銘有序惟皇踐阼之元祀分天下而為十路置宣撫使以大名懷孟衛輝相磁邢洺實中夏之腹心可擇望崇位重者鎮撫之特命內相左丞張公蒞焉公來治魏革舊弊立新政布宣教條姦吏薄俗不嚴而畏不懲而勸曽未數月民安事簡公庭清肅閴無告訐聽斷之聲退食燕居申申夭夭思及日月星辰唐帝之所以精勤則之者蓋以民用天時以生活興作晏息順之則吉逆之則凶故曰百工惟時撫于五辰庶績其凝嘗觀周官大而六卿細而百執事至於發一號施一令伐一木制一器無非取於天時者故有書以推其晷刻有器以占其常變成法一定萬事永賴但因之由之習為耳目之常不知其為功也不知其為政之所當先也國朝撫諸夏幾五十年司天有官厯像未完是以挈壺無氏為可愧也命藝人郭若恩求諸古制而製成之門士胡某識而銘之銘曰天地之大疇能度之日月之行疇能窮之思古哲王德符兩儀智周萬物冥默而思寅賔寅餞仰瞻俯推竹之以管土之以圭算數象厯玉衡璿璣測逺如邇窮髙如卑如指諸掌不差毫絲不先而速不後而遲暑寒晝夜璣衡我持朓朒薄蝕數無我違民用以生歲月日時百工庶績以成以熙萬事永賴大功巍巍成法一出視之易為爰究其理伊誰其智職非其人道亦廢墮執一固守恪循矩規惡知天道與時推移神州陸沉百年於兹劫火一燎乃并棄遺動作宴息醉昏夢迷公來治魏政平訟稀吏畏其民改前之非民服其仁不忍詐欺大舉廢典後先合宜挈壺有氏能自得師弗緩弗棘靡傾靡欹溶溶沄沄約其增虧晝夜百刻與天同機魏人聞知如堵來窺魏人有言至而可期魏人有言我公無歸我公之恩如漏之滋我公之信如刻之麗其直如矢我公之威其容如壺我公之慈趨時興息指南元龜願夀我公福祿如茨大書深刻識以銘詩菽水堂銘婦德貞母訓慈氷蘖苦守一兒登上夀髮半絲享祿飬逢嘉時五福備乘孝思名世士端影詞欽盛德為歌詩神報施公無私扇銘去溽暑如酷吏邀清風似故人洗熱中於俗士解藴結於斯民飬正氣以周德挺直公以秉鈞順秋冬而藏智應春夏而施仁惟出處之中莭能逺害以全身濟寧座右銘公勤亷幹百事皆辦私怠貪懦百事皆亂事辦名榮心廣體平事亂無成身辱心驚自警自銘擇善而行贊東坡贊東夷飛揚西戎陸梁時議嵗幣襲為故常豈無良䇿雖柔必强百未一施擯死南荒孰圖公像野夫冠裳公豈野人與世相忘鐵龍橫膝雅志莫量緒餘土苴雲漢奎章死不可泯文正忠剛魂兮來歸瘴海茫茫此畫極髙蓋臨李龍眠之寫真也東坡之文章志略具在方册後世可得而見髙風絶塵之資不可得而髣佛得見此像亦足以起敬起慕發英氣而洗凡鄙仁卿當寶藏之胡某盥手書王西溪畫贊不吐艱深言不為卓越行臨深履危悉歸之平易用舍行藏一安於義命無城府而人不忍欺不崖岸而人莫不敬氣分四時感春也多士有九德得寬也盛樂易百年與物無競
