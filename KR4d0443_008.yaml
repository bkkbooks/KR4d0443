body:
  text: 紫山大全集卷八元胡祇遹撰序篆韻序六藝自折𠂻之後去聖人千八百年禮樂射御皆廢所存者書數而巳嬴秦以降政煩文冗日趨乎苟簡大篆減而為小篆再削而為𨽻為楷為草字至於草則荒唐無法之極承訛習謬莫知其非於此有人焉沿流討源恥同卑近舛錯正較三代彛鼎金石遺文孔聖斷簡直升乎伏羲蒼頡之堂正定以為成書吾於今兩浙都轉運通議李侯見之矣侯於是學參前倚衡藩墻置筆踰三十年可謂苦心豪傑之士將板本以行凡欲識字者當家置一編學者以今閲古等而上以古視今變而下侯之有力於字學夫豈淺鮮哉某年月日序又序字畫始於鳥迹科斗再變而詳悉為大小二篆又變而減削為𨽻又變而省易為楷又變而破碎為行又變而放肆寄影為草鳥迹科斗泯滅巳久於今得見古人作字之由符許慎之説文獨賴小大二篆近世士大夫公論復是書者秦一李斯唐一李陽氷金朝黨竹溪寥寥二千載得三人焉其為藝也何其艱哉仲常郎中讀書涖政之暇手書小篆三十餘家刻梓以傳世進道進技不務苟簡處心力學豈淺淺哉異時攀駕前賢賞音者奚慮無人雖然苟無陽氷碧落一碑竟為風雨摧剝終不為世所重要知奇珍異寶不可以不講其主名某年月日胡祇遹題懷逺公詩序兩漢之君知為政官人之要者其孝宣乎宣帝之言曰庶民所以安其田里而無嘆息愁恨之心者政平訟理也與我共此者其惟良二千石乎故二千石有治理效酬以璽書勉勵增秩賜金蓋百姓之休戚利病治亂向背二千石實任其責有天下者以民為本本固則庶政百職無不具舉二千石之擇人可不慎歟孝宣其賢矣哉我朝典郡官中外公論賢冠一時者以彰德達嚕噶齊懷逺公為稱首公蒙古貴族祖考門閥英偉嬋嫣有耳者皆知之侍御東魯王公肯堂明鑑賞慎許可作古風三章以為贈裒美其德政本郡士大夫以見善不能揚竟為人所先乃賡唱迭和鏗玉鏘金錦綺絢爛然皆稱情設詞無溢美牽強卷軸如臂將次以甲乙某以老繆不可以衰耗辭竊自思惟昏耄健忘既不能追蹤絶足以成韻語可不見善如不及而略無一言偶乘平旦氣識少暫清明再讀三咏不覺擊節嘆賞曰非若是之雄章傑句不足以發揚懷逺公之盛德惠政非懷逺之盛德惠政不足以信實是詩照映一時傳誦于後世既喜聖朝典郡擇人之精又喜懷逺公生稟間氣天姿之髙邁如此又喜郡賢之於人之有德若巳有之人之彥聖其心好之不啻若自其口出喜一得三輒忘鄙陋而為之序至元辛卯秋七月十有八日平旦武安胡祇遹書髙吏部詩序詩學至唐為盛多者數千篇少者不下數百名世者幾百家觀其命意措辭則人人殊亦各言其志也裁之以義理性情則淺深髙下自有等級故東坡有郊寒島瘦元輕白俗之評王荆公工於詩者也百家詩選後賢以謂後五卷非前五卷之比精粗固有間矣或者又謂今人詩律唯學晚唐我朝吏部尚書河東髙公鍊詩力追前人先生為翰林學士嘗曰吾之詩唐詩也元李曹杜諸人亦多稱道其許可論議具備於元遺山之送行曹南湖之壬辰小藳二序又一時諸名公之詩什其子逺甫輯公平日篇什板行於世求序於不肖繼志述事可謂孝矣竊嘗思韓文公之自許曰使世無孔子豫不當在弟子之列斯言也人無敢非之者蓋自見之明所以自信篤先生之言詩自序巳竟其誰曰不然愈見先生之言為不妄不肖尚何言哉逺甫曰斯論即序也許氏棣華堂詩序木有本則有幹有幹則有枝枝繁則為美木獨枝則近於枯株矣韓文公則自謂兩世一身形單影隻傷痛之甚也枝不能離幹枝披則幹傷木之情也幸而枝繁天厚其生無水火斧斤之禍而妄自披離人不為妖怪吾不信也人非草木身也者親之枝如自厭榮盛離父母逺兄弟反天地親親友愛之性相讎胥怨不相往來草木禽獸之不若猶謂之人可乎鄭伯克段得罪於聖筆惡名終天地司馬牛以手足之不仁憂不欲生豈邈然無情也哉吾友許公叔海天資孝友一弟分飛於兵亂存沒兩不相知者六十年一日燕居深念一黃冠師蒼顔華髮來相謁問其姓則同呼其童名則唯諾而惶駭詢其支體之可驗者一一吻合究其嵗年則不差父母六親鄉黨鄰里凡可記憶者亦皆符契二人慟哭絶而復蘇恍若長夢之覺此身之再生也居數月欲使復初則曰不孝以亂離孤苦逃死避難著道士服因自戕其身人道之常殆不可返桑榆晚景翕合於絶望何幸如之煕熙怡怡手足廢而復完枝葉披而復榮相賀者門不絶賓詩什成巨軸號其堂曰棣華孝弟之誠相感相應誠百年之盛事許氏子孫繁衍世世義居居之瑞慶奚啻厚薄俗而榮一鄉哉感吾身之孤枝傷叔世之薄惡不能無一言至元庚寅武安胡某序送蘧録事詩序遇奇疾而后見良醫細民寃苦失職而后思良吏夏殷周厯年千八百嵗史册所書者君德相業漢承暴秦代殘虐以寬仁而史傳循吏然則三代之治豈無循吏哉聖神當寧甘露時雨潤澤普遍坎井桔橰難為功也彰德當南北要衝郵傳送迎百倍他郡飲食車馬之費徴索應期之勞日不暇給於斯時也市㕓熙熙不煩不擾公務辦而民安和豈非親民之官得其人歟録事蘧公國寶在任三年無廢事無寃訟不媚上凌下權衡不入吏胥手可謂幹局者也秩滿得代士民攀轅祖餞民有詠歌士有詩什吾其能已於言乎孔子曰如有所譽者其有所試矣然諸公之篇章非妄言也察行亷者當細詢之韓耀卿異花詩卷序韓侯耀卿治濬州之明年至元丁亥夏五月二十日所居後圃異卉脫土孤挺而起似笋無籜莖圓紫翠蔥蒨不數日髙二丈餘其端吐花若新蓮出水未開狀又一二日萼葉分披散為五花花六出修嫩如萱色正白脈理蒸紅香若蘭蓀花開日遂有舉兒之喜異哉茲花雖多識博聞逺遊廣覽之士亦莫之見莫能名焉噫感隂陽贊化育以和致祥以德動神明福祉以類而應豈偶然哉州郡之職守土牧民之官也惠政浹洽於民心明德薦享乎社稷隂陽和風雨時百榖用成至和至順之氣充塞盈溢不一而足麟子鳳雛奇葩異蕊同氣而應然則韓侯之德政不言而可知矣大抵善惡禍福之報毁譽恩怨之聲苟有可以欺一時天地神明不可誣也桑無附枝麥秀兩岐禾異畝同頴方之韓侯行年六十有二仁及於民天報之以子又以異花光馨其瑞慶足以追配古人花數五五男之兆歟天之報施善人雖影隨形而響應聲不若是之昭昭也善政者尚監茲哉不善者能無動於中乎工畫者寫生於卷軸長於歌詩者惜贊詠之一言吾不信也紫山胡某序以記其嵗月云郝孝子詩卷序受於天根於心不學而能者孝也然而聖門髙弟如曽參子遊子夏而以孝為問孟懿子孟武伯亦以孝為問聖人之教人諄諄焉以孝為先其見於孝經語孟六經前後百有餘章孟子推廣孝弟之極致則曰堯舜之道孝弟而巳矣事親若曽子不敢自以為孝而曰如參也直養者也以是觀之孝豈易能哉故孔子以養犬馬服勞具酒食深警乎遊夏聖人去世千八百年門弟之學於師師之傳授乎門弟父之詔子君之擇臣者果何事耶為師雖於語孟六經中講解聖賢之孝行不過尋章摘句隨注按疏資空談而已世變若是民不興行卓然以孝聞於官府得旌表門閭之榮安陽郝泰其人也邦人能詩者樂道之喜稱之遂成卷軸嗚呼人之成德必由父兄之訓誨師友之講習學校之教養耳聞目見朝薰暮沐習與性成庶勉於善如郝某者皆無資藉以孝自勉得名於世可尚也巳因讀詩人贊詠起豫悲慕姑以贅辭為羣詩之序紫山野老書朱氏詩卷序學業専攻積久而能老於一藝尚莫能精以一女子衆藝兼并危冠而道圓顱而僧褒衣而儒武辨而兵短袂則駿奔走魚笏則貴公卿卜言禍福醫決死生為母則慈賢為婦則孝貞媒妁則雍容巧辨閨門則旖旎娉婷九夷八蠻百神萬靈五方之風俗諸路之音聲往古之事迹厯代之典刑下吏汚濁官長公清談百貨則行商坐賈勤四體則女織男耕居家則父子慈孝立朝則君臣聖明離筵綺席别院間庭鼓春風之瑟弄明月之箏寒素則荆叉裙布富艷則金屋銀屏九流百伎衆美羣英外則曲盡其態內則詳悉其情心得三昧天然老成見一時之教養樂百年之升平惜乎吐林鶯露蘭之餘韻供終目之長鳴雖可一唱而三嘆恐非所以惜芳年而保遐齡老人言耄醉墨欹傾因冠羣詩以為寫真之序又庶幾效歐陽文忠執史筆而傳伶官也斡哩監司詩卷序民俗之於吏政緘默而無詩也久矣不惟無詩雖一歌一謡無有也所以然者非舉國之人如頑石枯木無惡死好生之情無是是非非之心亦非為政者舉事中理而絶無可議遂自至於無言也蓋惡不可勝言也且言之則獲罪蒙禍聞之者不惟不知懲戒而反生怨致怒以稔其惡此其所以無言也執政者民抱痛苦而不知為郡縣者恣其凶惡而不畏哀哉至於為士者是非義理之不知好善惡惡之不公而清議亦廢其見於詩什者例皆慶官餞行生朝不情過譽虛美之浮辭俚語實無足取邵康節謂只從刪後更無詩豈空言哉某人過彰德贈土主達嚕噶齊三詩士大夫從而和之遂成巨軸市井田畝之人詠其言歌其德莫不歡欣鼓舞况白髮老儒思見善政之萬一者耶某年月日某謹序崔雄飛父學圃亭詩序樊遲請學圃吾夫子謂之小人此人人之所知也洛陽崔某以名其亭何也是心也又非固執者之所能知也好名而不務實古今之通病也惟君子為能恥聲聞之過情觀其取名也廉知其務實也篤唐韓文公以退為字宋朱文公以晦自號是二大賢之於德日進而不止死而後巳緝熙光明如日升天而恆中也今之人父名其子師名其門弟朋友名其堂宇例取美稱求其實則不啻氷炭之相反徒使為弟子者日驕日矜廢學敗德非子弟者自壞為父兄師友者壞之也先進後進之範模諂妄若是然則其於自待自負也可知已余雖昧平昔定非抱甕滯陋桔橰俯仰之人也其子某河南北道按察使書吏知父之志得詩於諸名士携卷相過似欲得言於不肖故以鄙見冠其端云彰德路得雨詩序奉天牧民德莫先於誠敬誠敬莫切於悔過天以生物為心政失則旱乾水溢為災遇災而懼反求諸已凡遇夫病民者勇於改悔必敬必誠則民悅而天意順乖戾消而和氣應矣至元癸已夏五月六月不雨民有旱之憂物價增貴路官協議曰炎日如火六旬無雨則飢饉薦臻痛自克責以祈澤於是同寅協恭齋戒沐浴設壇於郭西道宫請謁真人文公達誠致懇以盡禱祀之法投文於洹水之淵太行青白二龍洞列百神位於祭所香燭茶果百物所須總判黃公以月俸供具朝夕叩首百拜晝夜不離壇下不五日而雨明日又雨越一日又雨不惟西成無虞而二麥播種復有來嵗之望此無他敬誠悔過之明效大驗也書曰施實德於民一雨可以活五十萬口何惠之能此歟合郡士夫掇輿人之頌為之歌詩紫山野老為之序黃氏詩卷序女樂之百伎惟唱説焉一姿質濃粹光彩動人二舉止間雅無塵俗態三心思聰慧洞達事物之情狀四語言辨利字真句明五歌喉清和圓轉纍纍然如貫珠六分付顧盼使人人解悟七一唱一説輕重疾徐中節合度雖記誦間熟非如老僧之誦經八發明古人喜怒哀樂憂悲愈佚言行功業使觀聽者如在目前諦聽忘倦惟恐不得聞九溫故知新關鍵詞藻時出新奇使人不能測度為之限量九美既具當獨步同流近世優於此者李心心趙真秦玉蓮今黃氏始追蹤前學可喜可喜持卷軸乞言故諭之如此仍以七言四句歌之瀝瀝泠泠萬斛珠清和圓滑囀鶯雛阿嬌生在開元日未信傳呼到念奴優伶趙文益詩序醯鹽薑桂巧者和之味出於酸醎辛甘之外日新而不襲故常故食之者不厭滑稽詼諧亦猶是也拙者踵陳習舊不能變新使觀聽者惡聞而厭見後世民風機巧雖郊野山林之人亦知談笑亦解弄舞娛嬉而况膏腴閥閲市井豐富之子弟人知優伶發新巧之笑極下之歡反有同於教坊之本色者於斯時也為優伶者亦難矣哉然而世既好尚超絶者自有人焉趙氏一門昆季數人有字文益者頗喜讀知古今趨承士君子故於所業恥蹤塵爛以新巧而易拙出於衆人之不意世俗之所未嘗見聞者一時觀聽者多愛悅焉遇名士則必求詩文字畫似於所學有所自得巳精而求其益精終不敢自足驕其同輩吁如斯人者伶人也尚能進進而不已竊有感五季唐莊宗之世享大名無實學居要職者無實材聲聞過情不自以為恥以至九流百工莫不皆然聖人所謂觚不觚者又不可以枚數然而無有責其廢事而不勝任者無有譏其有名而無實習熟見聞以為當然優伶賤藝也談諧一不中節闔座皆為之撫掌而嗤笑之屢不中則不往觀焉是非之心人皆有之責備優伶而不責賢者可笑也夫可哀也夫送杜亨甫之任兖州序僉山東東西道提刑按察使事安陽杜公秩滿得代挈家西還安坐兩寒暑若素無宦情者省廷遣使賫恩命改除知兖州事公出郭拜受恭待前官闕滿月日或曰杜公前按山東百二十城今改小州向之郊迎馬首者今覃居總府坐受趨謁向之抱案牘拜伏聽進退者今岸然幕下而出號令焉以公之才德勳業肯屈就否僕應之曰汝非杜公之心友歟何期公之淺也計廩祿之厚薄較官資之髙卑喜屈人而不喜屈於人妄自尊大先私而後公先身而後國世固然矣大丈夫則不爾出處進退顧道之行與否耳溫飽崇貴非志也使上可以佐時政下可以福斯民雖司縣下品亦屑為之上不能匡救贊成下不能潤澤鰥寡惸獨雖桓圭衮冕弗屑也當言責則行其言任承令則行其命令二者獨賴人而恩及乎下曷若牧民之職日與編氓相接情偽利病耳聞目覩屈直是非百折心喻姦吏不得以弄筆豪強不得而肆橫細民無寃苦失職一善教一佳政聞于朝廷而為法於天下僕恐杜公之志在此而不在彼也不數月或者復來相告曰杜公治裝矣吾友其知人哉吾鄉士夫多有歌詩以祖道吾友能無言乎又曰屠生之刀豈久屈於雞肋者邪奚必多文請以我二人問答之辭為贈送陸紹聞之任序行者必以贐言亦贐也物則助一時之路費贐言則益終身而名後世言之與物奚啻輕重之相懸也哉安陽陸紹聞以刀筆承先業明敏才幹而無少恩之習故人多愛之自奉承官長廉勤畏慎故辦集率先行輩凡所事官長無不信順由是聲譽日隆至元辛卯得推官天台某踵門告别贐詩滿行槖矣衰老欲無言可得乎聖人謂才難不其然乎非後世所謂才也順時以就功利不恤得罪於道義迎合以取富貴潤私屋而耀里閭不恤見鄙於賢哲奉妻子而飽童僕不知貽父兄之憂此後世之所謂才者也較之聖人之所謂才也不亦逺乎哉紹聞宜思之仕而優則學官業豈易量哉敢以為送行詩序送張教授肯堂之任序官無冷暖才稱其職得行其道者為貴祿無厚薄食之而不慚怍者為美若乃德薄才庸徼幸而致髙位不滿人望不厭公議未罹折足覆餗形渥之凶則負乘致冦之禍潛伏而不能不發見誚當時遺臭萬代于我何有哉此聖師所謂不義而富且貴于我如浮雲孟子所謂萬鍾不辨禮義而受之萬鍾于我何加焉者也儒學教官以庸俗觀之去間涼為不逺以有道者處之實清且貴無惶愧慊怍以善及人為國育材莫此之榮舍是而得切要煩劇道可行歟才稱職歟澤被民歟名聲昭乎時歟四者俱不可必求榮而反辱矣吾友張兄肯堂以儒學傳授鄉里門生恆百餘人下帷講誦將五十年夀六十有七矣至元壬辰秋八月堂勑到門擢拜廣平路儒學教授以老師宿儒年髙德邵而有此授所謂才稱其職食祿而不慙者也士夫祖道閭里餞送不肖少肯堂一嵗垂髫同几硯歡抃為諸人最樂吐狂言為送行羣言之序送丁教授之官序七情之有哀樂君子小人之所同然所哀所樂之事則雲泥懸絶水火殊異樂富貴而哀貧賤小人之情若是而巳耳孔子曰未若貧而樂又曰飯蔬食飲水曲肱而枕之樂亦在其中矣又曰有朋自逺方來不亦樂乎其稱顔子則曰簞食瓢飲不改其樂孟子曰得天下英才而教育之三樂也聖人之處已利人其樂如是非故異於人也蓋小人樂口體君子則樂天謂之雲泥水火之殊異不亦宜乎世之仕也計廪祿之厚薄校品秩之崇卑敬其事而後其食者千萬不一二無祿而仕者其唯教官乎然有志于孔顔孟者不以為憂而以為樂推原其情豈不曰賤工商胥吏雜流而不為恥干謁趨走奔競而不為貧乃士之常何往而不貧賤哉然而道德積於中才學富於身以仁義忠信樂善不倦為國家作養人才何樂如之矧世之人惟利是務生子姪幸而天稟俊秀不入於工商必入於胥吏不入於胥吏必入於奴𨽻能以經濟為學仁義養心者幾何人哉幸而得為教官且無科舉之誘賢者教之以經義才者教之以治事使我朝用人如探囊取物隨取而隨得樂莫大焉安陽丁逢辰字適之希聖者也作教官于彰德兩考矣今移益都路賃柴車載妻子以東不逺千五百里其處心可知矣豈以溫飽為計耶將見自大尹以及富家巨室百千萬家凡有賢子姪者豈不能敬一賢師哉人皆以此行為落寞豫獨以為賀知吾適之之樂為之也又豈以對屬聲律為文訓詁章句為明經權謀功利為才學積日纍月以為資考歟餞行者聞斯言請為詩序送任教授之任序官無美惡得行其所學澤可以及天下且不為競權利者疾怒爭奪而排斥之是為美職然恃才挾氣以卑位無祿而不屑就者今之所謂儒學教授也歟或曰品次最下又無寸帛撮粟之俸勇于有為者棄而不受子以為美職何也余應之曰事無兩全有似間散而實切要舍輕就重可也士為學而志于仁豈遑遑矻矻富貴而巳耶官一品祿萬鍾而尸位素飱跋前疐後又何榮哉樂莫樂于教育英才而兼善天下有天下者以人材為急務人材出于學校為士者一旦列羣英于席下明經論道通古今達事變講二帝三王安宗廟保社稷治天下福斯民之大經大法可措斯世于泰山之安為國作養人材長于規畫調度者教之理財長于幹局通變者教之以剖煩理劇忠清端方者教之以獻可替否文學筆力縟贍者教以辭命百職六卿人各有能各因其材而篤焉朝廷用人擇才洪纎小大隨取隨得得一賢守令使人皆曰某官某人之門生也得一才大夫曰某郡某學之生員也長材碩德布滿中外方之會計米鹽之細務勞苦簿書之期會辨決樹桑尺土汝詈我驅之紛競其功孰大孰細其况味孰榮孰辱其得失孰厚孰薄孰輕孰重彰德儒士任某振文用提刑薦釋褐東昌儒學教官豫恐其餒無祿而冷官卑于其行也吐斯言以餞之送朱僉事誠甫浙東之任序為政之要愛民爾官人爾愛民之意誠則官人之法密兩漢問民疾苦以後世觀之固為善政然而民之利病生於人主好尚之得失何必問為文帝清儉無為則民自富安武帝多欲則海內虛耗戶口減半二君好尚之不同民之利病捷於影響病民而問之曷若不病之無勞問也文王視民如傷鰥寡孤獨有養牧民之吏從上所好煦育愛護無不得所小大庶官無有凶人糾彈之吏尚何用焉如武帝之多欲牧民者辦集所須惟恐得罪之不暇雖使周召為吏亦無如之何糾彈之官腹背相望竟何為哉官制繁冗用人不精誠用而復疑御史創於秦刺史起於漢宣撫宣慰廉訪之官立於唐唐虞三代無有也惟讒説殄行震驚朕師龍作納言一人而巳大抵後世為政不求其源不究其理舍唐虞三代而循秦漢唐末法設官愈多而病民愈甚以豺狼牧羊而以犬豕救之則何益矣安陽士人誠甫朱公自監察御史以不畏權勢強禦直言不忌出僉浙東廉訪司事中外以得人為賀誠甫以嘗受學於不肖於其行也舉本而告之誠甫其勉之不負聖天子愛民官人之誠意是所望於誠甫也送張賓儀録判之官懷孟路序親老家貧不能躬耕又不能工賈雜類仰事俯畜無所取給句讀鉛槧之師入不能償出然則當如之何此古人所以有為貧而仕張君賓儀彰德總府知事改授懷孟録判父夀八秩子幼未成立正孝心捧檄之時也所謂廩祿之厚薄官資之崇卑不惟不當擇亦不暇擇也然而近世為士者不明經學古虛文客氣危言深論髙自標置一旦處繁劇居小官多不能折節委順承事官長夙夜公勤公給辦應遂招來不通無能為之謗余識賓儀今近十年性端直而氣和平踐履正而遇事通方不倚不流不固不滯以祿養為可重而不卑小官兹行也割雞以牛刀恢恢餘刃而不勞發硎矣大總管而下以及大夫士閭閻之細民自當敬禮愛慕安敢以俗士目之安肯以卑官賤之沁園春早花栁艷明秣馬膏車無違吉月相下士夫餞章成巨軸武安胡某為之序送霍僉事序經曰工欲善其事必先利其器蓋器不利則事不成雖有良工無所施其巧盡其能矣唐太宗以弓示弓人曰非良弓也木心不正脈理皆邪故發矢不直以太宗之神射弓不良則亦不能中的况餘人乎以是二者譬之治天下而不先人材可乎內則省部臺院百司庶府外則按察轉運府州司縣事務之殷繁人民之繁夥邪正紛擾情偽萬端一縣無一賢尹則一縣亂一州無一賢太守則一州紊等而上之所掌者愈大愈重愈多則人材之責任非優於州縣十倍者則不能也自中統建元政治一新勞聖慮勤聖躬宰相而下雞鳴而興不可謂不勤不勞無所用其心矣雖旬休假寧一嵗之中未嘗三五旬休假寧也公退嘗以未申或抵暮或繼之以燭不可謂不専其事矣然而每每為口舌者訕訐曰某事不辦某事錯矣或錢榖會計不當或刑獄淹滯填塞或執法前後不一或進退人物不公不材既不能服衆心又無以禦佞人之口紛紛擾擾若此者其病安在以識者觀之其失無多端擇人之不精也自一品而至九品苟得其人則事無不治人無妄議矣擇人得人之術其要有三一作養二程式三黜陟激勸如是而不得其人無是理也即今三者皆無才何自而成智愚賢不肖何以辨明邪正功過無以威勸所以人皆不學僥幸苟且得位得職而不勞也有能無能集事廢事而見之如一也蠧民養民為國為私者莫之賞罰而無喜懼也具曰豫聖誰知烏之雌雄此之謂也三要一立則無是病矣何以言之堪為用則作養之不堪者不與其數十得其六七矣程試以身言書判則十得其八九矣大明黜陟則十得其十矣如是則器利而弓良匠者射者不善其事不能中的則匠者射者之責也近嵗中外用人頗加選擇然亦不免採虛譽徇親知求名而不察實聞即令人材表表然在人屈指者省臺部院互相舉辟東移之西南選之北中出之於外外入之於其中未一嵗半嵗不得其終任盡其材是以少見成效而虛申祿秩僉山東東西道提刑按察司事奉訓霍公清甫權以吏而經以儒有猷有為省庭公選勾請必有內除清甫處心行巳非止精一事而供一職每以贊明興治草弊為巳任不惟能言之而實能行之者也老繆幸得同仕二年於茲熟其為人於其行也敢以是告慶博州趙總管致仕還鄉八秩詩序難處而易失者莫甚於富貴功名蓋志得意遂視凡出於命分之外者皆可以智力取故貪愎而才者為僭亂柔媚而自喜者為淫荒惡不知止禍其可逃是以西漢功臣子孫至武帝而絶滅殆盡韓信彭越英布陳豨之流又有不能保首領於牖下是知物忌太盛君子之於持盈兢兢業業洞洞屬屬者豈徒然哉我朝以神武起北方幽燕以南風從雲會功成事定剖符錫命列為侯伯連城數千戶數十萬租賦焉生殺焉一出於侯伯然而不一再世化門閥為丘墟陷子孫於編氓雜類身受韓彭陳英之禍者十居四三而以嗜欲天殞者不可計數所謂功名富貴豈易處哉迹其禍福之源委所成於貧賤憂戚覆敗於盈滿驕佚也前後不二三十年以僕耳目之所覩記乘時身致列侯者今皆亡矣聊城總管趙侯世為安陽農家以弓矢發身與封功之列為賢諸侯嵗七十周引年謝爵優遊還鄉里今嵗夀登八秩耳聰目明躍馬彎弧筋力猶未衰燕居靜處褒衣危冠左右經史正襟端席或講劘道義自旦達夜略不少解雖老師宿儒有不可及者待賓客豐腆處家清儉中庭後軒少有隙地種蔬而不植花卉曰毋為富家子之嬉遊也田桑粗給一生無餘資别業子孫靳靳保家不見驕豪習氣僕於今之諸侯取富貴功名於妙齡保夀考康寧於晚節好賢樂善讀書學道不以貨財閥閲福子孫進退有度始終無愧者惟於我侯見之矣侯之甥壻武衛總管府從事王晉卿因假寧省親拜上公夀翰林宗工巨儒皆附詩以賀里閈晚進胡某謹掇侯之等輩此得彼失再拜而為之序趙博州九十夀詩序五福之未易必者唯夀而巳賜不受命而貨殖焉民生在勤勤則不匱是富足之可必也慎言語節飲食恬淡虛無真氣從之精神內守病安從來是康寧之可必也天生蒸民有物有則民之秉彛好是懿德是好德之可必也世之不弔者三畏壓溺桎梏而死者非正命也知命者不立乎巖墻之下是考終命之可必也然則有大德必得其夀又曰仁者夀夀胡為而未易必歟所謂大德者唯堯舜禹湯文武周孔為能當之三月不違仁惟顔子其庶幾乎大德與仁豈易言之哉顔子猶以胎稟之衰弱而致短夭夀之在人豈若四福易得而致也然則斂時五福用敷錫厥庶民豈汗漫而無所主乎與之者必有所主受而致之者必有由矣聊城總管趙侯今九十矣而神識起居如五六十人生長兵亂中始以武功受封爵中以循廉居官守職年七十引例告老以經學義理涵養德性退休於家開國諸侯夀考康寧進退有道今所存者唯侯一人耳前此十年慶筵八十海內名士詩文成巨軸侯之德與功既咸陳而備言之矣茲不復贅視履安祥期頤遐福綿綿未艾推原其由隂隲默相昭昭彰彰又非幸而致也唯知公之深者以鄙言為不妄謹冠數語於卷首以為吾鄉立言拜慶者之倡慶祝氏得孫詩序有天地而有人有人而有吾祖不知傳幾千萬年而至於吾身是則此身也當與天地相終始至我而遂絶孟子謂之不孝有三先聖以謂續莫大焉不亦宜乎祝氏父子與吾家為比鄰今四世矣父子慈孝兄弟友敬人倫之間無毫髮虧欠在彰德一郡人皆謂之慶門今其孫誠叔年踰三十親戚故舊所望者一孫孤矢之慶喜得見焉能文者皆有歌詩祝贊戒訓義無不盡既成巨軸詩各有序則似為重復以衰朽之於祝氏五十年隔一墻之分義其喜也於諸公為尤甚不可無一言賀丁適之得教授職序子曰不患無位患所以立蓋以叔世好名求位之心重不求夫得名立位之實無實而得亦必不久而失就能徼幸苟且碌碌終任尸位官謗竟莫能逃方之以不才而廢逐者何以異教授之於羣有司位卑祿薄例以不知民事不通庶政短於幹局委靡軟熟者為之竊嘗思之當時為政者何為不思之甚也有天下者以人材為先務學校者人材之所自出師範學校之宗主不模不範雖有天姿俊秀之後學步趨涕唾薰蒸染習惟範模之從三年大比偶中一第不過聲律詞章之士修身齊家尚不自曉以臨民為政可乎易曰蒙以養正聖功也然則教授一職豈有自薄自賤哉不惟不慎難其人而反以不才無能者為之何思之不深而慮之不逺也居是任者不自知恥以念誦注解為通經以剽竊陳言為文章以記問為博學以浮艷小詩翰墨為才藝以狂談詭論為氣識下此一等包苴奔走於達官貴人之門邀求薦達塵顔俗狀日陪父老倡伎迎餞使客於車轍馬足之間若此者十蓋八九至元丙戍河北河南道提刑按察使薦彰德儒士起為别路教官者三人本路一人則丁逢辰適之後學喜得良師同輩服有司舉人之公傳道授業務盡其法旅賀既畢退自思維適之此任難矣不革前弊則又蹈覆轍矣革前弊則必起羣議雖然守官職不恤人言可也國家命百官字各有義何謂教以身修道之謂也何謂授以我之有餘賦與於不足者也又曰以身教者從以言教者訟其所令反其所好而人不從聖如孔子學不厭而後教不倦又曰溫故而知新可以為師矣故七十子之服孔子觀感欣慕不暇此顔子所以發喟然之嘆自近世以言語記問口舌酬答筆力新奇為教教人以孝悌而自不孝悌教人以忠信而自不忠信教人以仁義而自不仁義教人以勤學而自不勤學吁動人以言人誰我從信我從我者不過能為華世取寵之文而已謂之陶鑄人材化民成俗則未也不肖行年六十五十九年之非雖不能知然近日所悟者如是敢以鄙言為賀送殷獻臣奉使日本序奉使之任亦難矣上命下臣受命以行皆不可以率易擇人之不精與夫不自揣度徒以不敢拒命為恭其於敗事則一也然則辱君命者臣之罪擇臣之不精者能獨免天下之議乎奉使之職有二守常從權而已若夫講信修睦弔凶慶吉送往迎來厚薄有定禮尊卑有定序和好無事規規然奉守常憲此人人能之雖然猶於臨軒發命試其語言觀其容止議其問學材藝數者必備而後遣及其時異事異變起非常一介可以代萬兵一語可以服強梗不動聲氣不勞宸慮伸威定難於億萬里異域荒服之外此豈庸人之所能哉然則命使之君受命之臣宜何如哉西漢而下宇宙開斥遣使絶域世世有之如陸賈之臣南越張騫之來西域蘇子卿之徑節不撓為漢廷萬世之光馮奉世陳湯傳介子之殺戎王奇功異烈烜赫當代照映簡册千百世而下聞者莫不直髮扼腕不覺失聲歎美而為之一快君臣相光外內分定茲又一使之力也叔世選人不精而士氣日衰無事則揚眉吐氣以剛勇才幹自負及委之以事則退縮畏懦而不敢前遂使時君世主以儒為副或特命以行罔有成功嵗戊辰秋殷子獻臣再當日本之行京師諸公皆有詩故特舉往昔不辱君命者以告之壯其氣而為諸什之序送馮夀卿之官無極令序天子建官惟百要當以親民者為要職民天下之本民之治亂休戚肥瘠利病控告親接耳提面命得専撫字者縣令實司之中統前四十年諸侯承制拜官率以私門走卒健兒黠胥姦吏為縣長以應已之呼召指使供巳之掊克聚斂府帖下縣星火奔命不知有朝廷之尊而惟府帖是懼進退俯仰死生禍福甘以奴𨽻自處嗚呼尹縣政者若是欲求小民之被澤蒙福不亦艱哉是以清慎廉潔之士不惟不得進而實亦恥與若輩齒中統改元始立銓調法六品以下官咸詣中書省受勑命一洗私自署注之弊政積習既久黜陟未行賢不肖混淆尹府治州者鮮克由禮挾貴慢下故人猶重內輕外得是職不以為榮五年冬省掾馮受卿以例除中山無極令黽勉就道因告之以言曰君子之仕也志於道而巳矣廩祿之厚薄官資之崇卑無與焉苟可以行道雖委吏乘田敝車羸馬何傷哉苟道之不行髙牙大纛桓圭衮冕凡可以耀里閈而誇妻子者適足以為恥而不足以為榮也宰相尊道行乎天下縣令卑道行乎百里受職有大小而道行有逺近未有道不行而尸位素餐得保令終者也是行也吾友其毋以牛刀不足以割雞肋它日能佩符按刺之官入無極之境不覺失聲而嘆曰載災載畬橫縱其畝黍稷翼翼桑麻斾斾田野若是之闢矣里巷熙熙簫鼓夜聞無閉戶吠狗之驚盜冦若是之息矣居者安逋者還築新室起廢垣煙火相接鄰語相聞戶口若是之增矣塗歌里詠倉有粟筐有帛追胥不至門兩稅入官賦若是之辦矣父子親長幼序耕讓畔行讓路吏廉愛而蒲鞭不施詞訟若是之簡矣責以五事而為最遺愛浹于民心薦章交於廟堂若然則無極之令不為卑矣吾友其勉之汝官之不調汝階之不升有是理夫吾友其勉之送夢弼髙君之官序天地之氣變今漸不如古今漸不如古則後當又不如今矣何以知其然也以人之氣稟趨向而知之在孔子時已曰古之學者為已今之學者為人三年學不至於榖不易得也不百年而至孟子則曰古之人修其天爵而人爵從之今之人修天爵以要人爵得人爵而棄天爵自時厥後士之為學之志厯漢越唐又可見矣雖然天運極則復清和純粹豪傑英邁之氣何時而絶唐士氣卑陋極矣而生韓文公李翺張籍皇甫湜陵夷於五季至宋而生周邵歐陽曽蘇程張朱文公今之學者幸而無科舉利祿之誘凡有城邑皆設學校樹學官當此之時而不學趨末利而隳大德凡庸自棄可羞之甚也濮州儒學教授髙某今轉除真定大郡學者如雲夢弼巨儒循循善誘夢弼必能具為之開發送胡縣令之任序縣令之職亦難矣下撫養疲民御文法吏上奉承州府部省萬無巨細一一身任其責失節則罪愆期則罪民寃不能明照伸雪則罪奔走奉事之間少失尊官貴人之意則罪位卑則人得陵侮隱忍習熟而無恥祿薄則不免求索喪公廉之節節行不立愆罪稠疊故判筆一從乎胥吏辦給俯仰於輿臺加以嵗時伏臘吉凶慶弔少有失和則呼叱督責凶禍狎至諸如此類不可枚數宗姪某人仕積年改除泗水令踵門來告别且請相告教以里閈親舊之情愛其謹厚廉潔未嘗當牧民之任不忍無片言故敢以是告送韓主簿茂卿之任序有天下者休養生息其民庶而富安知親上死長之義以守則金城湯池太山磐石以戰則迅雷烈風決江擁海天下無敵民之於君也所係如此故君民者愛民如子順民之愛惡求民之利病急急於牧民之官慎難其人司縣品秩雖卑日與民親接而禍福之若州若府曰部曰省仰成於司縣然則司縣之官豈易得人任其職者詎可恃才挾氣而忽之哉漢唐而下至於今風俗日益偷薄姦吏日益欺蔽同官者私循百端奉公者十不一二強凌弱智欺愚寃苦不得其所者不可勝計於斯時也六事辦而無一民之失職豈易為之哉吾亡友韓侯之中子茂卿得官簿尉下邑告别乞言茂卿明敏過人公廉有守而於民事之艱難田野之休戚尚恐知之未盡故姑舉一二切病民者為言國以民為本君天下者皆知之知之而不能固其本者德政之不立而官非其人也官非其人豈為民父母之人簿尉之于一縣班列最薄而責任最勞苦縣政之得失生民之休戚皆出於簿籍公平細密事至物來雖百冗交集一照而辨姦邪不能欺蔽民無寃枉偏重居是職而不間書數則縣政紊矣能捕盜莫若能止盜止盜有道乎曰有民之邪心未濫誨諭之以德義防間之以法制既不忍為又不能為終三年無一盜此善為尉者也誨諭防間無法以遊手不務本作勞之人停畜招致穿窬劫奪之凶頑內邪與外邪相應羣盜蝟興責以不間弓矢不便鞍馬一二之庸懦應限獲盜不亦艱哉吾亡友韓侯巨川之中子得簿尉於下邑來辭别乞言故以是告以其始親民也送髙千戶之任序官制之於任子念先世之勤勞推恩以及後嗣厚之至也恩施當而拜受者無愧惟軍功之子孫乎何則觸銛鋒冒白刃逆矢石爭城奪地出萬死而一生與夫燕居則華屋鼎食出門則公府深嚴不覺寒暑不知飢渴旅進退署銜紙尾纍日月為功而同福其後者寧無間歟兵馬使髙侯以開國之勳其子襲爵子沒而今及其孫將適任鄉人榮之士大夫祖道作詩豫恐讀之者不知髙氏之世德故為之序送劉舜欽縣尉之官廣宗序尉於縣僚以察姦捕盜為責任近世例以便騎射擅勇敢能鬭敵者充間以文吏當之人必以謂非其所長是蓋見其末而不見其本救巳然而昧於未然夫挾槊彎弧擒縳鬭敵以力勝力固非文吏之所長此特武夫悍將負兼人之勇賊弱則吞之以氣強則或勝或負連縣集衆倉忙驚駭力戰而後獲噫前人救火之諭是亦爛額焦頭之功耳是可謂銷患於未形防亂於未萌姦不能生民用不擾者耶以是觀之能捕盜莫若能止盜能止盜莫若使民知恥而不為盜外戶不閉犬不夜吠行旅野宿如在家庭三年之間不汗馬弦弓是之為賢尉然而能致是者豈無其方季康子患盜孔子曰苟子之不欲雖賞之不竊傳曰禮義生於富足賊盜起於貧窮為尉者宜如何哉摩撫訓導激勸禁止教條威令欵曲嚴密力之可及者行之不可及者移文於縣申州達郡聞於所當聞之有司誠化一邑於變時雍苟不出此不教而罰坐視愚民之為非幸災樂禍假弓兵之力以要能聲以求賞贈秩寧不愧於心乎姨弟舜欽劉君以濟寧府從事才能幹局見知於省部改尉廣宗殆世俗所謂以文吏而受武人之任也竊嘗厯觀古之名將百萬之衆如臂使指綸巾羽扇輕裘緩帶意思安間百舉百勝又豈盡皆力縳虎射命中之人也舜欽通方不器察民情知治體撫字防禁一邑亦遊刃而有餘也將見鼠竊狗偷洗心易慮必不敢為之妄動一洗文吏軟靡之謗行軒駕里閈諸公詩酒祖道姑為是説嘉其巳能而勉其未至送張京叔還京序通方而不流有守而不固學也者學斯二者也處巳接物不外乎是人之道莫大於禮然而純儉則從今之俗拜下則守古之道願學聖人者能由是而充之庶免於固流之失舉天下之冕皆純而吾獨以布驚世駭衆反為異服者當何如君尊如天臣卑如地升地以迫天可乎衆拜乎上獨拜乎下人亦無敢非之者就使舉朝非之舉天下非之而不顧也蓋人倫之定理不可不守服飾之末事不可不同知斯二者吾於京叔張子見之矣京叔以妙齡秀發登青雲近黃閣貴者願得以為用賤者願得以為廕不通而能之乎鄉人至京師者無貧富賢不肖一以誠敬相引接講里閈家人禮事可者力為之世之人偶拜一命作九品官雖平生膠漆故友亦不之識也所知者造謁公卿不避寒暑趨迎權貴恐居人後奔走俯仰惟恐合逢之不巧在京叔則不忍為也謂之無守可乎至元壬午春以公務南來過鄉里省親為數日留北轅復命贈三命張信卿序君子之學三窮理盡性知命不知命則無以為君子以孔子之聖五十而知天命故垂訓戒人曰三畏天命其一也小人不知天命故不知畏又不知順其正所以犯禮義而招愆觸刑辟而誅戮良可哀也窮理盡性之學既廢士大夫以豪傑自負知命者鮮而况於凡民乎然畏凶喜吉之心人皆有之欲有所為不能無疑疑則質之於卜筮後世盲瞽廢疾者無所養則一以筮為業司明既廢不見可欲用志不分靜而能慮宜于物理天命亦有所得大抵記誦陳言歌詠而不知消息盈虛進退存亡吉凶悔吝所以然之故者十蓋八九多言或中既非實學以至探情以言察意以耳甘佞以悅貪躁之心危險以發愚懦之氣縱橫乎左右前後網羅伺候其狡獪逃遁者之情以為神異蠱惑流俗此市井貨卜者之一律也紫山野老掩關燕居三人叩門引一人來謁曰斯人也吾鄉張氏之子二十八嵗矣襁抱喪明學卜筮暗誦周易一編三命之書多聞強記每講人命援經析理歸之於數迎合諛媚之辭不出于口人以是信重之謹求教于門下願一言以相貺紫山曰前知術數之學非余之所知也易經余所當知而未入室也子能奮拔庸流誦味是書年未三十神識聖域因言以求理明理以知數已精而益精自茲以往將見問焉而以言其受命也如響不難至矣張子曰謹受教請筆之於紙故書送監司之濟南序守官任事所職不同至於為主忘身為國忘家則一也一心而二用焉則私意勝而公道廢矣恃名爵以榮身怙權位以肥家惟利是務以私害公者皆是也彰德路總管府達嚕噶齊嘉議公蒙古之貴種髙曽而上為開國近臣為大官以彰德乃本位湯沐邑官當設監臨臨涖彰德迄今三世未弱冠襲父爵廉節惠政銘在民心備見於遺愛去思碑至元壬辰狀申省庭曰叔父齒已壯當承世胄願避職讓爵以歸之都省以情上聞皇帝嘉其忠厚孝讓從其請未幾御史臺沙汰諸道提刑官更新司名為肅政廉訪公選才德有望實者首薦公廉訪山東東西道天下聞而榮之賢矣哉以才德讓叔不戀名位可謂不私其身不私其家歟前去強仕之年尚十五寒暑而立志卓異髙出世表可尚也夫可敬也夫於其行能無一言謹同多士因邦人以遺愛去思之情而為之頌曰吏不虐民庭無滯訟我公之政強不凌弱衆不暴寡我公之化外戶不閉犬不夜吠我公之惠使者四至無擾于市我公之賜夏熟秋成雨暘和平我公之誠九年於茲民物熙熙云胡不思馬首之東身留心從攀慕無窮民心懷悲東望依依三年來歸東人得仁戶戶陽春願公回顧念我西人祖考松楸邦人敬修公無久東孝思悠悠送張飛卿序常德路總管府達嚕噶齊張侯平南之勇將也南人畏其驍猛不敢道其官爵名字而以擒虎將軍稱之侯之第三子鵬翼字飛卿克肖克邁以豫為父執官江陵時與侯有一日之雅自隨任所來北還趙州故鄉將提學京師過彰德踵門持長楮以乞言與之語則好學知儒謹就書素志而告之曰自兵農既分設科取士士命官拜爵岐文武而二之自時厥後文武之學遂分不相為用讀書者不談兵有一言之者羣聚而非之曰此武辨之職非吾事也介胄者不閲書有一慕之者羣聚而笑之曰此儒者之事非吾職也此無他從時尚也以聲律詩賦道聽塗説為文以撫劍疾視暴虎馮河為武其不相為用也宜矣人肖天地以生四時備而嵗功成德刑具而政治立使有春夏而無秋冬有秋冬而無春夏其何以為天地哉德政兵刑法天地分而為天地統而為一氣生長肅殺雖異而其於成功則一也故慶賞以春夏而兵刑以秋冬今夫為儒者曰我知德政矣為武者曰我知刑戮矣苟如是則不得不為之氷炭然則人之法當如之何使文者知武武者知文至於授官定位又各量其偏於所長者用之求文武之本舍徇俗之末則不可忘兵農隙而講事不至於柔懦怠墮而不振不幸有警則别其重輕不至於殄殱殘忍而不仁小成小則草檄擊賊大成大則伊尹吕望入相出將不偏於一能則亦庶乎其可矣子名將之子也父兄家學不習而能豫所望者不廢其已能而勉其未能無忘乎已知而求其未知以子好學之志所作成文武之全材以備有司之選子以余言為何如鵬翼避席曰唯請得斯言以為贐送李總管序寓兵於農善政也屯田以積榖良策也三代漢唐之令典復見於今日有識者能無喜乎事舉而官得其人尤可為國家賀總管李侯乃一世名將滅金平宋之勳佩金虎符屯田江淮安陽諸公設供帳詩酒祖送於南薰門外衰朽以世之舊不能無一言曰兵農一民也戰耕二道也牧民用兵在前人已有治目治齒之諭總管宜思之詩云星言夙駕稅于桑田又曰同我婦子饁彼南畝田畯至喜又曰晝爾于茅宵爾索綯亟其乘屋其始播百榖以是觀之殆非與中天明月令嚴夜寂不愆于五步七步四伐五伐乃止齊焉同軌而並轍也且以積年久戰父亡子繼兄死弟及卒得休養生息于田畝甚可憫焉三年之內使民歌曰禾麥斾斾兮李侯之所治兮我積我倉如坻如京兮李侯之所成兮召父杜母我民之所依兮毋使我侯歸兮能如是不亦善乎老謬所知者如是大篇短章稱總管之世家傑句雄辭詠總管之才業鏗鏘炳蔚足以膾炙人口動蕩人心耳難以為言送田師孟序自鄉舉里選之法廢士之欲富貴利達者不勉於自進自進則必隨世之所尚尚謀策則學謀策尚經術則學經術尚功利則學功利尚文藻則學文藻以韓文公之賢屢不得志於有司撫卷嘆曰時時隨俗作文則時人以為大好其自屈也如此况餘人乎秀才田師孟能世其業通方識時將挾所學以趨京師以求富貴利達以余拜識其祖香林先生御史君友其父仲德兄告别乞言庶幾或見臺閣名公以代鶚荐又不齟齬于有司吁是猶問路於盲問音於聾何足以知且衰朽不材之言又何足增益師孟之聲價哉雖然子不見夫桔橰乎不見夫車乎俯仰隨人外圓內方是以為世所用苟強項輪角則一棄物耳故曰牛馬當作牛馬虎豹龍麟則為人畏異禍之招也以子之材不戾契不風岸不城府光和而塵同但恐富貴逼人一日千里何蹭蹬之憂乎敢以是告師孟請書之以别餞行之詩什送馬希驥序秀選俊造之法廢則士不恥於自售大比射䇿之法廢則取人無程式賢不肖混淆為士者不知進身之正路挾無恥炫鬻之羞汚轡詭御殉時好尚惶惶焉惟恐其圓方之不相合見棄而退所謂二帝三王之大經大法聖經賢傳之嘉謀嘉猷至大至剛之氣有為有守之志未至齟齬巳索然於胸中矣是以縱橫智謀功利掊克異端邪説淫刑虐政不顧義理之是非惟世好之從吁貧賤之病人也若是富貴之移人也若是此孟子所以比公孫衍張儀於妾婦杜喬李固視胡廣趙戒猶糞土也至元壬午姦黨既誅正人吐氣典刑昭宣直道宏闢拔賢任耉舉直錯枉田夫野老咸歌聖德黃童白叟拭目太平向之回邪貪汚莫不縮頸屏息洗心易慮嗚呼丕休哉聖天子神武明斷雷霆一怒而羣妖灰滅凡有志於佐明時陳得失者莫不趨走京師以獻其技能觀其志亦豈止於僥幸一時之富貴而已耶亦將有以薦扂楔於明堂助涓埃於海嶽者也安陽馬驤希驥讀書明理立言適用識時務而不詭隨據安常而知通變有志有為而不得行其所學閭里親友勸以求仕來質疑於武安胡某因告之曰孔子大聖也其所以仕者三可以仕則仕漆雕開則孔子勸之以仕韓文公送董邵南之燕曰觀于市復有昔時屠狗者乎當告之曰明天子在上可以出而仕矣是知古人未嘗不欲仕也惡不由其道也今子之行卜於汝心至自信之篤相時而動則君子道長小人道消矣行矣哉子其勉之何以疑為因舉酒作歌以餞之士不自重亦以久兮斫方為圓無所守兮不義富貴於我何有兮脂韋妾婦亦可醜兮拔乎流俗孰我誘兮玉潔金堅當自厚兮為官擇人落吾手兮竹帛功名垂不朽兮又歌曰霜寒氣肅兮天宇清惡木靜盡兮江山麗明五靈羣瑞兮煌煌乎帝京紉蘭結蕙兮既芬既馨鸞音鳳翼兮載飛載鳴洛陽才子兮忍能無聲送王彥才序宋儒以人之少年富貴才俊為不幸嘗恨此語為未公人生天壤間細密如蟻蚩蚩擾擾昏蒙質魯貧窶困乏朝不及夕者比肩接武耳聰目明心思強敏髙門富室者億兆中無一二幸而得衆人之所難得亦造物者之所加厚反以不幸目之何哉長年以來涉世經事閲人既多始以前賢之言為不妄大凡人有所恃才為惡者過多而為善者過少富者恃財而驕勇者恃力而狠辨者恃舌而言藝者恃技而矜理必然也有若無實若虛人謂有餘而自謂不足不務細行而涵養大德者幾何人哉禰衡以猖狂而殺身王楊盧駱四子之前途竟不出於裴行儉之所料以是觀之謂之不幸者真知言者哉雖然亦在人處之何如耳友人彥才郎中先世以開國有勳勞列上爵英兄才弟聨仕天朝慶門華胄照映一時彥才早年讀書明敏頴悟長踏仕路徑列朝班以它人處此不其難乎彥才謙退畏慎不自滿假藏蓄涵養默而不耀篤信力學積而不發事兄如事父愛弟如愛身與人交敬而有禮及其臨事剖決邪正確乎其不可奪紛華美麗略不挂目聞一善言見一善行若飢渴之得甘旨焉觀其志豈易量哉水之積也不厚則不能載萬斛之舟雲之興也不密則不能霈三日之霖人之自期也不逺則惡能埀千載之名彥才處心行已志其大而遺其小也與夫馳騁豪習矜炫文采者何啻雲泥之相萬萬也至是則昔人以少年富貴才俊為不幸者復將何辭以辨之中統元年秋陪識左丞公來治魏相邢洺懷衛二年春從左丞公北覲述所職也是行也摶扶搖而九萬里直抵天池下視人世水黑泥腥而不復來矣僕愛其髙氣雄節略舉平昔之梗概以餞之送雷彥正序持大綱而忽細務士之通病左氏傳曰君子務知逺者大者小人務知小者近者康王之命畢公曰惟公懋德克勤小物二者孰是而孰非竊嘗惑焉既而自悟二者語異而理同蓋人之立志也貴乎大臨事也主乎敬立志不大則以百畝不易為已憂臨事不敬則以簿書詞訟不屑為然而在乎所處之位何如耳孔子為委吏則謹於會計為乘田則牛羊茁壯及乎一旦為司冦不旋踵而誅少正卯以三事巨細較之特一行乎其位耳是故古之人無曠官之墮無出位之僣今之人則不然處卑則僣乎上居髙則總乎下犯分越職苟可以迎合於上而取辦集才幹之稱無不為也故有貴為幕官而兼輿臺皂𨽻之任忌前絶後惟恐其來者之軋巳噫富貴之壟斷者斯人之謂歟顧茲庸鄙固不足以遺臭萬代然而未免一時譏非詬罵不齒於清流富貴於巳何加焉吾友彥正卓卓孤立固窮篤學非其道未嘗插足於權貴之門非其義雖敬致厚遺而弗受家可貧而貨不可動身可窮而志不可撓自渾源遷鎮陽門讀書二十年經略使侯愛其不凡以力徙家於衛中統元年夏左丞公來治魏以禮辟為幕官不肖黍與之同列日往月來愈詳審其為人總大綱而不流於疏迂勤小物而不涉於瑣屑每同諸公論事於左丞前非所當言則呐呐然不出諸口及其言責在巳事有當辨則直言正論衮衮可聽雖聨仕諸人邪正曲直斯須不少貸左丞公嘗語人曰彥正凡事有心聞者莫不悅服二年春同郎中彥才從左相北覲不肖愛其處事發言得君子之時中又愧知吾彥正之未盡也前途萬里起迹於此逺業其可量也不舉時人之非不足以形容吾彥正之善送焦侯序漢髙帝承秦苛虐思亂巳極欲以養瘡痍蘇困敝收人心定天下故蕩盡秦法而約為三章文帝繼以寬仁禁網疏濶天下乂安殷厚然人情富安貴驕則多欲多欲則為罪為惡越禮犯分而不可禁以至景帝有七國之叛諸侯子孫至武帝而絶滅殆盡昭宣知此之積弊故能吏稱職民安業法度益備犯禁者寡天下翕然大治大抵創業之君立法不得不寬定紛亂也守文之君立法不得不密止姦慝也國朝樹法與漢相若傳祚五葉而諸侯驕橫姦吏貪虐皇帝神威明斷罷世官立銓調黜陟幽明至元五年內立御史臺外設按察使分天下為四道某人當某路之寄陛辭就道徵言於友人胡某曰不肖此行拜奉教條行莫能盡道謀輿議固非當問然以吾友告教之私誠宜何以哉某曰治道去其泰甚孟子疾當時諸侯大夫之惡曰今之諸侯五霸之罪人也今之大夫今之諸侯之罪人也及其對萬章之問曰子以為有王者作將比今之諸侯而盡誅之乎亦教之不改而後誅之乎孟氏使陽膚為士師問於曾子曽子曰上失其道民散久矣如得其情則哀矜而勿喜觀此則聖人之息姦消惡教刑寬猛之漸可見矣子職在肅清欲使人之不敢為罪莫若使不能為罪使之不能為罪莫若使之不忍為罪罪一也所以不為者三法令緻密上下相鈐束則不能為嚴猛明察毫髮不貸則不敢為誨諭勤懇懲創感悟則不忍為三者俱未若不忍為之有恥也吾子誠能諄諄切切明諭吾君全功臣體羣臣難守令子庶民之意曰明天子在上為民長官位以賢職以能爵以榮名祿以厚生才不次而用秩隨效而增朝廷之於用恩不為輕矣汙者黜貪者圯病事者削尸位者退慢法者誅方命者廢昔焉世胄而閥閲今也荒寒而衰斃始也以功終也以罪朝廷之於立法可謂密矣仁則榮不仁則辱惟榮與辱諸執事其擇焉使任職之人洗心易慮羞前之為慕榮恥辱知自愛身草贓胥為良吏化汚俗為清風四海熙熙一人垂拱此按察之職也如犬之伺盜如貓之伏鼠施機設網摘細瑕起繁獄承貪汙之久弊快詬訐之讒訴亂是非於曖昧逞怨家之私怒以擊摶為功以紛擾為務上致宸聰惑疑下致無端詿誤使百執事局地蹐天而手足無措此吾友之必不為也遇剛而吐遇柔而茹究蟣虱之黨與縱豺狼之馳騖旅進退以塞責保無毁而無譽此吾友之所必恥也鄙言巳竟請登車焦侯慨然攬轡舉鞭髙揖首肯而去贈宋氏序百物之中莫靈莫貴於人然莫愁苦於人雞鳴而興夜分而寐十二時中紛紛擾擾役筋骸勞志慮口體之外仰事俯畜吉凶慶弔乎鄉黨閭里輸稅應役於官府邉戍十室而九不足眉顰心結鬱抑而不得舒七情之發不中節而乖戾者又十常八九得一二時安身於枕席而夢寐驚惶亦不少安朝夕晝夜起居寤寐一心百骸常不得其和平所以無疾而呻吟未半百而衰於斯時也不有解塵網消世慮熙熙皥皥暢然怡然少導歡適者一去其苦則亦難乎其為人矣此聖人所以作樂以宣其抑鬱樂工伶人之亦可愛也樂音與政通而伎劇亦隨時所尚而變近代教坊院本之外再變而為雜劇既謂之雜上則朝廷君臣政治之得失下則閭里市井父子兄弟夫婦朋友之厚薄以至醫藥卜筮釋道商賈之人情物理殊方異域風俗語言之不同無一物不得其情不窮其態以一女子而兼萬人之所為尤可以悅耳目而舒心思豈前古女樂之所擬倫也全此義者吾于宋氏見之矣贈張秀才序泥在鈞而不肖其鈞金在鎔而不從其鎔謂之不祥可也人從師而背其師之言行謂之不學可也人之生世舍農工商而學士士何師孔孟也然則欲出一言立一行當自思之曰與孔孟合乎不合乎合則由之不合則不敢出諸口又敢見之行事耶子張學干祿孔子教之以多聞見慎言行則祿在其中孟子論士之入仕所以辭尊居卑者以位卑而言髙罪也後世之為士者能是乎自孔孟沒士志日卑汚急急於富貴是以權謀功利之學興凡可以阿世取寵無不為也不惟人無非之反以大丈夫稱之噫士風至此固為儒學之羞辱然而時君世主惡得賢良方正為國而不為巳為道而不為貧致君堯舜澤民仁夀者而用之成周之末士巳如此百世而下宜乎誇口舌犯分位傲鄉井棄父母持不根剽竊之學吐驚世駭俗之辭以豪俠自任僥幸恩澤駢肩纍迹之多也此正吾夫子所謂小人儒也嗚呼處人世而以是為心巳不自羞則父母國人皆賤之吾恐其求榮而反辱求富貴而不免於貧賤曷若言忠信行篤敬有若無實若虛迫而後應不得巳而後動推稱于鄉里不憂父母者之為賢歟魏人秀才張淳傾蓋於南洛足至蓬門者四年之間今凡兩矣持緗縑求教戒意甚勤懇余恐其才髙氣盛或陷於流俗也姑以是為贈
