body:
  text: 紫山大全集巻十元胡祇遹撰記重修羑里文王廟記天地文明之運至中古而盛先聖後聖之德至文王而備文王之盛德大功皦如日之在天愈久而愈光不以廟貌香火廢興厚薄而汙隆焉然千百世而下凡曰有知追慕聖人之功德自不能已或以聖人里門之所在都邑之所營建車輪馬跡之所嘗涉歴則必垣而宮之像貌而冠冕之時和歲豐春奠秋薦儀誠兼至不威而嚴不率而齊莫不鼓舞而踴躍歡忭事死如事生兹非龐恩厚澤淪浹于人心孰能使之然哉湯陰北十里道右孤城如塊土人傳曰羑里文王之廟在焉考其事跡蓋太史公所謂羑里之庫者也兵後祠宇焚蕩某年某月某日邑人彰德路詳議劉敬文卿倡鄉里之好事者前楹後寢創為一新凝旒端冕神復以宇居者樂於祈年報本過者喜於下車瞻聖且求文石以識其歲月無知小子惡乎敢言哉至於聖人之出處則有明夷之彖辭易之大傳太史公書韓文公之羑里操有耳目者孰不聞知尚何言哉所可懷而慕傷而喜者八百年文物之周賴是城以興伏羲先天之心畫賴是城以明在聖人明夷於一時而發瞽開聾垂裕後人昭昭於億萬世之無窮若然則聖人一時之不幸而為後世無窮之幸雖聖人亦不自以為不幸向使獨夫惡不貫盈文王之化行乎西土不過潤及於一時一隅配禹湯成三代禮樂典章貽則來世者未可知已易經之衍明亦未可知矣兹城也䝉囚聖之惡名後之君天下者存而弗毁良有以也劉敬以篤敬之誠復完祀事方之助淫祠崇異端處身聖人之門而張皇非聖人之法者邈矣是又可喜者也惡得而不書至元六年夏十有二日太常博士借注户部員外郎兼應奉翰林文字武安胡祇遹記創建三皇廟記生聖人者天地成天地者聖人也天地賴聖人而成而况於人乎况於萬物乎不讀易詩書語孟不見聖人之功知聖人者孟子而下惟韓文公為最原道一篇詳且盡焉孰為聖人由周孔而上則文武文武而上禹湯堯舜三皇堯舜之師也傳天地心代天地言贊天地功立萬世斯人之極天地位萬物育三聖之功也人生報祀天地廟貌香火血食舎三聖孰先焉後世祀典不明不敬愛其親而敬愛他人悖禮悖德奔走祈禱僥倖僭妄非理之祭不可禁主三皇之祭者獨醫巫兩人耳我朝欽崇郊祀舉秩廢禮大都小邑皆廟三皇至元戊子彰德路宣差逺公總管少中胡公卜地之逺闤闠幽寂爽塏可以宅神妥靈卜於金鳳坊之東創建而崇起之洗庸工之陋像開天日之聖儀俾萬姓皆知報本崇德不獨在於醫巫也噫良吏惠政一方感恩戴德人猶不忘况萬世永賴之聖功乎但恨無倡始開悟者自今以始因敬以求其敬之之由希慕企仰上智者聖其聖而神其神中人隨氣稟之厚薄各有所得愛身循理樂其樂而利其利心仁而身壽希聖之効人自知之少中大夫前山東東西道提刑按察使胡祇遹譔太安寺鐘樓記武安僧寺五太安為崇麗宏深大定明昌間僧衆亦盛法鼓齋鐘粥鯨經幢像大而聲洪住持者戒行精嚴緣法福厚寺火於金亡之兵蕩為灰燼五六十年不復舊觀至元丙戌夏余以事還鄉一至其門則法堂西廡及諸僧房煥然一新院宇清淨再往過之都綱神元謂余曰自吾祖師德祚受業親師廣沂二人相繼補壞起廢而得至此神元等繼續先業惟恐不克負荷凡院門之未備敢不竭力一一修緝近賴外護功德主宣差縣令主簿以寺未有鐘鐘未有樓二舉而二美具適幸車從之來臨敢以文為請因告之曰竊惟佛之立敎亦因世人資稟清濁昏明高下之不齊設為科品以訓諭各因所見所悟而入道所謂對病用藥殊途而同歸者也直指人心見性成佛一也因性理以立言演說千經萬論日講月究二也嚴列條律不可違犯三也有因有果立像開悟四也人之所以不能成佛者氣血嗜欲害之也衣食溫飽則安逸怠惰昏妄放肆早寢而晏起夢想顚倒無所不有沙門之義居徒侶衆多非洪音警告則起居之不能齊一昏怠之不能嚴肅進退之不能如律講誦之不能依時勸戒之不能徧知使聲入乎耳戒生乎心律周於身性成於内然則立像之為訓豈淺淺哉汝輩此舉其可嘉尚然而自兹以往仰危樓之高明而能四通八達不為物欲蔽塞而墮下流聽洪鐘之聲如聾而聰如寐而寤如醉而醒如晦而明初則知戒戒則定定則慧苟不知此雖檐楹齊雲潮音沸海一虚器耳神元曰執事儒道也是說與佛法合請以斯言刻諸石方山重修元魏孝文皇帝廟記堯舜禹湯文武而下歴二千歲之久巍然南面者奚啻百千人知君人之職能止於仁以善養民者幾何人哉立德立功立法福澤萬世使人香火廟貌敬之如天地永永而自不能已者又幾何人哉當其據至極之位操死生天下之權奔走聽命則有之愛慕敬恭中心悅而誠服則無有也一旦長往棄世則誰復思之而况於血食香火據處廟祀乎元魏之種鮮卑也袵金革死而不厭生長見聞之恒性也自詰汾傳世十二而高祖孝文皇帝立帝名宏時生五年矣有至性前年其父病癰親吮之未冠而能親祀七廟經讖緯巫卜詔均田自是立政置三長定民户籍制五等公服作明堂辟雍國子學分置州郡定樂章非雅者除之大旱請有司賑貸出宮人罷末作犯死刑而親老無他子旁親者以聞詔羣臣言事太后馮氏殂勺飲不入口者五日哀毁過禮逾年始聽政進蔬食追感哀哭終日不食太和十五年更定律令親决疑獄定廟祧之制正祀典祀圓丘明堂迎春于東郊十六年祀明堂朝日于東郊修堯舜禹及周公孔子之祀親行拜祭養老於明堂以太后再朞哭於永固陵左終日不輟聲凡二日不食十七年親録囚徒謂司空穆亮曰自今朝廷政事日中以前卿等自先論議日中以後朕與卿等共决之是歲冬十月營洛邑明年南廵祭比干墓以太牢自為文曰嗚呼介士胡不我臣三月還平城議遷都九月考績黜陟百官十八年冬發平城至洛陽置牧場于河陽十二月易冠裳語言從漢十九年夏四月如魯城祀孔子封其後為崇聖侯減冗官之祿求遺書法度量遷都洛陽詔州牧考官屬得失以聞十一月祀圓丘二十年改姓元氏初定族姓詔羣臣聽終三年喪詔諸州中正各舉民望五十以上守素衡門者授以令長以久旱不食三日是夕大雨置常平倉除逋亡緣坐法以彭城王勰為宗師使督察宗室不率敎者以聞二十二年秋七月省宮掖費用以給軍賞二十三年夏四月殂于穀塘原帝友愛諸弟始終無間嘗從容謂咸陽王僖等曰我後子孫邂逅不肖汝等觀望可輔則輔之不可輔則取之勿為他人有也親任賢能從善如流精勤庶政朝夕不倦每出廵邏有司奏修道路輒曰粗修橋梁通車馬而已勿出草剗令平也在淮南行兵如在境内禁士卒無得踐傷粟稻或伐民樹皆留絹償之宮室非不得已不修衣裳浣濯而服之鞍勒鐵木而已此帝之仁政之大略也平城之於洛陽南北取道彰德為直要故於府治之西多駐蹕之所土人䝉其恩惠廟而祀之水旱禱於廟則遂不為災風雨時若歲乃大熟若夫雄才英略混一六合之志未遂而天不假年三十三而夭惜哉使帝得伊尹周公之輔弼太甲成王眞庸主矣方山父老以廟貌久傾壞不戒用勸各出家貲新高殿宇雄壯絢麗增倍於舊垣墉門廡深嚴完好像設邃穆瞻仰起敬既落成相率來乞言刻石以紀其歲月以倡勸後人嗚呼魏之易代帝之殂落幾寒暑矣使人敬愛不忘之如此大德大功及於生前身後生為仁君沒為明神此誠之所以不可掩也故備錄史傳之所紀而大書之仍刻諸人姓名於碑陰庶幾子孫世世毋墮賢祖考事神報德之敬某年月日記德州顏魯公新祠記忠臣敬君憂國之心切痛良苦者社稷宗廟將傾逆亂將大作位卑而不敢言言之而不能上達上達而不見信欲自為之備則犯分越禮職微力薄不能申明而獲罪不為之備則禍於旦夕而身與國亡虚負不智不忠之恥徒魚肉於梟獍虎狼之口於斯時也危乎艱哉唐明皇享太平三十年恃宴安縱淫逸惡直言疎斥正人寵悅媚耳目逢迎詭隨之姦邪䧟身於聚麀肆人欲而絶滅天理安其危利其災樂其所以亡而不恤喪心若是足致亂亡明智忠愛之心曷勝憂懼悲夫天奪其魄降天帝之尊崇而親接糞穢虧日月之光明而喜愛螢燐豢豺狼犬豕為麟鳯納侮招凶梟喙一鳴河北二十四郡土崩瓦裂披靡而從賊平原以塊爾孤城無山河之險固無甲兵之堅利犄角常山拒賊鋒綴賊後使賊不敢長驅而西庶幾京師得為緩禍平賊之計深明逺慮忠勇精誠照青天貫白日數千載而下想見風采凜凜也後之有天下者莫不欲臣下之死節於我激勵孱懦然則平原之廟貌血食終天地而不廢爭光日星可也為人臣而忠於君來守是邦聞魯公之風宜如何哉百年以來廟火于兵故基斷碑埋沒于荆棘瓦礫至元乙酉知州劉某下車未幾詢訪陳跡力起祠宇賢矣哉侯之處心也人之修已臨政即其尚慕崇敬者觀之則其人可知也狄梁公毁淫祠千七百所而立大禹伍員之祠乃知忠義尚賢之心千萬世一心也劉侯前知蔡州魯公死事之地而廟像焉始終惓惓於公之節義尚志者能已於言乎故書汴州二賢堂記金眞祐五年夏五月滏陽黄冠師威儀薛正圓坐遊於趙禮部閑閑公家公葬之汴之東城作文以祭納銘於壙厥後其徒韓忠誠徙葬於其鄉至元某年道士某等立祠於州之天慶觀而像事之以閑閑公金國高年之元老待正圓最深故以閑閑中堂而正圓侍坐扁其堂曰二賢且慮後人莫知二賢之為誰來徵言以識其姓名竊嘗聞我先人之言曰大定二十五年廷試天人相通汝祖閑閑是歲同榜登第以是思之同年家之情好分義吾鄉之尚賢樂善二賢之文德人品俱不可辭閑閑之聲稱有耳者皆知之正圓以野服黄冠得與為友生前身後親厚若是則其人可知矣天慶宮正圓受業之所閑閑之里門鄉井二賢精爽吾知其眷也必矣矧道人庭宇松竹交蔭香火清深終日無履聲雞犬跡實足以栖神妥靈若以閑閑銘威儀之壙祭威儀之靈二篇之文刻於石則二賢堂之為誰顯煥暴白於千世矣奚待俚言之為贅某曰我乞言於子如子之說則記已竟矣謹受敎胡氏别業記彰德西南迤邐崗阜去城僅一舎村曰王佐一水西來曰羑水東過羑里之庫去去漸下智者鑿石為渠又因其勢之趨下奔湍宂石為坎深尋丈圓徑倍焉注落觸激以轉水磑晝夜麵麥十餘斛雖夏秋霖潦不為害少西二百餘步復鑿立一磑之巧猶天成渠湄樹林陰翳屋宇籬落如畫鷄犬鵞鴨不勞飲飼而鮮澤肥腯問其主人之姓居者曰此胡氏之别業也胡氏世為隆慮農家近世子孫名全者潛德不仕徙其家安陽其子元大名府開州酒稅醋三務提領壽七十五終于府郭南之私第元之子名允中字信卿皆遷葬於安陽王家崗讀書幹局累監倉庫務閒暇以才慧營生理故成此業一木石一塼甓皆手自移植雖巧匠良工弗若也余駐馬久之計其功不二十年不可完問之則果然有子男五人長曰長安今為河間景州判官次曰長慶曰進德曰水兀曰山兀俱讀書嗚呼世衰俗薄雖農家亦皆滅裂鹵莽有種木者共笑以為迂務口舌趨近利鬻風賣雨踏虚駕空知有今夕而不計明晨者皆是也背鄉井棄墳廬弗恤也苟可以得溫飽則就之人反以為智權若允中之用智勞力能為世之所不肯為不趨末不妄求不欲速不求近利坐遺子孫以長樂久安之業可尚也夫子孫遵守而不失百世富安可卜也抵暮入城翼日語諸親友或曰是不可以不記貽胡氏後使知其祖考之賢余應之曰可某年月日書靜勝堂記宿州公廨後圃連北城城高數仞直後圃雉堞因城築土方數畝當火雲赤日退食登覽向明俯臨民居市井里巷車馬喧闐背倚軒楹城下長洲芰荷鷗鷺龜魚川泳雲飛左顧右盼阡陌村落山阜如畫不知人間之有酷暑月建之當長夏帝炎帝而神祝融也堂曰靜勝命名者良有旨哉升兹堂也熱已無有何以勝為人於養心無學致疾而不知疾之所由生人之制心最難者靜靜則清涼最喜者動動則煩燥煩燥則雪樓冰殿不能解晝夜十二時心無時而靜飲食中亦動夢寐中亦動才者汲汲於功業貪者孜孜於財利烈士屑屑於名譽誇者皇皇於權位處州縣而慕府郡守一郡而慕臺省居人臣之極貴不得於君則熱中朝廷急於得賢甫霑一命而望為宰相者皆是也萬思千慮如沸羹如烈火如銛鋒如悍馬聖訓所謂人心惟危者數千年後其言愈信命斯名者欲使後人各安其分思不出其位息妄想之紛擾澄淵涵蓄恪居官次明恕生民之利病詳察田里之休戚一夫失所畏懼慄慄不冬而寒外熱奚足勝哉某年月日某官復新楹宇軒户請記於余老謬妄意如此未審扁門者為何如登兹堂者為何如叢桂堂記墅業則連阡陌篋笥則金玉滿堂謂之慶門可乎此富室也非慶門也高楹甲第車騎塞閭身居大官勢可炙手謂之慶門可乎此貴家也非慶門也所謂慶門者富與貴不與焉圬者王承福之言曰吾操墁以入富貴之室有年矣有一至者焉而往過之則為墟矣有再至三至者焉而往過之則為墟矣問其隣曰身死其子孫不能有也或曰死而歸之官也以是觀之其可因一時之富貴而遽以慶門為許乎必也子孫繁衍盡事親敬長之職靳靳則保家超卓則亢宗孝弟婣睦才能問學處鄉里稱善人入仕途為名士廣前人之聲副高明之志是以謂慶門吾鄉富貴之家不啻千百可以慶門目之者吾於蓋氏見之矣蓋公為總府經歴官披荆剪棘撫瘡摩痍化相殘為同井易草芥為桑麻以功以德富與貴固所宜有子六人珠明玉立蘭薫桂芳承義方之訓克自抑畏經歴君歿迨今將三十年友愛融怡與君在無異内外族屬百口大小無間言凡九世遺業不唯不敢失墜而又增廣焉𤣥曾孫男女三十餘人然則蓋氏之慶如火始炎泉始達焰焰滔滔其可量也哉六人長曰居敬字立甫次居正字元甫次居仁字義甫次居簡字行甫次居寛字德甫次居實字誠甫元甫起堂於其第手足宴集不肖亦在席酒酣仰而視相顧而樂舉杯見屬曰吾兄弟輩固不能遂先人責望之心然堂構前業日愼一日常恐弗能光昭先人之令德所以成此堂者非止於娛悅妻孥誇耀閭里偃息此身而已也歲時伏臘聚宗族於斯會昆季友朋於斯誦常棣之詩歌鶺鴒之章篤孝友而厚親愛毋胥逺毋胥怨以棣華相輝為可重以玉帛財利為可薄使世世子孫毋改此轍此樹堂之志也願命之以名誌之以文庶幾不墮其成言僕不敏請以誠吿賢昆仲之相友愛以古人自期以今人薄惡紛競為戒誠發於中陰相於神明故能同心之言如蘭桂之馨聲相應氣相求急難相救助如林桂叢蘭之相蒸潤足以照映一時而流芳百世然則揭曰叢桂又奚若僉曰唯命於是乎掇前賢觀物之餘議感叔世天倫之衰薄紀蓋氏賢父子之實迹而為之書董氏遐觀亭記去藁城西北三分舎之二村曰大張沃野平豁稼肥木茂聚落如畫居民熙熙仰恒山于雲端來滹水于天際郎中董公彥才别墅在焉築亭水湄徵名友人胡某扁之曰遐觀因求立名之義曰何謂也曰此吾友顧瞻之間胷中之至樂因名以形容之奚問為是地也當戰國之際而為燕趙之郊中山九門如指諸掌孰勝孰負一得一失及其智力俱困折而入秦秦不能有復歸諸漢漢于恒山為王國為名郡犬牙相制小大不常陵夷至于魏晉朝漢而暮趙晨燕而夕秦暫一于隋而又為唐所有安史一亂而藩鎭以終五季之末巖然而城淵然而隍變為遼宋之疆場再變而為金元氏之中土甫百年而今為我朝之郡邑上下三千年之事歴歴在目前人陳迹煙飛雲散城郭山川按圖可攷長空鳥沒消沉萬古登兹亭也豈非遐觀天地古今之變歟自吾友爲鄉之奇童子以迄于今為名卿為材大夫歲未五十周前日某氏之第而今為某氏之園嚮也某氏之圃而今某氏之阡登兹亭也豈非遐觀百年盛衰鄉邑閭井及吾一身之變歟春萌夏葩秋實冬荄蠶月條桑剥棗納禾入此室處曰為改歲兹非遐觀農事氏勞四時之變歟亭臯之下通道京師車馬絡繹南去北來增職拜命忻忻以趨貶竄降逐慘慘而還兹非遐觀仕途得喪之變歟外觀物變之無窮内觀此身之可驚景觸于目理契于心視窮達為一致閱古今如旦暮當其闤闠喧闐人事紛擾躍馬横䇿一臨兹亭負手放目靜觀返視戰紅塵爭白日皇皇汲汲蟻聚羶蠅聚血龍隆昏耋進不知退甜不知恥者為何如哉凡君子處已觀物惟靜也故能見百動之得失惟遠也故能辨百物之紛殊古人所謂已在堂上而能辨堂下之人睫在眼前反不能見此遐觀之義也吾友性靜而識遠故以是言之彥才曰名義昭矣吾心喻矣吾亭之記畢矣問一得三請識諸石籍君玉主簿東軒記前主武安簿君玉籍公中年以來優游鄉里角巾私第築屋于堂左而三楹焉楹為懸軒開豁爽塏去市井不遠而喧閧塵坌不能凂軒下植小花草數本砌外穿井引水圃蔬雖隆冬青潤可愛短垣僅隔雞犬求其所以不崇墉之意當其陽旦陰伏煙収雲斂朝氣清爽主人晨興東坐游目或澗溪而屋或高原而耕雞鳴犬吠煙火籬落相接負城花柳村墟之外日光天際紅翠照映諸峯屏立一重一掩莫能形狀諸峯巍然矗空若青芙蓉峯顚雙浮圖僧宇明滅乎其下峯名紫金迤邐而南如萬馬奔突之狀者不可勝數歲已卯余罷官來歸主人置酒觴詠于軒下酒酣衆賓歡適舉酒見相屬曰吾鄉嘉山水在在如畫然城居者不得見負郭卜宅者多不巧遇萬一巧遇而背山起樓者十常八九籍君此區結廬人境而坐享山林丘壑之供又能閒適笑傲與佳客共之子能無一言以誌之余應之曰紀事責實而立名欲清衆美畢具而一辭不能罄使聞之者企慕而欲一來見之者坐賞終日而不忍去然則扁曰東軒因以為主人之號異時與東山東野東里東臯子同得名于後世未必不自此軒始皆曰可請為之書楊子忠潛齋記洛陽隱士楊庸子忠先生以德以學特詔起為孔林敎官先聖羣孫顏孟諸孫問道講經於席下先生發明聖學躬行聖道盡革近代章句文詞之弊學者亦洗心易慮薰沐漸摩童子冠者各知學之小大道之本末復洙泗之正亦不復有權謀功利之念歲月既久告老還鄉井結廬於洛南名其齋曰潛凡敬慕先生者怪而問之曰潛之為言在易在詩其義昭昭先生之盛德升聞大名滿天下江湖流而日星垂雖欲潛得乎先生曰非是之謂也吾欲潛心於聖學者也難者又曰先生之謙退不足不知老之將至則可若夫先生之於學自總角而至於今七十年矣無書不讀必探其原無義不究必洞乎底炫爛乎春華成結乎秋實目擊道存聲入心通無事於潜紫山野老聞而嘆曰學者之知先生先生之自處兩盡其美然睿聖武公作抑之詩於年九十有五聖賢之於學死而後已天斯須而不行則不天地斯須而不生則不地修已以安百姓堯舜其猶病諸德不修學不講孔子以為憂韋編三絶尚有假我數年卒以學易之嘆先生可為斯世之師也歟剽竊涉獵欺世盜名聞先生之言過先生之齋必將有所興起有所慚愧而自失焉者毋以先生之言為過自抑畏夫人才有自足之心則不進而日退曾子易簀曰啓予足啓予手吾今而後知免夫故前賢乃有蓋棺事乃定之說行百里者半九十里之喻吾將以先生為法先生以書來求言敢以鄙辭復泗水縣重建廟學記天下之治亂係乎人材之賢不肖人材之賢不肖係乎學校之廢興學校之廢興内則係乎京尹外則係乎守令故曰守令賢則主德宣子游之治武城使君子小人皆知學故君子知愛人小人則從化而易使在位者愛民市井田畝雍煕而從化非太平而何太平則天地位萬物育所以植遺腹朝委裘而天下不亂然則學校之所係豈細事歟中統建元遐荒異域奉表上章皆成文理朝廷始重儒學列位雜以儒者荒域小邑皆立孔子廟興舉學校尊師重道人材輩出泗水縣去曲阜不兩舎洙泗遺風人易從化廟學荒廢至元癸未縣令李某前令喬某同心協力即其故基剪荆棘拾瓦礫聖宇講堂前後具備邑人僉曰二賢宰化民成俗之意不可不刻石以書其美憲司提舉學校故來徵言不敢以不敏辭因勗之曰經不云乎雖有嘉肴不食不知其味也雖有至道不學不知其旨也學既立矣主善者可無人焉鄉人子弟之俊秀者惡可使之止於胥史而已耶即今内外要職之人材半出於東原府學之生徒豈非明效大驗歟某曰唯謹受敎不敢失墜請文諸石亢宗堂記古之立德立功非仁無為非禮無行一於修身而無愧一以冀子孫之賢明為子孫者能以父母之心為心其於繼志述事宜如何哉不能立身行道光顯祖考𢎞大門閭自視此身若無所容於天地間是之謂大孝彰德總府知事魏憲作新私第北堂落成聚親友而宴飲酒歡適舉杯來前曰户牖固卑陋門楣名扁以識記以戒誨願先生一言乃書曰亢宗酒數行復為之請曰先生光寵蓬蓽何幸如之不敢以煩瀆逃罪願文其名義書於屋壁朝夕起居以為座銘惟先生可否之余應之曰以足下卓然自立不輕賤其身不辱其親不負前人高門之望又有以光大之既能庇宗又能亢宗故以云雖然古人有言曰興衰慶弔相倚伏足下既能榮其祖宗當思所以成就之不易居仁由義恒以行百里者半九十里警戒無虞德垂後裔不聞圬者王承福之嘆此明名堂之義也某曰謹受敎某年月日書韓氏遵誨堂記題遵誨之堂者記銘箴贊序說詩什盡文體之變韓氏賢父子昆仲之言行嘉美者揚譽具備舉陳言往行惡為戒善為法比類發興横竪立說周折詳盡至於辭藻之情實華麗簡潔豐贍奇澁平易疊見層出可以光史䇿而寶家藏者無一不有殿衆美而為言者不以艱哉修前轍則贅出新意則鑿不贅不鑿請為諸作者之辯大率諸人稱韓氏之孝循文解字致辭於遵之一言夫依循奉行之謂遵父母之命依循奉行謹勅之士皆能之又舉不孝之惡行以證明之何期韓氏昆仲之淺也不孝之惡行尚忍言之哉孟子稱虞舜曾子之孝何嘗舉凶人以為諭也通甫昆仲謙以自牧以行顧言名堂以遵誨可謂取名也廉矣視彼以孝自負大書門楣曰榮親曰萊衣者為何如哉孟子曰舜由仁義行非行仁義也父母之垂訓也其辭有限而人子之行已所遇之時所處之地萬變而無窮有是訓則遵之無是言則恣我而為之朝守暮畔一是一非吾觀韓氏昆仲之履踐不若是之區區也平城府君吾不得而見之矣通甫君美行平城君之遺體性情氣質如以燈傳燈不誨而同不遵而行奚必以是而為多哉二賢知孝之時中離之而不為畔合之而不為守知孝之權在虞舜則為虞舜之孝在曾子則為曾子之孝在我則有我當為之孝然則名堂之義豈非思親自謙之一誡辭耶所以為諸公之辯者若是未卜諸公洎二賢之心又以為何如也不然古人事親之陳迹經傳孝弟之緒言二賢飽聞而熟見之又何待我輩之復舉鄭千户棣花堂記甚矣風俗世變之移人斲喪其良知良能之善性而不知愧悔也孩提之童莫不敬其兄愛其弟此不學而知不習而能者也僕自改職户曹天下詞訟郡縣不能剖决者聚至乎部因以聽斷而觀四方之風大抵析家貲而昆仲相怨仇相詆訾辱及其先世而不可道者十居八九諸侯之家為尤甚更甚者父母俱無恙昆季求析居父母不以為怪六親不以為非守土有司不以為罪抵官健訟連月蔓歲達部及省公斷弗服必至唐突而後已吁於斯時也不為風俗移而能怡怡同處者良可尚已元州鄭氏在本土為巨族我朝革命元帥公諱某者以雄武起鄉里歸命後鄉民賴以全活者不勝計以功以德子孫得世其爵元帥公生子某某今為某官某官小大骨肉凡數百口同居四世中外無間言侍衞親軍千戸職當扈從起第於京師思其同氣各以從仕而不能相合名其堂曰棣花蓋其友愛之篤懼其跡逺而情疎歲久而或忘庶幾起居坐卧見其參前而隨於後也使手足間之敬愛日厚沒身而不衰焉是以鄭氏篤行純至上達宸聰時人榮之千户之友侍衞萬户府從事王某晉卿同僕來登是堂謂僕曰交友之義惡則諫止之遷改之善則贊成之揚譽之惡弗能諫善弗能揚奚以友為子何惜數語不以識之使起堂之意不揚且無以遺訓後人僕應之曰聖人人倫之至也堯舜之道孝弟而已矣傳曰事兄悌故順可移於長又曰孝弟之至通於神明光於四海無所不通鄭氏慶門賢昆季都元帥為國死事友愛復如是宜其虎符恩諭登壇典郡一門十餘人子孫繁衍𢎞彰祖業實旣立矣何以文為雖然古人謂靡不有初鮮克有終又於几杖盤盂皆有銘恐其為善之志有時而或替也堂之有記因以自警惡得而廢之哉誠能以聖賢友愛之行日注乎心見於行事世變風移之惡不接乎耳目以鄭之先世家法餘澤傳及其身及其子孫及其無窮世世守之而不變化鄉邑而及天下通神明而光四海安知不自此堂始主人起謝曰記文已竟請刻諸石而銘諸心焉
