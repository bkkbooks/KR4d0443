body:
  text: 紫山大全集巻五元胡祇遹撰五言律詩寄李參政屢辱哀憐語情親意有餘但知深刻骨非敢吝裁書委順仍何怨奔趨誓不居愧非鵰鶚翼風力費吹嘘自憐疎且戅與世每差池敢起連茹念空勞薦鶚辭材凡慚禄厚德薄稱官卑碌碌隨人後衰髯盡欲絲三載陪清論論愚復訂頑雲泥隔霄壤胷臆塞茅菅寒阻涂陽雁塵昏薊北山憑髙一舒眺望眼不能還定交十稔久省幕二年同從政多迷路推誠賴發䝉蘭蓀正輝映萍梗忽西東此别何多感心交不易逢四海皆交友心期定孰親佞柔恒接踵直諒杳無人勢利偶相合戈矛暗自新從兹送君去此道向誰陳郎中辭省幕大尹拜河中渡晚鐵牛壯樓無鸛鵲雄士封猶晉鄙民俗挾秦風表裏河山地雍容見詔功世禄名家後千門不一存箕裘那復繼豺虎共趨奔奮袂塵囂外持身道義尊漢朝楊太尉千載有賢孫送客都門道傷離不忍歌無端成逺别更覺愴春和匪我私心重憐君正氣多從今清苦影獨立障狂波府尹固當選朝官豈易求苟循銓調法翻失重輕憂去去知民瘼寥寥乏廟謀却教刀筆吏啟沃賛皇猷我豈兒孫淚已别復牽衣重為朝廷惜還傷徒侣稀勁强工媚合瘦軟學依違所感良由此行軒去似飛寄李參政并序時禁廢絶書呈負罪負罪然傾嚮思見之情與夫鬱抑欲訴之懐不得施於語言文字日増愧悶伻來敬審鈞履安佳且辱念問索鄙言感慰何極不肖平日凡作俚語以其自滿意得紙起草過則隨手棄去無復紀録尚何足記憶實無以奉君命感念閣下過愛之厚得鄙詩七章奉為違逺三年千里一粲過愛何懃厚伻來索鄙言書呈慙闊畧問念到寒暄公退衡門晩旬休人事繁庸駑脱塵鞅無力逞騰騫叨從地官列承接有餘歡鵬鷃分飛後雲泥㑹合難非才宜速謗違衆豈容安㑹有登龍日清燈語夜闌名位非難得風期恨寡同交情誠欵宻官事付雍容社促南飛燕霜催北去鴻如何巧相避相背不相從時事無堪説羈懐欲訴難不才勞憶問鈞履喜平安誠意如金石情言出肺肝人回無報祝為國老加餐日月嗟逾邁西風又再秋鴈横寒水磧人倚夕陽樓塵坌埋佳况河山阻勝逰傳聞好賓主雅集日相酬四海經綸手胡為宰一方帝心良有在物議不須忙蕭相初當國曹參未治裝終當復台鼎談笑濟時康著述慙先廢勲功竟不前持身誰見信顧影自空憐華髪老逾壯苦心窮益堅辱䝉時寄問千里慰凄然慶李侍郎母七十壽并序天地人通為一氣順之則吉而莫徵於孝感冠百行基萬善充之則可以為堯舜而德莫大於孝禮部侍郎真定李侯敬甫事太夫人以孝聞至元辛巳慈闈夀七十視明聽聰福履康强自翰林臺閣京師賢大夫外及諸郡一時名筆鉅公咸作歌詩以慶不肖與敬甫三十年之交以逺處側陋既不獲升堂拜賀而能無一言謹同彰德諸儒士攄誠吐辭别為一軸仰祝千嵗以申嘏頌之意云爾武安胡某頓首再拜貴賤誰無母慈賢貴一時德馨浮鼎食夀域啟庭闈九族傳家範諸姑慕壺儀宜能服羣彦逺近送歌詩慈孝天垂報萱春七秩開夀盃承桂玉子執萃賢才市飯嗟陶母斑衣笑老萊至誠能錫類相戒詠南陔富貴誠難得多貽父母憂守身無愧怍養志樂優游意廣常丹頰眉龎尚黒頭滿庭和氣裏日月為遲留甲剪金猊暖銀臺蠟炬紅歡聲動閭里瑞靄上簾櫳先志求多喜承顔恐失𠂻一盃千嵗酒此樂更何窮仙李蟠根大孫枝慶有餘稱觴堂下拜神錫掌中珠敬甫四十七無子太夫人明日慶七旬夜得孫孝感來竒福史官當特書十年開八秩鴈鴈㸔懸弧捧檄情何切陳情志亦髙前人固麟鳳獨我豈蓬蒿頃刻違甘㫖中心積鬱陶慈顔常悦豫萬事等秋毫髙年何最喜七十得飴孫既足延遐算終當大慶門錦䙀珠絡慶慈語喜顔温人子除兹樂浮雲何足論春滿百花堂人知孝義坊途歌知詠德里語解成章薄俗皆歸厚詩人發興長佳名等滹水千古並汪洋老我無詩思因君重起予堪歌德如玉恨不唾成珠禮闕升堂拜情隨贊美舒何年旌宅里疏請在宏儒趙慱州九十壽忽忽浮生裏誰能九十身風雲惟有夢部曲總無人麟閣圖形舊農書到手頻翛然坐終日萬象與同春壽姚相六載持鈞轄經綸百慮新退公恒過午假寐欠方晨眷注尊耆德諮諏屬老臣年年黄閣外長見駐朱輪蕭爽江湖質忠貞社稷臣一言能及物萬象暖囬春宋璟文逾媚曹參酒更醇太平勲業盛嵗嵗賀兹晨異政疑難决須公出片言問牛能及馬見委巳知源量雅能持重才雄不厭繁誰知清鏡雪黽勉為宸恩廣平巨族劉彦深三弟曰彦平彦元彦清事母孝至元壬午夀八十自府主以次皆作歌詩以慶武安在廣平為屬縣有此盛事鄙懐不勝歡忭謹作五言四韻并序數語以冠其端大孝天垂報萱堂八十春笑談追往事步履恥隨人四子華筵盛羣英慶語新髙門何最喜賢母出忠臣上司馬父八十夀誰人無夀席兹席冠清時尊斚京師酒絃歌翰苑詩孝心榮樂養丹頰拜顔慈坐閲三槐影晴雲百畝垂閲世日云幾六龍三萬周無儔思往事燕處憶前修益壯推耆德通尊埒素侯守神能獨立嵗月任遲留養老明時事逢時有幾人入朝容把杖賜膳得常珍右學尊殊位深衣穏稱身竚㸔行是典何計謝蒲輪髙年時亦有晩景少康强聰聽聲傳谷司明漆㸃光花時能散步月夜喜持觴福履何勞卜前途萬里長純孝心何在多端務悦親平居恒上夀况復值兹晨厚列千壺酒思招萬里賓喜隨名筆後例作上詩人閲徧人間世虚心保歲年掛冠連棄譜掩巻坐忘筌酒勸髙晨起茶醒過午眠怡然天爵貴不作渭濱畋怪與常人異由來間氣生年齡入髙邁神識愈清明安處中和奥那知寵辱驚生飴甘㫖奉几杖瑞升平慶門論第一王父福何完三嗣朱聨紫羣孫玉映蘭天倫叢順德庭宇足真歡綿算隨心思汪洋萬里寛鄉飲誰多豆先生五福尊有方留白日無夢上青雲謙抑將迎㨗雍容笑語温憶常圖畫見龜鶴繞鑪薰内稟鍾仁靜靈臺夀域䦕本基先自異寒暑不能催執友邀黄髪斑衣進老萊閒情舒孝養甲子㸔重迴寄耿壽之每每思交友時時屢上心俊才熊虎受衰鬢雪霜侵烜赫馳聲逺經綸蓄思深朝賢如有問腰沈不勝金寄李敬甫劉漢卿陳取新厯厯思羣彦才如照夜珠走盤光不定鑑物燭難逾碧海三秋翼青雲萬里途故人汾水上白髪一癯儒寄樂用之别後常相憶秋風又䬃然人來三致問歲半兩榮遷共望山公啓羣推文舉賢只今世契分禮合重同年寄子初拜狀慙疎闊懐思未少忘既能同好尚寧有異行藏老喜心懐靜閒知日月長氣和消百疾此藥最為良寄韓通甫君美昆仲暨禹卿參卿僻處西南逺音書久不通去春傷作别今歲又將終矯矯皇都彦栖栖白髪翁東郊復南陌杖履幾時同别離驚冄歲一日未嘗忘毎每將情達匆匆以事妨簡書防抵律韻語不成章千里幽并月流光共一觴事塵埋猥賤展轉憶髙人家在京師裏身如江海濱幽園隨意廣佳酒逐時新猶有塵縁在時汙席上珍寄子勉儒術餙吏事精粗不相妨却笑料生拙翻為案牘忙豈知抛土苴巳足致平康坐使刑名子喧闐政事堂寄贈耿壽之從韓廣道之索也傾蓋猶如故同朝十載餘邇來聞福履重喜拜佳除庶類勞經濟通才㸔巻舒去人韓廣道幕客李尚書幕客一作倒屐寄髙聖舉劉漢卿外補求清簡那知益賤繁省評甘指嗾部介亦趨奔百務如星火千憂入夢魂塵顔將俗狀卑辱不堪論寄王經界彦才齒髪臨衰境參商又七年思君常耿耿念我計懸懸老覺親朋寡閒驚歲月遷從今相慰意莫厭尺書傳寄齊彦俸止凡四月囊空無一錢清霜寒似水老屋夜如年卧睡翻書册迎暄坐馬韉何時辱相過一粲賦蕭然趙氏冰凝雙井茶香新出羣品題來名亦清玉纎兮鳳餅檀頰襲蘭英幽潔澄詩律髙嚴挫酒兵席中相對語佳思愈難名咽臆厭膏粱何人薦此香玉池方潤溢心思已清涼句嚼澄江練懐忘飽睡鄉野哉盧老子七碗攪枯腸慶楊飛卿母八十母賢兒立業兒孝母長年有感那無應相成定不偏三千難擅美百行孰爭先一代題詩什名應萬古傳夢巖祖母八十苦節幹夫蠱慈顔備母儀行無纎芥愧夀合百年期鳳啄爐煙細萱堦晝晷遲清歡那有極庭樹亦熙熙純孝傳家逺髙年夀北堂拜斟瓊液滑起舞綵衣香醉頰蒸霞潤雙瞳㸃漆光異時旌善詔㸔走繡衣郎厚福人多備誰如孝養榮簮纓連綺席蘭玉照堦庭徹請曽參酒恩分頴叔羮無煩歌上夀剰有八千齡景邵還家作詩以送道過平陽有懐總管烏侯故篇終及焉綘帳傳經久慈闈入夢頻誨人誠可樂愛日更情親才藻千夫俊聲華四海新軒車過平水定作李膺賓至元五年春始平御史臺起宣慰張公於鎮公援引舊典條示同列以老得告還家諸公作詩以餞之臺閣推元老何人右我公行藏隨用舍持守見剛中晩節尤堪惜前途坦不窮太平方立法珍從㸔兼隆寄陳君詳經厯一别歲三換相望路五千君思漢風土我憶蜀山川料敵生竒計論功惜壯年遥知刁斗夜健筆正籌邉歸雲堂出岫非無意還山豈偶然空賫蘇旱志俯就潤身權俗客來無路閒情益自賢杖頭扶不起何害日髙眠寄答衎甫書問識踈懶交情豈少乖久離生逆詐過愛反多猜我巳無官况君應厭旅懐何時故鄉月携手共徘徊世契情親定那因貴賤移平生愛君厚此意只天知薦士非無語連茹正爾思詩來再三讀千里一吁嘘陶鑄權誰執區區亦備員淟顔隨衆後負責在人先秩以苞苴進人因口舌賢無窮惆悵事一簡不能傳造請違時好孤髙不自伸固宜招謗訕反累及交親飄泊猶千里淹留已十春還家近慰意妻子愈能貧答子勉半生不家食無物擾剛腸冉冉踰中歲時時念故鄉氣衰多感慨才拙懶飛揚却羨農家夕團圞語話長羈懐何處冩時上仲宣樓落日千山碧長江萬里流煙波迷去鳥天際得歸舟欲詠登樓日翻成一笑休君衣還鄉錦余歌謫楚詞流年如逝水握手定何時舉白千鍾酒難青雨鬢絲長江寫孤憤滚滚得新詩誰憐異方客一紙故人書懃懇㸔還讀情親巻復舒有時重把翫孤悶暫消除霜雁來何晚無由問起居南遷二千里風土異吾鄉十月猶蚊蚋三飡盡桂薑河魚能洞泄瘧鬼擅炎涼所行無兹苦勝於却老方得衎甫書因以寄復一别再踰年音聲堕杳然書來䝉眷眷心喜失懸懸事業紅塵裏情懐白髪邉何時洹水上杖屨兩蹁躚魚鴈音何闊參商路愈賖百年能幾别千里動長嗟月滿羈懐共山髙望眼遮所同惟直道勢利不能斜寒歲縁何物驅人復此來胷懐固冰雪顔狀足塵埃好友恒相逺歡悰不可開得書置衣袖字字若瓊瑰河東風土勁厯下意幽居花栁春常早江山畫不如荷心薦佳酒泉眼出新魚著白兩髙士無嫌下澤車仲山衎甫二良友竒才髙節一沉下僚一隠於市故篇中及焉客懐正蕭索風送古人書翹渇誠多慰寒暄愧久疎異方嗟老矣寡友念歸歟富貴何時是先人有敝廬衎甫書中有不能勇退之語甚有愜於余心者答周正平郎中韻一别忽踰歲時思得好音新詩將厚意隻字抵千金不作南陽卧慙為梁父吟京華塵土夢更比向來深憶昔承先訓於今耳受音勿為三獻玉慎畏四知金異俗嗟随俗長吟復短吟一官蠅驥尾念慮一何深清唱誰人和行歌自賞音居官良有愧遺後喜無金已失邯鄲步難從澤畔吟異時公議底謗責與天深題解州官廨清安堂壁到今將七紀吾祖此分符細問當時事猶存舊僕夫止存一走卒姓裴名寳年八十三矣故基承踐履老樹記傳呼瞻仰生悲感神逰㑹此都課家僮織席簟簀雖㣲物安身用最親乗霜得秋葦變法起新紋斜側初無謂端方卒有倫賈生千載遇前問夜將分象床誠穏宻托體藉湘筠人字憎麤俗波紋促細粼温涼宜熟寐瑩滑淨無塵所恨清霜重乗時讓錦茵縷組湘江竹含風八尺漪紗幃輕穏稱玉枕淨相宜固適炎蒸用毋為晝寢迷清涼無俗夢夜氣有箴規再拜丹書訓深嚴著席銘安舒恒業業反側亦兢兢放弛非遐福恭莊得永寧臨終猶易簀百世可師曽孫子笻杖笻杖非尤物詩人喜孝心扶持良有感衰謝莫相侵坐奉慈顔順行隨愛敬深更㸔承福履玉樹照瓊林送行人三百餘年宋長江一葦航不知何境域更敢恃金湯威烈雷霆震仁明日月光安南吾内附使節愈皇皇送韓寳之更業行儒術何人識此心方膺七品授亷苦十年深我恨塵理玉誰持石試金莫辭山縣小判府有佳音韓子來辭别裁詩問起居吏風差異否民俗復何如不恨才無術翻愁智有餘好將彈擊手摩撫㸔舒徐送韓茂卿昔汝從余學於今入仕途寧為清節吏毋作小人儒細逕雖云㨗通衢本不迂我言誠繆拙榮貴保無虞題髙唐李侯詩巻佐命開基勇除殘去暴仁安榮三世將夀考百年身屈指排耆德如公有幾人䍐幵毋小便長䇿應時新贈答鄧州劉教授和鄉先輩先生慎取友所友必端人細數鈞臺舊唯瞻下榻賓再三䝉手誨欵曲荷情親儻遂趨承問甘從夜達辰父執幾人在先生是故交論心惟有鮑聨句每同郊夢破邯鄲黍枝分月夜巢何時從杖履吟詠㸔推敲聖言仁者夀八十慶髙年飲酒能終席歌詩動數篇借居文廟屋不種郭西田和氣春風裏行窩任醉眠先君康健日軒蓋忽來過亂後相逢少燈前語舊多篇章成錦織論義發天和隅立青衿子於今雙鬢皤有子傳身了無官處世輕數杯消永日四海仰髙名應物聊隨俗成章為寫情惜無龎處士有酒可同傾題醉經堂名教廢已久異端千萬途淫辭溺浩蕩正路日荒蕪既以涇為濁寧分紫亂朱有人能獨立閉戸閲詩書流憩園耘軒坐來久幽念到荒園信手拈斑杖呼童啓棘門收除松落子檢㸃竹生孫只欠陶元亮閒情與細論流憩園中樂無人解起予甘飡勝食肉徐步當乗車不起彈冠念何妨與世疎家童知興倦歸路且籃輿人生適意爾勇退脱官囚明月九霄鶴清江萬里鷗何勞求飲啄正欲任沉浮笑我黄塵裏棲棲向白頭退食自警居閒嗟弊政官守可忘心惡草不剪去嘉禾安得深察情三獻玉律巳四知金千載絃歌政無人繼絶音學優方入仕俯愧少知書臨事羞才困通方覺智迂一誠吾自守百詭彼何如敢薄淮陽守吁嗟霜白鬚送柴尚書雲南開府三首海外來威德王封拜寵光何人堪䕶送公議得忠良使節風雷迅皇恩雨露凉從今不毛地三萬里農桑煌煌都䕶府安定海南夷寛猛存吾法忠勤任俗宜農商皆皥皥雞犬亦熙熙聖鑑明於日毋言莫我知炎方幾萬里軒蓋幾來迴海若驚忠節江神識俊材竒勲能獨立大閫欲誰開竹帛垂名了人生亦快哉投宿洪贊父母懸弧慶生兒願四方豈期無逺到浪走只空忙僕厭私裝重馬疲官路長慷投曽宿驛白首尚為郎宿鵰窠道旅喜相迎胡為復此行壯心今遂否華髪可憐生欲答還無語含羞自愴情本非經濟術難望貴公卿送人之官常令材勝職仕業日増光王業豳詩苦民時農事忙戸儲三歲粟家植萬株桑何必居台鼎甘招謗議傷農人彫瘵久邑宰實非材念念宸心切皇皇賢路開姦贓無地入雨露自天回去去推恩澤昭蘇及草萊牧民如種樹摩撫不須繁獄市能無擾柴荆已自安桑麻深雨露雞犬散田園它日桐鄉廟豐碑定細刋趙氏東臯八題匏𤓰亭趙氏園池裏兹亭太出竒尊罍厭金玉匏瓠作巵匜阮籍紫椰榼淵明白接䍦誰能呼一起同與醉淋漓宿無極縣土壤瀕瀛海風煙自一方氣交才處暑夜寂便生涼老水易蒸雨積隂常勝陽妖蝗奪農力晩稼半成荒幽青衝要地荒寂似邉城廬舍渾無幾丘墟葺未平屠沽常廢市雞犬僅聞聲縣廨尤蕭索空庭草滿生周錫齊桓履兹城乃壯疆邑名仍宿昔封吏幾更張地接天光逈風傳海氣涼因髙求故跡瓦礫照殘陽過陽信縣荆榛雜桑柘塊爾一荒城市井増新屋田疇起廢耕北兵知畏法南畝始聊生似喜貧無擾熙熙里巷情再過居庸滚滚隨行旅遑遑愧此身無名垂竹帛有足走風塵路省青山舊人傷白髪新迴頭望南土又賞故園春再過居庸口悠悠今十年歲華何迅速官業却迍邅關吏幾經換山家亦變遷惟餘嵓下水隨馬響涓涓失題案原本係無題但詩内稱忠宣謚法不得謂之無題無他本可校姑以失題系之以俟考謹識佐命惟勲舊忠清三十年赤心思報國白髪要寧邉夢破烏江月神迷瘴海煙忠宣拜嘉謚未讓伏波賢得死公無恨思賢民自哀方期當柱石奚想便泉臺廟貌祭如在銘旌哭逺來從今調鼎手誰繼作鹽梅留别趙講師擾擾黄冠底飄飄獨此身絶飡煙火食終帯海山雲愛我同鄉舊乗風入市塵仙凡嗟異路携手又輕分學貫天人際同塵誦老莊我知心志逺人喜舌鋒剛兩袖飄仙馭雙瞳隠電光中條山色裏誰識吕純陽相見鄉情重相逢數日留丹砂元有術白髪莫盈頭未遂歸休計難同汗漫逰何時兩茅屋髙卧白雲秋久聞隰吉路今日細經過危徑盤蚯蚓層田疊抱螺縱横千尺澗上下百尋坡㣲雨成泥滑行人奈若何寄子勉憲府雖云久門深蔓草荒簷前喧鳥雀墻外走豺貇百怪羣妖集千鈞我弩强勝殘何日是亦復可憐傷下馬鞍未解寃民如堵墻訟更十守令文積百筐箱逗遛行移宻紛紜論議長我來片言决喜劇淚沾裳衰世已多感重重憂患深凄迷異鄉夢騷屑故園心弊久姦尤宻才疎力不任願揮宗匠手垂教示佳音寄伯宣尚書霍家書畫後每每見新詩展玩同良語吟哦慰逺思慕君心似玉嗟我髪如絲健筆多佳作求聞絶妙詞近聞薦賢狀羣彦悉無遺心廣非私愛人皆舉所知楩楠支大厦麟鳳瑞明時勿為賢臣頌無人後措辭寄李受益應奉溪堂分袂後轉首十三年動靜時知悉從㳺久隔懸髙軒才去暑倦客復離燕社燕秋鴻恨相望重惘然玉堂膺妙選人恨十年遲四海知名早中年得位卑升騰多援引沈滯乏階資自有連城價端凝是所宜寄子裕府尹一别忽踰歲思君未少忘浪分萍梗散路隔海山長蹤跡頗相似情懐亦可量不堪塵芥裏迎送日奔忙杜榮季北行詩寄侍御飛卿身為明時起人誰無此情豈徒要富貴政欲樹勲名閒竟開東閣爭先識賈生翩翩杜才子好謁漢公卿應步知事求詩清議清聲久皇恩禁網寛姦邪恃容養掊克肆貪殘蹇諤忘生死忠貞出肺肝從今豺虎輩凛凛膽常寒東臯倚郭多農里東臯逈不凡池臺面塲圃花木作籬藩雞犬知迎客軒車屢擁門㑹㸔城市井易號管寧村送柴尚書輩西南行萬里西南道諸夷望撫劘賢王開幕府多士助春和農里行還業邉兵坐倚戈從今炎海水風軟不興波寄郭都運員從善一别五年久相逢未有涯豪英才益展衰朽鬢空華富國甘勞力無心為起家附書心計士鼓枻望仙槎有感貴賤雖殊體勞生共一塗紛紛强暴弱擾擾知欺愚徼福誰當禍無乗豈有除白頭州郡職轉欲賦歸歟幸齋詩屋漏元無愧胡為此幸名百年閒日月一芥貴公卿新酒東菑黍香羮北圃菁南軒一寄傲此樂有誰爭游受卿北上詩寄賢姪杜孝先臺郎南北人如織時時得好音亨衢才俊偉老我日侵尋莫改冰霜操常堅玉雪心丈夫期逺到富貴豈能滛耘軒詩僮僕知人意來耘窓外禾芟夷除冗長培植㸔婆娑晩練煙光潤晨珠露氣和公倉及私廪露積反愁多濟寧涖任後即事老不任繁劇荒城愜所宜民淳詞訟少路僻送迎稀恩澤租庸減農桑風雨時心餘靜無事日夕掩柴扉有感辭賤來逰宦遑遑已十年為郎今白首潤屋只青氊戾契誠何敢依違甚可憐揚揚車蓋裏趨走避時賢過龍門不斷龍門豁滔滔一水來只能流歲月不解絶塵埃行客身奔走長途幾徃逥倚歌橋下柱富貴豈凡材夜雨并序荆南每苦秋雨徹數日不止至元十五年雨暘時若秋九月十二日夜雨十三日雨一晝夜而止十四日天宇晴霽氣清日明行旅農人不勝慶幸得五言八句余生亦多幸所向值豐年百榖成時雨平疇少廢田市聲傳萬口斗米欲三錢來歲仍無慮通宵喜不眠客燕十年客太原三年粟麥如糞土今歲湧貴十倍故篇首及焉曹南冬至今日陽生節羣隂自此消晝光行曵曵夜漏莫迢迢卦畫名來復黄鍾樂舞韶老年安化國白髪任蕭蕭夜雨有感衰年少眠睡秋雨滴寒更淅淅林梢響泠泠簷溜聲青燈靜相照白鬢豈重生念念還桑梓今宵故里情至元十五年江陵重九荆南兩重九猶未見歸期有恨詩難寫無歡盃倦持遥憐故園菊開徹水東籬却恨江城鴈無書謾送悲寄吏部侍郎夾谷士常銓調無多法惟慿信與公儻皆從請託未免屢西東降黜因虚榜褒升匪實功傳聞山吏部一啓服羣雄宿濟陽縣廨亂餘公廨廢獨此頗安全㕔壁仍存記庭槐似有年河壖成市井城腹少人煙共為求鹽利移家就旅船寄彦良都事舉刺無恩怨惟君意最公豸冠重倚柱臺栢凛生風白日妖氛靜青雲賢路通更當思報國洗眼薦才雄省幕秋雨雨脚懸麻黑簷流注瓦喧端居蘭幕靜少逺市聲繁髙稼知豐歲幽荒憶故園自憐林野質無計謝華軒總管國祥秩滿北上歲月急飛矢一瞬又三年衝要襍繁劇崇髙待俊賢加飡心益壯臨政目能前老病交情重臨風惜别筵五言排律送信縣令樂平任滿東還縣尹誠卑職煩勞責最先條條論國政一一自民編秋斂徵輸税春耕勸力田張燈昏理訟應限夜催錢但恐成逋欠安能問瘠捐頑嚚哀健訟水旱慮凶年賜半恩慈溥蠲征雨露偏府人同震電州介若鷹鸇星火憂違命衾幃未省眠愛民誠慘怛守職更愁煎貧窶衣鶉結逃亡室罄懸搒笞心不忍勸諭語空憐黽勉飢寒下銷磨戰伐前蠒絲蠶不箔商課竈無煙墻外無餘地生平僅一㕓有腸攻苦淡無夢到葷羶壯健他鄉外惸孤若箇邉婦嫠何寄倚叟獨更顛連身隻名猶在家亡賦尚全力疲催種植體廢被干鋋不疾長三嘆無尤帶百愆千憂恒積慮萬事一呼天坐視羣黎苦慙持百里權去思那有頌遺愛若為篇賴有桐鄉令依稀似昔賢憲臺傳㫖召河東山西道提刑按察使劉侯還朝同列諸公作詩張宴祖道武安胡某作詩以為諸公倡時政將多問宸衷憶舊臣天威顔咫尺風節照臣隣分豈同新進言當及大鈞從容論急務迤邐到疲民北顧金山表南封瘴海垠初平慎懐撫未附細經綸久兵能少息四海不全貧地闊仁和國風清戰伐塵聖賢千載合文軌八荒均法盡無刋美人逢不世辰禹湯難並武堯舜亦推仁有類皆從願無生不獲伸雍雍三善樂穆穆四門賓臺諫得何舌謀猷不妄陳廟蒸怡聖祖郊祀格天神百榖穰風雨羣祥集鳳麟兹行期致此肯作備員人
