body:
  text: 紫山大全集卷九元胡祇遹撰記翰林院廳壁記文辭之功亦大矣賢哲之君重之而不輕急之而不緩豈徒然哉堯舜之盛德大業固可以澤當世而福後人然一傳而得朱均不惟身墜家聲而紀述傳詠之辭口亦不能道向無二典三謨千百世而下泯泯焉其孰知之窮天地亘萬世使人得見唐虞之美巍然煥然如白日之在青天五篇之書之力焉下至禹湯文武成康漢唐之英主紀於書歌於詩録於史册久久而益彰者皆是也兹特身借文辭以得名至於生前因文辭以濟事如訓誥如誓命聳羣聽愜羣望定大業翦大凶者又豈特以飾口舌之虛言哉尉他之負固東西萬餘里萬甲不易服一折簡而臣之奉天之兵威不可制利不可勸一詔而士氣百倍是又可以文辭為無用哉若夫奉咫尺之書傳數寸之檄以代百萬之衆者亦文辭之力也至於太平無事發德音布明令勸善懲惡黼黻皇猷藻飾萬物絲綸一出四海聳聽又不可斯須而廢也竊惟匹夫之治一身萬乘之治九有言行而巳匹夫之賤猶胥顧於針言其發有逸口萬乘之言可不慎歟故伊尹之戒太甲曰俾萬姓咸曰大哉王言君德之聖則言而世為天下則然而秉筆代言之任苟非其人敗事於目前貽笑於萬世豈小小哉故前人謂之出納王命王之喉舌自龍作納言而下代不乏官歷漢至唐盛萃羣賢而以言為任謂之翰林備顧問與參決時人謂之內相我太祖神武混一區宇未遑文治太宗繼體守成大比羣儒粗成文辭者賜一爵復其家定為國典崇文之志於古有光皇帝升祚之某年立翰林院自承旨而至應奉凡若干人自時厥後內則王侯之拜封百官之制誥外則遣使四夷懷柔逺人凡王命言必以文每視草聖聰虛注宸𠂻點竄必辭理兼完而後可彬彬郁郁炳炳琅琅聳扶杖之聽拭思化之因於戲盛哉然而登瀛洲者不可以不紀其創置之始以備異日史策之採擇焉某官某人月日書於院之廳壁國史院廳壁記國有史史有官尚矣周官宗伯之屬太史即其司也老𣆀為柱下史漢武帝置太史令以司馬談為之談死子遷繼之故世號太史公東漢班固除蘭臺令父彪作東漢書因仍循習代代不廢而所司之事亦各不同周禮太史掌建邦之六典以逆邦國之治掌法掌則以逆官府都鄙之治正嵗年以序事頒之於官府須告朔于邦國大祭祀其執事卜曰是蓋主紀録明厯卜故凡邦國計簿及天官厯律典則禮儀皆兼之玉藻云天子動則左史書之言則右史書之漢制天子計書先上太史令副上丞相序事如古春秋兼明天官至於近世則専以紀録為職餘皆不與焉然上自祖考受命之聖神天子之一起居一話言大臣百官之一舉措一應對皆得耳聞而目見退而書於册下及禮樂刑政之美惡遐方異域之服叛列國風俗之疵美天象地質日月星辰風雲之徴變山林川澤水火草木百物之妖祥閭里歡戚之聲容雲林隱逸之奇特與夫忠臣孝子節婦義夫以及弒逆之惡莫不詳悉隱顯原究情偽而備書之不溢美不隱惡核實昭直善足為法惡足為戒藏之金匱祕之石室人主不可得而觀誅姦諛於九原發潛德於冥漠以耀後世而垂無窮此史官之職也秉筆者可不難其人哉嗚呼政有似可緩而必不可緩賢者以為急昧者怠而弗舉史筆之謂歟以禮樂刑政之實而方之以虛文似為可緩以一士大夫之家有系有譜牒有先世遺訓有子孫遵奉可紀之格言成法而况奄有九有受天明命開萬世無疆之洪業聖祖神宗宵衣旰食殊勳盛德巍巍洋洋在人耳目者不可勝録而無一言以紀之此英明賢哲之嗣君所以急之而弗敢失墜也皇帝即祚之某年從翰林承旨王某之奏斷自宸聰勑中書省立國史院仍合翰林院太常寺三而一之一時受職者凡若干某某某竊念記事者史官之職也史院之樹皇帝之孝思我朝之大典不可以不識其嵗月且前代百司廨壁皆有記記其隆替廢置前後職員之名氏因以示警戒之辭噫有其名而無其實君子不可以虛居矧重以詞林之清華太常之禮儀集于厥躬廪餼守官者冝無怠無忽太常博士廳壁記經言禮樂不可斯須去身非禁戒之謂欲去而弗能也首尊而足卑首貴而足賤禮也冠雖敝不以苴履此天理人情之自然也有人於此貴足賤首人皆以為狂且病矣心平氣舒百體融浹五音清和者樂也反是則為悲哀為厲怒為強梗為叱吒非樂也一人之身心禮樂不可去况有國有天下者乎故舜命伯夷典禮而夔典樂成王命六卿宗伯掌禮樂古之聖王之治天下禮樂而巳越禮違和頑嚚抵冒而不可化然後糾以刑政非得巳也殘暴如秦而官置奉常佐以丞屬有太樂此又見禮樂之根於人心而不能巳也漢因秦制景帝更奉常為太常列之九卿而尊大之諸博士皆屬焉博士掌通古今秩比六百石選通經博古者為之貟至數十人出則補守相博士之選不為不精外補也不為不重蕭望之猶以為憂末忘本前人之崇禮樂重儒士槩可見矣歷唐至宋皆樹焉金有中原唯國子學太常寺置博士各二員視漢唐之制亦少衰矣是蓋禮樂之文而禮樂之情禮樂之功用咸無焉皇帝天稟仁孝奉太后以溫敬祀祖考以誠嚴又以比俗朴而寡儀直而少溫即祚某年朝覲會同之儀既巳略舉於是立九廟奠神主太常之禮樂燦然一新牲牢酒醴粢盛菜果潔馨肥腯鼓鐘竽笙磬瑟簨簴調均和平尊罍俎豆罔不具備舞師樂工贊禮引奠奔走奉執之士無一闕陋攝官代禮登降有秩始終嚴肅聖𠂻夷粹神降之福一時供奉百職洎諸執事者禮成而嘆曰宗廟儀音復獲觀聽皇帝孝敬刑於四海雍雍熙熙同享太平何事如之後某年勑宰相立太常寺官畢備仍分𨽻甸民戶四百七十以供祀事有司請議以翰林侍讀學士徐某為司官長少卿則翰林直學士髙某寺丞則翰林待制楊某兼之又設兩博士以應奉翰林文字周砥胡祗遹攝其事博士有印章有廳宇既辱命祗遹輩私自喜愧相與語曰禮樂之為治宗廟之嚴煥天開聖人廢五六十年而復興使四方之人化質直而揖讓易鄙野而雍和報本以歸厚追逺以廣孝聖教皇風不疾而速文職之臣寧可不紀其所自邪且博士之清選逈古今明典禮吾二臣者惡能當之是又不可以無言某年某月日記改府判器識齋記士之致逺先器識而後文藝何謂器襟宇度量是巳故前賢論人曰豁達大度又曰洞若城府又曰汪洋如萬頃陂又曰陳元龍湖海之士推而至其極則包含洪大無不覆載何謂識見微而知著以將然而知巳然以吾之一世而知未來之千萬世推而至其極則容光必照明燭六合故君子不學則巳學必至如是而後可識欲進則必務窮理器欲大則必務容物二者日進區區文藝可不學而能量若斗筲識如面牆雖辨若懸河才能應變不過慱聞強記拾涕唾踵陳迹而巳耳某立讀書之齋於私第求名與言某器識有足尚者余恐其臨下為髙狃于小成請以器識扁齋之楣而大書焉仍以是告西冶記民生日用斯須不可闕者五材也木水火土成不以智力隨取隨得智不足則成不能必力不贍則得之不饒惟五金為然鐡於五金直卑品下切用急須則反居黃白金銅錫之上世無黃白金銅錫則可鐵不可無也故有鐵官以其用廣而利慱也為民者四而後世兵别為五兵鋒鏑函刀為本不堅利雖有虎旅百萬與無兵同農之耘耔植獲一動作一云為器之用鐵十居八九百工居肆以成其事孔子曰工欲善其事必先利其器士與商技業雖不専於器用而身與家人必用者鐵亦處其六七然則鐵之為用豈間緩細微之物歟雖三尺之童能知之我朝右武重農田畝日闢疆土嵗擴鼓冶鑄錬明不可廢某年立銅冶總管府鈐束諸道冶三年而上計戶曹戶曹會貯積之數可抵十二年用不必勞民呈省散冶戶于民廢罷諸道冶洎其總鐵官曽未三年前日所報之數支未十二三諸冶庫藏空竭是蓋總鐵官不為研窮盡實冒從冶官之虛文省部又從而行之故有此弊兵需必不可闕致有銷農器以應造作至元十一年秋復立諸冶太原在諸道為上路見於府西南七舍而近山行六十里舊冶所在唐為某宋為永利監金為大通監陳堯佐宋琪吕誨嘗領其事我朝亦置積有嵗年隨近例偕罷鐵性剛利精堅少加淬礪則無物可敵凡𨽻冶戶千官二員提舉爵五品國之為國惟農與兵鐵於農兵其可無也雖然日中必熭操刀必割勢使然也狃甲兵之利以貪不毛恃其有備而不戒不虞俱非中道我朝兩無是弊治安巳久而不忘兵庫廪充實而立官訓農憂器用不足而復置諸冶地不愛寶貢金九牧大食之刀不足以為利肅慎氏之矢不足以為徑郟氏之鼎不足以為寶惟農富兵強皇威神武而不殺是不可以不識前此冶官首尾三十餘年者交城謝氏父子也屬官千戶鄧某與有力焉具石未文而冶廢因今復興請併其嵗月某年月日某官再拜書江陵府新驛記匹夫環堵之家而舍客有位人迹所通之路必有逆旅主人矧通都大郡使者旁午舍館者不設雖三尺之童亦知其為不可然而廢墜而不舉厄陋而不張汙穢而不治者何也急於私而怠於公耶人能以治家之心治國奉巳之心奉公雖不學無術亦可為良吏至元十一年平宋江陵當西南為衝要公廨帑藏承舊略備惟傳舍為闕守土者急先務而力成之擇地甓垣於萬里樓下堂奧門廡井廄庖廪小大具舉風軒燠室各有攸處當乎火雲赤日流金爍石塵裾汗馬不勝困憊倚拂雲之欄檻向北風而開襟白蘋紅芰之末香飈送涼不覺溽暑之去體及其江濤路逺嵗寒風雪慘膚虐面堅氷在鬚褰簾入戶忩明炕暖不覺四體之回春故去者忘勞而來者如歸作者之慮可謂勤矣夫成者壞之始廢者興之原其物理之必然既成而易壞者惟傳舍為甚蓋過之者衆用之者勤也官物之不惜世人之常情也賢如子産館於晉而猶有毁垣之怒况餘人乎壞毁者不可禦守土者不得久於其職繼踵為政者當隨毁隨葺毋墜前功余喜其落成不可以不識又不可以不戒故書濟南新驛記朝廷之發號施令誕告萬方雲行雨施電掣星馳不旬日而際天所覆罔有不及萬方之稟命朝貢輪蹄絡繹輻輳京師山行水宿飲食車馬盤薄休息所至如家億萬里之逺不知其勞此驛傳舍館不可闕者也聖天子神武仁聖混一六合往古不臣之國書傳地志不載之異域來享來庭濟南總府當南北東西之要衝舍館雜於闤闠市井湫隘卑陋不容軒蓋恆擾及於民家為政者踵訛襲繆因循苟且積七十餘年而莫知改作至元二十一年時和嵗豐家給農隙闔府官吏協議唱贊卜地於歷下亭故基之前背大明湖面諸南山爽塏寬平計畝若干作新驛落成於來嵗孟夏繚以周垣再分為五區區為堂為廡為庖厨為廄庫凡客之所須巨細無一不備有臺榭以居髙明涼炎夏燠祁寒而溫風雪則室密而忩明塗堊丹雘未畢屬縣來觀者摩肩接踵兩閲月而不絶城中士庶室家相慶曰自兹以往髙我門閭開我戶牖完葺我墻屋保全我器皿父母妻子早眠晏起各安其室我賢使君之惠政再世不忘矣憲司揚善糾惡人之有猷有為若巳有之政廢弛而不舉者憲司之罪也亷幹汚慢一視而無褒貶善不能贊成惡不能懲戒唯僥幸免責寧不愧於心乎是役也守土者可謂知先務矣不可不書謹署府僚階銜於左無廢無壞紀嵗月以勸後之為政者焉林州廨公生明堂記牧民之政多術矣求其要則一言而盡曰明而巳凡民之所疾苦我當知之逃亡之屋我當哀之賦役之彼重此輕我當平之田畝之荒蕪我當闢之獄刑之寃滯我當矜而憐之背本逐末徇一時之利我當求其情而慰勉之嵗不凶荒無聊賴而為盜賊我當求其故而拯救之強宗大姓侵害細民兩辭至前我當察其情偽而抑遏之扶持之姦吏之不奉法是其所非非其所是助強挫弱見賄屈理巧訃佞辭把持官府虛文詭案愚弄判筆我當抑之人倫風俗之不美我當教之誨之而身為先之凡是數者見之審處之得其中不明則不能也明固出於學古博而經事多使私心一起則事至物來皆若面墻所謂博學經事皆不得力人不欺巳而自欺人不愚巳而自愚故曰公生明又曰公則一私自萬殊理一也分眩而為萬雖巳之一身手足耳目顛倒錯繆而况治人乎郝林州名其廳曰公生明可謂知本矣格物窮理正心律身可謂至矣妙齡秀發始入仕路而能若是持心以往處州郡則通物情居廟堂則照百姦是非邪正將見逃形匿影之不暇雖然白者易汚剛者易折慎母以皎皎察察為能也余既大書扁榜為主人者復求文以志諸壁敢以是告益都新修廟學記治民之要三庶而富富而教耳休養生息子孫蕃衍昆季強盛戶口滋殖倉有餘粟笥有餘帛優遊卒嵗而不識寒餒之苦愛民如是而不知孝弟忠信驕奢淫佚慢上傲長犯義犯刑無所不至小則正之以法大則臨之以兵必不得巳不勦滅殄絶而亂不能息聖人憂之禮樂教化防於未然此家孰鄉庠遂序國學之不可一日而闕也益都控轄郡縣六七城戶二十餘萬襟海帶山廣逺險固昔人謂之東秦自我朝奄奠中夏開創之始務欲息兵消暴乃即土豪之堀起效順者世官焉大率強猛雄勇以力服人之材故於文德教誨實不足也學校廢而不舉民不知禮義忠孝漸染積習既久遂生璮賊之逆事父孝故忠於君事兄悌故順於長君子有勇而無義為亂小人有勇而無義為盜君子學道則愛人小人學道則易使也豈虛言哉豈無徴哉至元乙酉某人來治是邦觀民設教知所先務廟學為之一新不可不紀石以書其美然而人能𢎞道各有其職崇殿廡嚴像貌香火馨潔師席齋房庖庫罔不具備者守土之任也傳道授業作成人材訓導得法者為師者之責也任在守土者既無愧怍自今以始主善者當念我朝崇儒重道致治興化之良法美意責望我輩贊助太平措斯世於唐虞之上而於教育之方寧可不正其本浚其源日就月將以經明行修為本以雕蟲篆刻為末以窮古今達世變文經武緯調燮經濟為實學以記問章句訓詁為浮技一旦從政付之一縣則一縣治委之一郡則一郡安托以數路則數路鎮靜不致不通無用之謗藹然有六卿八位之望名實相副材全德備不器不局無施而不可使朝廷養善儲材不負所望此興學聚士之功也不然則詩如蘇李賦若揚馬工虛言而無實用謂之不學可也聖賢之學寧若此哉師儒門弟凡有成巳成物兼善天下之心者當以斯言為不妄某正月日某書欒城縣學記菽米之起餓殍纊帛之活凍死人皆知之知之而不耕蠶遊惰趨末者亦有之然不戒用勸務本者十六七斯見人生之必不可闕人心之自不能巳趨末者非人心也風化使然也聖人之於人甚於粟帛雖迷惑於異端而吾之君臣父子夫婦兄弟朋友自若也邪不勝正人不勝天亦明矣欒城東畿之內邑日霑聖化君子小人皆知學道而廟學火于兵草莽瓦礫將七十年辛未簿尉田茂復其舊例賢廊門廡繼完於後政朔望春秋二丁有祀而學者弦歌有地鄉賢酈某簡之以不肖之言以記其學之廢興竊感而思粟帛不求於人而人知貴重者死生係焉聖人未嘗以禍福誣民而民知敬奉者循聖人之道則上下和平尊榮安富生遂其性死盡其常不循則不能一朝安也所係如是宜其報祀而尊嚴並天地又豈一縣一邑獨得而私之然以甘凍餓而不知耕蠶者較之豈不賢矣哉惡可以不書鄭州重修廟學記明主之所先庸主後之良吏之所急俗吏慢之庠序學校明主所以養賢儲才化民成俗之先務也有國有天下者孰不欲令行禁止君子愛人小民易使忘身徇國親上死長政治和平而囹圄空虛禍亂不作而賢能輩出朝廷尊隆萬邦咸服然而卒不能從其所欲者蓋不知清出治之源廢德教而任刑罰棄禮樂而専法令踵戰國暴秦之餘習忽唐虞三代之至治區區以簿書期會為先務職此之由也唐虞三代之政固多教條大經大法莫先於庶而富富而教耳自京師縣邑家術鄉黨皆有學故能官得其人職無廢事風俗成而國祚永延及列國一時卿大夫尚能以禮維持其政鄭之有邦間於秦晉齊楚之強大子産以君子之道修巳事上訓民治人見稱於孔聖昭昭於史册當時至今皆以謂鄭有人焉僑之沒千八百年至元丁亥我朝望族貴臣布揆尚書公之子托克托湖北宣慰副使東昌節婦馬氏之子黃廷佐君卿同守是邦革前政白科之弊墾闢荒蕪務農重榖發滎陽炭山之利浚汴水以通南東之舟楫勸孝弟化凶姦百廢具舉乃曰我朝肇造區夏策試多士中選者復其家世世無有所與在在廟像孔聖建學立師作養賢俊訓導閭里內立集賢翰院以待茂異以養耆德國子監以教貴家子弟之俊秀者可謂急務也鄭之廟學卑陋乃爾我二人實負其罪乃即漢永平之故基復修而崇起之聖宇賢廡師席生齋下及于井竈備具一新經始於是年之春二月落成於次年之秋七月躬率僚屬羣士致禮常祀鄭人趨拜祠下瞻仰嘆嗟同聲相應曰吾二賢侯為國為民忠厚勤敏忍惜一言以紀石以德以功勸來者而垂無窮乎僉曰諾攄誠拜狀以文來請謹因鄭人之詠歌而為之詩曰為政有三庶富而教弗序弗庠從厥攸好臣不知忠子不知孝忠孝兩亡鳥獸同道賢哉二侯布政優優以善養人廟學復修彞倫既明則民不偷熙熙鄭俗禮讓交遊異邦之治簿書期會扺冒頑嚚苟免無愧此善彼惡學興學廢緩急後先惡可倒置我銘我詩鄭人之辭二侯在官父訓母慈二侯他適鄭人去思刻石廟庭日拜其儀磁州廟學記過國入境即其聞見知政治之得失教化之淺深子遊宰武城孔子過而聞絃歌子曰割雞焉用牛刀子遊對以君子學道則愛人小人學道則易使孔子以為然然則君子小人皆不可以不學後世牧民者巳既不學又不能立學擇師以教人以致風俗弊壞抵冒頑嚚集詬無恥制訐官府鬭訟親族鄰里姦宄奪攘僣侈淫麗無所不至秦漢而下無數世之善治戕賊而不能庶庶而不能富富而不能教也學則人倫明知禮義亷恥耕讓畔行讓路以不孝不弟不忠不信為辱生不如死雍雍熙熙皥皥如也學則易治不學則易亂學校之所係豈細微哉為政之要莫先乎學校磁雖中州山水明秀世生名士人知好學某官等以興舉學校為巳任聖宇賢廡師席生齋補前功之未完成制度之當補無一不具可謂知為政之先務也歟餼羊既設興禮者自有人焉兹擇良師集子弟之俊秀者明經治事隨其所長列屋而教養之一旦有成或禆大厦一甓一椽之用使天下稱之曰是蓋出於至元之澤賢侯某人某人承宣之力也顧不偉歟某年月日某書滁州重建醉翁亭記德之感人也厚矣言出於口曰德言事及於人曰德政福當代而澤無窮使人曠百千世敬慕法效而不能忘此德之所以成巳成物之效也歟故有德者之一止息一逰歷凡論議經涉之泉石草木德其人而被以佳名亦可以終天地而不朽古今臺閣樓觀亭榭宫室之美一時乘富貴挾豪勢浚民之膏血而為之豪奪巧取而有之雄壯華麗得江山之形勝快風月之登覽銀屛珠箔盛集髙宴不為不多然而終其身而遺子孫者幾何身未死而名無聞一灰寒而不見知於閭里者皆是也惟德其物豈虛言哉不肖自兒童時得東坡大書醉翁亭記而知歐陽公之德業自時厥後復得六一居士集五朝名臣言行録而熟公之平生每以不得一至於滁覽大賢之遺迹為恨至元巳丑冬同鄉文士張君仲豪得官倅滁衆皆為賀曰歐陽文忠為太守之惠政一逰一行之佳迹石刻手筆之辭翰朝見夕覽三年之內何樂如之明年夏六月不肖亦以事客姑蘇門者曰同知滁州事張侯來謁不肖首以懷賢為問遂出栁侯再立石醉翁亭記為贄且曰亭廢於兵鎮守滁州萬戶府達嚕噶齊托歡萬户厲昭勇洎僕倡率同志以月俸重起之願得數言以紀其嵗月嗚呼公之道德勳業學術文藻亭興亭廢名並天壤泉可涸山可夷而兹亭猶在可喜者牧民者能以崇德化民為先務如文正之祠祀嚴子陵而後尚德者名州曰范公倡始於前使來者繼美於後因感古人有德有功於世雖異代遼邈如親拜德儀傾嚮報謝之罔極無德無功者權威雄猛生巳不足恃公之神遊故治智僧晤語問樹亭者之姓名此記之不可以不作武安胡某書襄陽重修官廨記君子之居雖一日而必葺况官廨乎官廨之不可闕雖遐荒異域陋邦小夷凡有民社者皆知之矧天際所覆數萬里居中處正太平久安之治世乎一縣之治固狹隘也然而國家典籍圖志簿書條章之所傾落兵農工賈貴賤小大貧富之所歸訟承流宣化發號施令徴科供辦之所指聚胥吏卒𨽻晨昏風雨之所停集所係如此雖三尺童子亦知其頃刻之不可無也居是官者恬不之問反為之語曰官不給錢役不可擅舉欲有規畫興作惴惴焉惟恐其民之多言獲罪于官也今日僧寮之借榻明日道宫之假楹習以成風因仍苟且日復一日至元十三年秋巡按河東過遼州襄垣官廨一新異于他邑問之蓋守土者從輿望協衆力而成之也詢其所費則錢不取于官而民無異辭一木一甓而不敢私焉竊嘗有言人能以事父之心事君愛子之心愛民治家之心治國雖不學無術亦可謂良吏賣卜貨藥技之賤者也尚知僦屋布席張幕先為有衆留止瞻拜之地而後求售其藝五馬之榮百里之寄無一宇之聽斷而莫之恤是其為心卜藥賤技之不若也為臣之心寧無愧乎至此而不自安異衆例而力行之不可不書以勸鄰邑平陽府臨汾縣新廨記平陽當河汾間為巨鎮屬邑五十餘城臨汾劇而最要經界才百里占籍者幾萬五千戶凡兵賦之重徭役之煩十常居其二而風聲氣習勤儉果譎宛然雜唐晉餘俗惟其物浩壤狹且不相能故人嚚于訟必直曲乃巳聽約束俟審辨者動填里閈縣舊署在府右廂康寧坊之南城易代來為土人氏豪據有司假老屋隙舍寓理漕務一嵗間輒三五易處簿書儀具坌集委積棼不可曋奔趨執事者當夏熾冬冽赭汗僵立尤實艱苦前政狃故常眄瓜代日復一日漫不加省庶幾赫令尹之威具視瞻之媺清承宣風化之源其惟艱哉逮今縣監某稔其如是適時和訟理嚮化有漸乃以其故詢諸衆僉曰念兹在兹竊有年矣第率先無自迄于今唈唈也既度其人之樂用遂經辦焉應直得景行里次氏之故第凡成室一十五楹略不加易其來如歸廳事適中吏舍兩列彤閎前啓衡達里逵于是逺湫隘處髙明委蛇安舒各有攸敘中外竦然大易觀仰既而史亢淵曰其興滯易弊之勞趨事樂成之懇公倡私應共濟厥美匪劖書珉石代而縣者烏能究根據而見經始贄禮幣來謁文豫以歷官內外因知天下之治在于宰相師帥得人而巳佐天子理百官發號施令以遂物宜者宰相也推君治庇民生供事取決會歸有極撫字百里間者師帥也是則宰相與師帥勢雖霄壤以本末體要而言實相須成化耳故前代選重其人眘柬于清流册授于軒陛疏名殿屏蓋由是也今國家條章具舉百度惟貞顓任責成垂寄殊切作縣者苟非恪勤官守推忠及物何以稱經緯相需之望今一縣之署置固匪政之大者類能若是尚何患任之不優俗之勿易責罔塞而績用不彰于時哉豫特喜縣僚屬達于從政有志于民得春秋憫雨之義故以所繫重者告焉幸來者毋忽滏水記水善利萬物然不擇地而出或出深山窮谷無人不毛之土或汙下泥淖沮洳寂寞之野雖滔滔汨汨源委深達終何益哉滏陽當中原之腹心太行左界南北要衝桑麻禾黍之沃野炭磁礬鐵之奧區陸車水舟窮海南而走京師商賈如織實所謂神州赤縣者也州四十里山南北而中斷西來巴蜀秦晉東抵趙魏齊魯之通軌也有泉出於山足發源淵深迤邐廣濶成大川流北抵州城支别五渠灌溉阡陌園圃用其力十不一二其流經兩岸取其注下推蕩之勢不煩相杵驅驢之勞米其粟麵其麥者七十餘所佳哉此泉生於有用之地居髙就下澤及無窮實天地之鍾秀博施也居民行人蒙其利而不知敬填淤滓穢而不知浚馬牛羊豕褻溷於其中前州從事馬某甃以貞石嵗久復為傾圯某年月日廣平路都達嚕噶齊某官久奉朝命問滯訟於縣適至泉上臨流而嘆曰天下之水一也得地不巧者十蓋六七雖欲德澤施於人而不能也吾郡此泉天下之名泉也守土者昧疏浚開導贊助之功不盡神之德寧無愧乎顧謂宰邑者曰山川能興雲出雨者官為祠祀滏陽之得名者兹水也立州治者兹水也不憂旱乾不雨兹水也食得精鑿兹水也六月火雲商旅無枯渴之苦兹水也有此數德而無泛溢漂沒昏墊之惡且庶人之祭祀報神惠也是水之惠豈特五祀之比哉主土者宜如何哉即以香火謝過焉去其壅塞潔其汚濁髙其垣墉方正其神宇曰廟而祠焉後世文崇祗敬也當俟農隙而請命於上土人不勝欣忭衆口同曰我公此舉不可不刻石以識其美邑宰王某來乞言以不肖州人也義不可辭某年月日大中大夫江南浙西道提刑按察使胡某書新開天平水記人之生也水與榖而已人不食飲七日而死者水榖俱絶也得水則猶可以活年飢避兵以藥辟榖者唯水不可廢養生者亦以咽玉池之水為能致夀龜蛇不食不死以得太陰之精而陽不能涸花木土植而生折置瓶盂養之以水則自芽而葉旬日終月不死然則水之利萬物萬物之秉命乎水其利漙哉故五行生成為先後而水為之冠布五氣而行四時流而為江海淮漢霈而為雨露霜雪雖天地復資以榮豈特萬物哉林州當太行最佳處民居圗畫間五材具美唯水為艱得鑿井淺者百餘尺深者倍蓰綆如牛腰一人不能舉嵗當暑旱泉縮居民環井而立炊時瓶罌不能滿民大以為苦村落鑿井盡土而無水者瀦雨水以飲撫字之吏前後相承無如之何州西三十里水出天平龍洞歷山而來甫踰中路阻以巨石伏入地下不適民用至元五年春前江淮等路安撫李公漢卿來治是州下車撫民勸農問以利病教條既布詢謀於衆導水以東以濟渴以溉枯稿衆踴躍從命不督而集於是公洎同僚達嚕噶齊石林竒塔特州判李讓親畚鍾從命石以火塹髙湮卑順流而行滔滔汨汨直抵城下役不再集工不三宿闔境之人以公有潤物之功而感公之仁能見前後臨民者之所未見而嘉公之智刻石記事求文於余因告之曰詩云豈弟君子民之父母唯豈弟之人則可以子民子民之道順民之所好去民之所惡知天地嵗運之豐歉而預防其禍開山澤林藪富藏之閟以適民用至於辦賦斂集戶口警盜賊給工役此一介里胥亦能之古人所謂循吏艮吏則非也余識李公舊矣天資豈弟疏水之政固美矣消癃閉壅腫之疾流淤塞滓穢之惡濡枯潤稿其利非一雖然是才仁政之權輿也異日黃頴川龔渤海惠政良法所去見思此亦未可量也磨以嵗月汝當自知之衆喜曰唯請書諸石是嵗重九日應奉大夫翰林文字胡祇遹記
