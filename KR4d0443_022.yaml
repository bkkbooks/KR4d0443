body:
  text: 紫山大全集卷二十二元胡祇遹撰雜著寶鈔法凡物貴生於不足賤生於有餘不足人實為之近年五穀布帛諸貨百物湧貴者物不足也鈔法日虛者鈔有餘也有餘則作法以斂之不足則作法以增之方今之弊民以飢饉奔竄地著務農者日減日消先疇畎畝拋棄荒蕪灌莽荆棘何暇開闢中原膏腴之地不耕者十三四種植者例以無力又皆滅裂鹵莽五穀布帛民生日用急切之物豐年已不足少至水旱十室九空物安得為之不貴趨末利學異端奢侈淫靡衣不以蠶食不以耕遊惰僥幸之人與農相半生之者寡食之者衆物安得而有餘哉由是觀之五穀衣帛常苦於不足不足則不得不貴失胎無母之鈔十巳六七加以川流海溢泛濫四出巳苦於有餘有餘則安得不賤為今之計可斂者鈔而無法以斂可增者農而無法以增飢寒日用之物日益不足權信之楮幣日益有餘貴者益貴賤者益賤雖使桑𢎞羊劉士安之徒復出亦無以為計矣為機變之巧者必曰有是哉子言之迂子智之拙也農不可一日而成鈔不可一日而闕今之鈔即古之錢行錢之法民患輕則作重幣以行謂之毋權子若不堪重則多作輕而行之謂之子權母重者行其貴輕者行其賤鈔法亦然曷若改印新鈔一當舊五期年之內舊鈔自廢鈔與百物適平愚難之曰是恐不然鈔代百物之交易所恃者信而巳一失其信民莫之從新舊均為之鈔何優何劣非若五金之精粗鼓冶求索之難易也難者必曰鈔者國之大權大法一輕一重出自一言何不可之有是又不然漢武帝以白鹿皮幣直四十萬錢果可行乎以新換舊徒失其信積鈔之家不勝其損破家壞産粟帛之家不肯從賤或至閉糴愚恐農工兩受其禍無益於國上䇿莫若務農務農則地無遺利粟麥布帛如水火斗米三錢其祥自至務農之要莫先於抑末何謂抑末竒技淫巧不鬻於市冠昏喪祭吉凶慶弔之禮飲食衣服車馬宫室上自公侯下及黎庶各有等差定為令式越禮踰制者有罪務從敦朴純儉凡有力役不奪農時悉以遊手不農者當之去不急之有司減冗官削冗吏沙汰僧道醫儒僧道醫儒其名而商賈小人其行者皆入編戶願為農者五年無役為農者衆布帛五穀豐足百物之價不勞估計均平而日自減賤不妄費賞賜支發兼以銀兩粟帛則鈔價日實方今工農交易鈔雖虛物雖實而民不甚苦者百物工價彼此稱量相敵而若不相虧惟省部隨朝官吏與外路無公田者曰費不足若減去冗文則冗員可削其半所謂月俸貫石相半春羅秋綾斟酌給降足以養廉有公田者不在此限前人有言無以小害大又曰功不百不變法慎不可以一二不便者輕變成法以愚觀之向之耗壞鈔法之弊如立總回易庫諸路行錢以鈔貴買諸物買金換銀良馬美女竒珍異貨之賄賂貢獻今皆革去但能節用務農戒奢侈去浮冗抑遊惰只此數條不惟實鈔一舉而數得實天下無窮之福古人用錢後世易而為鈔止欲便交易賫使流通穀帛均百貨之價而巳非欲求利也非不欲也勢不敢也何為而不敢夫物之寒可以為衣飢可以為食者貿易之際略不相信猶棄擲而不為用况無用之物乎此不難諭正如北方刻木交質以易馬羊牛一失其信則刻木其足恃乎故行鈔之法鈔為子而百貨為母母子相守內外相應貨重而鈔輕則斂鈔鈔重而貨輕則收貨一弛一張權以取中母子既以信相應鈔貨價平而不偏如此則雖行之於萬世而無弊捨此之外一有營利之心則其法自壞方今鈔太重而物太輕比之初年一貴一賤或至加五或至減半主權衡者利其鈔價之高多發而易行不恤傷農不知務權細民所有者布帛官司所收者寶鈔賫布帛赴庫換鈔司鈔者懼其割之難託以無鈔而不售布帛之價日損日減近年市價絲一斤直鈔九錢官司限定百姓每著絲一斤折納鈔一貫伍百鈔價日增絲價日賤復壅滯而不售民甚苦之姦貪乘利之人市井之間又立擇鈔硬鈔之目愈髙其價是使國家流通均平百貨之寶化而為傷農刻價壅滯諸物之一虐法耳主之者不知民情所苦之為可懼不務均平其法又將隨路諸庫鈔母輦至京師以備不測之用何不思甚也積厭苦虐法之情又示之不信儻市井唱呼曰鈔無母多失吾苦虐法也久矣又以吾民寄庫金銀一旦詐一片紙而巧取之所存者無用之敗楮耳寶貨之法民不信矣至此則雖有心計若𢎞羊鞭算如劉晏亦無如之何矣蒙判送講究行用銅錢事銅錢交鈔寒不可以衣飢不可以食均之二物皆非切身實用之貨聖人以其絲絹綿布之不可以零分粟麥百穀之不可以逺賫假二物守之以信以便交易而巳以優劣較之則交鈔優於銅錢請以今日之事言之元寶貫鈔行之十有餘年鈔法愈實通利如流水者以其母行在貫鈔獨行無他貨以相雜也一有他貨以相雜便有優劣輕重銅錢與鈔並行是以他貨相雜也即今前代舊錢銷費無幾縱有當立法一新亦不可用銅器亦糜費無多必當設官置吏即山冶銅方得鑄造工本亦不為輕至於懷挾賫擎逺近交易不若貫鈔之便利兼鈔法通利錢法必不能相勝少鑄則不能遍及天下多鑄則虛費工本堆積而無用徒雜亂鈔法貨立二價漸不為便亡金風俗積錢而不積鈔是以鈔法屢變而屢壞蓋以錢鈔相雜錢重鈔輕又不能守之以信故也今披詳通典所載天寶中鑄錢一貫工本亦相近一貫廢本勞力並無利息目今每歲印鈔八萬餘錠蓋以絲線包銀宣課官為收鈔所以流傳通行略無凝滯今既鑄新錢布散民間絲線包銀宣課必當依貫鈔例收錢不收則法不行假若收錢一萬錠減貫鈔一萬錠收錢二萬錠減貫鈔二萬錠則鈔法不減而自減不澀而自澀積錢既多每遇大支發如襄陽用兵一歲不下支鑄二三萬錠若全支發鈔則不唯鈔數不敷亦致銅錢積滯而不行必須錢鈔兼支且如支銅錢一萬錠每小錢一貫重七斤五十貫重三百五十斤五百貫用車一輛計用大車一千輛豈止虛費腳力實亦失誤急速支持至於西蜀四川之賞河西諸路之應辦開元遼東等路之調度上都等路之和糴又不下數萬餘錠必須錢鈔相兼似此斤重恐失措置難者若曰逺方則用鈔京師近裏城邑則用錢兩不相妨何必搬運是大不然錢鈔中停尚有偏枯有無不均必生偏弊若欲就彼鎔鑄錢法初行民未取信數處分鑄鮮不為姦若為鑄錢工本深重儻别立錢價則鈔法隨即虛壞鈔虛而錢不適用兩者俱失尤為不可竊恐萬一徒以廢工難用之錢沮亂其易造流通之鈔上阻國用下惑民心鑄錢之議似為未便謹具録通典天寶鑄錢科例在前洪範三八政一曰食二曰貨蓋食者民之天民者邦之本國無民則君誰與守民一日不再食則飢又飢屢飢則死然則國無三年之食國非其國豈虛言哉飢寒切於身雖慈父不能保其子君安能以有其民哉貨泉貨本之輕重流通所以平百物而信萬民一失其本一虧其信則百物之貴賤無凖或壅滯而棄如糞土或翔湧而重於金或物輕錢重或錢輕物重傷農傷工皆受其禍信既少虧衆莫憑據古人之於貨泉豈敢斯須而不為之權衡哉又鈔法平百物貴賤之失中便萬民交易之難準故立帛布交鈔之法上下相信信以濟事非欲以不可食不可衣無用之紙而易下民汗血所致有用之穀帛也為國家者度量百物交鈔之孰多孰寡而散斂弛張之物重則鈔輕鈔輕則作法以斂之鈔重則物輕鈔重則作法以出之是物價與鈔法兩得其中農工不傷子母相藉國不求利而利益大中統建元鈔法初立公私貴賤愛之如重寶行之如流水交鈔一貫買絹一匹鈔五六十文買絲一兩米石鈔六七伯文麥石鈔五六伯文布一端鈔四五伯文近年以來價增六七倍漸至十倍以至諸物及傭工之價直亦莫不然反覆思之時和嵗豐無旱乾水溢之災米粟非不多也布帛非不廣也戶丁滋壯商旅絡繹百物出積然而物價日增日貴者鈔虛故也鈔多則物自重執政者當知其弊而拯救之今略舉致弊之由陳其救弊之術伏乞詳酌施行一天下户口若干商旅賣買收稅若干茶鹽課程若干包銀絲綿若干和買和雇造作用鈔若干百官俸若干總計已上諸名項及該載未盡錢物每嵗公庫收發私家消用計可用鈔若干昏爛燒燬鈔若干計其數度其出入多寡而印造之如此則庶有成法權衡在我不致多印妄費鈔虛而物貴不致少印鈔寡而物賤即今略不會計止知多行印造更於支發供給是以鈔日益虛一盜臣私家盜印姦貪無厭車載船裝遍行諸路回易物貨假如米麥每石時估本直一貫行鈔者利於得物自添價數倍如此則鈔安得不虛物安得不貴以致無胎之鈔遍滿天下若不作法以斂之物價終不能賤鈔法終不能實斂收之法無多大凡為盜臣印錢無問多寡悉皆官鈔究問見數即日仰所在官司盡數拘收入官别議支發行用一盜臣置立總庫舉放利息無賴狂貪買官之人一言片紙動輒數千萬貫即今本利落空賣官者得鈔復增價以易諸物自盜臣覆敗總庫雖罷打算徵收未見立行亦合一一推驗本息盡數徵收入官别議區處一鈔法每鈔二貫文當白銀一兩鈔一十四貫八百文當黃金一兩盜臣自壞其法徵金於辦課官金一兩收鈔百兩南省官賣官鬻獄止要黃金金一兩賣至鈔百五六十貫回易於官庫則官庫無金是使人明犯私買私賣之罪金價日增鈔法日虛自盜臣傾覆金銀雖自減價然禁人於官庫不得倒換金銀此弊尚存宜速改正一盜臣嗜利賄賂公行所取者良金大珠美女名馬竒珍異貨求官枉法者不得此貨不能得官故視鈔如糞土近年京師官吏筵會飲食淡薄者費鈔十餘錠甚者倍之此風不可不禁苞苴交往嚴行治罪酒筵奢侈勿循前愆衣服裘馬務從儉素此亦寶鈔之一端也一諸路官鈔庫近年並不關諸上司抑勒不放支發為無倒換官吏攢典閉門間坐虛食月俸因緣移易借貸多有失陷官吏既無倒換民間私自回易富者乘時以邀利貧者甘心於損折鈔權重輕孰主張是今欲鈔法流行諸路鈔庫點勘見數無失陷者即委本官赴户部呈省關支失陷者勒令倍償别委新官交代倒換流行毋致澀滯一近年零鈔銷磨盡絶至於百文者亦絶無而僅有所以元直十文五文之微增價數倍交易之間不能割絶以致即當寄留欺謾澀滯如諸路鈔庫關請十分為率百文以下零鈔當發七八分以救積弊以便市易兼交鈔所以便於交易者以其比之絲絹麻布金銀縀匹能分能零也且小民日生旅求升合者十蓋六七圖錙銖之利者十蓋七八若無零鈔何以為生何以為成市寶鈔法除印造諸路倒換昏鈔外無多印造賞賜諸人當給見在諸物無給寶鈔民間昏嫁四季衣服各一套氊被首飾外不得多索財錢妄費越分紛華美麗無官之家不得衣金錦插珠翠居第衣服車馬筵宴當立貴賤定制物不妄費則百物有餘百物有餘則價錢日減百物價賤則鈔法日實矣又鈔法虛之弊一風俗奢淫于下妄費榖帛穀帛妄費則實用之物不足不足則物價日增物價增則鈔日益虛婚姻喪祭吉慶田宅車馬衣服飲食之類略無貴賤等級一支發妄費於上則散布日廣鈔廣物儉買物者衆生物者寡鈔有餘而物不足不足者貴有餘者賤安得不虛論聚斂傳曰與其有聚斂之臣寧有盜臣然則為大臣而務聚斂見棄於聖人見疾於天下見絶於後世直比以為盜聚斂之惡其可為也哉以今觀之欲為聚斂而材不能濟其惡智不能遂其姦負盜臣之名而實非穿窬之傑何則古之聚斂之臣財聚於上民怨於下猶能使國富兵強帑藏充實而施為遂意如秦之商鞅尚功趨利漢之桑𢎞羊唐之劉晏籠絡鹽鐵使富商大賈不得其利農民不被其害宋王荆公立新法青苖助役又劉晏之罪人尚以巧取暗奪日削月消使民陷於貧瘠罪戾而不自知聚斂之惡至此可為極矣今之聚斂則不然不規畫不會計不知生財之道取財之方不量民力之重輕田力之厚薄水旱疾疫殍餓流亡舉不知之直挾朝廷之威而督責號令白取於民今歲賦稅百萬緡石來歲加倍來歲又加倍正如竭澤而漁於我何有牛山之木旦旦而伐使天地生息之仁不能相繼尚不知懼自以為忠勤吁悲夫照勘近年費用日廣絲銀宣課稅糧民力困敝不敢增加常遇豐年蠶麥大熟盡力辦集尚有逋欠量入為出之法既不敢裁減審天下之大計者宜如何哉將坐視帑藏之空乏而加徵巳困之民歟抑當立法以救歟竊見開場之利不為無補夫天地之生物南北異宜懋遷有無堯舜之所必行當時偶有以停罷聞奏者辭勝於理無有面折廷爭之人聖旨權依停罷今日大臣誠能款曲陳説以為當行之事公私兩便解前日之惑理到言盡聖意未必不從但數年以來無人再言所以停止不復舉行即今南貨銷鎔盡絶價增數倍我家中原所出之貨每歲虛隨土壤棄擲腐朽而不為用謂土産之藥物人參防風甘草等物輦之而南則為寶貨積之於本土則為棄物農人無地耕穫不能為他藝者旬月之勞㔉草藥三百斤可賣錢十餘貫終歲差發可辦商賈之有財本者以千貫之物往返半歲之間化為數千貫何憚乎生理之不厚科差之不供貨既流通轉相貿易舟車流行店鋪和煦居者行者有智有力者皆得養生之利自罷場巳來坐賈無所獲行商無所往舟車留停道路蕭條以我所有易得致富之貨廢棄而為無用我之所無必用之物湧貴無所致得計失計於斯灼然倘蒙聖衷允許開場之法當改前轍公選品官中通錢穀廉幹者數員充場官官賫寶鈔我之商旅諸貨至場估計元本及路費腳錢外更給加五利息給付寶鈔令客旅還家買到諸貨北場官與南官官為貿易仍於許州南京置局停積見數驗戶口多寡分散諸路平凖庫及鈔庫依市價官為貨賣得到本息徑赴中都萬億庫送納以供經費如此歲為定法場官非其人則換易别差物價隨時高下慎毋致商旅之無利能使舟車如流諸貨輻湊此亦錢流之一端也論司農司樊遲請學稼子曰吾不如老農蓋學業有専攻苟以不通無用之虛言亂人耳目則不若不論之為愈也老子亦曰我無事而民自富唐栁子厚見當時勸農之弊反致勞民廢奪農務故以種樹為喻而作郭槖駝傳誠萬世不刋之名言也誠使外無兵事內無土功租賦輕薄官吏省事蠶而得一絲為農者曰此吾篋笥中物也耕而獲一粟則曰此吾囷倉中物也如此則父詔其子兄勗其弟姑訓其婦唯恐耕蠶之後時災穫繅織之不盡善何待勸諭而後勉焉今之為農者賣新絲於二月糶新穀於五月所得不償所費就令豐積亦非巳有加之事役逼迫略無虛日屋宇損壞不暇修補貧苦憂戚遑遑相仍若然則雖以甘辭巧語百端訓諭亦徒應命而莫之能行矣勸之以樹桑畏避一時捶撻則植以枯枝封以虛土勸之以開田東畝熟而西畝荒南畝治而北畝蕪就有務實者從法而行成一事而廢一務必不能兼全何則力不足故也農官按治司縣供報簿集數目似為有功核實農人篋笥倉廩一無實效他日以富實之虛聲達於上姦臣乘隙而言可增租稅矣可大有為矣使民因虛名而受實禍未必不自勸農始而況中間教條有不能行者三之二勸以親睦而鬬訟並興諭以力勤而偽惰百出至此則非無知小民之罪教之者致其罪也古人一夫受田百畝餘夫二十五畝田畝與民力相應今欲使一夫效兩人之力一日成二日之功斷無是理方今之務莫若敦本抑末古人孝弟力田者别加旌表今之最苦者農民而遊手好間以口舌趨末利商賈之徒挾輕資而無定居不占籍不應租稅者甚衆倡優雜類茶酒店戶飲食衣服華麗於仕宦之家而國家莫知禁遏反得納交於王公貴人之門纎巧淫技全免差役傳曰示之以好惡而民知禁以此較之今日所好所貴者何人而所惡所賤者何類也好惡相反如是而欲為農者勸不亦難乎古語曰功不百不變法利不百不易業故於變常改作之際論議思慮周折詳盡詢謀僉同衆心樂為然後舉而行之近聞司農司陳兩省議分立諸路水利官某僣冒位卑言高之罪妄議以為不可者方今四道勸農號令聚集呼召教諭一夫百畝常力常業之外督責種木區田等事義社義倉民巳困於煩擾請以目今實事證之均為一水其性各不同有薄田傷禾者有肥田益苖者懷州丹沁二水相去不逺丹水利農沁水反為害百餘年之桑棗梨柿茂林巨木沁水一過皆浸漬而死禾稼亦不榮茂以此言之利歟害歟似此一水不唯不可開當塞之使復故道以除農害此水姓之當審不可遽開一也荆楚吳越之用水激而使之在山此蓋地窄人稠無田可耕與其飢殍而死故勤劬百端費功百倍以求其食我中原平野沃壤桑麻萬里雨風時若一歲收成得三歲之食荒間之田不蠶之桑尚十之四但能不奪農時足以豐富何苦區區勞民反奪農時一開不經驗之水求不可必之微利乎此二不可也前年在京以水上下不數里小民雇工有費鈔數貫過於一歲所有絲銀之數竟壅遏不能行何况越山踰嶺動輒數百里其費每戶豈止鈔數貫其功豈能必成有天地以來厯數千萬年之久經千萬有智之士其事既不舉行足見其不可為用此三不可也且如滏水漳水李河等水河道岸深不能便得為用必於水源開鑿不寬百餘步不能容水勢霖雨泛溢尚且為害又長數百里未得灌溉之利所鑿之路先奪農田數千頃此四不可也十年以來諸處水源淺澀御河之源尤淺澀假諸水之助重船上不能過唐莊下不能過楊村儻又分衆水以灌田每年五六百萬石之糧運數千隻之鹽船必不可行此五不可也四道勸農巳為擾民又立諸道水利官吏土功並興紛紛擾擾不知何時而止費俸害衆此六不可也愚繆所見如此伏乞詳酌施行論農桑水利一論人無餘力而貪畎畝之多詩曰無田甫田惟莠驕驕古者一夫受田百畝步百為畝比之二百四十步為畝不及其半耳地非不足而儉於百畝大扺一夫之力終歲勤動無懈無怠百畝之田猶不能辦後世貪多而不量力一夫而兼三四人之勞加以公私事故廢奪其時使不得深耕易耨不順天時不盡地力膏腴之地人力不至十種而九不收良以此也二論牛力疲乏寡弱而服兼并之勞地以深耕熟􅀈及時則肥能如是者牛力耳古者三牛耕今田之四十畝牛之芻豆飽足不妄服勞壯實肥腯地所以熟今以不芻不豆羸老困乏之牛而犂地二百餘畝不病即死矣就令不病不死耕豈能深而􅀈豈能熟歟時過而耕犂入地不一二寸荒蔓野草不能除去根本如是而望畝收及於古人不亦艱哉三論有司奪農時而使不得任南畝農以時為先過時而耕植力雖能辦亦必不穫况力不足耶今日府州司縣官吏姦弊無訟而起訟片言尺紙入官一言可決者逗遛遷延半年數月以至纍年而不決兩人爭訟牽連不干礙人四鄰親戚鄉老主首大戶見知人數十家廢業隨衙時當耕田而不得耕當種植而不得種植當耘耨而不得耘耨當收穫而不得收穫揭錢舉債以供姦貪之乞取乞取無厭不得寧家所以田畝荒蕪歲無所入良可哀痛雖設巡按察司略不究問縱恣虎狼白晝食人誰其憐之四論種植以鹵莽滅裂而望豐穰土不加糞耕不以時􅀈不破塊種每後期穀麥種子不精粹成熟不鋤不耘雖地力膏腴畝可收兩石者亦不得四之一儻不幸雨澤不時所得不償所費五論不遵古法怠惰不敏暵地社種麥皆團科種一粒可生五莖地不殺暵天寒下種子一粒止得一莖所獲懸絶如此穀宜早種二月尤佳穀生兩葉如馬耳便鋤既遍即再鋤鋤至三四次不惟倍收每粟一斗得米八升每斗斤重比常米加五今日農家人力弱貪多種穀苗髙三四寸才撮苗苗為野草荒蕪不能滋旺叢茂每科獨莖小穗勤者再鋤怠惰者遂廢所收畝不三五斗每斗得米五升半為粳粃六論勸民務農而不使民知為農之樂古人之勸農春省耕則補不足秋省斂則助不給問民之所疾苦而哀憫子育之愚不能者則欵曲細密教道之以法非不量其力之所不及而督迫鞭撲之一夫之力而責以當數人之任聚集期會而反廢時日官吏雜沓使民供給酒食之不暇水旱風霜蟲蝗之災不恤不憐歲不登家闕食而賦稅如故虐下欺上徒取文具官不得富實之利私不能免凍餒之苦棄本逐末賣田賣牛流離奔竄皇皇然無定居産業丁口衆多不能移徙者代當逃户差役日就困苦貧乏寃苦失職不可枚數此其略也七論農家隨俗亦皆奢侈過度而妄費穀帛匹夫匹婦終歲勤動歲終所獲除納官奉公之外不能供半歲之口體今日男婚女嫁吉凶慶弔不稱各家之有無不問門第之貴賤例以奢侈華麗相尚飲食衣服擬於王侯賤賣有用之穀帛貴買無用之浮淫破家壞産負債終身不復故業不償稱貸農室既空轉徙逃避農業亦廢有司略不禁治豈不可嘆論逃戶漢人鑿井而飲耕田而食蠶績而衣凡所以養生者不地著則不得也故安先世之田宅服先疇之畎畝守前人之世業十世百世非兵革易代虜掠驅逐則族墳墓戀鄉井不忍移徙此漢人之恆性漢人之生理古今不易者也今也背鄉井棄世業拋擲百器逺離親戚姻婭轉徙東西南北而無定居寄食於異鄉異域一去而不復返此豈人之性也哉是有不得巳焉耳矣勞筋苦骨終歲勤動豐年不免於凍餒稱貸無所得里胥鄉吏蚤督暮逼絲銀之未足兩稅之懸欠課程之未納和雇和買造作之未辦百色橫斂急於星火粳粃藜藿百結而不能自恤仰瞻父母俯顧妻子而謀曰今日尚矣明日將如何矣吾血肉不堪以充賦稅吾老幼不足以供賃傭與其閉口而死曷若苟延歲月以逃於是逺徙他所廢主戶為客戶分耘人田托棲簷隙皇皇焉惴惴焉惟懼刷逃竄責逋欠者之相尋也人生至此可哀之甚也今之牧民者恬不矜恤一念申呈上司之不準再念户口消耗之責巳三念照刷之劬勞四念乘人之危困乘時政之失反可因緣而為姦利今歲某鄉某村逃訖某戶即將本戶拋下屋宇若干田畝若干其他産業若干會計其直督令鄰里及本土主首或典或賣以充本户合該差發有餘則官分其半吏分其半來歲如有典賣不盡者一遵前例田宅既盡披散逃戶分數於見在戶繼有逃戶則亦然假如某村某年元抄十戶纍歲逃訖六戶七戶八戶見在三戶二戶抵當十戶差發以至應當不前竟亦逼迫逃去遂成空村復將空村拋下分數普散於一縣以近年見在戶所當差發較之初定元額豈止十倍而巳耶下民無所控告以至於此司縣官三年一轉官得解事而去復得美除以虐民之罪為進階之功侵漁僥幸普天同風吁貪殘無厭上行下效刑之則不可勝刑然則如之何其可也當立格限自某年為始巳逃竄者官為贖買元棄田宅以招來之撫安之免三年之租稅而溫厚之見在者除去代當他人分數以安全之有産業而三年不復者不在贖買之限無産業而願安他所者聽從民便今後再有逃户不即申報所屬者罷官治罪又踵前非擅賣民業者重行治罪論復逃戶三尺之童皆知有天下者以民為本不可使之不安然而去鄉井舍恆産東西南北就口食而逃賦役可謂安乎為政者首以招集逃戶為亟務明示黜陟勸懲府州司縣牧民之官廣推恩惠復業者一年租庸調皆免二年征其半勞心畫䇿可謂勤矣以愚觀之似救其末而不救其本口惠甘美而實德未洽以此為計正猶以無枝之木來衆鳥潢汙行潦聚羣魚不為不集集則何以為巢為穴乎民之去業也出於不得巳也貧苦不能自存田産物業典賣質當十去其半今日出門明日上戶鄰佑坊正曰吏曰官者公明典賣即今濟寧一路逃户八千而有土田官司知數者無十數户是果無所遺乎足見公私蒙蔽質典貨賣無餘矣然則招來復業而無業可復木之無枝尚不能集鳥水之行潦尚不能聚魚而况童山涸轍乎愚熟思之逃民之不能還業其難有十無拋下事産來無所居欠少錢債來不能償一也他處得生理二也元籍非本鄉已得還鄉漂流已久地理窵逺無力提挈移徙四也流移逺方為商賈為工匠五也元拋産業已為他人所有六也夫亡妻適他人七也父母已老死子孫不知原籍八也子孫作贅於人九也因流寓而戶絶十也復業則有此十難而况無業可復就令還家便得所遺事産舍屋推倒垣墉無有反若異鄉兼一年之內能作何活來歲又復當差租稅從何而出論至於此無惑乎逃竄之不復自壬子籍戶到今三十餘年上䇿莫若再籍以籍為定中䇿莫若勒令守土官鄰佑人供責逃戶元拋土田事産官為見數招人種佃所得子粒官為收貯復業者連産業與所收子粒併給之三年全免差役下䇿信從虛文今年招到復業户若干明年却報逃竄公私無益虛費紙筆為姦吏所弄論積貯俚語曰豐年積穀太史公食貨志曰賤取如珠玉人恃食以生故視五穀為貴重以天地之視五穀亦百草之一草耳僕自垂髫記每歲百草之榮枯品類大率不同土惟舊壤草與歲新今歲為蓬藋來歲為蓬蒿義來歲為茨棘又來歲為菰蒲又來歲為藜藿為枲耳是蓋風露發生之氣不同故百草隨其氣而榮瘁亦不一邵康節明造物之理曰露化物之草其説信有徵矣五穀亦率若是農里之言曰寅卯多種田隄防申酉年蓋謂豐歉相仍如畫之有夜水旱相逐如環之循轉百果今歲之實繁來歲必為之減少大熟之歲五穀豐碩場圃囷倉如京如阜盛極而衰實甚而耗氣數物理定不可逃于此不取狼戾棄擲是居髙明處大位素以人材自負者反不若農里之先見一旦歲或不登使四海之人流離餓殍倉廩空虛無食以濟為卿相者則曰我未嘗負國家非豫之罪也寧無愧于心歟常平倉既立即今空無一粟宜因今歲夏秋俱大熟粟麥如糞土萬億庫絲帛堆積陳腐可支常課織造及一切經費至元八年絲銀聽從民便照依時估折納粟麥以實常平倉使農無以粟易鈔賤糶之損官無髙價和糴坐為姦人之飛耗一歲積蓄得三年之儲設遇凶歲可以紓憂軍不缺食民無流餓斂有餘賤棄之滯貨補一旦急闕之實用一舉而獲數利當途者宜思之穀帛者人之天穀帛有餘則人無凍餒飽暖易得百物皆賤人無貴賤賢不肖雞鳴而起德業技藝雖各不同所以區區勞心勞力者養生養口體而已所以養口體者穀帛而已穀帛湧貴則百物安得而賤百物出于人力百工所以貿易榖帛耳終日勤動而不能營一飽終歲勤動而不能營一暖是以百物亦從而增價求脫凍餒耳中統建元以來三十年間無大旱大水蟲蝗之災厄近年以來穀帛愈貴者何也田蠶者日寡不田蠶而衣食者日衆所以公私倉廩篋笥皆無蓄積剩餘豐稔則不能支歲用若遇堯湯之水旱則人相食矣故曰飢寒切于身則慈父不能保其子君安能有其民哉韓文公曰農之家一而食粟之家六若之何民不貧且盜也以今觀之農者日消日減食粟者日增日廣略具不農品類于左儒釋道醫巫工匠弓手曳刺祗候走解冗吏冗員冗衙門優伶一切坐賈行商倡伎貧乞軍站茶房酒肆店賣藥賣卦唱詞貨郎隂陽二宅善友五戒急腳廟官雜類鹽竈戶鷹房戶打捕戶一切造作夫役淘金戶一切不農雜戶豪族巨姓主人奴僕右諸人每丁所費十農夫不能供給何則膏粱醪醴養體則絺綌羅皺綿綺裘馬宫室金玉珠翠加之禁網疏闊無貴賤等級冠婚喪祭吉凶慶弔窮奢極侈而無忌憚費有用為無用里諺曰高樓一席酒貧家半月糧以今較之一席所費有至千貫者匹夫匹婦日米二升又奚啻終身一世之糧價矣為政者舍此而不恤不慮曰以聚斂為務百姓不足君孰與足何不思之甚也聖人之治天下庶富而教政舉兵強泰山金城百千世而上下相安豈以此也時政諸倉糧腐爛官非其人收受不精倉厫不整曝晾不時諸局織造雜作或妨奪工役或本官侵欺造作不時一嵗會計無量入為出之數當立籍册每嵗奏聞農司水利有名無實有害無益宜速革罷或併入按察司按察司今已三四嵗不過翻閲故紙鞭撲一二小吏細過而已不聞舉動邪正勸激勤惰吏部所舉取人入仕之法止有嵗貢一科所舉例皆不公兼不經程試縱非無賴小人即此無學新進又况即令六部待闕承權者已近百人一二年後不能補正歲貢可且停罷吏人出身太速才離府州司縣即入省部才入省部不滿一考即為府州司縣官任子一科非取人之良法前代止以為監當官未聞便使臨民為職官者如不可罷亦止可以為監當官籌增歲久廉幹有稱則方議出職鈔法以信為本不可侵使以致虛無信止則鈔法即壞武衛軍三萬當作土功以代雇夫之費襄陽軍可減半屯田以省餽餉之費童男斷沒人歸順人可令習百工免致摘撥當差富戶一土功造作長川不絶兼工役日廣府庫每歲所得有限支持常用尚恐不敷若更加橫支比至歲終消費無餘已借過錢本數萬錠今後夫工不冝雇覔當用武衛軍謂鹽糧應役兼所撥武衛軍俱於軍戶中選到富強之家假令止於軍前應役或親身出軍或雇人代當每歲不下費鈔一百貫今撥充武衛無鋒鏑矢石之苦無飛芻挽粟之勞安坐無事又食鹽糧比之軍前出軍之人勞逸奚啻百倍出軍之人歲費鈔百貫又與國爭城奪地出生入死無一毫犒賞武衛軍不費鈔一文又請鹽糧安坐無事一有造作土功又令日支公價彼太勞此太逸實為偏重兼既比出軍軍人省鈔百貫是已賜鈔百貫矣今後日工不宜支價即今弊政一大臣當決大政不可煩勞困以細事一事有定例者當各歸之六部與各屬有司一省部臺院者百司郡縣之本源綱領法度所從出者也政無小大新舊久近皆當知其本末即今每事皆無簿籍文册自開國至纍朝條例亦無纂集備細每遇一事如戶口銓選軍站工匠錢穀地土城邑等事反取問于司縣不惟取天下譏笑侮玩倉卒率多悮事一立功責效為官擇人未聞為人擇官者也故書曰任官惟賢才左右惟其人官不及私昵惟其能爵罔及惡德惟其賢又曰賢者在位能者在職又曰無曠庶官天工人其代之即今注官不問其才之可否一聽求仕者之所欲有平生不執弓矢而為縣尉捕捉之職者有未具如前四字不能解説而為首領官吏員者有孝經論語不知篇目而為學士者有衆星不能辨次而主天文者何乖謬之若是也推原其弊人皆知之而不能革者何也請託得行而無敗官責成之罰耳市井細民欲營一室欲造一器亦必問其匠之工拙未有求金工于木工之門責陶埴于織紝之手者職官則問其材之能否吏員則試以案牘然後委任一俚諺曰車無餘材輻二輞一則不少不多輞一輻三則何所安頓豈惟輿輅至于衣服宫室一切百物亦莫不然何獨至于設官分職而十羊九牧哉即今冗官冗職冗吏冗員多合減削一案牘者紀事代言立政而已闕則廢事多則紛擾頻怒則不威責人不以理則言不行即今無用之冗文十去其七則吏簡政清下不煩勞矣一立功立事積以歲月庶有成效孔子曰如有王者必世而後仁又曰善人為邦百年亦可以勝殘去殺矣又曰如有用我三年而後有成况庸人乎故古人三考黜陟幽明即今官吏未期月而遷徙數四矣安得不為苟且僥幸哉歲月未滿不宜改遷至于內外掾吏一歲之間五七轉按合任歲月不三之一已行遷注是以舉事不知首尾責以稽遲違錯則無所詰問無所歸著一生財有大道生之者衆食之者寡為之者疾用之者舒則財恆足矣力田者衆無遊手浮技者冗官冗吏十減其半則生之者衆食之者寡矣不奪農時人牛有餘力則為之者疾矣罷不急之工役革奢侈之妄費則用之者舒矣若田野開闢粟衆如土商賈絡繹貨財如山每歲合入官者不見增羡此為政者不得其術坐視姦盜之侵欺而不知鈐束也即令鈐束掌錢穀官不過添增額辦耳官課增一分則下民受一分之病五穀布帛百物日貴而鈔法日虛矣國家收鈔雖多實利則不及上年十分之一何以言之上年收鈔一貫可買紬一匹絲二十兩粟三石麥二石今日收鈔十貫不能買上􅟢諸物百物皆然然則課額雖增果何益哉人生一日不再食則飢終歲不製衣則寒國家所用切急之物穀與帛耳穀帛不足而鈔積如山不數年之後壞毁肩輿而不能博升斗之米粟尺寸之布帛矣論定法律即今上自省部下至司縣皆立法官而無法可檢泰和舊律不敢憑倚蒙古祖宗家法漢人不能盡知亦無頒降明文未能遵依施行去歲風聞省部取泰和律伺聖上燕間擬定奏讀愚料聖人萬幾豈能同書生老儒縷縷聽聞若復泛而不切聞之必致倦怠一與上意不合為臣子者不敢塵瀆不能早定愚者不自揆竊謂宜先選必不可廢急切者一二百條比附祖宗成法情意似同者注以蒙古字蒙古語解釋粗明庶可進讀庶幾時定上有道揆下有法守則天下幸甚革昏田弊榜文一升平無事民安地著逋逃者還業五穀增價土田每畝價值比數年前踴添百倍所以典賣之間不無詐冒昏賴以致詞訟紛紜連年不絶府司今議得每一社議令社長集衆公議推保公平官牙人一名能書寫知體例不枉屈寫契人一名本縣籍記姓名凡遇本社買賣租典土田及一切房屋事産人口頭匹交易合立文契者止令官牙人作牙官立定書寫人寫契違法成交者此工人當罪到官毁交不經此二人成交者毁交治買主賣主罪文契分明庶革前弊一省部明文諸交易文契雖以諸物成交止合價錢並以貫鈔並不得書寫金銀絲絹綿布諸雜物貨府司照得濟寧一路諸雜交易多寫絲貨絲價或增或減市色不定以致詞訟不絶府司遵依上司格例今後諸交易交契並不得書寫雜貨上寫貫鈔若干違者先罪牙人寫契人買主賣主同罪一昏田屋宇因事到官縣司兩平斷定各無詞訟不半年一歲吏人與姦人作弊滅毁訖元斷文卷再令翻告新官新吏不知始末根因見解處心公私不同以致欺罔百端反復無定府司擬定今後凡經官斷定土田房舍事業等事隨即當官出結合同公據執照令各人收執如有翻告者後官以為憑據斷決公平依法者不可改斷偏曲不平者或欲改斷備開前斷錯失亦依前出結公據執給庶幾杜塞紛競及官吏作姦之弊一昏田相爭事關農務故有務開務停之限濫官汚吏不肯公心及早剖決反執格限以為姦是以纍年不決府司擬定凡遇此事比三月務停不決者照依格例稽遲日期嚴行斷罪一作姦造偽之人務開之月不行告官直至正月盡二月初將過務停興辭到官雖遇明敏公平官吏往復移關勘會亦不能處決府司擬定十月初為頭至正月上半月興詞赴官官為受理二月初興詞者官司不須受理是月占據爭奪人土田者坐昏賴之罪昏姻聘財雖有定例立格之日民已不從蓋緣後有自願者聽之一言故也又兼立格之年絹一匹直鈔一貫今即絹一匹直八貫他物類皆長價八九倍十倍雖嚴加罪責勿喻定例民亦不從百貫寶鈔能買幾多縀匹裏絹金銀頭面不若再立上中下三等嫁財定立上户嫁財縀子裏絹各幾匹金銀頭面各錢兩非品官之家不得衣金衣服中下户近減一等永為定例踰越者各杖七十下軍政本朝最偏重者無若軍政最紛亂者無若軍政貧富強弱百倍相懸非偏重而何大無綱統細無紀目非紛亂而何自有事江淮以來分𨽻頻碎源委隔絶棼絲沸羮互相爭奪內立樞府兵部無簿籍之可尋外設行省統軍萬戶府無一定之行伍出入進退更代逃亡無法鈐制貧苦病疾事故無法憫恤作姦造罪防間管軍官鄂勒官文字往復略無凖則憑據試以一歲較之逃亡事故應役放還殆無虛日起遣勘當保結開申吏不停筆官吏走卒監送遞遣腹背相望失期過限呻吟捶楚之聲月不空旬自開國至于今執此之政日甚一日七十餘年矣夫物之剛健者無大於天地生長於春夏而收藏於秋冬昭朗羣動于白晝而冥默安息于暮夜飄風驟雨雷轟電掣于斯須而和煦霡霂于永久天地之動靜尚且若是安有祖考子孫繼繼于勞苦征伐死亡殺戮無息肩之涯涘而不憊且困哉一時之戰氣強於一鼓再鼓而衰三鼓而竭物力之必然雖烏獲賁育兼人之勇亦不能久而況常人乎武克商歸馬放牛亂寧而與民休息好殺無道莫過于秦六國既平猶銷鋒鏑漢之滅秦約法清靜與民寧一一亂一治不得不爾古人有言曰貴為一人富有四海疆理天下至于四海則至矣極矣盡矣無以加矣海不可越猶天之不可階而升洪海之內雖有一二島夷鳥言獸形得之不可以為臣妾服食器皿皆不足用山川土地不能立斥堠而城郭之不能牧牛馬而田獵之不惟不可取抑亦不足取今南方已定六合混一天意人心皆以太平安堵為可樂天下雖安兵不可忘內立諸衛外於要害設置折衝府三五十府冗員亂卒俱合省併三時務農一時講武毋使軍官憔悴而苦虐之凡困窮老弱不堪服力者一切放罷為農十去三四亦不為少苟能休養生息十年之內力可數倍舍此不務縱恣貪暴好生事之小人略不知止非所以為宗廟社禝之福又一重役一重差之苦狀軍政本無重役重差之弊始於展轉分擬𨽻屬别管頻繁細碎各無籍帳元屬老役或占吞而不發或朦朧收係新管官司驗名追勾鄂勒官兩依來文起發督逼抑勒無所控告有父子二人兩處應當兄弟三人三處應役鄂勒官吏千百中間有一二肯為分解淹延逗遛申院呈省文字往復疏駁南北迢遞二三千里一問一答動逾半年或遇籍貫姓名元役今役少有爭差奄忽一年二年不得替罷歸一似此重併寃苦一家之內併起二軍三軍實可哀憐又有軍已為民已當絲銀差發軍身不得放罷又有民簽為軍已當軍役民籍不得除差又有元係正軍後為消乏貧難各併於他人户下已為貼户猶當正軍身役以此極多申院申部十餘年不得結絶前件愚見古人軍政至精至明甚易知甚易見不當若是之重併何以言之自伍人為伍十人為十纍至百户千户萬户元帥雖所統千萬人其法不出一人所管者九人耳是以疾病死亡逃竄即時周知其數坐作進退出入起居無片時相離悉知其狀無所隱伏故軍前明有軍籍鄂勒官有鄂勒籍軍前發還鄂勒官即知其來家鄂勒官起發應役把軍官即知其在軍替換有時交代有法死亡患難有所存恤詐偽逃竄有所拘執防間何為若是之紛紛也惟是數者舉皆無法官吏因緣而為姦果使置籍明白歸身無二屬處心公正不相侵紊立法周密無所隱伏三者既備此弊自除民自不寃又二軍前身死在逃之弊狀吳起之用兵與士卒同甘苦士病疽則親為吮古人之愛民也如是故得人之死力安忍有違背棄絶不相親附者哉今之管軍官視軍如草芥如糞土少有技藝者日程月課不得休息不許人替代無技藝者種田種菜打墻蓋屋打捕牧放風雨寒暑不勝困憊十日半月一點集一出令責其所無之物令於己家貴買軍無盤費不許於諸人處借貸須於己家取債不百日半年而出利過倍所以勞苦憔悴困餓愁戚疾病逃竄死亡無所不有管軍官恐負逃軍之罪責皆以死夭申報復來鄂勒起發補數本家執狀申訴曰我家某人纍有家書見於某所當役不曽身故亦有貪財喜功用兵無法軍以敗亡不敢以實報復申曰在逃本家執狀申訴曰苟若在逃經今數年本人有家有子即今又無外國何不還家鄂勒亦無可驗明作姦之人乘此不誠相欺務為欺謾不貧難而告貧難不殘疾而訴殘疾不身死而告身死孔子曰上好信則民莫敢不用情豈虛言哉前􅟢愚見當戒諭軍官愛士卒如子姪無得以私事困苦私怨捶撻有病者善為醫藥必不能救而死者當明注年月日身死病證牌子頭姓名身故人司縣村莊籍貫姓名埋瘞處所如在逃者先罪責牌子頭五十户有失關防及移文鄂勒詰問本人何故在逃治罪起發無有欺謾不敢重併庶幾不致逃竄又三貧難消乏之弊狀匹夫之身不三數年之中有疾病旺衰數口之家或子姪兄弟衰旺或家業興衰旱乾水溢年嵗豐凶之無定運命吉凶人為巧拙勤惰之不一既不能長富亦不能長貧此造物消長之理故前人之為政三年一大比造户籍上計帳每造凡三本一留縣一送州府一申省部覆實無偽驗其力之增減而輕重其賦役黠吏姦民不能詭偽一富一貧不待申訴如指諸掌故下無妄訟官無繁文無廢事良以此也我朝之於軍民一籍之後近則五七年逺者三四十年略不再籍孰富強孰貧弱孰丁口增加孰丁口消亡皆不能知臨事賦役一出於姦吏之手一聽姦民之妄訴中間亦有實是消乏獨夫寡妻孤子無産業者亦不能辨明近年徒行虛文每遇或告貧難勒官吏依出軍例保結從州府定擬富強者執苞苴行賄賂反以為貧乏而坐家作活貧乏者持空拳無杯酒之禮反以為富實而督勒出軍強者愈強弱者愈弱若此寃抑何以能明前件愚見自開國簽軍纍至近年宜驗各簽年分辟舉亷幹官吏分路排門據即目實在丁口事産物力符同給户帖造籍册仍細注元簽起時屬何屬再撥屬何屬目今見屬何屬當役因而將民籍站籍匠籍諸一切户籍細細目覩手抄造籍各三本以為定例自此之後三年一籍經手官吏冒偽不實者若干户杖罪若干户處死經此一籍逃亡事故不勞招誘一一自見貧難富強不必推排一一明白難者必曰似為搖動騷擾經曰以佚道使民雖勞不怨以生道殺民雖死不怨殺者又曰不患寡而患不均不患貧而患不安一經著籍既均且安民何怨之有姑息之言恐不可聽富強姦偽隱伏狡獪者多不愛此舉朝廷苟從愚計臨時細立程法以防姦蔽又四勾起正身之弊簽軍與起軍法自不同簽軍之時不取丁多富強之家則不能持久應役起軍之際不選踏弩挽弓負甲執殳視死如歸勇健強猛之人則無以取勝破敵用兵之意不過如此初不限以正身户頭貼户雇身照得纍簽軍户除農人服勞者正身堪以應役於內亦有老幼懦弱疾病正身必不堪充者又兼索居市井商賈工匠刀筆醫藥諸雜一切不曽服力之人一旦使之負重挽強搴旗斬將登城陷陳不惟徒棄人命又何以開疆勝賊取威定亂管軍官吏豈不知此而每起必勾正身不容雇覔而正身未嘗應役者豈忠誠為國之心哉不過恃權斂賄而已耳昔南方未平猶可託曰正身則戀妻子不投逆雇覔則何所顧藉或叛或逃決不得用今日四海為一家何以藉口前􅟢愚見正身之弊肥軍官之私門削弱軍人之氣力不可不丁寧誡約明示責罰除自願正身出軍者聽毋得抑勒勾追聽從軍便或雇覔或親戚或奴僕取其堪充軍當役者出軍又五印書之弊立法防姦而不能欺者良法也可欺則不惟不能防姦而因以生姦即今軍前公文起軍曰在逃曰身死本家赴鄂勒官申訴曰我家某人見於某處應不身死不在逃官司不信視此近日印書鄂勒官憑準合申無印章白書則不準且如兩家俱該起軍一行正係乎有印無印耳即今軍官自鎮撫總把百户千户萬户帥府招討諸司百局大小貴賤有印章者不可勝數印章出自吏手計不難得所刻字畫孰辨真偽近年省印部印尚有詐冒而况卑官小職江山遙逺安敢必其無偽又安知主鄂勒案牘之吏中間不假借以要利助姦人而為地不詐造以取賂乎兼近日起軍官却不凖印書須要起遣前􅟢愚見私書使公印不可為法雖有印亦不可憑據請移文軍前有司毋印私書有事則公文往來不敢欺謾實為允當又六保結之弊軍無簿籍富實貧難無實可照一憑司縣依刷保結由是觀之是出軍不出軍權不出於朝廷一出於司縣之手今日司縣官吏果皆亷明公幹之人歟私徇貪汚十蓋六七習以成風死且不懼保結一言何難脫口按察司官吏雖往來如織略不紏察舉劾以富為貧以強為弱將焉是懼總府官理難一一家至户到親身詢問上司徒取文具放富差貧不勝情弊前件愚見軍無簿籍一聽貪汚者髙下其手將朦蔽日深真偽日亂造籍劾實庶革此弊又七軍官有名無實之弊國家駕御羣才激勸軍功曰名曰實耳何為名百夫長千夫長萬户元帥等官是也何為實應所名之官而實有百夫千夫萬夫三五萬夫之呼召指使旗旄弓矢導前擁後賞功刑罪殄冦樹勳者是也自江淮用兵人立戰功國家不吝名器隨即酬答昨日散軍今日升為百户再一升而為千户又一升而為總管又一升而為萬户一門之內父子兄弟俱為勳官錫爵既多實不副名名為萬户麾下無百餘人千户則不滿二三十人總把百户則無一二走卒之役使負榮貴之名而無榮貴之實佩品官章服而與小夫賤𨽻無異安在其為報功也前件愚見以功而貴無降黜之罪祿之可也授之以實權可也今欲足其軍卒之數則無兵可與久勞者宜享其逸照依本等換除民官何為而不可不猶愈於輿臺胥史末技雜流叨居列位濫玷搢紳者乎又八合併偏重之弊古人兵農不分一夫受田百畝方里而井井九百畝八家同力公田之百畝而官入其租一井之賦兵車甲士卒均有定數三時務農一時講武無事則為農有事則為兵自井田廢阡陌開受田無法取民無制矣受田無法則貧富不均取民無制則文案為姦強益強弱益弱矣漢魏而下猶立限田近世以來限田亦廢兼併削弱自不能已然而猶推物力以定賦役無物力者無賦役國制兵自兵而農自農肥瘠不相救助每次簽軍貧富強弱自已不同自壬子至至元十一年前後五次簽軍例取上户富強丁多有力之家且如某村計一十户從上簽軍鼠尾至第五次五户與第一户一例當軍強弱分撥相懸奚啻數倍密院知其偏重近年分揀軍户遂為貼併官吏因法受賄富與富併則氣力有餘貧與貧併主客皆弱以致破家壞産舉家逃竄請以各年簽訖軍人籍帳推排考校丁産強弱自見地數十頃親驅數十丁又有門面營運當軍一名單丁寡婦無産業當軍一名如此不均實為寃枉前件愚見兵貴精而不貴多在強而不在衆果能如虎如貔如熊如羆力扛鼎射命中古人已有以五千之卒戰敵三十萬以三萬之衆禦百萬之師者方今四方砥平鰥寡孤獨疲癃殘疾無産業單丁者皆宜放罷為民除去軍籍此數者在仁政之所當養濟雖合併十户為一户二三十户為一户亦不為用徒費文墨今年勾追明年刷勘後年起遺保結勘當止與吏人供酒食之資苞苴之費而已其次年壯有妻室子孫田畝及頃者四丁併為一户輪畨周嵗當年或身故而子孫未成丁或凶年食不足官為賑濟不得貨賣土田孶畜消折氣力
