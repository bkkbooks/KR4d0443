body:
  text: 紫山大全集卷六元胡祇遹撰七言律詩聖瑞并序至元九年天壽節大名路得白兔一同表來獻用之都事作詩以紀聖瑞要僕繼作敢以不敏辭勉賦八章縞服毶毶雪不如畫籠眀穩稱趺居欣欣知幸辭田畝望望承恩拜玉除修鬛素垂雲母髮雙瞳紅點水晶珠凌雲一賦嗟何在辛苦昌黎似少迂兔因潔白作禎祥逺貢來瞻日月光却笑人生自卑辱忍將天爵陷汚贓迎逢涇渭清為濁顛倒裳衣緑作黃感物傷時不成夢玉壺天地月波涼月窟髙寒桂樹林元精孕秀得純隂金烏影外自昏曉玉杵聲中無古今體魄神魂幾寒暑鬚毛皮骨盡瓊琳守株癡子母相待瑶草秋風禁苑深五色無如白最良仁柔孰與卯君當不勞虞吏施罝網要並嘉禾應吉祥荷外緑龜來矚目花邊孔雀喜生光玉鸚飛下瓊華殿巧語先呼萬嵗觴天生仁獸出眀時愧乏瓊瑰爛漫辭身帶桂香餘逺韻光如尺璧絶纎疵難依野菊棲霜棘合向瑶階食玉芝更看皇朝多上瑞百僚清白吏無私桂香宫闕玉階除搗盡玄霜日未晡偶被天風吹俗夢戲來人世曵瓊裾逺離徒侣忘奔競愛惜丰姿恐易汙一著玄裳作毛頴也教人道不中書紫鳯蒼麟瑞應頻老㕙釋褐雪衣新幸同服色生來巧要被恩光性自馴霜冷蟾宫迷去路雨晴靈囿淨無塵可憐狂狡謀三穴甘與妖狐野鼠鄰眀視仙還嗣子多􅀈孫墮地鬢霜皤匿光使物名空在入月乘蟾術己訛羣類尚迷玄圃草千年竊食玉山禾衆同獨異呈祥瑞婏􅀢􅀈䨲奈爾何慶王直卿父母壽九十由義居仁善守身八珍五鼎事雙親錦囊玉軸詩千首鶴髮朱顔壽九旬慈孝一門宜異應安榮五福萃佳晨更看萬里前途逺定作忠良柱石臣和許叔海仁兄壽席德修業廣玉無疵五十餘年句讀師慰眼囊無阿堵物起家天與寧馨兒魯侯不遇庸何害劉向傳經自有時願縱林泉間杖屨風煙如畫鬢如絲慶昭文夫人壽九十母儀婦德兩能全猶有塵寰未了緣共喜春新開九秩豈知天上小千年西王母會終當赴北斗城歡定再圓且飲大椿椿下酒笑看東海變桑田宋總管太夫人九十壽金鳯花開白玉堂慈闈九十愈康強喜生兩臉丹砂潤明發雙曈點漆光祿養侯封純孝志恩頒畫戟舊門墻古今賢女知多少不似髙門福祚長慶趙總管八十壽三首挾槊彎弧勇萬夫燕居冠帶一間儒處身儉素貴如賤學道謙恭有若無鐘鼎清名出偷輩鄉閭遺愛及樵蘇漫將八十為公壽矍鑠飛鞍不用扶乘時騰逹上青雲致政歸來有幾人畫戟朱門誠貴寵里筵鄉社更情親戰攻摩撫多奇計壽考康寧得此身門巷緑隂松竹底坐觀桃李鬭鮮新壯嵗亨途易著鞭晚年名節例難全不因念念子孫計即為區區妻妾妍貪俗足為廉士恥髙風誰在使君先從今受用休官樂德齒尊榮四十年寄雷彥正才藝如君豈久間可能髙潔掩雲關行當冀北千羣選莫厭終南一帶山壯嵗功名從造物綵衣蔬食恱慈顔西南望眼三千里夢裡芳蹤不可攀寄趙輔之荒詩前月下樊川想像開緘一莞然以我夢君常耿耿知君念我亦懸懸鄙言儻惜馳千里何物相思破積年好在王雷三益樂月臺風榭往來篇寄朱誠甫人來聽説拜嘉除夜久無眠喜有餘德立不勞求捷徑仕優仍好更觀書調絃固合張還弛納衲當知急與徐吾弟天資素溫雅人間何處不安居寄王景伯江陵一見偶相逢别後相思似夢中嵗月白駒飛過隙人生社燕避秋鴻愛君磊落青雲氣笑我蹉跎白髮翁樽酒論文定何日恨隨流水到江東寄李裕卿五載分飛一寄書年來更甚信音踈雖無尺牘傳聲迹賴有人來話起居委巷常思淹絶足俊才久合拜嘉除廟堂勿謂無知己漏網橫江百尺魚寄杜緱山拜君嵗久敬君深别後憐君更苦吟衰柳寒煙迷徙倚廢城春水幾登臨都將豐嵗中年夢換却荒雞半夜心種竹買田鄰舍約自慚無計即相尋詩成政恐無人讀食足難為作計疏百畝未供陶令酒一區先得子雲居坐聞里士來傳業榮勝王門強曳裾鄉社雞豚重相訪不妨騎馬到階除寄謝隴西翁打門問客自西來未語凡襟覺少開走卒趨傳有鈞命歡悰端似上春臺只因眷眷蒙多問愈自兢兢愧不才邂逅何時接清論一江春水濯心埃寄王子初東南西北千餘里相憶相懸五六年俗狀塵顔時自笑急流勇退羡君先即時亦有一杯酒負郭誰無二頃田夢裡共尋溪上路藕花風露並吟鞭寄張周卿社燕秋鴻十五年祗爭青鬢與華顛雄才宜作橫秋鶚老境惟便負郭田千里關山空目斷何時風雨對牀眠年來夜夜還鄉夢接袂聨裾滏水邊寄陳濟民霍家書畫見君詩心畫清雄絶妙辭南北十年成久别關河無日不相思夢中見面髯如漆鏡裡嗟余鬢己絲白髮多來故人少笑談握手定何時寄西巖諸公文甫士能文舉仲宣年來長路苦奔馳却羡書窗靜掩扉坐守冷官如旅泊出逢髙蓋炫輕肥塵生南浦間遊履苔滿西溪舊釣磯屈指幾人麟閣像春風好在故山薇宦情元薄似春氷况復重經寵辱驚敢自持才求好爵誰能努力趂虛名黃雞空負秋成約白髮潛隨夜雨生寄語山靈休見笑草堂無恙得歸耕寄王秋澗前嵗同舟曉渡江歸來相繼月餘強平生進退常相似老去功名有底忙喜見童孫能灑掃厭逢新進問行藏求田負郭方今遂春暖安排手植桑客至誰嗔少送迎鄉鄰子姪要傳經望前失後嗟昏耄數墨尋行甚典型執卷真成村學究隔窗羞見夜飛螢休言稽古全無力不負當年汗簡青錦繡文章下筆成甚無一字落柴荆青春得意新桃李白髮相看老弟兄一世愛君心不淺百年見我眼偏明從今酬唱無虛日一字當留萬古名衰老無能得退休有時往事上心頭居官合盡人臣禮過慮常無天下憂習氣不除還自笑多思無補竟何求髙情四海王秋澗幽谷鳴琴幾獨遊寄王立甫短簷寒日箭逃絃夢裏清談又一年白髮衣冠俱老矣黃塵鞍馬兩茫然句無可詠詩難寄文不成章書懶傳唯有中天一明月照人相憶共嬋娟寄吳蔓慶經史詩文力有餘晴窗遊戲八分書三徵不起非求價一適無邊足自如按譜覔花人逺送和煙種竹手親鋤料應安樂窩中夢不與辛毗共引裾寄髙道之陳介甫不接清光逾十年無情日月若流川經綸汗漫隨人用銓調匆忙逐嵗遷一事未成宜老矣百年何處樂終焉春風吹破黃粱夢擬買西山二頃田寄傅士開三十年前分袂時玉鞭驕馬怯丰姿今年燈下忽聚首鬚髮雲間似欲絲對語尚疑殘夜夢一杯難慰積年思雨中驛馬催人去點點傷離恨别時岱嶽觀柏土人以為漢柏一人抱匝者二株餘二株遞小六分之一託身得地岱宗前元氣先同金石堅生死便期三萬嵗暑寒休數二千年上參碧落超羣木下插深根徹九泉不是挾才將傲世却因難用得天全何嵗何年得此身避秦歷漢到兹晨剛中不許雪霜苦短景幾看桃李春時有壽山來悅目世無良匠敢揮斤天教留在存深意梁棟眀堂負萬鈞壽哉兹木得遐齡日月於今幾晦明最小孫枝橫偃蹇長生香葉不枯榮龍臚虎脊鑲形質霆迅雷轟助嘯鳴賦分無人詢造物朝菌夜合可憐生木中原有不凡材直幹排雲力未摧一嵗半絲增廣袤三人連抱始周回窮冬大雪隂逾翠六月無風寒自來坐笑園林紅與紫背隂憔悴向陽開岱宗餘潤發清雄雷雨批崖起柏龍不放飛騰歸瀚海故留夭矯護神峯影搖御路昭羣望翠鎖天門閉九重應笑老松虧晚節帡幪雨雹寵秦封杞梓楩楠無限多幾畨生植幾消劘駸駸儘放流年度挺挺其如徑節何己約山靈常健在永同月影共婆娑泰山如礪海如帶才見雲礽碧玉柯恨我詩才乏湧泉愛君髙節碧參天月眀風細唳霜鶴日暖雨晴生紫煙碁局子聲時破靜石牀清蔭樂髙眠蒼苔滿地無塵迹一榻誰能養暮年魯兩先生去不回無人來此共徘徊要乘眀月龍蛇影醉倒清樽文字杯深翠挂冠吹白髮長根作枕卧蒼苔醒來坐倚還三匝矯首凌雲萬丈材都省以諸路事有未集選官督問彥博郎中奉命南來事畢北還以律詩二章贈送兼謝佳製見貺見君眉宇得君心辭簡容莊志趣深傾蓋寫誠何落落催人歸轡恨駸駸難忘清話燈深夜拜辱新詩字萬金寒鴈迎霜來未盡倚樓翹首望佳音每因臨事愧無才為國儲賢路未開耆德髙年傷老死後生隨俗走塵埃豈期滿眼蓬蒿裏忽見凌雲杞梓材去去此身當自重等間聲利不能回寄王彥材郎中去年秋晚過金臺一醉連朝洗惡懷嵗律忽周思往事羈愁無緒坐空齋荒庭草合迷深徑積雨苔凝漬古槐連檄羡君徵不起曉眠花影上簷階暑退秋遙鴈過遲尺書無計寄相思長令好客時中酒猶勝空庭獨詠詩晝靜狼山樓醉倚暮涼雞水棹輕移安居每念羈棲苦音問寥寥恐未宜揚歷清朝仕業昌豈容袖手看人忙江山久負時聨轡風雨何當夜對牀一曲浩歌消滯思百壺清酒涴離腸那知月旦評中語公論年來話更長有客南來問起居知君無日不安舒香浮玉蟻尊盈酒聲散牙籖案有書鐶犬韝鷹間戲馬月舷風網靜觀魚人生適意忌多取但恐徵書下玉除十年飛散水中魚底事年來會合疏但得清安時到耳最憐寥闊久無書不才暗愧虛叨祿壯嵗遙歆早遂初本是為貧歸未得延恩新例許懸車龍鍾疲軟列朝班却著英遊袖手間若水英風元勇退馮瀛老境更癡頑恥隨竊位同招謗徑要投林靜掩關史筆因君定名節一時黃髮合慚顔老人星蔥蔥佳氣徹南訛日月風雲喜共和催起外臣華髮老拜瞻丹陛聖顔酡西王母至蟠桃熟北斗城髙彩鳯過風送山呼聲未闋地祗庭下獻嘉禾寄答徐尚書并序拜違鈞誨倐忽十餘年思見之誠雖切而拜問之禮久廢負罪何言濟寧東平相去不逺初來方欲貢狀敬問起居又先辱詩什且以鄙言見索愈增惶愧謹繼髙韻呈復兼謝某頓首再拜尚書尊叔侍史阻陪鈞履十三年望斷西風鴈影偏屈指燈前同父執於今海內兩耆賢聲容親接踰三舍禮義風流共一天珍重佳章先見貺敢稽裁答往來篇玉堂清樂記當年每辱髙眀愛我偏論事直須求至理立言恨不到前賢隔籬送酒日生枕剪燭吟詩雨滿天一自羣英分散後十年今日拜佳篇覽鏡長歌惜壯年生平賦秉自知偏不因蜚鴈己求去只為鱸魚亦自賢日上簷花梳白髮雲收鏡面看青天北山今嵗移文至可老狂吟廢幾篇相君耆德養髙年不逐時人步履偏肆口成文非漫興百年元氣更誰賢和顔雅量婁師德旨酒歡悰白樂天佳客滿門無俗事定應日月有新篇貴髙能賤富能貧肯著驕淫汙此身晚寐夙興思獻納端居深念為經綸堅持耿耿忠貞志要作堂堂社稷臣保守此心如鐵石紀功書德豈無人戊辰冬至雲物疇能辨吉祥葭灰誰復候新陽厭憑客枕寒宵永喜見書窗暖日長撥去是非間掩卷洗開清觀靜焚香旅懷值節方寥索阿永來前進壽觴偶成退食委蛇百慮新漫誇事業在經綸乘時偶作登龍客無術慙為入幕賔莫喜肥甘潤枯質曽無恩澤到斯民馬前走卒休嗔吒公議潛歸市井人每恨平居不我知問渠今日竟何施因人碌碌漫成事舉世庸庸與易誰委順漸如隨侣鴈剛稜自笑脫囊錐一杯飽食黃粱飯睡足槐庭畏日遲命安齋主寄詩來把玩歌吟卷復開似厭羲皇間日月要同俗吏走塵埃只知芻豆填牲腹不識青黃是木災試向碧天清夜望惡雲妖霧鎖三台七年四月上旬閉門即事時移入新居五月矣九日勤劬一日間宿隂雲重雨澘澘寄身京國家千里僦舍民居屋兩間僅有陳編遮老眼惜無家酒洗塵顔却如三日惓惓婦癡坐無言晝掩關日月髙峯㵼急流功名逆水阻風舟未能瑞世如麟鳯只辦隨人作馬牛千里暮雲曕去雁一江春水夢雙鷗驅人寒餒無情甚直要京塵坐白頭有母晨昏闕起居有兒失教廢觀書為貧來仕庸何害抗志違時計己踈屐齒不投言偃室官銜難挂巨源書從教一鶚無人薦袖裡新書亦自如湫隘喧囂雜四鄰門扄蝸室擁朝紳敢辭凡鄙噲為伍要便奔趨夜向晨一日清間聊適意明朝傴僂又隨人捫心尚喜京官貴猶免郊迎驛馬塵送伯祿都司之官潞州幕畫河東記昔年恩威公案到今傳三年籌筆都司劇五馬分符刺史權故吏老農趨道左過家上塜正春妍從今卧治堂前草更比鄰郊雨露偏可惜牛刀落彘肩內勞外逸遞推遷孝心正喜趨庭便仕版何妨得路偏暖日兒童迎竹馬春風庭宇倚蒲鞭隨車雨足無餘事軒蓋農郊諭力田河山表裏天下脊民俗淳儉唐遺風太守清心能省事東郊何地不勤農豐年易覺徵租足無盜奚煩報獄空上計書名二千石考功上上看今冬寄侯都司伯祿并簡崔郎中周學士燕南六月暑如湯却憶都城立晚涼塞草梳風煙作縷野芳承露錦生香朝知禮讓邊烽敉民樂升平晝晷長遙羡英遊日無事新詩佳翰滿書箱退食從容日未斜讀書談道更清嘉論量往事蛇添足歎美前賢玉絶瑕每恨鐘聲不留客奚知林影照歸鴉嗟豫十畝空庭裏隱几搘頥度嵗華寄子勉侍郎手板持來舉首稀一杯燕酒又分飛西風老屋寒無客涼月空庭靜掩扉館閣豈能辭淡薄鐵鹽元自得輕肥大明湖上人如玉幾度蓮香露滿衣夢裏同君月夜遊碧蓮香鎖木蘭舟相看喜敘三年别一醉從教萬事休麝墨香濃揮草聖宫羅扇軟聽名謳覺來書几青燈畔老木蕭蕭客舍秋十頃腴田千本桑幾時不踏利名場曽拋世路風波惡細嚼農家興味長落日牛羊來逺近接天禾黍半青黃只知豐嵗無餘事睡足筠窗暮雨涼攬鏡翛然懶散身枉教塵土涴丰神未能勳業赤如日何苦髭鬚白似銀牢落棲遲長作客囁嚅傴僂每隨人醉魂虛負扁舟夢萬頃風煙一幅巾布褐溫涼錦綺同一瓢飲足了千鍾初無精細為心纍何貴行藏不我從此日朝衣陪後列異時藜杖伴春農生平義命安來慣不墮人間三禠凶身居太史論功地性喜東家種樹書直以虛名叨厚祿愧無健筆作宏儒偶陪辭客登天祿忝與經生列石渠黼黻皇猷非我事晝眠歸夢繞江湖田園卜築藹相望久負聨裾踏晚涼手植柔桑髙作樹蹊分弱柳密成行錢流鞭算猶堪喜墨抹朱塗有底芒聞説村翁時見笑甕頭新蟻幾浮香夕冷朝炎勢利交故人久别夢徒勞倚樓長望天空濶擁鼻微吟思鬱陶脫迹雲林逺巢許無媒廊廟續夔臯一官千里遙相憶不為西風己二毛羡君隨寓即安舒顧我多思不自如幸即為貧來入仕却因嚼蠟每懷居四年京國三間舍萬里功名一篋書莫吝音辭數相問順流時有北來魚不為呶呶欲作詩假辭成咏寫相思秋鴻社燕長相避飛絮流萍無定時故紙虛銷天上日清霜偏照鏡中絲幾時不著離愁管鵝鴨相喧隔翠籬謝答張夢符畫梅竹扇十載無從謁下風偶因便面揖清雄橫斜籬落經過熟與可溪湖興寄同清影故人來萬里熱中無夢拜三公惡塵揮斥元規逺嵗晚當為鄰舍翁送趙良卿問事畢還燕老繆歡欣不自持青雲人物出眀時王褒己獻賢臣頌慶厯誰歌聖德詩榖帛價隨時雨減金珠市比去年遲太平十二匡時䇿從此河汾不費辭好語先從市上來繡衣直指使君回問民疾苦宸恩重去吏姦貪賢路開喜見青天懸日月願將白髮老蒿萊吾家貧窶無叉釧盡典琴書餞一杯生來不識採時官今嵗何年拭目看鰥寡從兹無失職老癃扶杖喜衝冠鄰家貸粟能充飽嵗晚單衣亦不寒執手送行無所贈一天和氣滿歸鞍常時酌别總傷情此别歡欣不自勝四海蒼生思雨露一時使者盡才能只知與衆除寃苦不惜浮辭起愛憎更好都堂堂上説太平有路直如繩陶鈞萬物本無私桃李春風又一時再拜京師賜租詔髙歌田野感恩詞久隂忽霽誠堪喜野鳥為鸞尚可疑羡汝英姿似雕鶚疾邪奮翼逐梟鴟送宣撫輔之奉使日本恥署隨人紙尾名要陵絶險得英聲精誠天日孤帆健談笑風濤萬里行海外尉他雖倔強漢庭陸賈更忠貞片言要領來威表一使勝於十萬兵休矜積水怒連空利病分明合我從恃險幾能延世祚畏天長得保藩封九夷餘種難為勇三脊包茅亦易供己勑先驅東海若挂帆風順靜魚龍米鹽細務簿書叢安得驚人蓋世功直抵有名無路險招呼歷世不臣雄德音曉入太宰府降舶晚出扶桑宫却笑張騫無伎倆久持漢節老西戎送王僉事赴臺文武全材正氣生天教發越贊升平柏臺蘭省爭推引馬走牛童識姓名外內端人增感激貪汚姦黨死憂驚至寧朝野誠無事更賴嘉謨溢頌聲寄世昌僉事私託繁來書禁嚴欎陶千里共厭厭參商易地終相合瓜李無心也避嫌花結清燈空好暈喜鳴晨鵲漫虛占祿微歡奉慈闈壽别有髙軒待孝廉送陳按察僉西省事辛苦臯夔翊廟謀雨風時若百無憂全材妙選臨西極開府先封定逺侯天馬蒲萄成嵗貢雪山青海入邊籌細旃廣厦唐虞論未信諸羌得久留河西五郡實雄藩為地求人古亦難左顧北陲連壁壘右臨南服控夷蠻幾年天下無雙士今日軍中有一韓何待三霜詞異政先聲飛越賀蘭山自慚傴僂簿書叢喜見英材建絶功遭際真成千載遇瑰奇誰識萬夫雄霜鬐橫海吹髙浪雲翼垂天駕逺風一舉為人勳業了黑頭何害作三公不悲分手逺暌離器識如君更有誰文為經綸自溫雅詩無雕琢亦新奇疾邪奮發千鈞弩力學期為百世師明夜賀蘭山上月三千里外照相思寄耶律監司不聞正論踰三月夢想清光若隔年老去自知多謬誤人來毋惜示融圓暑寒尚不能同氣花蜜如何得兩全真是真非誰與辨俯慚枉矢偶當絃愛君晉字與唐詩客舍寒更入夢思春草池塘氷泮後微雲河漢雨餘時揮毫痛快沉雄手滿臆清新絶妙辭咫尺玉環泉下水濯纓歌罷浣離巵送御史誠甫之任姦邪屏息膽常寒霜簡朱衣鐵豸冠榮拜方將辭闕下英聲先己過江干三吳疲敝何多幸兩浙貪汚罄一彈此去豺狼莫當路柏臺翹首障狂瀾又寄康谷才御史邇來粗辦買山錢去作東鄰漸有緣必竟功名何日了懶陪桃李媚時妍不才無分封侯印生事終須負郭田月下敲門成夜話告間何必待來年又寄康御史聞説溪亭構己成未能輕易贈佳名才移藕種開花並新下魚兒作隊行玉立晚山供逺目鏡光秋水照間情卜鄰未得東偏地自笑年來塵土攖又寄王立夫侍御一别清光又幾年相逢應訝兩華顛騫騫奮舉君堪慕碌碌無成我自憐激濁揚清隨落筆復逃扶困勸耕田各從所遇身強健但恨西風鴈影偏送張教授還職坐掩齋堂再閲春寥寥後學閴無人空翻著述書盈几不啓緘封印滿塵志士百年良有道先師遺訓豈憂貧功名富貴宜從衆奚必眀經及搢紳送張肯堂教授廣平後生賢俊豈無人滿眼師傳恐少真莫訝進修多碌碌皆因訓誘失循循升騰髙邁藤依柏中正方圓泥在鈞吾友誨人能不倦廣平桃李一番新寄答許叔海教授二首不見髙吟二十年一時驚墮客窗前都將去國思鄉夢併在乘風下水船固喜松楸重拜掃只愁妻子苦留連因君喚起還家念北望荆山一慨然朔南萬里一車書何處田園不可居莫笑紇乾山上雀正同淮泗水中魚季鷹不為蓴鱸美江捴焉知鬢髮踈老去不同年少客年來吾亦夢吾廬順流東下立飛帆仕己那知三復三江水未能消客恨荆山只解聳晴嵐君為楚鳯翻來北我本燕鴻復在南四海為家有今日不應遲久隔清談歸潛洞嚼破人間世味甜終南佳處得歸潛緑蘿隂合雲封戶翠篠香生月滿簾酒甕四時常有醖火天三伏不知炎才名蓋代陶𢎞景未信清朝許退謙盤盤石磴夾松隂中有幽居避世深南牖陽和生澗草西軒秋氣靜雲林貴交廢務來投轄野鳥停聲解聽琴捷徑移文俱有誚好名索價兩無心答仲謀見贈打門人寄故人詩瀟灑髙情絶妙辭荏苒三年成久别殷勤千里慰相思清朝未遂同升願絶世能無奮迅時門外寒泉籬下水莫教生滿鏡中絲卷懷長䇿樂田園山擁垣籬水繞村茅屋倚雲詩獨詠楓林月落鳥爭喧器間圭璧人皆惜敬起鄉閭道愈尊祥覽相看好兄弟可能遲久掩柴門寄答王仲謀大器天留欲晚成斯須齟齬不須驚雄風未振排雲翅健筆先馳後世名俗狀塵顔人北騖間窗髙枕日東生何時淇水西邊路杖屨相從話此情答李昌道别來相望不相忘纍辱雲煙金玉章虛薄豈任多奬借情親不覺過深長有稽拜覆增惶愧無計趨承話肺腸唯有青天一眀月清光千里照相望四海文章第一流朝朝翹首望東州深巖老却千年柏枝指人修五鳯樓冠履從來多倒置薰蕕不辨更何求飯蔬飲水慈闈樂一笑比鄰為我憂贈答洛陽楊子中人生誰得洛陽田養志仍傳嗣子賢詩酒樂陪賔半醉鶯花喜共日髙眠韋編九絶猶窮易醬瓿三糊細草玄聞道孔林門弟子至今思慕日懸懸寄西巖張參議三年相别一相逢萍逐波流絮逐風得句倚樓空獨詠舉杯臨水幾時同自憐遊玩成何事常看歸心趂去鴻料得嵗寒亭下菊久思佳客看芳叢寄張參議一飯相辭便北來西山無計暫徘徊逡巡半百頭如雪奔走十年心似灰兒女婚姻何日了短僮良馬永相陪人生眠食無多事虛負生前有限杯題婁參議詩樹敏詩誰復似參卿百韻長詩一唾成格穩律嚴無長句句圓字巧有奇聲爛如時雨開新萼紛若秋風散落英笑殺推敲驢背客去留一字廢權衡武伯威持紙求鄙俚書此以贈為儒便合學真儒鄙俗先當力掃除間似孔顔傳道德用如禹稷佐唐虞權謀功利戕心賊訓詁詞章覆轍車留取壯年長日月細從語孟下工夫贈張子素聖學汪洋滄海深志哉顔子獨潛心斫殘萬石須求玉淘盡羣沙始得金細與琢磨成美器更加鎔錬惜分隂誰知洛下楊夫子應手鏗鏘起絶音贈杜止軒胸中涇渭自清渾舌頰春風笑語溫看破大方無畔岸恥居小節作籬藩百年放適詩千首四海交遊酒一尊醉眼天風吹不醒倒騎箕尾閲乾坤題新修州學壁守成天子擴雄圖郡縣巖廊半老儒己聽叔孫修禮樂更從陸賈問詩書弦歌里詠無殊俗黨序鄉庠遍八區亂後吾鄉有今日春風回首賦歸與送康御史謝病南歸共將口舌取輕肥獨捲談風謝病歸當路無由去豺虎駐車誰欲問狐狸暫回沙路青驄馬髙卧雲山白版扉留在胸中治安䇿青雲萬里豈無期翼翼爭飛喙喙鳴誰能無意貴公卿仕途自有熙熙業衆忌何須赫赫名借問鐵冠朱服夢爭如筠杖碧山情倚天長劒那間得暫向西溪看晚耕納涼赤日燒空萬里晴人間何處避炎蒸玉湖逺水波無際髙柳清風隂萬層靜境洗心無用扇新泉潄齒不思氷短童亦作槐根夢鼻息如雷喚不譍送參政西菴公總管覃懷柱礎眀堂足十年真心耿耿老逾堅引年不允三章請建節榮居百辟先士論民謡中外一天恩臣業始終全沁園春早東風軟花在籃輿醉夢前楊參政生朝濟為舟楫旱為霖四海蒼生倚望深六載中臺殘夜夢一簪華髮濟時心芬芳異政留青簡洋溢餘光照士林朝野太平無事日樽前難惜二疏金一身四海繫安危消患將萌世豈知守正弗回心似鐵愛君憂國鬢成絲浮言莫謗三緘口雅量宜為百世師千載風流謝安石佳名只合擅當時十月七日南簷負暄十月朝陽暖似春朔荒嵗晚得兹晨骨毛漸覺俱融浹几杖全拋一欠伸直以蕭條淹壯志却應和洽屬間身徘徊顧影茆簷下猶勝權門炙手人八月二十日夜半夢回夢裏辭家復到家夢回欹枕上天涯空庭老樹號風葉滿耳驚濤撼客槎祿食不醫家四壁旅情徒染鬢雙華只羞夢與妻孥語示我行階帶殼蝸客窗夢回睡才成夢便還鄉夢斷翻愁秋夜長圓月故臨羈枕白西風偏向客窗涼一官報國無多補十載離家有底忙不是風雲英氣少米鹽塵冗鬢成霜鄉先生樂御史八十索詩為慶汝水波翻沛水微老臣朝士晚星稀夢回故國驚南渡目舉新亭又北歸谷變陸遷有今日鶴長鳬短總忘機誰思更入非熊兆里社黃雞啄黍肥慶王狀元八十堅辭不允老而傳几杖恩光又十年勇折桓文匡故弊力扶周孔上經筵功成腳底非無地嵗晚壺中别有天丹竈河車俱棄物心空胎息自綿綿塞破乾坤享重名玉堂東觀又尊榮還家風采頭方黑開府詞章老更成因事納言全晚節引年謝爵見髙情香山如礪瀘清帶才與斯文作主盟慶馬雲漢七十葛巾藤杖曵長裾擾擾雞羣老鶴孤神貫陽精宜炯粹骨無隂滓更清臞白衣蒼狗從渠變茗碗棊枰足自娛兆入非熊十年事休將金鑷洗霜鬚古臺何處聊堪洗鬱懷東風吹袂落荒臺四年北寓人驚老萬里南賔雁又回故國溪山夢花柳異鄉鞍馬厭風埃黃金臺下如川酒自為蒼顔一笑開趙樊川詩不見英才杜紫薇樊川久矣失光輝江山秀潤豈終極人物風流莫厭希恨不同時成並駕却教異代得傳衣到今五百年來數竹裏重開趙氏扉氣味俱髙出處分勿因名實不同論誰知海底紅瑶露渾似南蠻荔子雲此日樊川趙宣撫前身唐室杜司勳談兵數論無人續正要瑰奇為發源長清晨起朝日行天又一周滿庭詞訟己啁啾十年濁亂成凝積一日澄清豈易酬當路豺狼雖暫息倚墻蛇蝎未全收登車攬轡平生志奚避姦貪笑白頭寄張左丞相公書呈禮廢三年久悚息心為百愧生鑑照愚誠無變易寬容踈濶賴髙明險夷純一人爭羡進退雍容世益驚中統大臣今有幾好將餘論贊升平張右丞生朝同諸學士賦夷險紛更志不渝英襟霜凛抗姦諛恩非己出怨何有議以公行私自無海外春和均煦育席前夜半幾都俞等間莫作求身計才入升平萬里途贈方奉御彥通雲龍風虎會昌辰聖子神孫結懿親智若湧泉能慎密德如良玉更溫淳左經右史公餘晚假寐朝衣夜未晨一片丹心赤於日凌煙圖像恐難真滿耳英名二十年欲相親接念何緣豈期附鳯攀龍貴偶到荒城野水邊不鄙腐儒垂欵曲恨無長䇿久留連天庭若問人間事萬里農桑願力田送丁郎中致仕南歸貧困多因血氣衰先生抗志獨辭歸急流勇退非今少未老甘間自古稀祖道杯盤從落寞懸車門戶儘光輝叔孫禮樂蕭何律孰與朝廷證是非安車起就連三聘致仕堅持罄一辭建白更張多有法始終進退兩無疵一時故老存公論七字新詩匪我私十月南方木搖落東籬正及傲霜枝滿面車輪馬足塵龍鍾傴僂擁朝紳誰知苟祿尸餐日却有辭官抗節臣賢路不慚妨絶足囊金儘可待嘉賔後來縱有懸車請終是清朝第一人田訟有感井田既廢開阡陌萬古交爭啓訟門朝盛暮衰頻易主吏姦文冗不勝寃務開務閉冬連夏人是人非祖到孫塞破縣衙重足立草深耒耜倚荒原户差有感租庸調外事紛紜版籍胡為故不真貧重富輕猶黽勉彼逃我代實酸辛身亡户絶鬼應役婦寡夫鰥名纍身篤疾髙年休赴訴無窮寃抑向誰申適安堂霜滿朝衣塵滿纓幾人坐享素侯榮起居隨意無朝暮寵辱忘懷任醉醒翠幕蘭蓀柚杼織碧梧雛鳯讀書聲題詩自笑謀身拙俯仰隨人又七齡虎符銀印照門闌夢裏驚惶膽自寒眀斷急流能勇退此心無日不清安喜同李願來歸早暗笑韓非苦説難前日智囊髙閣起團圞兒女勸加餐命安齋睡起詩洹水秋風一草亭先聲塞破大都城直宜矯矯勞三辟未要區區效一鳴士賤堪羞拘薄宦人間難得是髙名年來久動還思靜俗狀塵顔己半生十月十六日移居新都僑寓移居第四遷慣移無地不怡然依依不捨間書史戀戀相隨舊席氊連雜市㕓成擾聒奔趨官府便呼傳掃除蛛網安牀榻留在蝸牛帶殼涎侯門甲第屢更張賃舍那能計久長今旦國忠籠馬廄昨朝李靖孝思堂幸從民屋容黔突猶勝僧窗強借牀莫道十年無所得家書收貯滿囊箱一作家具須當借車載十年安信滿囊箱趵突泉積厚源深伏洑洄何年擇地擘山開石根怒激亭亭立海氣寒催滚滚來正喜茶瓜湔玉雪只愁風雨湧雲雷塵纓汗服初公退野友來臨共一杯走天河漢繞天周一脈分差此逆流比藉浮雲未成雨要令天地便行舟六隂積氣噴無盡萬里溟源不可求巨浸稽天行潦水朝盈夕涸亦堪羞何處伏流幾萬里擇地於此再發源借口卧龍噴雨雪開關寶藏泄瑶琨髙能潤下洪濤逝陽可兼隂沸浪喧流澤不煩天漢水洗兵蘇旱淨塵昏送樞參婁公行并序僕赴官太原前樞參婁公杜門鄉居以詩酒自娛纍以佳篇見貽每篇大者百餘韻小者不下五七十韻二年於兹過數百篇自愧魯鈍略無一字相報謝今兹奮然有京師之行不免搯擢腎腸得五十六字以餞行軒以答積年勤厚之萬一云辱貺佳詩數百篇逺行寧忍淡忘言人非至聖誰無過事屬明時獨感恩每誓真心終報國佇看老鶴再乘軒朝廷親友如林在十手連茹百手援送子卿都事之官單州妙齡得路便青雲脫頴都司逈出塵儒術審權精吏事仕途橫槊張吾軍隨朝日月憐多苦典郡麾符合暫分一曲鳴琴堂上操要從千載接清芬至元四年重陽登荆南城樓樓名河山萬里荆南十月始知秋間上河山萬里樓吳楚微茫平野濶夔巫開豁大江流宜將緑酒催清唱勿問黃花笑白頭佳節易過人易散一杯涼月更遲留隨人紙尾書銜畢聊為佳晨一舉杯彭澤不須求渺莽龍山還喜見崔嵬詩從江水聲中得目到吳天盡處回三楚六朝無限事同歸野馬與塵埃秋日憶故園石為心思鐵為腸底事年來易感傷十載悲秋長作客滿簪華髮尚為郎侯王大拜雖無分州郡徒勞不可忘遙憶故園親種柳緑煙和雨鎖新涼華不注山歷山巖壑儘雄豪平野孤根逈自髙脫海青蓮明寶供倚天翠鳳理雲毛三周勝負兒童戲萬古西東日月勞不大隂深不艱險好營别業結雲巢渺渺平波菡蓞香一峯嵐玉起中央青蓮出海便千尺翠鳳叫雲今幾霜罨畫樓臺資外護芙蓉城闕借清光最宜金碧屏風逈流水桃源白晝長女媧補天鍊雲腴偶遺一峯投齊墟不依亂石徒相雜直矗平田只自孤朝聞九合尊王誓夕閲三周斬將車問著興亡淡無語夕陽寒碧上城隅題趙伯恭母八十詩卷子服慈親德業昌母因子孝壽延長九旬更比八旬健十世流傳百世芳玉茁蘭芽供几杖錦章綺什盡賢良恨余袖乏平原手大字真書戲綵堂送王子勉之關中齊課湧為天下最西南超拜虎符金盈餘固自紆長䇿舉斂由來非本心鹽價貴髙秦俗苦糧車艱澀劒關深更揮鞭算亷能手洋溢清光照士林立法征商自賤夫止姦抑末計非踈一從𣙜酤求豐利誰與財源論復初専拜度支領鹽鐵細分緡算及舟車羡君獨有匡時策公帑曽增民力舒八政無如貨食先幾人心計更知權不因掊克民稱疾却倚公清事不前向日是非聽物議邇來亷幹獨君賢殷勤調度邊兵廢開闊西南萬里天寄申同知聞説軒車倅廣平士農工賈總聊生即今鑿井耕田樂他日攀轅卧轍情亷政共誇喧衆口豐碑會見著佳聲去思一頌誰能辨未信龔黃獨擅名十五年前識舜俞於京師後以宦遊不復聚首舜俞今知濵州相去不逺邂逅有日退食之亭扁名多月託義卿來求詩故有是作不羡元龍百尺樓玉壺窗戶桂香浮脫巾萬里星河夜滿意一簾風露秋照我舉杯何坦率回頭顧影笑遲留明朝赤日紅塵底吏案來前午末休幽人涼夜兩相宜庭宇寬間月落遲杯盡壺傾三鼓後坐忘喧息幾人知池蓮寂寞香時送窗竹蕭森影緩移風味淵明惟李白可憐異代不同時和教授兄韻墟墓興哀宗廟欽斯人千古不磨心涓流積至滄溟水拳石崇成太華岑易簡工夫終久大支離事業竟浮沉欲知自下升髙處真偽先須辨古今送韓廣道之燕求仕仕路寬容十二車安仁何苦賦間居俊才自有連城價美譽何勞薦鶚書祖道鄉人爭餞送到京朝士共吹噓豈同常例論資考一舉青霄更有餘送王艾琬求仕白首窮經漫苦辛片言中節便青雲羡君落筆文如錦抵掌愚儒甑滿塵儘看英才駕奇氣更將長䇿張吾軍何須吏部門前去富貴從今恐逼人雨不必多及時者為甘霖五月十五日夜半急雨破夢喜而不寐得七言律詩二章積水盈陂復滿塘麥秋已畢稻抽秧年豐有望村村樂農事無妨處處忙行旅不賫長路米有司申葺萬斯倉緬思喜雨亭中客一賦於今字字香但使貧民無缺食不辭破屋屢移牀亦紀實也秋冬不雨到中春壠麥黃芽起旱塵輸販乘時祈湧貴賤貧無䇿救飢民誰知一雨連三日走逐羣巫謝大鈞愚俗豈知皆帝力年年豐稔太平人寄李運副礦山燋阜熾紅爐魯縞齊紈走販夫袖手計然三致富笑人浪走百狂圖鶯花南陌饒心賞鷹犬西山足自娛肯慰老懷多釀酒到家彌月恣歡呼和杜茂仲韻因以勉之長松千尺不凡材大匠相逢用自諧貞節要經風雪苦妖容恥與杏桃偕萬牛回首難為力百鳥和鳴識此懷顧我期君久如此可能黃髮老寒齋妙齡光景日升東莫學衰翁老更慵吾道如絃當邁往異端小術不須攻掩關却掃終身計舉足追風萬里蹤用舍行藏聽天命不妨種子作髙松萬秋節大燕萬國圭璋拜紫宸八荒同染御香新河山覆際乾坤闊草木恩霑雨露均聖子神孫森玉樹虎臣文士曵朝紳日車烜赫中天駐聖壽宜過萬萬春聖壽祝辭海南遺老祝遐齡要助嵩呼萬嵗聲玉殿珠簾雲瑞合金盤仙掌露華清百王起舞衣冠偉萬國來同劍佩明聖壽綿綿天地並年年酺飲樂升平玉露金風八月秋萬年佳節瑞煙浮光搖天上雙龍闕香滿雲間五鳳樓永日再中符企望與天同壽萬歌謳小臣願獻南山領長從衣冠拜冕旒退食自警看書才解細披尋心眼昏花力不任却恨少時癡騃態早無逺到老成心雖知改悔歸來晚猶勝荒迷陷沒深白髮似霜心似鐵公餘正好惜分隂送和之之官割剝姦贓四十年逃亡破屋帶荒田中天日月無私照六合風雷改化權烜赫外臺分數路肅清汚俗寄羣賢從今農里開門睡不聽追胥夜取錢寄常提領君璋還燕行李太匆匆厚意招邀愧未從去國離家非得已賞心樂事最難逢屬官身世真庸保自富生涯埒素封羡殺陶朱能潤屋日髙睡足儘從容佚老堂胡子行年五十有九謬任提刑之責故終篇有此聨佚老堂主人余不識也託昌道提學索鄙語故賦是詩人生七十老而傳舉世區區未息肩識破黃粱夢如此間梳白髮樂翛然四圍書籍千憂散滿眼兒孫五福全應命題詩還自笑衰年才讀吕刑篇白石榴開徹朱明畏日長絳英翻作雪芬芳氷肌玉骨涼無汗月殿霓裳洗淡粧帶露折來消暑氣倚欄看罷失炎光紅裙婢子那知愛擬寫清姿訪趙昌響篁扇應手清風滿意生隨風吹落舜絃聲吃喉解道不奉詔強項那能噤弗鳴頗似鏗鏘奏金石無勞吹鼓邁秦箏班姬幽恨詩難盡暗向騷人訴不平寄廉平章秋毫無犯誡狂貪清徹瑶崖及萬儋得衆豈多羊太傅論功奚下杜征南平生不識眀珠貴有口空緘薏苡慚按堵江淮農事了不妨書帙照黃柑題王指揮賜龍頭玉拄杖詩卷敬友王侯四十年忠貞志操老彌堅險夷武勇皎如日誠實始終能動天湯武得臣勞聖慮伊周他日出羣賢捧持玉節皇恩重靈壽何人可比肩即事感懷香通鼻息熟黃粱夢覺槐隂畏日長言直更當從欵曲事來宜道細商量莫將間筆添蛇足勿用靈名號智囊記取周生老成語快心事過必成殃挽杜止軒人生良苦百年身萬古雙眉不放顰巨眼仰天非正色歡悰無日不陽春神奇腐臭何多幸螻蟻公侯共一塵八十康強談笑了一襟收我淚沾巾答薑中丞拂雲歸袖謝華軒四海髙間靜樂園文雅風流孔北海賔朋雜遝趙平原得詩梅塢松窗下無意蜂衙蟻穴邊人道黃臺新樂府只容元李叩籬藩登禹城驛臺門詩赤日紅塵漿汗翻禹城門上一慿欄邑居户寡市聲寂驛使人稀傳吏間暫喜得涼思困卧却因馳驛強加餐舉頭忘却炎蒸苦放眼東南看泰山重午前一日新居寫懷六年清潔玉堂人不識喧囂市井塵明月良宵深院靜緑隂晴晝大槐新輕間責任驚憂少枯淡交遊語話真今日黃粱炊竈畔戎夷胡越共為鄰靜坐萬變來前不動心湛如秋月自清深兩岐白黑朝還暮六合塵埃古到今海市蜃樓更起滅風花泥絮幾升沉邇來世味俱曽嚼一刻間情抵萬金送王善慶北行呈侍御飛卿壯年飛奮經綸志千里懸懸父母心固願便親供養米敢為躍冶不祥金無施不可才堪惜較短量長議更深自有栽培桃李手嵗寒臺柏貯清隂趙留判八十田園成趣子孫賢致仕歸來又十年驚見時官皆逸進怕臨鄉飲少齊肩體癯神旺人爭羡虎伏龍升别有傳今嵗籬根種松柏更從毫末見參天州廨瑞鳯圖瑞鳥千年不一來天風吹翮落山隈物難常見宜為怪祥出非時反召災照耀丹青遺影在扶搖九萬斫雲開摩挲石刻求真迹風雨無情漬緑苔趙公泉泠泠清瑩細涓涓灌徹園蔬到藥田抱甕澆畦慚我拙發源成委羡君賢靜留明月浮丹桂深鑿方池養碧蓮石爛海枯千萬祀佳名才喚趙公泉趙侯智士喜流水自親畚鍤開雲根源髙潤下恩波逺勢阻宅憂地脈尊不用桔橰忙俯仰肯隨杯勺便清渾等間只放潛蛟勢只恐雲雷半夜翻奉和耶律監司柳溪别墅韻市聲己逺溪聲大萬柳風煙出奇態上客華筵罨畫中錦韉玉勒鶯花外人希召伯播清風樹比甘棠有遺愛山城燈火夜歸來竹馬兒童引飛蓋長清縣作府州司縣無良吏詞訟紛紜千萬端鶴短鳬長誰與辨涇清渭濁兩相謾經年纍嵗隨衙苦虐寡欺孤飲恨寃按察徵眀隨馬去倒懸急轉幾時寬得雷董二公書因以成詠兼寄舍弟紹明日月昏冥四十春天開英主御昌辰聖功神武雄千古德化人文燦一新草木自今多雨露乾坤無復混風塵友于為記情親話壯嵗聲名要自振塔吉甫透月嶺仲謀作記并詩久聞塔氏蓄奇峯一記形容在目中奄魯跨齊盤泰岱千巖萬竅倚崆洞蒸騰雲雨神功具限隔晨昏氣象同正笑莊生齊小大又從絶頂月生東寄子勉分手盧溝又嵗餘别來不得半行書虎符未攝新交密雁字先從故友踈渭水緑波晴艤棹樊川紅樹晚停車從教富貴相忘久時冀人來問起居輔巖王文甫堂南月桂花王氏堂前月桂花嵗無虛月不紛葩清香暗度如臍麝紫艷光生奪海霞盛暑隆冬從荏苒野桃山杏漫交加偶因草木求徵驗盛德如君有幾家寄康經歷國來萬事紛紜盡偶然棄非愚鄙用非賢風雲無路紆長䇿日月流光惜壯年蹭蹬蹉跎明鏡裏謳歌慷慨缺壺邊老當益壯英雄事何物區區負郭田寄文玉德貞樞府二經歷卧病荆南兩嵗過老來事業更蹉跎喜同疲叟西成樂坐閲長江東逝波粗著陳言消永日恨無佳酒發髙歌玉京親友如相問楚水楓林兩鬢皤弔鈕祜祿平章生逢昌運踏亨衢滿月丰神七尺軀氣壓萬夫輕一芥眼髙四海笑羣愚虎韜未盡羅英略台鼎重登籍逺謨惆悵冠軍樓下水作聲嗚咽滿江湖送髙書吏之大都儒術通方吏業公有才如此豈終窮輕張汗漫垂天翼穩跨扶搖萬里風同仕分飛傷眷眷草詩祖餞惜匆匆鳯凰池上休相憶告老將為田舍翁哀詩人楊春卿違奉清談兩月強豈期微疾作膏盲百年不為謀生纍一語無遺便坐亡閲世驚回黃卷夢騎龍還返白雲鄉從今窪下經行路忍淚慵過舊草堂寄張周卿監察拜辱佳詩報未曽癡鴉無力趂雲鵬稱譽過分徒增愧勤厚多情可服膺華月流空見顔色餘霞散綺慕才能年來鄙迹無勞問秃鬢衰容一老僧自貽間庭幽獨樂從容細細踈簾暗度風一曲浩歌時自悅數章新韻與誰同暑殘涼嫩髙空碧葉薄林疏晚照紅壯嵗本無經濟學正宜蕭散卧儒宫
