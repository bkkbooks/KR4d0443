body:
  text: 紫山大全集卷二元胡祇遹撰五言古詩歌風臺吕政毒四海弔伐良有人斯髙蠱胡亥匹夫可亡秦咸思出湯火誰能舍寬仁所幸遇項籍恃勇私一身三傑屈羣策五星聚昌辰人天苦兵亂一劒淨風塵歸來過故家冠蓋雜鄉鄰酒酣唱髙歌天日為一新除凶信英偉惜哉多因循猛士守四方以是了經綸挾書豈佳律速去誰汝嗔覆車宜改轍羸政胡可遵直紹夏商周建極明人倫長陵土未乾子死牝雞晨苟非天祚漢國步卒艱辛不循湯武軌不新唐虞民自是一再降晉武與隋文受命創業主處心當憂勤上以答天眷下以翼子孫勿謂功苟就佚豫撫嚴宸跋真率會圖古人重交遊文會以輔仁德業日修進分義日情親臨死生貴賤不改金石真一舉稱管鮑再舉稱朱陳今人有勢利性行本不倫朝為膠與漆暮為行路人美哉真率會可使風俗淳鄭國昭溫公德星聚天津藹藹十一人儀鳯映祥麟口吐堯舜語衣振周孔塵雍雍庭戶間四時一陽春洛人何多幸朝暮同鄉鄰想像此一時市井無頑嚚佳會不可見再拜畫中神登鳴琴堂故基吏以身化民民自樂循理善誘無惡言風俗日淳美春風和氣中周旋樂與禮不大聲以色絃歌而已矣宜乎聖師言許與稱君子我慙領郡符學道不修已區區終日間喋喋費唇齒民有不若德未免以鞭捶一時雖面革中心頑無恥循吏未可攀聖域安敢跂再拜登茲堂沾衣汗如洗哀第四子於濟寧官舍有樂即有哀無哀乃無樂人生非木石憂喜互纒縳所以漆園翁要使情愛割吾知固勉強此理亦不惡老牛舐犢慈天性不可削子夏喪其明乃爾自殘虐五十不知毁父母豈為薄聖教意良深此味宜細嚼我生失子哀纍纍不可脫人為與天命疑難誰判鑿要當自消釋中懷漸空闊老懷已索寞憂患何相陳十年失三子新婦偕逝傾百端自解釋不覺淚縱橫聚散固不免數理吾頗明余生命何薄明滅如風燈得孫近十人夭殞皆孩嬰二女亦成立相繼歸幽冥婢僕十五人飽暖壯且獰得疾即不救嵗嵗無安寧小術隂陽家空亡運使令若云禍有緣罪惡何貫盈報應不可曉哀怨何時平恐此皆偶然幻化難倚慿跖夀與顔夭一一誰稱停喪亡莫悲苦生聚毋過榮老淚不多得任運勿傷生慶王晉卿僉事母八十成子賴賢母揚厯貴公卿悅親得純孝坐享五鼎榮母子本一氣慈孝通神明有感獲明應夀母臻八齡起居亦強健儀訓尤嘉貞盛事耀閭里美譽飛天廷錫類化天下簡册有名馨母執即吾母拜慶舒中情但愧才品凡偉節難贊銘薦章豈無人史傳當自成母夀益延永子業益飛騰里門儻旌表願以慈孝名題雪堂和尚雅集圖主人學苦空虗左天下士衣冠固不同氣味本相似大道原于天至性寧有二小智徒自私汝非而我是短白映長紅萬象皆春氣甘苦齊結實總待西風至髙情悟兹理四海皆兄弟佳客實滿門亦起専酒食性理談天人遊戲到文字三生白蓮社千載修禊事公案又一新清詩挂名氏不知幾千年而復有茲會所欠龍眠畫風采發英粹詩像同刻石傳芳流百世方駕晉名流我言不阿比租無田井田不能復限田亦不舉富家連阡陌貧人無畎畝地稅隨推收控告亦無所賣者嵗不除買者積倉庾農人惜寸田吝惜過兒女忍淚立賣書誰憐此情苦看人耕且穫鋤耰倚環堵里胥徴秋糧催喚急風雨此寃誰辨明申部部不許訴天天何髙泣地地無語舉家欲奔竄飢殍因難阻茫茫天壤間何地為樂土七月望霖雨感懷客懷本悒鬱更值秋雨淫逹旦復連夜出門泥淖深目倦掩書坐簷溜聲浪淋稚子來隨仕孤悶不可禁伴我如枯禪相對靜沈沈千里故園路一掬他鄉心今晨七月望佳節世所欽麻榖薦新祭兒女連袂襟遙遙應相憶念我嵗寒侵秋衣尚未寄婦姑勤暮砧豈知長安客宦情雪盈簮男女願家室獨我如商參積隂天易暝四壁秋蟲音石硯屏有序至元十一年客太原得石硯屏髙不咫廣不尺粗見文秀如山形樹影以謂不足珍玩置之篋笥又七年家居無事整緝編簡之散落者復得是石於其中反復把玩若可愛者然而未敢必其天成人偽也滌去塵垢平以礪光澤以砥拭而視之涸隂沍寒中雪山明滅山下老樹根幹而枝樹外山根土坂逺近髙下濃淡位置姿色元氣淋漓溪光掩黯若為寒雲宿霧蒙幕者文華無面背石皆表裏洞徹噫造物之巧無不有無不在人見其外而不見其內見其發而不見其含蓄感而為之詩蟠塞天壤間名山幾千億神化興雲雨秀潤藏金璧竒獸雜珍木聖哲不盡識兹石一何異髙廣不盈尺天地與海嶽納影無遺迹孕秀幾萬年元氣尚蒸濕乃知造物巧神妙不可測問道何所在糞壤及瓦礫無小大美惡孰能少隔絶人出萬物表胡為自戕賊發我雲漢章眀我天地德我心無不有無徒玩兹石題飛狐王國寶南塘圖楊郎中徴詩故也人生行樂耳每恨不可必紛紛守錢虜蹙縮死寒乞披圖玩南塘奚啻千金值華屋麗飛甍溪亭疊危石名花雜珍木蔥青光照席舉杯桃李隂春晴鶯嚦嚦放舟芰荷香涼月不虛夕婆娑溪上影醉袖天地窄我知主人心默悟駒過隙子孫幸能家樂此自恬適愧無良題評璀璨悅佳客千里來徴詩鄙語不容惜白日戰黃塵翛然脫羈靮悠悠想丰姿雲山阻平昔我詩非竒詩風期得情實屬君磨南山大書復深刻異時過君門洗耳溪流碧題閔子祠碑隂聖門七十子入道何殊形善誘亦善學各因其所明柴愚與參魯一唯豈徒譍賢哉子閔子以孝趨聖庭直差顔子肩竟以德見稱孟氏具體賢至論豈阿情區區季氏宰何物來纒縈餘光千萬載炳炳垂日星我來拜祠下豐碑刻新銘烏王二賢侯為政知重輕坐令此邦人務本羞徑行大哉堯舜道始於事父兄前題古人嚴事神報效勳與德叔世僥幸心妄為禍福惑祀典久衰訛淫祠委叢立詭怪雜凶妖巫覡增蠁肸西鄉簫鼓喧東社羊豕集有司不知禁敬奉翻踧踖坐視賢聖祠風雨摧破壁我登閔子堂拜抃三嘆息厯人知敬公于公定何乞悠然汶上行不忍汙僣賊親踈無間言至行貽世則二善能效公厚福非神錫在公何虧增齊俗粗有識南山細如礪尚作麗牲石安氏孝義詩卷孝弟本良能教衰俗乃惡周秦均此民厚薄何寥廓父子雖同居井竈異㸑鑿於斯有人焉內則無愧怍羣雞正爭食蕭然見孤鶴門閭獲旌表詩詠滿囊槖携卷來乞言與善敢他託欲知義利分子孫慎所學庶幾孝義心永永不衰薄跋宋徽宗自畫詩意圖展卷執筆微吟深思作詩本言志而况于大君一日總萬幾安可同騷人識慮不深逺憂禍從厥身琅琅勑天歌萬古宜書紳題王侍郎子字説詩卷并序近世父名子師名弟多誇美而少戒勵以致子弟驕矜自得不知其職遇長者父執則昻然與之並行事官長則侵忽陵犯此固稟賦氣質之偏亦為父為師者姑息許與太過耳今觀提刑王公為侍郎王公之子命名立氏之説其髙於流俗逺矣蓋亦熟知其父教以義方所以求名之意云成子良有道取友宜慎明為善與為惡皆是朋從生庭訓固諄切出門孰偕行一暴而十寒良苖豈能榮王侯作字説照見叔世情要助義方教反覆何丁寧我詩贈元益此語宜服膺謝絶奢淫子結交皆老成日見所未見日聆所未聆才學念增廣器業自堅凝幸為名父子有善易飛聲世胄門第髙舉足趨天庭不為賢牧守定作貴公卿題田經厯夢諸葛武侯詩卷一心生萬慮善惡影響從琅琅夜氣説萬世同禹功人為氣血役百年昏寐中夢中復説夢自盲還自聾殷中夢傅説孔子夢周公吉人常夢吉凶人多夢凶吉凶果孰召此理詎難窮田子晚知學有惡能自攻一念或少差中慙靣生紅出口擇邪言立事逺邪縱心誠得正夢若與神仙通顛沛不由徑要與正人同題義商詩卷為富多不仁况復市井身天資苟超邁薄俗不能塵利者義之和憂道不憂貧人能踐斯言萬金同一緡張許二商隱氣宇髙絶倫臨財能乃爾汗背讀書人跋孫尹逐山魈詩卷五祖治即墨下車逐妖狐縣人以為神祠碑照城隅一正懾萬邪此理不可誣孫尹亦良吏小魈逺逃逋想像宰邑日政與常人殊嗟今守土官心術何﨑嶇坐為姦吏謾黽勉同贓汚人妖不易治隂邪豈能除判筆孰傳神幾度鬼揶揄題理宗書晉武唐太宗健筆如飛龍一傳至孫子蠕蠢食葉蟲乃知氣盛衰雲泥逈不同宋自宣政初宸扆人已空南渡百餘年苟延蟄坯封不聞嘗膽苦尚求書翰工痿弱如病女㺯筆無慚容一時阿諛子裝背錦纒蒙惜無栁公權拳拳納深忠祖宗儘神武定亂甲躬擐後嗣何懦孱把筆氣消散蛙坎吳山宫魚蝦海腥爛北顧豈無事區區學書翰精妙到鍾王能救將肉袒所得僅如此不滿一發歎我知帝王書天章燦雲漢隻字落人間神鬼亦嚴憚豈同間適人揮灑一銷飯題解州鹽池詩人生須五味口體乃充悅甘辛與酸苦不備非所屑惟兹鹹鹺供有口不可闕我行濱滄野煮海力疲絶中原腹心地有此大寶澤每當三庚暑風火戰凝結溶溶鴨頭緑倐忽百里雪聚積千銀山投集不再月瀚海分一杯歲翻億兆舌隨取復隨平萬古永不竭我謀夫誰從一二迂濶䇿黃流通百水一一具舟楫太行開坦途夜黑見車轍所及無畔限工價隨例撤圜池樹帑藏山立得金帛跋栁公權帖文章即情性骨徑栁誠懸心正筆乃正百世歆名言婉順避顯諌不取訐直愆此幅出居憂哀感心拳拳奚暇工點畫觀者無求全讀易堂偶題大氣舉大地升降三萬里氣出則地落氣入則地起地落白晝長地起永夜晷呼暖吸生寒氣機自能爾聖人畫八卦知者世有幾洞見神明德悟悅變化理一隂復一陽其勢不容已五行而萬物一源分萬委隂處二陽下巽伏而風靡陽居二隂下雷震安可止隂居二陽上兑澤不勝喜陽居二隂上止畜不移徙二陽包一隂附麗火終始二隂藏一陽從盛而為水隂陽互為根中乃其根柢三隂與三陽父母未生子八卦再交錯萬類無窮矣後樂堂為亷相題憂樂人孰無小大各殊職野夫憂百畝嵗宴有餘適皇皇萬乘相憂虞何時畢禮尊庶僚絶祿厚萬鍾食入朝覲天光宸扆賜顔色出朝坐廟堂百司候呼叱崇榮既無倫重負胡可釋四海係安危九朝資柱石所以賢者心了不事安逸報君寧有身盡瘁猶汲汲一夫不獲所深夜時自責廷爭宜有言惟恨無百舌惡能同括囊得計樂緘默大政宜力為朝行不容夕奚為持兩端首尾生畏戚不憂讒詬傷所恤公論直不求百年安萬世恥慙德視財惟恐多安忍復豐殖淡然李文靖欄折不加葺視權惟恐危安忍矜自得儼恪王文正恩不由己出挺挺一范公立志寡儔匹慨以天下任百姦潛屏息徂徠良知言直擬夔與稷至今勳業光烜赫奪星日一片憂國心照耀雲水白我朝賢相君奕世扶王室英姿百鍊鋼雅量雲夢澤經學造精微義利分白黑宴居蕭然士漠不見豪習翻翻書滿几燦燦琴在壁客來談古今義理窮得失上虞衮職闕下憂萬民瘠虛堂名後樂舉目成感激范公心可師異世幸親炙范公才可學烈烈踵髙迹匪同好名人門楣取華飾大勳豈易量燁燁髮如漆致君唐虞上有志不難必三年登公堂拱默慙侍席謹掇士論餘作詩聊紀實冀正甫需軒詩人挾剛健才見險不能止暴虎而慿河夭橫不知悔季路升堂人竟不得其死昭昭需卦象少忍須臾爾八月輿梁成亨途日千里誠悅堂父母愛其子常憂過與疾孝子知此心栗栗恐失德承意先志外持身日嚴勑言行兩相顧至善以為職晨昏問起居親顔有愈色居官服難事父母不戚戚登降誠悅堂庶幾心自得題鄆城湯鼎臣汲古齋人心隨俗移趨向竟汚下一聞談古昔愕睨雜譏罵恨恨不下達鬼域日欺詐知利不知恥犬豕同椸枷倡優所不愛百辱百凌跨有客携客來從容聽言話喜與端人交俗語口不挂母夀近百齡溫清日冬夏結茅號汲古法書映名畫再拜求詩文與潔喜不暇古人誰復言古轅誰復駕市井得斯人失聲發悲吒厭氣堂望氣不經見此理誠有疑日月與爝火小大異光輝大人虎文炳君子著威儀焄蒿與昭明亦各從興衰四百年炎漢禎祥豈細微人而欲勝天巧詐真兒嬉周德亦已滅寧與吕不韋積惡如丘山殺人血成池此身得苟免僥幸不自知荒臺如廢堞千載未平夷詬罵貽萬世駐馬一吁嘻聖人有天下此心了不與天位惡能私萬世獨我據王氣誰使然乃不畏天怒吕與羸何親天已開漢祚淫刑血四海尚可踐天步借問壓勝臺何如羑里庫王者不可殺徒為速衆怒七廟寒無光獨夫尚驕固子戮國亦亡何暇自哀悟我詩貽後人永監秦車覆題鹿庵書書法立氣韻點畫乃輿𨽻一將誠鷹揚萬卒自精鋭後人學顔書區區較形似問渠胸臆中有此忠義氣假尸以反魂體同神已異鹿庵氣髙邁心畫能徑利追蹤瘞鶴銘安肯求妍媚世無涪江翁誰人作儕輩已來四十年書學坐衰廢惟公振英風進道仍進技方蒙提耳訓冥鴻忽飛逝千里遙相望撫卷增歎喟安邑尹申子遊山圖申生閥閲子宰邑頗幹局公孫喜間談不為聲色欲樂哉遊山圖盤礴膝橫竹丈夫當妙齡經濟志宜篤懷才值明時秋風送飛鵠胡為慕村叟煙霞友麋鹿汝心吾再思要享知止福凡人居富貴貧賤使可復終勝無恥人龍鍾竊官粟題張和卿舒嘯亭人生作卑官屏氣不敢息趨迎事官長呐呐伺顔色所以靖節公拂袖辭祿食曵杖東臯上舒嘯天地窄寥寥千載後何人踵前迹螺山依雲深汶水照天碧詩成一長吟涼月送佳夕南呼公孫和一杯可用吸微風引和聲杳渺穿雲徑踈篁搖輕煙醉夢亦蘇醒月明河漢傾空山有人聽閏五月朔移居遣興厯遍人間事見徹天地心動靜互摩軋萬物何林林巨細隨賦稟善惡從陽隂一受其成形有我古到今六合一傳舍生滅萬浮沉人生百年物行路日駸駸貴賤與夀夭彼此不相侵分限前我定人心自邪淫強健升平日有酒當自斟八日旬休端居簿書雜詞訟紛擾無緒端剖決乏明敏昏倦生憂患皇恩憫疲憊旬日一休間翛然掩關坐元氣徐生還官事豈易了旨哉意外言治郡甫半嵗吏民未相信忽驚除書來改拜憲使印憲司主擊彈不才慙魯鈍貪汚在在同寃抑積成坌我無片言敏一一費窮問非道固難欺巧詐不易訊無私自生明羣邪莫逃遁我心如止水妍醜何勞認我心若權衡輕重自退進毁譽非所知改過吾不吝草堂獨坐飛飛出林鳥曵曵還山雲鳥出固求食雲歸定何心往還不暫息萬古以至今勞生三十年歸來雪盈簮靜坐觀萬變造物何長勤辛巳九日草堂獨坐佳節豈不多賢者愛兹晨我思古人心發興良有因孤芳止幽菊陽鳥來自賓過此屬孟冬肅殺非陽春豈徒徂年悲白髮日益新有酒不暢飲奄忽同一塵千載諸我友悠悠柴桑人郭西草堂獨坐古人事道德今人憂賤貧富貴一朝得患失不顧身身名兩俱辱種種同一塵余生千載後風期與誰親所幸愚且拙不獲乘要津緬思淵明賢投紱事耕耘秋穫雖不足掩關樂天真移竹出髙笋種蔬日芳新披襟北窗風天逺無纎雲悠然一長嘯孰為羲皇人因反葬還鄉僦舍以居面南山獨坐而作京塵二十年耳目厭紛競今年遂歸來山城樂深靜十室九親舊情好足成敬往還無將迎語話絶諛佞舉足皆坦途不復憂機穽但知平易歡孰羡才華盛人生粗溫飽安用聞時政緬懷居微官心體交相病窗涵倚天山門掩緑蘿徑好鳥鳴樹巔似與吟和應心從無事來西日覺遲瞑讀書既少通奚必逺求正一琴靜無絃無意求人聽移文不須來茲心久已定白髮還故鄉亦豈要時聘一杯對南山滿引時自慶王經厯恆齋詩易經雷風恆象義甚精究六爻五凶羞聖訓豈誣謬恆德何鮮能不恆自貽咎髙齋揭茲名命意亦深厚朝由仁義行夕惕惟恐後終食不違仁月將而日就常懼名過實一失不可救靡靡衰薄中得此拔華秀所以天下士贈詩如輻輳我言何輕重謹讓羣英右乍作而遽息每每陷茲疚見賢思與齊援筆不自陋草亭隱几詩發土築垣墉坎深作蓮池種蔬平凹疊因髙為亭基親友笑荒陋童僕不告疲遊觀與栖息我心愜所宜清風送佳月細水生漣漪茅簷不尋丈坐與浮雲齊題朱晦庵周易橫圖伏羲畫八卦萬象已圓明文王八其八注解己丁寧又恐人不悟繫辭仍定名周公何殷勤每爻言庶徴孔子繼三聖披閲極精誠細疏作十翼廪倒而囊傾所恨王輔嗣四聖為一經讀之使人迷不見賓主情賢哉子朱子復還舊畦町探原寫橫圖始終一筆成一隂復一陽七級得全形首尾皆自然安用口舌爭退食自責憂世復憂身無病欲成疾舉杯不歡飲對案不甘食人皆日欣欣我獨常戚戚感激一飯惠圖報等深德意氣一然諾履信不可失十年受國恩舉家不耕織有生俱皇皇闔門享安佚澤民昔自負不聞一言直論兵嘗自賢開邉默無䇿書生例空言素學當再習公退有感黎明入官府問米鹽細務簿書堆几案過午仍判署王事有程課日月敢遲悮但恐致踈虞困憊奚足慮退食例申未有時沾薄暮解巾僦舍底塵顔髮垂素飯餘推枕卧夜短天易曙妻子隔千里八年苦孤寓祿食豈不榮弱質困馳騖仰慚經濟才萬鈞不勞負談笑天步清謦咳民室富勳名紀太常軒蓋沙堤路華屋艷神仙八珍不下筯賜豫快恩賞誅鋤酬怨怒才命各有分無為生怨慕退食靜坐看書才識弱濟世權分卑人生未中年飽食將何為嵗糜太倉米報效無毫釐偷安固自便謗責將誰歸趨朝署紙尾公退掩柴扉有舌戒莫捫有心廢深思流光何足惜永嘆傷明時四月十一日靜坐人皆厭間寂間寂豈容得散步既少倦澄心坐自息真氣忽我從心境一融適深扃隔囂紛良貴無儔匹開卷晤賢聖鄙吝悉氷釋雖非羲皇人聊爾免羈靮孰能踏紅塵蜂蟻同汲汲偶然感懷士無憂世心何異燕巢幕突熾幕既焚不救巢離墮嫠不恤其緯所以懼此禍可憐賈長沙痛哭不安卧公卿盡庸流百口紛沮挫却令主父偃爛額延上座靜坐有感人生本無事營營復區區朝為利所誘暮為名所驅畏途冒馳騁權門妄奔趨惡貧憂不足求富豈有餘天爵不自貴甘作外物奴所喪如丘山所得無錙銖下成妻子禍上連祖宗汙奴顔復婢膝赧汗沾襟裾殘杯與冷炙何異餔糟豬天地生萬物厚薄暗乘除與齒即去角二美不可俱付我以忠信飽我以詩書授受亦已厚粗不乏所須同胞億兆人凍餒無綀𥜗征戍百萬卒不如首丘狐余生負何德潭潭府中居有口若瘖啞有目如盲夫負罪不知愧尚忍貪膏腴有屋庇風雨尚忍求髙閭有馬不徒行尚忍思駟車息心安命分萬慮俱晏如宸恩同雨露四海皆霑濡諸子粗成立復我瓜田廬題薑節婦傳京父之妹商相作也羞惡志莫奪貞節以死守此心人孰無可暫不可久失夫失其天氷蘖成白首婦道得所安不為名不朽重令馮瀛王泚顙凝妻手閲物人生一何愚精魄常外馳入門嘆貧窶出門慕輕肥神為事物耗夢逐聲利飛朝遂僥幸志暮愧顛覆悲百事欲佳美一身不自持此身如舍屋主者當日治此心同主者有物當依歸屋空主不在屋壞主不知主人定何適狂醉寢街泥未醒輒復飲老死甘昏迷舍主兩傾散妖怪相追隨我心非苦空我言豈侏􅍣作詩聊自警神志常融怡題張公佐畫寒江圖黯慘發凝沍雪壓長江船崇山界天白僵木無春妍萬物歸閉藏地裂縮愈堅二老何許來醉歸傲氷天公佐亦竒士徑拍范史肩筆挽玄冥威毛骨生凛然會當六月火海沸石吐煙燔爍不可解展卷時在前題顧大夫詩卷醫工顧良輔持卷來求詩我欲相告教醫非我所知我欲相稱譽不知難為詞漠然還卷軸佳意不可違農皇去已久夭枉誰傷悲術訛殺天下人命如塵泥豈惟醫藥子牧民亦如茲我言非詬世顧生宜深思不經三折肱惡可為良醫王仲略之子持卷求詩仲希能尚友遺山善忘年草聖新樂章子孫宜世傳邇來風俗薄情以勢利遷漠然見父執手澤隨棄捐仲略吾世契有子乃爾賢迄今四十年墨光猶炯然秋澗題訓辭廣文贈佳篇不鄙賤衰朽千里來乞言乃伯辭理盡援筆還自憐願言通家好世世金石堅寓懷掩關誦醫方無疾不可治出門值微恙羣方坐虛費藥品非不佳術業亦深邃主人信且誠標本吻相對竟無一效功斂手默辭退天命固難明人事本不昧君子貴反身愀然還自愧自釋天地亦云大傾缺不平滿可能螻蟻軀一一必所願挑燈悲夜長攬鏡驚嵗晚古來大名下素志浩千萬未絶獲麟傷又起思鳯嘆經世愧無能著書復才短身安子孫賢賤貧從懶散書生慕黃卷愛玩倦復披蠅頭録細字兩眼成昏眵苦心入冥搜緑髮成霜絲塊坐尺椽下握縮同寒龜冬暖兒號寒年登妻啼飢尚云有真樂老死不為疲立言發新論聖道是耶非肺肝良苦心僅得招謗譏壯哉班定逺奮厲投毛錐生前志已酬身後名益馳一篇西域傳萬古功巍巍我豈窗下人久墮故紙癡立術當慎始既久不可移利百方易業此語誠良規萬事莫非命慎勿羞前為效李屏山狂童怪語釋老圖冥獄僅能駭庸愚六經語名教才得籠世儒一有不羈事蹴踏如土苴豈惟禍未及厚福集其軀天心驕若人鬼神將何如有感聖人善眀理理有不可必聖人善知變愈變愈無極古今夀且貴一一誠大德古今賤且貧一一皆鄙質成敗亦若是附會論得失萬事盡偶耳龜蓍昧前識區區賈長沙徒爾長太息祖父躋餘蹤却享五鼎食前題馬援因炎瘴還憶少遊辭東坡貶海南始愛淵明詩二賢人中英豈為聲利迷長才良有餘前途忘險巇猛虎墮陷穽飛龍困沙泥回首青雲鶴不落網罟機載瞻九霄鳯翺翔覽德輝緬懷四賢心誰是又誰非未就武成功寧食首陽薇前題氣機始一動宇宙不自寧一生復一殺舒慘為枯榮巨運已不齊萬類何能平未滿五千嵗已自差中星日月屢昏蝕河山亦枯傾乾坤時振裂星妖幾峥嶸較以句月間七晦而三晴大變不可數細異奚足驚所以人世間治少而多兵正氣未少蘇隂邪已慿陵端人杳粟芥憸惡同陵京弱肉強者食屈直誰汝明均為風化羽燕雀茹雕鷹均為水中物魚蝦飽長鯨始知氣運機萬古一紛爭區區名教言呶呶誰爾聽天道良好還一一相乘除始焉若太偏了不爭錙銖身居萬鍾富子孫乏簮襦暮為新豐客朝曵朝堂裾慶者甫臨門弔者已在閭莫喜無故福禍亦與之俱此身幸苟免後嗣將何如萬事明對待有目何昏愚自甘造物戲哀樂良區區就舍不失義禍福非所虞不見有道翁氣數不可拘不見輕世士語默樂有餘不為外物屈無往不安舒蛟龍一有嗜豢人能醢葅蟲蛾爾何物宜以燭焚軀題楊氏家藏山水橫幅畫師貴細密格俗失髙趣士夫尚簡潔云逺生意具天際得歸舟微茫見煙樹重嵓映幽居雲水自朝暮細路繞寒山還家人獨去吾鄉富此景未遂風煙屨題詩一噓嘻把玩洗塵慮題四皓圖漢髙或罵儒所遇非英偉前星一蕩搖良輩不能止邂逅園綺徒羽翼已成矣始知髙皇心未嘗不重士紛紛瑣屑材一罵已汙齒事定復還山世塵豈能凂彼哉魯兩生固陋竟不起遂令朝廷上永絶二代禮跋山谷書藁修辭立其誠下筆無草草尺牘亦細事謹密猶起藁後人何荒唐萬言一揮掃侈心誇敏捷自謂足妍好間窗明眼人咀嚼細論討萬山無寸玉棄擲復誰寶開卷愧前賢得名何太早自適作詩匪求名言情代吟嘯作字非悅人形寫胸中妙辭筆偶從心美惡忘譏謂人生各有嗜一一豈同調孰無功名心應時發輝耀自非瑚璉器惡得升廊廟幸兹謬通籍祿養離屠釣鉛槧老年華自憐還自笑無人靜掩關日永如嵗年不著牀下履凝然肖枯禪羣鳥何許來相呼鳴樹顛書帙盈几案閲卷時一眠欠伸還坐起簾影日西偏安得騎鯨客細詠坐忘篇題耕讀軒沁州韓君錫之所居也乃子來請詩遺山諸公先有此作有田能力食恥學官倉鼠著書澤後世不願隨人語長松北窗風踈竹南楹雨枕上羲皇人外物皆糞土自遣賜也不受命貨殖亦已豐回也樂安分簞瓢恆屢空齊在聖門下學術已不同莫訝叔世士隨俗論窮通年來墮遊宦年去風轉篷桂薪米玉地兩見燕雪冬旅進狂斐辭唧唧吟砌蛩坐看封侯人吐氣翻長虹我豈無口耳抱膝如瘖聾恥窺端木墻願躡顔氏蹤熱中不可作長嘯來清風跋徽宗所書千字文書翰乃心畫因外以知內羲皇畫八卦天地萬象備人文化天下聖功非進技晉武唐太宗猶足見英氣吁嗟宣和殿顧影求妍媚日與童蔡流瘦硬誇新製他日韓州行擲筆始知愧題惠崇瀟湘煙水圖惠崇煙霞人蕭散江湖身心與雲水一禽鳥亦相親物我共間適萬象同陽春愛畫非畫師模寫造化仁獐猿兩癡黠相戲復相馴鵝鴨雜鴻鴈遊泳全天真汀花迷岸草茂林連修筠風蒲霜葦外紅蓼欹白蘋物物自榮悴不知憂斧斤寫生得生意一洗俗筆塵我生亦良苦公廨困冠巾民訟千萬端吏罪如魚鱗訓諭不能息笞箠慘傷人對畫空自慙何時風俗淳萬類各得所同作太古民魚鳥亦咸若草木含芳新偶成人材應時須用舍奚在已所以掩鼻笑正恐不免耳生與噲等伍背汗增愧恥螻蟻既墮地未見寒餓死可憐奔競徒賤辱無不至蹴爾而與之乞人且不視無題此心本虛明百欲日昏蔽譬如鏡積塵不復加磨礪愈逺愈忘反與馬牛無異既無賢父兄學校久亦廢耳目所見聞倀鬼雜魑魅習熟為當然寧復知慙愧天道如循環亂極應還治英哉賈長沙太息更流涕可憐漢孝文苟且承秦弊茲時去古近三代良可繼失時而不為令人增嘆喟氣質苟不髙百為皆瑣屑趨向日汚下逐逐聲利轍年來省前非改圖當勇決堯舜至周孔八聖吾慕悅立德與立言汲汲追前烈求心即師友自語自磋切必待文王興庸懦非英傑松柏一出土便與蓬蒿别已見千尺姿從渠嵗寒雪五十無所聞固為聖人棄矧余已六旬耳目漸昏瞶雖逢庸鄙人謂我不足畏壯年不可追知悔當自勵倒行而逆施斯言何自棄莊敬可日強憤悱通必邃夀考吾不知力進王良轡夜行固云差失道苦不逺天明得正途歡喜忘呀喘我車頗堅完我馬亦強健白日雖過年僕御皆再飯周道直如矢良辰未晡晚聖域望九關觀光得吾願拘以形氣微與天不相似我心即天心人天本無二凡天之所有我無一不備克去形氣私量包天地外知化且窮神述事而繼志彌綸復裁成了却大人事衛青霍去病起身自淫奴所知勤皂𨽻何者為孫吳一朝當帝意總節持兵符出塞三十萬入塞三萬餘無人問二子方略果何如李廣飛將軍受制於庸愚敗死不封侯數竒良悲夫賈誼真英才王道乃素學孝文好無事欲為還齷齪公卿盡庸愚厭已忌超卓鵩鳥亦知天飛飛入帷幕不遇庸何傷王道惜冥漠朝誦論孟辭暮誦六經言臨事毛髮比一一皆差愆此病果何在不識我之天我天殊不逺性理即真源真源一淵靜動止合自然泓澄百錬鏡流行派萬川去月呼使君今月呼參卿而我竟為誰側耳隨呼譍貴賤不自持甘為世枯榮譬如畫家筆汙潔幾紅青又如築夫幹從人恣沈升人生豈物耳終老無定稱夢寐驚寵辱俯仰徇虛名稟受作猛虎一飽肉百斤脫殼為秋蟬饜飫風露晨二蟲各有適不知天地仁人出萬物表反自喪其真既羡晉楚富復傷顔氏貧物生本不齊安能同一均奪彼以與此怨尤徒悲辛顔淵問為邦樊須請學稼同在聖門中人品自髙下執一不知人玉石俱同價所以三閭翁寧死不廽駕胸中富義理肆口能成文區區既問學漫費綴緝勤余生過中年讀書頗有聞物外不眩惑少覺德性尊聖域固云逺循序亦能臻瞑坐惜眼力絶慮靜靈源四十無所聞安用贍空言毋貪文字名正坐蠧塵昏呫呫誰汝聞何異蚊雷喧書生太癡絶甘愛古語謾坐看青雲士龍馬乘髙轅秋風墮木葉蕭蕭走前軒嵗序與流水冉冉相馳奔好事得入手急行能幾多况復墮間散萬慮成蹉跎惟余誰作祟搜抉傷天和擾擾靈府間起落如翻波以茲銷年光寃哉雙鬢皤近喜蔬食故效淵明形影神相贈之什木借土為天人以食為夀精粗苟無毒隨遇宜即受鼻竅矜小慧愛惡辨馨臭舌本亦多事咀吮分薄厚交為心主纍梗塞不下脰鼻舌誇忠勤百味不易售枯腸殷雷鳴怨謗生訾詬四體隨怨尤癯瘁如在疚榮衛日枯澀毛髮復萎瘦心君不自安久乃悟昏謬坐為二子欺我思一何繆人生各有分萬鍾而一豆庾郎三韭貧何曽萬錢富夷齊首陽薇漢武上林狩豐約貴安命可知不可究以爾婦寺忠適足為吾垢才答命鐵利成名劒銅良作明鏡受才苟不佳莫致千金聘雖為愚瞽售究竟乃僥幸識者一過目捉擲糞壤並見棄誠當然寶藏諒非正顧我才不才何故為定命戲問正平求卜有感而作龜筮問前期前期豈難知只取已去日前期即如茲天壤一枵瓠百蠧分膏肥萬事亂無緒今古一棼絲小知良苦辛得失分銖錙豈知咸偶然才術將何為天公設權衡低昻竟誰特理有不可窮愈窮心愈迷去日何了了前途復何疑前非較今是了不爭毫釐髙哉靖節公把菊醉東籬君復卿契失明作此寄慰前嵗聞吾兄目疾既而又聞日漸昏眊不意竟至幽障以吾兄平日仁靜淡薄不宜致此亦宜順受其正寄呈鄙語情見乎辭子夏晚喪明羣友走慰哭不意我良友亦復遭此毒初聞驚痛心憂疑日三卜傳者審不悮老淚寫幽獨作書將拜問書成不忍讀恐傷吾友心置書塵滿幅愚計雲蔽日不久明當復誰謂嵗月深神光不容贖壯志宜自寬內視炳如燭髙情素深靜萬事不挂目鏡心自清昭受順耆年福送王文琬北行騏驥萬里足芻豆非所急志士百年心不在升斗食賈誼政事書王通太平䇿忠悃三愛君惻楚重憂國所懼非飢寒此志竟誰識此生何多幸乞言辱前席良玉宜三獻兩足不可惜去去持素學青雲展長翮勿為圖一官巡門不寒乞腹疾自警胃廪良有限口貪欲多有多欲無所容養生反招咎邇來得腹疾諸藥莫愈救自思致疾源禍腹以悅口口悅媚斯須腹疾係夭夀美味如佞人急拒已喜受所以神禹心覆杯惡旨酒養小以失大茲言銘不朽五月十四日晨起自警壯年懶讀書志與聖人逺炎炎競功利安佚事遊衍老來頗知味精力警衰晚五十三年非自愧足徒踐覆轍既知改白雪鏡未滿我心固非石堅定不可轉晚節得聞道往罪庶當免老懷期益壯滄海一蠡淺雨過路滑蹉跌傷右手自訟自怨而作老大氣血衰保護不充續胡為致蹉跌顛仆損筋骨腫痛色青紫百療苦餘毒呻吟三十日面垢廢盥沐緬懷樂子春下堂忽傷足自怨復自艾不孝那可贖行父母遺體忘敬自貽辱我今得此罪嘉言才三復從今一言動敬慎仍約束抑抑衛武公愈老行愈篤弗畏即入畏聖訓惜虛讀
