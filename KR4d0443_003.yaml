body:
  text: 紫山大全集卷三元胡祇遹撰五言古詩寄平章相公正夫苟立志自負期有成矧曰廊廟材所係良非輕可憐子房公微疴屢纒縈服食日節慎竟不傷和平志壯氣不衰終能保遐齡勳業千世後光與日月爭乃知命世才造物豈虗生黃金到百鍊然後見堅精我能却厚味誰與生五兵我能薄嗜欲何者為傾城讀書有餘力或可窮醫經為國當自愛鄙言出真誠寄張平章鼎不可拄車馬不可守廬所用違所長事廢身受汚牧民豈間職擇人頗荒蕪屈伏不為恥將身辦奔趨奴顔映婢膝自謂與世符偷竊供賄賂甘與貪吏俱喧爭肖羣雞錯雜同亂鳬中置一老鶴矯亢形影孤飲啄既相異飛鳴不相如未免生忌疾天稟不可誣豈無清溪水充飢足菰蒲豈無清山雲曵曵淡相娛塵網會可脫此志老不渝誰憐孟公綽黽勉滕大夫贈答王子淵幼年氣血滑得枕即成睡邇來一何衰既寤不復寐寒齋夜迢迢展轉擁衾被所喜得佳友對榻話相慰上論古先哲下議及當世訂定到數返朗豁發蒙蔽餘談及文辭歷歷舉凡例人生豈無友晝接暮分袂豈如吾二人親戚同比翼不因抱官囚此志何由遂已失羈旅懷愛悅那有既譬彼瘖啞人食蜜自知味三益不可忘况復辱佳製他年再相逢一笑成故事至元四年冬迤邐及春季作詩匪誇言聊以紀時嵗馬仲驤持紙索詩書此以贈平生無嘉言所作不留藁年來志已衰漫與尤草草應物隨遺忘寧堪挂懷抱長笑嗜詩人肺肝百搜攪區區好名心雕斫求媚好得句如得官窮苦甘衰老此心幸無事何勞慕郊島我幸脫此疾捫腹喜安飽可憐梅聖俞思澀費探討仲驤持紙來求詩大堅禱恨無草堂筆快意一揮掃書此自解嘲相對為絶倒贈霍秀才賢父子舉世趨近利晨樹午求陰例將賢子姪置身惡木林朝伴豹虎攫暮逐鴟梟吟結習熟貪鄙何者為良心所獲毛髮比所喪江海深英哉霍氏子好古不同今學為孔孟學俗儒非所欽優遊天爵貴不希帶橫金一言我相朂正學久消沉虗文慎勿作聖道日搜尋胸次富義理咳唾錦漓淋洙泗路非遙千載有遺音蘇旱或可遂滿袖傳雲霖贈劉道濟自聞道濟名於今踰十年不識道濟面懸想心茫然今朝忽相見久渴逢清泉何勞話平昔聲迹稔相傳苦學得深趣性理自一天辨論千古事水鑑臨蚩妍恥與俗士伍奮拔希前賢自負良不淺但恨天公偏喪偶二十載枯淡成癯仙父子夜讀書晨㸑寒無煙四壁倚甔石壯心窮益堅題詩窮勝槩忘歸縱留連名僧及幽士倒屐歡招延人皆見委順是未知君全志大惜未遂孤影成華顛嘗觀造物理否泰無定専物將亨於後未免空於前大器貴晚成不與細物肩皇皇聖天子選士窮八埏只今數時彥定讓先蕢先長才了經濟五馬乘華軒粉白間黛緑一一要君憐富貴忽相逼勿忘余知言贈張經歷丈夫貴剛勇應物宜中節義理與血氣善惡不同迹剛勇不好學狂亂交相賊失善而入惡背吉成凶德潛心聖門學體認何細密惡不遜為勇惡訐以為直惡居下訕上惡果敢而窒惡勇而無禮惡以剛成愎剛勇豈如是聖訓甚明白改過毋少吝見善如不及利欲莫能動威武不能屈大勇與至剛坦途豈難識舍彼而取此黽勉趨聖域寄王子勉侍郎劉生投京師意欲求薦章位卑人望輕安能助揄揚朝廷念知識孰信朴直腸騏驥奮鬛鳴顧我非王良呶呶百稱譽幾何不為狂我言一脫口反恐生雌黃仕途亦多岐有之皆騰驤譬如徑寸珠炯炯照夜光人皆知可寶安忍道路傍臺閣富才彥舉能秩所當去去振羽翮一舉誰能量答張經歷乞言友道廢已久諂媚相逢迎意氣少乖忤蓄怨生怒憎三益與三損取舍誰復明接際若膠漆機穽伏戈兵嗤愚鄙不肖妬賢而病能無先後貴賤把持復侵陵常使我負人百偽不一誠厚薄無定在勢利為枯榮習俗日薄惡鬼蜮紛縱橫經歷清河公刮目求良朋徵解索告戒庶作座右銘我師馬伏波格言常服膺朋友有過惡如聞父母名閉口不可道勿妄生譏評寧使人負我有犯忘較爭宗族稱孝弟忠順事公卿德如金玉溫氣若芝蘭馨所聞止於此清聽恕狂鳴寄子裕參議大賢不叢生大器不早成才學兩超絶幾人遇休明壯年復幾何倐忽如流星古來豪傑士賫志埋幽冥我輩何多幸筮仕逢升平有口得盡言有學不留行海嶽無可補祿秩春陽升共兜雖雜進奚損夔臯名元惡蒙顯戮端人整朝纓近來到京闕臺閣列羣英選材極精粹大厦安無傾天眷日益厚西北漸休兵元勳踵賢王無恙朝天庭聞説京師人喜劇默無聲聖賢復相合草木含芳馨人生值兹時菜食亦已榮致懇諸時彥壯心勿凋零寄張郎中可與頥貞高齋號頥貞斂袵難為銘不識主人面因名見幽情舉世愛春華何人樂秋成此心失正鵠無異波上萍客來話高義事事喜且驚汪洋萬頃陂誰能測沉冥洪濤觸砥柱困憊自東傾貞者事之幹學易良精明真積力已久氣以集義生正當服官政非君孰澄清豈同口舌儒文筆了生平何時遂願見再拜咨易經答洹溪見贈先生挾雄才早以文字名古文學西漢立志不自輕天步忽改玉潮落間長鯨棲遲鎮州幕探討益深精豐碑每旌紀有客來求銘得文蔡中郎死生兩為榮胸中金石列輕重持權衡十年總雄藩理劇筆不停篇章偶遊戲擲地皆金聲金鑾選羣彥拜詔升帝庭九制付一掃腕健秋風生人生獨何幸談鋒得時聆三年侍几研神膏洗昏盲狂斐不自量惡語瀆門屏豈期辱裁答愧汗沾塵膺新詩一何似練練秋江清變律出新意暗覺無劉應間忩得首肯安用四壁驚世無謝玄暉兹言欲誰評俯慙舞籬鷃仰空望雲鵬我廩亦已倒君囊未云傾願賜起豫念得與詩壇盟定應勞薰沐踏月扣深扄贈畫師張潤之造物生異人妙處不自知畫師奪天巧徑欲形似之以神貫彼人滿紙見丰姿朱粉一融化如以印印泥我心適有在示汝橫氣機勿作真實相此理誰窮推必欲得吾真刮目深窺窺寄李二衎甫友舊總角慎擇友似君能幾人君心淵以默我懷粹以春外若不易合中情藹相親聮句風雪夜並轡花栁晨相離復相覔敬慕日益新君慕我無偽我敬君無塵有失須告教接納從具陳有美不口譽暗若獲嘉珍古人不可到已脫雞鶩鄰相逢百慮消何者為賤貧年來成逺隔欲會良無因君思我應切我夢君亦頻千里共明月出門望通津尺書何寥濶亦豈少鴻鱗寒溫諒無益懶散任情真君間日無事田園坐荒榛我官久不調進退兩邅迍相思復相笑有愧半百身萬事盡乃爾一心恆苦辛何當謝手板復我洹水濵舉網得嘉魚杯羮雜薇蓴再遂林下約困羽時一伸踏雲共携杖對月同岸巾有子辨溫飽世作無懷民安知青雲表高閣聳麒麟寄李裕卿友愛憶昔少年日不識分擕愁朝為閭里嬉莫為閭里遊喜如同隊魚相失即相求江山為我妍日月為我留古今共掊擊詩文相唱酬艤舟南塘夏戲馬廬山秋入門父子歡出門朋侣稠笑談俯仰間宇宙一蚍蝣朱顔映緑髮一官非所憂自期學業成舉翮超崑丘得失道復行絶足追伊周坐信古人書嵗序暗如流龍飛啓昌運仕籍粗見收隨廢復隨起急雨水連漚朝應列宿光暮與編民儔我趨東州幕君登省郎輖我曵辭林裾君轅復西州相望五千里萍梗兩悠悠相憶不相見塊若鷹坐鞲碌碌逐人後不異羣飛鷗反為流俗嗤誰復信良籌夜為一無賴晨封千戶侯舉國疾有口一拜參廟謀人生各有命敢欲誰怨尤念君得稅駕桑梓復優遊吟登舒嘯臺醉下飲酒樓讀書復觀物萬象愁𡨕搜笑我宦遊惡相如今白頭進退良有道用舍隨沉浮已慙三徑草更愧五湖舟薦士一章呈子方郎中飛卿侍御子裕尚書受益侍郎鷙鳥雖類百一鶚不易求大厦萃羣木梓人慮何周選賢尚公舉四海無朋儔同已不敢親異已不敢仇為國而得人此心何休休羣彥入臺閣有口皆歌謳下滿萬民望上解吾君憂我作薦士詩未審垂聽不人生無全才用舍隨所優洹水誠淺澀固有萬斛舟一二濟川手試用當急流馬驤字希驥實學無虛浮論事到通方有唱而輒酬修鱗縱大壑俊鶻橫清秋亦有張仲豪氣壓元龍樓明敏不疏放縝密無停留耿介崔子沖縣治何優遊五年官炎方還家去時裘三人者如此鄙言非暗投儻遂處囊錐脫頴非悠悠寄宋齊彥丰度嘗暫違令人生鄙吝一别十七年杳不接音問孤陋寡交遊庸懦不自振看書未開卷衰思巳昏悶異時或相逢老醜勞細認闒焉成坐睡妄想俱忘盡覺來問童僕又欲黃昏近廟堂咨故老謨議發硎刃秉筆白玉堂羣賢仰清峻人來話起居德業日升進詩文肆口成草聖電雷迅老耳聞斯言夢寐見神俊斯文天未喪付託當自信大賢不虛生晚節宜重慎寄答王仲謀心交義已重世契情尤親結髮相追隨嵗年偕七旬所學與踐履言行頗同倫俯慙太疏懶仰慕能精勤文章妙天下更欲名千春讀書老益壯立言日求新客來辱佳什字字希世珍日長正昏睡拜誦整冠巾勤厚思報復握筆不能文南望徒引領青山生暮雲寄伯祿繼先子裕伯宣泉源出山巔潤下能及逺居官處廟堂長才庶可展恩澤霑四海竹帛燦華顯豈同州郡職碌碌互流轉傳聞得榮拜清議稱妙選何煩責望深自期良不淺老懷喜不寐芥蒂日消遣貪為中外賀鄙語失裁剸答子昭贈筆子昭喜法書能知筆工拙玄霜煮鼠鬚得藝到精絶纎圓見倫理遒徑傲盤折起伏應提案頓挫愈健捷筆疵良多端試為一論列鋒危多困弱過促亦驁桀中虛易渙散太實傷擁結而能四者間求全得心訣學書運筆耳十筆九凡劣就能到神御終亦因點畫筆人例塵俗定謂何妄説子昭非賤工英氣溢眉睫輪扁老斫輪進道時自悅老㕙貢霜毫湘筠效竒節弄侮管城侯冠巾髮如雪老我初學書筆塜擬山疊每恨毛頴公違忤不相協自兹可適意買紙整囊篋但恐求書人笑我閾無鐡送祝仲容都事之任湖北朝廷求治切仕途故平寬一言與片善暮進朝拜官况以吾弟才遊刃豈多艱處囊今始得脫頴驚衆觀鄂嶽湖北道事務固殷繁民情大可見飢者易為餐德政一流行歡聲海波翻間登嶽陽樓塊視湖南山先賢文正公立志當追攀幕官非久留引領望歸鞍寄贈河南監司不識相公面仰聽相公名何時拜清光老眼昏復明近世為學人志在求祿榮所學非所用真狗苟蠅營淫辭徼寵利前學已忘情以言較行實奚啻炭與氷悖逺聖賢域絶口不談經懦為胥吏弄強逐姦邪行甘溷涇流濁厭惡渭波清竊名實嗜利犯義仍犯刑儒學乃如此莫怨人賤輕用若輩臨政何事得平寧相公出貴種世為貴公卿力學君子儒直造東魯庭正已而物正清心照邪橫事業期伊尹與世為權衡我雖老腐儒不流為流萍狂言凂清聽終當拜嚴扄邇來復齋洹齋二學士屢以五言相唱酬不鄙愚庸每成章即亦垂示賞嘆誦咏贅作六章時至元四年七月也致力師前言每墮詞語陳冥心效前意興寄不得新辭理捨前哲孰洗胸中塵寥寥入深心作氣時自振博學以廣才一引思百伸斂彼言外意養我筆底春要當青出藍終恥隨效顰英哉杜少陵作語期驚人太白固豪放不受義理拘誦詩想其人飛龍呌天衢萬籟不敢鳴雷霆隨叱呼海江共一唾幾吸四溟枯􅗈霈瀉時雨餘霏散璣珠甘潤著萬象英華散春腴王風久不振要接大雅裾俯視建安人委靡幾嬰姝沉沉杜少陵坐笑太白豪作詩每持贈時亦示譏嘲後人定優劣洶湧如風濤二賢豈難辨口舌徒呶呶文章貴適用美惡不可逃政教苟無補辭雄亦徒勞發興如湧泉愈汲味愈清安用啜糟粕虛無剽竊名百物來扣心肆口即成聲了不見牽合精粗聊稱情采菊東籬下何時值淵明開口論時政位卑罪言髙開口談今古是非九牛毛開口説物理理微足譏嘲開口議文章聽者厭呶呶百慮無營為𡨕心味詩騷木落恐草稀雲清金氣豪得句時自娛長吟行樂郊大哉風雅頌用之亦非輕至情為物激哀樂即成聲民心見向背國政知瑕貞薦享拜郊廟昭假歆百靈聽聰吳季札審樂知庶徴所以孔聖訓諄諄于過庭可憐千載後秖以寫間情貴達無一言窮窘恆咿嚶不為怨怒語即為寒乞鳴遂令當路人聽之等蛙蠅雅樂不復作鐘鼓徒彭鏗贈孔子五十四世孫曲阜令人為名父子尚恐寡肖似受身於聖人惡可不尚志聖德若唐虞一傳苦無嗣洋哉聖師澤無代無名士德與天地並報享窮天地東望竊有感噓嚱隨涕泗漢唐傳至今崇敬到極至襲封衍聖公賔禮貴無二百家林廟戶灑掃幾千祀譬彼江與河萬古流不廢不意便斬絶茅茨暗階陛兹事世共知廟算非失計人苟不自侮云誰敢相戲嗣聖既無人勿怨虛其位敢告曲阜令聖學當自致皇皇建極功安忍輕暴棄國家崇聖心日夜求英裔懷康兄國材君材若雕鶚海運羞寧居胡為斂長翮郊野葺園廬無乃厭官卑祿薄不腴軀請為君解嘲匪我相佞諛丈夫期濟世豈以寒餒驅萬鍾不義受傲晲如芥珠朝為粗官怒暮聽俗吏呼一善未能行百辱相縻汙人生異雞狗衣食何足圖負郭五頃田有奴代耕鋤放水不勞力種藕春滿湖循牆及園圃木奴養千株素候日高起甘旨從妻孥容為巢許鄰聖世超唐虞寄復齋洹齋二學士辭多亦奚為字字合精深辭理兩俱勝粹若百鍊金口稱竟何榮要使愜豫心太羮無遺味大樂無遺音我師少陵語詩罷自長吟送彥才參政西行翩翩海東鶻舉翮數千里整毛萬仭山得食青冥裡栖栖場圃雞尋丈不能起一飽不異營啄啄尋螻蟻君才班定逺洗劒西海水老我馬少遊將迎心已矣舉杯送君行兹行誠可喜長才當大用豈徒封爵美我朝際天覆車書一文軌沙磧吾近郊誰能作邊鄙以君經略材須君勞尺箠邏列拜馬前微垢不煩洗西寧金氣穰三錢輸斗米寄崔中丞大臣思報國所急惟薦賢得人政乃舉無人法空懸我家大忠厚輕重略衡權邪正既混雜是非亦紛然賢愚豈難辨試功不以言國人皆曰貪未嘗私一錢國人皆曰亷門闌如市鄽毁譽求善惡聽納寧不偏執事主臺政選賢少安眠聽言復觀德取長不求全為國得一士引挽恐不前因士得一語力行不留連執事持此心炯炯金石堅聖鑑照此心聽納如轉圜廟堂富梁棟臺閣足龍鸞庶政無廢事太平日如年歸功更誰往國史青長編送王録事秩滿北上能吏多健羡於道未為貴秪得上官憐非為細民利賢哉王録事深恥矜小慧百冗繁劇間有餘求月計雖無歡欣譽亦無猛虎畏三年安陽民夜犬不聞吠叩門來告别秩滿當隨例愧無薦鶚書臨岐但揮涕吏部清鑒明終難久沉滯贈送劉濟甫之大都清議廢已久士價一毫輕可憐薦士詩唧唧寒蟲鳴人如孔文舉虛文尚誰聽况我老腐儒素與才無名愛汝有用姿送行豈無情一言亦不惜係汝何枯榮丈夫當自奮去去投帝京作文謝浮辭論事令世驚仕途太平寬自薦鳴不平壯志已棄繻長才宜請纓望望追電足萬里不留行送僉事清甫應都省勾請天下一大厦完密資羣材巨細各識職永永無傾摧古來知人難明哲慎鑒裁拔萃豈易得灌莽雜蒿萊百圍梁棟資寒暑幾往回良匠失時遇偃蹇倚巖隈大臣佐明時求賢不忘懷遴選得一士拔擢超資階都省總大政諭議須全才徴書照齊魯攬轡勿徘徊寄王樞府一嵗凡三遷臺院爭薦舉通才切時用豈與噲等伍疾邪發竒章談兵示英武正言滿烏臺婉畫鳴樞府長翮得雄風摩雲日騫翥紛紛庸俗子黽勉困規矩老眼見竒特衰懦成鼓舞今春餞君行有言未能吐魯鈍留至今負罪那可補鄙俚聊謝賀粗代寒溫語贈送安郎中仲容還吏部古今世祿家例為豪習誤富貴可坐得竒偶不知數翩翩安公子拔萃能頴悟學語知好學誓不勤師傅裘馬如土芥取受脂粉汚詩文字畫餘精敏識時務一片經濟心耿耿無寐寤天官乏中郎元豹難隱霧筆端山谷啓軒豁快呈露乃見仁者心善惡公好惡願君持此志絶足得長路功名正黑頭努力未遲暮寄杜提學前年得君詩似亦怨枯稿作詩欲裁答恐君嗤草草念君瓌瑋志奚啻圖溫飽致身青雲上舉措伸斯道諫章爛雲錦萬類遂安好竒勳映佳名曉日同杲杲人誰無是心衡門坐空老古今懷材人立身苦不早宣尼果何心俯默藴天藻甘蒙陽貨譏迷邦獨懷寶一食魯倉粟安危不自保車轍滿天下皇皇傷潦倒豈知千載後世變益紛擾一正敵萬姦能為不傾撓我懷素餐憂我言非佞巧有子幸克家心間世緣了著書貽後人什襲珍遺藁俯視論功人滄海一行潦寄詩命安齋熱中應一掃贈孔子五十七代孫曲阜尹身為聖人後責任良非輕朱均固自汚亦匪堯舜榮聖人不可階賢堂宜力升一編中庸後代代多名卿淺深固有間咳唾循典刑金塵與玉屑賦稟異精英衍聖人絶襲夢寐當憂驚百餘香火戶近亦𨽻編氓此誠姦吏計奚傷日月明奉先思盡孝寧可同凡情身先篤為善英譽升天庭誠敬率諸生行修益明經作成三數子張主斯文盟洙泗續遺響師表佐升平送趙季明赴召北上氣質萬不同聖凡係所受天稟何高邁得造物神秀日記數千言一覽不勞又胸中九經笥字字無遺漏前言與往行知識若親舊以兹窮義理何事不詳究以兹吐文章筆落風雨驟譬如日月光天地河山透又如春風生川谷成錦繡聖訓多見聞所恨窘愚陋回也其庶幾哀哉夭不夀所以嘆才能懼乏斯民救異人豈易生聖賢千載遘天生瑞聖世奚欲專句讀朝夕備顧問置之宜左右上談唐虞盛下及五季後所問無不知所知日敷奏蒙詔令疾趨玉殿開清晝一封政事書四海恩深厚嗟嗟老病身不及詩擕袖側耳聽佳音扶杖起衰謬
