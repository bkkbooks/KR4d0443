body:
  text: 紫山大全集卷二十三元胡祇遹撰雜著縣政要式置軍民站匠諸色户計各鄉保村莊丁口産業鼠尾簿一扇各户留空紙一面于後凡丁口死亡或成丁或産業孳畜增添消乏社長隨即報官于各户下令掌簿吏人即便標注凡遇差發絲銀稅糧夫役車牛造作起發當軍檢點簿籍照各家即目增損氣力分數科攤不偏枯不重併使姦吏不能欺謾至于土田婚姻驅良頭匹債負一切詞訟一一憑籍照勘此籍如一縣之大圓明鏡物來即應妍醜莫逃續有分房析居復業還俗于驅為良等户亦依上標附又置交參分外來寄居别投下諸雜户計簿一扇以備互相爭訟二簿一一從實無得漏落包套鄰佑主首社長互相保結不實者罪之各村荒間官地及牧馬營盤亦仰于各村下標注此籍既定别寫一扇申州申府頓放互相照勘事君敬其事而後其食此人臣之常分也主爾忘身公爾忘私國爾忘家志在于立功樹名富貴不萌于心此人臣之常職也即今觀之上自執政下及州縣以掊克聚斂為通才以苞苴邀結為得計不究已之才不才甫霑一命即望台司金玉滿堂愈懷貪冒出憂國之一言衆指以為妖訛舉愛民之一事咸疾以為狂妄虛文具于督責實效墮于杳茫敗事者無罪成算者無功廉公謹敇者反謂之好名贓汚賊蠧者反謂之才幹駔儈曵青紫倡優佩章印奪攘矯虔布滿中外長舌利口變是為非婢膝奴顔進階增秩甚至鬻女而貨妻奚啻吮癰而舐痔言語煦煦相取下而戈戟伏于中心同仕數年再相遇則白眼若不相識小人同惡相濟結為朋黨此千古之常情也今則不然相誓指天日非誠也刺血為盟言非誠也握手出肺肝非誠也出妻見子非誠也升堂拜父母非誠也通才納賄非誠也面譽而背非朝諾而夕畔雖蛇蝎虎狼不食其類乃甘心而忍為雖鬼蜮優倡不欺其徒乃面謾而無恥詭譎不測變詐無窮人心之惡一至于此內外同風不以為怪不惟僚屬友朋之若是子焉而訐其父弟焉而訴其兄妻妾訟夫主奴隸誣長上天道人倫悖逆斫喪瀰漫壞爛一至于此于所厚者薄有此理歟有識者坐視而不可救固當緘口結舌亦安得不為之寒心哉聖人知民生之有欲不可不為之防故因其性之固有使仁且夀禮樂教化之功也聖人身行正人倫亦正恐逺方遐域不能見聞立五服公侯伯子男設庠序學校以訓誨教養之薰陶以詩書禮樂以成德焉教而不從董之以威刑政是也刑者救惡于已然兵亦刑也誅其長惡不悛者也後世救時宰相謀不及此事至而不為之備患生而不為之防不能積九年之蓄而為救荒開廩勸糶之法不能使比屋可封故嚴立不孝不悌不睦之刑不能使風俗朴素樂于務本故有抑遊惰重商稅賤倡優雜類之政不能定立田制一夫百畝故有限公私田之制不能使民不為非故有警夜巡捕之禁不能使死徙無出鄉重祖先邱隴故有招誘捕捉殃及親戚鄰里之刑陵夷至于近世苟且弊政又不能行事至物來專以刻薄督責為言逼迫威虐為務示己之才陷人於罪歸功於己嫁禍于人欺天罔上具文無實交結權貴增秩遷官諂媚士夫沽名釣譽民困瘁而不恤憂私財之不足致紊亂而反喜得縱恣而為姦加之常憲寬弛惡不必罰善不必褒以不公之毁譽定人才之黜陟以風聞之是非為功過之實迹苟且滅裂貪汚日甚一日具曰豫聖孰知烏之雌雄正謂今日移牒本司遍行所屬照條畫節文百姓不得越訴諸衙門各有分限不得受越訴推原立法本意司縣者親民之官日與小民相親情偽易見不能欺蔽責任不可不專不專則怠惰推遞紛亂繁冗久不能決故罪有五十七十以下司縣決之小民所爭訟不過婚姻債負良賤土田房舍牛畜鬭毆而已所犯若無重罪司縣皆當取決不合申州申府申總府申提刑司即今司縣官吏貪邪每遇上項本職合斷事理于元告人被論人處兩下受訖賄賂或瞻徇囑託或畏避形勢欲從正歸結則恐倒錢告訐欲從邪處斷則恐提刑司照刷兼負寃者不肯準服所以申州申府一解釋怨謗二洗雪已過嫁是非于州府為州府得此復效司縣所為嫁是非于總府總府復效州縣貪求厭足調發于州縣以致或爭地一畝價錢不直數貫上下前後官吏行求費鈔數百貫逗遛七年十年不能杜絶中間兩家隨衙諸干連人隨衙妨廢農功生業不可計數隨衙之間呼喚不著小吏獄卒百端凌辱小心畏法者以致飢飽勞役輕則因而成疾重則致命者往往有之家有疾病死亡之憂而不敢離衙門者有之如此怨苦皆原于妄申妄受當決不決擬合遍下照依條畫司縣當決而不決妄行作疑申州申府者初犯品官罰俸司吏杖罷再犯三犯則品官解任州府總府妄申妄受者亦如之合行移牒請照驗申臺照詳乞賜明降遵依施行精選縣令辦事愛民莫親於縣令縣令得人則事辦而民安舉非其人則事不辦而民失業即今縣令多非其材省部不務精選兼品秩卑下州府驅委呼召殊無禮貌英俊才氣之人視不屑為十分為率大半不識文墨不通案牘署銜書名題日落筆一出於文吏之手事至物來是非緩急閉口不能裁斷袖手不能指畫顛倒錯繆莫知其非雖有縣令與虛位同今後擬注縣令省部試以身言書判問以治民之方年六十已上精神才力昏眊者不可擬注身言書判不兼全者不注省會州府不得差委賤辱論併州縣州縣何為而併也户口寡而官吏繁民力不足以供掊克十羊不足以容九牧也併州縣則其便有三減祿食舒民力一也每縣胥吏鄉司里正之徒五六十人并祗候弓手足解不下百餘人每家嵗用衣食鈔百貫舉取足於民今皆廢罷而民免蠶食之苦二也每縣又得五六十家務本趨農昔為蠧民之害而今為納差之户三也其不便者三縣併則辭訟賦稅遙逺一也巡盜賊尉司勞苦二也二者不難治平解紛糾警察冦盜則委商酒務主之無致生發無令起訟賦稅遙逺則仰本縣當絲銀徵納之際各就本土置官收受無令百姓勞苦如此則省併州縣實為善政不必多論俟其户口增息政繁事冗則量宜復置外户口鮮少不宜立總管府者亦當合併衛輝等處是也宜立總管府者復當合而為一東平是也難者必曰併之則頭項有言是大不然土地城邑仍舊户口差撥仍舊各頭項所設達嚕噶齊仍舊官制禮儀既定為總府者不敢無故呼召凌辱州縣然則何苦而不願也兼自天恩列土以來衆統寡大臨小行之到今五六十年而無一言何獨至於今日而有言哉其實一縣也一州也強名之為一路是蒙虛名而受實費也難者必曰併之則總府權重是又不然往日諸侯世官擅生殺禍福取斂封植之權故一方愚民不知有朝廷之尊而知有諸侯也今之總管府有如是之權歟常賦之外不敢擅一錢流罪以上之刑一一申部五十月而遷徙何重權之有何過慮之甚也難者必曰鄉民之情升縣為州則喜降州為縣則慘然不樂是又不然民可使由之不可使知之得虛美而受實禍小民之言何足恤哉難者必曰往年辨者以減併州縣促削封疆恐為外人所笑是何理之言也夫所謂之促削者千里之地為他人得其九今也為百里百里之地為他人得其五今為五十里毁千雉之城為百雉是所為促削也土地如舊城郭如舊何謂促削哉使田野不闢户口不增雖升縣為郡升州為京張夸名而無實用然則何益矣不知反為後人之大笑也此皆一時蒙昧便佞之空言今已不辨而自明亦不足恤論府州縣官府州縣官不合一例俱年老或年幼俱識字或不識字每補一人宜照已任者何人宜老幼文武間有不合勿止問此人合作刺史止有某州刺史闕便令補上不問見任諸員何人又用此人為同僚無乃偏枯否按察司最急當舉府州縣定功過朝廷既有五責辦集者不辦集者俱一律遷轉何以懲有過勸有功而合周官六計弊吏之旨哉民間疾苦狀一逃户不能復業今日離業明日官司將拋下物業便行典賣訖一見在户替代逃户差發假令元抄十户逃訖五六户見在户包當一稅屋間架古今並無此例木植苞灰丁線已行稅訖今又稅屋甚為重併一稅羊重併既於每羣內不計多少抽分訖羊口又行收毛收皮納稅每遇造作復於民間取要一本場皮貨山查河泊冗事合行革罷併入稅務一稅物不問時估止由闌頭合干人等髙下價直以憑取稅一婚嫁之物既非買賣營利不宜收稅一站户既當馬匹又當祗應酒食委實重併困弊一一切和雇和買造作并不得錢近年親管官吏擅行和買虧價十九一社長並不益民止助貪汚官府鳩斂錢物侵剝細民合行罷去一府州司縣每遇祗待使客自裀褥床榻油鹽菜蔬酒肉碗碟匙筯柴炭等物一切科斂於民使客既去諸物為之一空並不還主一徭民甚多正當差户極少當議減革一自立竹監并巡行官以來不勝煩擾民竹十廢八九官竹十損六七當罷竹監及巡行官民間許令種竹依價收稅官竹委付土官一員掌管發賣一巡鹽官不得擅自擾民事發之家當土官鞫問一鹽法頗壞斤兩不足當依舊法滿足民間食鹽聽從商旅兩平貨賣官司不得樁配一白著無名錢宜許赴按察司陳告一凡遇和雇和買夫役不問多寡即行遍科宜嚴加禁治一親臨官和買和賣藉補宜行禁斷政弊一冗司當罷省部臺院外酌古則無有準今則繁冗者皆當削去一冗員當減天無二日民無二王尊無二上人無二首故設官分職省部以降崇卑雖不同為長之官止合一員佐二僚屬視事之繁簡則或倍蓰焉長官一員則裁決歸一而不紛競僚佐倍之則常務煩多足以代勞即今六部尚書八九員侍郎郎中員外郎及一二宣慰使七八員同知副使各一人正如人二身八首而一足貽笑千載舉此一二他可類推最不適用虐下生事虛廢俸錢鋪馬祗待者宣司奏差等官宜十減八九一冗吏當減一冗文當革冗文不革則冗吏不能減何為冗文無妄受無越訴無疏駁不法無申呈無度如是則冗文十去其七八一信賞必罰則功多而過少今皆不行公勤者未必賞汚怠者未必罰按察司並不察舉害民貪汚者反為良吏奉公亷潔者反為庸駑一賄賂公行則百務紊亂民寃無訴宜禁治嚴切欲斷賄賂莫若賞亷罪貪一鈔法已壞當行拯救拯救之法無他推其致壞之由而改之一倉廩不實合行核實一取人入仕無法合行講究即今冗員既減十之四五有罪者罷無罪者聽除亦可經數選而不闕一江南重地難得易失所任非人合行精選仰按察司體察罪重者去輕者降留無功過者依例有功過者分别一濫官雖罷私贓富厚宜許諸人陳告復還本主彼此俱罪者入官一諸路庫藏倉厫有名無實當從實點勘一公家與民爭利衙門宜有革罷一錢穀官不宜貨賣宜於隨朝服勞人子弟姪選用一不經省部銓注職名如本路奏差提領驗數官知數河泊官之類宜盡行罷去一官吏斷事無法可守當議頒降條法不致罪一而刑異姦吏因緣髙下其手一諸路户計東移西竄南徙北遷消乏者不減差興盛者不增賦宜委本路公舉廉慎官同按察使官一員從宜抄數仍具戊戍壬子兩次何處附籍仍具本家見在物力除為清册以憑從實定奪差賦一江南平定通為一家南民即我民南兵即我兵也既有券軍使令北軍宜少休息每嵗輪畨一半南戍一半還家作活資養軍力一不因才能勞效門閥以錢得官者宜盡行退罷即以才能勞效門閥之人代之一宣使奏差一切使臣不問土官有無罪犯下馬便行取招重行打發輕則土物斂及於民宜行禁斷差帖上亦不得妄寫惡言徒使朝廷失大體而不威官吏無恥而苟免一某自起身至據台鼎專以賄賂左右迎合上意為務故能使受賂者投間抵隙交口薦譽迎合偵伺無不如意自斯人顛覆以來受惠者一無所得思慕之心追懷曷已相繼為政者循覆轍則不可新易途則招謗謗言日多不惟不能施為雖欲身安其位庸可得乎當自侍御僕從有出身有賜賚以代私恩不使怨怒不惟立酬勞報功之令典亦庶幾杜絶苞苴賄賂私相恩讐之罪念一江南民心未甚結固不可屢失自收附以來兵官嗜殺利其反側叛亂已得從其虜掠貨財子女則入於軍官壯士巨族則殄殲於鋒刃一縣叛則一縣蕩為灰燼一州叛則一州莽為邱墟然則於國何益矣申院申省反以為功朝廷不究詰所以反叛之由而慣賞其將卒定亂之勇人情孰不欲安屋粟火食夫耕婦織賦役之外養老慈幼樂享太平此億兆之一心也今也棄此遐福去生就死甘為肝腦塗地父母妻子駢首受戮者是何心哉是蓋牧民者有以激之使然前省所選人員例以賄賂得官屠沽駔儈市井無賴羣不逞之徒十居七八詩云愷悌君子民之父母使若輩之民欲民之安則不可得矣淫奪人妻子強取人財産田宅馬牛羊畜聽訟之間恣情枉法以是為非以非為是百計千方務在得錢民之寃抑無所控告司縣州府上下一律哀聲怨氣鬱積而不能發所以冒死而不顧國家自平金以來有事於宋五六十年而後混一豈不艱哉良將精卒經營戰鬭於數世一旦以濫官汚吏恣其貪殘而壞之惜哉一江南陳米經嵗既久皆不可食今已水旱腳力運漕於委曲萬餘里之外何不思之甚也以致沈船破車奪民時廢民力死損牛畜虛損盤費官吏不能交割多自經逃竄所運米石堆積水邊上雨下濕腐朽敗爛積今四五年間問根起發斛數若干今到某所某倉若干已十損其七八矣所存者又皆為糞土若此繆算即合停罷一御史臺按察司彈糾貪汚申明寃滯實省部儲司之藥石也省不知與己為助反視之如仇讐百端沮抑是以近年以來當是任者全身逺禍閉口不言為書吏書史者委靡貪汚與州縣吏無異甚者反與之文過飾非隱比其罪惡滋長其貪冒自今以往當激勵振作碌碌無稱者退罷少犯贓汚視州縣官吏加一等治罪終身不復敘用一倉場庫務諸錢穀官雖非所以處清流待英才之地亦無以市井細民賂以貨財而可得者上以財賂賣之下以貨賄得之上下交征利又無出身欲戒人以不盜何不恕之甚也即今贓汚之弊莫甚於此愚謂宜準往代舊例以待有功之子孫有月給有增秩拜官盜錢得罪之科如是則國無賣官之羞人絶僥幸之念錢穀入官而不入於私家人矜廉潔而有光於祖考兹事非難當革前弊凡隨駕日久如集賽台等子姪弟兄户選一名補注不願者聽責成於漢人以蒙古人領其事而不課其殿最一前省官私心本欲貴其子孫恐人有言故每職多設冗員如六部宣慰司之類是也或以貨賂或以請託不論人材不遵銓調昨日一布衣今日受三品命服日月不深資品卑下而遽升二品宰相者股肱之寄往往皆帶相銜遂使僥幸之徒視名器如拾芥卑小官而恥為曰某人尚得某官我何為而居下列曰某人尚拜某爵我何為而受斯命輕易名器以至於此當議改格一遞送造作必不能無弊姦吏因緣害衆合著夫匠十名乃科百名以至數多則遍科今後省部立式符下各土主者置立簿集鼠尾人民及工匠花名遇有遞送造作輪次應當周而復始仍令通文墨廉慎官吏封掌凡有遞送前路文字及宣使奏差到路輒不得便集人夫先差人於前路探伺到來的實月日然後集衆若恐耽誤既承文字即於簿集上照勘某人今次該差計幾名公文先報得知管得在家聽候續聽指揮某日須要到來應役如此則公務亦辦不致稽留農工妄奪民力盜養姦吏一拘刷牛皮之虐農人牛死舉家哀號不經申官不敢開剝筋角皮革略有損壞又復壞錢或時值暑月入城遙逺往復之間肉已腐爛近日復有濫官下村親行拘刷或翻挑舊事或每活牛一頭攤鈔五百一貫似此虐政即合罷去合用牛皮新納包銀不勞而足一軍人應役還家一往一來之弊軍自分撥以來紛擾重併民不勝其困弊吏橫恣其姦欺何以知之假如一户軍户某人係某縣某村元籍某年為始簽作軍户根腳係隸某官帳下應役到今不曽改撥如此則或有軍前因事因病身故或避役在逃交替不至或貧難疾病單丁不能應役或元籍户頭身故子孫更改官名及一切事故管軍官照驗各人鄉貫姓名移文本管鄂勒官勾追補發若網在綱有條而不紊自一經分撥别隸他人所管行伍不相識官吏無籍册可照一憑本人稱呼中間不無欺詐不惟如是或又於某年再經分撥或又於某年某嵗纍經分撥遇有前項事故展轉推求不見根腳出軍吏人亦非經手舊吏是以妄行移文勾追鄂勒吏人照得與元籍姓名點畫少差却行回文審問一問一答往復經嵗軍前既承回文不無自疑遂於他路勾喚似此紛亂純實謹畏者恐遭罪責或已行親當又復雇覔或兩處重當不能辨明不得交代以至壞産破家無處申訴不畏官法敢為姦欺者賄賂鄂勒官吏通同作弊或在家而云已行應役去訖或富實而妄言貧難或身在而言身故或有餘丁而云户絶或妄以鄉貫村莊姓名爭差為問逗遛嵗月似此欺蔽不止一端究其受病之源皆出於分撥竒零隸屬無定即今南方無事管軍官員數太多名為萬户軍不滿千千户軍不滿百降至鎮撫百户有止管二三人者是所謂十羊九牧者也照得管軍官員亦非皆出於纍世將家勳舊武辨以一時軍功得官今乃袖手癡坐無髙爵之可邀無厚祿之可得無精兵鋭卒之可管意亦顒望國家優恤莫若檢照各官如根腳尚日淺年老無子姪可代者與一優便差除祿以養廉軍官既減則散軍可併散軍可併則可復無籍可併可復則選擇良將善撫馭者於要害重鎮屯戍以之鎮守則威重而姦亂不生緩急有用則精鋭成師而得力往復交代及一切事故則不能致肥吏而瘠民欺官而誤事一鈔虛之由有自來矣盜臣私印添價以買諸物一也置立總庫總局舉放出息輕付於無賴狂貪買官之人動輒千萬錠二也鈔法無定鈔十四兩八錢當金一兩即今官買金每金一兩該鈔一百五十貫自壞其法三也賄賂公行執權者止要良金美女俊馬竒珍百倍其價物重則鈔輕四也盜臣得以私印諸路官庫反不支發民間無以倒換五也近年以零鈔消磨盡絶上司並不印發零鈔不行物價自重六也能除六弊鈔法自實一前省官自謂於國盡忠靳惜財物不敢妄支虛費遂於諸投下五户絲銀嵗賜暨諸犒賜等物不肯依時應副巧計開除不滿合得元數所與之物金銀匹段亦皆低歹不堪使用衣著今次事發為人首告假銀足為明驗實失諸王心怨歸於上何足以為忠古人親親之義分寶玉於伯叔之國時庸展親恐不當如是一碩布哷齊每户要訖鈔半兩或一兩二兩一燒經排門取訖鈔五錢僧道每路不下五十錠一今次貪人所積贓物不啻數萬錠其實皆出於生民之膏血惟數宜與民休息免絲銀或三年或二年統體受痛不立法不選人無賞罰貪貨財土地取兵取民無制度御臣下法寬而不禮重易進易退百官苟且趨利無貴賤等級職員太冗俸給不足員冗則論議紛紜而事不集俸薄則生理不給而生貪汚以今觀之每一司分莫若減員之半而倍其俸一即今銓調之法名存而實亡近年以來賄賂公行所謂緒餘土苴併自廢壞錢多者其職切要其祿厚其官髙其日月經久而不遷轉所用之人無行檢無才能無門閥無勳勞無智識不責王事之辦集廢墮而不恤部民之寃苦失職提刑司恬不彈舉無錢者雖負德行才能門閥勳舊或任滿而再不選敘或蒞任未半嵗一嵗無罪而替罷亦不録用惟僻逺荒邑職不切要者或七八年十年無人交代然則吏部官可不精選公平廉幹者躬親考校簿書內外司分計若干孰賢孰否孰功孰過孰年老疲軟不勝任孰年壯精力才幹人人見來歷人人如素知識某司某分當用幾人文資武資宜幾人某人因某功而升遷某人因某罪而降黜使升遷者知非徼幸廢罷者不敢怨言如此則趨事赴功得賢日廣一府州縣司吏所以遷轉者本恐年深作弊自遷轉以來其弊愈深其誤事愈甚何以言之人之所趨惟名與利照得府州縣司俸薄不足以利家辛苦年深不得入流品無利無名復何顧藉不貪汚不枉曲何以度日兼吏人之職專主簿書案牘之首尾公勤才幹者聽從本官及上司呼召指使之不暇安能經理上項所當知之事哉是以問東而不知西問首而不知尾一聽於主案貼書之所可否而况貪賄賂殖貨財奉官民避強凌弱庇富虐貧非主案貼書則不能也以此論之反不若不遷之為愈也居父母之邦粗有田宅産業賴公門庇廕足以養廉人情物理彼此不能相欺謾不親即故人非豺狼遇事豈不相憫恤案牘出於其手不勞苦而嫻熟知首知尾其涖於其職每事不敢苟且恐後不能離手豈惟吏人至於職官自循末世避貫遷轉之法亦不免此弊不務擇人止務遷轉甚非良法使為官為吏者性果廉平雖居鄉黨亦廉平性果貪曲雖處異鄉亦貪曲避貫如以狼守羊何往而不殘食之也罷遷轉務擇人使鄉里公共推擇俸足以養廉公平嵗久則得入流品庶幾簡易而得人不撓法不害民不誤事一某前任河東按察副使在任别無他能惟不妄拘錢入官吏人有罪杖而不罷一事頗異於同僚錢至彼此俱罪者入官拘收濫官汚吏以形勢知術而強取民財今復入官是何異於濫官汚吏之所為哉後雖有欲訴者則曰我所以不避官吏之宿怨含怒控告於上司者庶幾得吾之財耳今復官為拘管徒取怨官吏反貽後患曷若不申告之為愈也吏罪不罷者縣吏革罷而升州府州府吏革而升於省部臺院與其害天下多曷若害一縣之寡害一縣而得罪猶有巡按官之杖責害天下之大孰問而孰責之哉一里正輩不催差抑勒上户一弓手擅拷掠作威福政令有一言而事舉者不必費辭費力當一一舉行一日不能書字一萬者不補貼書不能裝卷試案式者不補諸吏不識文字者不補縣令但犯贓汚者品官落職永不敘用不能騎射者不補縣尉人驗嵗月宜有出身親親以惠與民休息立法擇人射占納租開草地恩詔罷土功立法租庸調閲實户口物力開荒免五年減免租稅不任軍役辟舉守令五年一遷江南立王府革罷諸省宣尉司等不急諸衙門推排軍力一百户為十甲驗力均當買賣土田當立定制革罷中原不急諸衙門如淘金之類金玉人匠禁斷奢侈淫麗定立等級聘財喪薨屋宇衣服筵宴程試僧道儒醫及一切入仕官吏抽分羊馬拘刷牛皮筋角抽分私家竹貨之類皆宜罷去吏治雜條一身正無私門無雜人一詞訟省減推擇謹朴老吏給印寫狀毋受越訴經司縣斷而不服者釣卷詳度縣斷依法則反坐妄告人違法則坐官吏一不投下好尚一獄無滯囚獄囚起數置一牌面日在几案斷訖則勾抹新添則標録未斷者細標注緣故日日省問審斷此法一六房朱銷日日省問觀監斷決增添日銷日附一鈐束吏人非事故白晝不得出離各房卯酉歷嚴謹如私事公務妨奪明白標附一承受鑿發委審慎公勤者主之與朱銷簿時復相對以賞罰勤惰一差撥辦集推唱均平勸率怠惰務農者務農雜業者雜業精勤專一一遊手好間者鄰社舉彈宣限不可不遵毋遲毋速遲則違限太速則二月賣絲五月賣穀矣一盜賊息無不業之人無外來浮腳之户無不識姓名客寄不成户單丁之人謹慎勤苦不幸疾病死亡或凶嵗不給者官為扶持或律助口糧或減免差發毋致無賴一田野闢開荒者五年勿役仍減免雜役一復逃亡到任便取實在并逃訖數目申部復業者免三年差發無事産官給荒間地土元拋産業或為他人所有官為贖付一館舍修整具備器皿全酒食美肉菜米麵精緻鋪馬肥壯館人勤謹毋揑名項一倉庫完固防慎火燭巡護嚴密一橋梁以時修葺須要五月一日拆八月一日搭一詞狀置簿即日便行毋落吏手一街衢巷陌潔淨無穢一牢禁嚴固潔淨溫涼一更漏分明依時夜巡如法一弓兵有職分里正人毋得侵占一公門人無故不得下村一風俗淳儉冠婚喪祭一一從儉祈禱義社即皆住罷到任省諭一強宗大姓侵凌細民體察禁治一減主案貼書主案一貼書二三餘並削去一循分毋顧忌毋妄申毋妄下當行者即行部符不便於民者當折申即申毋便行下州縣一印章朱語正貼無朱語者不得題判判署官或有照料不及雖更題判若無朱語者職印不得使印一不倒題日月不押虛催無益于事徒使吏人欺怠一本命刑禁日當直吏人明書于小銀牌面置在几案曰今日某事某事一和好鄰境凡有急速使臣或不測事情差坐馬人預相報知一六房吏弊當周知其情毋為所賣鋪兵有人應役頻勾正身本是鋪兵守把城池别無巡哨攻戰管軍官為本人會手藝不放交代甚為良苦近年以來軍人分撥竒零輾轉别隸部伍新管官並無簿籍或有逃亡事故不知鄉貫及户頭官名公文追勾不無差錯以致吏人受賄作姦文字來往逗遛不發亦有軍人小心謹慎避怕罪纍重併應役此段前説備細言之合申省部密院詳察一問獄以情箠楚之下何求不得弓手及尉司官吏畏避踰限罰責又本性粗暴殘忍率多執平人妄恣捶撻苦楚揑合指示虛令招認獄問初情如此難以推究今後尉司獲賊毋得監禁稽留擅自箠楚便當縣令以次公廳羣問得實止于縣司牢禁申解所屬有司推問之法止問今次所犯使首尾情實若犯人因推問其間情辭别有可疑説出它事者亦合鞫問如無此情節不得曲加凌虐轉生餘事一工本管諸色當明置簿籍紀録户丁標注應役不應役遇有造作輪番斟酌勾喚毋使吏人遍行騷擾作姦受賄虛奪工力一户差發夫役不均在家申逃每于逃户處斂訖差發却于見在户科攤折獄雜條體認所爭者何事人命盜姦錢債婚姻良賤鬭毆明察詳審元訴人辭理與事情有無相應如不相應且放從説過俾再三復説或差或否理短者折之情隱者鈎之語言便利者勿便以為是蹇訥者勿便以為非膚受之訴世俗所謂情理切害者勿遽先入于心察言觀色詳情慮事不出乎理理明則情不能逃引問被論人明告以被論之事令一一縷細抵對時曲直真偽自見一鈎一距必窮盡其情而後己大抵元告被論辭固無有不差因所差處互相詳察亦自辨明每事皆有根砥旁證來歷情由當從實處一一推究干證勸和人最為緊切君子善人畏避官司中間别無偏向者其辭簡直明白或關親戚或圖錢物酒食或挾讐怨或避形勢或受囑托有一于此不無偏向辭理逆順輕重不可不察與元告事飾辭增減者有之與被論人辭理或排或助者有之聽訟者若便止憑干證不無寃枉不憑干證無所依據凡引干證人便先窮問與元告被論人有無親戚故舊錢物交往因何兩家指為干證則情過半矣干證情實見則事可立決仲弓問政子曰先有司不先有司則不惟越訴事繁吏人因緣為姦抑實有不可隔越而問者又曰無情者不得盡其辭若無情之辭便為受理雖有明斷之材衙門必不能清簡二者當從古人凡人告狀官人當先熟讀其文有理無理寫狀人中間有無潤飾亦可見其過半當先引原告人當廳口説所告事理一一與狀文相對同則憑狀鞫問不同則便引寫狀人與告狀人對辭若有與口辭增減便決寫狀人亦減止無情妄告之一端耳上失其道民散久矣如得其情則哀矜而勿喜民情與政通先知時政然後知民情夏尚忠殷尚質周尚文至於後世政治雖不及古豈無所尚乎所尚者民亦尚之究其源之失知其流之差不可誣也無或偏聽於獄之兩辭五聽之法當熟知言察情明理鍊事四者胸中了然且無一偏之喜怒雖百冗坌集于前皆可談笑而決何必疲精勞神怒罵揮斥搒掠捶楚然後為得也若夫情見勢屈而不聽命先之以正言申之以感悟無不從者柔能勝剛弱能勝強溫言可以化人理到之辭不得不詘聽獄之法靜則明明則百姦不能逃其形切忌躁急躁急則己心先亂譬如撓水搖鏡焉能鑑物哉細民之所爭若無異事不過婚姻良賤錢債土田户口鬭毆姦盜而已此皆縣令之職令賢則必不至於上告至府至府而又不能決決不能服人良可恥也素餐之誚孰大於是當置狀簿辭一册便給縫印府官押訖每日新狀當直司吏隨即當廳附籍便令承發司布散合該人吏既畢隨手朱書吏人姓名於隨狀條下次日便令覆説無理者便退與原告人有理者施行但凡州縣可決者隨即批送必不可決者狀尾批令自勾此亦減吏權而除寃滯也府官五日十日一銷照十月一日務開三月一日務停首尾一百五十日每月先除訖刑禁假日四日計二十日又除訖冬節年節前後各一日計六日兩月一小盡除訖三日立春節除訖一日進年節表一日乙亥日三日若遇二月清明節又除訖三日計二十七日中間或遇同仕上官下任吉凶慶弔迎送上司使客大約又除訖十餘日總計五十日餘外斷決詞訟者止有一百日或遇兩衙門約會相關或干證不圓或勘會不至或吏人事故轉按疾病上司勾追刷案之類經兩吏人手又虛訖十餘日中間止有八九十日理問辭訟又以監視造作勸農防送遞運府州追勾按察司差委得問民訟多不過五六十日聰明疏通公勤廉幹者能決幾事若賦性愚鈍稟心私徇反為姦吏愚弄文字逗遛倏忽之間又復務停所以有十年八九年不決之事此蓋為十月一日興辭到官者言也若或正月二月才方告狀務停三限更甚迫促推原務停之政本恐妨農不知正墮姦吏倚法舞文之巧計以此觀之不若不立務停之限止取稽遲不公之罪必不敢至於數年之不決今後品官得代計在任月日經手事久不決者降黜責罰得代之日按無不決之事者升遷褒美不遇無法而亂不見聖人之治功不值叔世之苟且而徒法不知聖人之防患而慮逺姑以田制言之三代經野有法不惟務本地著而民和至於一切紛亂詞訟皆無自而起自經野無法田不隸官豪強者得以兼併遊手者得自貨賣是以離鄉輕家無父母之邦無墳廬之戀日且一日千年田換八百主交易若是之煩因地推收稅石之冗官吏姦蔽出入挑攪獄訟萬端繁文偽案動若牛腰一語抵官十年不絶兩家爭田連村受禍廢奪農時破壞産業視骨肉為仇讐化鄰里為盜賊飲恨銜寃死莫能解一鄉一縣雖素號淳厚者亦皆變為姦欺詭譎頑嚚健訟詐造契劵硬作佐證府州司縣惟利是視以曲為直以非為是上至臺省濁亂尤甚吁人之積怨含怒與日俱深良可寒心官府風俗敗壞至此刀筆賤吏猶以刻剝徵求斂聚貨殖為忠勤簿書期會為急務為明敏此乃田訟之一端至於科差之不均軍旅驛站之偏枯見在戶代當逃戶差發之寃抑酒醋稅課程之增額利歸於姦貪之手禍及於無告之小民刑獄之淹滯略不詢問赦恩之頻數縱放凶殘內外百官賢不肖混淆幹局廉潔者招謗惹禍貪汚委靡者嵗得美除出條欵則虛文嚴密責實效則百不一舉軍籍民籍點竄改抹略不可憑錢穀出入漫不照算官不知法吏不識字身為軍卒而不識弓矢名隸工匠而無一器具僧道則有妻有妾飲酒食肉趨利無厭醫藥者不知方論素無學術狠忍殺人中選儒人不經不史不文不詩不修身齊家淟涊無恥冒虛名而求美官尚口舌而無實學標置自髙致行同市井上下無正法是非無公議妍醜無明鏡重輕無權衡曲直無繩墨棼絲沸羮莫之分辨具曰豫聖孰知烏之雌雄唯此時為然論有司不立常平權衡髙下一出於編民物有餘則賤不足則貴固物之情也然而乘時徼利賤入而貴出亦市井之薄俗近嵗農民亦為壟斷之態寧取倍息之稱而買穀麥欲乘其雨不時降新不接舊物價為之湧貴而售也是以今晨物價若干日夕物價若干朝貴暮賤朝賤暮貴若翻覆手乘其逐末者日求升合而素無蓄積耳有司略不介意坐視其紛紛無定偷薄姦弊日甚一日然則古人常平權衡可不設歟丁糧地糧詳文近為民户張忠買到軍户王贇地二頃五十畝又令張忠重納地稅事申部除豁不惟不準五致符下本路問罪今來若不再行申呈地一也而曰軍地民地稅糧一也而曰丁糧地糧是蓋因人以立名因名以責實因人以推收義例甚明當丁稅者不納地稅當地稅者不納丁稅自立此格例以來未有併當重當者也近年以來破壞格例既納丁糧因買得地稅之地而併當地稅或地稅之家買得丁糧之地而併納丁糧如此重併府司屢申終不開除反致取招問罪不惟案牘繁亂名實混淆軍民重併使國家號令不一前後失信省部見小利而不究大體以瑣屑俗吏之言為可聽俗吏不惟不知理義且如一話一言先自差失何以言之所以名曰丁糧地糧者地隨人變非人隨地變也今曰隨地推收先自失言合曰丁糧地糧隨人推收則不待解説而事自明白政自歸一民賣與軍地除四頃之外納地稅軍賣與民地不問多寬止納丁糧豈不簡易正大不費辭説若中間作姦造弊偽不以實嚴立罪責各有所歸則自無詐冒伏乞照詳論倉糧每嵗稅石無問年嵗豐歉務要應期而足鼠耗分例之外計石二三可納一石穀精細乾圓然後入倉加之逺倉人功車牛往返月餘所費不淺下之供上不為不勞所謂剝口體之脂膏而應國家之急用竊見河倉暨京師倉並無敖房皆作露囷不一二夏舉皆陳腐臭敗以致馬牛不食復借之於民石得八斗又以農忙無力搬取賤取其本而棄之如糞土秋成徵還加倍不能償是國家常稅本該一石新舊併徵計以加耗而併納三石矣其餘為官倉船戶失陷者不可勝數事發到官枷紐連嵗無追徵者省部明見此弊略不置議愚謂倉官各選品官廉慎幹局者充增餘失陷明立賞罰以每嵗所著錢或減租稅之半折納交鈔以二項錢偏置敖房實為便當匹夫嵗費父母妻子身計家五口人日食米一升是周嵗食粟三十餘石布帛各人嵗二端計十端絮二斤計十斤鹽醢醯油一切雜費略與食粟相當百畝之田所出僅不能贍又輸官者絲絹包銀稅糧酒醋課俸鈔之類農家别無所出皆出於百畝所收之子粒好收則七八十石薄收則不及其半欲無凍餒得乎又為以上三四十家不耕而食者取之所以公私倉廩皆無餘蓄矣試典史策問即今司縣司吏起身寒微素無祖考遺留産業資財本身不會士農工商止仰月俸養廉然而食則粱肉衣則羅紈鞍馬奴僕與品官無異妻妾首飾金珠衣服金錦文繡與命妻富室無異所居之室髙堂華屋不知所得從何而來假有編民遊手好間頻飲酒食肉必為鄰人弓手里正所疑此人不務實作活每日如此受用伺候刺探得錢因由必得其姦司縣司吏奢華如此略無一人窮究詰問反致當路權要保舉廉慎未委虛的仰一一答問古今設官置吏選取人才為官者必須通曉政事長於判斷推勘刑名詞訟使民無寃抑推排差役賦稅貧富均平六事皆辦百務具舉斯為稱職為吏者案牘明敏刑名嫻熟無稽遲無違錯斯為稱職不稱職則自有彈舉之有司不才者合退罷則退罷今皆不然取勘歷任月日動皆二三十年試以才能則百問而百不知豈有身為吏人不識字不解書算不通刑名案牘止以勾當年深縣升之州州升之府府升之部部升之臺院都省出職為品官當要職外任則承流宣化內則參決大政綱領郡縣取人如此是邪非邪為官為吏不自慚懼猶懷悵怨職小官卑以為虧已事當何如仰一一答問
