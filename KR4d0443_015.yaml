body:
  text: 紫山大全集卷十五元胡祇遹撰碑懷逺大將軍彰德路達嚕噶齊揚珠台公德政去思碑武勇可以折强暴而不能得匹夫匹婦之心權謀計數可以欺天下而信不孚于豚魚此無他以力不以德以詐不以誠也惟德可以服萬世而動天地惟誠可以感冥頑而格鬼神人之恃皇威憑帝力禍福生殺出自我手繼以詭譎違道干譽糾結姦黠欺世盜名取口稱張虛美立生祠樹豐碑不為少矣若此者在律為嚴禁何足尚哉惟惠政實德遺愛去思使人愈久而愈不能忘銘刻人心者為可尚巳此古之所謂循吏者也彰德路達嚕噶齊揚珠台公承祖考世爵監臨本郡九年至元壬辰讓位于其叔未幾御史臺上聞升嘉議大夫山東東西道肅政廉訪使士聞而榮之既適任邦人懷慕不已礱石狀績乞言于不肖頌公之德美歌詠于無窮以厚薄俗以勸來者噫不惟今鮮斯人求之于古亦不多得謹按公到任至移官嵗時伏臘人心樂為之歡慶者枚果升酒不入于門及其館穀貴人延接賓友豐腆勤厚傾資倒廩而不吝惜聽訟詳審不大聲色情僞既明諄諄開悟使人愧服悔過而退吏或不法惟贓私不貸公罪則以情恕之同仕官太過不及懷私相干犯亦寬容而禮貌之喜怒不形于色相愛結歡三年不改易無一言之相謗訕士大夫之年髙德劭樂道忘勢以師禮敬事之至元二十二年夏旱齊沐徒跣凡可禱祀無逺邇致誠竭䖍不三日甘㴻霑足是嵗大熟鎮南王駐汴以事趨謁路值民車千餘曝炙于火雲赤日人牛困暍不敢進退公即白王放歸二十七年姦臣橫暴分遣惡黨禍毒天下以追徴逋缺為名所至凶殘百至雖漢唐酷吏之不為者盡其毒螫死者相望所在有司股栗屏息而不敢言亦反有助惡為姦以肥其家者彰德例被其害公抗直不從哀訴於上一郡獲免梁王往撫西南夷供奉不擾而辦鄰郡疑獄凡委公推決者無異辭皆得平實生長富貴不見豪習書翰得法無事則觀書鼓琴以學校養才之地釋奠釋菜身先屬吏祭器按圖命工補完精緻以月俸買書千卷入府學萬卷堂嗚呼公之德政此其大略也若夫以州郡不得展驥足為霖雨為舟楫者又未易言也謹因民之深愛而為之頌曰民無愆罪生瑕玼民無鬭訟牽致之片言可決留嵗時以緇為白白為緇瘠民枉法肥我私汙濁苛虐相承師人民疾怒難怨咨淟涊無恥如韋脂有人於此異於斯羣蒿挺出青松枝鳳凰寧與雞同塒鵷雛豈顧腐鼠鴟清廟玉瓚朱絃絲豈弟樂易仁且慈九年惠政雨露滋撫摩黎庶母護兒嗚呼宜乎碑去思嗚呼宜乎碑去思潞城縣尹吳公去思碑至元十三年秋八月巡按平陽過潞州一人持狀來前將謂屈抑控訟以吏詢所欲言則曰某潞城編民身無寃訴前潞尹吳君去任今九年矣遺愛民不能忘左政實績彰彰可舉偕衆而議吾儕小人䝉吳尹德政銘諸心者死不可劘此身百年誰其知之曷若文石以傳不朽使吾賢尹之善勸來者以名後世吾鄉感恩戴德報謝忠厚之風諭子孫以及鄰邑且激濁揚清使君之職分也好善疾惡使君之天資也故甘冒干凂之罪敢以狀聞願以志石之言為請聽其言而納其狀竊自喜歎我朝官制自中統建元頗慎推擇州縣之寄尚或非其人秩未滿而為土人告訐者十三四幸免者半無毁無譽者十一二去任將十年使人思慕紀石是豈聲音笑貌曲邀橫結之所能致哉是人也雖不熟其平昔以輿情為可信漢史傳循吏而不傳能吏吾言其可以己乎尹名讓字某銅鞮人飾吏事以儒術勤恪豈弟胥史有過諄諄諭悟不嚴而化公家貨易諸物錙銖之價手自及民不為姦蠧所欺行野訓農星言夙駕欵曲周至不急不徐趨事赴功勞而不怨家僮馬食民禾痛繩而倍酬其直豪族强宗侵漁細民者屏氣束手庭無滯訟剖決如流終考事無巨細行信板以示告村落無吠犬里胥之警去官之日裘馬書冊還家一無毫髮攜挈潞尹之政此其大略也至於一言之可取一事之可書具在案牘異日當史筆傳循吏者自有所取而詳言之耳孔子曰聖人吾不得而見之矣得見有恆者斯可矣以有恆視聖人相去奚啻天壤吾夫子愛而弗棄者人之為善恆久而不己為賢為聖將有日矣貪暴邪枉中而如吳尹者亦罕矣推是心以往治一州撫一郡恆久而不易其德業豈易量哉若夫矜小慧忘逺大患失苟祿而為衰老務得之氣血所移不徒為是石之羞亦何以面潞人吾之所信者潞人之言潞尹之政已往未來者吾不知之矣霍僉事世德碑銘人能種德積善福祿來報不在其身必在子孫天理昭昭信不可誣故視人之所為而必知其有後觀後人之富貴利達則知祖考之平日前人翊子孫以髙大門閭者亦豈妄自矜負言猶在耳而徵應隨至豈虛言哉今于霍氏見之矣僉山東東西道提刑按察司事奉訓霍公改葬曾祖考三世于某所以不肖同仕分義之故狀世德以墓碑求銘詞霍氏世為唐山人髙祖以兵亂失家譜諱字後世無傳焉曾考嘗監本縣稅祖諱嵩以法律案牘精明詳審為邢州孔目官郡守性褊急以喜怒愛憎決事公抱案與守辨正是非屈直雖臨以盛怒不懼不屈雍雍容容辭盡理到多所平反恐日久積忤守意年甫四十托事勇退慕黃老養真修煉之術道家所謂洞天福地厯厯游覽異人仙侶日相從游遂得其法一日兵亂衆皆驚惶逃死無所公笑謂人曰我當尸解仙去矣遂獨飲大醉而逝時年七十有二月餘兵去子孫易棺改葬容貌如生咸驚異之至今鄉里耆舊能道其始末考諱圭字子璋登律科第以親老永侍不仕宦者十七年父既仙去奉母夫人王氏避兵裕州帥府聞其材辟充幕官干戈擾攘文移如織使者旁午公隨事應變剖決如流雍容辦集若無事焉事有疑難衆莫能決者一言裁處人情時宜無不允當衆皆嘆服每按大獄悉聰明致忠愛全活者甚衆城陷母殃兵亂定還鄉里至南肥舊帥府屬吏張君玉輩留挽因家焉未中年誓不復仕閉門以經史自娛雖里閈罕識其面生理蕭條怡然泰然不恤也邦人以素學專門願以子孫摳衣受業堅拒不納但勸以孝弟讀書一時官吏士庶莫不師尊之每以疑事咨請欵曲立決嵗甲寅五月七日以病終于正寢享年六十有幾妣范氏廣宗名家婦德母儀勤儉慈愛事舅姑盡孝事夫以敬順至元丁丑正月九日壽終享年八十有四四子長曰騂牛次曰儉德次曰仙郎次曰肅郎即奉訓公也年十六丁外艱哀毁柴立服闋以母老家貧不暇擇祿降志辱身由縣吏而州州升府府保貢于部用監察御史以公廉薦補憲臺掾轉主宣徽院事至元丁丑姦邪用事剛正廉介不容于朝然無罪指謫議以遐荒遷注改受安慶路總管府判官明年春行省奏南選升降不公就升鎮江路總管府治中是嵗秋改充杭州總管府治中明年冬改授揚州總管府治中未之任改同知兩浙總市舶司事時權宫阿哈瑪特子庫克新拜行省左丞專務掊克聚斂公稱疾求醫閒居錢塘纍䝉行臺行省保舉辟召皆不赴至元癸未夏授奉訓大夫僉山東東西道提刑按察司事公剛正廉介見可而進知難而退發身以吏成身以儒不十年而揚厯中外為賢大夫今才甫踰强仕前途豈易量也厯任在官政績俟千嵗後神道一一具載兹故弗言當銘曰人生兩岐勞力勞智不農工商舍士奚事秦漢之交取人無藝一時豪傑隨世所貴如蕭如曹咸隱于吏業則刀筆志則仁義霍氏一門祖孫三世世守其業蕭曹之志偉歟奉訓剛正嚴厲許身古人脫略時輩詩書箕裘糞土財利入仕十年揚厯中外在清流中又作涇渭御史臨民親愛而畏永言孝思罔敢失墜髙門之言炎炎奕奕吉卜先塋大碑深隧種德增光有隆無替張彥明世德碑銘公名照字彥明為濟南人祖諱全妣韓氏考諱信妣李氏呂氏兩世治生商賈纍資富貴鄉里貧不給者出有餘以周惠之稱貸而不能償者悉毁其券嵗壬辰兵荒民乏食發私廩起餓殍賴以全活者不可勝計公幼業儒以科舉進士之路廢改習吏事起身濟南總府掾廉畏謹幹考功上計十年無敗失以勞能升本府從事嵗己未赴壽陽行省㑹計出入積年錢穀陳訴不允銀一十萬五千兩悉得開除貧富貴賤免重徵之苦民用不擾中統建元立中書省省掾難其人公首膺選擢掌邊防幾密就遷左司提控案牘四年出為山東東路大都督府員外郎未幾改充山東東路廉訪府兼轉運使司參議嵗終考課最諸路至元二年宣命金符濟南路諸軍鄂勒總管秩滿除陜西五路西蜀四川行中書省左右司員外郎八年官奉訓大夫知兗州事時春夏不雨二麥將槁吏民闔境禱公入境而雨幾二尺是嵗大熟屬縣黠吏扼持官府侵讐細民夤緣為姦利察知其尤桀暴者痛繩而除其名羣邪為之屏息二吏赴提刑司訴寃耆老七百人繼狀申明知州公明斷為民除害此二人誣飾虛妄不可聽願將若輩投諸水火無憾也二人者逃匿不知所在瓜代兗人刻石頌德十一年四月改授淮西等路行中書省左右司郎中方大兵渡江攻瓜州鎮江守困揚州師百餘萬比炎方悉平凡再閲嵗調度糧運供給器械有備無闕婉畫竒計為多十三年揚州主將李庭芝棄城遁去餘衆據城未下公不避矢石直抵隍池諭以廢興衆寡强弱形勢奏咨議者四人出城從公詣軍門定約降期三日朱制置以城降乘勢草檄傳布淮東未下諸郡髙郵真通滁相繼欵服江南平丞相奏羣臣之功䝉旌賞錦衣鞍勒宣命金虎符官加大中大夫揚州路總管府達嚕噶齊商議行中書省事炎方甫定人心反側未安揚州立省府又當南北津要公以强明精幹謹慎小心部大繁劇安集新附官府復治閭里以安十六年改授鎮江路總管府達嚕噶齊未半嵗以疾辭得請還家買書八萬卷以歸以萬卷送濟南府學以作養學者居閒五年怡然自得若將終身焉二十二年起受東昌路總管年始六十矣老于為政吏民畏信愛慕不大聲色而優游臥治朝廷行且圖任舊人共政比秩滿邦人雖欲借冦恐不得矣夫人某氏某氏子男若干某某女若干某某適某人二弟曰煥將仕佐郎膠鹽司副使曰耀將仕郎河南等路提舉規措所事猶子四人曰時中從仕郎泰州鹽使司同提舉煥之子也曰執中嘉祥簿兼尉耀之子也餘幼業儒至元丙戍春正月七日以狀來曰先塋旌紀世德前二十年濟南路提舉學校官髙翊序銘于石矣敢援古人第二碑之例為請庶幾吾子吾孫知吾家積德之漸以有今日恪慎克孝光紹先業而不敢失墜也謹因來狀序而銘之銘曰苦寒微兮甘富貴古到今兮情一致才不進兮時不利老凍餓兮賤無位偉張侯兮材拔萃孝父母兮友昆季不師友兮能自勵奮青雲兮起平地日千里兮進無退名日隆兮志日遂光祖考兮福來裔起懦夫兮發竒氣參大政兮決大議坐廟朝兮厯中外耆指使兮如壯鋭總大郡兮但臥治起孝思兮封墓隧銘兩碑兮傳永世示後人兮毋失墜成安鄭氏世德之碑奉議大夫知磁州事兼知本州鄂勒事鄭公以書來曰先人棄諸孤十年于兹矣每以封樹未隆旌紀不石追慕哀痛得罪於天地鬼神夫復何言謹卜以至元十七年春二月二十有五日祔葬於成安縣歸義鄉郭孟里之先塋誠得吾友撰著生平之事業刻之貞石昭示來裔庶幾少舒積年愧怍之恨謹按來狀序而銘之鄭氏自奉議公之祖考始居成安遂占籍為縣人考諱璧字君章幼孤養於姊夫張氏為兒不好弄成童有立志以儒為可學業進士舉克自勤苦寒不爐暑不扇深夜而寢雞未鳴而起若是者有年業成將射䇿於有司貞祐河朔兵亂不能成其志金主去燕走梁以魏相為邊陲元帥完顔惟宏握兵開府於林慮固巖邑以自守招徠流竄府州邑之可立者立之才能有用者擢用之成安令薛公文卿久知公才名推擇為縣功曹未幾薛升元帥府軍民都彈壓薦公廉慎幹局改充元帥府掾史既而帥府以孤軍不能立府事廢而官吏散亡公以天時人事推度其彊弱廢興以定去就不可復南挺身還鄉里依元帥郭侯智說以收合成安十餘縣户數萬口數十萬投欵內屬是時土冦紛拿妄自尊大奪攘䖍劉互相勝負莫可適從公佐郭侯曉以天命示以逆順彊弱諭以禍福成敗彊暴為之受約束教條棄兵力農熙熙為樂郊公之力也有以乘時從風當自奮拔取髙爵食厚祿而問公者公曰人生富貴功名在致力於壯年豈終嵗後人所宜為也以儒術飾吏事豈余素心哉車下澤而馬欵假不為鄉里所疾惡斯亦足矣乃角巾私第不入官府以耆德年髙浮沈鄉社鄉人尊敬問學如父師愛慕如春雨冬日享年八十有三以至元七年冬十月二十有八日無疾而逝娶張氏有賢行母儀婦常中表為法慈順姻睦外內無間言子男三人長曰愈字希賢即奉議公也中統建元以德行才能選為中書省掾秩未滿以隨朝辛苦之勞出為某州某官四五轉而至某官遺愛善政在在去思功業日隆方興而未艾次曰願泰州提舉司知事次曰恕林州三務提領孫男九人榮祖顯祖光祖紹祖繼祖慶祖敬祖孝祖安祖先民有言曰人之積德積惡固不同其以福禍報施不在其身必在子孫則一也公有德不耀有才不盡展年登上壽子孫昌盛而篤生奉議公髙門之慶豈非明效大驗歟為子為孫者追孝於前人於光有耀又奚止如斯而已耶宜為銘以歌之銘曰無脛而馳無翼而飛有進無退翕受敷施以公之材詎無可為委吏乘田能者恥之賢於堯舜黽勉卑微嗟嗟此心庸人莫知公之處己聖人是師栖鸞於棘蟠螭於泥不騫不翥自晦自怡屈久而伸三鳳飛輝孝哉奉議德業日躋揚厯中外晝錦來歸松楸有光鬼神其依封樹旌紀髙冢豐碑百世不磷勒以銘詩大元故懷逺大將軍彰德路達嚕噶齊揚珠台公神道碑銘公名納琳居準祖曰圖薩博多考曰圖爾哈徹爾巴圖爾相承為太祖太宗圖爾哈飲水于班珠爾納蘇圖開創同艱苦事定酬勳因其所居之山川䝉賜氏曰揚珠台圖爾哈徹爾侍太上皇晝從射獵夜謹宿衛其族弟博囉罕叛入太丑軍太上皇疑其有異志指天而誓曰臣以死無二心遂奮不顧身殊死以戰大敗太丑軍滅博囉罕上皇喜其忠貞許以土地人民辭不敢受曰俱非臣所欲也臣宗族散落願托天威聚集之得四百餘家復為大族太上皇四子以公𨽻錫喇大王位下西征留公領本位諸局繼受令㫖充本位下逹嚕噶齊先帝龍飛金符授彰德路達嚕噶齊以本位湯沐邑也未幾佩虎符職如故誥詞曰以爾王室舊臣常著勤績仍賜狐白裘隨拜王命賜七寶大帶曰惟此可以佩金符是後繡鞍珠服織錦海青鳥恩光稠疊照映外內公以丁巳嵗夏四月到郡時適旱解鞍而雨郡當南北衝要使者旁午前政以送迎館穀多被譏謗督責公以纍聖知識位望隆重過此走謁而去市井無一錢之擾强冦數輩大奴婢小奴婢者劫民財殺捕盜官而去人畏其凶强莫敢詰捕公嚴責有司立獲於衛州市申部下報公知其黨與連結恐不測起獄為民害戮首從七人民心遂安由是經嵗外户不閉無犬吠之警先帝南征詔所經官路限一里為營盤牧地嵗己未今上六師南下公迎拜行營奏曰奪耕田而為營牧南方土壤易荒但長蒿蓬荆棘無美草莫若使民樹藝五穀師行則牧馬振旅棄餘則令民收獲軍民兩便上喜從之民復舊業得地萬五千頃庚申建元上即位諸王議事於金帳惟公得與上欲用公於廟堂以病辭諸路積年逋缺皆令見在户代償民不勝困乏奏䝉蠲免鄰郡亦賴以復我朝語言精密典故極多唯公能盡其說曉其凡例雖居外郡以時備顧問故多在京師凡大宴莫不與焉在郡十有二年不置田宅戊辰得疾上遣醫賜藥不絶上一日宴百官於萬嵗山歡甚樂奏北事未寧公奏曰願陛下安不忘危聲樂烏可以弭邊患上喜諭羣臣曰舊人故多無如此人出嘉言者明年還郡是嵗十一月初二日薨于私第之正寢享年六十有三實至元六年也公忠清廉介論事雍容悉理撫民寬仁不苛暴夫人蘇爾圖展氏多爾沁氏子男五人長曰額哷充中書省斷事官次曰雅圖噶侍從賢王立功西域次曰阿固岱剛毅沈雄未及仕皆先公卒次曰伊爾圖仁厚重靜襲爵彰德路逹嚕噶齊授懷逺大將軍有惠政民到今思之次曰伊爾布哈恭敬謙和以侍從勤恪授直省舍人遷南京治中至元二十九年以姪嘉議公讓職復承先業中順大夫彰德路大達嚕噶齊孫男二人長曰超台剛烈有父風次曰斡里襲爵九年讓歸于叔升嘉議大夫山東東西道肅政廉訪使去任民懷思之刻石頌德曾孫男一人幼未名銘曰北冥王氣開聖神鯤鵬際㑹乘風雲黑河飲水股肱臣錫土命氏酬元勳揚珠台氏門望尊豐功茂烈多異人英哉我公難等倫三朝眷顧䝉殊恩珠袍錦帶萬金珍繡鞍海鶻白狐溫忠貞謹恪益檢身有隆無替光寵新臨民惠政多寬仁安陽父老拜馬塵祝公調鼎宜千春英靈一夕還星辰邦人追慕良悲辛壽爵不滿公忠勤天報有子仍有孫孝讓髙節薄夫敦才兼文武知經綸萬里駿足今始伸州郡小試非要津為霖蘇旱活飢民慶元千世長沄沄大元故懷逺大將軍懷孟路達嚕噶齊兼諸軍鄂勒䝉古公神道碑太祖皇帝受天命臣萬方太宗皇帝繼體守文一新官制簡而不繁統之有宗內則一相宅百揆贊萬幾外立郡縣以承上接下郡縣之守令例以歸義效順者就為之仍選䝉古人一員鈐壓其上謂之達嚕噶齊守令以次咸聽命焉生民之休戚政治之美惡實係於達嚕噶齊之賢不肖彰德居十路之一又當南北之要衝朝廷以公為能自呼圖克帳下扎薩克齊擢拜彰德路達嚕噶齊嵗丙申之四月也時金亡才三年民始脫兵瘡痍者未起逃竄者未復居者猶未安禁網踈闊兵卒恃功不能無侵陵攘奪之暴雖城郭井市之間外戶或晝閉而不敢啓敞公解鞍涖政知民以是為苦即下令曰敢虐民者當以法繩之工賈居肆者各成其市門户開朗安生樂業無驚疑恐懼為農者各安畎畝趨時力田無苟且荒怠苦汝者吾能訓導禁治之令下强暴者柔馴而莫敢犯野耕途行坦坦煕熙始知有生之樂嵗戊戍春二月懷州守臣王榮叛太師國王命公討平之且有殄殱之訓公對曰王師討逆脅從者猶當宥况無辜乎國王嘉其言而從之王榮伏誅而闔境得免郡人壺漿香火攀送號泣而不忍去後四十年改治河內百姓聞而喜曰是全活我父母妻子親族姻婭舊使君也嵗己亥相衛蝗野無青草民乏食公訴告於執政大臣呼圖克分軍儲糧五千石以起餓者用是民無流殍嵗庚子至癸卯四年大舉南伐所過官吏告病公以忠勤預備供給不匱而民用不擾嵗丁未淮漢諸城隨下隨叛民無所依者南北奔竄邊將土官爭掠以為功公以恩信招諭萬餘户悉以為民三尺之童不遺也間嵗比不登賦役督逼屋空十三四公命官四出告諭還業者復三年是嵗招來萬七千户嵗戊申春正月輝州賊人朱葛結黨逆亂兵官乘釁欲夤緣縱濫公曰國家貴我富我委兵柄于我寄一郡之命于我將以我平寇耶以我為寇耶不用汝輩妄自張皇賊不獲亂不平吾任其責即率麾下以往獲賊三十八人於黑鹿山郡人安堵如故秋毫無所犯嵗己酉春三月賊人薛志全亂如前䇿而平元戎察罕知公廉明寬仁每遇諸路解送死囚即委公審問推情據法寃伸罪減前後不可計安陽農家得罪於貴人責斷處女六名寄留而去至是將十年公申明於貴官阿勒楚爾悉嫁為良庚戌夏旱公齊戒祈禱甘㴻沾足中統三年春李璮叛遣奸黨僞馹逺圖不軌東西經數路官府莫能辨公發詰而服姦謀為之破散四年旱禱雨而雨是年改授明威將軍中山府達嚕噶齊至元七年遷河中府達嚕噶齊十一年春以勳舊老臣仁政廉節所去見思佩金虎符超拜懷逺大將軍懷孟路達嚕噶齊兼諸軍鄂勒二月二十有九日以疾薨於私第之正寢享年七十有一公䝉古人小字䝉古巴爾父錫巴爾母稜拉夫人六額齊濟徹辰伊蘇塔海趙氏䝉古展子男七人淖海嘉議大夫淮東道肅政亷訪使博囉武略將軍嵩州達嚕噶齊自筮仕知子民之方所至政聲藹然去則民不能忘齊諾舒庫爾齊能以恭勤自律扎瑪哈特穆爾竒塔特未仕和拉推勒早世女六人諤都岱適大丞相忠武公之子右丞史侯阿什克適王宣差博囉展適濟凖提舉伊勒謹適黃頭百户噶嚕迪適同宣差小女兒適肖宣差男既葬之七年其子淖海等狀公之德政以神道碑來請銘嗚呼厯觀古今之為政者貪者必殘而廉者必仁如形聲影響之必然蓋貪則不足不足則凡可以力取者雖以一已害天下不顧也廉則不苟得不苟得則雖一介之輕不義則不取也又安肯害物以益己哉公治彰德近四十年所居之室所食之田庇風雨取溫飽而已薨之日遺子孫者無别業餘財故能形而為政一以富安全活愛人利物為務方之漢唐廉吏循吏亦可以無愧若夫不學而不能為風俗移是之謂尤難在一時牧民之官當為第一流人銘曰元武間氣篤生異人發强剛毅淵靖沈恂大藩名邦來經來綸解鞍涖政無非至仁民始脫兵瘡痍吟呻煦摩愛養時雨陽春悍將驕功侵陵賤貧德威惟畏悔過自新市野雍煕强暴柔馴里詠途歌歡騰四鄰鄰人有言孰匪我民惟彼相衛樂耕樂耘我無父母恩胡不均凶逆好和貪殘鼓軍渠魁伏誅脅從獲伸律兵而還不囊一緡吏感其廉咸知愛身民懷其惠如子慕親遺愛百世豈惟兹晨宜其有子繼擁朝紳宜荷聖念錫名忠臣邦人追思日見丰神墮淚而碑不在斯文
