body:
  text: 紫山大全集卷一元胡祇遹撰賦孔子手植檜儒冠賦昔余年之總髮兮恭承先生之嚴命冠汝字汝兮毋墜汝祖曾髙之家慶不辨以武冠儒服儒兮敬之哉終此身於仁義中正蹈道之士充之則賢庶幾要歸乎大而化之之聖荏苒於兹四十年餘種種乎素髮之垂頸吁􅐵長嗟立德立功負我先君之志兮日慚怍乎臨鏡旦旦理髮整冠以自警兮追訓言于無聲之聽慎爾話言敬爾威儀矧承時之人許身以從政德不稱服兮何異乎犬羊其質而被虎文之炳赫赫師尹民具爾瞻兮一貌一容尤不可以不整羣目所視衆手所指兮持身於日恭而日敬今晨何晨有客叩門袖木寸餘曰此孔子之手植檜也千五百年貯雲含霧而雪霜莫能悴也物各有數火於貞祐之兵鬼神莫得而衛也灰洽燼飛蟠根九地發土得之堅若金石真可寶而不可棄也嗅聖手之澤香潤襲人斷而為冠是可戴而不忍佩也一簪華髮萬古清風殷之辨周之冕邈乎其不可類也貂蟬惠文進賢白編卒然遇之恐退縮而失其貴也三沐三薰潔我衰鬢悚乎若聖手之遺也希聖之德辱神之惠振塵而增嘆喟焉亂曰首可飾兮髮可理兮心難乎其無愧兮勿徒矜莊于外而廢弛于內兮毋狀類古人而黽勉以隨世兮毋盜跖其躬而掩宣尼之袂兮岌岌峩峩髙自標置為欲所驅而沁沁俔俔低頭服膺卑屈于利兮冠不汝誤汝無為冠之纍兮五言古詩擬古矯矯千里龍舉足踏空濶脫人于險艱四海不難越安能陪駑駘從人求莝秣墮地為丈夫造物不吾薄安忍自暴棄黽勉同瑣屑隨世覔溫飽呵手懼氷雪百年何足榮萬古名不滅古意俗儒束名教促縮如寒龜奚知樂道趣強勉軒鬚眉短褐不掩脛破甑不療飢朝誦夷齊言暮取顔氏師妻子雖嗷嗷敢履非義機不見竊國侯夀考厭輕肥懷古一受其成形便為氣數拘冬龍與夜螢潛飛時自殊小智昧安命瑣瑣談賢愚三仁值殷衰一身不自濡漢興貴公卿胥吏雜屠沽後世看成敗美譽歸亨衢嘖嘖史臣語烈烈雄丈夫萬事盡偶耳百慮良區區春和散膏澤賤草皆敷腴秋芳結寒霜幽蘭例雕枯適來勿軒軒適去毋吁吁皇皇東魯聖嵗晚賦歸歟前題蛟龍布雷雨蚊蚋競腥羶君子與小人志趣天壤懸苟無東魯聖孰識簞瓢賢智者憂其貧愚者嗤不前豈知回也心不在爵祿邉誠欲富且貴執御仍執鞭枉尋而尺直未冠乘華軒舜飯糗茹草若將終身焉不遇陶唐君佳哉厯山田前聖與後聖百世同一天曽點豈狂者詠歸忘華顛讀書有感古人不可留遺言在糟粕誦言欲求心遐想亦綿邈注釋萬千蹊適從欲疇托十行誇一目對卷已紛錯孜孜一書奴記誦務該博衆來咨至理有舌莫捫縳書生亦良苦深念墮冥漠頭白眼昏花亷隅伴寒薄壯哉班定逺投筆開寥廓西域四萬里俊功超衛霍笳鼓歸京師弔死殊不惡讀易掩卷靜坐有感狂陽氣漸衰利欲心已釋閉關得靜坐怡然有餘適眼眀觀萬變氣機不少息智愚賢不肖孰得竟孰失氣數苟未盡善惡紛鬭敵蟻穴劉項兵蝸角蠻觸國風霜十月交萬動入冥寂人生百年間如白駒過隙窮通互有命安用相劍戟胡椒豈須多厚積八百石讀書有感余生墮習氣老眼尚愛書開卷初明了久視成糢糊下欲窮至今上欲窺唐虞下上數千年治亂牛毛如孰是與孰非錯亂雜紫朱欲辨誰與語撫卷增長吁讀書求悅心自笑乃爾愚請觀大地形脈絡各異區中原多平田要荒因﨑嶇匹夫耔百畝四海多荒蕪讀書有感二首人誰不看書看書多不細看書誰不細了不得滋味既讀聖賢書當見聖賢意凡聖本同心氣稟或明昧讀書既開悟勿為人欲蔽既習而又習致力復致力初不無勉強久久自順遂欲罷反不能於何勞智慧朝野有新言例自比豨狗斯言固卑猥情實不誑口啜訶何足羞㺯侮不知醜見食還復來捶撻暫趨走人生至于斯百惡無不有斯人亦居官政法誰與守讀論語自警人心本無病致病皆人為私欲生百疾聖人乃良醫用藥各對證疾去心融怡君卿大夫士周綱斷維持奢僣至傾奪習熟不為非禮樂存虛文虛文亦崩隳刑政遺餘迹餘迹亦陵夷一時為學人良心陷昏迷受業七十子氣稟各不齊聖眼如日月照見毛髮疵隨問隨答應滿意飽載歸論語書一編我將類町畦各人言行下病藥兩相隨一一反自省有無此欠虧一言即一藥服之有餘師讀汲黯衛青傳有感而作整冠見汲黯踞厠呼衛青敬侮固雲泥用舍誰重輕一死淮陽守一握百萬兵起塜象祁連至今與雲平嚴憚日踈逺玩狎日尊榮所以皂𨽻流長作貴公卿世無魯仲連世無嚴子陵天壤一蠅蟻萬古爭羶腥題惠崇蘆鴈圖六翼已水濱孤鴻下寒雲念羣與得侣伸頸聲相聞禽鳥有此樂賢者會以文我無如川酒滿堂會嘉賓我無及人德孤陋常寡鄰卷中題詩客十九餘交親宦逰各分散不得偕晨昏何時一聚首拂拭襟裾塵道義共講劘文詞同細論燦若德星聚謨謀奉嚴宸題王晉卿扇舉世附炎熱此心獨虛涼隔離雲日赤障盡泥沙黃得手方進用避色能退藏清風萬萬古愈久得彌彰漁樵圖何代無巢許混迹樵漁間君臣非唐虞明照不容姦公論一脫口萬古埀不刋吁嗟肉食人例以愚夫看真偽若白黑潛隱良為難所以戒慎獨機心即天關畫師豈無意庶幾消凶頑無聲董狐筆見者宜汗顔題韓氏異花記後居室出善言千里即相應擴推惻隱心草木被仁政神鑑良昭昭聨翩生瑞慶天葩出鳯雛五彩相輝映苟非積實德此福何來並恨無瓊瑰辭洋洋入歌詠刻石大伾山千載去思頌讀莊子蒙莊談自然未必皆背道靜中見天機安肯同世好紛紛知與才私欲助貪躁九敗博一成暗墮山鬼笑區區是非言萬蟬同一噪禍福定誰司一一冀酬報寓言豈無情但恐傷名教至元癸未秋八月二十有一日書陶詩數首至羲農去我久一篇寄懷於言人皆歎衰老我老起歡心自從嗜欲淺頗覺天機深抱我天爵貴浮榮不能淫琅琅聖言外羣蟲費秋吟百年難處事一朝失嶔岑耳目願遲衰中和盈我襟少倦即掩卷有酒時自斟衰老少睡眠未晨即坐起僮僕誠多倦我心私自喜壯年嗜欲昏日出夢方美回思昔日歡一一盡堪恥立德與立言重任失行已亦隨市井兒車馬紅塵裏醉生或夢死趨向何庸鄙己往不可追來者猶可悔五十七年非今許能一洗讀陶詩因以自戒東坡晚流寓始喜讀陶詩使君未失志陶亦田父辭趣向苟乖隔好惡等棼絲在公猶未免何訝輕薄兒冥心味前言勿易生瑕疵公退靜坐讀陶詩有感而作仕宦二十年翛然一寒士公退飽蔬食琴書伴幽思軒軒同學友笑我懦無志富貴豈無心得失良有自流芳與遺臭二者非吾事已愧抱關人吏部知名字冬二十七日翰苑東齋讀韋蘇州詩有感而作賦分嗜讀書己與清苦鄰况復學吟詠安能登要津終嵗文字間矻矻勞君心幽懷祇自知究竟誰見聞西風嵗云暮白髮日益新寸心不自降尚負知經綸沍寒鬻絺綌東轅日求秦片言獲金印英哉當路人郭西種稻種稻踰千區鋤剃亦草草今年大有年穗實頗堅好僮僕笑有言蔬食長不飽黃腴含玉粒慰我色枯稿安知乃翁心朝飢何足道得米可十斛急送酒家保題劉永年卧虎圖視想得虎神以神寫虎真卧虎不盈尺雄威來逼人盤伏若有待怒虎屈不伸爪鐵剛裂石目電光射雲含嘯風已烈炳炳五色文熊兕莫敢越麏麞逺崩奔萬弩不可恐一飽奚足論惟獸亦多類天獨厚汝身弱肉恣強食猛暴無四鄰可憐書生癡每羡麟趾仁奮鬛振庸懦立髮衝冠巾想像劉永年厭處菜食貧宣化愛兹畫藏作御府珍弗慮如虎變委靡花月塵坐擁百萬師囚死遼海濱我言亦已竟觸物感歎新萬乘失其威化作草莽臣息軒畫馬圖息軒髙妙人寫馬入神駿世豈無畫師下筆落駑鈍始知人品凡百業不易進前後三青驄連錢玉花潤卓然見天骨千里煩一瞬行行二奚官丰姿脫塵坌清曉出天廄人馬兩間順息軒名士夫早嵗馳令聞清時了功名遊戲發竒藴嗣孫今復賢羣處見清峻風流慕前修英氣能自振愛畫豈徒為洗眼看飛奮觀書既久目力稍弱作詩以自礪讀書悅我心既久即傷目惜目廢觀書靈源復蒙固損益互相攻取舍無定路閉帙儼若思勇斷旋自悮司命人孰無視物隔塵霧媯虞成聖業豈以重瞳故不為五色盲閲理非所慮古人見天道安在窺牖户撥去非禮視三冬文史冨心目自雙清寒月洗秋露至元五年五月望積雨新霽涼月初上玉堂獨步久雨忽開霽莫涼如新秋青天出佳月清光欲馳流翛然坐空庭恍若崑閬遊清風散華髮欲寐還少留人生貴適意此外將何求世味吾豈無但恐貽心憂一觴聊自娛安用百尺樓五月十五日夜半急雨喜而不寐人為口體纍念慮千萬端秋隂懼霖潦春陽憂旱乾此生百年內日日不遑安風雨得調順造物何常慳吾聞名教言和為邪所干每每致災沴天心豈凶殘今春久未雨風霾凝隂寒一雨忽連夜霡霂聲未闌豈惟農里喜市井皆歡顔我無澤物功愧赧兼憂患米價日騰湧逋民何當還一雨靜羣氛麥浪雲濤翻豐嵗信可必榖帛如丘山處暑丁亥暑酷倍常年首尾五十日戊子復然六氣順當受炎蒸大苛苦端如遇酷吏誣罔恣凌侮無罪心鬱煩無慚汗如雨織羅不可逃憤悶誰與語今晨復何晨西風過庭宇洗眼視厯書殘暑當退處周興來俊臣貶竄穴火鼠四海一歡慶清涼按環堵羣蠅與蚊蚋斂翼埋糞土六合共澄清西成積場圃酷暑不可禁因有此作南維無秋冬祝融復當政炎炎赫其威火官悉奔命金石欲流鑠草木難遂性飛走藏隂崖萬生如坐甑酷惡讞獄吏薰灼百毒併鏖我赤壁兵沸江焉敢湞日車何遲遲盼午不得正四時各有序不代蓐收令扇搖腕將脫微颸終不競恨無清風手一掃火雲淨喘汗何時蘇持心以靜勝酷暑懷趙禹卿今年暑氣盛殘庚尚炎溽簿書坐官府汗髮若新沐申未方退食浹背濕裳服歸來僦舍底鄰溷連炊突開軒厭臭穢閉户困蒸燠燕山得秋早嵗律異昔宿司天屬相火朱明助餘毒東郊有髙士世網不可束深林蔭幽居清飈散踈竹匏食滿籬落禾黍過墻屋披襟遐觀臺曵杖清池曲秋水了一篇負手行詠讀肯雜奔競兒青泥淤馬腹人生眠食爾勞苦不自足相招許相過斯言會當復借君北臺風翛然醒毛骨雨霽客至暑雨逾三日曉霽猶蒸濕有客自外來泥濘沒馬迹羡我居優輕虛堂對書帙王事有期程誰能免行役我喜笑不答粗得稽古力帝祐得豐年勞逸俱莫恤農家築場圃禾黍如山積後六月晦旬休雨中不出立功既不遂立言誰汝嗔飽食嗜晝寢甘為蓬蒿人西家學苦空願與冥鬼鄰東家學長生奄忽散飛塵人生苟齟齬當作草莽臣著書垂後世名與日月新安能隨俗吏黽勉擁朝紳題史右丞瑞鶴圖四朝社稷臣開府忠武公將相五十年民無能名功嗣侯光前業天稟何貞忠平南笳鼓歸退然房刀弓君恩無可報盥濯居齋宫聖夀祝萬年不懈兹益恭孰謂九天髙至誠能感通雙鶴何許來下壇舞翻風如受香火供如示介祉容回翔久乃去白日流晴空明朝日將午羣鶴踵前蹤三日還復來享答醮事終萬目快前覩嘉慶四海同忠孝獲異應福祿宜豐隆恨無瑰瑋辭揄揚付歌工激勵臣子心一一懷丹𠂻畫圖刻貞石永永傳無窮立秋後八日夜雨秋風撼庭樹秋雨滴寒更繁音雜清響百種候蟲鳴少時喜良夜惟恐東方明老懷縈客思望望日東升清霜已滿鏡何地容復生衰老亦常理百志良未成攬衣坐無寐長歌發商聲八月二十秋旱民憂麥晚至汶上得雨沾足終日達夜時哉八月雨種麥倍常年謬當勸農責踴躍喜不眠年來米麥價絶食厨無煙三年九年蓄此事誰復言卒嵗脫餓殍不勝謝旻天山東百餘城德澤我承宣一雨解民憂執綏愧華軒苦雨嘆時八月二十五日雨至二十九日未霽不雨夏無麥久雨傷秋禾六氣良難調水旱何恆多霖霪五晝夜陸地成江河早榖未登場穗黑芽成科晚稼僅秀實坐視飽魚鼉九月迫霜寒麥地犁未過民生食為命艱苦百禍羅無術驅風伯開雲變晴和收拾腐敗粒起殍免札瘥又念官倉空無輸將奈何至元五年九月五日曉步翰苑蔬圃感懷而作人生百年間短景一彈指不能為名臣便當作髙士胡為逐流俗汲汲懼寒餒我年未半百白髮已垂耳怙恃久已失捧檄為誰喜諸子俟成立素食實中恥何當遂野逸杖履求園綺慶蓋元甫生子元甫生子西溪相公命名立説辭旨詳盡不可以贅不肖以老友歡慶之情不能已謹以數韻賀此身來何遙開物以為宗相續幾何年得父母遺躬上以承無算下以傳無窮繼繼永不絶直與天地終宗廟鬼不餒門闌藹春風人道莫此重萬金等蒿蓬所以慶門瑞喜見蘭玉叢今日復何日歡聲動晨鐘親友塞閭巷羔酒纒新紅蓋侯年半百蓬矢懸桑弓我喜不能寐奚啻他人同作詩代贊祝載酒夀媪翁善人自有後一彪勝羣熊啼聲氣吞牛夀福溢兩瞳明年學言立指揮走諸公再觀叢堂上瑞氣如彩虹買書須五車升户上髙崇應命趙畫索詩丹青雖細藝能者皆髙人請看宣和譜品分能妙神風雲湖海士廟堂名節臣胸次同造化慘淡入經營天地生萬物我筆能奪真凛凛氷雪冬熙熙花栁春嘗觀蓮社圖真宰差凡塵世無王黃華清論不復聞銅臺趙濟之索言期世珍筆迹我未見詩卷何輪囷許與多名士定如詩什新古人家數中當與誰等倫鄙俚敢靳惜酬報當殷勤寄我數十幅黃華我比鄰秋夜孤坐露冷寒蟲號熒熒燈未灺心清坐不眠耿耿獨長夜窗月如見憐徘徊巧相射我豈枯寂人孤衾一寒舍庸駑固何為壯志未凋謝荏苒文字中虛語非所藉豈無匡君術誰復吟荼蔗所喜遭清時上箸不可借晚涼登北城據胡床孤坐而作卧病復困暑扶杖登荒城素月流清光木末涼風生陂塘水正滿稻秧插青青田家暮來歸籬落煙光明牛犁雜雞犬兒女歡呼聲人生眠食耳何苦厭藜羮列鼎不復得有道不能行去家二千里南來困炎蒸依依東北望飛去故園情遊狐突山望望狐突山拔絶峯巒起思賢欲一到踴躍忘委靡土人尚緣襲有廟荒山裏升堂出雲端下深墮地底有馬不可乘便穩資杖履數步一止歇吁喘不能已松風散煙霧清眺亦可喜畏塗臨絶壁困怯汗如洗遊行乃爾勞跋涉胡可擬書生例孱懦炕坐翻故紙緬懷班定逺暫舶西海水薛稷鶴賈參議家藏野鶴視衆禽昻昻髙間姿薛公得趣深落筆形似之飄蕭散踈林喜受涼風吹雙雙窺魚鷺淡然立朝飢人生雜雞鶩一食良凡卑安得挾扶去越海求安期屏圍畫花鳥美麗助奢淫髙堂何深邃獨寫九臯禽昻藏看孤潔相對開英襟十二白羽翮九萬青雲心想當市購時不惜傾千金秖應涼月夕落枕聞清音薛公工畫鶴精巧無纎瑕細染頂腦朱掌中調丹砂踈分羽絲雪膠粉洗復加冥心成老鶴肝腑蒸煙霞胡為功名際靜躁雲泥差常喜黃居宷妙絶寫雕鶚狐狸偶相值伏竄愁擊搏我時亦少年不覺指拳握誓當踏青雲當路洗姦惡邇來不自堅壯志隨年薄每登萊衣堂眷眷霜縑鶴衛懿公好鶴華寵使乘軒鶴慘不為樂戰士生怨言賈侯蓄畫鶴持卷求佳篇詩流喜題詠不盡主人賢所好良一爾是非何其偏所養非所用國君豈宜然賈侯偶間適雅興在林泉一見物寓意寧為物所牽新詩與佳畫過眼皆蹄筌題陶令歸來圖富貴豈不榮憂勞亦多端賤貧固枯稿間適有餘歡誰能悅口體不令心思安田園日成趣廬舍亦粗完天爵足自貴奚必趙孟官盤餐有肴簌兒女復團欒得酒覔鄰叟真率無欺謾徑醉任去留有時遺巾冠笑傲日月長俯仰天地寬畫師契余心掩卷重開觀他時營别業但愧雙鬢皤五月十九日過嶺燕城望居庸絶壁青插天行行上北口平田失危顛燕郊入地底俯見蒼蒼煙北轅天際山髙髙與雲連行行復行行既至乃坦原一川復一山南望肖深淵登陟六百里形勢一如前盤盤厄孤嶺峭折一巍然隂陽限南北祝融淡無權我來屬朱夏衣薄思絮綿上黨天下脊始知非公言秦中據上流管見乃爾偏北辰天柱髙寒風送攀緣茫茫瞰中夏窈黑墮九泉牛羊散山腰細草青芊芊草淨下馬憩香軟勝罽氊隂崖萬古氷凍老何頑堅風土變雄徑童稚能控弦土俗入四月竈釡火不燃鍾乳滿巵卮長飲鯨吸川民淳靜無事金革業所専上馬視千里迅速能周旋女人善勤勞車服手自全食淡復功苦何者為妖妍嬰兒奈寒餒有母不求憐家法永傳守不為風俗遷強猛自天稟搏擊同鷹鸇緬懷會河戰事往將百年金兵四十萬敗甲遺河壖寒沙埋戰骨永為蔓草纒區區江漢人孱懦何拳拳退然弗勝衣坐馬不敢鞭徙死無出鄉出鄊憂食眠憑誰語宋人毋誇能戍邉王事有期程顧覽難遲延穹廬見張燈牧兒聲呼傳投宿撫州驛驛轡何翩翩題文湖州墨竹此君固娟靜變動亦多神蕭然文湖州相對清無塵開軒罷琴書寫此含風真苦節傲氷雪不受煙雨昏靜香妬幽獨恥與凡卉鄰東坡慎許可屢見詩與文此幅良得意書名遺後人葉葉如有聲勢欲凌秋旻時無好事者悅目桃李春斯人不再得縑素何足珍佳哉兩橫枝影落蒼梧雲宿兖州廨方城二十里居民不十家荒涼無肆市何者謂喧譁斷碑荆棘中欹傾見州衙白晝走狐兔窗户灌莽遮循例聚父老勸諭勤桑麻俯首聽誨言口從力不加民時苟不奪學稼寧有差種樹郭槖駝笑我辭浮誇衆散日已夕庭槐鬧寒鴉題閴然子劉大用草蟲圖草蟲固微物思態紛不同劉侯乘戲墨寫生善形容依依敗荷枝蕭蕭霜菊藂拳聫寒鷺雨飄搖秋蝶風物物適其適熙熙生意濃翻嗤造物拙神御匪専攻一一欲題詠但恐辭源窮可憐畫家手虛費摹勒功絶藝固可嘉纎巧非神雄何時風雨筆雲海隨飛龍題徐熙草蟲圖枯枝露蜂房氣脈元通閉嘗觀蜂作室煦煦吐元氣連房含化育衆胤懸一蒂行人不敢傍毒螫須急避螻蛄生糞壤欲雨暫遊詣皇皇即求穴失土失依庇修角兩紛爭角抵如猛厲元甲不自振時為羣蟻斃螽斯色尚黃青衣亦同類寡儔不能災辦作兒女戲蜻蜓何輕浮點水起還墜時於枯棘尖􅀈立張兩翅秋蟬罷㺯丸脫殼鳴得意寒露一朝重閉吻僵仆地雙雙金粉蝶乘風誇秀麗花隂困午陽賦分亦柔脆烏紅名鬼蝶忽去忽復至不立釀蜜功竊食羣芳味朱蜓衣朱衣漫不知稱謂追逐蜻蜓飛衆同矜獨異山蜂容聲惡黃巾曵元袂時將良馬逐強暴憑觜利徐熙本工畫觀物得情致我言非佳詩詠物豈無為擾擾區中人一一自標置姦黠侮庸愚賤貧慙顯貴奄忽百年身經營望千嵗甘為造物弄抗顔勞知慧出言言濟時立功功蓋世升髙不能回危機不知畏萬物一芻狗掩卷增歎喟題盧仁美友敬堂以身視四支支痛身不安四支各相視彼痛我何關有物毒一支左右互防攔而云不相親此語何凶頑萬類本一氣况在同胞間詩人詠脊令兄弟當急難風俗日薄惡手足相摧殘父母宛在堂離析何厚顔不意衰習餘友敬見一斑誰當發薦章旌表光門闌省掾王直卿雙親皆八十天下為子心皆願親夀長怙恃兩無恙孝哉藤州王晨午具甘旨夏冬問炎涼深愛見婉容養志恐有傷父母同八十步履偕康強四海知名士輻輳投慶章親心日悅豫千載未易量十年一拜賀新詩塞髙堂遍刻東山石百世垂清光親夀當幾何東海生麻桑題謝才卿母八十詩卷養子望成立三鳳皆青雲事親祈夀考八十健且神慈孝志兩遂庭草亦歡欣蔬水不戚戚况復鼎食珍剪髮有餘樂兒輩今搢紳藹藹一堂上和氣蒸四鄰贊歎可生福斯言最真淳清議豈易得看取題詩人題張夢符亷訪臨淡遊三友圖應劉清叔之索詩也清叔抱髙節嵗寒梅竹松何人解幽意蕭然寓軒翁汗簡索評題意謂臭味同適當雨雪天姑射挾兩龍清艷入神畫定非桃李容何時逢二妙醉歌松雪中作詩弔林逋字字梅花風題趙大年小景髙堂畫巨壁塗抹費青紅粗惡映疏濶刺眼增凡庸趙侯善涵蓄六合盤心胸合權峙雄嶽毫髮分林叢相去不寸許雲山千萬重夢覺屏倚枕放眼瀛海空正如米芥粒潛納橫天龍俗筆漫張大客氣誰為雄宿東平府廨廨近庫藏巡鈴徹曉夢回枕上有感而賦衰老苦夜長卧久不成寐鈴鐸響終宵巡警足嚴偹重門仍擊析今古不能廢嗟嗟盜賊心刑威了不畏人生本定分溫飽豈易遂腸有藜藿充體獲毛褐蔽此外復何求甘死于不義何當富而教各各安所值無問公與私外户皆不閉宿漁棠魯南三百里小邑名漁棠緬懷臧哀伯忠諌有耿光理到誠懇至萬世針禽荒大字當書紳佩服不可忘惜哉魯隱公諱疾甘膏肓文過稱略地不知過彌彰先是穆天子轍迹遍八荒不聞一直言懷古令人傷到今二千載兹道空茫茫宿潭口驛蓬蒿荆棘中茅茨十餘屋驛人敬官長邀迎留止宿酒薄不堪飲夜暗薪代燭借問少人煙無人來卜築亦匪逃移多國初殄兵毒休養生息恩百年不易復側耳聞斯言無寐到天旭登燕城南憶田園有感臨髙瞰流俗擾擾困奔競貴賤雖殊途究竟均害性蟻穴蜂衙邉大窟豨牢並我本淡蕩人壯齒愜間靜一官偶拘縳黽勉雜紛鬨鄊夢繞林泉南望徒引頸松篁映窗户蘭蓀夾階徑山田卒嵗寒教子了家政世事不投耳心逸身寡病有酒隨量飲作詩以情稱適意于百年俯仰一從命兹意何當遂霜雪忽滿鏡悠悠下城顛又墮黃塵穽郭西卜宅聞嗣子以鄰墻未定有感而作匹夫爭畝宫羣雄爭四海萬古同一爭奚較細與大聖人中天立所性良不在樂哉顔子心安有身口害登歷下文廟郁文堂科舉誠陋學在我猶餼羊去道固云逺尚有談文章邇來併是廢人心悉倀倀學校雖粗設虛楹照空廊朔望香火冷老雨淋欹墻教官窘生理日求糊口糧後學豈不繁儒名行工商小慧落胥吏愚鄙趨耕桑大黠巧干祿庸懦老村庠衰風不自振例為飢寒忙天恩本優渥差稅徴未嘗所乏在勸激遂使賢愚龎人材日凌替聖學何微茫我豈私同儕所係為時傷州縣四三員字不辨張王判署尚未聞牧民豈知方養賢道既廢選官路宜荒共治二千石何處求賢良絃誦杳無聞嗟哉郁文堂客荆南三年出入唯一馬近以病死戲作此語齊景馬千駟愛駒心未盈山谷量牛馬亦有爾朱榮胡子官南方一馬何零丁今晨以病殂家僮走嗟驚呼童前致辭爾心宜少寧莝秣不苦勞廢眠起寒更望我官職髙裘馬頗肥輕結駟復連騎揚鸞應和鈴我豈無是心義命難稱情杕䇿謁軍門雲臺儼圖形騎驢三十載以詩了平生賦分有厚薄造物持權衡畜馬與畜德各求千載名徐步以當車吾亦不徒行哭挽左丞張公聖賢不易合千載一相逢中統開至治皇皇仰羣公都俞吁咈間稷契映夔龍相君當是時雅量得中庸獻替協聖意寤寐懷貞忠薦賢若不及汲引言路通中外杞梓材盡出培植功養民務速富建䇿司大農惜無龔黃守善政莫我從出二柏臺政庸懦凛生風所用多亷直簠簋皆飭容晚節佐樞府軍實自披窮年耆志未衰白髮照丹𠂻聖情日虛佇嫵媚恩益隆豈期不愸遺遽爾夢奠凶相君去無憾哀榮全始終一時登龍客忍見門巷空我非感私惠哀與士民同葬不獲執紼諡不與褒崇碑墓與志幽有言漫填胸千里聞訃音老我淚橫縱夢中時通道哭奠若堂封哭亷相平章間氣何所寓感之生異人卓越趨向髙舉足踏青雲汪洋器宇濶滄海無涯津一命領方伯再命當大鈞許身不輕淺要接伊傅鄰心為知己盡仰答堯舜君讀書知聖學不染章句塵執政履王道功利奚足云志不在一時樹業垂千春愛士慎許可門滿王佐賔譽望星斗重飲食寒士貧屢空常晏如所念憂飢民深嚴後樂堂寤寐思經綸濟海橫巨航蘇旱霏甘霖禮樂統刑政咳唾期一新奮乎百世下再復唐虞淳二豎何許來醫和術無神沈綿竟不起天意誰能詢生之豈無故奪去良有因九原不可作慟我淚沾巾我車匪徒出沙路日荆榛
