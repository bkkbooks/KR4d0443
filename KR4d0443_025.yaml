body:
  text: 紫山大全集卷二十五元胡祇遹撰語録聖人孰師乎曰天何以見之以言行而知之巍巍乎惟天為大惟堯則之惟天之命於穆不已文王之德之純亦不已北辰居而衆星拱之無為而治者其舜也歟仲尼上律天時下襲水土子思之著中庸論至誠無息則與天地參孔子之繫易大象之辭皆法天而行至於聖人之制禮作樂號令刑賞設官分職一云為一政事大小隱顯無不順天以立法但庸人所見以為出於聖人之私意豈知道之大原散而為萬事無一不出於天哉天能生之成之而不能訓之教之此天之所以生聖人也故曰惟辟奉天又曰事父孝故事天明事母孝故事地察天地明察神明彰矣又曰致中和天地位焉萬物育焉聖人如天地散而為萬化小成小而大成大雷厲而風蜚雲蒸而雨霈巨而江河之流淵海之瀦山嶽之峙細而蟲鳥之飛走草木之榮悴文秀無窮體貌殊異生生化化罔有窮盡然而天地萬古自若無一毫之損益常人之學聖人者千岐萬徑東西南北遍厯周覽然後至於京師而㑹其有極歸其有極人之為學初則沿流以討源因枝以求本中則併羣流而為大流舍繁枝而合大枝終則得源得本挈領以穿衣提綱而張網一本萬殊有統而不紊矣聖人則不必如是便得源本提挈乎萬殊萬變故變而不困見凡民之不能生者不能有始便有卒故博之以文俟其功夫既到然後約之以禮故小學者大學之枝流餘裔大學者本源綱統以收小學之成功故孟子曰堯舜之道孝弟而已蓋由孝弟而後可以至堯舜欲為堯舜而不從孝弟是猶適楚而北行所謂本源枝流者甚不難辨天命本源也二氣五行是也人受天命而為性率循天與之性而行是謂之道以其夫婦父子兄弟長幼朋友君臣人倫之分莫不各有自然之理當行之路所行之路雖殊性與命則一也隨其職分而盡夫五常之性也以殊觀之是謂枝流譬如大江豈有二源千流萬派各各不同不謂之江可乎一心身也而有五臟六腑眼耳鼻舌四肢百體皮膚毛髮不屬乎心身可乎愛一肢而惡一肢雖虎狼無是心也故曰無尺寸之膚不愛焉則無尺寸之膚不養也此心天下之心也此道天下之道也非我一已之獨得私也人惟有我故有彼此之間私一已而昧大公所以不仁不仁則無禮無義無信原其受病不知故也不學則不知故大學以格物為八目之首聖人生知以身先之以開瞽聾以警昏昧故聖人為萬世之師是謂之教人之觀物不過源委幹枝一本萬殊萬殊一本同歸殊塗一致百慮由博以求約自約以求博一綱萬目萬目一綱同而異異而同如是而已所以不明者自有此身日日目覩而不致思耳但以一木觀之根幹者太極也一也甲坼枝分者兩儀也兩枝各生兩孫枝者四象也四孫枝又各生兩枝八卦也復加生三倍則六十四卦也兩兩而加至于百千萬億之無窮者萬象萬物萬事萬慮此非一本而生萬殊萬殊而統于一本者與若能如是而觀不惟一木萬物皆然人之身心尤為分明故曰天下一家也萬民一民也億萬心一心也人能盡已之性推而盡人物之性亦舉而措之也故曰不知足而為屨我知其不為蕢也是天下之足同一已之足也心胡不然故曰理一而分殊後世為學者不能如是而觀物如是而處事兼愛則至于無父為我則至于無君讀書為學則博而不知其要泛泛外求外馳而不知萬物備于我不知心為太極心為君主心為萬理之源心為萬室之城郭安宅四海雖廣兆民雖衆百千萬世前我後我雖逺雖遙不出我一心天地即聖人也聖人即我我即聖人故曰思曰睿睿作聖聖則天矣堯舜禹湯文武周公知天也凡民不知天不率性也從氣稟之偏有我之私而不知其非者也至于象數一者十之始十者一之終十者一之積一者十之本始全體也十百千萬一之衍也一之用也萬象一象也故曰萬物一五行也五行一陰陽也陰陽一太極也才有太極萬象已具于其中散而為萬物物各具一太極而統萬殊也小大洪纎物莫不然何謂才有太極而萬理已具請以雞卵觀之其初一氣耳氣化為水水凝而皮肉毛骨四肢百體咸備以生成觀之似有先後次第以理觀之豈非已具于一理二氣交感之初歟萬國一國也萬家萬身一家一身也億萬嵗一嵗也一嵗一日也故萬事一理既分而為萬不得不謂之萬殊其實一之分也一之積也聖人之言簡非簡也理巳備矣後人不能通曉而擴充之耳凡讀聖經便當展轉推擴千回咀嚼義理儘無窮矣聖人觀天地便能知萬物故曰見其禮而知其政聞其樂而知其德天地尚不能違而况于人乎觸一理而萬理具見值一事而萬變莫逃見其物理事情得必如是不學無識之人無理之言亦能搖惑伏羲之畫八卦非簡也文王周公孔子之衍易憂後人而為之注解也孟子曰誦其詩讀其書不知其人可乎言心聲也有德者必有言有言者不必有德又曰論篤是與君子者乎色莊者乎又曰始吾于人也聽其言而信其行今吾于人也聽其言而觀其行孟子曰我知言詖辭知其所蔽淫辭知其所陷邪辭知其所離遁辭知其所窮易曰吉人之辭寡躁人之辭多誣善之人其辭游失其守者其辭屈孔孟前後因言觀人所合如此所不同者又如此學者亦有說乎孔子之論心德本也言辭末也舉輕重而言也要之影隨形響形聲不可誣也陽虎曰為仁不富矣為富不仁矣亦偶中而巳平生善言止此二語若每言皆如是則非陽虎矣故曰不以人廢言有言者不必有德宰我長於言語間有血氣所勝不能副其言故孔子深警之曰於豫與改是若以一二善言取人則非也若觀著書立言如荀揚之徒則其心不能掩矣既不能與前同時不因言以求其心如之何則可欲見聖人賢人各各氣稟當於論語聖賢問答一一體認各各自見聖人化人如天地巨細生成照人如日月妍醜呈露知人如鬼神蓍龜吉凶禍福無有不應凡門人來問先見徹本人氣稟短長就所問之事所受之病引導開發感悟而針藥之故病去而平復試於問仁問孝問崇德問徙義問為邦問政問患盜問使民敬忠以勸問禮樂問前知問鬼神問生死問為學一切無窮小大不一之問外人視之若泛應若該博不一以聖人化物之功觀之切應而切當不一而一非若後人記問口耳以為師本草內檢藥方册內求方而治病比也惟聖人能兼所養養性情養口體本末兼備不以小害大不以大忽微喜怒哀樂發而中節以養情性非禮不視聽言動以養德節飲食省嗜欲慎起居出處以養口體讀書學道以養才能此身之中無一物不得其養不動聲色觀感而化內以榖子孫外以及天下後世然則踐形之任豈容易哉聖人所以戰戰兢兢日慎一日任重而道逺良以此也人惟不自省察故不知不是仰不知愧俯不知怍縱情極欲喪德殺身死而不悟哀哉曽子所以一日三省豈虛言哉至於庸人當一時而三省一出言一云為而三省庶幾可以成人能自知非尚不能改况自是而不知其非者耶出則事公卿入則事父兄喪事則不敢不勉不為酒困德之不修學之不講聞義不能徙不善不能改是吾憂也我非生而知之者好古敏以求之者也十室之邑必有忠信如丘者焉不如丘之好學也若聖與仁則吾豈敢抑為之不厭誨人不倦發憤忘食樂以忘憂吾嘗終日不食終夜不寢以思無益不如學也吾十有五而志于學三十而立四十而不惑五十而知天命六十而耳順七十而從心所欲不踰矩吾少也賤故多能鄙事凡聖人之一語默一起居一飲食衣服或燕居居鄉黨在朝廷宗廟遇人接物無非率性循理與天同德者語孟六經中稱聖人者皆當一一附此條下今未詳備略舉此數端以備遺忘窮理則盡性盡性則知命易也者知命之書也命不止于死生壽夭貴賤貧富吉凶得失在天則為命人受之則為性事物得之則為理人之修身處事而得其宜則為義知義理之精微不失其宜則謂之知命然則舍義理得失而言命非知命者也今之問卜者是也莫非命也惟聖人為能順受故取其天之與我者而不取其天之不與我者五福萬善天豈靳靳哉氣數之偶合而定或厚薄或偏全物既得之天亦不能移之人惡得而好惡取舍于其間哉以孔子之聖雖執鞭之賤知不可求而有從吾所好之欲苟少自負曰以吾之德之才中天下而立定四海之民吾亦能之吾當之若是則非聖人矣然而皇皇四方者求道之行非求富貴也道之行與廢有數存焉聖人亦巳知之但不可以知其不能行而坐視焚溺漠然而忘情也雖然聖人豈嘗孜孜矻矻而固必哉聖人之所急者取天之所與修德垂訓開羣賢治後世澤不施于一時而道濟于無窮此聖人之知命也故君子不可以不知命則天之與我不與我者先自䝉昧不知取舍失其固有而强求其必不可得立德立功立言三者俱不克就生無所立死無所聞悲夫富貴者人之所大欲也明乎富貴之為物與夫得失之理則安泰而不惑使為惡而得富貴惡不可為也使為善而不得富貴吾之不得是為善之不至也善固我之所當為豈為富貴而為之貧賤而不為哉使富與貴俱不出于為善為惡然則亦偶然儻來而係乎命爾係乎命則才智作為無與焉人以材智勝天而不安于命是亦妄人而已矣或曰父母老家貧則如之何曰與其不義富貴貽父母之憂曷若啜蔬飲水而盡其歡人之貴賤貧富賢愚壽夭所係者不一貴賤則係乎地位亦係乎時運繼世而有天下天之所廢必若桀紂故仲尼伊尹周公不有天下此地位之所係秦以無道失天下漢興高祖以匹夫諸臣亦皆屠沽給裘蹶張之流此時運之所係賢愚則係乎氣稟之清濁壽夭則係乎氣稟之厚薄此二者以常理言之若遇變則又在遇之重者為學莫先乎窮理理明義精則智及之仁守之性情中正和平發而為言語則成章措之於事業則中節而事治無所處不當窮理者明辨其是非成敗邪正之所以然事事物物莫不各有自然之理人自不察耳選擇前人文字亦窮理之一也吕東萊文鑑甚不滿朱文公意去取不當故也且如梅聖俞河豚詩歐陽公始為稱賞曰只為頭四句河豚在吾目中朱文公以謂此詩乃似上人門户罵人祖罵人父不見好處蓋謂少溫柔中和之氣只見一片怒罵之氣耳東坡豆粥詩元遺山斷以為非坡語乃律賦歌括耳亦選入文鑑宋朝一代文章只為頭一篇五鳯樓賦巳不足道朱文公亦曰當時為别尋不得且教壓卷本欲光國適足以辱國至於文選之首兩都文粹之首含元殿亦何足以取法踵佻襲陋在巨儒猶不免况餘人乎漢唐之追紹三代君德相業聲明文物豈在城郭宫室游獵富庶而巳耶孔子之稱唐虞後賢之稱三王奚在游辭夸詫若是之淫靡耶易曰知幾其神乎幾者動之微吉凶之先見者也余謂幾也者始也一事必有始始必有善有惡善則福伏之惡則禍伏之禍福之應或頃刻日月或數嵗或一世數世雖遲速之不同而事幾巳伏于其始矣故曰始其幾也蓋安者危之機治者亂之機在人之注措何如耳若夫天變氣運之數請置而勿論且以人事明之秦自孝公用商鞅急功利繼以雄暴殺戮一天下而又守之以不仁殊不知天道好還物壯則老所謂人心壞風俗敝羣聚相應屠割分裂滅宗絶祀之幾已伏于其身特發于三十六年之後耳漢有天下廣封宗子賜地千邑濶略古制殊不知末大必振尾大不掉七國謀叛之幾巳伏于其中矣故聖人之悉理明度世審立一政行一事利有所不謀功有所不計不敢苟且恐形跡一立如粟種之在地幾應時而發矣故見履霜則有堅氷之戒觀垢卦之初爻則曰羸豕孚蹢躅繫于金柅知其幾之不可萌也善夫先儒之言曰明主處廟堂之上獨觀萬化之原銷患于未萌也虞書聖賢之相戒曰一日二日萬幾可不慎哉可不戒哉聖人精密物理氣機之學老師宿儒尚不能知况于他人乎為人臣者務一時之俊快雷厲風飛殊不知禍福之幾展轉激發有不可禦者矣為人君為人臣不可以不學正為此也然則古人格物致知彰往察來視于無形聽于無聲之學豈虛言哉學不出于窮理窮理莫難于見幾見幾莫難于勇決讀書而不窮理窮理而不見幾見幾而不勇決直情徑行犯機觸禍學能增智反以愚人學何罪焉不善學耳世之讀易者以前知為先務易固前知之書也顧學之者何如也京房學易則知人而不能知已謂之知易可乎易曰履霜堅氷至羸豕孚蹢躅繫于金柅至于八月有凶先甲三日後甲三日先庚三日後庚三日其亡其亡繫于苞桑負且乘致寇至三百八十四爻無非前知聖人何能若是耶窮理見幾而巳窮理有道乎曰有睫在眼前人自不察耳萬物萬理一言以蔽之陰陽消長而巳一消一長吉凶已著君子見微知著振衣不俟終日審于去就惟二疏為能之論至于斯二疏知易京房不知易然則殺身成仁徒虛語歟不然任比干之責無可去之理不敢計其功全吾心而不愧殺身可也比干豈不知幾哉義理之不可免也二疏比干易地則皆然看書者格物致知之要道也中間萬理無窮最當先格者在乎識人學也者效古人之所為耳不識古人好處則不知已之所短不見已之不是識人最為難事莫親于父子夫婦兄弟師友君臣試為之問曰汝父如何人汝子如何人為父者不知其子為子者不識其父以至于夫婦昆仲君臣師友皆然日相親炙尚不能識千載而下氣稟凡庸聞見習俗衰薄淺陋一身不能自曉自律格物之學廢切問近思略不用功而曰我識伏羲神農黃帝堯舜禹湯臯䕫稷契文武成康伊傅周召孔孟不亦難哉明敏者不過誦其遺言觀其行事務筆舌而資談鋒耳然則何以能識曰莫若求已之所短知已之所短則知古人之所長堯舜禹湯文武周公能如是我不能如是從人之是舍已之非凡我所好所樂比方古人與我同乎曰不同我之所能所不能者比方古人與我同乎曰不同不同則我之好樂者不言而知其非我之不能者不言而知其是且如讀堯舜二典堯能欽明文思安安允恭克讓光被四表格于上下克明俊德於變時雍舜能濬哲文明溫恭允塞𤣥德升聞諸艱底績孔子溫良恭儉讓綏斯來動斯和我皆不能豈不自知勉勉焉努力而學之日就月將譬如行路期于必到所指之地有進而無退死而不巳持此志也以往所謂勉强而行之雖未能遽至則日亦近矣致知必當格物格物莫若讀書讀書莫若近思何謂近思近莫近于吾身天地聖人萬物之所有者吾身皆有之故曰萬物皆備于我矣千萬人之心身一人之心身也千萬家之人倫家道一人之人倫家道也物之心性不異於人人之心性不異于物故曰盡其心者知其性也知其性則知天矣又曰能盡已之性則能盡人之性能盡人之性則能盡物之性能盡物之性則可以與天地參矣故曰了得一萬事畢一者我也自近以及逺自內以及外自下以及高自本以及末理之必然者也故曰君子多乎哉不多也此聖人戒人騖外以忘內舍已以求人蓋不知身外無道性外無物世之人讀書萬卷辨若懸河自謂無不知無不明解經談道說古論今無不通曉一一效其言行鑑裁中節者十不二三所中者皆偶然耳以此觀之謂之博學則可謂之自得則未也聖人見象以明理所謂目擊道存也蓋有象則有是理必然之道也象與理一也非二也象顯于外者也理藏于內者也孔子曰若由也不得其死然孟子曰死矣盆成括蓋有是理而後有是象一以行行以一小有才是氣是志藴于胸中發見于四體見于四體者象也藴于胸中者理也故曰中和積中而英華發外未有有諸內而不形諸外者也此聖人觀象以明理見吉凶禍福于未來豈若妄猜奇耦流于術數之學也哉故曰至誠之道可以前知亦皆窮理盡性積學之所致也天地之變易消息盈虛盛衰消長皆在其中亦甚明顯以示人人自不察耳日月出沒南北流轉雨露霜雪之生殺草木鳥獸之榮枯孕育四時之元亨利貞飛走動植之性情强弱善惡四夷中國人民之嗜好不同五方風土之異宜六氣之不及太過聖賢愚不肖之不齊君子小人之相反是孰使之然哉此二氣之良能鬼神之功用學者格物能自近而及逺積小以至大取此以喻彼積日纍月則理無不明義無不精矣自吾一身一家而推之天下此自近而及逺也自一晝一夜積而為嵗雖前吾太古後吾無窮亦可得而知此自小而至大也人惟不知切問近思之功好高慕逺鑿虛駕空學博而無成終身由之而不知道致知力行非是二事知所當行行所已知如鳥之兩翼不可偏廢格物而致吾之知便合力行譬如讀書將古人為子為臣為弟為友之理之義見之明知之盡即隨所職便要孝悌忠信孝之節目深愛愈色婉容承意先志幾諫諭父母於道嚴威儼恪不敢見於容辭冬溫夏凊昏定晨省侍膳問安養則致樂病則致憂喪則致哀祭則致嚴以至於持身立德將為善思貽父母令名必果將為不善思貽父母惡名必不果一出言一舉足不敢忘父母父母全而生之子全而歸之凡虞舜曽參聖賢為子之道一一企及不至則怨艾懲創直至無缺餘終身而慕斯可矣為臣為弟為友亦當如是庶幾謂之為學為學要識體用體用分明則內外不差工夫有序而日進五性萬善天理人倫萬類庶事大小洪纎皆有體用仁者體也事親敬兄事長事君仁民愛物用也戒慎乎其所不睹恐懼乎其所不聞慎獨而省察者求仁之工夫也致中和致者工夫也天地位萬物育工夫到而得其效也在物為理處物為義此義理之學也天賦為命人受為性此性命之學也下學人事上達天理此天人之學也正其義不謀其利明其道不計其功此經濟之學也觀乎天文以察時變觀乎人文以化成天下此禮樂文章之學也古人為學辨事知所先後本末自內及外自近及逺自小及大自易及難如起牆如行路如登高先根基卑近然後能及高逺故始於學問窮究理物古今聖賢已成之跡愚不肖致敗之由一切事物之變得之於心推盡此心之智然後守之以正行之以經權身修家齊無惑無弊而後移之于鄉黨推之于國于天下無所處而不精當皆自實學中來今之人自身不能曉不能治付之以宰相天下之任而不知畏懼愧恥泰然自得曰是不難以我之才而當是任優游有餘矣受任之後施為注措舉皆無法以道聽之一二聞知恣無忌憚之淺見私意舉網而不綱挈裘而不領萬幾之事百司庶府小大短長之人材為宰相者智不能周于四方之表學不能究於四者之變才不能權衡四者之成敗重輕量不能包含四者之外德不能為之師範氣不能吞四者之頤指氣使就使國家諫行言聽一委於汝汝自忖度智學才量德氣有無寧不自知奚待他人之汗顏寒心哉以今觀之不惟為宰相者如是百執事之人舉皆若是曰然則事何為而舉民何為而寧哉譬若二人同生同盡百年一人夙興夜寐飲食起居衣服一一中節可為世法一人顛倒紛擾旁觀者以為不能一朝居而自恃以為可終身之安旁人以為有折足覆餗之敗而自以為可負萬鈞之重癡愚狂妄固不足責然而命相者胡不詳觀而密察小試而厯驗見何光明而委以如是之重任殊不知天下四海之廣億兆黎民之衆一日二日頭蓬面垢敗絮破屋謂之同生孰曰不然一生美惡固有間矣後人之學先其所後而後其所先全與古人相反亦時世之使然耳曷為先後之蓋古人以明理養性養氣積德力行為先言語政事技能才術為後今之人反是曷為時世使然古之人修其天爵而人爵從之漢唐以來取士之法蒙富貴而被恩寵者果與三代同乎既無豪傑之才鮮有不為風俗所移者省察操存體認履踐天理人欲天性人心天理人倫吾道源流異端邪術王道霸術凡物有體有用有本末有先後有始終有內外有厚薄有情僞公私有為無為有首尾綱領節目為學工夫功效氣質之性人心道心健順五常萬善理一分殊窮究推致擴充成已成物命性道教中庸中和復成大本達道全體大用質文費隱淺深小大巳上萬善雖出於語孟六經直至宋儒掇拾出說得分明聖人之言近而逺小而大簡而富但患學者不能涵泳玩味擴而充之用未能盡若只解字說過有何意味故為學在體認不在念聖人先得我心之所同然大學中庸語孟詩書易春秋三禮皆吾固有才讀了一句便認是吾家故物再不迷失如是不枉讀書每事無不對待互相勝負必不兩立內重則外輕天理勝則人欲消正勝則邪去剛多則柔少心君元良則七賊屏息人之為學先將語孟六經中稱舉聖賢之良心善性卓行俊德嘉言字字計較且如堯之欽明文思安安允恭克讓光被四表格于上下自克明俊德而至黎民時雍以至舜禹成湯文武周公孔子之德性言行我當一一自省聖人先得我心之所同然聖人能如是我不能如是何哉志不彊邪智不明邪才不茂邪功不至邪氣血之私蔽於前邪所稟凡下不能進邪凡聖人之一善吾必有一惡害之不然則均是也我去聖人地位若是相懸天壤歟聖人生知安行不勉而中不思而得我當困知强行百勉千思必中而後巳日用之間一語默一起居律身接物如聖人在上提耳諄諄受教而力行毫髮不貸自怨自艾如是而積日纍久習慣勇往自有所得矣天地萬物無不對待人為物欲蔽誘自不察耳是以知成而不知敗知進而不知退知存而不知亡知得而不知喪知福而不知禍知吉而不知凶知有我而不知有人知盛而不知衰以至處巳察人觀物皆得其一而遺其二不明對待之理故也聖人作易見天地萬物屈信消長之機成敗吉凶之由理明義精斷之以辭逆知未來不差毫末後之不明理者以為神聖術數之妙不可端倪是以不務明理専力於數附㑹牽合愈不能合殊不知聖人之學即物以觀理明理以得數考既往以推來故云雖百世可知也蓋聖人能見微而知著見始而知終見源而知委故曰原始要終故知死生之說知人則知鬼矣以有推無以形推影以性情推行事以平日推朝廷好施者必奪易喜者多悲輕諾者寡信面譽者背非進鋭者退速多藏者厚亡好勝者必遇敵彊梁者必不得死理必然也聖人學之博觀物審舉近以明逺舉輕以知重得體以知用見順以知逆一而二二而一一對之則二二返之則一如是而巳耳後之學者學不博理不明已之性情不自知其剛柔已之語言不自知其煩簡已之出處不自知其重輕已之氣血精神不自知其强弱已之問學才藻不自知其賢愚多寡醉生夢死終身為血氣所使有餘不知克不足不知補平居則昏昏臨事則惶惑錯繆恃其剽竊記問之學曰我知人我知天我能立天下之大本經綸天下之大經可哀也哉古人為學窮理力行今人為學不過記誦辭章蹈襲陳言貪多務博不知治擇至於語孟六經猶有精微深逺必當致思亦有平易明白不必致思者一章之精微在乎一句一句之精微在乎一字故讀書貴乎得其要所謂切要人最難識故曰吾道一以貫之又曰君子多乎哉不多也古人之為學本末不遺精粗舉足自灑掃應對居家庭為子弟處鄉黨接朋友涵養培植立而知權一旦出仕視天下如指掌遇萬變如尋常何為其然也學之久習之素見之明信之篤子思所謂言前定事前定者也且所學務本而切用一言一事無非實理一論難一云為無非至道細而六藝大而天性人心物理世變無不洞究至於辭章不習而能非若叔世専於滅裂不成言話之虛文孔子曰切問而近思又曰舜好問而好察邇言孟子曰道在邇而求諸逺事在易而求諸難今之為學者好高慕逺竟無所得竟無所用君子之道譬如登高必自卑譬如行逺必自邇君子之言也不下帶而道存焉每事不本諸身心不從目前腳底體認思慮一步步行將去便欲入室便欲得一貫之妙寧有是理哉既不能下學人事安能上達天理不知形而下者之器安知形而上者之道且如世人目瞽者為陰陽人遂以陰陽為賤藝為小數為淺近不足學但見黃冠師曰道士道人遂為虛言不足致力是蓋因人以廢事併其深邃無窮之大道妙理亦不知問吾所謂陰陽人者古有四人而巳伏羲文王周公孔子也知一陰一陽之故盡一陰一陽之變窮一陰一陽之用近世周濓溪邵堯夫能得斯㫖吾所謂道人者即韓文公原道篇中相傳之諸人也漢唐宋諸儒得斯道者不為不多不可輕易定議至於秀才二字今之所謂秀才者何足道哉求其得二字之原當充滿之伐柯伐柯其則不逺執柯以伐柯睨而視之猶以為逺此不智之甚也是以後之學者舍近以求逺愈逺則愈差也故孟子曰君子之言也不下帶而道存焉君子之道篤恭而天下平不下帶者不離乎心身也篤恭而天下平亦不出乎正心修身也此身者何也讀書為學者代之也代之也者修治而成其柯也故聖人之教人以其固有之德舉以覺悟還治其人人能改其不善而復其善止於是而巳矣故曰以人治人改而止故曰克已復禮為仁故曰率性之謂道今之為學者學自學而身心自身心學人語言了不干己事接物臨事殊不得用不知為已故也至如古人之游藝藝即道也藝進則道進道進則成已莊子固謂寓言然斫輪解牛承蜩斫堊實明至理杜子美作詩詠物實比興也學不干已則禮樂刑政典章制度皆為外物皆為玩物喪志切已則吾之所固有不可不知不可不得也人之為學能盡已之性人之性物之性則至於參天地而贊化育殆非難事其視語言文字則肆口而得矣人固靈於萬物然而甚不智莫人若也人之讀書為士本乎聰明成身辦事希聖賢參天地也士有勞苦終身終不能入賢者之門牆學愈博而心愈晦才愈廣而用愈拙者何也不務本以逐末不務內以求外升高而不自下陟遐而不自邇其源之差蓋出於此今之為士者舍窮理養性存心修身而専力於造作言語馳騁才智不知語言才智從何而來水之為物源深則流長木之為物本彊則末茂人之為物德盛則語言才智不求工而自工未有物理未明而智識增長心身不知所主而言語威儀動作施為而能中節是蓋懵然不知中和積中而英華發外之理也為父兄為師傅為君主者亦自不知而専以務外逐末為訓教今日入學明日教之寫字對句吟詩課賦以古人涵養德性窮理致知為僞學以多識前言往行供口給華筆端揮毫落紙百千萬言了無一字自得之趣皆掇拾涕唾剽竊裳衣狡獪者移東牆作西壁改南房作北室以愚詐愚欺已欺人此非至愚之甚也歟就能華世取寵果何益哉生為譎詐不實之人死為昏愚不靈明之鬼立言而無一言之垂後立事而無一事之可法草木同生腐可哀也哉今之學者通古今與古人異古人之通古今窮理盡性適用也今人之通古今廣記聞資文辭也讀堯舜二典背誦則能之效其作辭則能之使其事實則能之或問之曰堯舜之德性躬行何如事父母御妻子和兄弟睦九族齊家之要何如為臣為君力學取友之道何如則茫然自失曰吾不知之以至誦六經讀兩漢而下十七代之史與讀二典之法不異此今之所謂通古今者也古之學也約而博今之學也繁而蔽何為其然也自源而流則約而能博從流而不求其源則繁而蔽何謂窮理盡性適用也人能時時自省則學無不進所謂自省者出言有章口無擇言我能如是歟曰不能不能則擇其蕪穢潤飾其不成章者一話一言謀於心度於義詳於理而後出威儀棣棣不可選也我能如是歟曰未能也未能則敬慎威儀無不中節而後巳所求乎子以事父弟以事兄夫以御妻在下位而事官長臣以事君朋友以先施我皆能歟曰不能不能則學之行之孔子曰德之不修學之不講聞義不能徙不善不能改是吾憂也四者我能乎哉曰不能聖人尚以是為憂我何不憂孟子曰舜為法于天下可傳于後世我猶未免為鄉人是則可憂也憂之如何如舜而巳矣又曰乃所願則學孔子也孟子之志如此不至如舜如孔子則死而不已我能如是歟曰不能則自暴自棄而不為歟抑亦既竭而不已耶將自畫而不進耶學記曰學然後知不足汝於性情義理事業文藝果能足歟曰不足不足則求其足而後已所謂任重道逺者聖人豈欺我哉汝上不思古人臨下為高自以為是昻然自足不恥不怍竊祿尸位既不能成已又安能以澤天下名不揚于一時又安能流芳百世聖人六十而耳順汝今每事面牆往者不可追來者當自勉雖駑鈍不才猶愈於不自知者為人而不自省察雖有嚴父兄嚴師友不過革面而巳四者俱無則莫知忌憚自以為是終身莫知其非故曰人不幸不聞過大不幸無恥理性而不自體認則不足者不加勉過之者不知抑雖日夜苦學略不切已學自學我自我然則何益矣學不至于自得性理上無功雖天資高明問學該博或修辭或處事縱能偶中皆非已有掇拾記問學步效顰細碎支離終無資藉文章如揚雄相如功業如五霸浮華虛僞一讀而無餘味屢盟而人愈疑始欲欺人終以自欺然則何益矣志欲大者無見小利無狃小成識欲明者事至物來原始究終無瑕處求瑕不疑處有疑目前則若是久逺亦若是設或遇某事亦若是如此念慮則識自明逺故曰愈細密愈高明愈誠確愈廣大格物既多經事既廣成敗既熟則耳順從心亦庶幾可到然未有不自真積力久而能聲入心通不勉而中者也春秋教以禮樂冬夏教以詩書此成周造士之法禮樂巳廢不可尋繹詩書猶在當沈潛焉詠歌國風雅頌便當見一國天下之治亂國君大臣之賢不肖禮樂政刑之修墜得失人情之向背愛惡讀二典三謨便當見堯舜禹之所以為聖君臯䕫稷契之所以為賢臣商書周書亦然至于觀史亦不出此法孟子曰誦其詩讀其書不知其人可乎世之讀經者不過記誦辭章拈舉事實而巳於學道何與焉讀書學道於自己心身無悟無得聖言自聖言而我自我雖博記句解百千家略不干巳淡乎無味視若外物虛費精神氣血精神少衰亦都忘却不忘却亦止是記誦詞章施之心性無所樂臨事全不得用顔子於孔子之言無所不悅聞一知十如諺語所謂道頭知尾故能服膺力行欲罷不能仰觀孔子言理上徹天表深入地底無物可隔可礙不惟得之於目前而又見徹于終天之後惟其見得如此洞徹分明故孔子以好學庶幾稱之言以足志文以足言孔子曰辭達而巳矣孟子曰言近而㫖逺者善言也韓文公亦曰豐而不餘一言約而不失一辭後人措辭不惟辭多理寡貪文以昧其言夸言以隱其志不肖自中年後頗㑹讀前人詩文蓋因文以求言因言以求志舍浮華而窮本實遵依孟子讀詩法以意逆志後賢亦云當味言外意言盡而意無窮者也看前賢字畫亦然因㸃畫以見高情逺韻㑹讀孟子者當開悟人心處致思擴而充之皆可以為堯舜不忍孺子之入井不忍穿窬不受爾汝此心不待思慮勉强人皆有之既于穿窬之不忍以類而推凡取非其有者皆穿窬也但輕重小大之間耳見微而知著者聖人以降莫如列國之良大夫於言語威儀觀見人之禍福成敗無一不驗學博而理明故也學博則更事多理明則論事審威儀言語心神之發見於外也心一身之君主身家國萬方之君主無主乃亂理之必然敬慎者此心之君主心無主則萬事廢何以長今之為學者藝也志不在乎道也何謂道理也義也路也本原也道與藝異乎曰非異也一也一則何謂藝進而道不進也不探其原不究其理也禮樂射御書數此聖門之六藝也至於洪範之九疇中庸治天下國家之九經周官之法度以形跡觀之亦藝也世之學者豈不能之所能者聖人之糟粕所不能者聖人之精微故學禮者威儀進退升降揖讓而巳矣學樂者聲容節奏蹈舞鏗鏘而巳矣學射者中的而巳矣學御者詭遇而巳矣學書者㸃畫整齊姸麗而巳矣問之以理則不能也且如聖人有文事者必有武備又曰我戰則勝祭則受福聖人非不學兵也所謂武備戰勝亦必有道矣今之學者直以孫吳坐作進退擊刺而為知兵是以爭地則殺人盈野爭城則殺人盈城雖如孫吳不戰而屈人之兵上兵伐謀之說亦以為迂濶而不學而於聖人制兵之理無惑乎天壤之逺也學愈博藝愈進去道愈逺德器勳業粗不成立皆不中道而不克終也讀前人之言辭玩前人之字畫便當見各人之心性才藻剛柔邪正廣狹高下彼能如是我不能如是取其可學舍其不可學以前人之高逺鎔化我之卑凡以前人之工巧方圓我之拙魯以前人之文思潤飾我之鄙俚以前人之通明開豁我之固陋開卷受益如饑渴之得甘㫖如塵垢之遇浣濯未開卷而不能一開卷而便能鈍刀而得淬勵昏鏡而獲磨拭此謂之學古不然則費目力勞心思與不學者無以異學不知為已則無真儒無善治雖學過人不過技藝功利而巳耳學之差也久矣自孔子時已曰古之學者為已今之學者為人又曰女為君子儒無為小人儒孟子亦曰古之人修其天爵而人爵從之今之人修其天爵以要人爵既得人爵而棄其天爵終亦必亡而巳矣以是觀之是未得公卿大夫之位則為仁義忠信樂善不倦之人一旦得富貴則反廢棄前日之所學反為不仁不義不忠不信不樂善之人有天下國家者以正道取人及其臨事決政詖淫偏頗反側無所不至而莫之問也千載而下推究當日失德之原是蓋王教消亡五霸譎詐欺僞假仁借義以為名而實欲以濟其私耳上行下效不以為怪六國以詭詐權謀傾奪攘竊取士暴秦則尤甚焉漢以文字語言進退人才實德實行略之不問自兹以降而至於今國家所取語言文章較之董仲舒賈誼公孫𢎞賈山匡衡司馬遷班固又奚啻糞穢瓦礫與黃金白璧之可比哉使若是之才而臨民治事謀議參決大政無惑乎天下之不治綱紀之紊亂下民之不被膏澤君子小人雜揉不分是非邪正淆混不明也然則三代之學可復乎不可復乎曰是不難患在君父師行與不行耳使為子為弟者居家入學未冠以前日習乎灑掃應對進退升降揖讓事父兄事師長如弟子職內則曲禮諸篇凡子弟之當為當行者責之以篤行與夫禮樂射御書數之六藝日課月試其勤怠精粗而進退之既冠之後責以成人之禮凡窮理論事講明道義修已治人之方御妻子齊家政之實跡一一務盡其道使天下後進成德性於父兄師友成材藝於庠序學校如孔子稱門人德行言語政事文學備具習熟於身心宗族鄉黨有美譽而無惡聲曰秀曰選曰進曰造皆中程式然後論定而官任官而爵位定而祿如是則玉石分僥幸冒為不才不學之人自無所容於內外既仕之後明列功過黜陟幽明十年之內才不逮古政治不逮古天下治安不及古人民風俗不及古吾不信也
