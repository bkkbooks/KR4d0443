body:
  text: 紫山大全集卷十八元胡祇遹撰墓志銘耶律氏墓銘遼太祖之别族號大橫帳生赫嚕金正隆間纍官輔國上將軍同知北京留守事赫嚕生烏達噶潛德不耀烏達噶生克酬巴爾佩金符行諸路便宜事實公之皇考也公以任子得官生三十嵗壬辰我師平汴佩金虎符提㸃軍前橋梁芻粟得一城下一邑俘奴中聞有士人即以私財購出之巳亥以軍功授大名路徴收課稅所長官丁未北覲以病卒於官享年五十娶劉氏封淶水彭城郡君再娶蕭氏子男二人泰亨甫冠襲爵授大名路徴收課稅所長官佩金符嵗癸丑改授提領陜虢二州事中統二年復任前職至元十年改授單州尹越四年授同知安豐路總管府事十六年同知蘄州總管府事次曰賁亨孫男一人曰庭傑早卒重孫男郝驢尚幼公生長於閥閲不凌人以賢驕人以貴輕財好施尊賢重士海內名士納交求識者日滿門居顯位二十年而家無餘資至元十八年十二月五日卜葬於安陽髙穴村賁亨狀公之生平請銘其墓銘曰生長閥閲豪習罔聞甫冠襲爵力排青雲居官三年寵命日新提本戎行時雨春陽解釋囚俘不責報償驥足甫展鐵弩方張天不假年中道云亡賢哉後裔益增前光刻石埋名孝思不忘正議大夫兩浙都運轉使李公墓志銘公諱秉彛字仲常世為通州潞陽人嵗癸丑遷居於相故又為相人焉曾祖貴妣尹氏祖濟妣張氏考瑀贈懷逺大將軍泃州鎮撫軍民兼三河令妣某氏公幼頴悟以兵亂廢學既長自知讀書涉獵經史工書翰篆𨽻尤得法考正前人謬誤作韻譜一編起身從仕平章鈕祜祿公一見器重之承制授行省都事從平章公南征破唐鄧下襄陽古郢婉畫為多嵗巳未六師渡江諸將爭趨玉帛子女公槖經傳子史文集以歸丁外艱中統建元除太原等路宣撫司員外郎奉官長和同列司政最諸路二年改西京等路宣撫司郎中三年遷中興等路行中書省左右司郎中士夫南冠為奴者甚衆公言於省官聞奏為良立學給田以食之四年轉陜西五路四川行中書省左右司郎中值奸人費正寅之誣告申明被譖者之寃抑朝廷多之至元元年除户部員外郎三年佩金符官大中升彰德路轉運使以課額增七年授中議大夫尚書户部侍郎八年授中書户部侍郎兼提㸃漕糧增運萬二千三百石九年升奉政大夫都提舉漕運司事官吏坐耗損被桎梏者百人公訴之省廷咸蒙釋免水灾民乏食開倉廪貸絶食以起餓殍十二年拜大中大夫西蜀按察副使兼勸農事理寃獄築水堰溉田萬頃土人刻石頌德丁內艱十三年以墨絰起佩金虎符升嘉議大夫江州路總管兼府尹適嵗旱下車禱雨而兩部民妄以謀反相告言同僚即欲臨之以兵公疑其誣罔同時大族朱陳二氏屈為同族以謀反告公欵曲審諦實無反狀活萬一千人九江文廟火公創為一新學田萬頃為權勢侵奪力復其舊十五年除湖州路總管德化浹洽闔境大治以疾寓京口十八年起為常德路總管築隄防以捍水災減租稅以寬民力發粟以賑貧乏未幾朝廷以理財擇人拜兩浙都轉運使郡人遮道攀送去思不巳紀德於石題曰李公惠愛碑兩浙鹽額不周嵗增萬一千二百錠擢授中書工部尚書在官未三月兩浙官曠復授前職不幸感疾退居京口至元二十四年四月十八日薨於寓居之正寢享年六十有五夫人孔氏車氏孔夫人婦德母儀中表可法子男五人楨棫梓楩棣楨楩早世梓池州建德縣令女二人是嵗某月某日祔葬於臨漳彰隆村之先塋公卧疾有詩云鄉關落日蒼烟外樽酒寒花寂寞中以公之明逹殆知命之言歟棫等持狀以壙志來求銘銘曰氣和而醇言簡而溫臨政論斷有經有綸雍容慎密應機若神鞭算心計太山一塵雖曰用知必依於仁草檄談兵蒲鞭撫民不猛以寬義訓諄諄哀矜忠愛寃苦獲伸公退嗜學琴書詩文時議人望阿衡秉鈞事繁食少斂翼青雲賫志以殁嗚呼斯人怡軒先生胡德圭墓銘孝友慈祥豈弟樂易不倚不流匪凝匪滯繼志述事力擢髙第可智可愚允協厥世不貪之富自得之貴六十八年俯仰無愧祔葬幽深永蔽天地泣血書石孤子祇遹姜氏墓銘寡不再醮惟貞惟剛世衰教微冶容夫喪惟此姜氏三十而孀孝養舅姑益謹於常姑憐欲嫁守節愈強不盥不櫛坐以待亡姑寧怒笞義其可忘一女得壻歸保榆桑壻事如母逾三十霜夀六十七卒葬夫傍鄘詩柏舟於惟共姜假以作銘以志深藏緱山先生杜君墓志銘先生諱瑛字文玉姓杜氏世居霸州信安人曽祖信祖植妣張氏考時升字進之場屋有聲金走汴先生扶奉渡河寓緱山養親讀書金亡徙寄絳州洛陽取友溪南詩老辛敬之李欽止楊紫陽涵肆六經百家書兵餘典籍灰燼每假一書手自抄録由是羲農唐虞以迄於今聖賢之謨訓功業歷代之治亂得失歷歷成誦中書鈕祜祿公開府招聘為幕賓遂家彰德傳經授業後學滿門中統建元立十道宣撫司左丞張公首奏先生提舉大名六郡學校事傳道餘暇著皇極疑事皇極引用極學等書春秋地理源委二卷經子說一卷律厯律吕禮樂雜志七卷典故三卷史說一卷語孟旁通二卷晚年知道之不行凡詠物寫懷一寓於詩每對花臨水持杯自適曰風俗教化至此吾欲何為耶獨詩集行於世餘書未脫藁至元十年某月日以夀終享年七十葬安陽王裕村夫人孫氏謹約端靜先生閒居終身奉養不失節後先生九年殁享年七十有八子男三人長曰處思警頴才學未冠元遺山賞其詩文許以大器不幸年十有八而夭次處立能世其業今以文學為鄉校師季處願濟寧總管府經歷官女娥適李氏孫男三人曰堅早卒曰愚曰齊奴皆幼先生將終命二子曰吾槨中置杜詩一部餘無所用書封石曰緱山杜處士墓先生儀觀秀偉身長七尺美鬚髯望之如神人於書無所不讀不精老釋醫藥亦皆洞究二十九年秋處立乞監察御史祝慥狀先生德業以墓銘來請且以不肖拜識先生里閈往來近四十年知先生為深故也嗚呼唐孟東野老於軍參謀宋蘇老泉僅得一文安簿天爵人爵造物者固不並耶抑天理固然而不能全耶人乖天耶天悖人耶以先生之才學老於衡門不得掌帝制潤皇猷謀王體斷國論賫志以殁窮理者不能無惑銘曰於穆先生命世髙志樂道唐虞洗心洙泗仲舒下帷子雲識字天降大任不勞以事明道傳經福澤千祀閒適從容逰戲文字短詠長章逺懷遐視擾擾羣愚暮三朝四百年髙風清明純粹若堂新封有銘有志表墓貞珉揭立昭示過者下車緱山貞士武略將軍彰德録事朱公墓志銘人生所苦莫慘於兵亂耄倪柔弱固不能免武勇強悍亦百不存一二當此之際識強弱興衰之勢知順逆向背之情去暗就明舍危從安天命人事涇渭於胸中附託得人乘風雲取富貴苟非才勇仁智邁往拔萃則不能也僉海西遼東道提刑按察司事朱承務手狀其先君武略將軍彰德録事行業求銘墓表武略諱泉館陶人考進常仕金朝嵗庚辰天兵南下公以材武智惠衆心推服義立為萬夫長遂帥衆詣太師國王軍門請命國王義其效順以公屬魯公嚴東平麾下自是先後捍禦左右周旋下名城略逺疆日平月定旋以共誅彭義斌功升忠武校尉割劄總領出入行陳歷十寒暑嵗壬辰冬超拜武略將軍彰德録事當南北衝要兵餘市井蕭條官府草創躬自率下披荆榛拾瓦礫撫瘡痍集市肆不四三年既庶而富四境鄰邑政治莫能及以廉幹稱纍兼提㸃本路倉庫酒稅嵗加增羡邦人喜公之惠政惟恐速除又以久不得調為恨不幸以乙巳嵗春二月二十有一日遘疾而殞年甫五十有一官長朋友編民莫不哀悼嗚呼公幼孤而能自挺植處兵亂而能服羣豪天造草昧改代革命而能去暗附明杖策軍門而能建功立業天下既定立政撫民而能以循廉見稱惜乎天不假年為可傷也配趙氏胡氏先公卒再娶張氏子男二人長曰秀行軍總把次曰思誠即承務君也女二人孫男二女七至元十年冬十月十有三日葬於安陽農安之西原銘曰天開神武除懦孱見機而作人所難拂衣奮起羣雄間軍門投策驚彭韓攻城略地多苦艱枕戈衣鐵霜夜寒功成事定四海安撫摩瘡痍披榛菅門館無私白晝間熙熙市井民歌歡政譽有餘夀乃慳德遺賢嗣髙門䦨堅貞墓石如西山顯武將軍安陽縣令兼輔嵓縣令李公墓志銘公諱玉世為林慮人父寶孝弟力田世其業户冠鄉里曾大父大父兵亂世系遺失諱字不可記公生十八嵗金主走汴河朔為藩障干戈擾攘不能安畎畝即自奮拔投身懷孟等路招撫使杜公帳下以驍勇智略受謀克未幾拜千夫長兼提控爵顯武將軍遙受汲縣尉天厭金德杜公以讒謗引退天兵日熾金土日削嵗丁亥公挺身內屬𨽻職彰德路總帥府換授總領佩符嵗戊子東平行尚書省承制以公舍逆從順帥衆來歸授武略將軍充總領嵗丙申改授林慮㳂山都巡檢使兼輔嵓都巡檢嵗丁酉兼充林慮主簿嵗壬寅升充輔嵓縣令嵗壬寅兼充安陽縣令既而帥府以林慮闕官不妨本職兼充林慮縣令後以本職兼銅冶申村兩冶鐵場使庚申改元中書左丞兼大名等路宣撫使司激濁揚清一時久任州縣者舉經沙汰獨公以廉幹如故重新恩命以寵之中統二年自以祿仕四十餘年功成名遂不得勇退為恨力以病辭既得請治生教子三致豐阜鼓鐵煮礬所居城市凡能傭力而無恆産者魚聚水而鳥投林相率來歸寒者得衣飢者得食窮殍者得生活卵翼子孫纍世不忍相舍去頥指氣使優遊素封二十餘年享年八十有一神識精力如五六十嵗人一日傳家政於其子曰自兹事無巨細勿復相關白吾將以閒適終天年矣私第之東即縣學公倡始以建至是以外户未立身親工力以成之子孫請代其勞曰吾非強勉要譽但心自慕樂不知其老憊時至元十七年八月也九月十二日以食少夀隆遺訓明悉薨於正寢夫人五張氏景氏吕氏趙氏蔡氏子男六人長曰濟部劄輔嵓商酒監次彬襄鄧萬户府征南百夫長不幸二十三嵗而夭其妻鄭氏以少艾孀寡苦節莫奪時人以貞節稱之次湜以軍功爵武略將軍金符千夫長兼造作提舉次天一銀符彰德路鐵冶同提舉次溫次裕以養親未仕女四人長適張氏次適陳氏早卒次適陳氏次適秦氏孫男一十四人楫杠咬兒千夀夀山海夀同夀福山定安長夀伯奴安夀定童玉奴孫女五人迎春適鄭氏賽春適賈氏梅哥適鄭氏定哥桂哥未笄曾孫男四人長孫曾孫遇僧翁惜公起身田里兵荒廢讀書又出入行陳一旦當牧民繁劇之任吏畏其明民懷其惠勸課字諭之暇剖決疑獄動合於古或告布縷為某人盜去公佯不為理而斥去之默命其人詬詈所疑者盜者果以誣罵來反告不片言而伏其辜一婦抵訴頭叉為某人所盜公反以告者為誣三問而遣之以旅進旅退之間而察其情狀即以退先進後者為真盜不詰而請受罪農人牛舌為怨家暗夜截去公命同里近墅悉聚於庭俾人歷祝之殆遍一夫若退縮而不肯前既前牛觳觫退曵驚奔而不能挽公謂其人曰汝不仁若是夫復何言即叩首慙謝輸情吐實以法當之圃瓜者告瓜引蔓而將實忽為人鋤剪殆盡公命聚羣鋤使人䑛而嘗之坐其刃之苦者喜受其杖而不以為寃公之臨政明斷敏捷類是者甚衆至於度田畝之多寡不引尋丈策馬徐步若不經意雖地形髙下之不同圓方曲直之不一往返之間先曰若干頃畝掌數者布算推之不跬步之差雖不知書老吏抱案來前聽讀一過是是非非詳悉明辨不敢欺蔽其明敏過人又如此先世塋域皆在留馬村子孫以溪澗丘壑不能增廣今卜葬於前輔嵓縣南某原以十二月十四日窆諸子狀公之行以志公之墓請銘銘曰汚白為緇持坎作離輕重髙下文深險巇此姦吏之所素習雖明經學古逹權通變者有時而陷其蒙紿之機持狀按訊瞭不能欺摩揣不露鈎距不施情見勢屈不得盡其辭在公而言是之謂不學而知心計鞭算勞思苦情鹽鐵貨食泉布流行得算勝負逋缺餘贏此周於利者之不敢必材智者困於慮而弗勝目擊計得如響應聲可緩可急有權有衡財貨豐殖義全利并積而能散隨減隨增在公而言是之謂不學而能奮身農里卓為能吏富貴安榮蘭玉叢萃夀八十一精健明粹老而能傳韜卷餘智易簀之言可遵可誨盥潄虛心奄然而逝此養生理性者之未易能公遊刃而有餘地使公少有所學長有所養趙廣漢之御吏臨民劉士安之生財省費衛武公之年髙德劭亦不難至刻石埋銘固安深邃徴文責實永永無愧邢洺路都總管府從事解君墓碣銘君諱晏字彥明廣宗人世業田勤苦節儉逢年積榖因以致富水旱嵗不登則推有餘以施及鄰里鄉黨之貧乏者謹厚而惠洺滋間為稱首曽祖考某祖考某考某繼繼無怠純德積久而生從事從事幼頴悟耕養讀書值兵亂科舉取士之法廢土冦縱橫強暴凌孤弱善人不能自存遂隱身縣吏托官府全性命而庇宗族焉未幾升補帥府令史後帥府併於總管府辟充總府掾是時政治草創案牘無法大亂後人不知學用廉謹才敏超擢府從事兼提領匠局官長暨僚屬上下愛重議承制升遷以父母夀踰六旬力辭求侍總府知其志莫能奪曲全孝養不敢復以煩細相干凂必深重難疑而咨請焉謝事後日以溫凊甘㫖為務時年逾三十矣承意先志竭力盡歡父享年九十有四母八十有五孝養三十餘年如一日也非親戚鄰里有大故則未嘗頃刻離庭闈女兄二十而寡誓不再醮友敬奉養終其身年亦七十有八公天性樂善亦不迎媚取容聞人喜慶歡悅若在巳胸次涇渭甚明口不言人過惡治家訓子皆有禮節配石氏廣平名家內則嚴整子男二人長曰時次曰牧時以儒吏貢部轉補御史臺掾亷能有聲考滿出職辭以親老孝養遵家法丁父憂哀毁如禮服闋今為懷孟路總管府經歷官女四人長適參知政事何榮祖次適遷山東東西道按察司事霍肅二公功名術業藹然為名卿材大夫次適中書省掾趙勵亦自卓越三人皆早孤公見其器質不凡後有逺到極力提誨故以子妻之今皆顯逹其深識先見又如此次適郭某孫男若干人享年八十有幾年月日祔葬於肥鄉某所銘曰孝弟力田德莫厚兮生長見聞能世守兮是亦為政惟孝友兮先意承歡登上夀兮至哉之樂神所佑兮富貴利逹孰可誘兮吁嗟斯人世無有兮世衰道微德可醜兮昆季為讎憂父母兮孝子順孫公有後兮我銘墓石傳不朽兮唐僉事先德墓志銘奉訓大夫僉福建閩海道提刑按察司事唐圭之父享年七十有八以至元壬辰清明前二日晨起盥潄衣冠祭祖考禮畢孫滿前酒數行遍諭家人曰吾醉矣諸子扶奉得枕而逝以明年正月二十七日扶柩歸祔於鶴壁房子山下先塋翰林學士通議大夫江南江西道肅政廉訪使髙唐閻復序銘其墓碑以志壙不可以不銘奉訓昆季踵門來請銘謹按碑序君諱聚世為湯隂鶴山人年十二而孤至性有為葬父及母霍氏繼母華氏於南澗之先壠既冠出贅於張氏婦翁六十無子君為娶妾生子名成八月而父亡數嵗而其母亦卒君為撫字至冠昏悉以其業歸之一介不取也配張氏先君卒子男三人奉訓其長也讀書飾吏事渡江服勞金符釋褐杭州浙江渡提舉歷中書省左右司員外郎升奉訓大夫同知泉州路總管府事御史臺選僉福建閩海道提刑按察司事仲曰璋興化鹽司副提舉季曰瑗承事郎建寧路浦城縣尹女一人適建寧稅使張信男孫九人居仁居吉居安餘幼未名女孫九人長適王鼎臣次適王茂次適黃源餘在室銘曰人能自致必也親喪送終大事孤童克當見得思義誠一不二繼絶婦翁仁及來裔八十髙年率履不愆衣冠就枕蟬蛻飛仙編民市塵而有斯人養生學道愧汗霑巾鶴山崔嵬髙塜豐碑志壙埋銘松楸百圍孝義消亡公行允臧澤瀰子孫百世其昌奉直大夫僉江西湖東道肅政廉訪司事杜公墓志銘公諱伯元字亨甫姓杜氏世為覃懷人曽祖諱延祖諱彥能仕金朝官至敦武校尉祖妣趙氏父諱杲字明之避兵北至彰德遂占籍焉府主承制釋褐判彰德録事司俄升軍民都鎮撫權彰德府事好賢樂善一時名公大老如元遺山杜止軒主於家動為數月留歲辛亥以夀終妣胡氏勤儉敦朴公生二十五年丁卯憂服闋襲爵判本府録事司事中統建元改充録事秩未滿除臨漳縣丞隨授提領縣事至元二年選升內黃縣尹省部以東平大郡民訟繁劇不得明敏才幹者不能任其事以公録司事稱職授開封府録事御史臺擇人銀符從仕郎拜河東山西道提刑按察司經歷官未幾拜監察御史考滿升承直郎僉山東東西道提刑按察司事尋除奉訓大夫知兖州事考績遷奉直大夫僉江西湖東道肅政廉訪司事不幸得疾以至元壬辰某月日卒於吉州分司之行館享年五十有九第四子扶柩北還以明年某月日卜葬於安陽司空村夫人柳氏一遵姑德子男六人長曰受益字撝謙次曰惠益字福謙次曰孚益字守謙次曰得益字鳴謙次曰願益字好謙次曰顯益字光謙俱才俊知讀書女四人長適夏邑主簿韓茂卿次適王秋澗之猶子次適崔氏次幼在室孫男三人女孫一人皆幼公揚歷中外所在有聲臨民不干譽風憲不存諌草人莫得而稱焉姑以天禀一斑歌於銘辭銘曰善無近名惡無近刑中節而發識時權衡俗吏脂韋腐儒堅氷陽開隂闔公則炎蒸天不假年中夀泉扄四海英遊吞聲涕零為時惜才失一名卿至元流品人中之英生既不愧沒胡不寧司空髙原埋勒新銘隱士髙君墓志銘君諱嗣榮字顯之女真人姓鈕祐祿氏譯曰髙世居蓋州金有中原徙強宗巨族分鎮州郡遂處沃州之寧晉曾祖諱鴻哈從金太祖滅遼逐宋官輔國上將軍祖諱索囉同知澤州事考諱某南京左警巡院使金亡以先嘗任夀春防判恩澤在人移家於夀春嵗庚子北轅至彰德樂其風土遂定居焉警使公自以亡國之大夫晦迹不仕以夀終公性至孝警使公捐館以刀刺額血面弔者哀嘆亦韜光市井識者重之不敢以流俗待課諸子讀書年甫五十誡其子勿以家事相關旬日與名士棊博笑談輕財好施人服其義姻親孤獨者衣食之死無所歸者葬埋之春秋六十有四以疾卒配任氏亳州忠翊校尉任遵之女也貞順慈孝中表儀則事舅奉姑從夫訓子四德咸備子男三人長曰說濮州儒學教授次曰殷曰霖俱經明行修女二人長適某次適某孫男四人以至元戊子月日祔葬於安陽清流北原銘曰遼宋昏庸金源啓隆惟輔國公附鳯攀龍鞭弭櫜鞬告成武功為時名卿髙朗令終有子克肖祖武是蹈倅二州政民服其教乃生賢孫德文潤身部繁理劇鈎距經綸天步改玉雜身隱淪子成父志心儒迹市慈孝貞歡各極其至不求盈餘教子以書過庭詩禮為世巨儒源深流長壙銘固藏風水貞順松檟有光曰髙氏墳百世允臧李伯宗墓志銘復堂先生李公伯宗甫吾先君子須溪先生自入小學則與之遊從志相好也晚歸城時時問客之至自城北者伯宗何如伯宗長我十又三嵗尚健否顔貌勝我否已而郡學禮羅之為賓又寄聲必來久乃來握手談四十年前相與為歡然不可得彊留歸踰年死唶唶惋惜問其子當何時葬既得地否於是者八年而先君子即世復堂之子希周與其姪自長安歸者來泣且言曰痛哉吾父之遺言也謂吾弟客萬里外必十年乃葬使見柩如見我孤也惟葬有期而後敢請銘也奈何乎先生棄之天乎吾父誰當知者吾子既有聞於侍側也其著之銘亦先志也孤也不以望之他人拜又泣且慟某重拜而哭曰信先友也雖非其任儻免喪不死無所辭日希周復來曰卜既吉碑謹具敢請有從季父士元所撰行實在則受言志之廬陵之北曰福唐李氏唐西平忠武王後自江西觀察使憲節度廣東子觀業為袁州刺史迎葬於袁家焉自袁徙福唐及公巳十三世族大多儒五世祖時通貢崇寧乙酉髙祖覺民貢大觀戊子曾祖茂實貢紹興乙卯以書繇是公為書世家少試場屋即有英聲門人弟子以其餘義貢於鄉者六升太學第太常者又各一然不自貢僅庚子一試成均又以病不克行天性篤實讀書窮理不特聰明資涉獵朱墨紛紜標注字如蟻旁通天文地理道釋醫藥之書穴穿一貫廓然同歸先雞而起丙夜未休如是書窗者皓首焉事大父母父母養志盡歡同祖弟三視之等同氣中年喪一兄三弟撫其孤如子必成人不負其意筆耕紙田小腆則以班族姻之貧者或勸以稍事生産作業笑曰一經不足以遺子求益耶鄰有急周之不問償否或有劵書聞官可責入喟然曰是區區者而以失鄰好非初意也聽之卒不償亦不言平生應聘擇然後許時僚巨室惟恐不能致授業身通轉相授者相望既屢試屢絀殆若受命庶幾孝子慰吾意每誦三槐王氏語不自恨而科舉者負之巳矣至元丙子二月城既降又五日湖南飛騎橫衝自宜春來道虜掠季子道翔執焉五月至延安今陜西右丞夾谷公為大尹見其不羣問焉則書生也釋縛以賓師禮之明年改尹京兆妻以湘潭良家汪氏又明年道翔安書從過鴈來咸謂公盛德所致公曰祖宗之澤也書告道翔曰京兆西平王所從起也爾以逺孫數百年後復家焉慎哉其謹確類此鷺州曹山長竒教授劉國正夢薦避賓席以待舉髙年有德不求聞逹公論謂然吾家先生亦稱為古所謂山林樂道之士每謂少小相從惟伯宗不欺惟伯宗淡然無求議論反覆必心所安乃止不妄疑不億信最服善嗚呼猶及公典刑今之古人古之君子也公名士甲學者稱復堂先生云生嘉定巳卯九月十一日卯時殁於至元庚寅十一月初四日午時臨終未嘗甚病語不亂惟季子不一見為憾祝十年勿葬以俟之至大德巳亥十年矣以十二月甲子葬廬陵延福鄉東原祖起邳父宏臯母胡氏儒林郎平陽丞逢寅之女娶羅氏子男三某某女一適某孫男五某某孫女八巳嫁者五某某壻曽孫男四某某曽孫女一嗚呼公所缺者一第耳然稱明經者宗焉論靜退者尚焉數耆舊者首焉生七十餘年修身寡過孝友睦姻任恤於人生大節無愧回視金張陶猗之倫豈不赫赫一時而今何如哉竟何為哉豫觀希周以諸生習吏周旋省闥交其賢英而道翔甫流落遇知巳以儒稱關中希周之子逺雍容和暢儒吏具宜前廉訪僉事趙公𢎞道清嚴聞南北一見之安成庭中擢試之稱道之不置惟其有以得此於人也一門競爽微公之教不及此則公之不遇者天念之矣昔東漢李固以材學奮前輩謂其父隱德之報公其苖裔耶吾銘公墓以待銘曰松耶柏耶霜雪其命蒼然嵗寒既獨也正衣冠巳逺孫子逾盛不在其身在後之慶瓜爾佳隱士墓志銘君諱秉直字叔剛姓瓜爾佳氏女真人也金得中原論功開國君之先得土於滑州白馬縣牛李村世爵千夫長祖諱石倫纍次戰功升大元帥考諱敢合襲世爵君幼孤鞠育於從母家金亡閒居於彰德買田安陽藉田村課童僕力穡兵後惟一姊在奉養如母君自以失故家僅存此身隱德不仕賓客來置酒盡歡鄰里鄉黨或以事相辨訟求直於公公欵曲開釋孰是孰非皆悅服拜謝而去年髙德劭親疏長幼愛敬之府主蕭侯月餽廪粟漕長耶律公起公監大名稅皆不受夫人李氏汴梁巨室李仲寶之女能從公志安恬於隱處公享年六十有四至元壬辰夏五月以夀終於正寢夫人享男昉之祿養十五年至元癸巳六月一日夀七十有八終於男昉之任所子男一人即昉也起身吏部掾轉補御史臺掾考滿例得七品欲便母養願降髙從卑授從事郎燕南河北道提刑按察知事至元二十八年改升徴事郎河北河南道肅政廉訪司知事孫男二人長曰晟今更名承次曰昱早卒以夫人捐館之年秋七月十九日卜葬於藉田之西北原銘曰金源王氣天東北滅遼走宋傳飛檄同姓封王異姓侯子孫世世相承襲門户青雲森畫㦸百年天厭東周德識破衰榮無定在葛巾藜杖瓜田碧風流慷慨過殘年酒爐香潤茶煙濕妻借鄰機兒讀書誰與雞蟲論得失安時處順樂終天墓銘不愧西山石從仕郎真定阜平縣尹蔡君墓志銘君諱玠字庭玉安陽曲溝里人曽祖順妣趙氏祖琛妣李氏考祺妣馬氏君幼孤母氏辛苦教之讀書長能挺特起身彰德府掾吏業精敏府主愛重之外幕府從事中統建元首辟中書省掾以幹局稱未幾以得疾家食病愈起為本路運司經歷官至元十一年改濬州判官任滿除真定阜平縣尹年六十有八終於私第時十九年正月六日也縣君馮氏次室劉氏子男五人曰鉉主洧川縣簿曰鐸北京宣慰司奏差曰鈞开黃宣慰司奏差女二人長適趙思文次適馬思忠孫男九人長曰世昌餘幼女七人長適栗氏次適袁氏餘幼以二十四年十二月四日祔葬於先塋銘曰孤失天母德賢慎所習里三遷服慈訓成飛騫幕府賓如經權應時須瑞建元嗟驥足病纒綿州復縣空自憐命也歟誰能全祔先塋土厚堅體魄安千萬年奉訓大夫知泗州事王伯潛墓志銘伯潛諱希賢正議大夫御史中丞王博文子勉之長子太夫人申氏伯潛從父學淵源正大既冠恥以任子得官學道日篤朝士以名父賢子同辭交薦釋褐翰林擢編修官以幹局轉充大司農司令史不踰年改授應奉翰林文字爵從仕郎兼㑹同館副使接伴使至元十七年除承事郎太常博士明年升奉訓大夫陜西行中書省左右司員外郎二十年升充知泗州事泗當東西要衝使者旁午伯潛處之裕如也而治政有聲秩滿省親於揚州二十五年五月二十有七日不幸得疾卒享年四十有三是嵗十月十有八日祔葬於中丞公之墓左配胡氏少中大夫山東東西道提刑按察使胡紫山之女子男三人皆不育女五人長適滏陽侍御馬中順之子二早卒二幼銘曰唐李元賓宋王子立才學有餘年志弗遂見知韓蘇姓名不墜我於伯潛舅甥之義夀不稱才聞者墮淚吞聲銘墓以慰幽閟魏處士墓碣銘公諱仲字仲寧世為武陟人曽祖諱禎字伯祥仕金朝官至定逺大將軍同知徐州事祖諱昭字克明昭武大將軍汝州千户考諱璧字伯玉昭信校尉河隂渡禁門萬户公體貌雄偉襟宇𢎞大少直皇朝兵南被驅執北行得放釋歸故鄉以獲嘉鄰鄉井遂占籍焉娶畢氏公以纍世仕宦國亡家破獲免俘囚乃嘆曰消長盈虗衰榮廢興彼此更共安有定在我亦豈不欲貴富君子之澤亦有衰歇至於不失德於里閈使一鄉稱善人斯亦足矣遂潛晦不仕以義方教子孫曰不止不行不伏不流汝輩勉力為學當大吾門享年七十有六以夀終於正寢四子長曰憲次曰宗次曰榮次曰髙明憲以辨給直諒善書數至元甲戌釋褐中書户部典吏明年䝉省劄隨路分㨂阿爾布哈駙馬下户口又明年以亷幹授彰德路酒使至元戊寅改除嶺北湖南道提刑按察司左房書吏嵗巳卯移充江西行中書省掾例罷充通政院令史嵗乙酉充中書省掾是嵗六月祇授敕牒彰德路知事彰德北趨京師南逹海外又當天下東西之中使者旁午朝貢者腹背相望驛傳車馬人不勝其煩勞而能處之裕如指顧辦集其才幹概可見矣朔望必至文廟勸諭儒醫二學成就後進自起身入仕見知於提刑鈕祜祿公公薨不忘其顧遇輔導二子成立曲盡勤懇宗孝弟保家荆門安平市巡檢兼水旱站提領髙明泗州稅使孫男四人曰轄哩曰錫布曰哈濟曰安和至元戊子冬十二月十有九日卜新塋於張俱村厚葬其考妣乃狀其先世之德業願得銘辭而刻石焉銘曰願子孫之昌榮察化機之變更身富貴兮踰分日隆午而月盈此天道之固然何貪冒之昏冥嗟魏侯之獨賢甘混迹於編氓潛盛德而不耀恐無實而有聲竟終老於衡門得隱者之佳稱萃蘭玉於一庭從事公之最良晦既久而啓明巳為世之名卿藴孝思兮追逺樹貞石而勒銘百千世而不磷表鬱鬱之佳城何有子兮若此豈積德之無徴什達爾夫人墓碣銘夫人回紇國王哈里沙之女皇太弟位下管領內外徹辰扣蘇珠克台之妻也父母鍾愛命名曰什達爾中統建元奉王命送公主東嫁布達駙馬以路梗不能西繼聞夫亡特㫖命夫人廪祿庖肉春秋裳衣於大王所封之食邑遂家彰德勤儉清慎享年四十有九以疾卒於至元二十五年冬十月二十有六日一女名托克托倫適懷逺大將軍彰德路達嚕噶齊兼諸軍鄂勒達嚕噶齊兼管內勸農事某卜葬於彰德郭西刻石埋志墓不可以無碣銘曰父王封夫近臣富與貴終其身謹蠶麻采蘩蘋德如玉心無塵女克孝壻得人墓有碣銘千春雄辨大師塔銘師號德清族出安陽王氏生七年伏犀插腦頰顴隆起眉目清峻不凡龍岩寺僧深公見而異之乞師於其親其親亦以語言動作非諸兒童比終為塵網縛遂割愛以從其請棄家為釋子授僧服學佛經日誦千言既長談法持論辨若懸河諸經正言疑義暗誦講解臨衆升座食頃數萬言並無隻字遺訛理順義明滚滚不窮大堂廣㑹圍坐數千人師一發聲傾耳屏息聞然無辨語竟無敢能繼者平水壇主素慎與可賜師為講主嵗庚戌春靈山壇主燦公付師以海雲頂血所書金字大乘菩薩三聚淨戒本龍文僧迦黎衣賜號妙嚴宣明大師中統二年冬昌童大王遣僧詮來錫恩命至元八年春皇帝賜衣一襲上都新宫成詔集天下名僧作資戒㑹以落落升師為都壇主賜號妙嚴宣明雄辨大師師登席演法甚愜上意靣命升御榻賜白金五十星玉龍首手杖一枝一時僧俗咸以為榮師荷聖恩優渥即以賜金印大方廣佛華嚴普賢行願經疏四十餘部流通開演仰祝聖夀至元十六年三月二十有五日聲鐘集衆傳付信具於後人湯沐更衣登座曰衆僧西向立為我誦彌陀佛號少頃曲肱脅席西首加僧服而逝師住三十八年僧臘七十三弟子澄照澄志滿等為師築浮圖於龍岩寺先師燦公之墓側礱石巳竟狀師之德業來請銘師與子為方外交亦有年矣律巳清嚴奉教篤信每晚濟生為業行之終身無一日廢輟接物諭人以和聰明過人逺甚而退然若不足以釋學無不洞究不叩則不鳴不以記問為所長余之所見者如此銘曰日誦千言不泥文字戒律精嚴安若無事萬葛千藤筌蹄講肆象設鐘魚冥寂聽視世眼識公為談法士名僧推公得大乘志兩覲天光優禮殊賜傾動一時雲披川駛曲肱長往不昧不二高標倚雲銘石以志凝神塔宫何千萬祀大聖山孝思禪院廣公和尚塔銘公號子廣出寶定李氏少孤惸大父母鞠養成立貞祐避兵徙河南祖亡棄吏業師事南陽縣彌陀院瑍首座授僧服篤志好學敬信不懈國朝平河南北度歷邢洺磁講席受華嚴法戒觀圓覺金剛等經深入理窟頴悟性天再參問於冠山徽公徽法中龍象也公以真積力久之學又得賢師為之依歸言下頓悟目擊道存不數嵗特嗣庵主隆慮純禪師住持三陽大聖山洪濟院日月既久求承嗣而乏人聞公道眼明白戒行精嚴命駕邀於魏與之偕來純即退休公住持三年門風孤峻行巳髙潔亦就辭謝前鈞州刺史權沁南軍節度使兼懷州招撫使正奉康公隱居西山以其先塋之故買田八百畝水磑一創立孝思禪院於大聖山南疏禮邀公團蒲容膝三十餘年鼓磬鐘魚香火經律猶一日也薰沐後學入室者六人升堂者二十有三人授戒者三百餘人至元十年三月五日付院事於德堅將淵默以終身􅫊山寶嚴寺文疏敦請不能辭是嵗五月二十有六日集衆齊畢而言曰人之生死數莫能逃我今辭汝輩去世矣聲絶而逝夀六十有七僧臘四十茶毗日僧行白衣五百餘人舉火而雨火亦不滅獲舍利數粒豆如也門人於寶嚴孝思兩立浮圖焉公枯淡儉約衣不絮帛紙布以禦寒熱夜暗不火其能外形骸也如此則於外物可知矣銘曰眼耳鼻舌有竅弗開鏡明水止湛然靈臺長逝非往閲世非來萬有一空孰為形骸六十七年不掛纎埃以公為生槁木枯荄以公為死烈風迅雷生莫能喜死莫能哀門人思公塔宫崔嵬入滅出見乃優乃俳刻名豐石百世不摧行狀龍虎衛上將軍安武軍節度使兼行深冀二州元帥府事王公行狀公祖諱載字德厚不仕祖母張氏父諱清字正甫束鹿縣竇家莊酒監母張氏公諱義字宜之世為寧晉人純厚沉默寡言襟量淵廣喜愠不形諸容讀書求意義不泥章句訓詁金衛紹王遇殺天兵南下宣宗失燕走汴河北郡縣雖開設守令而政治威令解弛沮喪土冦四起力不能治弱肉強食互相殘賊奔竄莫知所依縣人羣聚相謂曰王公素寬仁材智足以保衆成事吾儕小人智力寡弱紛擾無所歸不有主者則將無噍類矣一唱百和同聲相應遂推公為萬夫長攝行縣事尋號為都統嵗癸酉冬太師穆呼里國王提兵至城下公率衆歸命太祖皇帝嘉其效順寵錫寶鞍名馬二授寧晉令兼趙州等處招撫使時兵荒嵗飢人相食縣東大澤周匝數百里中有城曰瀝城公曰瀝小而完水多魚藕足以起餓殍禦衝突以麾下李直守寧晉身率衆東徙全活者甚衆他境白骨滿野獨公所治無易子析骸之禍邑人垂白之老猶能記其事至今道舊笑樂感慕為之泣下乙亥秋金將李伯祥稱太守據趙州太師國王促公伐之㑹夜大風雨公命衆負攻具去城二里而止下令軍中曰先登者賞後者殺以徇夜鼓四環城飛登守陴者皆熟寐城潰伯祥孤身走天壇寨軍士無敢剽掠州民安堵焉太師國王表公之功授趙州太守兼趙冀二州招撫使丙子秋南取巨鹿洺州南宫三城是嵗冬十有二月還軍至唐陽西九門遇金將訥爾錦戰率冀州節度使柴茂等將兵萬餘北復郡邑公伏兵桑林先以百騎犯之訥爾錦棄輜重來薄戰伏起金軍駭亂奔北獲訥爾錦弟萬户濟呼戊寅拔束鹿進攻深州太守張公以城降順天都元帥張柔多公之能軍表奏授深州節度使兼深冀趙三州招撫使秋八月金恆山公武仙擁衆四萬攻束鹿公烽火謹斥堠逺比至而預備仙諭衆士曰束鹿兵少而糧不繼且無樓櫓池隍一鼓必拔仙於城外盡攻擊之術公城中守禦有餘隨機拒應首尾二十餘日大小百戰每戰必捷一日公集軍士議曰外無援兵芻粟內絶曠日持久非我之利盍若突圍一决勝負安能坐困為人縳執也衆曰善願唯命遂令老弱乘城問以草人多立旗幟夜五更未盡率死士三千闢關直搗仙營人人殊死戰仙軍亂誅殺殆盡獲軍資器械無算仙率麾下百餘騎走真定公乘勝追奔逐北大捷而還太師國王聞之遣使賫銀符十寵公及榮耀有功者庚辰秋拔冀州獲節度使茂械送王府城中市不易肆張帥復稱表上功授公龍虎衛上將軍安武軍節度使行深冀二州元帥府事佩金虎符由是鄰境諸城畏愛公之威德悉來服屬亂稍定招集逋亡教之耕作深冀之間首為樂郊辛巳夏五月恆山公仙辱束鹿之敗以禆將治中盧秀㑹太守李伯祥南取趙州公知之提兵西援比至趙瀝二城皆陷新河王主簿十餘人以妻子被執皆叛歸仙秋七月公具舟楫紀家莊盧李戰艦數百沿流而下公曰彼兵雖衆水戰非素習也以我之長擊彼之短實我軍之時也乃以繩貫舟橫截下流敵至先之以矢石戰閧斬繩公舟翼而擊之我軍勇奪彼舟殺千餘人生擒治中盧秀洎軍士五十七人伯祥走瀝進攻之不下還屯滿家泊冬十月復攻瀝瀝之女墻束葦為之夜灌以水乘寒為氷城環列戰艦晝夜流行不令水凍以拒守公捉士卒挽舟於氷絶渡而攻伯祥西走二子死焉敗卒爭舟溺死者十六七獲伯祥之幼子山兒士卒欲殺之公曰伯祥雖吾敵絶人之後不祥教養如巳子復獲叛吏王主簿輩左右爭刃之公曰人各為父兄妻子非背我也皆釋之壬午秋太師國王南征伯祥降歸其子及家人十餘輩伯祥再拜號泣而謝曰白刃戰敵之前存活此兒使吾父子復相見李氏之鬼血食不絶公之德殁身不能報壬午秋攻拔澤潞二州及山寨數十不妄戮一人獲生口數十皆遣還之或父子離散為人執掠者必購贖使之團聚每戰勝軍中金帛堆積一毫不取也公攝帥府金經李佛兒以妖術惑衆謀亂有司連繫十餘家公白主者曰首惡者當誅愚繆不識義理為人蠱惑而不知為罪者可以情恕全活者萬餘人癸巳秋邢州土賊僞號趙大王聚衆數千人據任縣固城水寨真定五路萬户史公集諸道兵攻之踰年不下公一鼓拔之獲趙大王侯縣令數十人公白史公曰脅從者非賊也宜免死即釋歸鄉閭一境遂安歲在甲午以病退還鄉里常戒諸子曰我起身農畝汝輩當力田讀書毋妄求名利巳酉夏四月二十有五日薨於束鹿縣回生村私第之正寢享年六十有九某年月日祔葬於寧晉縣唐城鄉北孟莊之先塋四方之來㑹葬者數萬人冀人懷公之恩作黃籙大醮三晝夜追薦之迎神主至其境拜人塞路迓祭曰是活我父母妻子者失聲痛哭道路過者亦為之吁嘻到今嵗時上塜不期而來者動以千數公夫人三張氏李氏李氏子男七人曰植字茂才趙州節度判官曰松字國才不仕曰檜字公才歷贊皇沙河二縣令曰楨字叔才不仕曰楫字季才不仕曰椅字彥才釋褐王府掾歷中書省左右司員外郎大名等路宣撫司郎中左三部郎中大名等七路宣慰司郎中户部郎中奉政大夫同僉徽政院事兼領太府監奉議大夫同知順天路轉運司事佩金符少中大夫順天路轉運使中議大夫吏部侍郎中書省給事中少中大夫彰德路總管兼鄂勒佩金虎符曰棟字子才真定鄂勒千户女六人曰茶哥適山東道勸農事董文用曰翠哥適寧晉縣鄂勒千户李天祿曰娃哥適大名府董總管男若水曰仙兒適寧晉寧縣主簿杜彥曰秀仙適完州酒稅使石德潤曰旺哥未笄而卒孫男一十八人女一十九人祇遹於椅定交近二十年知王氏父子為頗詳故録公平生大節為行狀至元十年四月朔武安胡祇遹謹狀
