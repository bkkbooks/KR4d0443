body:
  text: 提要别集類四元紫山大全集二十六卷臣等謹案紫山大全集二十六卷元胡祗遹撰祗遹磁州武安人元史本傳載其字曰紹開然今民將在祗遹乃文考紹聞衣德言實周書康誥之文核其名義疑紹開當作紹聞元史乃傳刻之訛也中統初張文謙宣撫大名辟祗遹為員外郎後官至江南浙西道提刑按察使延祐五年追贈禮部尚書諡文靖是集為其子太常博士持所編前有其門人翰林學士承旨劉賡序稱原本六十七卷歲久散佚今據永樂大典所載裒合成編釐為賦詩餘七卷文十二卷雜著四卷語録二卷其間雜著一類祗遹一生所學具見於斯然體例最為冗瑣有似隨筆劄記者有似短章小品者有似蒞官條約者有似公移案牘者層見錯出殆不可名以一格考賈誼新書皆以所作治安䇿及言事諸疏割裂顛倒各自為章别標篇目説者以為平時記録之稿其後聯綴成篇而上之祗遹是集或亦是例歟史稱其官右司員外郎時以論事忤姦相阿哈瑪案阿哈瑪原作阿合馬今改正外遷太原路治中提舉鐵冶欲以歲賦不辦責之及其蒞職乃以最聞官荆湖北道宣慰副使時辨誣告不軌之獄官濟寧路總管時擘畫軍政八事並修明學校之法又稱其所至皆抑豪右扶寡弱敦教化厲士風蓋以吏材名一時而無一語及其文章今觀其集大抵學問出於宋儒以篤實為宗而務求明體逹用不屑為空虛之談詩文自抒胸臆無所依仿亦無所雕飾惟以理明詞逹為主元代詞人往往以風華相尚得兹布帛菽粟之文亦未始非中流一柱矣惟編録之時意取繁富遂多收應俗之作頗為冗雜甚至如黃氏詩卷序優伶趙文益詩序贈宋氏序諸篇以闡明道學之人作媟狎倡優之語其為白璧之瑕有不止蕭統之譏陶潛者以原本所有姑仍其舊録之而附糾其謬於此亦足為操觚之炯戒也乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀紫山大全集原序文章以氣為主其為氣也至大至剛以直養而無害則塞乎天地之間賡讀紫山胡公文集見之矣紫山公自號也諱祇遹字紹開磁之武安人大父嵩泰和名臣考德圭正大四年進士儒林郎主耀州富平簿北渡後公未及冠便能從諸生習為程文非所好也潛心伊洛之學慨然以斯文為已任一時名卿士大夫咸器重之中統龍飛鋭於求治張左丞文謙宣撫大名辟公員外郎入為中書省詳定官至元改元詔立學士院以應奉翰林文字被召俄兼太常博士百年墜典一朝而復天下翕然稱之以為禮樂文物盡在是矣中書以公優於為政輟充户部員外郎尋轉省左右司直言正色無所顧忌重忤相臣意出為太原治中外示優容內實中傷之會改河東提刑副大使而罷省幕同僚有驟至執政者終銜之江南下調荆南宣撫副使十九年權姦事敗庶政一新掄選牧守授濟寧總管考課為天下最擢山東憲使齊魯風俗為之一變就拜翰林學士不赴又明年提按浙西平江稅司邏卒恐嚇市民贓露公決遣之行省頗有違言即輕舟還相下築讀易堂以居若將終身焉二十九年制詔以耆儒碩德徵凡十人公在第一辭以疾不起時年甫耳順矣卒年六十又七書法妙一世脫去翰墨蹊徑自成一家唯鹿庵紫山兩公而已平生著述易解三卷老子解一卷詩文號紫山集者六十七卷公薨二十年賡以事道過彰德其子太常博士持將鋟梓以夀其傳懇以序引為請賡以不敏辭逮四三年而請益堅嗚呼賡嘗師事鹿庵先生得告還東平前諸生謂公曰敢以是數後進纍吾紹開且命之羅拜公避之鹿庵良久曰以師友之間待乎公遂諾焉賡才力譾薄獲與搢紳之列殘膏剩馥得公沾丐者多矣此意豈可忘哉公之出處行已大方有野齋秋澗所撰神道碑祠堂記在感念疇昔非敢以為序也姑述其梗槩云爾延祐二年重九日翰林學士承旨榮祿大夫知制誥兼修國史門生劉賡序
