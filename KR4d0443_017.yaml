body:
  text: 紫山大全集卷十七元胡祇遹撰碑大元故明威將軍同簽書東川行樞密院事王公神道碑銘人才之巨細門第之興衰福澤之可久不可久唯於易代之際觀之則見之明斷之審大率英雄豪傑起身亢宗有待而發四方無虞百揆時敘貴賤享宴安之樂而無竒勳偉績之可為雖材智絶人既無所施無惑乎終老於庸流就能名一藝占一業三年一資五年一級而於大勳業大封拜則不可得矣時移世變崇極而圯天厭舊邦羣雄競起草昧之間王侯將相公卿大夫士之才立見於奮迹之始天下既定新天子崇德報功大則分茅土割方郡小則受一城封一邑治安之福與羣才共之然而或一再世而消削絶滅或三數世或與國祚同終始是豈偶然哉福澤之久者其德厚其功大其家法備一再傳而絶滅者其德薄其功微其家法無足取此如火之熱如氷之寒不可誣也今請以同簽書行樞密院事王公為徴焉公之曾大父世為順天人適當金季隱晦不仕兵亂家譜亡失名字不可考父沂字振文官至順天路總管府權府事别有碑公諱仲仁起身蔡國公帳下以才勇拜百夫長再受銀符鎮撫諸軍事歲戊午分𨽻今開府儀同三司史公部曲扈從憲宗皇帝平西南夷為上前驅數戰數勝首拔定元諸嵒柵六軍遂得深入繼拔禮義長寧大懷苦竹釣魚四寨以功寵賜黃金鞍勒憲宗皇帝曰為汝他日戰功之驗證未幾宋將曹太尉李路分下嘉陵白水馬湖來拒敵奉旨總率戰艦五戰五捷手刃二將於陳前宋兵溺死者無慮數千憲宗皇帝喜賜黃白金二十斤今上嗣里宣命金符充都鎮府行軍千戶無何改授武衛軍干户璮賊搆逆東方失寧佐經略董公撫諭青齊所至導揚聖慈使民曉知逆順反側遂定使還佩海青金符入巴蜀按視邊事事回入對西南山川城郭民物風俗險易虛實歷歷詳説如在目前上嘉嘆曰得人如此何事不濟特恩升山東路統軍副使兼總管造船事未畢宣命虎符充眉州管軍萬户眉入南徼尤深險前官不克負荷連章乞謝職新進徼幸邀功欲得是任者交相稱薦衆議紛紜久不決特旨教錫喇做者錫喇蓋云黃色指公而言也鎮眉凡四年訓練精嚴戰守有法兵需精備小大二十餘戰皆以出竒取勝聲聞於上賜白金重錦以榮其功就佩以降虎符改充東川副統軍使宋賊冦成都入其郛焚毁大掠而去公提兵直趨嘉定半途與賊遇一戰賊北五十里死傷相枕藉奪其俘而還朝廷聞而壯之至元十年以功授明威將軍同簽書東川行樞密院事虎符如故明年總兵攻重慶與士卒同甘苦衝冒瘴毒卒於軍中公臨敵決勝智勇揚溢燕居無事則仁言嚴重不露圭角弟仲義武衛官鄂勒千戶仲禮百夫長兼亳州兵馬仲智滿城諸軍鄂勒官子男五人長曰宏毅勇而文至元三年襲爵充武衛千戶八年改右衛親軍千戶九年以淮南軍功升昭信校尉職如故十一年以渡江功再升宣武將軍管軍總管行三衛親軍都指揮使司事攻潭州城下十三年授明威將軍中衛親軍副都指揮使十七年升昭勇大將軍東路蒙古漢軍副都元帥次曰寧起官昭信校尉右衛親軍千户再升宣武將軍管軍總管餘幼若姪若孫詵詵繩繩玉茁蘭芽不可具紀嗚呼西漢功臣子孫至武帝而絶滅殆盡豈非髙明之下難以久處王氏慶門自權府公乘聖朝開運拜爵受封傳子傳孫揚歷五朝封爵日隆家聲益振繼繼承承益熾而昌厚澤遐福方興而未艾然則由人品巨細而知門第之興衰視履考祥而知福澤可久不可久以王氏一門觀之豈非明效大驗歟某年某月某日袝葬於先塋神道有碑子宏以狀來請銘銘曰起身有道文武二途雜流邦官志士病諸唯同簽公勇廢萬夫忠肝義膽與生死俱出竒決勝暗合孫吳長寧大懷白水馬湖古今天險勇困智愚不有其躬為上前驅統兵東川蠻逺江漁益州被冦直入其郛繼以大攻驅掠前趨設伏以擊奪還其俘賊駭奔竄棄甲焚艫益人於今感泣歡呼東西二川狀固有餘付託得人百蠻可圖大邦為讐報豈宜徐矯矯仡仡壯志靡渝聖意簡在超付兵樞論功受賞弓矢彤玈竭力報效歲時不虛南夷未平中道薨殂蓋棺馬革賫志兵墟忠臣有子益昌門閭繼志述事金虎章符贈諡有日墓碑可無銘以紀實三嘆而書蕭千户神道碑銘國朝命官襲爵既優既渥子孫非有大過惡繼繼承承而不廢絶世祿已久日黯前人光是亦貴富之所養中才庸品之常情無足怪者不荒侈於鷹犬裘馬不淫蕩於聲色甘肥不驕矜於父兄閥閲不陵人以威儀技藝吾於蕭公千户見之矣千户姓蕭諱世昌其先遼貴族五世祖阿薩爾仕遼為羣牧使四世祖竒拉爾贈鎮國上將軍上騎都尉河南縣開國子髙祖柏德本贈輔國上將軍輕車都尉河南縣開國伯曾祖圖薩拉贈奉國上將軍河南郡開國伯祖德亨朝廷以開國歸義之勳爵奉國上將軍官彰德路總管兼行軍總帥府事考某征南行軍千戶公數歲而孤入小學讀書不勤師友不偕羣兒戲㺯視聽動止端重淵靜如老成人學對屬即知聲律物象竒辭英氣精密雄偉常勝其偶九歲襲爵受萬户府劄充鄂勒千户十二歲體貌壯麗魁然一竒男子拜命金符管軍正千户嵗已未扈從渡江中統建元再拜恩命千户如故三年壬戍討平叛賊李璮復立宿州并縣西城至元六年春南征五河口臨敵手馘四十餘人獲戰艦二軍實不計以功為山東路統軍司薦申行中書省省擬上聞遷升不幸以明歲正月十有六日感風疾而殁年二十有六聞者莫不哀悼夫人假氏嚴東平魯王之外甥千戶君亡時年二十有四即自貶損膏腴貴習不御華飾守節教子成夫之志今其子亦襲爵有年矣以某年月日將葬於某所遣其子某奉狀以公之墓碑來請銘余接見蕭氏祖考子孫凡四世矣千户軍不惟有出藍良最之譽在一時世官子孫少見其比吁使天假以壽竒勳偉績其可量也哉今既惜其才器而又哀其短天不能不為之銘銘曰嗟嗟造物實艱實難萬愚一賢保全或慳蕭氏之子百草之蘭紫庭未升風霜夜寒蕭氏之子羣鳥之鸞一飛未舒瘡痍羽翰嗟嗟造物知誰控摶與之不易奪之匪艱三世將門豈非其端我知斯人不尚忍殘彼蒼者天呼號莫攀龍韜虎略鐵衣石棺風水沄沄松柏丸丸壽短名永神其妥安承直郎江西等處𣙜茶都轉運司副使李公神道碑公姓李氏諱瑞字君祥世恩州人父郁徙居鄆城遂占籍焉祖圭仕至大名府檢法曽祖玉河南府判官公幼失慈侍居憂哀毁羸瘠以孝聞鄉里年十七出贅於邑人續氏時明經射䇿貢舉進身之法皆廢又不能治生農工處市井中遂商賈為業知人棄我取人取我與之機且廉以信視列肆貪刻者人多歸之因以致富纍貨巨萬公嘆曰不過為守錢虜富家翁耳矧商居四民之下不足以汙吾身於是立志讀書涉獵經史東平總管府經歷司知公氣宇不凡辟為書記習熟吏事至元五年本司保舉充鄂囉濟駙馬位下人匠局知事七年制國用使司選擢通廉知錢榖者以公充濟寧府鄆城縣行用交鈔庫副使終任之間會計無偏失鈔法流行居民行旅皆以廉平稱十年中書吏部符遷授平陽路收差庫監支納十二年除恩州酒稅醋三務大使削苛細務寬平課額增羡而民説誦無怨謗江南平定朝廷以户口繁庶鹽法不可不謹宣命金符從仕郎提舉浙西鹽使司事置司於平江府鹽法設竈户給工本煮鹽入官照引出發前政丞炎方初下新制未定夤緣苟且為欺蔽尅削竈户工本寒餒瘠乏官鹽不足原額私煎不能禁公私俱擾公到官立革宿弊家給人足布宣教條令行禁止歲課日增十六年升承直郎宣授江西等處𣙜茶都轉運副使比署事同衆公議給遽採造罷巡禁之擾驗實出賣歲終課額倍增秩滿得代二十年行中書省以公亷幹特委會計杭州酒課二十一年後五月二十有九日不幸以疾卒年甫五十矣夫人續氏之弟德新同夫人梁氏護柩還鄉里是年十一月二十有二日祔葬於鄆城宜邱之先塋公天資頴悟器宇𢎞深心計鞭算不大聲色而辦吏事尤精敏義於周急視貨財如糞土好賢樂善與人交竭誠以敬嗚呼公剖煩理劇有猷有為之才百無一施惜乎天不假年可哀也哉雖然韓文公銘李充實之墓曰生而不淑孰謂之壽死而不朽孰謂之天若公者生淑而死不朽者也德新持里人杜亮紀公生平之狀以神道碑銘并序來徴言謹序而銘之銘曰智周於利志喻於義積而不居通而不器以財發身以德御氣長鯨海濤大鵬風翼進也無難退也何易數耶命耶所期力致材耶學耶有用不既中壽而殞半途而廢勒銘墓碑以俟貞諡故大名路徴收課稅所長官耶律公神道碑公姓耶律氏諱澤民字濟之其本出自遼太祖族號大橫帳曾祖赫嚕金正隆間官輔國上將軍同知北京留守事致仕卜居大興之西安縣故子孫占籍焉祖烏達噶潛德不仕祖妣蕭氏考克酬巴爾字閏之謹厚明敏善騎射知漢文章明昌六年以門資補官桓州酒監我朝兵萬餘掩至城下率衆力敵我兵引退有司以戰功聞升髙陽尉考終無犬吠之警縣人刻石頌德遷定德遷定興令以廉幹稱太祖皇帝提兵南下力窮出降授翰林待制歲戊寅賜佩金虎符行諸路便宜事乙酉扈從西征病卒妣蕭氏封河南郡夫人公幼頴悟灑落不羈以任子襲爵年三十壬辰南伐佩虎符提點軍前橋梁芻粟事所下城邑問有士大夫被俘執者即以私財購出之全活者衆士林于今稱之已亥以從軍之勞授大名路徴收課稅所長官丁未北覲六月十有七日遘疾甍於西京之傳舍享年五十夫人劉氏蕭氏子男二人長曰泰亨襲公爵後用河南等路經略使薦提領陜虢二州事中統改元復長大名路課稅所事至元十年改授單州尹次曰賁亨孫男一人曰庭傑公尚氣義輕貨財交遊日滿門雖傾囊倒廪一供宴享之樂而不恤逺鄉寒士受公之惠者不可計與人交樂易開豁略無貴豪習氣初南征回一時將帥車馬囊槖實以子女玉帛公之所得法書名畫異文祕典寶琴佳硯而巳餘一無所取也公甍之某年既葬神道有石泰亨紀公事業來求銘銘曰世祿後昆鮮能處仁驕奢淫佚辱宗敗身惟公貴胄世里支親光耀先哲超踰等倫尚氣以義潤身以文好客投轄惠窮指囷逹不放曠狎不囂紛艾服官政壯志方伸半途而殞埋恨昌辰篤生賢嗣益大其門大元故奉訓大夫知宿州事張公神道碑銘公諱裕字仲容滏陽人曾祖諱鎮完顔金管軍千户祖諱黨敏不仕考諱演仕我朝主滏陽簿妣李氏公起身刀筆補磁州州吏歲庚戍升本州從事以廉幹中統建元宣撫司薦升滏陽令再除成安令至元二年改授沙河令縣南門臨沙河沙積城平每南風塵沙飛激居民不能飯公身教士人樹髙栁三匝近南萬株栁茂密沙塵不能入炎夏行人困渴休息於緑隂芳草解鞍停輪移時不忍去所剝繁枝充公私薪爨不數年巨材足以充梁棟一舉而四美具公平生材智類如此四年充邢臺令廨宇倉庫為之一新十年受承事郎武清縣尹遞運江南寶貨身至上都無毫髮損失都堂嘆賞籍記升遷十六年改承務郎同知清州事二十三年升承直郎西京總管府判官省部摘委應辦御史臺保呈二十八年升奉訓大夫知宿州事是年十月十有二日以疾卒享年六十有九配扈氏先公卒再娶李氏子男一曰蒙古岱管軍百戶女二銘曰智如流水隨物賦形仁如時雨潤物無聲龔黃召杜四美難并大官貴客交口稱能紛擾繁劇無滯無凝目中尺度意外權衡人艱以澀我和而平老當益壯奄忽佳城勒銘墓碑以永鴻名守貞玄靜散人女冠左鍊師墓碑鍊師姓左氏世為安陽陵嶽人故孝弟力田業進士左某之女彰德路權府事兼安陽縣令王信之妻安陽縣丞王鐸之母奉訓大夫荆湖北道宣慰副使武安胡祇遹之妻母孝慈勤儉十九歲而適王氏時貞祐後河朔兵亂彰德當四通八逹之要衝日尋干戈貴賤無寧居師幹夫之蠱雖流離頓挫顛沛急遽之際善自保防未與夫一日相失也其夫自農里立軍功仕至縣令外府僚內助之力為多甫三十九而寡即以不再醮為誓居喪三年未嘗見齒服除脂粉色服屏棄不再御蕭然寄心於清淨寂滅時子鐸未冠師曰為人之母不成其子他日何面見所天於九原遂力與二三女奴紡績織絍訓諸僮以力田教子以讀書習騎射不數年而竟襲父爵次女既笄曰吾必擇讀書知道義家子弟而歸之一時權貴媒妁殷勤問聘終莫之許遂適武安胡氏男女成立田園增其舊一日會親戚閭里曰人生為男子功成名遂身退天之道也况豫一婦人乎自兹以往兒女輩勿復以家事相關白乃於後庭隙地築環堵室禮天慶宫李真人受業野服黃冠賜名守寬以道自居後數歲築庵於王氏别業梁固村之乾隅手親畚鍤建老君殿西廡東庖丈室齋堂俱為之備以道行清真嘉號於長春宫曰守真玄淨散人壽踰八十視聽筋力不衰體癯而神王晨暮香火經函益自嚴謹雖大風雨寒暑不廢某年月日享年八十有八無疾而逝一子即鐸也娶劉氏封縣君三女長適龎氏次適胡氏次適馬氏孫男三人長以軍功拜百夫長次亦以軍功拜千夫長次早卒孫女三人曾孫男三人孫女七人銘曰貞幹而良慈順而剛母儀婦常德將禮防終焉允臧男知義方仕路騰驤女從姑嫜蘭玉芬芳學仙徜徉雲扃霧窗麻衣野裳琅函寶章心間歲長萬慮俱忘觀化四方飛空蛻囊貞骨深藏虛靈不亡我銘孔彰集真觀碑人無貴賤家無巨細承先世之業增崇而光大者易不階尺土片瓦以身起宗又能傳守得人者難此乃四民雞鳴而起孜孜為利者尚且若是而况以清淨無為間寂淡泊為學者歟即今老氏之流男女三十萬其人之才不才千萬不同有握拳衣毛褐囊無一錢不數歲之間而能建立宫觀危樓傑閣大殿長廊數百楹者有借榻乞席栖栖朝夕老死而無蓋頭茅一把者有呼吸咳唾而聚徒百千衆者亦有隻身孤影而不能得一僮僕者亦有承先師富盛之業日漸寥索徒侣散亡而門闌蕭條者以是觀之內能成身外能成物雖剛健有為之男子千萬中不十百矧女子之柔懦乎彰德衙城外堧西康樂坊道宫一區曰集真實女冠楊守和之創始也守和年四十有一夫李義死誓不再醮携一女受道服後得弟子曰守真同師天慶宫重玄真人為黃冠玄默抱璞不將迎不妄求取誠實積久人益信服爭願割財以施與買地以宇殿堂齋厨像設具備鐘磬香火晨暮嚴肅歲癸丑受道號於真常真人曰純素散人庵曰集真觀享年七十有二日集門弟謂曰守真寬和謹厚道業日進吾有後矣龎守正宜佐之明日吾遺世矣翌旦盥櫛冠服怡然而逝守真既主嗣事克紹光烈亦受無為散人之號于誠明真人守真仙去守正繼之守正自七歲服道衣於今將中年信道篤戒行愈嚴純素散人之夫家父母家皆無後守正感慕師德二家墳壠歲時伏臘封樹祭祀不廢手植墓木合抱成列鄉人嘉之至元丙戍冬吾同舍友儒醫單濟民踵門而言曰守正吾甥也願乞文于子發揚師友之德紀録集真觀卜築之勤劬使後人繼繼不絶大書深刻諸石惟髙明進退之濟民端人也言必不妄讀其所持之狀聽其言而信其人若守和者可謂以身起宗能為剛健壯夫之所不能為守真守正能世其業不辱守和傳守得人之明敢以朴辭較其同流之優劣而紀其實磁州嘉福寺賢公講主碑僧以經明行修為本僧學佛者也佛去世久不獲親炙誦講佛言遵履佛行則亦庶乎其佛矣未有不讀佛言不踐佛法而能佛者也不苦學不精鍊者固為誕妄然馳騁乎記念辨博乎抄疏終身文字而實無所了悟自得者亦非善學佛者也磁州嘉福寺賢公講主終于至元之十六年冬十有一月十日又八年門弟文慶狀公之平生請銘其碑公姓武磁之武安人世業農生九年師叔父惠公和尚受僧服於嘉福得名道賢口授法華經背誦不脫一辭自是誦經讀書卷帙不去手年十有八四方遊學過曲陽講習於源唯識席下年三十聞藁城觀音寺濶唯識僧中之龍象趨走聽受學遂精明年髙德劭主壇開講唯識大論繼無虛歲歲丙申復還嘉福歲丁未傳法潤和尚戒於大名百師會下緣法日盛建立武安固鎮名剎八區前後賜法傳戒講主三十有八門弟五十人至元二年同僧統洎諸名公入內殿祝聖壽九年聖旨集諸路僧受戒僧司薦公召入萬壽大殿贊頌稱旨蒙賜法衣一襲受戒于國師加號吉祥十五年作水陸大會立浮圖葬其師惠公像金佛于左域崇福寺公比長逝前三日聚門弟囑以殯葬喪祭儀及親族喪禮輕重一一適宜付法衣一襲于本州僧録才公遂瞑目焉其明了如此銘曰口誦佛言心傳佛印童受僧服不退而進德懋年髙聲聞天朝賜衣榮歸光照雲霄報本像佛建塔葬師是身了了不挂一絲自無有來復無有去擺手便行何戀何慕公無世愛人不公忘豐碑嘉福愈久彌光齊聖廣祐王廟碑人之誠敬油然而自不能已者昭著于禱祠祭祀不待教訓刑政懇切齊一費貨財苦筋骨快樂而不為疲倦原其情則生於報德酬功不能忘本是故天子祭天地諸侯祭境內名山大川庶人則祭其祖禰非所以徼求諸利而苟免禍患也聖人因人情而定禮凡有功德於生民天地六宗以降聖帝明王聖師大賢忠臣良吏載在祀典春秋香火血食永永不絶唐滏陽令崔府君以聰明正直誠一之德形于政治除暴虎祛妖狐雨旱捍水惠澤一方至於幽冥靈異福祐後人者又不為不厚宋景祐元符宣和紹興嘉定增封爵前賢紀言昭著詳悉金國以宋祀未絶江淮未庭奉神代享衡山之祭至元十五年中書省奏先是南嶽阻於長江不獲致禮以崔府君攝享金殘宋滅南北五嶽通祀府君封號難襲故常聖旨增封齊聖廣祐王勑守土偹禮告廟仍大書深刻門額州民李某等竭虔致敬踵門而言曰自神靈之在祀典宋金兩朝雖加崇敬而貴不過公侯未若我朝巍然封以王爵是可不紀石以歌頌皇帝之神功聖德混一六合五嶽之氣不分裂隔限於南北於府君封爵極其崇髙廣祐我國家敢以文為請竊唯鄙賤世居武安在磁為屬邑實處神靈廕庥之下謹再拜齋沐而獻頌曰皇帝仁聖克享天心際天所覆柔撫照臨類禋柴望無文咸秩神之封爵宜致其極神之齊聖德符於諡神之威靈民愛而畏洋洋在上浩浩無外豈惟是州神獨所在天錫皇祚與天同壽享我明薦神助其祐太清宫碑人生而靜性也天也一受其成形而反為形氣之所纍智巧利欲交戰於中美麗紛華百誘於外心死於臭腐形敝於塵滓然則所謂首出庶物虛靈洞徹配天地而為三才果安在哉人自失之賢者能勿喪耳勿喪有道乎傳曰養心莫善於寡欲又曰無為而治者其舜也歟後之為臣者亦有省事清心之諫洗心而不著一物理繁而不勞有為靜而與隂同德動而與陽同波不離世法不著世法鏡瑩水淵萬變去來了無留迹此古之𢎞衍博大真人內聖外王無臭無聲者也所以老莊氏談清淨無為恬淡自然一死生齊彭殤塵垢此生腐鼠軒冕豈無為而言之耶迷而不返執而不通者苟有少悟如刑人之脫桎梏疾人之去沉疴其功豈淺淺哉自性理道德仁義之教廢魚肉於功利鋒鏑於詭譎糜爛湯火於得失紛競聾瞽於聲譽文采無故而病無病而死無災而夭夭殃鬼誅人禍紛紛籍籍而莫之救有人於此而能薄口腹外形體塵視車馬銖視金玉粃粳名爵觀化樂道忘神養虛置身於蜂蟻蝸蠅之外雖未至於內聖外王其賢於人也不亦逺乎吾於黃冠管志通見之矣志通字和叔玄門宗主髙其年行賜號壽齡子世為稷山人年二十四棄家著道士服於今七十有一形癯神王目光如巖下電步風袖飄舉性朴直胸次開朗明白貌若嚴古無崖岸接物則豈弟樂易言直而溫意誠以慈道業餘暇喜以神膏異藥療瘍愈疾由是人益愛慕尊敬之過市則以不得留飯請教為歉恨河東土風雄實民俗誠厚駐舄既久得地於郛南卧龍街袤廣畝六有竒囊無一錢不文疏乞貸報本事神之誠孚格有衆巍然煥然神宇屹立法象昭嚴三清五祖前後相承東西廡寮舍庖廪井廄園圃無不序備落成揭額曰太清踵門來言曰子為我文諸石以勸來者無荒無怠非求名之為也既諾其請以謂太清之取義言教之汙隆人皆知之不言而彰斯人也信道篤得趣深報本誠是宜銘銘曰紛萬有總一無等浮雲通太虛嗟人生趨迷途心形役如老奴一念起百垢汙化靈府為穢區死醉夢永不蘇偉斯人智若愚祕此身同傳車志有在天為徒脫塵網欽聖謨思報本非要譽未厭世香火俱闢朱門開綺疏列琅函藏天書鐘磬聲穿雲衢觀萬化泡影如閲春草青階除
