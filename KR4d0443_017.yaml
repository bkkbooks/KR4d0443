body:
  text: 紫山大全集巻十七元胡祇遹撰碑大元故明威將軍同簽書東川行樞宻院事王公神道碑銘人才之巨細門第之興衰福澤之可乆不可乆唯於易代之際觀之則見之明斷之審大率英雄豪傑起身亢宗有待而發四方無虞百揆時叙貴賤享宴安之樂而無竒勲偉績之可為雖材智絶人既無所施無惑乎終老於庸流就能名一藝占一業三年一資五年一級而於大勲業大封拜則不可得矣時移世變崇極而圯天厭舊邦羣雄競起草昧之間王侯將相公卿大夫士之才立見於奮迹之始天下既定新天子崇徳報功大則分茅土割方郡小則受一城封一邑治安之福與羣才共之然而或一再世而消削絶滅或三數世或與國祚同終始是豈偶然哉福澤之乆者其徳厚其功大其家法備一再傳而絶滅者其徳薄其功微其家法無足取此如火之熱如氷之寒不可誣也今請以同簽書行樞宻院事王公為徴焉公之曾大父世為順天人適當金季隐晦不仕兵亂家譜亡失名字不可考父沂字振文官至順天路總管府權府事别有碑公諱仲仁起身蔡國公帳下以才勇拜百夫長再受銀符鎮撫諸軍事歲戊午分𨽻今開府儀同三司史公部曲扈從憲宗皇帝平西南夷為上前驅數戰數勝首拔定元諸嵒柵六軍遂得深入繼拔禮義長寧大懐苦竹釣魚四砦以功寵賜黄金鞍勒憲宗皇帝曰為汝他日戰功之驗證未幾宋將曹太尉李路分下嘉陵白水馬湖來拒敵奉㫖總率戰艦五戰五㨗手刃二將於陣前宋兵溺死者無慮數千憲宗皇帝喜賜黄白金二十斤今上嗣里宣命金符充都鎮府行軍千戸無何改授武衛軍干户璮賊搆逆東方失寧佐經畧董公撫諭青齊所至導揚聖慈使民曉知逆順反側遂定使還佩海青金符入巴蜀按視邊事事廻入對西南山川城郭民物風俗險易虛實歴歴詳說如在目前上嘉嘆曰得人如此何事不濟特恩陞山東路統軍副使兼總管造船事未畢宣命虎符充眉州管軍萬户眉入南徼尤深險前官不克負荷連章乞謝職新進徼倖邀功欲得是任者交相稱薦衆議紛紜乆不决特㫖教錫喇做者錫喇盖云黄色指公而言也鎮眉凡四年訓練精嚴戰守有法兵需精備小大二十餘戰皆以出竒取勝聲聞於上賜白金重錦以榮其功就佩以降虎符改充東川副統軍使宋賊冦成都入其郛焚毁大掠而去公提兵直趨嘉定半途與賊遇一戰賊北五十里死傷相枕藉奪其俘而還朝廷聞而壯之至元十年以功授明威將軍同簽書東川行樞宻院事虎符如故明年總兵攻重慶與士卒同甘苦衝冐瘴毒卒於軍中公臨敵决勝智勇揚溢燕居無事則仁言嚴重不露圭角弟仲義武衛官鄂勒千戸仲禮百夫長兼亳州兵馬仲智滿城諸軍鄂勒官子男五人長曰宏毅勇而文至元三年襲爵充武衛千戸八年改右衛親軍千戸九年以淮南軍功陞昭信校尉職如故十一年以渡江功再陞宣武將軍管軍總管行三衛親軍都指揮使司事攻潭州城下十三年授明威將軍中衛親軍副都指揮使十七年陞昭勇大將軍東路䝉古漢軍副都元帥次曰寧起官昭信校尉右衛親軍千户再陞宣武將軍管軍總管餘㓜若姪若孫詵詵繩繩玉茁蘭芽不可具紀嗚呼西漢功臣子孫至武帝而絶滅殆盡豈非髙明之下難以乆處王氏慶門自權府公乘聖朝開運拜爵受封傳子傳孫揚歴五朝封爵日隆家聲益振繼繼承承益熾而昌厚澤遐福方興而未艾然則由人品巨細而知門第之興衰視履考祥而知福澤可乆不可乆以王氏一門觀之豈非明效大驗歟某年某月某日袝塟於先塋神道有碑子宏以狀來請銘銘曰起身有道文武二途雜流邦官志士病諸唯同簽公勇廢萬夫忠肝義膽與生死俱出竒决勝暗合孫吳長寧大懐白水馬湖古今天險勇困智愚不有其躬為上前驅統兵東川蠻逺江漁益州被冦直入其郛繼以大攻驅掠前趨設伏以擊奪還其俘賊駭奔竄棄甲焚艫益人於今感泣歡呼東西二川狀固有餘付託得人百蠻可圖大邦為讐報豈宜徐矯矯仡仡壮志靡渝聖意簡在超付兵樞論功受賞弓矢彤玈竭力報效歲時不虚南夷未平中道薨殂盖棺馬革賫志兵墟忠臣有子益昌門閭繼志述事金虎章符贈謚有日墓碑可無銘以紀實三嘆而書蕭千户神道碑銘國朝命官襲爵既優既渥子孫非有大過惡繼繼承承而不廢絶世禄已乆日黯前人光是亦貴富之所養中才庸品之常情無足怪者不荒侈於鷹犬裘馬不滛蕩於聲色甘肥不驕矜於父兄閥閱不陵人以威儀技藝吾於蕭公千户見之矣千户姓蕭諱世昌其先遼貴族五世祖阿薩爾仕遼為羣牧使四世祖竒拉爾贈鎮國上將軍上騎都尉河南縣開國子髙祖栢德本贈輔國上將軍輕車都尉河南縣開國伯曾祖圖薩拉贈奉國上將軍河南郡開國伯祖徳亨朝廷以開國歸義之勲爵奉國上將軍官彰徳路總管兼行軍總帥府事考某征南行軍千戸公數歲而孤入小學讀書不勤師友不偕羣兒戯㺯視聴動止端重淵静如老成人學對屬即知聲律物象竒辭英氣精宻雄偉常勝其偶九歲襲爵受萬户府劄充鄂勒千户十二歲體貎壯麗魁然一竒男子拜命金符管軍正千户嵗已未扈從渡江中統建元再拜恩命千户如故三年壬戍討平叛賊李璮復立宿州并縣西城至元六年春南征五河口臨敵手馘四十餘人獲戰艦二軍實不計以功為山東路統軍司薦申行中書省省擬上聞遷陞不幸以明歲正月十有六日感風疾而殁年二十有六聞者莫不哀悼夫人叚氏嚴東平魯王之外甥千戸君亡時年二十有四即自貶損膏腴貴習不御華飾守節教子成夫之志今其子亦襲爵有年矣以某年月日將塟於某所遣其子某奉狀以公之墓碑來請銘余接見蕭氏祖考子孫凡四世矣千户軍不惟有出藍良最之譽在一時世官子孫少見其比吁使天假以壽竒勲偉績其可量也哉今既惜其才器而又哀其短天不能不為之銘銘曰嗟嗟造物實艱實難萬愚一賢保全或慳蕭氏之子百草之蘭紫庭未升風霜夜寒蕭氏之子羣鳥之鸞一飛未舒瘡痍羽翰嗟嗟造物知誰控摶與之不易奪之匪艱三世將門豈非其端我知斯人不尚忍殘彼蒼者天呼號莫攀龍韜虎畧鐵衣石棺風水沄沄松柏丸丸壽短名永神其妥安承直郎江西等處𣙜茶都轉運司副使李公神道碑公姓李氏諱瑞字君祥世恩州人父郁徙居鄆城遂占籍焉祖珪仕至大名府檢法曽祖玉河南府判官公㓜失慈侍居憂哀毁羸瘠以孝聞鄉里年十七出贅於邑人續氏時明經射䇿貢舉進身之法皆廢又不能治生農工處市井中遂商賈為業知人棄我取人取我與之機且㢘以信視列肆貪刻者人多歸之因以致富累貨巨萬公嘆曰不過為守錢虜富家翁耳矧商居四民之下不足以汙吾身於是立志讀書涉獵經史東平總管府經歴司知公氣宇不凡辟為書記習熟吏事至元五年本司保舉充鄂囉濟駙馬位下人匠局知事七年制國用使司選擢通㢘知錢榖者以公充濟寧府鄆城縣行用交鈔庫副使終任之間會計無偏失鈔法流行居民行旅皆以㢘平稱十年中書吏部符遷授平陽路收差庫監支納十二年除恩州酒稅醋三務大使削苛細務寛平課額增羡而民說誦無怨謗江南平定朝廷以户口繁庶鹽法不可不謹宣命金符從仕郎提舉浙西鹽使司事置司於平江府鹽法設竈户給工本煮鹽入官照引出發前政丞炎方初下新制未定夤緣苟且為欺蔽尅削竈户工本寒餒瘠乏官鹽不足原額私煎不能禁公私俱擾公到官立革宿弊家給人足布宣教條令行禁止歲課日增十六年陞承直郎宣授江西等處𣙜茶都轉運副使比署事同衆公議給遽採造罷廵禁之擾驗實出賣歲終課額倍增秩滿得代二十年行中書省以公亷幹特委會計杭州酒課二十一年後五月二十有九日不幸以疾卒年甫五十矣夫人續氏之弟徳新同夫人梁氏䕶柩還鄉里是年十一月二十有二日祔塟於鄆城宜邱之先塋公天資頴悟器宇𢎞深心計鞭算不大聲色而辦吏事尤精敏義於周急視貨財如糞土好賢樂善與人交竭誠以敬嗚呼公剖煩理劇有猷有為之才百無一施惜乎天不假年可哀也哉雖然韓文公銘李充實之墓曰生而不淑孰謂之壽死而不朽孰謂之天若公者生淑而死不朽者也徳新持里人杜亮紀公生平之狀以神道碑銘并序來徴言謹序而銘之銘曰智周於利志喻於義積而不居通而不器以財發身以徳御氣長鯨海濤大鵬風翼進也無難退也何易數耶命耶所期力致材耶學耶有用不既中壽而殞半途而廢勒銘墓碑以俟貞謚故大名路徴收課稅所長官耶律公神道碑公姓耶律氏諱澤民字濟之其本出自遼太祖族號大横帳曾祖赫嚕金正隆間官輔國上將軍同知北京留守事致仕卜居大興之西安縣故子孫占籍焉祖烏達噶潜徳不仕祖妣蕭氏考克酬巴爾字閏之謹厚明敏善騎射知漢文章明昌六年以門資補官桓州酒監我朝兵萬餘掩至城下率衆力敵我兵引退有司以戰功聞陞髙陽尉考終無犬吠之警縣人刻石頌徳遷定徳遷定興令以㢘幹稱太祖皇帝提兵南下力窮出降授翰林待制歲戊寅賜佩金虎符行諸路便宜事乙酉扈從西征病卒妣蕭氏封河南郡夫人公㓜頴悟洒落不羈以任子襲爵年三十壬辰南伐佩虎符提㸃軍前橋梁芻粟事所下城邑問有士大夫被俘執者即以私財購出之全活者衆士林于今稱之已亥以從軍之勞授大名路徴收課稅所長官丁未北覲六月十有七日遘疾甍於西京之傳舍享年五十夫人劉氏蕭氏子男二人長曰泰亨襲公爵後用河南等路經畧使薦提領陜虢二州事中統改元復長大名路課稅所事至元十年改授單州尹次曰賁亨孫男一人曰庭傑公尚氣義輕貨財交㳺日滿門雖傾囊倒廪一供宴享之樂而不恤逺鄉寒士受公之惠者不可計與人交樂易開豁略無貴豪習氣初南征廻一時將帥車馬囊槖實以子女玉帛公之所得法書名畫異文秘典寳琴佳硯而巳餘一無所取也公甍之某年既塟神道有石㤗亨紀公事業來求銘銘曰世祿後昆鮮能處仁驕奢淫佚辱宗敗身惟公貴胄世里支親光耀先哲超踰等倫尚氣以義潤身以文好客投轄恵窮指囷逹不放曠狎不囂紛艾服官政壯志方伸半途而殞埋恨昌辰䔍生賢嗣益大其門大元故奉訓大夫知宿州事張公神道碑銘公諱裕字仲容滏陽人曾祖諱鎮完顔金管軍千户祖諱黨敏不仕考諱演仕我朝主滏陽簿妣李氏公起身刀筆補磁州州吏歲庚戍陞本州從事以㢘幹中統建元宣撫司薦陞滏陽令再除成安令至元二年改授沙河令縣南門臨沙河沙積城平每南風塵沙飛激居民不能飯公身教士人樹髙栁三匝近南萬株栁茂宻沙塵不能入炎夏行人困渇休息於綠隂芳草解鞍停輪移時不忍去所剝繁枝充公私薪爨不數年巨材足以充梁棟一舉而四美具公平生材智類如此四年充邢臺令廨宇倉庫為之一新十年受承事郎武清縣尹遞運江南寳貨身至上都無毫髪損失都堂嘆賞籍記陞遷十六年改承務郎同知清州事二十三年陞承直郎西京總管府判官省部摘委應辦御史䑓保呈二十八年陞奉訓大夫知宿州事是年十月十有二日以疾卒享年六十有九配扈氏先公卒再娶李氏子男一曰䝉古岱管軍百戸女二銘曰智如流水随物賦形仁如時雨潤物無聲龔黄召杜四美難并大官貴客交口稱能紛擾繁劇無滯無凝目中尺度意外權衡人艱以澁我和而平老當益壯奄忽佳城勒銘墓碑以永鴻名守貞𤣥静散人女冠左鍊師墓碑鍊師姓左氏世為安陽陵岳人故孝弟力田業進士左某之女彰徳路權府事兼安陽縣令王信之妻安陽縣丞王鐸之母奉訓大夫荆湖北道宣慰副使武安胡祇遹之妻母孝慈勤儉十九歲而適王氏時貞祐後河朔兵亂彰徳當四通八逹之要衝日㝷干戈貴賤無寧居師幹夫之蠱雖流離頓挫顛沛急遽之際善自保防未與夫一日相失也其夫自農里立軍功仕至縣令外府僚内助之力為多甫三十九而寡即以不再醮為誓居䘮三年未嘗見齒服除脂粉色服屏棄不再御蕭然寄心於清淨寂滅時子鐸未冠師曰為人之母不成其子他日何面見所天於九原遂力與二三女奴紡績織絍訓諸僮以力田教子以讀書習騎射不數年而竟襲父爵次女既笄曰吾必擇讀書知道義家子弟而歸之一時權貴媒妁慇懃問聘終莫之許遂適武安胡氏男女成立田園增其舊一日㑹親戚閭里曰人生為男子功成名遂身退天之道也况予一婦人乎自兹以往兒女軰勿復以家事相闗白乃於後庭隙地築環堵室禮天慶宫李真人受業野服黄冠賜名守寛以道自居後數歲築庵於王氏别業梁固村之乾隅手親畚鍤建老君殿西廡東庖丈室齋堂俱為之備以道行清真嘉號於長春宫曰守真𤣥淨散人壽踰八十視聴筋力不衰體癯而神王晨暮香火經函益自嚴謹雖大風雨寒暑不廢某年月日享年八十有八無疾而逝一子即鐸也娶劉氏封縣君三女長適龎氏次適胡氏次適馬氏孫男三人長以軍功拜百夫長次亦以軍功拜千夫長次早卒孫女三人曾孫男三人孫女七人銘曰貞幹而良慈順而剛母儀婦常徳將禮防終焉允臧男知義方仕路騰驤女從姑嫜蘭玉芬芳學仙徜徉雲扃霧窓麻衣野裳琅函寳章心閑歲長萬慮俱忘觀化四方飛空蛻囊貞骨深藏虚靈不亡我銘孔彰集真觀碑人無貴賤家無巨細承先世之業增崇而光大者易不階尺土片瓦以身起宗又能傳守得人者難此乃四民雞鳴而起孜孜為利者尚且若是而况以清淨無為閑寂淡泊為學者歟即今老氏之流男女三十萬其人之才不才千萬不同有握拳衣毛褐囊無一錢不數歲之間而能建立宫觀危樓傑閣大殿長廊數百楹者有借榻乞席栖栖朝夕老死而無盖頭茅一把者有呼吸咳唾而聚徒百千衆者亦有隻身孤影而不能得一僮僕者亦有承先師富盛之業日漸寥索徒侣散亡而門闌蕭條者以是觀之内能成身外能成物雖剛健有為之男子千萬中不十百矧女子之柔懦乎彰徳衙城外堧西康樂坊道宫一區曰集真寔女冠楊守和之創始也守和年四十有一夫李義死誓不再醮携一女受道服後得弟子曰守真同師天慶宫重𤣥真人為黄冠𤣥黙抱璞不將迎不妄求取誠實積乆人益信服争願割財以施與買地以宇殿堂齋厨像設具備鐘磬香火晨暮嚴肅歲癸丑受道號於真常真人曰純素散人庵曰集真觀享年七十有二日集門弟謂曰守真寛和謹厚道業日進吾有後矣龎守正宜佐之明日吾遺世矣翌旦盥櫛冠服怡然而逝守真既主嗣事克紹光烈亦受無為散人之號于誠明真人守真仙去守正繼之守正自七歲服道衣於今將中年信道篤戒行愈嚴純素散人之夫家父母家皆無後守正感慕師徳二家墳壠歲時伏臘封樹祭祀不廢手植墓木合抱成列鄉人嘉之至元丙戍冬吾同舍友儒醫單濟民踵門而言曰守正吾甥也願乞文于子發揚師友之徳紀錄集真觀卜築之勤劬使後人繼繼不絶大書深刻諸石惟髙明進退之濟民端人也言必不妄讀其所持之狀聴其言而信其人若守和者可謂以身起宗能為剛健壯夫之所不能為守真守正能世其業不辱守和傳守得人之明敢以朴辭較其同流之優劣而紀其實磁州嘉福寺賢公講主碑僧以經明行修為本僧學佛者也佛去世乆不獲親炙誦講佛言遵履佛行則亦庶乎其佛矣未有不讀佛言不踐佛法而能佛者也不苦學不精鍊者固為誕妄然馳騁乎記念辨博乎抄疏終身文字而實無所了悟自得者亦非善學佛者也磁州嘉福寺賢公講主終于至元之十六年冬十有一月十日又八年門弟文慶狀公之平生請銘其碑公姓武磁之武安人世業農生九年師叔父恵公和尚受僧服於嘉福得名道賢口授法華經背誦不脫一辭自是誦經讀書巻帙不去手年十有八四方游學過曲陽講習於源唯識席下年三十聞藁城觀音寺濶唯識僧中之龍象趨走聴受學遂精明年髙徳劭主壇開講唯識大論繼無虚歲歲丙申復還嘉福歲丁未傳法潤和尚戒於大名百師會下縁法日盛建立武安固鎮名刹八區前後賜法傳戒講主三十有八門弟五十人至元二年同僧統洎諸名公入内殿祝聖壽九年聖㫖集諸路僧受戒僧司薦公召入萬壽大殿賛頌稱㫖䝉賜法衣一襲受戒于國師加號吉祥十五年作水陸大會立浮圖𦵏其師恵公像金佛于左域崇福寺公比長逝前三日聚門弟囑以殯𦵏䘮祭儀及親族䘮禮輕重一一適宜付法衣一襲于本州僧錄才公遂瞑目焉其明了如此銘曰口誦佛言心傳佛印童受僧服不退而進徳懋年髙聲聞天朝賜衣榮歸光照雲霄報本像佛建塔𦵏師是身了了不掛一絲自無有來復無有去擺手便行何戀何慕公無世愛人不公忘豐碑嘉福愈乆彌光齊聖廣祐王廟碑人之誠敬油然而自不能已者昭著于禱祠祭祀不待教訓刑政懇切齊一費貨財苦筋骨快樂而不為疲倦原其情則生於報徳酬功不能忘本是故天子祭天地諸侯祭境内名山大川庶人則祭其祖禰非所以徼求諸利而苟免禍患也聖人因人情而定禮凡有功徳於生民天地六宗以降聖帝明王聖師大賢忠臣良吏載在祀典春秋香火血食永永不絶唐滏陽令崔府君以聰明正直誠一之徳形于政治除暴虎祛妖狐雨旱捍水恵澤一方至於幽㝠靈異福祐後人者又不為不厚宋景祐元符宣和紹興嘉定增封爵前賢紀言昭著詳悉金國以宋祀未絶江淮未庭奉神代享衡山之祭至元十五年中書省奏先是南嶽阻於長江不獲致禮以崔府君攝享金殘宋滅南北五嶽通祀府君封號難襲故常聖㫖增封齊聖廣祐王勑守土偹禮告廟仍大書深刻門額州民李某等竭䖍致敬踵門而言曰自神靈之在祀典宋金兩朝雖加崇敬而貴不過公侯未若我朝巍然封以王爵是可不紀石以歌頌皇帝之神功聖徳混一六合五嶽之氣不分裂隔限於南北於府君封爵極其崇髙廣祐我國家敢以文為請竊唯鄙賤世居武安在磁為屬邑實處神靈廕庥之下謹再拜齋沐而獻頌曰皇帝仁聖克享天心際天所覆柔撫照臨類禋柴望無文咸秩神之封爵宜致其極神之齊聖徳符於謚神之威靈民愛而畏洋洋在上浩浩無外豈惟是州神獨所在天錫皇祚與天同壽享我明薦神助其祐太清宫碑人生而静性也天也一受其成形而反為形氣之所累智巧利欲交戰於中美麗紛華百誘於外心死於臭腐形敝於塵滓然則所謂首出庶物虚靈洞徹配天地而為三才果安在哉人自失之賢者能勿䘮耳勿䘮有道乎傳曰養心莫善於寡欲又曰無為而治者其舜也歟後之為臣者亦有省事清心之諫洗心而不著一物理繁而不勞有為静而與隂同徳動而與陽同波不離世法不著世法鏡瑩水淵萬變去來了無留跡此古之𢎞衍博大真人内聖外王無臭無聲者也所以老莊氏談清浄無為恬淡自然一死生齊彭殤塵垢此生腐䑕軒冕豈無為而言之耶迷而不返執而不通者苟有少悟如刑人之脫桎梏疾人之去沉疴其功豈淺淺哉自性理道徳仁義之教廢魚肉於功利鋒鏑於詭譎糜爛湯火於得失紛競聾瞽於聲譽文采無故而病無病而死無災而夭夭殃鬼誅人禍紛紛籍籍而莫之救有人於此而能薄口腹外形體塵視車馬銖視金玉粃糠名爵觀化樂道忘神養虚置身於蜂蟻蝸蠅之外雖未至於内聖外王其賢於人也不亦逺乎吾於黄冠管志通見之矣志通字和叔𤣥門宗主髙其年行賜號壽齡子世為稷山人年二十四棄家著道士服於今七十有一形癯神王目光如巖下電歩風袖飄舉性朴直胷次開朗明白貎若嚴古無崖岸接物則豈弟樂易言直而温意誠以慈道業餘暇喜以神膏異藥療瘍愈疾由是人益愛慕尊敬之過市則以不得留飯請教為歉恨河東土風雄實民俗誠厚駐舄既乆得地於郛南卧龍街袤廣畆六有竒囊無一錢不文疏乞貸報本事神之誠孚格有衆巍然煥然神宇屹立法象昭嚴三清五祖前後相承東西廡寮舍庖廪井廐園圃無不序備落成揭額曰太清踵門來言曰子為我文諸石以勸來者無荒無怠非求名之為也既諾其請以謂太清之取義言教之汙隆人皆知之不言而彰斯人也信道篤得趣深報本誠是宜銘銘曰紛萬有總一無等浮雲通太虚嗟人生趨迷途心形役如老奴一念起百垢汙化靈府為穢區死醉夢永不蘓偉斯人智若愚祕此身同傳車志有在天為徒脫塵網欽聖謨思報本非要譽未厭世香火俱闢朱門開綺疏列琅函藏天書鐘磬聲穿雲衢觀萬化泡影如閱春草青階除
