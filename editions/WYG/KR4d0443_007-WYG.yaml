袖任縱横世間較短量長手豈識先生法外情題郭千里秋江小景圖紅入江楓兩岸霜鴈行殘照影㣲茫都來尺楮無多地楚尾吳頭萬里長閒書寒天剛直浩然氣吐作盤施未雨龍金國百年論筆力一時縮手讓清雄題温公與劉道原書先哲交游意最真雍雍辭氣見情親只今風俗何衰薄白髪相看等路人題阮籍醉歸圖醉眼逢人不下驢㡬回把酒笑三閭據鞍正作羲皇夢那記人譏禮法踈子期善聽圖絃聲美惡即心聲只有鍾期識此情四海同聲箏笛耳斯人一去向誰鳴龍眠畫淵明義熙甲子有斯人李白丰神是後身不遇龍眠髙世手紛紛俗筆豈能真題唐明皇觀棊圖治平雖久不忘兵日日霓裳羯鼓聲天寳錯來非一著尚從脂粉較輸贏題張騫乘槎圖奉使西夷二十年同行三百一身全期君事逺無窮罪又作兹行欲誑天題安夢圖聲利迷人死不醒槐根寓説亦髙情流行坎止皆歸命㸔得人間萬事輕題老子出關像哲人已欲居九夷先生髙駕還西之二聖中原不留跡却從圖畫憫當時題南華問龜圖元龜老鶴淡相親丹頰龎眉百歳身懶過商巖覔園綺到頭終是利名人䟦射釣圖斜倚長弓把釣竿波心得雋望雲間眼前山澤無窮利肯學書生袖手閒題四時代謝圖一幅横披畫四時筆端新意㡬人知光陰飛鳥人間世辛苦黄塵兩鬢絲題東坡石菖蒲贊人好墻烏亦有情那堪心畫更心聲無窮大藥堪題詠獨為菖蒲細發明䟦元遺山與怡軒先尘張仲文教授書帖此書致問我先人四海交遊分最親開巻未終雙淚落丰神更比夢中真贈伶人趙文益富貴賢愚共一塵萬紅千紫競時新到頭誰飽黄粱飯輸與逢場作戯人抹土塗灰滿面塵難猜公案這畨新世間萬事誰真假要學長安陌上人題雪中㑹琴圖十首太素乾坤自一天乘風來訪玉壺仙都將一曲桃花水寫入泠泠十二絃醉騎白鳯散氷花醒㺯瑶琴玩歳華却笑陽春太粗俗餘音飛作赤城霞仙人琴瑟無塵土洗心洗耳氷雪清可憐師曠真庸手促軫調絃學鳯鳴雪滿長松月滿軒氷壺樓閣跨山巔琴聲吹醒黄塵夢不到瑶䑓五百年玉宇琳宫萬里寛風生毛骨怯清寒休將九奏鈞天樂輕著庸兒洗眼看琴聲未了步虚聲巳得盧敖游太清塵土涴人王子晉碧桃花底學吹笙僊家香火白雲間坐看瓊花泛碧瀾不為鳴琴有成約懶揺吟佩玉珊寒青衣童子抱琴隨白鶴來迎恠暮遲欲向松間問前路茶煙一縷起門楣不廻剡棹不騎驢拄杖敲門亦自娛取次徃還成故事出塵清興㑹仙圖厭聽雲間碧玉箾寳徽聲散海翻濤從教玉女天花落亂㸃龍鸞白錦袍李昇朝元圖地獄天堂有是言鸞聲鶴背畫朝元後人遂學飛昇術枯槁山林不自寃當時大小李將軍著色山林妙入神歳月消磨俱不見朝元圖子更堪珎詩餘㸃絳唇贈妓風度髙閒水仙花露幽香吐等閒尊俎細聽黄金縷命薄秋娘夢斷霓裳舞黄梅雨燕儔鶯侣那解芳心苦太常引寄王提刑仲謀七年分袂一相逄倐南北又匆匆白髪兩衰翁縱握手渾如夢中共山如畫洹溪如練空㡬度春風觴咏㡬時同休直待功名景鐘前調為王奉御夫人壽日慶門華冑㡬千秋更名父早封侯天性自貞柔立閨範并州應州一盃千歳嫩凉時節暑氣雨前收壽酒勸金甌記歳歳西風畫樓西江月讀通鑑唐太宗踣魏徵碑有感而作晩食甘於粱肉徐行穏似軒車直須朝暮苦馳驅指望凌煙髙處前日豐碑旌表今朝貶竄妻孥喜為正直怒奸諛自古忠臣良苦南鄕子宿武安李仲威家因營𦵏事夢破五更頭萬慮闋心不可收憂世憂心無限事多憂自笑元龍百尺樓寒葉雨聲稠百蟄無聲已暮秋一歳又從流水去悠悠明日田家酒百甌前調詠李通甫秋扇新様玉瓏􅋛徧賜輕凉滿漢宫記得班姬拈彩筆恩隆寫入新詩字字工殘暑又西風動是經年篋笥封只欠一枝霜後葉殷紅點破團團璧月空鷓鴣天甥孫以紅葉扇索樂府露冷霜寒百卉腓容光來與菊花期雪香睡足青春夢晩節隨時始衣緋流水逺夕陽遲秋山斂黛讓晴暉醉魂不逐西風散璧月瑶宫晩更冝江城子夜飲池上摩訶池上水風清露零零月華明玉簟銖衣清影照閒情一曲洞仙歌未闋霜葉滿鳯凰城醉魂輕舉上青㝠閟仙扄墮滄溟散作秋香無語話三生安得青蓮同把酒揮醉墨問枯榮水調歌頭招友人飲人處六函内蚊睫一㣲塵忽忽數十寒暑駒隙等逡廵禮樂衣冠縛束文字功名汨沒辱寵萬悲忻雅意竟誰了含恨入荒闉笑緇黄誇解脱保天真將心自遊溟漠屈蟄不生春氣化也應歸盡雲影白衣蒼狗何處駐陽神莫聽三家語來作醉鄕民前調賞白蓮招飲妖嬈厭紅紫來賞玉湖秋亭亭水花凝竚萬斛冷香浮初訝西風靜婉又似五湖西子相對更風流翠潤寳釵滑重整玉搔頭泛雲腴歌白雪捲瓊甌尊前共花傾倒一醉洗間愁屈指秋光能㡬歌詠太平風景佳處合遲留更倩月為燭散髪弄扁舟前調宴樂嗚咽洞簫裏皓齒艶歌聲同聲同氣相應雙鳯一時鳴春晝沉香火底凉月碧桃花下握手共誰聽有酒且勿醉細倩玉纎傾白髭鬚縁底事為愁生尊前怨思兒女向我訴𠂻情東第貴官鼓吹北里市塵箏笛適意各忻榮老耳未聾瞶日日飲昇平前調慶翰長生朝千古大名下五福㡬人全相如妙齡詞賦一降冠羣賢姓字家傳户説丰表芒寒色正星日麗青天朱服赤墀裏緑髪玉堂仙忽西風吹夢破海成田冥冥造物雲龍風虎又夤縁兩代斯文盟主百載中朝元老雅望更誰先好藉金蓮燭壽酒要如川木蘭花慢贈歌妓話興亡千古試聴取是和非愛海雨江風嬌鶯雛鳯相和相催泠泠一聲徐起墜梁塵不放采雲飛按止玉纎牙板細傾萬斛珠璣又如辨士遇秦儀六國等兒嬉㸔捭闔縱横東强西弱一轉危機千人洗心傾耳向花梢不覺日陰移日日新聲妙語人間何事顰眉前調酬宋鍊師贈梅愛清香踈影問誰識歳寒心稱月底溪橋水邉籬落雪後園林仙家亦憐幽獨羡玉堂温水靜相尋寫影華光醉墨招魂和靖清吟陶潛官罷杜門深門客欲誰臨謝擕酒扶花敲門見過一洗塵襟揮毫徑酧雅意拚醉來忘却雪盈簪更結松筠髙㑹從渠桃李繁陰前調元夜宴王三舍人宅有火塔松燈之樂愛玲瓏紅玉光照夜滿庭春更翠焰浮空朱明射月和氣留人河東上元佳節念客懐誰與作情親喜二三更雅集清歡滿意慇懃人生元夜㡬畨新賢主亦佳賔儘月轉参横香殘燭燼猶勝芳晨團圞膝前兒女放盃行到手莫辭頻燈火家庭此夕明朝世務紅塵前調題倪都運南塘蓮社倚西風閒在談清影玉亭亭問幽苦芳心何時解語脉脉盈盈秋香欲無還有似自憐不嫁惜娉婷好在芙蓉城闕夢回羅襪塵生多情爭似總無情殘照又西傾怕去去蘭舟露凉煙冷月落参横沙鴈也能留客倩溪光相照晩粧明緩按梁州絲竹聽翻白苧新聲廬山社蘭亭㑹後世圖畫題詠至今傳玩不絶也乃知前代樽殂風流猶為人永永景慕其於善行名言豐功􅅷烈誰得而廢之去歳夏僕以從百官之後走上都間南塘白蓮雅某諸名公皆賦樂章自以不得一繼餘韻為恨今年秋席上運使倪公復尋舊盟僕忝與賔末謹贅一闋庶㡬異日得附南塘蓮社之故事云前調春日獨㳺西溪愛西溪花柳紅灼灼緑隂隂更細水園池修篁門巷一徑幽深春風一聲啼鳥道韶華一刻抵千金飛絮㳺絲白日忍教寂寞消沉我來無伴獨幽尋髙處更登臨但白髪衰顔羸驂倦僕㡬度長吟人生百年適意喜今年方始遂歸心醉引壺觴自酌放歌殘照清林前調留題濟南北城水門歴雄都大邑厭車馬市塵深愛歴下風煙江湖郛郭城市山林人家水芝香裏㸔萬屏千嶂變清陰無問買山髙價休論寸土千金偶因王事愜閒心佳處更登臨萬斛泉珠四圍嵐翠一洗塵襟强齊覇圖陳迹但華山平野聳孤岑今夕髙筵清賞明朝驛騎駸駸前調殷獻臣伯徳孝先奉使日本索詩送行得此三闋要聲名洋溢須涉險立竒功儘萬里滄溟魚龍吹浪按此調前段應九句今考大典所載魚龍吹浪句下闕二十二字與前後同此調者不合既無别本可校謹仍其舊海若能如十萬兵雄明年春暖際天東佳報定先通看倭氏稱藩蝦夷稽顙異服殊容都人聚肩重足喜歸來朝拜大明宫寄語三吳百越休誇江水連空壯驪歌慷慨望天際送君行眇月窟張騫雪山殷侑虚擅英名忠肝落落如鐵要無窮渤澥傴長鯨笑指扶桑去路等閒風浪誰驚士當一節了平生羞狗苟蠅營仗雷電神威風雲聖算何徃無成佳聲定隨潮信報東夷重譯覲來庭好箇皇朝盛事毋忘紀石蓬灜百年湖海氣得初効處囊錐更緑鬢朱顔雄姿英發光射征衣丈夫喜伸知巳感宸恩深重此身㣲虎節才辭北闕丹誠巳落東垂中天雨露徹偏禆只欠海諸夷好敷悉丁寧慇懃感悟六解疑危暘隅普霑王化更洗心懐徳徑來威一降功名事了清銜史冊騰輝前調慶翰長八十應飛熊佳兆年共徳兩俱髙論少日才名遐齡勁節合擅中朝文章在公餘事快筆端雲海捲風濤四海名卿竒士百年齊入鈞陶笑將經濟讓兒曹萬事一秋毫享内相尊榮金蓮畫燭宫錦朝袍投壺雅歌文㑹盡百杯春色醉仙桃好為昇平强健賔從東岱南郊摸魚兒玉簪問秋香都在何許堂隂暮凉風露空圓不費司花巧玊立幽閒丰度如欲語似按原本闕二字無别本叅校謹仍舊以誌闕疑一襟清苦愁千縷長門夜雨更月暗燈昏水沉煙燼寂寞𤨏窻户慿誰問見棄宣和花譜應為孤髙自誤升平枕上温柔夢不到琳宫仙府仍為汝待安排軟金羅幕重遮䕶秋霜良苦怕清夜無人天寒翠袖孤影更衰素
