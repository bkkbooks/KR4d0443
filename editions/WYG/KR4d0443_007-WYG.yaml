body:
  text: 紫山大全集巻七元胡祇遹撰五言絶句題趙子昂畫石林叢篠不踵王右丞不參文湖州幽深寫新意木老荒山秋江臯接河瀕新梢已拂雲石田不敏樹𤨏屑雜荆榛巨幅厭豪放片紙發纎巧寸餘歳寒姿生意自妍好東坡寫竹石㳺戯亦幽閒落筆得全竹敢作畫工㸔竹影不難寫要與竹同神所知桃李妍安能比此君題小隠圖富貴為人詘廻視妻妾羞躬耕得温飽歳宴亦優游危坐松石下長嘯來松風王侯與螻蟻究竟誰雌雄醒吟泰山月醉卧泰山雲萬鍾不可召亦足張吾軍人生失一官直欲不可活誰能抱雄才終老甘藜藿好名人所同喜逢人所共先生獨何心不願為世用鳥獸不可隣斯人吾願與將身落荒山一嘯同巢許跋韓渥書常愛歐陽詢𦂳結無比倫不意韓公手雍容解寫真七言絶句丁亥元日門帖子白髪蕭蕭覆領巾今年六十一年人日髙坐受鄉鄰賀隨例門開萬象春人道今年本命年側身修行合拳拳吉凶悔吝生乎動一靜由人匪自天戊子元日門帖子逺思深念漫傷神痛飲狂歌亦損身三葉韋編香一炷坐㸔花柳與時新癸未元日門帖子提封廣袤一千里桑柘陰中十五城謹守郡符無異政靜同田里樂昇平歡聲去歳踰前歳常賦今年減去年此外不須生過望賣刀買犢㸔耕田新令儒醫皆立學躋民仁壽聖賢心漢唐良吏吾難及清儉公亷念念深四維際海好江山整頓經綸亦不難聞道調元換新手休談范富與歐韓蠶連氷浴寒無病桑長明條不附枝田婦田夫宜努力更誰二月賣新絲我雖不是壠頭兒慣讀􅃎風七月詩欲徃勸農還駐馬恐將長語奪民時里胥不聽夜催錢文吏何須抱案眠寄語逋逃早還業今年仁政勝前年白髪翛然六十翁眼將昏暗耳將聾編民案吏毋相紿卓茂年來道愈公陌上東風氣漸和墻陰殘雪已無多官倉糧足牛肥腯佇聽鳴鞭擊壤歌酒禁漸來無敗徳姦人戮盡少殘民更教吏政清如水從此昇平萬萬春題王晉卿畫猿鹿圖長林豐草水泠泠野獸無人各稱恉好去雲山更深處虞官網罟益縱横山猿跳躑誇輕黠野鹿閒馴意自如慧者何如癡者福朝三暮四弄羣狙玉堂偶成瓠籬蔬圃雨餘香林影蟬聲午夢凉一日閒情如兩日閲書終帙未殘陽引行藜杖伴閒書鶴骨亭亭影亦癯忽聽傳呼聲漸逺相君歸自沒階趨賜書草檄事全稀人靜庭深晝晷遲時有閒人持巻軸例從紙尾索題詩馬閒伏櫪卧空階僕枕槐根鼻殷雷我亦將心肖秋水翠涵天影淨無埃不談王道不談兵不著無能較有能更笑莊周誇解事强將籬鷃擬雲鵬題射猿圖竊民嘉菓踐民田姦黠輕跳不可憐機穽罝羅莫能制難逃裂石響驚弦應弦龍虎斃烏號可笑孫生欲遁逃百步懸針能破的泰山元不大秋毫題雪澗閒猿圖㶚橋驢背未回温剡水孤舟雪浪翻自古髙人例無定荒山清夜聽寒猿幽深惨淡戰祁寒萬籟無聲靜夜䦨赤日市㕓箏笛耳茫然過耳欲誰看俗務呶呶久倦聽夜深窮谷雪猿鳴罷吟倚杖三更後滿耳清哀無此聲倚笻靜聽見幽情隔磵風傳呌月聲明鏡不湏重洗耳野懐空濶六根清景隨題號一時新塵坌空慙巻裏人莫訝畫師無俗筆定應巣許是前身一從脚踏利名塲夢裏林泉去路長開巻題詩記前事西山留宿贊公房考槃詩思一何深鳥獸同羣豈夙心只恐野猿驚漫去夜寒清嘯伴孤吟題猿戱圖老猿作戯豈真誠一食驅牽百態生安得人心不寒餒自謀自鬻總無情駔儈倡優擁市􅆵一狙百戯鼓闐闐人生伎倆亦如此巧作姦回各自賢題遺山贈劉濟川詩巻濟川實齊王豫之孫也遺山詩筆已堪珍况復諄諄説慶門掩巻再思當自重㡬家世世是王孫成身固不由門望到㡳名家足潤身承藉慶源宜力學不應長作白衣人題梁氏無盡藏詩巻斗南之孫家藏衣冠人物蘭亭㑹樓觀溪山輞口莊忍向牛童問遺跡野泉分水下寒塘細閲梁侯自序辭故家簮紱見當時無情刼火猶忠厚留在金陵五詠詩抱持手澤索題詩愧乏佳言詠孝思烜赫家聲終有日刼灰焦火尚堪追興衰無刻不推遷消盡繁華到野田留在賢孫嗣前業入雲髙第㸔他年昇平富貴儘風流風滿珠簾月滿樓獨有文章更堪貴履聲無處不瀛洲荷舟絲竹復牲醪劉沈應徐雜謝曹惟有梁家無盡藏清風如水月輪髙日炙堂楣錦半嫣春雷羯鼔震華筵滿前珠翠留銀燭明月清風不直錢風流雅集冠當時一代名卿盡有詩多少金盤薦華屋浮雲流水竟誰知深陵髙谷不須傷留在佳篇名益彰一字新詩雙白璧錦囊瑶軸為深藏為學工夫恨不多斷編殘簡費研磨到頭於世俱無用法律詩書較㡬何題劉仲修悠然亭詩十首滹水西來始發源鳯山如畫倚秋寒門前萬里如林路㡬見行人得好官何事居家最稱心故園亭榭喜登臨十年夢想雲山供樽酒無人亦自斟慣擕上策上青雲不作趦趄傴僂人寄語山靈毋白眼倦㳺時戴華陽巾紫髯翛散拂秋風逺目悠悠數去鴻勘破一生能適意山林鍾鼎味初同太白淵明總一身休將出處較比隣宻雲未作西郊雨要與前賢繼絶塵右持雲液左霜螯坐覺元龍氣味豪醉卧黄茒簷下月枕元平與鳯山髙萬頃風煙指顧間夕陽西下水雲閒竹窗松徑無人到莫放庸兒見一斑殘陽淡淡鳥飛還亭上幽人未掩關勿為紛華嗟索寞㑹當拄笏㸔西山萬世都將靜裏㸔悠然獨酌一杯殘逺懐耿耿無人語新月林梢生暮寒亭為新詩已得名㡬時擕手上崢嶸一花一草堪題詠不惜揮毫賦晩晴題嚴東平忠止亭十一絶海岱雄藩五十城輿臺半作貴公卿西風吹去豪華夢留得丹心一寸明魯王忠節日爭光嗣世宜如汶泗長莫把閒庭作歸隠要同終始郭汾陽千里桑麻十萬兵列侯誰復與爭榮半途身退仍何憾傳到謙恭好弟兄忠心一片老彌堅不為身閒自棄捐聞道荆州新内附壯懐無夜不籌邉開國成家奕世侯天恩未許永歸休丹誠不逐繁華歇自有元龍百尺樓聖恩封拜不遺才幕府軍容次第開朝請十年今改過豈同寒士老蒿萊大臣報國無多巧進退升沉有一忠疑恠茅亭多種竹要㸔直節貫霜風角巾私第不忘君昨是今非徳日新萬事人間總如此豪華落盡見天真四筵朱履映華簮獻謟呈諛恐未深馬革裹尸男子事向來柔妬莫輕心賤士修身可動天貴臣悔過合安全一亭虚白藏忠儉松竹那能滯壯年作詩題榜匪要名心靜身閒意自誠只作故侯終老去也知原不累髙情題汴州二賢堂一代斯文百世師仙風道骨仰威儀同來同徃同祠宇千載如生滏水湄謫仙人對坐忘身誰與髙風觧寫真記得龍眠出塵手白蓮社裏見斯人淵明擕手陸道士再到人間又㡬時却恨吾身生太晩無縁聞道徃從之好賢奚止似緇衣詞翰珍藏夜夢思圖畫恐難傳逺久竹林松逕起新祠白頭自笑説文章丹竈慙無却老方早晩還鄕閒杖屨一爐香火二賢堂無題七十衰翁與世踈閒心永日共安舒却縁當路憐愚直時有人求介紹書昏衰敢不慎許可踈散竟能誰重輕周道從來直於矢並驅九軌儘寛平髙下洪纎無棄物兼收並蓄廟堂權固知滄海能容物昏耄胡為敢薦賢書判身言已失人况將末法委沙塵只憑胷次懸明鏡黒白妍媸總識真神游八表鳯麟姿造物無私却有私種秀千年猶旦暮何妨異代不同時按此下六首似題畫詩原本列入無題疑誤謹識扵此龍眠髙趣惜英材誰問先賢與後來霽月光風同一處寫留人世洗塵埃毎愛髙風蓮社圖當時果有此容無龍眠何處曽相遇夢破三生向日吾黄塵擾擾萬蚍蜉世事㡬何同一漚珍重畫圖聯杖屨免勞神夢覔從游雪壓茅廬風滿林野鵶寒鴈共昏陰畫師暗隠無窮意何處漁舟不可尋萬里清江一葉舟月華西去水東流傷心不見魯連子何物人間萬戸侯題趙禹卿匏𤓰齋田收白黍能供酒架滿黄雞可代蔬飲食簞瓢能醉飽也勝彈鋏嘆無魚有客敲門起自開敝裘羸馬滿風埃一瓢醇酒聊相問知自黄粱夢裏來人道陶潜得趣髙歸來已厭折腰勞何如不見官倉粟便醉秋風蟹兩螯人生眠食不虚言短鷃長鵬且莫論最喜心閒百無事呼兒日在掩柴門小亭飲罷上髙䑓花栁村墟照眼開為向溪頭漁子道直須風雨始歸來客荆南憶平陽廵按感懐去年七至走荒山按察平陽趙縣今歳荆南控百蠻南北東西成㡳事鬢毛又比向來斑又廵按即事口號罷農失業鎮隨衙調發行移亂似麻聽訟誰能使無訟聖師願學魯東家提刑職分刷稽違剖决如流尚恐遲五載十年出頭苦下民寃抑有誰知細民情偽豈難明黠吏般調起訟爭巻若牛腰不能决片言折獄反堪驚煩文虚檢姦頑吏錯判喬批糊突官宣化承流到如此翻言照刷不從寛昭明條畫謹欽依更向何人禀例為鈔法可憐虚十倍忍令姦滑恣貪欺觧庫妄増金銀價值收買金銀諸人交易文契不以鈔為則止寫諸物不書價直聖恩雨露恤逃民虐吏科攤見累身當匠當軍及當站代當重納寔艱辛年深歳久不通推貧富髙低㡬變移官吏坐觀恬不問妄増擅减在鄕司監臨主典共偷錢舉世無言問罪愆不劾不彈誰任責無人合在察司前題雪谷横披圖有序炎暑炎溽余方退食僦舍揮汗如雨友人趙祥卿擕雪谷横披來曰此賀真筆也地古天荒巖深木老雪迷谿谷行旅艱苦涸陰沍寒之氣凛凛逼人不覺煩汗之去體至於糊塗霮䨴如董元削古瘦硬如許道寧則非余所知也祥卿曰然請書以為䟦尾至元十年六月望武安胡祇遹觀焦墨髙攢鐡樹林雪巖氷谷冷雲深横塗竪抹無多力散作𤣥㝠萬里陰以畫名家數賀真雪山横幅意尤新題詩正倦三庚暑凛凛寒威來逼人陳元達鎻樹諌圖一寸山河百戰功龍疲虎困服羣雄不思祖考艱難業忍為滛荒一旦空憂國憂君不顧身甘心取死逆攖鱗一時患失逢迎子赧汗交流愧直臣姦邪百欲惑君心女色迷人禍更深敗徳損身無限事佞臣安忍助荒滛直言逆耳怒飛揚任顗含羞吐諫章不意賢妃能引過從容廻喜活忠良從人舍已古來難猛虎無情敢犯顔惟有至誠心一寸可通金石可移山智明見禍如救火好内忘身在眼前四后汚滛子遭弑覆宗絶祀欲誰憐四海元當奉一人力窮庶合恤疲民愛君誰似陳元逹甘為朝廷􅂸此身崇䑓别館又離宫財匱民殘孰與供不是諫臣求美譽阿房垂鑒有遺蹤敦朴為先宗廟福逢迎媚合豈忠臣身將鐡鎻纒宫樹死諌千年有㡬人侈心一啓勢難迴漢主雄威走電雷到㡳忠臣元有用天顔還為直言開䟦黄粱夢圖虞城裴主簿家藏畫手頗佳迷人厚利復髙名一夢終天喚不譍我亦邯鄲道中客醉魂雖醒尚懵騰秩崇禄厚㡬全身萬古黄粱夢裏人不向急流求勇退只言黄屋忌功臣百端幻化總非真珍重人間現在身蜂蟻市朝皆畫筆夢中説夢更癡人毎過邯鄲王化店崇崗西上吕公祠到今三十年來事迴首真成黍一炊避禍求安共此心累人身口古猶今寫真垂誡誰能辨郿塢藏金深復深大亨詩人佳畫加以詩僧貞菴來請題因漫興五絶萬古桃源小有天仙家雞犬白雲邉隔迷山海無尋處一幅傳真得鄭䖍風送飛花錦浪舟鱸魚新得酒新篘醒來似記漁樵説辛苦當年定逺侯誰挿青旂照碧流山家市井亦深幽但將魚酒相酬對此外人間萬事休鴨緑溪光青黛山溪山不放酒家閒泛流迴棹來時路家在雲煙縹緲間讀書胷次靜無塵萬樹雲山下筆新流水泛花船載酒三生曽是武陵人䟦大定奎畫詩巻六宫嚴肅聖恩融貴賤都無僭妬凶四海雍熙家道正麝煙餘澤藹芳穠經筵講散二南詩錦幕椒房薦壽巵一洗谷風淫薄惡六宫花草亦雍熙霓裳按舞太滛昏燈暗長門亦少恩一曲樂歌堪諷詠可能二主與同論題王晉卿駙馬畫著色王維妙入神後身細宻弄清新天台路返三生夢岸夾桃花錦浪春有感毎以至誠翻召怨欲為苟合耻廻心何時謝絶人間事茅屋雲山深復深題韓滉牧飲牛圖有序貞元二年關中倉廩竭禁軍或自脱巾呼於道曰拘吾於軍而不給糧吾罪人也上憂之甚㑹韓滉運米三萬斛至陜李泌即奏之上喜遽至東宫謂太子曰米巳至陜吾父子得生矣時禁中不釀命於坊市取酒為樂又遣中使諭神策六軍軍士皆呼萬歳漕運江淮㨗若神笑談繁劇擁朝紳誰知三昧陶鈞巧又在溪橋野水春撫摩兩浙不論兵畫裏農家樂太平般米入門三萬斛豈徒㳺戯悦閒情題花鳥圖金㽔風露青衣鳥花有幽香啄有聲祖考江山明似畫畧無一筆入經營風流文采欲人知花鳥工夫善出竒當日諫官無一語君王宜畫鳯來儀聖明動止總成文不用丹青妙入神解辦體元天地巧一花一草總生春五雲香裏熙春閣錦繡華夷不作圖白髪韓州雪如席悔將淫巧費工夫題宋髙宗題唐太宗墨迹天日之表龍鳯姿文綏武定見當時後王題䟦知瞻仰播越江淮兩鬢絲題米友仁墨迹出竒尚氣米襄陽怒虎飛龍不可當柔懦友仁來㸃化法衣傳到雪溪堂氣禀髙卑既不齊才能巧拙自雲泥屋中架屋何難悟愈費工夫勢愈低題王澹游墨跡雪溪巨浪湧山丘衣帶餘波及澹游千古髙情王子敬不從形似紹風流題雙杮堂題評佳什滿箱囊安用荒詩作後章詩尾欲求三百顆主人毋謝未經霜珍木名花品固多因人物重奈渠何到今五柳陶家宅髙節清名永不磨不將桃李占庭陰久澁方甘種柿林孝子順孫宜保䕶傳家要識汝翁心題郭先生閲庵聲利醉人濃似酒榮枯戯物沸於羮一軒不受黄塵汚誰似先生老眼明讀易琅琅了一編掩書袖手坐翛然瘂人食蜜無言説坎井寒蛙自一天外觀物理入無窮内照靈䑓萬慮空瞑目坐來無一事索詩徴畫太癡翁題江山小景圖有序佳畫小而大俗畫大而小世之横披巨幅長廊髙壁位置雖危濶而氣韻分裂卑淺不足以起人之觀覽晉卿作小景髙廣一便面而巖壑幽深浦溆平逺江樓聳峙漁舟晩集有千里無窮之勝槩盖規模王摩詰而温潤天成不及也想像王家寳繪堂古今神品入珍藏工將妙思傳新法更比前賢蔚有光細宻工夫氣象雄幽深平逺意無窮都將大地山河影移入團團璧月中玉軸牙籖足自娛興來㳺戯寫新圖不須畫史求名字一字誰言撼大蘓墻外名園樓外山館甥恩渥醉揮翰為言巻上題詩客休作酸寒畫子㸔前宋江山畫不成當時誰與子爭衡而今特與南冠㸔不見新亭淚已傾富貴迷人醉不醒風流一念了平生可憐黼黻皇猷筆只向丹青要得名攀龍附鳯蚤簮纓落筆閒情得趣深却笑范寛何鈍滯窮深涉險老山林題太白捫月圖謫仙還山今㡬春碧天秋月想丰神休從畫筆論工拙巻尾留詩亦可人人間萬事一秋毫醉墨淋漓宫錦袍自是黄塵留不住洞庭湖濶月輪髙抱持明月挾飛仙唾玉噴珠落九天何處蓬萊水清淺西風開徹萬青蓮長衫破㡌讀書生莫怨人㸔一芥輕夜靜長庚望丰采玉牀消得御盃盈史院冬日臨餘晉字讀唐詩未詠朱程義理辭惟有牙籖經濟策蠧魚塵冷罥蛛絲題四皓閒適圖挾書酷律未能除母氏強梁嗣子迂一飯紫芝歌一曲且將閒適養微軀澤民致主不逢辰肯著風波陷此身飯飽日長無俗客偷安輸與四閒人題舍館壁四皓圖百歳髙年四海名漢廷風起紫芝馨到今盛徳令人慕不動聲容帝業寧題四皓圖才聽羣雄洗暴秦溺冠又復得斯人前星幸有仁柔色難免長安陌上塵白髪蕭蕭脱亂亡更誰將夢到黄粱太平日月傷難遇本亦無心薄趙王垂垂鶴髪下安車漢業何煩口舌扶驚喜再三調䕶語髙皇元不罵真儒子房髙智陳平策不及君王廢嫡心足入漢庭儲嗣定始知名節服人深題顧亮山水圖焦墨糢糊信手成知君求意不求形猶勝俗軟臨摹手元氣淋漓墮杳冥題李次徴山水圖江生酷愛輞川圖夢寐雲山宅一區展巻未終還自笑黄塵辛苦白髭鬚䟦子期聽琴圖悦心初不願人知不意知音得子期無奈良朋先去世一臨絃索一吁嘻絶藝休嗟少識真人能有徳自多鄰一聲擊磬深沉意門外寧無荷蕢人聲隨念起指隨心諦聽沉潛得趣深俗畫那能知此意直須身世在登臨題仗節圖皇皇使節久彌堅一死㸔來不直錢辛苦郝經今徤否蠻煙瘴雨十三年朝為梁將暮唐臣富貴繁華得㡬春喚起馮瀛九原夢無窮慚愧鬼為隣嬴顛項蹶論功臣雍齒丁公果孰親賜死封侯翻乃爾到頭忠義不虧人跖犬猶能死吠堯人生安忍失持操到今凛凛忠貞節霜氣横空太華髙至元十五年九月二十三日賞翟侯虚錦亭芙蓉淡白輕紅宫様粧醉容醒態巧低昂天寒翠䄂嬌無頼珍重微雲䕶曉霜芙蓉臨水四圍栽正要佳賓數徃來不用石家金步障天教著色畫屏開露冷霜寒江樹空西風開到錦芙蓉渾如晉武平南後越女吳姬滿六宫荆土藩籬盡此花北人初見入驚誇貴無賤有真堪惜回首西風化彩霞弔宋海卯耆舊年來似曉星先生又復閟泉扄可堪執紼都門道老樹悲風不忍聽自從風樹鼓餘哀毎遇髙年去復廻一老憗遺天不許忍㸔旌旐向泉䑓士林相向惨無言挽斷靈車不返轅頼有五株丹桂樹慰人光彩照髙門逹人去住本來輕後學悲傷失老成麗澤瑩深九筵在衣冠餘澤儼如生少日才華逈出羣老來空學得天真臨行却恨無人問觀化於今第㡬廵丙吉問牛喘天時人事宻相符失序乖和理不誣闒冗下材那觧此㡬囬抵掌笑公迂下宜萬物上承天凛凛長憂覆餗愆肯作區區救時相米鹽細務過年年襟靈重厚智深逺漢業中興責莫逃豈為一牛勞致問鬬爭雜訟漫呼號雞晨犬戸各爭能百職那宜分重輕不是孝宣知此理賤人貴畜向誰明見㣲知著懼天災憂國真誠宰相材坐受乾封誑君語何人清夜望三台中秋有懐少時最喜逢佳節未到晨鐘已不眠何事如今成懶散只將羈思度年年寒食芳時靜掩門朱明佳節卧南薫慇懃細賞中秋月擁鼻清吟了夜分青天素月照佳時獨立空庭學詠詩千里遥憐小兒女團圞北望更相思息軒雪行二圖著書滿屋不醫貧妻怨兒悲愧此身倦僕羸驂山路惡歳寒風雪逺投人雪迷山徑轉荒村負約田家老瓦盆不是書生多强項猶勝炙手傍權門題雪谷曉行圖不憂烽火照函關不為蒼生計未安身口累人良可笑直須同犯五更寒毎愛藍關畫裏身萬山氷雪一孤臣題詩剩為姦諛故當日元和尚有人五月朔休暇午窗睡起離騷讀罷詠陶詩憂喜殊情孰我師留住汨羅江上月緩移花影上東籬天際歸舟圖彭蠡秋連萬里江夕陽天影入㣲茫子昂袖有如神筆移入鵝溪咫尺長武元直風雨迴舟圖萬里清江一葉舟漁家家住亂山頭百年不識紅塵夢風雨何妨釣碧流武公胷臆淨無塵喜見江湖懶散人醉墨淋漓風雨筆只應張翰是前身馬足車音耳倦聽桃源何處棹歌聲斜風細雨扁舟興不意丹青却畫成王侯所藏風雨迴舟圖水冷羣魚不上鈎直須風雨始廻舟世間名利真何物勇退無人向急流木石渾如許道寧郭熙平逺不多爭誰知宦逹功名興解寫江湖萬里情髙氣難將世利拘進為卿相退樵漁貫之想亦英豪士筆底風濤任巻舒讀書終身而不知道不識自巳面目故有此作聖人先得我心同萬語千言要汝通心上眼前長錯過却於紙上漫勞功秋江待渡圖天際歸帆萬里流夕陽人影立沙洲我生半世黄塵路羡殺煙波一釣舟題楓江晩渡圖秋入江楓萬葉紅季鷹歸興滿帆風人生適口鱸魚鱠勇退真成盖世雄讀范蘓二子傳范雎才入穰侯府蔡澤辭家已膏車得失明明相倚伏彈冠接踵竟何如敝貂歳月苦毿毿金印歸來日醉酣空使後人哀六國破家亡國買狂談題煙江歸棹圖萬里青江一葉舟那知塵世不王侯隔江喚是鴟夷子歸棹如飛不少㽞題張公佐江山歸棹圖遥岑寸碧有無中逺水長空一色同寫盡江湖蕭散意前身應是陸龜䝉疊嶂深巖得趣偏要從平逺弄風煙枯株拳石無多巧展盡清江萬里天形似非難意趣難休將細宻入驚㸔賞音却有張公佐唾墨秋風江水寒讀史有感君臣髙枕卧金城螗臂何人敢弄兵白面書生誇解事一篇險語淚縱横漢庭卿相自伊周年少新人枉任憂鵩鳥入門聲未絶可憐晁氏議安劉徙薪曲突豈無人爛額焦頭反上賓逺慮安能同近效只宜主父曵朱輪題趙按察四子名字巻軸許可毫釐不少容一言誰得左山公趙侯四嗣新名字坐㸔鵬摶萬里風教子提孩以義方靈椿齊吐四枝芳乃翁辛苦求名意要見雲梢萬尺長命名立字例誇矜責實誰人肯服膺銘耳銘心更銘骨我知四子不虚稱泯泯紛紛老此生誰能四海早知名題詩巻尾非譽佞洗耳雲霄聽一鳴清選髙張待孝良鴈行雲影㸔飛揚潞川剩有千尋木准備凌霄四桂堂多男已是人生福那更龍駒映鳯雛到底草間留不住早教從學近皇都南溟鵬鳥北溟鵾雲海三山入吐吞却笑吾兒豚犬耳身長癡騃懶譍門讀髙祖傳有感吕政餘㓙不可除天開赤帝定神區皇圖不有衣冠力如意紛爭起禄嬃讀大學中庸有感而作本是自家元有物聖人提過眼前來猶然疑訝非吾有珍重天工愧不才䟦宋人李昭珙勑牒韓富歐唐趙王諸公署紙尾三詠徂徠慶厯詩一時賢俊玉無疵魏公識量如天日不許先生絶妙辭邪正從來不兩全陽竒陰耦數先偏終於黨錮相攻擊無事昇平共㡬年古今銓調㡬紛更黜陟賢愚豈易平安得君心如止水濁涇清渭自分明休誇陶鑄得人才更把黄塵老眼開不為利囬能有㡬只知相與反相排䟦雪齋字軸長沙庭幕久無賓今日升堂始有人從此休誇七星帖千金一字合藏珍䟦唐段思審畫拓跋他悉羅等射羱羊圖畫尾題云景龍二年秋七月奉詔寫蕃人拓跋他悉羅等射羱羊圖朝散大夫行工部尚書兼楚州長史宫苑勾供奉叚思審寫百戰神功定八區太宗洪業付㣲軀羱羊一箭何多羡自有蕃王職貢圖肥城官吏擅科逃戸縣俸秋税有感而作二首人生莫作小民身千種飢寒萬苦辛逃屋銀糧幸蠲免不堪酷吏筆如神破屋逃亡人未還徴糧縣帖下柴關恩威究竟誰為主勸課農桑亦厚顔夜半酒醒客懐牢落久無聊痛飲狂歌殢酒瓢不料更深夢初醒一燈孤影更蕭條半牀行李半牀書一片閒心靜有餘四海澄清樂無事不須辛苦慕登車自感才觧讀書無眼力始能立事少心神追思少壯不努力老作尋常庸暗人題王琇睡猫圖二首爪利牙剛目有光威驅羣䑕逺奔藏買魚穿柳恩俱報睡足花陰春晝長軟金紅綬照銜蟬萱草叢前石竹邉喚殺玉人呼不省更教移入畫圖傳一作夢隨彩筆弄癡妍達磨隻履西歸圖傳舎投胎計巳非棄如敝屣復何疑只將隻履西歸去㡬是山僧擺落時東來未了復西飛明月寒枝定孰依就是化身千百億爭如動靜兩忘機題文㑹圖蟻羶蠅血厭朝昏揖讓誰人與共論驚見畫圖文㑹客閉門鄕飲樂春温頡利可汗圖可汗氊帳卓平沙寒入強弓力倍加坐聽唐家第三主口脂靣藥醉宫花張果老匣出白驢圖孰匪乘風御氣身何須妖術誑時人鼎湖就得騎龍去猶恐終為異物隣題一筆百物圖萬物生消一氣中春風無意費青紅畫師窺破天公巧不用間關細𤨏工牧牛圖太平萬象各成歡牧豎羣牛亦可觀雨後一鞭春事了緑楊煙草水雲寛秋山清曉圖一天清爽入秋山元氣淋漓墨未乾聲利醉人如午夢直須拄笏凭危欄息軒行客關山圖半生南北驛塵黄畫裏關山厭路長何日中原三萬里桑麻雞犬不離鄕﨑嶇山路不容車何處驅驢應逺輸漢卒開邉三十萬一升米價一升珠或行水際或林端巇嶮關山行路難好被畫中人却笑三千里外一資官望陟危關日未升下關投宿暝煙生都來尺楮無多地寫盡行人萬里情過統幕地髙五月似秋天便與東南㳺子偏漠漠山川日光薄始從土屋㸔炊煙華亭夜歸圖魚躍