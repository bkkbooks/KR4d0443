body:
  text: 紫山大全集巻十二元胡祇遹撰書上執政書竊嘗誦孟子之言曰晉楚之富不可及也彼以其富我以吾仁彼以其爵我以吾義吾何慊乎哉又曰萬鍾不辨禮義而受之萬鍾於我何加焉見以凛凛英氣殆似諸侯不得友而天子不得臣者也及觀三宿出晝對門人之辭曰吾豈若是小丈夫然哉諫於其君而不受則怒悻悻然見於其靣去則窮日之力而後宿哉然後見聖賢之心未嘗一日忘天下也未嘗妄自尊大而傲軒冕亦未嘗違道屑就枉尺直尋而改前之為也故孔子謂顔子曰用之則行舍之則藏唯我與爾有是夫又許令尹子文三仕無喜色三已無愠色聖人之心以謂用舎在君行藏在我何喜愠之有一有喜愠加於其間是以貴賤貧富得失為懷而不以道自任也不然則是恃才挾德喜其知已而愠其見棄也二者有一焉皆不合於聖人者也且喜愠交攻未有不變其所守者也閣下居台鼎六年於兹近以謗議而在旅進旅退之間不能不罷罷未踰月㧞萃而復用閣下處用舍之間夷然㤗然而毫忽喜怒不形於容色既用而忠貞之氣愈倍於向來可謂得聖人之道知為臣之分矣竊惟大臣之道有六曰氣曰量曰識曰才曰節曰學剛大以直充塞乎天地洞貫乎金石勢不可沮威不可挫夷險一致視死如生者氣也見善不喜見惡不怒不萬全不動不中的不發汪洋萬頃澄不能清而撓不能濁者量也萬事之來見微而知著察其幾而銷患於未萌者識也百冗紛至萬鈞壓手雍雍容容不動聲氣泛應曲當者才也淡然無欲儼然不動致身守道死而無二者節也天資雖美不自滿假飫以古今臨大事决大疑衆議紛紜而莫知所為我乃援引經史發舉凡例以折姦䛕以定浮議者學也叔世大臣於是六者或得其一二或得其三四知能及之而仁之不能守者十常八九朝廷清明聖顔悦豫一都一俞進退可觀一旦小變卒起天威稍嚴論難之間一有沮挫則神色䘮失手板倒持魂魄動蕩而便溺俱下是謂之有氣乎知有已而不知有人毫髪有過切齒以疾之纎芥之美極口以稱之責人惟恐不切出言惟恐不先毛舉細事否則偷生苟安以黙黙為寛狷狷小明是足謂之量乎昧於逺大而察於近細興小利而不圖大患高自標置拒絶䝉蔽間間沾沾小智自私是足謂之識乎搜胥吏簿書之過務米鹽細務之勤王體失而不知謀國論差而弗知斷處常而好生事遇變而莫知所裁是足謂之才乎靡靡焉多欲容容焉自汚煦煦焉取下於人以為和斵方就圓不立崖岸以為無過惟利是趨淟然亡恥是足謂之節乎詠綺麗之詩誦浮靡之文務口談而驚四筵揮手筆以駭流俗以經濟王道為迂闊以聖經心學為朴魯臨事决疑俛首而問胥吏是足謂之學乎閣下則異於是不茹柔不吐剛篤於自信威不能屈恥於無斷勇於有為閣下之氣也尊賢容衆不責備於一人不録人之過而録人之功不見人之短而見人之長分謗斂過推功讓能閣下之量也事務當前是非成敗若辨黒白君子小人之情偽似是而非之欺蔽舉莫能逃閣下之識也拙於小工於大事有疑難衆莫敢負委曲周至剖决如流閣下之才也不營田宅不問有無視貨財如糞壤處富貴如儻來門無私謁凛然有守閣下之節也沉浸乎六經優柔乎語孟不讀非聖書不作無用語期吾君於堯舜禹湯文武成康之為君慕臯䕫稷契伊尹傅說周召之為臣閣下之學也大臣之六事賢者得其二三閣下獨擅而兼全之是亦無瑕之可指無謀之可進尚何言哉書曰靡不有初鮮克有終此人之常情施之於平夷坦途無少沮礙始勤終怠尚且若是竊見今之大臣如閣下之氣量才識者間亦有之自再起再廢以來畏懦痿懾呐呐然言不能出諸口惴惴焉跼天踳地不自容身富貴一念實未忘情而向之沉雄英偉以經濟自負之氣已沮䘮而無餘矣是盖見之不明養之不厚執之不𢎞信之不篤守之不固行之不熟向之依據憑藉潤身修徳成已以成物者一旦因事少梗如棄外物盡非我有良可惜哉噫求治之君不世出如聖天子可謂求治之君矣柱石之臣不易得如閣下之才之美可謂柱石之臣矣姦邪憸利小人何世無之如驩兜共工之徒在唐虞之廷不能無有然而未聞臯䕫禹稷以小人間厠而改前之為也願閣下以禹稷臯䕫自處挺然不移其操日月有明霾曀惡可蔽閣下今日之起天鑒昭然邪正之辨不言而喻前日功業燦然具在後圖綿綿福不可量誠能不為風俗所變而恥效全身逺害廢退怯懦者之所為期吾君於唐虞而以道自任則天下幸甚上張左丞書某頓首再拜致書於左丞相公閤下某學陋材凡誤䝉收置門下毎退食竊自惟慮一介寒士見知於大臣又且不以茸闒散閒見授而使從陪時彦參與幕議愛之不為不厚責之不為不專而欲旅進旅退黙黙循循保禄尸位不務報効能無自愧於心乎雖然在閤下之含𢎞光大觸物知來而又輔以經事之老成識時務之俊傑處决謀謨廢者舉敝者補害者削利者行官無廢職政無廢事議無遺慮在不肖者又何言焉然食芹炙背之愚誠終不能以自止適遇閤下賀平西而覲天光凡郡縣細務畧而不論謹舉其二三有係於國家之大政者唐突高明封建之制出於勢之不能已前賢論之備矣以今觀之其勢盖有似非而實同者明天子光嗣先業固出於承太祖之嫡傳聖德神功天眷人歸然而扶持賛襄謀謨定册諸王之力不為少矣踐阼未幾而䦧墻之釁生上頼太祖廟祏之靈行不義者當斃固不足以為社稷之憂而皇輿親兵西邉被擾亦可謂干正氣而傷至和矣曽未數月執俘獻馘投甲拜叩朝廷無西顧之憂四海愜至寜之望大駕東還坐享宴安者是亦諸王股肱之所助也聖上天資友愛又况竭忠效順建功立事如是之大豈無欲貴欲富之心哉是必有以處之也使聖上居親親報功之恩臣下佩感仁戴德之慶懷德惟寜宗子惟城此實社稷宗廟之福也閤下當建白之太子者天下之本也社稷安危之所係四海向背之屬望立之不可不早教之不可不慎太祖以神武定天下草創之際而典制未立是以因循不暇及太宗而下率皆出於宗室之推戴强近貴戚之公議與奪廢興了無顧命之一辭不惟有愧於古其於宗祏之所負托聖子神孫之所依歸天下億兆之所披庇實亦未盡乎善者也推讓之美聖人豈不欲哉惟懼其與奪之不能盡公行之不能永久其弊也必至於忿争而力助是故以嫡不以庶以長不以有功定大本而塞亂源也當准先哲之遺則酌祖宗之謀訓立以嫡長教之以義方立賢師傅以格其非心廣擇郡國諸侯之賢子弟而與之游使庶務洞究聲譽日隆神器有托而杜絶覬覦為大臣舍此而不言孰有大於此者閤下亮之兵者㓙器也聖人以之平暴亂削强梗不獲已而後用也國朝開創數十年於兹矣中夏既定而土宇日廣遐方異域罔有不庭獨東南海隅擒縱在我然而寢兵之議愈不見涯涘天子仁聖内難已平信使如宋者行當北還宋既平則江淮之間可擇良將如羊叔子者分兵以戍之京畿之内森立諸衞實以北軍居重以馭輕中原郡縣散設諸府布以漢兵三時務農一時講武發號使令一如唐制單符呼召如手足之捍頭目莫不畢至如是則無尾大之憂享金城之固國家殷富而兵甲日强則三代漢唐之盛可比隆矣惟閤下建白之君之養兵如人之養身身久勞則欲佚久勞而不得佚則倦且墮困且疲矣惟民亦然是故古之英君哲王開國承家暴亂既平首下明詔必以偃兵息民為先務是以民樂其生既庶而富皥皥熙熙而無憔悴愁嘆之音國用饒足而基祚永固盖知所以飬之也國朝撫定諸夏歴數十年而户口不加多田野不加闢稅賦不加廣倉庫不加殷阜者何也其於養民之政盖闕如也誠哉孟子之言曰苟得其養無物不長苟失其養無物不消此之謂也聖上昔居青邸養民之心見諸行事即阼之日首布恩詔四海傾聴賀太平擊壤謳歌思有恒産方今内釁既平在耳之言可舉而行使久勞之民少獲蘓息凡包銀繭絲稅粟𣙜課減而從輕奔竄流亡能自復業者悉蠲賦役如饑者易食渴者易飲徳之流行速於置郵而傳命成康之治可立而待也惟閤下輔導之竊惟網在綱則不紊輻輳於轂則行逺而負重人君者天下之綱轂也土地人民雖當與宗室元勲共之而發號施令不可使之紊亂而分裂也唐韓愈有言曰古之為民者四今之為民者六佛老雜之也以今觀之又豈止於六而已惟親王貴戚崇勲大宰所有之民奉承祖宗之成法與而勿奪外凡佛老醫儒鷹房打捕百工技藝繁名雜目皆可散入民編各歸於守土之有司一而不雜静而不擾權利歸於上而無科徴横斂擅賞濫罰之禍天下幸甚惟閤下當舉之人君之用人如梓人之用木焉視其巨細高下而位置之當大而小當髙而下不惟不勝其任而上棟下宇之工若之何而成耶人受於天賢不肖之不齊百官庶政責成之各殊可不精選而審處之乎知人則哲堯舜以為難至於命九官處十二牧辨邪量能詳悉明審故古今稱至治用人之效者惟唐虞為盛漢之宣帝亦曰與我共治者其惟良二千石乎是亦知用人之不可易人才之不易得也國朝取人之制勲舊之外莫之能進授事責效倒置逆施大政大法廢而不舉所急者右武豐財而已耳聖上知此之弊徴賢選能恩禮偕至知者竭其謀勇者効其力隠者進屈者伸賢者在位能者在職廟堂之上老師宿儒談經論道臺省之内賢相碩臣調爕匡輔得賢之美可謂盛矣然而養賢之方選舉之法尚未備舉是猶清其流而不濬其源飬其末而不植其本得其一而遺其二也閤下當言之自古革天受命甫定暴亂必首定官制官制定則百務具舉若夫増損繁簡雖有不同未有不相因革而甚相逺者大抵建官設職隨時措之冝古人事簡故官亦簡後人事煩故官亦煩官得其制職獲其人則事舉而治官失其制職非其人則事廢而亂不易之理也國朝奄奠四海武功神畧跨視千古疆理土宇窮極四表然而有民人而不知所以教養之有土田而不知所以耕樹之有貨財而不知所以豐殖之綱紀制度萬不一舉禮樂刑政一無定制上無道揆而下無法守者官制未定故也方今庶官之先者當内立省部以總其樞機外立司農司以厚其食貨次立轉都運輸粟帛於京師以强其根本至於百司庶府郡縣守令一選舉之法立而後定百官以治萬幾具舉責成刻效各有所司君逸於上而臣勞於下小大職司咸得其人而天下不治者未之有也閤下其裁之上李尚書書竊惟為政之要莫先乎得人一縣得人則一縣治一郡得人則一郡安廟堂得人則萬方無虞宸扆穆治故曰得賢則為邦家立太平之基又曰不信仁賢則國空虛又曰不用賢則亡漢宣帝亦曰與我共治者其為良二千石乎是以古者有教養之方有儲蓄之地有舉選升陟之漸有歴試考校之制有廢黜降罰之責其用人也徳為上録徳定位賢者在位才次之量能授官能者在職言為下不以言舉人自飾偽要爵之風成而上不信下鄉論之法廢鄉論之法既廢則升于司徒升于學升諸司馬告于上論定而官任官而爵位定而禄之法又從而併廢取賢之道漸不復古致治之效亦莫如古為士者不修實徳舎已從時希世取寵秦尚功利兼併而商鞅李斯之徒出戰國尚富强侵奪而蘇張之輩興兩漢雖舉孝亷特示虛條而授官得職者實出于科舉由漢而下至於今一律也我朝開創固出祖考之神威武略名王臣族之夾輔匡毗亦謂一郡一路之施有不能不自於士人之雄猛桀黠者故受封襲爵一方之政治悉以委焉傳至子孫鮮克由禮以自取敗是以轉選之論興取人之議舉以今日論之三代之法必不可復至於漢唐以降取人之法如文選如武選如任子如府史雜流亦十未一舉世官既不可行取人之法未立是以有素無行檢恃利口而得官者素無才望納賄行賂而得官者不經歴試以虛聲浮舉而得官者似有實無耄不知恥厚貎深情而得官者致使緘黙謹約者為無能貧窶寡交者為退縮無用逃名務實者為無聞壯年豪邁思深慮逺直言讜論切中時病者為狂妄誹謗當此之際而處選舉銓衡之任不亦艱哉雖然聖上求治之心切得人之念深否泰循環無徃不復執事以邸府勲舊榮冠六卿羣才百職賢陟汚黜皆主於吏部立法於久廢復興之效朝廷之得賢仰成於執事懷一藝霑一命者望望於執事執事得不為之盡心乎選法之當行而宜陳於上者當酌時措之宜與衆論辨而力言之於上人材之優劣平心閲實無妄舉無濫黜使四海服其心質之於廟堂而不愧辨之於上前而不懼無已出之恩無私謗之怨百寮之望於執事者如此立法之繁簡非下走之當言至於時政之弊者敢妄論其一二竊謂取人務太廣而用人務太精取之廣則國無乏才用之精則職無廢事前代取人文選一也而有數路武選一也而有數路任不一也而入仕之路亦各不同下至於府史雜流又不可以枚數而今皆無之奚啻不廣而已前代銓調雖循資歴級不相逾越至於注授之際則察其所長而調其幹局廉能者使理財榖理户口鑒裁清明無私阿無忌刻者理吏選詳審忠恕者司刑籌䇿宏逺者主兵優於文詞短於應變者處翰林司馬文學禮官博士之任剖决如流事無壅滯者處繁劇剛正疾惡見利不趨見禍不畏知無不言者處臺諌徳有餘而才不足可以厚薄俗敦風化者處師表之任博古今美丰儀應對進退動必中節者使乎遐方異域選百司庶府俊乂在官名入吏籍功過不相掩掌者如持鑑照如握權衡妍醜重輕毫髪不少貸故得美官者不以為恩左遷遐陋者不以為怨今則不然投方枘於圎鑿以侏儒為梁棟逆施倒置奚啻於不精而已廢事敗職略不見罰不惟二者與古相反借使官刑從寛舉無廢黜三歳之間壯者老老者病病者死卒然虛一職闕一人求稱其任者無之用非其人則曠官然則古人儲材之意亦非迂闊過慮無為而為之今夫一士大夫之家命一僮今一僕付一事尚度其才而使授天官者當如何哉惟執事亮之某頓首再拜尚書執事又上宰相書士之不幸生於天造草昧蛇龍溷淆㓙亂不可以不除神器不可以不定苦身體勞智慮犯矢石冒鋒刀脱萬死而一生兹可謂不幸矣然而才有所為智有所用道有所行上結君心下慰民望事定功成創制立法措大亂於大寜高封厚禄子子孫孫與國同福享世世無窮之安樂然則非不幸也士之甚不幸生於綱淪法斁文敝武弱社稷將危四荒多壘然而吐辭發論攄略興謀回狂瀾矻砥柱振起板蕩而𢎞濟於艱難為人主者不能不我聽為士卒者不能不我投使宗廟再安播遷復還中興之功並天地之高厚争日月之光容國家崇徳報功名藏太室貎儼圖畫配享廟廷慶流後裔然則又非不幸也士之至幸生於太平守成之世法度既備禮樂既張四方無虞萬務具舉無可指之瑕無可議之闕天子穆穆深居九重大臣皇皇垂紳正笏都俞於廟堂之上委委蛇蛇安車駟馬退食於家萬民含哺皷腹無犬吠之驚於斯時也雖有䕫臯禹稷之才太公孫吳之智亦無所施矣雖有深識逺慮見將來之弊察未然之禍如賈誼論七國之亂於文帝治安之初將見言才出口舉朝見疾不謂之愚必謂之狂擠排擯斥憂憤而死矣不然則安時處順循資歴級累以歳月老於州郡無可高之功無可書之事高於此者千載一合見知於君亦不過得太平宰相而已何則時使然也然則大幸中復有不幸者存焉我國家受命奠位已六十年聖明相繼襲方五葉於今歳書有年民無災殄不兵而叛者格不怒而逺人來士兵精强府庫盈溢亦可謂極治太平千載盛時矣然而聖天子穆然深思兢兢業業不自滿假不有其治虞四聰之不達四目之不明廣諌諍開言路不以人廢言不以寵納侮勵精為政劘礪羣下大禹朽索之戒易經苞桑之論未嘗一日去懷也士生於此時無躬擐甲冑之勞無憂虞顛覆左支右撑之苦坐蒙太平安堵之福而得馳驥足於萬里無窮之坦途一語中理一事合道即獲覲天光而霑雨露可謂至幸而又不甚幸者也兹而不言有負於天德矣閣下以耆德高年全材宿望一舉而冠六卿再舉而超台鼎禮絶臣鄰聖恩之眷注不為不厚閣下之大拜不為不宜然而一人之側席百僚之刮目萬方之傾耳亦不為不深矣閣下生平之志不在温飽立功立業了自妙齡今年登上夀奮然一起雖馬走牛童亦知閣下之心不寵名位不厚利禄不為妻妾子孫閭里親故而起也凡所以致君澤民興滯補敝之術伏計閣下思之審念之深慮之熟矣但俟時發爾凡欲區區進言閣下者不愚則惑矣雖然智者千慮必有一失愚者千慮必有一得幸閣下不以智自處不以愚拒人取諸人以為善則一二管見輙肆干冐聖人嗣位六年於兹向之圖任舊人一日皆罷去朝廷之上如沸羮如棼絲君子小人莫之能辨原其大臣見逐之罪若無大過大惡究其所以致群小之攻擊主上之見疑者是亦必有罪焉古之大臣難進而易退度其人君用已之心不若魚之得水諌必聴計必從道必行位不屑就不屑就者非恃才挾徳索價沽名以傲軒冕孰知道之不行尸位苟禄誅貶斥遂之禍必不能免取誚當時貽譏後代其意盖如此也今之大臣炫鬻誇誕逢迎苟合以取位得之不以其道處已又失其冝不以亷節自處増禄自厚不能犯顔切諌嘿嘿自保不能秉心公清專用私門不能容姦邪不能遏姦邪退一而用十不能振立紀綱畏首畏尾引養小人以啓覬覦告訐之風不審大利害切切細務則有是數惡孰甚焉天威震怒如斥犬豕非不幸也其失之又大者不能為國朝立一代經制遵祖宗之訓酌往古之政増損因革定自聖裁以成一書大綱細紀罔不畢備而後請名於上題曰某年律義某年律令㑹同諸王貴族議可通行内藏之於金匱外授之於羣有司百執事仍戒之諭之曰自兹以降順是令者有賜有賞廢是令者有罰有誅自我一人亦務必行如是則上以光榮祖宗成守文之業下以垂訓子孫為一定之規中以致吾君垂拱無為享太平萬歳之福不務出此而區區簿書期㑹米䀋細務半歳一變法旬月一改令徒善不能行徒法不能立號令四出反汗食言使君不能以道揆天下使羣有司百執事無法以可守紛紜臨事漫呼法官曰視泰和律豈不謬哉亡金之制果可以服諸王貴族乎果可以服臺省貴官乎果可以依恃此例斷大疑决大政乎一人之治天下既任法而又任人今日之弊既不任人而又不立法是以一路人言是朝舉而行之一路人言非暮止而罷之唐突九重如入縣廨易置宰相輕於反掌雖臯䕫伊周難乎為臣矣前車覆後車戒伏計閣下必蹈覆轍者也閣下年彌高德彌邵志彌堅一旦誠能救其弊反其道則天下幸甚寄子方郎中書某頓首再拜子方郎中執事不肖以衰老不才荆南得代還家杜門括嚢四年於兹矣不意誤䝉録用居官守職牧養小民之外非所當言然以責成實效多歸於府州縣司有不得不言者敢妄言一二塵浼清聴竊惟木有本末政事亦有本末欲本亂而末治者未之有也木之枝葉花實茂盛繁碩則必培植灌溉其根本不養其本雖廕䕶撫育至智愈巧而術愈䟽木益悴矣今日之政已救其末未究其本事事皆然法益嚴令益宻而弊日益甚且如削去主案貼書固為善政然而究不能去者何也勢使然也一日百刻短長有定數一胥吏筆刀遲速有定能就能一目十行十幅筆一息萬字之外則日亦暮矣力亦疲矣而况若此之人百無一二以今觀之内省部臺院外則府州司縣所用掾吏辦給明敏者幾何人哉今使魯鈍不才之人而當明敏不能辦之勞則其廢事也必矣果欲减吏當先削冗文何謂冗文叢脞僣越瑣細繁叠紛亂推迎不當申而申不當下而下不當受而受不當問而問不當䟽駁而䟽駁不當勘當而勘當已有定例不當體度而體度上下不相信徃復調虛文凡係錢榖雖一二貫文例須申部五申十餘申一二歳未獲明降一二百文之爭差往復問答費紙數千張而終年不絶軍民爭差例當雙行宻院從則户部不從户部從則宻院不從宻院欲以民為軍户部欲以軍為民文字逗遛連年不决事頭起於某部餘事闗於他部六部不相闗付府州屢申展轉推迎不得杜絶其餘部分類多如是省臺部院令吏轉案頻速府州所申不知前行不見元巻反下府州抄録至於再三數四下路尚且如此申上者宜其失路所以累申屢申不䝉答降繁文若此每房増添吏員尚且不能辦又欲减削其可得乎不削冗文吏不能减論於此以類而推責吏以亷者末也養亷温足者本也諄諄切切勸民務農者末也不奪民時愛養民力者本也法令嚴宻防姦禁非者末也選賢擇能激勸教養者本也三年轉官二年轉吏者末也舉直錯枉進賢退不肖者本也使任事之官吏舉皆公勤亷幹雖歳久不轉終可也故古人官者長子孫以官為姓氏使任事官吏汙濫貪殘在鄉邑則害鄉邑在異邦則害異邦雖一日九徙移所至之處病民敗事終無益於治耳譬猶以虎狼守羊禁勿吞噬則不能也大抵責實塞源救其未然不强人以必不能者本也好名務華飾外通流者末也近日頒降條畫職事官錢榖官犯贓者或杖死誠為善政然以月俸計之府吏月俸六貫年來米麥價直每石不下一十貫日得二百文可糴二升僅充匹夫一日之食衣服鞍馬奴僕之費必不可闕者何從而出父母妻子何以仰事俯畜就有田宅物力為軍為民為匠為站各供本户之賦役尚不滿足苟無田宅無力者何以為生至於私家親戚故舊吉凶慶弔之費復何可得况兼錢榖官無升斗之禄無進身之階凡有失䧟虧欠則勒令合償職事官則六品而下不過二十貫一身之費亦不瞻給儻過官府勾喚送徃迎來盃酒飲飯必不能免者又何從而出饑寒切於身勤勞苦其心父母妻子凍餓於其前公私費用逼迫於其後身既從事不敢朝夕去職别營生業今䝉禁止曰勿取於民勿枉法勿妄求勿盗竊官錢雖飯蔬飲水清苦亷介之士亦不能堪豈非强人以必不能者歟近日羣邪誅戮斥逐姦黨選擇胥吏亦為美政然所選舉果皆行止清白才能精幹之人歟行不清白不足以服衆心才不精幹不足以辦事取論議識見則瑣瑣庸庸責才幹則駑鈍不前是又難人以所不能者也國家一日萬幾必不可闕者人材胥吏雖小職亦當預先教養作成書筭刑名試以程式才足以辦事行已有恥一旦委之以事則㳺刃餘地運斤成風勞於教飬而逸於任使是又務本之端也選官亦然諺曰揚湯止沸莫若竈下撤薪故區區淺見不能黙黙伏願先本後末則力半功倍令行禁止則下負犯令違命之罪誅之則不可勝誅則救末忘本是自以善政為虛文使人莫之畏以信也發號施令使人不畏信何為政側聞朝廷更張以來雖芻蕘之言亦不見棄故敢冐僣言之罪而不辭也幸賜詳度寄張平章書方今襄樊南省未見改革諸軍調度如昔未見如何區處愚料吕生既䝉綸恩許以不死此人為宋將守坡圍五年人心無動揺鎮静如一日外援不至倉庫將空又聞與賈似道有隙不敢棄城内歸故束手出降五年之間以襄樊二城我國所費無筭吕生之來聖情必且怒且喜相公樞府大臣而受特㫖命與吕生偕來廷見禮畢必以處置吕生改革置廢南省守把襄樊區處諸軍籌筭南伐等事謀及閣下素有成筭輙不自揆一二贅辭塵凂清聴我軍圍襄樊六年於兹戈甲器刃所費若干糧斛俸禄所費若干士卒淪亡若干行賫居送人牛車具飛挽損折若干以國家每歳經費計之襄樊殆居其半彼如穽虎困餓瀕於死掉尾求憐我以得失較之甚不相償然圖大功者不惜小費竊慮狃於得而忘其失又遵前轍府庫民力恐不得任兵以氣為主再鼔則衰三鼓則竭以人心為本久勞不息則憊兵貴必勝不貴妄動上䇿改名襄樊為折衝來威大都督府以朝廷貴臣知兵者為長吕生為次分北軍一二萬為城守所得南軍散列屯田北軍之什伍南省不宜遽罷以鎮撫之减削冗員及諸軍之俸餘軍止於襄樊屯田積糧休息一歳或二歳三時務農一時講武俟兵力少蘓倉廪豐積不勞逺輸而能供給則議大舉渡江舉則如迅雷飄風數道並進使彼不及預備不及救援以宋人邉兵觀之坐視襄樊之困而不能救其怯懦可知矣而况江南三百餘年不識兵革朝廷邉陲不聞名相名將止一賈似道而已郛郭闗市四境相接村落香火相望鷄犬相聞人民滿野懦弱恐怯不足以為我敵藉兵於冦因糧于敵聲東擊西捨堅攻瑕直𢷬杭州分猛將辯士招懷未下諸城戒士卒毋擄掠宋之君臣緩則挐舟竄海急則肉袒牽羊虜在吾目中矣中策諸軍半屯田半出征每歳或春或秋除鎮守襄樊可留兵力外達漢諸軍輕騎分道抄掠漢上諸城使不得耕耨俘擄大獲而還下策前軍既還後軍復入如是一二歳漢上諸城雖不攻圍坐致困敝宋失淮漢長江半為我有駐兵於江不困於䟦渉乘釁而動則江南日可圖矣一遵前轍調度飛挽東取漢上諸城五年得一城守一城三數歳得一邑守一邑磨以歳月用力多而收功寡比至漢上諸城皆下則我已困矣孫子曰上兵伐謀攻城為下用兵之勢既不能乗上策而求中策猶庶幾焉吕生世握兵柄兄弟子姪布滿臺閣宋君臣之孰賢孰愚宋河山城郭之何瑕何堅宋兵民之多寡虛實宋兵刑政之得失巧拙不為不知不以降夷相待細為之一問不唯有以得取宋之方見此人之淺深以備主上之顧問惟閣下亮之議選舉法上執政書即今選舉未能遽立每遇闕人臨時求材搜索論議如覔亡羊如求去物掌陶鈞者議公則吹毛求疵洗垢求㾗無一或可志私則隠惡諱疾各舉私黨以至廟堂之上曰此出於汝之門下彼又出於汝之私心互相謗訐良可羞已夫賤工之居肆尚先利其器儲其材以待叩門不時之須故能應用而不匱以四海之廣萬幾之繁而臨事無可用之人反似賤工之不若亦難矣哉選舉急切未立莫若取先帝朝廷舊人聖上潜邸至龍飛以來凡沾一命之人暨諸經省部宣撫宣慰司委任之人随路州府曽歴任司縣無大過之人暨亡金曽入仕及到殿舉人下至鄉里公論推稱徳行才能兼備之人立式行下随路取各人姓名郷貫出身歴事行止備細脚色仍勒随路官吏不得妄保濫舉妄濫則舉主坐之文籍到部相其年甲之髙下歴仕之久近出仕之精粗甲乙門類而次第之緩急用人如探囊取物此亦儲材之一端也難者或曰若是則私濫不可勝數聽其言而信其人遽委以事可乎當應之曰是大不然人誰無過在上之磨厲勸懲之何如耳堯舜之民比屋可封桀紂之民比屋可誅此非訓導之所致爾我朝未立俸養亷以來使為官為吏者不貪不汙則亦難矣用人而求全責備則舉世無可用之人矣其九徳咸事與其進也瑾瑜匿瑕舍短取長之論也至於科舉之取人千載一轍豈非聴其言而信其人乎今既坐舉官之罪是不擇而自精矣難者若又曰若坐舉官之罪名曰取人而實止人也若曰寛其律而必責其當舉人數則兩得矣某一二妄論率易冒黷萬一可行則願加採擇如與時背馳必不可行則希過目笑擲不以僣越罪幸甚寄王彦才總管書某頓首再拜復劉伯常來辱書問備審文履安佳感慰先相公神道碑再對行狀以補完伯叔考之事業欲附見於碑者孰與王文論議恐無此例莫若另作王氏世系圖一通刻之碑隂如是則一一具見雖多亦無碍也謹作數語同碑文墓誌行狀併付伯常如更有去取俟不肖到家再當細議未晚也不宜匆遽一上石則難為㸃竄其間轉官及行事年月退食之暇更冝子細照料數過不肖行藏已定臘月半恐得還家不肖與吾友定交將二十年君之父母即不肖之父母也父母善行為子孫者論撰而銘之於石禮也疊疊來謝何不相愛之深不相知之甚也荒蕪鄙俚之辭不中理者便請入筆増削幸勿以俗儒諱疾忌醫者相期也寄康國才御史書某頓首再拜御史國才世契尊兄久不接髙論傾企何極溽暑伏惟文侯起居多福第三豚犬親事始終極荷成就今先遣陳甥東還令家人輩謹遵媒妁拜講薄禮更乞吾兄於子彛處商議行嫁月在今冬十一月為吉月過此則又在來歳女笄男冠已踰時矣幸望委曲相從感佩感佩若以日月促事未備為辭恐非吾二家世契親愛之所宜言也懇禱懇禱餘意陳甥備能言之不敢稠疊塵凂未申希為逺大自重不具慰問張左丞亡親書某頓首再拜上奉慰左丞相公閣下僕自今歳五月巡按近復還司恭審聞太夫人奄棄榮養下情不勝哀痛恨以責任所拘弗克執紼助葬走奠几筵負罪伏惟孝心摧割何以堪處大孝終身慕父母愛日之誠曷有窮盡雖然太夫人年登九秩不為不夀為宰相母三十年不為不榮閣下以徳為棟梁以功為柱石大臣顯親養親不為不至天下為人子者不為不少如閣下者能幾人哉六十不毁乃聖人之中制伏兾順變節哀為國為斯民為逺大器業自重不具某頓首上左丞相公閣下大孝答王季明求戒辭書上以禮義榮貴御下則下以節行忠義事上反是則兩失其道民天下之本郡縣良吏者又生民之本民可近不可下民之師帥寜可使人得欺凌而賤辱乎寜可貧乏而不足於口體乎雖然子不可待父慈而孝臣不可待君義而忠然而不為風俗所移者千百不一二貧乏則必妄取賤辱則不知節行滔滔者天下皆是也西溪通議王公之子季明承過庭之訓亦自不凢釋褐磁州判將之任懇懇求戒辭以世契之情不可不告以臣子之義是言也王謝子弟生長見聞不幾于塵垢疣贅乎書曰知之非艱行之惟艱季明生遇明時䝉禮義崇貴秩受福澤尤不可不自重宜力行之寄諸子書愚魯朴喭之人性反近乎道故曰剛毅木訥近仁宋儒亦曰少年才俊一不幸邵康節亦曰一喜有精神精神多不純有精神而純為第一等人大抵多為聰明才俊馳騁愚㺯溢濫流蕩張皇鼓舞反入於惡賢智固不易得語中庸則必至於大過不若愚不肖之不及也禮與其奢也寜儉䘮與其易也寜戚才其可以勝德乎才勝則必為小人况無徳乎吉凶悔吝生乎動者也吉一而已凶三焉人無才則不能動静則凶悔吝無自而得恃才而動豈能皆吉不若無才而不能動之為愈也殺身敗家者皆恃才妄動之小人田野朴魯無知之愚人何禍之有以此推之人憂子弟之聰明才俊一務於口舌詞章恱人華世盗竊榮寵鮮不及禍禍不必誅夷至於驕奢淫泆以蕩徳减夀殞身傳習子孫皆禍也為人父母為區區之名置子弟於凶禍危險之地何不思之甚也愛子弟之深者但當使熟讀論孟六經以養徳性有餘力則觀史以驗吉凶成敗之理之由治生産力稼穡事父兄睦九族日就月將果能沛然有餘厥聞四馳禄在其中矣富貴不必求貧賤不足悲居官則不至招禍閒居則不失為善人老懷所見者如此吾兒試熟思之以為何如有疑則迴報無疑則治生讀書夫人之生世隠居以求其志則易行義以達其道則難易者在已難者在人度徳則堪處量力則能行相時而不可動則徳力俱廢胡子汝今所任之責上奉承省部下御撫吏民承上而行則病民愛民而建議則忤上下不虐民上不違命中不見疾於州縣案牘之胥吏不汚清議不見鄙於公論事集而人安庶幾處乎今世矣然則何以䏻之當真書大字卓茂之為政於座右斟酌損益而行之
