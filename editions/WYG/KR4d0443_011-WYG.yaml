body:
  text: 紫山大全集巻十一元胡祇遹撰記韓氏南園逺風臺記物之美惡非能感人而人自感於物人自感於物耳目之日見聞者與草木之無情者適與意㑹則可喜可樂之情油然而生焉故金石絲簧之和而不能生遷客逐臣之樂蛩吟蚓嘯凄凉秋雨之悲而不能動富貴得意之悲通甫總管韓侯與其弟君美御史子孫族屬近數百指友愛同居壮年才美不急急於權利怡然藹然以道義相娛恱築别業於豐宜門之南五里而蓮池竹塢菊欄松徑㳺息之所畧備又以蓮池所出之土起臺於池南袤延二尋髙則過之南對平崗微阜野寺浮圖映帶隠見於林梢烟際北顧郛郭居民半市半野東望去城近郊蔬者漁者樵者園者圃者一重一掩村落田廬畫不如也西南馬鞍大房棲隠玉泉五華平坡香山層巒疊巘深巖巨壑千態萬變不可名状左右前後貢卧覽而供坐游者亦可謂多景矣一掀髯一舉目無物不可以適意至元十年夏六月以觀稼為雞黍之㑹酒酣客有歌淵明之詩曰平疇交逺風良苗亦懐新歌未闋通甫舉酒屬客曰昆仲登降是臺十稔於兹四時朝暮隂晴風雨之變長吟舒嘯凝望之樂固亦無窮矣然未若此詩之惬吾心者深是臺誠陋請以逺風名之客應曰可同席武安胡某曰喜新竒而厭故常樂富艷而苦淡薄古今之常情也禾之受風有此天地即有此二物且無馨香姿艷之美田夫野老從事而不厭者愛其秋實之成餬口之利而已豈知天地造物生意之美機心一絶與物閒適之樂達官貴人日以薌澤紛華美麗炫其目沉浸醲郁於髙堂華屋名卉珍木之境一至田疇恐為草木泥土之所汚蹙然為之不樂古今幽人隠士澗阿巖谷躬耕妻織不為不多亦未嘗形容是樂於謌詩由此觀之自有天地以来至於今之久知是樂之極至而又能聲於文者獨晉處士陶淵明一人而已後之知陶淵明之深者獨一蘓雪堂而已雖知之而不能同之再廢再辱卒貶死於海南然而是樂也豈區區鄙夫俗士降志辱身於汙世汨没老死於畏途者所能知所能言哉通甫昆仲樂此以名臺推是心以往其肯汗顔無恥拜路塵之下風者耶其肯趨勢附炎不自貴重随俗波靡者耶夀數十寒暑生前有限身後無窮不能居仁由義蟻羶蠅血䧟身非類肥甘寒暖於一時鬼誅人殃禍不旋踵貽譏遺臭於無窮窮天地亘萬世而惡名不滅可謂知乎韓侯之志可尚也夫不可以不誌座客同應曰唯故樂為之書激衰俗以紀此臺得名之自趙侯朂齋記通義大夫户部尚書改除山東東路都轉運鹽鐵使趙侯名某燕居之齋曰朂友人武安胡某問其取名之義曰是名也十六年於兹矣至元八年僕自知歸徳府事改知南陽是時朝廷經略江淮謀定南服集兵襄楚南陽迫近漢沔北當諸路衝要供給運送百冗坌来急於星火修戰艦積屯田馬芻粟人廩食程限辦集若是者首尾三周嵗適以守土實任其責夜分乃寐鷄初鳴而起立志自朂扁於齋不遑寧處幸終秩無敗闕十二年叨升懐逺大將軍金虎符益都路緫管兼府尹此區區為國服勞不敢自暇自逸名齋之由也大字深刻其額參政左山商公之書也吾友其亦有説歟對曰壯者立志忠貞名之可言而行之不怠也自予識執事於弱冠襲先大夫之爵長邢州安國軍節都事便能挺特自立勤苦節約嘉節升聞陞邢州為順徳緫府歴十七寒暑以勲政知河南府歸徳府遂有南陽益都之拜山東東西道江南浙西道兩任提刑按察使三任山東東路都轉運使増課萬七百四十餘錠揚歴中外將四十年自朂之力也余何言哉雖然書不云乎靡不有初鮮克有終終始惟一馬伏波亦曰老當益壯盖人之氣血過中年則衰心志剛强則年彌髙而徳彌邵利欲浄盡而義理精明仁為己任終身而後已矧茂異之材造物不易生國家作養不易成晩路末節尤當自愛慎自堅定自振勵勲舊富貴之子孫能世其家増光前烈如君者百不一二朝廷急急圖任舊人共政六卿之選已膺拜榮以才徳以嵗月以門閥以治績以成效協清議而服公望不能逃任大責重之寄者非子而誰吾子其勉之鄙言已竟請書諸齋壁題王氏樂賢堂記父母俱存兄弟無故天理人倫之至樂也中也養不中才也養不才至樂之中又有不可得而名者仁夀之世父母之具慶人皆有之義方之家不易得也父止於慈愛而不知其惡慈或至於敗子子止於孝敬而不敢違命孝或至於陷父子敗於邪父陷於不義負過避罪之下委曲營䕶憂戚紛擾至是而樂安在哉原其愛子敬父之初心寧故為之敗陷閨門之中以恩掩義賦受之厚不知所以裁之而失其中也父慈而訓子孝而箴兄弟怡怡相勸以義是之謂慶門故人樂有賢父兄也或為貧苦迫之身役戸差之擾東南西北餬其口於四方嵗時伏臘定省温凊欲樂其樂而不得者又十常八九上黨王氏翁媪康寧富而知義子四人賢而好禮無寒餒離析身役户差之所苦築堂以事親孝養以致樂為父母者樂四子之賢心安而享夀正合孟子二樂之義長子某求名其堂名之曰樂賢鄉人皆曰可楣榜已竟請誌諸石某年月日書郁文堂記文之為言淵乎煥乎聖人屢言之矣柰何後世學者不求文之所以為文有本文不在兹乎天之將䘮斯文也後死者不得與於斯文也天之未䘮斯文也匡人其如予何又曰君子以文㑹友以友輔仁又曰燦然有文以相接文之為文於斯可見又曰周監於二代郁郁乎文哉又曰夏尚忠殷尚敬周尚文忠也敬也文也分之則三合之則一誠篤乎中心形於威儀則嚴恭寅畏嚴恭寅畏則語言揖讓登降進退起居莫不有自然之節次輕重疾徐貴賤長幼先後之次叙是之謂文周視夏殷文武君乎上周召臣乎下内則宗廟朝廷百司庻府外則方伯連帥鄉邑閭里朝覲㑹同冠昏䘮祭忠敬實乎心文華郁乎體方之夏殷燦然具備天理昭著人倫煥明夫婦别父子親君臣義長幼序朋友信本既立矣貴則玉帛贄荅賤則榛栗贈遺賔主之間莫不成文此吾夫子美周之文也周之末世忠敬澆漓文存實亡故聖人為之嘆曰禮云禮云玉帛云乎哉陵夷至於叔世君父師長不自知其職不學古明經不窮理盡性不修身齊家不知建極明倫之為己任化民成俗之為已責軒軒然以地位年齒驕蹇於上間有好學者不過乎執經問難為章句儒措辭為淫麗新奇語吁人之以是為文波流風靡詩降而為律字畫流而為行草散文變而為四六歌詠轉為市聲里曲父師之責子弟時君世主之進退臣下以是為才不才文至於此何以為之文哉易曰觀乎天文以察時變觀乎人文以化成天下又曰君子豹變其文蔚也大人虎變其文炳也文之訓詁昭昭矣然則為人子為人弟入孝出弟謹信汎愛親仁而力有餘從事於文者更深思之某年月日朔禮於先聖先師既畢而登講學之堂扁曰郁文西溪王公之書也予恐後學專以辭章字畫威儀之為文故掇聖師之言以為徴清慎堂記寓兵於農王政也居重御輕君天下之大權也漢有南北軍唐立十六衞用此道也兵不寓於農政而二之百萬之衆仰食於農飛芻挽粟數千里饋餉師不宿飽居者行者交相為病不能供給不寧惟是聖王之處内外臨治亂謀深慮逺農即兵也兵即農也兵自農出賦居藉焉農本而兵末本理則末治井田定而三代千餘嵗泰廢井田二世而亡臣民之於君長如手足之衞腹心不如是則渙然不相親鄉田同井朝夕起居相親睦相守望相救助相扶持氣相同心相愛靣相熟聲相應同事則行伍親愛則昆季手足相援親上死長之義明坐作進退之法齊農時田畆農隙則蒐苗獮狩治兵振武從講武事安不忘危治不忘亂金城湯池聖筭神術足食足兵上下相信聖師之訓豈虚言哉我朝家法與帝王同制兵民一也無事則畜牧種植有事則丁男皆兵自太祖皇帝奄奠九有歴五世而聖主臨御承聖祖神考之訓而兵制益完備外以元戎總攝諸萬户府鎮撫四夷内立諸衞屯田閲武使芻粟山積人知義勇加以任将得人法制嚴宻某官某人以祖考開國佐命之元勲積勤累功蒙眷顧至某官教養士卒一一有法樹堂於京南東之中營扁曰清慎推原命名之意潔已以御衆可謂賢乎惟清明在躬故可以正帥衆謹戒不怠則可以有備無患聖人之所慎王公能之唐太宗嘗謂侍臣曰吾行山路巇嶮謹於御轡則未嘗蹉跌及其坦途平易此心一放反致顛蹷檢身御下可不慎歟心不能清雖慎何益清心慎行為熊虎将帥百世之師兵法曰善守者藏於九地之下又曰行如戰慎之至也又曰以約失之者鮮矣易曰師出以律英哉王公無衣帛之妾無食粟之馬小心翼翼克自抑畏訓練程式素所服習又在程不識之右也耶奉訓大夫知宿州事王濯纓以某年月日過堂下留宿於别館者累月觀其數年實辨等列習威儀真一時之良将也語不肖立言以紀其實且以不肖王公之老友也故不辭而書襄垣李氏秋蟬堂記蟬之為物蛻乎濘穢之中嘯吟風露之外得蟲介之清秋之為氣霜肅天髙日晶月潔濁暑屏跡麗金用事得四時之清以蟬鳴秋氣同聲諧楚吟湘怨蕭散閒雅豈春鶯夏燕宵蚓寒蛩之所能擬倫也襄垣李某潔身遯世喜鼓琴得趣深名燕居之堂曰秋蟬即名以求心是豈囁嚅淟涊進瑟於好竽之徒歟恥素餐之粟而不食如秋蟬飲風露惡鄭聲之淫而不聽鼔一再行如秋蟬之作清音罷彈横膝悠然自得樂之於身而不厭迴視揮之復来斥之不去若厨蠅之戀羶葷者将望望然去之又忍與之語哉某今原夲訣年間人堂毁於兵人亦云止孫男某思慕乃祖之髙節名不可滅載堂載構終當有成乞言於余曰異日忩戸簷楹復還舊觀大書深刻傳子傳孫世世不忘使君之惠也敢再拜以請至元十三年秋八月書遺安堂記欲子孫之貴富安榮天下之人之同心也然而欲貴富而反得乎貧賤欲安榮而反得乎危禍者皆是也是盖溺於所愛以恩掩義不究其理不窮其情故也夫物之榮悴通塞人才之賢不肖成敗盖有由矣人徒見春夏之發生長養萬物各遂其性而不知收斂閉藏欝抑含蓄外若挫折而内實培植以成發生長養之功者乃秋冬之力也人與萬物一也故孟子曰天之将降大任於是人也必先苦其心志勞其筋骨餓其體膚空乏其身是以動心忍性増益其所不能然後知生於憂患而死於安樂也獨孤臣孽子其操心也危其慮患也深故達詩曰宴安鴆毒不可懐也前賢亦曰富貴生不仁韓文公亦曰不見三公後寒飢出無驢不見卿與相起身自犂鋤理固然耳然而知之者鮮矣憂子孫之賤而以賄賂迎合曲邀横結求大官憂子孫之貧營田宅殖貨財藏金於郿塢積胡椒八百石憂子孫之不才俊而使之乗肥衣輕結豪侠通權貴臂鷹走狗賔客滿門以求聲譽以是數者而觀之雖曰愛之其實害之雖曰憂之其實讎之使為子孫者天質粹美必至於驕矜怠肆志得意滿善不進而惡日趨使其愚不肖其禍不旋踵而至然則為人父母其於生誨死遺可不慎歟可不明理而逺思逺慮歟世之人於其所甚愛而錯謬如此於其所不愛而曰能盡其道吾不信也吾鄉提舉馬公彦舉置居第以傳子孫名其堂曰遺安其亦二疏龎德公李文靖公之心乎棄世二十餘年於兹矣易簀時子孫尚幼於今表表卓卓内處臺閣外列郡縣有良吏之稱晦徳不仕者鄉里稱善人當時與公同仕並世今其子孫彫落廢絶者固不必數其詵詵繩繩成身立業為何如哉聖賢之言馬公之志豈非明效大騐而不誣也耶至元十七年燕南河北道按察司從事名曙字徳昭公之長子也再新門扁求書於武安胡祇遹併乞言以誌其歳月故為之説以書其左兼善堂記太師國王以神武不殺之仁而賛成開國之勲當是時幕賔郎中石丈謀議為多未及上太平守成之䇿而去世吏民思慕以謂榮不酬徳至今以為恨冡嗣宣慰使祥甫克肖其徳光大先業孝思追逺致敬竭䖍於家廟尚以廢墜家聲為慙恧自勉自朂起堂於私第牓曰兼善其志盖可見矣紫山野老一日過公之門既書其門楣不可無一言以誌其壁竊嘗思之男子之生世窮達有命貴賤在天不倚乎命不歸諸天求其在我者尚志而已髙志一立鬼神莫之奪所謂髙志者富貴不與焉天之生斯民也固欲人人育萬物而參天地然而清明純粹剛健命世之氣雖造物之巧亦百千年不一全備所以感之者大抵碌碌於齊民宣慰公之名堂伊尹之志也伊尹之志匹夫匹婦不得其所如已推而納之溝中故其言曰與我處畎畝之中以樂堯舜之道豈若吾身親見之哉豈若吾君為堯舜之君吾民為堯舜之民哉此孟子所謂達則兼善天下之㫖歟百年之間兆民之衆有此氣而無此志有此志而無此才有此才而無此德有此才德而不偶明時者又十常八九宣慰公於斯四者獨備而兼全将見措斯世於唐虞之上何逺之有故樂為之書容齋記堂齋亭軒之命名几杖槃盂之有銘非所以張虚譽而取口稱實欲朝夕靣對抑有餘而强不足無斯須而不自戒飭警懼也大中提刑公以容名齋其好善克已之情槩可見矣書曰有容徳乃大容之為義非止於寛而已凡人之量固多狭隘在伯夷猶不免故子思子曰浩浩其天言人之量當與天同自非聖人安能希天故漢人稱黄叔度汪洋如千頃陂澄不能清撓不能濁然亦有似是而實非者不辨白黒清渾舉無不可似容非容也亦愚人耳惟其胷中涇渭未至於當言則口不臧否又若滄溟自有天地以米萬水歸之不舍晝夜不知何時止而不盈甘若汚濁之不齊沙泥糞壤蟲魚鱗介生之受之而不拒清者以助已之大為已有之有潤已之徳濁者隨而為渣滓以為善徳之資所以能為百谷王也此其於容也有益而無損故其徳日大若夫溝港池沼多水之来則不能受少頃則為之枯涸正如斗筲之人吝驕相仍不能容物反為人所容可嘆夫容齋主人天禀聰明䟽通克自抑懼其接物太察又欲於日月之間萬事之来前兼收併蓄勝已者取以為法不若已者忠告而善道之以是處心其徳豈不大哉其勲業可量也哉宜乎一飛而親日月之光出而典郡治績最諸路三陞而總外臺之清要賢於讀書半世不自知其所短者逺矣孔正已詩禮堂記孔子五十三世孫曲阜尹權祀事名治字正已作堂於私第扁曰詩禮異哉正已之大孝也歟聖人去世千八百年嗣孫傳家希聖特立繩武接踵然能色不忘乎目聲不絶乎耳者亦不多得因名以原其心正已律身之志起居語黙皆自貴重必曰是身也非我之所得私也是身也賢於堯舜萬世帝師至聖之遺體也行至聖之遺體當如何哉言至聖之言行至聖之行一毫無似非孝也不孝則罪孰大焉任大責重寤寐語黙不可斯須忘乎心然而何修何飾而可以學乎聖吾之所居之室聖祖之所處也手口之澤至今尚存為子孫者其可忽諸吾蚤作夜寐神明照臨入户則如拜申申夭夭之儀趨庭則聽不學靣墻之訓庻幾温柔敦厚而思無邪嚴恭寅畏而毋不敬升降俯仰燕居處獨尚可不愧不忝正已之志殆如是乎否則雖名詩禮而不誦詩禮之一辭熟其辭而不踐詩禮之一跡耳思乎無以言無以立諄諄之慈愛三百五篇之㫖曲禮三百威儀三千雖日詠月習不過作毛鄭箋之註脚大戴小戴之訓詁學究耳是堂是名非正已獨得而私凡吾夫子之嗣孫當家立是堂堂掲是名皆以正已之心為心履往聖之絶蹤快天下之公望立為人子為人孫追逺奉先行父母遺體之成法偉歟英哉不肖何幸拜登斯堂見善道不能無一言以識其末某年月日某書寧晉王氏本支圗記萬物本乎天人本乎祖人道親親也親親故尊祖尊祖故敬宗敬宗故收族生則大宗小宗百千世而嫡庻有别昭穆不亂死則祔祭於廟祔𦵏於先塋服雖窮親睦不衰此三代聖王設教立法所以厚人倫也是道也廢之已久而習俗日衰父母在而昆季析居再世而不相往来甚則手足化為仇讎視猶子如路人有人於此能以人道自任起廢禮於舉世久不能行者豈非天資孝友超然特逹之士歟寧晉王氏巨族也金亡兵荒中世譜不存嗣子某既為先君節使元帥公序銘神道之碑髙曽而下暨伯叔祖父譜忘事業不及見聞莫能論撰無文以旌紀哀慕罔及故細列世系刻之碑隂使為子為孫者有所考焉歳時伏臘聚親族於其下封墳拜壠尊卑長幼各知其序本支源委有條不紊功烈德澤追孝於前人庇宗亢宗感激其来世繼繼承承亘萬世窮天地而兹祀不絶孝友睦婣不勸而化各虚其次以為嗣續鐫名之位噫若椅者天資孝友者也聽聲可以知其器觀委可以知其源視履可以考其祥今王氏嗣孫男已近百人達者髙爵厚祿衮衮而文武顯官未仕者孝弟力行不失為鄉里善人然則髙曽而上其器其源知其宏且深矣視子孫之所履以卜来世王氏之遐福方興而未艾也父作之於前子述之於後孝子者善繼人之志善述人之事者也後来者毋廢成美此椅之刻石之心也武安胡某既状其節使公之行業而又誌其壙矣於兹圖也不可以不書郭彦高招討野齋記好誇人之同情篤厚者鄙之好名亦人之同情力實者去之夫名者實之賔也賔勝主猶且不可無主而多賔奚可哉大名之下不可久處聲聞過情君子以為恥亦畏夫招物議而得天殃也是故謹飭之士檢身若不及其取名也亷唐韓文公以退為字宋朱文公以晦自號況餘人乎吾友郭公彦高築齋於私第名之以野孔子曰質勝文則野又曰先進於禮樂野人也又曰野哉由也然則野之為義非佳稱也明矣彦高亷矣哉盖惡夫好誇好名而無實者也自後者人先之自卑者人高之逺物議而逃天殃是也又豈野人而能然乎将見學問日増賢而有文不得志則不為巻懐退蔵林逋魏野之流得志則道濟天下急流勇退紹聞隣野緑野二堂之後吾亦以此望彦高也彦高去席曰雖不敏不敢不自勉請書之以為誡因以為識効忠堂記立非常之功者享非常之福天理昭昭不可誣也往古来今未有無功而蒙福積惡而不㓙者也無功而福君子懼之少中大夫同知福建路宣慰司事安陽李子振文以户入兵籍壯年從軍鋒刄矢石攻城野戰飽經而備嘗之矣至元五年我師圍襄樊振文身擐甲胄手親簿書者一千八百日襄樊下從元戎二丞相渡長江攻堅城破强賊降大敵無一不與其謀不親其事卒至壓宋都受宋太后少帝降表得府三十二州百廿三郡三十四縣六百九十八兵卒百萬户千一百七十四萬六千資糧貨寳不可勝計驛奏天階錫宴受賞増秩可不謂立非常之功者享非常之福歟偉哉英哉自古至今指揮渡江一舉而統一南北者能幾家以魏文帝之英明才勇而天以長江限南北之轡苻堅以百萬之師敗衂奔潰而不可止我朝奮起朔方受天眷命併諸强聚落滅完顔金下回紇臣髙麗平吐蕃河西畏烏諸别種惟經畧江淮歴四朝五十年而後武功告成實出於皇帝陛下聖筭神䇿威明獨斷所任将帥得人二大丞相忠武勇知精誠折衝故所向無前卒成大業耀當代而垂無窮振文於是時名位未崇而謀畫實多豈碌碌隨人者也宜乎自行中書省鎮撫陞省掾再命行中書省都事撫州路總管府治中未幾佩金虎符陞臨江路總管府達嚕噶齊吉州路達嚕噶齊再陞同知福建路宣慰司事朝廷重惜名器不妄與人而振文之効忠宣力榮貴隨之其任臨江也發權吏積年蠧國賊民之姦徵贓黄白金萬九千餘両鈔七千兩復發主典欺隠官錢鈔三千緡銀一千九百兩税額月増倍三十嵗霪雨民饑開倉活五千餘户土人立生祠刻石頌徳移鎮吉州招復逃户二萬家貪吏屏息强横帖然至元二十五年福建宣慰秩滿得代還鄉里親戚故舊滿門以前宇阨狹不能容簮纓作堂而高大之振文之志榮聖㤙之優渥内以光祖考外以娛佳客以謂不可妄自菲薄沾清儉之名此堂之所以立也至於誇里閭驕妻子歌兒舞女快樂乎一身則非其志也梁之舉行臺御史濯纓翁王可與晉卿雄文以序之歌詩以賛詠之曲盡其平昔堂之落成親朋咸集客有舉杯而言曰堂之名可得聞乎主人曰無有稱情命名惟衆言是從客曰堂之一甓一木聖上雨露之澤也拜恩受福臣子効忠之力也然則名曰効忠可乎主人曰非下走之所敢當也為人臣而効忠死生患難之不避亦職分之所宜惡可以自負哉客曰非自負也効也者進進不已惟恐其忠之不盡自兹以往願吾子立則見其忠於前在輿則見其忠於衡前志不衰老節益壯惟力是視不務宴安書之門楣昭示子孫使知斯堂非門閥廕庇而興非僥倖詭遇而得尚不敢以自足苟安而處使為子為孫者趨而過庭問起居而升階瞻門額而見扁榜顧壁石而誦記詞退而私相語曰此吾父吾祖起堂得名之由也忠孝之於人其效如此虧一木損一甓非孝也不能繼志述事踵前人之英武非忠也我輩尤當兢兢業業毋敢失墜然則兹堂也日固日安豈不為李氏百世之光命名之㫖其在兹乎主人曰謹受教請書之時雨堂記栁宗元非國語以天人不相干可謂無義無命矣箕子作洪範五行五紀稽疑庶徵五福六極九疇之中天人相應者六後人推廣其徵驗至於五事三徳八政亦未有人天之不相感者天地非人無以奠位理物人非天地不生活上中下通一氣耳子孫之賢不肖為父母者漠然無情父母之喜怒哀樂為子孫者恬不之動有是理歟如宗元之說則孔子作春秋天變不足紀矣吾友明叔趙侯治長清作堂於私第時方旱堂成而雨命之曰時雨亟乞言以記之明叔之心不敢自欺自負以推誠潤物得甘澍之應姑取東坡喜雨亭之餘意固足喜尚僕以友朋相勉之道殆亦有說匹夫匹婦銜寃飲恨飛霜不雨不諂不貳郎官出宰百里上應列宿以明叔之才志揚歴中外名冠多士今倅大郡一言之善不善足以禍福十餘萬之生靈濡枯津涸抑强横扶困弱惠給細民者奚啻一言一事而巳耶矧明叔之才智詎甘老於州郡者歟閒居鄉里開吾後學已若時雨之化百糓得處廟堂潤萬物而澤四海若傅說甘霖之蘇大旱然則堂成而雨安知不為異日之先兆明叔頷之曰若聖與仁則吾豈敢抑為之不厭請書之恒齋記為醫者宋和之作恒之為德難矣哉乍作而遽息非恒也日月至焉非恒也中道而畫者非恒也行百里而半九十里非恒也此無他智及之而仁不能守也不能守者知之未至故也知之未至則信之不篤信之不篤則守之不固守之不固則以私欲奪天理出入有無之不常晚節末路勿全矣誠知之至則必曰徳一則吉二三則㓙舍吉而從㓙豈人情哉至元壬戍余来官濟寧俗厚事少訪儒醫於郡人衆以恒齋宋某對巳而與之邂逅深静重厚辭簡而理足自是日往月来兩易寒暑視傾盖時不少異不敢以無為有以虚為盈以約為泰聽其言察其行慥慥相顧信乎其能恒者也竊嘗觀天地健順恒久而不息包萬有成萬物不在乎飄風驟雨在乎無聲無臭不在乎迅雷掣電在乎絪緼中和人肖天地以生然而動輙悖徳悖徳則且不能悠久者意必固我以賊之揠苗助長以害之異常出竒以擾之惟寧静冲淡不務外不矜誇中道而行其庻幾焉孔子之於欲見聖人君子善人而俱不可得得見有恒者斯可矣恒去聖固為懸絶然入聖自恒始今之貴賤賢不肖皆無恒心惟利是趨朝顔而暮跖朝仁而暮盗趨向無定變化不測紛紛擾擾中得見務常而恒雖聖人不免擊節嘆賞吾其能已於言乎勉之哉持此志也終身後已可也主人曰唯請書之府學儲書記建學校而儲書籍知務本矣人不知不學學於古訓乃有獲多識前言往行以蓄其徳前聖後聖豈欺世哉彰徳總管胡公下車以興學養士為務嘗與秘書監侯公議儲書以待學者達嚕噶齊晏質謹公聞而恱之首出百巻不數月收書萬二千巻櫝之府且懼歳久散失特以書籍總目助書人姓字俾刻諸石教授丁君來言曰公之仁心逺慮可謂勤矣子宜以言記其實竊惟顔子之稱孔子曰博我以文約我以禮其告子張曰多聞闕疑慎言其餘多見闕殆慎行其餘子思傳之孟子亦曰博學而詳説之将以反説約也盖學不博則不能求於約寡聞少見則無以致廣大盡精微而㑹其有極師道廢久後學無所質問所賴者往聖前賢之格言善行布在方䇿而不冺者耳窮居寒士無錢買書雖欲矻矻於朝經暮史晝子夜集何從而得之胡公此舉使學者隨取而隨得如饑得食如渇得飲免乞假之勞無抄録之費成就後學惠莫大焉徳莫厚焉學者無以易得觀覽過目而不銘諸心能言而不篤於行務博而不求諸約貪多而不精於去取典郡主書者勿以善不出於已而不加愛䕶月銷歳减於巧偷豪奪之手不惟負公之徳朔望致祭寧不愧於斯石榮煉師信齋記人之於道見之明則信篤信之篤則守固守之固則行之力行之力則恒久而不已終身而不變若是而人不信曰有道之士未之有也或近泉而棄井或半途而自畫或朝勤而夕惰或出入而無常是皆見道之不明巳不自信人孰信之故曰誠者物之終始不誠無物故至誠不息可以貫金石通神明對越天地而況於鄉黨鄰里乎女冠榮煉師自髫齓而離母母禮師得道者服笄歳而為黄冠師今六十歳矣清浄謹嚴猶一日也可謂見道明而信道篤也受業者既衆寢息之所隘窄而不能容起一齋於本觀之隙地掃地焚香垂簾扄戸道徒誦讀畢虚心絶學見素抱朴親戚鄰里不妄徃來容齋提刑幼䝉摩撫長知敬奉一日同過新齋曰古人不云愛及屋上烏人好烏亦好齋不可以無名扁曰信可乎在坐者皆曰可請書門楣又請為之銘銘曰天有四時萬古不愆以是而觀信孰大焉人有誠徳法效乎天純亦不巳始終百年我守我信人無間言我非求名惟徳之全見素抱朴心廣體胖表裏澄清玉壺真仙
