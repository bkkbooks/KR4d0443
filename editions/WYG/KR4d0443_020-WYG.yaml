body:
  text: 紫山大全集巻二十元胡祇遹撰雜著原心世之人於外物事事皆能著力或名或利以死守之惟於心不知著力隨物屈撓遇威武則便屈遇富貴則便驕淫遇貧賤則便戚戚卑諂有餘不足隨時毁譽身不知所以立己不知所以行譬猶於水隨物賦形孔子言三十而立此心此身挺然不移也世之人以氣血為心性一隨氣血氣血所欲者惟恐不得既得則惟恐去矣凢可以不去失之方無不為己無所不至至此則豈有心乎形則人心則犬彘豺狼牛馬也五常萬善之性靈於萬物之才配天地而三之尊爵天與之而不能有可哀也哉原教文武周孔顔孟而下為君父師者不知其職不澄源不端本不知正身以化天下區區以法令刑罰督責而已為臣子為門弟者仰觀君父師之所為與所出之語言號令氷炭矛盾故不從其言而從其德法令愈嚴密而民不興行放僻邪侈奸偽爛漫而不可遏刑罰愈苛凶惡頑嚚滋熾而不可止葢不知教之源教之本教之表所自出也源清則流清本直則末直表端則影正教也者正身而已矣奚事於喋喋之口舌哉成湯作誥曰惟皇上帝降衷于下民若有恒性克綏厥猷惟后子思子曰修道之謂教孟子曰古者易子而教夫子教我以正夫子未出于正也以父之尊而不能正其子不能以身先之也又曰身不行道不行於妻子而况外人乎而况天下乎今之為師者不知率性修己以為教為門弟者不知主善觀感以為學入學之日揖讓步趨坐作進退周旋應對口何如而言耳何如而聽目何如而視手足何如而措事父母兄長則當何如見鄉黨官長先輩則當何如與等輩交游則當何如一切䝉以養正趨後聖之功為父師者非不欲教而先自不模不範讀書寫字細事也亦不知法誦書則音聲不正句讀不絶章段不明寫字則不知如何把筆如何立筆如何執筆如何而為八法麤迹尚且不明微奥之㫖何以知之幼孺童子胷中一書不讀一事不曉便教以對句吟詩課賦作文舍大學論孟不講便説春秋易象求媚于其父母兄長取虛譽于鄉黨里閭以致後進性識才俊靈明者無實德昩人倫挾口論之末學傲兄長驕鄉里反為無理無義之人然則師也者成人歟敗人歟三代之學皆所以明人倫也以今較之其差也不亦逺乎自七八嵗入學誦孝經論語孟子詩書以至壯年才名揚於四方及其臨事無一事與聖經相合者下筆數千萬言皆掇拾前人涕唾無一語出自肺肝者居家則多弟子之過處鄉黨則得罪於鄉黨入仕敗事病民立朝廷則以政事戕賊天下後世皆原於無良師而不善學也然則傳道立教者可不知教之所由生乎故作原教以示曹南之鄉校雜言天地之大以二言之天地氣質乾之大始坤之成物以一言之氣無質則無所依恃無所包宇留蓄無所出入往來質無氣則枯槁壞爛磨滅而不能永久不能生植神化由是而言天依乎地地附乎天闕一不可二則舉乎體體藏乎氣一之則體立而用行雖為一物可也隂陽以二言之陽剛隂柔陽舒隂慘陽溫隂寒陽生長隂收藏以一言之靜極不能不動動極則不能不靜動則生長溫舒極則復靜靜則收藏寒慘然則靜為動之始動為靜之根故周子曰互為其根雖曰一氣可也何以言之亦只是始終消長聚散而已人以動靜寒暑而言故曰隂陽四之則為四時有四時則又分而為二十四氣七十二候三百六十六日四千三百二十時四十三萬二千刻此葢聖人作厯度隂陽氣候之遲速愈細密則愈精微矣是猶太極兩儀四象八卦八之十六十六之三十二三十二之六十四引而伸之無有窮已物無兩大地非能配天地體有根天體無窮地包天内如鷄卵黄以天之内更無大於地者故曰天地如父子君臣夫婦之並稱豈敢與之敵體哉使地無天不惟不能生萬物載華嶽振江海其本體亦不能以自舉地動地震如人肌肉蠕動肌肉所以蠕動氣使之然也凡地之變皆天使之然也故春生夏長秋收冬藏皆天也人之四體不仁者氣不充也故曰氣傷痛形傷腫故聖人之於易以陽為大而隂為小天尊而地卑故孟子浩然之氣充塞乎天地形軀則六七尺耳隂陽只是太極一氣之動靜耳動則便溫動極則熱熱極則火靜則便凉凉極則寒寒極則水木金乃火水之徵耳凡物氣屬陽質為隂氤氲而為氣氣積盛而急則為風積盛而急鬱結而不伸為隂所乗激烈成聲而為雷陽光在雷之前排突而掣則電陽極則為火隂極則為水為雨露霜雪江淮河漢海澤隂之至凝結而為土為山石金鐵陰未極而柔則為木在天成象者陽氣也陽光也在地成形者隂質也雪自天雷雨自地出既分天地則陽歸於天隂歸於地在天地則各有氣質也隂陽者一氣之動静也静極則不能不動動極則不能不静静則凉静極則寒動則溫動極則熱動静絪緼化生五行五行推盪化生萬物溫生木熱生火凉生金寒生水土者溫涼中和之氣萬物雖多不出五行各從其類也五行萬物之父母也動静五行之父母也太極動静之父母也四時晝夜天動之五行也木火土金水地動之五行也在天則成象在地則成形氣輕清則為日月星辰風雲雷電雨露霜雪聲響光耀潤澤氣濃厚結實則為人物草木土石江河飛走鱗介形質剛柔香臭動静不偏則二氣和平二氣和平則其為物也不苦窳不夭折不乖戾惟人也得精氣於父母父母交感之際精氣中和盛厚則其為子也仁夀否則不仁不夀曰然則丹朱商均受形於堯舜其所感為何如曰此非常理善惡至於極至之變也天地和平之極則乖戾從而生焉既極則不能不反常也是故盛極則衰聚極則散治極則亂樂極則哀生極則消是又不出於静極而動動極而静故也易曰日往則月來寒往則暑來其勢不得不爾也人為氣數所拘得失聚散貧富夀夭非人之所能為然則悲喜哀樂愛惡百感紛亂徒自苦也如是果何益哉天地之小終始四時成嵗也故一嵗十二月三百六十日四千三百二十時擴而充之極其始終之大則一元十二㑹三百六十運四千三百二十世每世三十年計十二萬九千六百年是為一元之數以一嵗觀之陽開而隂闔陽生而隂殺陽和而隂慘四分之則氣有生長收藏而時為春夏秋冬四時一隂陽也隂陽止一氣也春乃陽之微夏乃陽之盛秋乃隂之微冬乃隂之盛豈非四時亦隂陽乎一氣不能長動而無静長静而無動動則溫溫則暑故名之曰陽動極則漸静静則涼涼則寒故名之曰隂豈非隂陽乃一氣之動静乎天地之大亦囿於形氣當其暑不能不爍石流金其寒也不能不坼地凝海形氣之使然也既囿於形氣不能永盛而無衰不能永恒而無變以小觀之積十二時為一日積五日為一候氣至與物類己不同矣積三候為一氣氣至與物類又不同矣積四時而為一嵗氣至物類始而終為之一周矣是知形氣之稟賦長短雖不同而變化盛衰則一也稟之厚者其變遲稟之薄者其變速蚊蚋朝菌得一日之氣數者生成衰死在乎一日之間也天地之數豈非在一元之間乎故康節中分之前六萬四千八百年為開物後六萬四千八百年為閉物故以大觀之積十二世為一運積三十運為一會積十二會為一元而中間氣至之變物類之化豈能恒久而若一哉日月之蝕雖天地不能易水旱之厄雖聖人莫能逃莫非數也然則恐懼修省之教知不可免而强為之誣民也曰非也天地萬物之父母也父母之怒父母之疾厄為子者漠然安處不自責不哀禱一歸之於數可乎此聖人垂訓之意也故隂勝則水陽勝則旱陽勝則多暑隂勝則多寒陽勝則聖人生君子多而治平安舒隂勝則暴君作小人熾戈兵鬭亂一氣之使然也細分之則木運生發慈仁土運鎮靜安泰金運剛勁殺戮火運猛烈焚蕩水運飄泊尚智多事雖然亦不出隂陽之一氣也五行之生也其先後之次第則水火木金土其衰廢也亦然既廢則復生矣以身觀之四十已後肌膚方長而腎氣衰心力已衰矣莊子曰易以道隂陽此一句可謂詞約而用博知易之深者也市井諺語曰萬事不離隂陽此言雖鄙直是有理萬物一隂陽也靜觀之則物物象數皆在其中陽春夏晝君子男動吉長進一三五七九剛開少壯神伸直隂秋冬夜小人女靜㓙消退二四六八十柔闔老死鬼屈枉陽顯成正德仁禮出生喜舒先倡行有變往隂悔敗邪刑義智入殺悲慘後和隨無化來陽泰復賢生明巧榮始竒清氣善得行存盛聚隂否剥愚死幽拙悴終偶濁質惡失止亡衰散陽白治明振揚神竒五福精英寤隂黑亂暗隱伏腐臭六極查滓寐論道道者理也路也天為自然之理在人為日用之間當行之路德者得也得於天之五常萬善也以語孟六經説道會為一處比較老莊之談道見老莊不親切明白細密語孟六經則致廣大而盡精微極髙明而道中庸道一也曰王道曰二帝三王之道曰聖人之道曰君子之道所稱各不同何也曰能由是路用此理者二帝三王聖人君子耳背是理舍正路而妄行者五霸小人也聖人在上則曰天下有道又曰國有道天位無聖明則曰天下無道國無道人能𢎞道無聖明則天理不明達道廢塞矣聖人制字便有理義中心為忠如心為恕人之為善能自中心流出不外鑠假借苟且自欺是之謂忠未能便如此必推窮反求諸己已欲立而立人已欲達而達人已所不欲勿施於人如大學所謂絜矩以己方人推而及之是之謂恕故曰忠為一貫恕為萬殊忠即體恕即用忠者天道恕者所以行乎忠也忠即大本恕即達道物物之生死壽夭各有數乎曰有可逃乎曰不可但知命者順受其正耳大而天而地細而一草一木昆蟲皆有數人日見之而不察耳厯書七十二候一草一木一昆蟲之死生應期而不差毫釐孰為此者天地此即天地之數也四時之序功成數盈則去雖天地亦不能違其數也間有愆陽伏隂則謂之邪氣奸正然數也一六為水二七為火三八為木四九為金五十為土此五行所受之數也四千三百二十時三百六十日十二月四時而周天此天地一嵗所受之數也邵氏曰有萬嵗之物千嵗之物百嵗之物十嵗之物一嵗一時一月一日之物所稟之氣數豈能逃之哉若氣數能逃則學長生者得之而顔子不夭矣聖人所以不屑言數者恐人為惡而不為善一歸之於數耳曰然則聖人曷曰仁者壽曰天地所賦之壽惟仁能充滿而不戕不仁者于天與之數亦不能充足他人遇顔子之氣稟雖三十之壽亦不能至矣此陳圖南謂穆伯長君不娶可得中壽娶則戕伐天年也果如其言醫書言人女子不過七七男子不過八八天癸竭地道不通一節節而詳言之此人生所受之常數而不可逃者中間短長强弱不齊者亦胎稟之不一人為之百殊以致然也非常數也至於人之天資為善為惡亦氣稟之偏而不可移故曰惟上智與下愚不移五行之氣木仁火禮金義水智土信得此氣之正純粹清明而不偏者聖人也大賢也偏駁乖戾則為下愚為凶人有教無類可與為惡中人之氣稟也得健順五行之氣而為人或仁或不仁豈非氣數乎堯舜在上則民仁壽桀紂在上則民鄙夭未有君仁民不仁君不仁而民仁者此天之氣數生大君而上以風化下天地豈欲立不仁者之為君哉亦氣數適然也堯九年之水湯七年之旱豈人為之所致也然為學知命者當盡人道以立而俟天命耳天地有數故萬物莫不有數何謂之數一嵗四時二十四氣十二月七十二候晝夜十二時百刻豈不昭昭然毫髪之不可差越日月之蝕尤為著明五行之生成衰旺亦無僣忒聖人見之明審之准推之詳度之定故邵康節觀物篇曰有一時一月一日一嵗十嵗百嵗千嵗萬嵗十萬嵗百萬嵗之物葢其氣禀一定短長之量不可増損於其間也惟人也得天地之秀而最靈聖人定之以仁義中正立人極焉順受其正得終天年保安天禄能吉其凶不桎梏巖牆若壓溺戕伐而死是又數之所不能拘也邵康節每嵗便作四段看以天地觀物也天有四時故每物不出四節葢為氣數所囿不能逃生長收藏之數也物無再盛盛於春盛於夏盛於秋於冬各有其時人百年之物舉盈數則百年皆不能滿當以八十嵗為四段弱冠春也年四十以前夏也至六十則秋八十則冬聖人故戒之色戒之鬬戒之得葢人之血氣即天地生長收藏血氣之使然也必不能免故不可不戒一氣之生消巨而大家細而一物禀受已有定數當其生也曰聚曰盛曰興在人則為才智賢明為貴為富為子孫繁衍百物百須皆廣積豐厚及其消也曰散曰衰曰減為愚不肖為賤為貧乏為子孫削弱百物百須皆從而夭折消耗故明哲之人至於富貴髙滿則恐懼修省葢見其危溢之禍將至矣故曰慶者在門弔者在閭一氣倚伏必不可免此自然之數不可逃者也然則胡為而設教曰積善之家必有餘慶又曰大德必得其壽無乃誑誕姑務誘人欲使畏戒而不為惡耳聖人豈為誑誕哉人自不察耳譬如一氣之水置之熱風炎日之前易涸置之隂靜固密之室則難乾一拳之火灰養之則遲燼風飄薄則易消人之盛哀亦猶是也積善之家當富貴之在躬省嗜欲薄滋味逺聲色務勤儉踈貨財抑驕矜兢兢業業一事一言常恐太過是志也是氣也以修己養身之餘型而為家法流而為子孫其進也不鋭故其退也不速順受充滿稟受之定數小人則反是不能充滿所受之數而促之秦二世周八百年盖可見矣顔子何為而夭夭者氣數之定也㸃水星火是也雖聖人亦無如之何矣無顔子之聖德三十之年亦不得而至矣盜跖之壽盖已自促之矣非元壽之數也大而天地細而萬物消息盈虛進退存亡無一不同但氣稟長短或異耳所以然者一氣之聚散分合也故無斯須而或停無斯須而不變易聖人觀物得始終於盛衰審吉㓙於異同逆順故闔為闢基貞為元本敗為成首成為敗基恩生于害害生于恩吉㓙悔吝互相倚伏故聖人見此而能進退存亡不失其正庸人見己然哲人見將然明理故也理本易明人自不察日中則是月盈則虧寒往則暑來壯極而衰豈難知哉不知者貪而不學也所以知得而不知喪古人料事無一不中以理而言也所以見微而知著以往而知來因明以知晦即盛以知衰太極不能不動動極不能不靜動生陽靜生隂陽生木火隂生金水理勢然也故萬物萬事無不對待倚伏故曰慶者在門弔者在閭有無故之福必有無故之禍易成必易敗進鋭必退速輕諾必寡信面䛕必背非君子小人每每相反至於萬物升沈用舍貴賤多寡無一不然聖人觀物窮理自源而委自榦而枝反之則復至於源榦故能自太極而至于庶物自一而推至萬萬無窮反之則復歸於一統之有宗會之有原通神明之德類萬物之情本末表裏小大精粗莫不畢備是之謂神聖觀聖賢傳道之言可以見人品而觀變堯舜禹之授受以中者以聖授聖不在費辭但於天性人心天理人倫之善或少有過不及耳孔顔之授受以仁開明其性命之原也子思之中庸明性道以歸至誠孟子之言仁義見時君世與一時之大夫士不仁不義漸失天性滅天理壞人倫惡已甚矣故諄諄然命之曰萬物皆備于我矣反身而誠樂莫大焉又曰堯舜性之也湯武身之也五覇假之也觀孟子曉諭齊宣梁惠之言既詳且明二君終莫之悟當時未去三代之世逺未經暴秦之不仁人心已如是矣又數千年而下欲以性命之學王霸之異而與之言誰其聽之哉道之體用包括天地細而一草一木蚊睫微塵自一身言之上下前後左右無非氣也理將其氣聖人得氣理之全内則修身外則應物尊則朝廷卑則瞽者齊衰者皆盡其道故顔子喟然嘆曰仰之彌髙鑽之彌堅瞻之在前忽焉在後又曰如有所立卓爾雖欲從之末由也已良以此也立言聖人立言皆出於不得已憂世救亂而作使人俯仰之間洞見天道一循天性行正路不背吉不陷凶悔則八卦不畫六十四卦不重矣卦象成列人人如文王周公孔子之聖明見易之理則彖辭爻辭十翼不用作矣至於二典三謨書之百篇詩之三百篇亦不得已而有是言也亂臣賊子接迹於時三綱淪九法斁故春秋作異端起而楊墨出故孟子辭而闢之聖學失其傳故子思作中庸孟子没而道學不傳故韓子作原道科舉極盛不適用而言不成章浮淫鄙俚之極故周子作太極圖通書聖經雖存而詁訓乖繆義理昏昩故二程朱張輩為之注解前聖後賢心實若此非求名也非華世取寵也非誇多而鬭靡也非不知而自欺强以為知而作也以聖人視庶人何啻天壤之相懸使天下有道庶人尚且不議聖人寧肯無益無用而漫立虚言耶以賢不肖之或過或不及故聖人言中以徇人欲而不及天理故聖人言復以欺詐誕妄而不實故聖人言誠以失其本心而不仁不義不忠信不孝弟故聖人歴言之使復人性之固有天理之當然以救其君子犯義小人犯刑之禍而已然則聖人豈好多言哉此韓文公所謂害至而為之備患生而為之防聖人之立言如制器然大而城郭宫室甲兵衣服飲食細而權衡度量規矩繩墨百千器皿一一適其用補其闕奚有無用者哉今人之教子不明經窮理不養性不積德不廣才不盡人之職業不治事不窮古今不達時變自童䝉入學便學對句吟詩課賦作雜文勞心思苦智慮敝精竭神剽竊補綴自旦達夜為無用之空言以苟取一朝之聲名富貴利達何不思之甚也不惟不得所欲雖得之亦不能久居而失故孔子曰不患無位患所以立又曰仁不能守之雖得之必失之六經語孟可合而為一乎曰可同乎曰同請問其説曰分而言之則易言隂陽剛柔乾坤六子書言政事之得失命令之懇切詩言性情之好惡春秋言君臣上下之名分禮言人事之儀則天理自然之節樂言雍容不迫相敬相愛驩然自得之和周官言天工人其代之庶政之條綱論語孔子之言行孟子推明論語六經傳道救弊以是觀之詎能合而為一不一則曷謂之同非此之謂也理一而分殊也萬殊而一本也異途而同歸也譬人之身耳目鼻舌手足所主之名異若不相千涉然闕一則不為完人必周身元氣為無缺然有是理而後有天地而後有萬物一理總攝萬物而萬物各具一理惟人也得其秀而最靈萬物皆備於我具於心則為五性發於外則為七情發不已則形於言是非好惡得其正而無邪心此詩之所以作也形既生矣則有夫婦父子兄弟朋友長幼貴賤君臣日用當為之事内則有一家之政推而極之則為天下之政此禮樂刑賞命令云為自然而生中間不能無得失無過不及此書春秋禮樂周官之所以作也傳至孔孟則聖君不作陪臣放恣天道不明人欲日横聖人不得已垂訓拯溺此語孟之所以作也其源則實出於易易非聖人之私言四時行百物生日月寒暑雨風露雷無非教也内而一身百骸外而人倫庶物莫不各有當然之理愚者昩而不知賢者知而弗盡知之至其惟聖人乎聖人而不言不訓不教是有負於天地矣聖人之責不亦重乎㣲聖人則去禽獸為不逺然則語孟六經可不終身誦之日玩味而力行之死而後已道心人心人惟一心發於義理之正者道心也發於利欲之私者人心也精察一守可也聖人恐危者勝而汨没喪失其㣲者又直示之以法故曰允執厥中譬如一險徑前半途良人後半途㓂賊一失執守防䕶輕則為賊混擾重則為賊戕滅可不謹獨誠信而固守之耶中者善惡之分也守之固久則賊亦化而為良矣讀春秋聖人之言易而博孔子之説曰思無邪孟子之明春秋曰春秋無義戰五霸雖欲尊王室主盟中夏以行事而推本原情灼見其偽實欲借王道以濟私欲故孟子疾之曰以力假仁者霸又曰今之諸侯五霸之罪人也禮樂征伐者天子之所自出也五霸果欲振王綱尊周室凡臣子之不當擅為者一宜請於天王而後可行也歴觀五霸之舉事無一請命于京師者雖出正無取焉况不正者十常八九故春秋凡書戰伐侵襲獲敗滅圍遷之誘獻捷以歸入殺取納類皆貶也書天灾皆貶也書朝聘會盟而干戈日尋皆貶也書天王崩而無葬皆貶也書公之出入違禮失節趨威慕利皆貶也書諸侯卒而無葬皆貶也至於弑逆之惡不必究其所由直貶也魯夫人講外事直貶也書新作書土功皆貶也書烝嘗雩示貶也不書即位罪不書也四公因事廢即位之禮史不敢誣書非魯史本有而聖人削之也凡魯國之惡聖人婉其辭而諱之臣子之道也豈有本即位而史筆具書而聖人削之者哉胡氏以為内無所承上不請命竊恐不然以十二公觀之禮樂征伐一切大政廢立予奪皆出於己之私意非魯獨然天下皆是也又十二公之始終二百四十二年之久朝天王者無二三數獨于即位必請於天王而後立能如是乎又以諸國之弑逆廢立一予一奪不出於大夫必出於羣公子不出於公子必出於國人不出於國人必出於私賄外援亦無一請命於天王者魯之八公即位能獨然乎吾不信也聖人傷王綱之弛逆臣賊子壞禮破義虐刑濫殺故明著其罪惡以昭示後人讀之雖牛童馬走便能别其罪之所在如權鑑之懸妍醜重輕不待言説人能辨之庶幾為惡凜然知畏解聖經者曲生義理晦瀆經法學者以傳為據此無他不明禮而論刑鮮不誤矣失禮則為罪罪則受刑春秋刑書天子有天子之禮諸侯卿大夫世子諸公子公孫后妃夫人莫不各有貴賤内外之禮禮樂刑政征伐孰得而主之戰國之世皆犯聖人之筆削煥然明白如書天王崩而不書葬非周之子孫有殯而無葬也為諸侯者不會葬也罪在諸侯也昭昭矣宋儒以孟子有英氣是徒以辭氣觀孟子孟子之心則不知也夫矯弊之言不得不激烈當孟子之時天下趨慕者以公孫衍張儀為大丈夫智者阿時從欲導奸逢惡以詐力相雄長求富貴利達愚者乞墦間之祭脅肩諂笑無所不至紛然蟻虱蠅蚋之不若人心之壞若是髙於此者陷而為䝉莊之流荒唐悠繆又非世教之中道故孟子辭而闢之曰人之所貴者非良貴也人人有貴於己者弗思耳矣又曰彼以其富我以吾仁又曰説大人則藐之勿視其巍巍然其於立功樹業窺伺攘奪滅裂苟且見小利而不圖大患恃口舌而不修實德俘為奴妾而不羞殺父辱母而不怒怨視五霸之事以為不可及為國者以至若是故孟子明斥其惡曰今之大夫今之諸侯之罪人也今之諸侯五霸之罪人五霸三王之罪人也又曰仲尼之徒羞稱五霸無道桓文之事者無己則王乎又曰我非堯舜之道不敢以陳於王前在孟子之明王道扶聖教於消亡絶滅之際不得不然耳譬於決癰破疽救焚拯溺舍砭石而示撫摩恥奔赴而嚴步趨可謂不知務矣故孟子自明之曰予豈好辯哉予不得已孟子之心其在於此乎言之若是暴棄下流猶不足以振起之甚矣人之難曉也哀哉孔子作春秋善惡明書之孟子之書輔翼春秋之箋注故胡氏解春秋專以孟子為斷例為學莫先於窮理理明則物見本末事見始終不急本而忘末不趨㓙而背吉不舍利而取害凡反此者見理不明故也戰國之君樂貴富急功利然國日削民日貧功日貶損利日消亡以危為安以尖為利身死國亡而不悔不悟者何也見理之不明也一時邦君孜孜矻矻者富國强兵而已然而欲富而不求所以富欲强而不求所以强多粟帛為富師衆則强聖人為國豈不欲富强哉孔子不曰足食足兵民信之矣箕子九疇之八政一曰食二曰貨三曰祀四曰司空五曰司徒六曰司宼七曰賓八曰師六極則貧與弱實在所惡孟子對齊宣梁惠之問歴談王道亦不過乎民庶而富富而教使知親其上死其長可使制梃以撻秦楚之堅甲利兵而無敵於天下然則前賢後聖豈不欲富强歟聖人之富强明所以富强之理而培植富强之本戰國君臣之急於富强不結網而求魚不具梁而漁江湖欲速而見小利竟至覆亡其愚其昏可哀也哉孟子之於蘇張孰迂孰闊後世之君臣尚監兹哉禮樂征伐天子之事也春秋記二百四十二年禮樂征伐之事自天子出者無幾合禮義而舉者又無幾自諸侯出者十六七自大夫出者十四三自陪臣出者十一二諸侯五霸為賢正而不譎者幾何故孟子曰春秋無義戰彼善於此則有之矣征者上伐下也敵國不相征也紛紛擾擾王綱解紐以不仁征不仁以不義伐不義利欲熾而正義消亡弑父殺君戮兄誅弟納賄納叛争城争地盟血未乾兵車已駕矣娶同姓上烝下淫鳥獸之不若當此之際有一管夷吾出糾合諸侯尊王室誅不義執正而言曰無易樹子無以妾為妻無有封而不告無曲防無遏糴聖人與人為善故於管仲而許其功於子産而稱其惠正猶避兵亂逃難者終日於荒林惡木虎狼猩犴之羣聞人足音則吁然而喜何暇計其仁人歟盜跖歟春秋始終二百四十二年不越十事計事不滿二千又事多相同若以凡例括之不滿百數何言之日食灾變雖所感不同其為灾異則一也弑君殺大夫雖其故不一其為大逆不道專殺之罪則一也男女婚迎則失禮得禮而已崩薨弔賻則自有喪禮朝會聘享則自有吉禮土功則重民力也戰伐侵襲取滅有貶而無褒救雖為善亦多與其同已鮮有出於大公至正者也盟出於不信口血未乾復相攻刼以此觀之亦貶而無褒也崔杼弑齊君齊太史書之崔子殺之其弟嗣書又殺之春秋書弑君三十六十遇大惡又皆直書而不隱邦無道危行言遜言不可危况筆之書乎春秋一書殆孔子既殁而遺於子孫門人而始傳於世不然以天王之尊而射之中肩者有之孔子弱國之一大夫誰憚哉安能為周身之防孟子講明春秋處極多周詩中與春秋事同者極多此二書讀春秋之綱領也世婚姻而為仇讐朝會盟而夕侵伐不相惡而用兵弑君殺大夫不以為怪視天王如路人淫荒昏亂不以為恥三綱絶矣九法斁矣春秋之世風俗如此看編年書法固當逐句逐字以觀褒貶然亦有今年所書之事得後數年再書屢書而其義始明者天地之變異不為尖亦書示儆戒也書天王崩而無葬不臣之罪著矣隣國書卒而書葬其義益明春秋雖以一事一字定褒貶然亦有事起於今嵗而善惡感應見於數嵗之後者亦有直書其事必再書屢書而其義始見者端本澄源原情誅意者也天王動舉五霸動舉即位不即位公如公至夫人動舉朝聘會盟侵伐戰滅亡奔敗績以及弑殺卒克侵入葬不書葬天灾變異土功祭祀書人書名書氏天地人一體也一氣也一理也人萬物生死於天地者也豈有天地變異而與人事不相干者邪但所應有遲速有小大有所鍳在庶徴精㣲之學人莫知之耳純孝之人伺候父母之容色即知其和違喜怒愛惡之所在不孝之人使父母形於語言見於杖責而嚚頑不悟正猶庸人之於天地何警戒之足喻哉天作孽猶可違自作孽不可活志一則動氣氣一則動志感應昭明不可誣也迅雷風烈必變聖人豈矯偽哉春秋灾異必書當於人事前後數十年之得失觀之則思過半矣元氣病則脈病脈病而形不病雖五年十年之久必死受病者無知良醫以為懼政失則變見於天見㣲知著者以為憂以義制事以禮制心欲敗度縱敗禮干名犯義無所不至此春秋所以作也晉范文子論鄢陵之戰范文子曰惟聖人能無怨惡又無内憂若非聖人不有外患必有内憂此詩人宴安鴆毒不可懷也之意而况外憂内患在目不以為憂而反興無名之師置人於必死之地乎所謂内外可憂者我躬之耋期將至嗣子之懦弱無為無死節服義以國休戚為己任之世臣尾大不掉伺釁以動形勢以為之張暴口惠而實不至下無懷慕相信之心姦邪雖遭天誅而無謀王體斷國論去􅊣興利之重臣無年水旱公私倉廩俱空而物價日増百司庶府雖曰粗備而無堪任事之實材兵卒雖衆而困窮憔悴疑而不信素不練習天下城邑平夷一旦有小警而無隍池門鑰之可守官吏姦貪有怨無恩小人復讎之念疊積於胷中公帑山積而私室懸罄伐之多力恃福無怨豐年未嘗不登而倉廩空虛穀價不減桑麻蔽野蠶績増成而布帛湧貴四方無虞無犬吠之驚而人民流移不安求仕者摩肩踵接填塞吏部及照職擬注毎恨無人一日萬幾不勝可議中外大小百職黙無一語屢下恩詔招來流民而逋逃不復寳鈔權百物之重輕物日重鈔日輕不聞一日之救弊功無不報勞無不酬混一六合皆軍旅之功而憔悴日甚萬里中原五政七賦荒紊不治而貪海外之土按大典本闕無别本可校謹仍其舊癸亥冬觀綱目讀史傳知識時勢最為𦂳切知時識勢然後觀人之是非成敗不至於成敗是非無所鑑别蕭曹最髙處繼秦政苛繁而約法三章爾譬多病之人元氣初復一切禮法俱不可責但當寧靜安養而已所短者病愈强健遂併禮法而俱廢所以不復三代之治史傳一人之本末皆備始焉如何起身中焉如何終焉如何而盖棺然亦十得二三前人嘉言善行墮失者多且如子房之佐漢今之所傳五六事耳五年之戰鬭事定之後又若干嵗而卒其實良等豈若是之簡哉不讀通鑑不見遷固之冗長不讀通鑑綱目不見春秋之謹嚴綱目法春秋通鑑編年紀事無以加矣然後知作史之制不繫道統不關治體善不足以為法惡不足以為戒浮詞細事皆不足取不惟作史之為難讀史亦難讀之而能去取為尤難讀楚辭雜言無前賢之心思不能讀前賢之辭章予少時讀楚辭輒昬睡不能終篇盖無屈原愛君憂國幽深鬱結清苦惸獨終天無窮難明之悲思痛甚則聲哀情苦則辭深非若得意歡暢之言津津然洋溢於外也今嵗方悟若讀楚辭當句句緩讀求言外意如問病人弔孝子恤其情而哀其苦庶幾得原文言意讀老子虛則能容能受靜則能見能制柔則能勝剛弱則能勝强彼務剛强氣盛極則衰我以柔弱不暴則氣蓄極而發制敵不可當老子一書全是如此故曰不敢為天下先又曰江海所以為百谷王者以其能下之也又曰知其雄守其雌又曰專氣致柔又曰虛其心實其腹弱其志强其骨又曰物壯則老又曰强梁者不得其死又曰以無事取天下又曰當其無有車之用又曰禍莫大於不知足又曰致虛極守靜篤萬物並作動也吾以觀其復靜也夫物芸芸動也各復歸根歸根曰靜靜曰復命又曰曲則全枉則直又曰飄風不終日驟雨不終朝又曰重為輕根靜為躁君又曰善行無轍迹老子一書知天道之好還而每事務從其本世之所尚忘本而務末忘内而務外先自盈滿其勢不久而還凡物始於柔弱而終於剛强始於拙訥而終於巧辯始於素朴而終於華靡始於清靜而終於有為終者氣勢之盡也始者氣勢之方興也以方興而待將盡老子之謀深矣富貴莫大於得天下聰明莫大於為聖賢而聖人謙退而不居不義而不處其視一切外物為何如哉此老子所以屢舉屢發以警學者二義在語孟六經具有之顧後學不之察耳讀吕惠卿莊子解漆園一書何為而作也當是之時王道絶聖學廢周擁虛名天下分為戰國時君世主名卿大臣搢紳士大夫之流拘於形氣之私汨於公利之末束於名教之土苴小智自私百偽日熾如醉生如夢死膠膠擾擾朝成而夕敗乍作而遽非楊墨亂於前蘓秦公孫衍張儀之徒汨其中獨一孟子而世莫之信中原之人自相血肉而不相恤甘為倀鬼而莫之悔先王之遺法餘制莫之能正莫之能救故探本反樸明天理之莫非自然凡一切有為之具不足恃一小大齊彭殤此身非我有而况外物乎貴賤成敗是非孰為真是是意也曹參得之哀暴秦之殘酷紛若客來飲以醇酒一務於清靜無事與民休息亦矯弊救時之書也施之秦末漢初則可譬猶人困於奔命虐於禮法擾於多事乏於智力昏眊疲憊致疾而病危當此之際保全䕶養之法莫過於萬慮俱忘安眠軟食恬淡虛無靜以復真此書不為無功若夫身安氣盛自身而家人倫日用之間百務不可一廢迤邐當舉而行亦欲以靜以養疾之法行之一歸於無事能如是乎在吾六經二者不偏廢自有隨時中道萬世不斁長行久安之大法存焉不螻蟻王侯不粃糠鐘鼎不樂富貴而悲貧賤正其義不謀其利明其道不計其功飯糗茹草若將終身百官牛羊若固有之無入而不自得君子所性大行不加窮居不損以之持身則簡而正以之齊家則順而有法以之治天下則理而有分生則盡其常死則得其正一舉措一話言無非自然無非天理無非至道無有求而不備志於道者當以論孟六經之純正權衡鑑照老莊之矯枉過直奮激駮雜以老莊之所尚道德真樸虛無無為自然清靜純一全實道全德備則仁義在其中矣真樸則智巧無所施虛無則心不留物物莫能梗無為則一本於天不假人力自然莫非天理上下與天理同流清靜則萬變來前一無所有全實則萬物皆備於我而無一毫之偽此數者在吾書皆有之至於踐履作養自有梯級尤為細密不若老莊之漫為麤説但後世學者急於聲利梗塞於物多欲有我理性天人之學畧不留意不之察耳試將語孟大學中庸六經切身句句體認玩味又從而履踐之則自有所學心為物役心為事塞謂之無一學可也心本虛靈明徹如止水明鏡若事至物來不留於意妍醜隨見何有困弊死生壽夭貴賤貧富成敗得喪禍福榮辱是非邪正喜怒愛惡哀樂强弱剛柔勞佚老少夢寐彼我公私動靜語黙出處用舍常怪生殺刑賞智愚早晩遲速功過小大短長髙下若此之類不可徧舉其理在吾儒書素有中和自然從容不廹之道老莊則矯枉過正雖然亦為俗儒發也論莊老以後世觀之孔孟自孔孟老莊為老莊又唐𤣥宗以老子為祖極尊榮之號黄冠野服者師事之儒者則宗孔孟故岐而二之若氷炭之不同以當時觀之老子孔子同時孟子莊子同時著書立言畧無一語相異同相是非老莊之書所以與吾儒異者特見當時愚儒俗士束縛於名教禮法而不自得惴惴戚戚於死生憂患而喪其神守死生於功名富貴而意必固我誇矜眩燿小知薄能而以舉天下莫已若棄道德仁義之大本而徇辭章文藻之末技故矯其弊而為言爾但過直駮雜者有之論釋道釋氏言空寂老莊言無為自然二家之學吾儒皆有之但吾儒兼動靜有無而言不失於一偏仁者靜知者動寂然不動感而遂通人生而靜天之性也感物而動性之欲也維皇上帝降衷于下民若有恒性克綏厥猷惟后惟天生民有欲無主乃亂為政以德譬如北辰居其所而衆星拱之無為而治者其舜也歟夫何為哉恭己正南面而已矣是故君子篤恭而天下平又曰安處善樂循理又曰樂天知命故不憂又曰先天而天弗違後天而奉天時又曰禹之治水也行其所無事也近世儒者以為釋氏之學識心見性吾不信也父子之道天性也釋氏無父子一隂一陽之謂道有天地然後有夫婦天地絪緼萬物化醇男女搆精萬物化生釋氏則無夫婦父子夫婦人之大倫天地賦與自然之性而釋氏違天背地强絶滅之何以謂之識心見性老氏者亦然終不能違固然之性以姦淫而為夫婦以姦淫所生之人而為父子孟子曰口之於味也有同嗜焉老氏亦曰如享太牢今之為老子者不食五味酒肉矯制其性豈無為自然之道哉釋氏創為祈禱求福免禍延壽益算之説蠱惑庸愚福者善之影禍者惡之響影響吾形聲之應冥冥自然之天理惡得而私之神廟土木無靈之偶人惡得而有之戕伐不慎則多病夭横保身修德則病少而年長念佛天尊何能致之二氏之誕妄如此近世大君大臣閭閻細民信入心髓者何也吾儒務實循理二氏僥倖苟免終亦不能僥倖苟免然則何益矣論性格物窮理舍近而求逺背源而討流學愈博而愈逺至於論性不求之於我紛紛然求之於人囂囂然辨之以口舌誇竒鬬異何不思之甚也性情者與生俱生才有此心便有此性未發已發真好真惡寧不自知自覺上智下愚固有等級今雖至愚之人有人稱之曰汝聖汝賢汝才汝能則必喜有人短之曰汝㓙汝頑汝不善汝不才則必怒而不悦若然則性果好善歟好惡歟有人稱之曰汝所言良是所為良是則必喜或曰汝所言所為皆非則必怒此好惡之常情也然則好是而惡非歟好非而惡是歟安在其為性惡邪安在其為善惡混邪所為上智下愚氣稟清濁之不齊也非性也性即理也天地生物寧有二理哉曰然則韓文公所為堯舜朱均莫敖越椒皆非歟有常理者理也故曰恒性又曰秉彜又曰民受天地之中以生變者反常也堯舜者常之至美至善之極也中人者常之中也莫敖越椒氣變之至惡者也反常之極者也且左氏立言好神怪前知者多聲入心通聞聲知德者莫如聖人聖人閲人多矣孔鯉顔子之聲音言語孔子日聞而日聽之矣何以不知其夭以死歟韓子舉二人之言槩生民之性既不可信左氏之誣知其滅族斷無是理夫聲之喜怒剛柔心之發也啼泣有是心哉就令氣稟之惡而有是聲特二人感受之異又惡可以為天地之正理正氣斯民之恒性也哉人以毫末之身宰萬物贊化育配天地者性而已以此性稟受上天之付與則曰命循性而行人倫當行之路則曰道循此性自然之理立法於天下後世則曰教此性之不偏倚無過不及則曰中發中節則曰和真實無妄則曰誠稟仁義禮智之良能萬古不變則曰五常具此衆美得之於天則曰德見諸行事則曰行感物而動則曰情成就功業則曰才欲有所為則曰志曰意曰念慮既有此身此性則有父子兄弟夫婦長幼朋友君臣則曰人倫合乎天理則為正性徇人欲則為氣質語言者性之聲也文章威儀者性之光華也氣者性之徒卒也心者性之安宅也君主也郛郭也聖人得氣之純全正大靈明豐厚性之性也賢人則不能純全愚人則物物反是一隨乎氣稟矣人之言行凡有不得者皆當求之於性至於禮樂刑政一切典故制度文為亦不出於各人之性情故曰生於其心害於其事發於其事􅊣於其政韶舞盡美鄭衞哇淫豈不明驗有唐虞之德性則有唐虞之文辭政治博聞强識學藝為易而存心養性為難道者何也此身日用當行之行也在天則為自然之理故曰身外無道性外無道物者事也萬事皆自性上流出内聖外王下至於六藝百工得失巧拙莫不出於性故凡行有不得皆當求之性不求之於内而求之於外人求之於口耳手足愈勞而愈無所得此莊子所以有效顰學步之喻斵輪解牛斵堊承蜩之説人性萬物之靈而為百欲汨没反不靈於物何以言之有功名以感其心志事業以敝其精神嗜欲紛華甘㫖輕肥以眩其耳目縱其口腹亂其血脈甚則貪饕迷謬君子犯義小人犯刑於是醉生夢死恬而不寤然則機心見而鷗去人反不如鳥矣人得其全反陷於偏物得其偏反能全其偏是以人而不如鳥也明矣狼虎之父子蟻蜂之君臣鴻雁之夫婦豺獺之報本人則兼有之然物能全其一偏而不失其秉彝之性是反得其全也人雖兼之而為物欲所蔽而失其良心是反得其偏而又不能全之也然則所謂靈於物者果何在哉孟子不曰堯舜性之也湯武反之也此聖人教人求全其全之切言也可不思之可不勉之可不戒之畏之哉人之文章事業大小工拙之不同莫不係乎德性氣稟之厚薄氣稟清明德性純正不遭時則已萬一遭時吐為文章發為事業煥爛盛大必有大過人者苟氣稟德性偏駁發乎外者必不相掩雖學問該博言語無愧求其行事則心與舌違故先儒之言曰身外無道性外無物又曰治性之道必審已之所有餘强其所不足可謂先務矣湯武所以為湯武而有湯武之事業亦由身之反之而能然也聖人所以教人格物致知正欲使人明其性分之固有也後人之博聞强記徒以外物填塞胷臆臨事不為己用就能學步效顰物不能成已亦喪失故孟子教人以學貴自得資深取之左右逢其源亦窮理養性而已耳論取人取人之法蘇東坡輩論之詳矣以欲公而無私實而無偽莫如科舉詞賦經義制策宏詞明經其次則軍功勞效謀畧武藝法律省部臺院諸令史雜流最髙者本路廉幹官本鄉有譽望之善人衆口一詞保舉茂材異等孝弟純備指陳實言實行最下之科任子是也捨是數路餘無可議今皆無之可斟酌時宜之緩急者舉而行之至於每科規模自有前人程式相時而増減之可也國家悞人愚人甚於父兄父兄之悞子孫甚於師友氣血利欲之情常勝義理之性常㣲為國者曰有能學為程文者吾富貴之尊榮之不能者貧賤而為編氓故人一趨於國之所向雖為父為兄者不使之學而不能禁也父兄子弟同氣餘體不習而同親愛天性莫知其惡師友雖欲正之而莫能也盖國家以利誘父兄以氣同所以入之也易觀夫學為程文者駢四儷六立題綴聯之外一無所知一莫之學吉凶之禮則聽命於釋老之徒與所謂隂陽家者流樂學則聽命於樂工才欲拈弓矢習射則互相譏議曰汝欲為武夫乎讀兵書則曰汝欲為麤官乎御車之法廢絶已久不復挂齒學書則曰汝欲為書寫待詔乎學數則曰汝欲為壕寨之流乎談天文則曰汝欲為司天算厯官乎論觀人之法則曰汝非相者也論養生則曰汝非醫師也講經則曰汝欲為三禮學究耶言性情則曰是乃為老氏釋氏耶學者之所當學内則正心修身齊家外則窮理治天下上律天時下襲水土祖述堯舜憲章文武聖人之所學凡人之所當學者皆莫之學六經語孟之學皆莫之知一旦射策偶中出而治人撫萬家之邑寄百里之命物情民事一無所知走卒舉案來前則一聽命於胥吏頗聰明者則曰毎事自有國法反為姦黠揶揄玩侮而不滿一笑國家所得之人材其愚若此欲下民之治安無寃德化治政之成立不亦艱哉昇平無事苟延嵗月一旦少有不虞河北二十四郡淪胥於賊不亦宜乎然則立法取人可不慎歟不惟誤人為國家者乃自誤也辨人材最為難蓋事有似是而非者剛直開朗似刻薄柔媚罷軟似忠厚廉介有守似褊隘言訥識明似無能辨博無實者似有材遲鈍無學者似淵深攻訐謗訕者似端直掩惡揚善者似阿比一一較之似是而非似非而是人材優劣真偽每混淆莫之能辨也惟聖人為能心公識明衡鑑昭設君子小人之至前察言考行視所以觀所由察所安不以言舉人不以人廢言取德以實行取材以實效詳以理悉以義雖萬態億狀眩耀藏閉莫之或欺為人之任亦重矣上承事父母下法型妻子旁親睦九族外和同鄉黨隣里有官守言責則稱其任至於切己之學格物致知誠意正心一言一行務要中理仰無愧俯無怍成已及物文章政事勲德生有益於時死垂聲於後如是則庶幾不負天地父母之所生方能踐形少盡人道不然則雖不作過惡無毁無譽總是虛負天地父母生己之恩不盡為人當然之職分與不才之樗無用之草春生秋悴無以異也人肖天地天地之所能者人皆能之天地全而生之自謂不能者孟子所謂自暴自棄張子厚所謂違曰悖德害仁曰賊濟惡者不才其踐形惟肖者也請以嵗功觀之自一刻之積而成一時一時之積而成一嵗風以動之雨以潤之日以烜之雷霆以震起之澤以説之艮以止之金以燥之霜露以結實收成之氷雪以固其本根而胚胎之日往月來斗迴星布乾君坤藏無斯須之停留其勤豈不勞哉其功豈不大哉故易曰大哉乾元萬物資始至哉坤元萬物資生人之為人自孩幼而至冠昏理性日開事業日富成己成物自强不息蓋棺而後己此身雖殁又能與天地流行者以學術福萬世如是而庶幾謂之人矣論作養士氣天之健氣以行之地之重氣以舉之日月之光雷霆之震氣以充之然則人之有猷有為有守羣邪不能枉衆譁不能亂處則為世師表出則為國柱石愛名節如飢渴之於飲食富貴軒冕貧賤糠粃安於義命不留於心此非至大至剛仁義中正絶俗葢世之氣則不能也古之人吾不得而見之求之於今内則朝廷貴顯外及山林隱逸俱未見其人焉所覩所聞以寸級斗禄為初心以髙牙大纛為終願居官守者不以不得其職為可恥負言責者不以不得盡言為可辱隨可隨否旅進旅退朝拜官而夕斥之非以直諫而獲罪總角入仕白首保禄非以髙朗而令終大冠長裾孔行孟趨則其中文不足以華世學不足以經國問其志則泊然枵然弱水大瓠亦不自知其何處止泊一時人物雷同波流靡靡如一然則國之元氣尚何頼焉萬方恃之係朝廷輕重安危兆民頼之為四海之治亂禍福者果誰在哉至於拯弊救時輕張暫弛補苴罅漏亦皆無法朝令夕改自是而自非之不滿細民之一笑者不可枚數士氣至此亦可哀也朝野之人材若此一旦不能髙枕太平水旱飢饉流殍賊盜不測非常之變則何以禦之作養士氣以淺見視之似為迂闊愚獨以為不可不急之幸試思之水之養魚土之養木雨露之養禾飲食之養口體得之則生榮潤澤不得則死至於心獨無所以養之者理義者養心者也故孟子曰理義之悦心猶芻豢之悦口孔子曰志於道據於德依於仁游於藝又曰興於詩立於禮成於樂孟子曰居天下之廣居立天下之正位行天下之大道窮則獨善達則兼善人不以義理涵養其心異於禽獸者幾希故無惻隱羞惡辭讓是非之心孟子直以為非人無集義之氣則惟口體是從殆犬馬之不若也尚何以為人哉義禮以養之則富貴不能淫貧賤不能移威武不能屈故能為百世之師參天地而贊化育矣人之所以人欲日熾而天理日消者何也從耳目口鼻氣血之私欲則熾者益熾消者益消行之以恕愧之以恥剖去意必固我之藩籬則消者日生熾者日滅孟子所謂其為人也多欲雖有存焉者寡矣莊子所謂其嗜欲深者其天機淺道聽而途説德之棄也夫學所以廣才也養德也才既廣德既成然猶藏於中時不偶則不發故曰溥博淵泉而時出之有賤丈夫焉聽之於道而説於途是自棄其德也故曰鷙鳥將擊必匿其形千鈞之弩不為鼷䑕發機此言當動而猶當慎密而不露圭角况其以不相直之小利小得可激而動歟此寗武子所以為愚之意也當愚而不愚不惟無成而反為速禍詩曰民之多辟戒其無成而速禍也獨未見夫善射者耶發矢則期於必獲雖有巨獸在前林木之所蔽溪澗之所隔弓力之所不及則不發也智者之於言行亦若是而已矣其人言與某謀事不三數日乃曰我何嘗出此言也若責以昏眊則神識虛明斷以自欺則誠實不妄然則何為而然也曰於論是也何有傳不云乎視而不見聽而不聞食而不知其味者心不在焉前日答汝語話皆漫應爾所謂仰面貪看鳥回頭錯應人賓主語話毋怪乎應答許諾之難毋喜乎言莫予違而酬答之易難者深思易者漫應深思則久要不忘漫應則出口已不記憶故諺曰輕諾必寡信非寡信也不難乎言可復也推原是心本不以事為可重故畧不留意舌音未絶而已忘之矣聖人之所戒者今之學者皆犯之所先者今皆後之君子欲訥於言而敏於行敏於事而慎於言古者言之不出恥躬之不逮也巧言令色鮮矣仁予欲無言是故惡夫佞者駟不及舌多聞闕疑慎言其餘今吾於人也聽其言而觀其行君子恥其言而過其行其言之不怍則為之也難南容三復白圭孔子以其兄之子妻之言而有信道聽而途説德之棄也以是觀之聖人之於言語戒歟許歟先歟後歟後世之學校師傅訓誨督責不明經窮理不存心養性不敏於行自始至終唯以語言為急務為極至尚無用之空言而忘成身兼善之實德豈不悖哉海上逐臭之夫久而不聞其臭風俗之移人也亦然久而不知其非今之老師宿儒文章事業且置而勿論至於言語毁譽之間漫不知輕重髙下淺深毁則微罪而論死譽則聖賢之所不敢當者加之於學之晚近至有才德兼全之語風俗昏冒浮靡以至於此良可惜哉古之所謂清論公議孰從而聞之孰從而辨之具曰予聖孰知烏之雌雄此之謂也予之所懼者不止於此暗者自以為明弱者自以為强不肖者自以為賢卑者自以為髙越理犯分冒法觸刑干上凌長此風浸長恐非下無覬覦之道也士辨士失其道也久矣失其道則失其性失其身所失非一而已其失也始於為學之差不惟學者之差而傳道授業為父兄師友當陶鑄甄别作養摩勵之任者從而為之差内則父兄外則師友下則鄉里上則大臣教士取士既為之差承訛習繆其差愈深莫之能救差者何也盖所學所取者士道之土苴文章之糟粕衣冠語言之糠粃影響威儀動作之文飾姦偽求其志守身治家事君之節行才能則無有也孟子曰士何事曰尚志曰何謂尚志曰仁義而已矣今之為士者志在富貴聲色而已耳伊尹之志恥其君不為堯舜一夫不被其澤若已推而納之溝中又曰天之生斯民使先知覺後知使先覺覺後覺予天民之先覺者也予將以斯道覺斯民也伊尹之志豈止於成身而已乎孟子曰守孰為大守身為大非其義也非其道也禄之以天下弗顧也繫馬千駟弗視也今之守身者權勢所在奔走趨嚮阿媚迎合取容求悦脅肩謟笑不以為恥立志守身凡下若此則責以居官事君之節責之者誤也舍節行取文才而以為士然則儀秦商鞅李斯孔光張禹柳子厚劉禹錫王荆公吕惠卿文辭之雄照耀古今才術之優足以遂姦當時後世置之姦邪小人之流不齒清議然則不以文才取人也亦明矣而况今日之以文辭自負者剽竊補綴陳爛冗長著述數十萬言而無一新語施之於時政迂闊執滯而不可行施之於名教則不足以垂訓施之於金石不足以取信後世其視劉禹錫柳子厚輩若螢火之視列星欲為文章糟粕土苴而不可得所學一差豪傑莫起遂令若輩自以為賢俊知治體識時務又能藻飾皇猷品章庶物欺世盜名䝉昩卿相以取髙位言不顧行行不顧言一日臨事手足俱露使上之人疑而莫信曰某人也世以為賢舉而用之則事跡若此某人也世以為材舉而用之則言行若是賢者材者若是不賢不材年未髙學未至不為人所稱道者其可用歟吁吾道之不幸以至於此雖善為辭説者莫能文也豈知取士之差取其末不取其本見其文而信其實以文藝之小人而為君子大賢之流品以滅裂剽賊無用之浮辭當致主澤民之重任所學非所用所用非所學古人之用人先求其性行次擇其材能學者之應用養其氣識修其天爵尊德性道問學今之用人與學者之應用能如是乎以毁譽定去取以末學要時用四岳之薦舜曰克諧以孝烝烝乂不格姦子貢之稱孔子曰夫子溫良恭儉讓以得之孔子之問子游曰女得人焉爾乎曰有澹臺滅明者行不由徑非公事未嘗至於偃之室也古人之取人豈以浮辭虛文哉子使漆雕開仕曰吾斯之未能信孟子亦曰今之人修其天爵以要人爵猶且以孝弟忠信而要世用為士者曷嘗以雕雲鏤月之詩抽青配白之文蓬頭垢面之亷閉目忘言之謹以欺世取寵哉士道之不明士行之不立學者與傳道者之罪也取人之差而不得其用以至於傷士風而敗政治用人而不求其實也使其言之可取猶不以言舉人况無用之空言也曹參為相取木訥於文辭重厚長者吏之言文深刻欲務聲名者輒斥去之當時稱治後世以為賢相然則為國擇人者詎可以虛文浮譽仕久年髙者即謂之賢士而用之及委之以事而事敗乃爽然自失曰士止於此士不可用噫豈知所用者非真儒碩士而皆口舌文辭欺世取寵之小人也曷亦求其本矣何謂本心術也節行也事業也最害人者臨下為髙拾掇陳言自以為髙世之文剽竊念誦往事陳迹自以為命世之才主癰疽與侍人瘠環偶沾一命自以為希世之遇寸長管見自以為集大成之學行比一鄉自以為全德智效一官自以為澤物之功世衰道微無與之較余所見大抵若是而不相逺世稱以為元老大儒已亦自負而不恥可哀也哉孟子曰均是人也或為大人或為小人養其小體為小人養其大體為大人氣稟既差性情亦異性情識見既異則事業之大小亦從而不同竊嘗觀於市井田野之氓雞鳴而起孜孜汲汲營求一飽而不得遂其心者有競朝夕錐刀之利者有為妻子田宅計者有殖貨財潤門第者有財貨既足曲邀横結求一級半資叨竊名位而欲以榮身者至於寒忩文士春禮樂而冬詩書亦不過以雄文大筆華世取寵沽名弔譽以求富貴利達者就其志之髙者而論之又不過委順迎合媚勢迎君假權營私為一時富國强兵功利之謀又其大者粗知王道霸術之異救時矯弊然内無實學無大過人之材無厭世之德無鐵石之心無視死生富貴壽夭貧賤禍福之來一處之以義者總是數者論之其志趣小大雖不同其歸於私己苟利則一也若夫命世之材豪傑之士隱則可以處鄉里為天下之師出則可致君澤民為帝王之佐成至治之功著書垂訓可以繼往聖而開來學若是之人雖百世無一焉數百嵗之間間有一二困苦不遇又終老於巖穴時君世主雖或聞知敬慕而不能舉舉而不能用用而不能盡其才盡其才而不終始如一尊敬若師弟親信如父子終必為小人之所間絶而使前功盡廢吁天下之才之難也如此才之不遇之難也又如此欲求治世不亦難乎今之為士者問有一二議時政之得失憂天下之安危必叢聚而笑又從而譏之曰不狂則迂也噫燕之巢幕迴飛數日察視詳審一有欹傾墊危則翻然舍之而去必其棟宇堅密主人慈祥而巢安是鳥之心必以為主人不慈祥棟宇不堅密則巢不安巢不安則身與衆雛何所依乎人之處天下可以不如鳥乎天下不安則一國不安國不安則家不寧家苟不寧身與子孫安焉否也是以古人在其位任其責則竭力效死而扶持之不在位不任其責見其後禍之幾而知其無可奈何而不終日安處奮然有避世之舉既明且哲以保其身其是之謂乎然則為士者身修家齊之外天下安危之勢雖窮居陋巷不可一日而忘諸心也以伊尹太公子房孔明之志為心則可矣顔子問仁孔子告之以克己復禮善學孔子者莫如孟子著書三萬言或告時君論為政論與人交莫不本於克己故曰行有不得皆反求諸己竊嘗思之求諸己則心廣體胖遷善改過所守者至約而所施者至博不求諸已則怨天尤人於悒憤恨無所不至君子小人之分在此二者之間耳人之讀書存心養性克己復禮之功苟不能進終無自立地位忽臨毫毛利害所學皆不為用雖或一二中節亦偶然耳邵康節云風化物之飛露化物之草百草之死生嵗各不同今嵗此地生蓬蓼明嵗變而為蒿茅後嵗化而為莧苔又後嵗復化而為蒲蘆有種者不必生無種者化之而滋殖豈知百草之生息在於所感本原之何如殊不係乎種粒至於世之治亂人材之美惡亦猶草之於露耳葢天地泰日月昌時則聖智賢哲才能美傑應類而生發而為事業則文物昇明萬善畢舉乾坤夷而萬物各得其所及其天地否日月不明氣運舛逆則明主姦臣醜類惡物亦從類而生則事事物物顛倒錯繆而天下大亂是理也莫非天也然求其弛張之幾時出乎氣數流轉之當然雖天亦無如之何耳區區薄學欲以人勝天辨之以口舌御之以權謀可謂陋矣苟能觀易之㫖得聖賢處否之道則庶幾儉德避難遯世無悶危行言遜而無毁無譽矣不然則鮮有不陷於禍者也竊嘗誦孟子之言曰晉楚之富不可及也彼以其富我以吾仁彼以其爵我以吾義又曰萬鍾不辨禮義而受之萬鍾於我何加焉見其凜凜英氣殆似諸侯不得友而天子不得臣矣觀三宿出晝之辭曰吾豈若是小丈夫然哉諫於其君而不受則怒悻悻然見於其面去則窮日之力而後宿哉然後見聖人之心未嘗一日忘天下未嘗苟且自尊大而傲軒冕亦未嘗違道屑就枉尋直尺而變其所守也故孔子以用則行舍則藏許顔子而以三仕無喜三已無慍賢令尹子文聖人之心以謂用舍在君而行藏在我何喜慍之有一加喜怒於其間則是以身之窮達為懷而不以道自任也不然則是恃材挾德喜其知已而慍其見棄也二者皆非聖人之道且喜慍交攻未有不變其所守者也莊周以此身非我有而肯以外物憂心哉未能如莊周之外形骸但能於此身必有之外淡然無欲者賢於人亦逺矣世之人勞苦其心思賤辱其軀骸豐積乎無用之長物無論不能得雖得之而不能久為我有又適用以禍身何其愚也吾嘗燕居靜思口體之累宫室衣食器皿必不可闕者已不勝其煩况欲區區於不適實用之外真愚人也不好勝則不能成過人之事業才好勝則不免於矜誇禹之所以不矜不伐者只是見得自身當此之時合成造化等事業何敢矜伐不成此功反得罪在天此伊尹自任所以覺斯民也今之俗儒粗有剽竊之文筆不可以及人利物驕矜自克見於顔面形於語言其去聖人奚啻天壤哉自伯夷叔齊長沮桀溺接輿荷蕢之後四皓之避秦管寧之蹈海滄海横流以及東晉中間鄙夷國步隱逸之士不為不多千載而下獨推淵明何也誦其詩讀其書見其為人不得不為之稱道觀淵明之詠貧士諸詩暨羲農去我久東方有一士先師有遺訓清晨聞叩門辭家夙嚴駕少時壯且勵諸章則淵明之所學所以自任者豈徒嗜酒傲世賞花栁醉盡江山而已耶後人之知淵明者目為閒適放曠長於作詩而已豈真知淵明者哉陸宣公之學有倫有要聖經之權衡古今之治亂得失一一精究故能視天下如指掌鑒時務如家政當時君臣如父子昆弟故設謀立論用法處方如和扁之治病無不對證如羿基之善射發必破的學贍才優余每讀奏議恐篇章之盡悲士風士之自待也不淺非徒髙自標置虛立崖岸使人不可攀躋而已也葢為此身所係不獨上以光祖考下以成子孫居鄉里則化居州郡則為民具瞻處朝廷則福澤天下以及後世而垂無窮聖人所謂任重而道逺者正在此耳今之士大夫居閒處獨怨天尤人曰不吾知也及其居髙位食厚禄怙寵患失依阿緘黙荷眷顧䝉寵渥始終二十餘年之久而未嘗建白一言開陳一事樹立一政皇皇汲汲日夜營辦者廣田宅多妻妾殖貨財美車馬聚玩好媚權貴援私黨來賄賂衮職有闕而弗補綱紀壞弊而弗救人民塗炭而弗恤方且偃然自得以為通方達變輕煖肥甘夭淫艷質自娛之外而又欺世盜名翻經閲史鼔琴焚香吟詩寫字以為髙雅以示閒暇使一時後學無執守者欽仰踵效而恨不能及唇吻攘奪者得以為謗訕沮毁名教之口實潔身特立之士語塞而不敢辨吁真萬世之罪人也人殃鬼誅不在其身不在子孫吾不信也士以器識為本器欲宏大識欲深逺器不宏大則不能容物識不深逺則不能見微而知著士大夫平居無事自負不淺忽臨毛髪事則莫能承載揺唇鼓舌援引往昔動輒千萬言道是非如辨白黑目前之事則不知也何以言之切身之事莫切於進退切時之事莫切於論政治之得失人材之優劣一進一退俱不中節可亦進不可亦進利亦趨害亦趨不察得喪不問義利譬如餓虎飢烏見食而不能見穽見食而不能見網罟切身之灾貪昧若此政治人材烏能辨明苟得其位阿時而行顛倒訛繆一莫之問又從而文飾之褒美之苟得其所依托跡於非類逢迎媚合惟恐不收録於門喪身敗家之禍不旋踵而至終亦莫之悔悟生陷身於惡流死誅名於清論所得無銖錙所喪如丘山遺患於妻孥播惡於無窮自以為明且知可悲也夫余毎見俗儒技癢獻言投策輒内省以為深戒原其意髙者不過欲行其所學卑者止於技之見售以為取富貴之媒而已貪得誘於前念慮感於中殊不知是人也可以與之言歟有可為之材歟操可致之權歟懷有為之心歟四者俱無冒昩以前不猶鼓音於聾眩色於盲者耶求有所得不亦愚乎而况以背馳紕繆之鄙言泥古迂闊之陳術既不足以動揺當途之權貴又不能流芳於簡冊徒使世人指摘若輩皆以為士夫之流我輩例從而受謗寃哉言欲訒量欲𢎞事欲密然何術而能然也曰是不難能知愧怍之過終身不敢言不敢復犯自恕自隱則三者不勞而能矣論隂陽家星命家以年月日時胎為命又以吉凶貴賤貧富係乎所遇之運命巧不如運巧此説亦似有理譬如千花百卉春則皆生冬則皆枯此羣木之大數也至於開花結實時各不同有春而花實者有夏而花實者有秋冬而花實者時不至則不得花實人命之於運亦猶是也命雖巧終身不得佳運正猶名木未至花實之時而先為霜雪風雨雹雷霆牛羊斤斧所夭折亦不能遂其材矣故曰苗而不秀者有矣夫秀而不實者有矣夫亦此理也世所謂隂陽家以十干十二支推算人命貴賤壽夭貧富賢愚問亦能中定立門户不下千百推究其理專論五行之休囚旺相相生相尅消息盈虛輕重强弱得位失位有氣無氣偏駁純粹有應無應展轉推窮無有窮盡然而天壤間一日之内生生無算不過十二時所生之人止分為十二等當時豈無與聖人同時生者豈無與帝王子孫同時生者何其下愚貧賤相去若此其逺也論至於此則其術窮矣
