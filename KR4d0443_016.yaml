body:
  text: 紫山大全集巻十六元胡祇遹撰碑舒穆嚕氏神道碑天將以神武睿聖之君開基革命則必錫以智勇雄偉之材為之將相成湯得阿衡而革夏武王獲尚父而翦商秦得蒙恬白起漢得子房韓信視取萬方奠九有如捲席破竹摧枯拉朽不勞力而定自是以降迄於今一廢一興修短治亂雖不同而君臣際㑹股肱心膂莫不皆然我太祖皇帝起朔方入中夏不數嵗而奄奠萬國攻堅平險伐謀破詭固出於神武睿知之獨斷而其陽開隂闔鼓雷霆之先聲虎搏鷹揚震風雲之餘勇者豈無人焉河山左界東際于海北首燕雲南抵淮漢摧鋒挫鍔聲實相應順則撫之逆則折之一戎衣而為我有者實太師穆呼里國王忠武之功也太師之貳將曰鎮國上將軍御史大夫舒穆嚕公公薨五十有五年公之嫡曾孫良輔狀公之平生以神道之石來徵言謹序而銘之公姓舒穆嚕氏小字額森其先特爾格人仕遼世為大官兵亂譜牒廢世次莫能考公㓜頴悟未冠雄勇過人以將家子弓槊鞍馬不習而能及長精通吏事契丹女直兩朝語言風俗政治典故耳目習熟仕金為譯事未幾以明辨廉幹遷西北路招討使幕官繼以軍功拜萬夫長公請讓職於族兄章達納願以副貳自處金帝嘉其遜悌友愛而從之今自道陵崩逆臣擅命乾綱解弛宗室貴戚素無威柄重以宴安佚樂昇平日久平居無事口脂靣藥軟媚如婦人女子一旦内亂遽起惶駭憂懼莫知所為我太祖提兵南下所過城邑從風而靡公歎曰天時人事上下相應金徳衰矣事可知矣中擾而外潰吾以窮身孤軍其將疇依天命其在北乎逆天者不祥遂同族兄率所部之衆而歸太祖皇帝帝以公𨽻太師穆呼里國王帳下王適欲取東京兵駐臨潢髙州以公為前鋒覘其虚實圖攻㧞之策公倍道兼行距城甚邇道值新官留守來之任公襲殺之獲其章服誥命遣吏紿報城守者曰新官至矣守城吏出迎即入公廨中聽事謬謂僚佐曰城樹以兵何也吏以邊聲對公曰吾新自朝廷來他郡寂無此音且俱不設備毋妄苦士民下令撒兵安以溫語老㓜為之帖然濳遣使以告太師太師兵至不血刃而得一大郡口數十萬公之用兵可謂仁且智矣太祖南伐太師奏公知兵承制以為托和倫塞勒弼之副將軍事一决於公敵城之堅瑕人情之向背目中所得莫能逃其算遂自北京幽薊益都大名皆下之以功嵗乙亥五月特恩錫虎符拜鎮國上將軍以御史大夫提控諸路元帥府事是嵗十月詔同左監軍王守玉偕來至闕勅自灤水東遼水西土地郡邑一聽公約束嵗丁丑六師復南公帥諸將攻蠡州親執桴鼓為諸軍先以死報効殞於矢石之下時年四十有一嗚呼以公之才方之古良將不為過惟其忠於為國不有其躬置身於死地而不自惜竟以勇斃惜哉公天資廉潔身後家無餘貲訓兵持賞罰甚平不以親戚而屈法不以仇怨而沮功夫人三長曰䝉古氏次肖氏耶律氏四子長曰察喇次曰轄克錫次曰博囉次曰琨察喇轄克錫博囉䝉古氏所出也察喇剛直有父風發矢無不中嘗一日射飛雉三十嵗戊寅襲父貴從太師西征取平陽太原隰吉岢嵐諸城嵗丁亥從博囉國王攻益都堅守不下力窮出降諸將以久拒命欲屠之察喇切諫以殺降不吉國王從之闔城得以免死嵗辛丑太宗皇帝以察喇功臣子能繼立戰功授真定路達嚕噶齊兼北京路達嚕噶齊嵗癸卯享年四十有四卒扵柳城轄克錫不仕博囉志大而早世琨耶律氏所出勇力兼人善射嘗知興中府後隠居不仕一女曰夀仙適遼王子孫二人長曰庫嚕黙氣質超邁剛正善弓矢承父職兼尹興中府中統二年皇帝思念先朝舊臣有勲於我家授黒軍總管三年平李璮亂以疾卒於漁陽享年四十有三次曰彦文純厚孝友興中諸軍鄂勒長曾孫三十餘人某某𤣥孫若干人良輔庫嚕黙子也世父官銘曰志士有言馬革裹屍不材擁腫夀考奚為維公天禀得熊虎姿風際雲㑹貳我太師兵不師古有正有竒智信仁勇左右具宜廓清㝢縣𫝊檄可期猛不懼險忠以忘危失我名將孰云不悲公乃夷然視殞如歸英名天壤豹死留皮宜其有後若若累累世握兵柄益光前輝遼陽之野灤水之湄大書深刻有豐者碑千秋萬古不劘不隳過者斂袵如拜生儀死事一傳孰措其辭忠武一諡子孫孝思太常太史視此銘詩李隠者墓碑中大夫同知福建道宣慰司事李侯狀其考妣之行踵懇謁曰先人隠徳百年不求聞逹不肖自膝下受教至粗見成立承意先志溫凊甘㫖之養百未一遂風樹之憾竟棄藐諸孤於今二十有一年矣先妣前此二載亦以疾棄世以吉卜巳得同窆惟是表封者無有石已礱矣敢百拜以請謹按君諱聚世為安陽人謹厚有襟宇完顔金未亡之二年嵗次壬辰河南北兵荒人不地著東平嚴侯檄君招集流散而撫安之居者寧竄移他鄉者有所依頼不妄遷徙是時新獲生於兵隴畝關市外内蕭然足食者十不二三君能出囊篋以周給衆皆感戴畧無徳色不責報償衆皆恱服長於生財不三數年益致富有君與乃兄㓜失怙恃兄以多疾父母憐之凡可以娛恱其心者縱使為之因是不事家人生産毬鞠博奕靡不精絶長年絶以游戲為樂君委曲承順怡然泰然課童僕負錢幣以供具兄禀賦躁急少不如意輙怒形於辭色甚則及於笞詈君敬畏卑遜承以和氣婉容必致其允若歡欣而後巳兄後得風疾飲食湯藥必親嘗之首尾十年猶一日也配謝氏蘄黄元帥謝公之女也亦能恭順孝友敬夫事長如嚴舅姑性儉素不喜錦繡纂組惟以緝絍為務慈愛僮僕如子姪雖有大過諄諄而教口無惡言鄉黨鄰里事上教子必舉李氏夫婦以為法君享年八十至元六年十二月日以疾卒於正寢夫人享年八十有三見其子同知福建道宣慰司事以夀終至元戊子九月日同祔葬於安陽郭村之先塋一子名才郞少中公也子妻王氏婦徳毋儀一如姑徳少中公之勲業見於某州去思碑效忠堂記兹不復云孫男若干女若干銘曰里仁而我亦仁未足多異民鮮而我獨能庶幾髙致嗚呼噫嘻教衰道微兄弟為讎相怨相尤父母俱存離析乖分兹時兹辰而得斯人事兄如父敬嫂如母逄彼之怒有順無忤孝弟之誠通於神明天報其徳乃生賢息懋建殊勲致身青雲晦久而彰宗族生光松檟千章豐碑深藏繩繩繼繼百世其昌故磁州安撫使李公神道碑銘公諱平字平甫世為邯鄲人祖考皆隠於農公體貎魁偉既冠喜交結豪俠輕財尚義氣貞祐兵亂金自燕走汴河北不能有以隆慮險固可守命宗室惟𢎞為河北宣撫使置司事擢公為磁州判官未幾陞本州刺史懐逺大將軍嵗庚辰宣撫司事廢無所依恃帥材勇三千人衆五萬口詣軍投身我朝太師國王承制授公輔上將軍􅀈源軍節度使行元帥府事佩金虎符雄鎮河朔壬辰春太師竒爾濟蘓奏奉朝命以公移潼關軍民千餘口於磁撫綏之前職如故庚子秋公以勲舊改本州安撫使逋逃復業者踵踵不絶是嵗民乏食發倉粟千斛以給飢殍臨政正已率下不可干以私嵗辛亥例罷宣撫司公髙卧不起丙辰正月十日以疾卒於私第享年六十有五祔葬於縣南文莊里先塋配許氏趙氏申氏丁氏康氏子男五長曰天祐襲爵再除磁州勸農使次曰天瑞滏陽行軍百户次曰天禄鄂勒百户次曰裕曰祚磁州稅使猶子徳滏陽尉女二人長適行軍千户王玉次適管匠達嚕噶齊安祚孫男八長詢大都鈔庫副使次誼郁欽欽行軍百户次成溫讓義公自致政燕居奉養豐腆賔客恒滿門秋冬携子弟遊獵春夏課童僕種藝鄉里榮之後三十有六年天禄求文士杜琪狀公之徳業持狀以墓碑來求銘敝邑武安磁之屬縣義不可辭銘曰世胄所起丈夫所恥不墜門閥一舉千里風虎雲龍神授天啓將兵子民徳威可紀赤舄虎符煌煌煒煒英嗣賢孫世濟其美開國承家似公能幾遺愛流芳百世不已太行巖巖􅀈泉瀰瀰銘碑永年夷山涸水王晉卿父王隠士神道碑奉訓大夫僉江東建康道提刑按察司事王可與奉監察御史張之翰之手狀曰此先君生平之大畧願吾子銘其墓碑敢再拜以請既唯命誦其辭玩其事而知其人然後知古今天禀髙邁力於為善者世不乏人特以子孫之不肖友朋之不能文有國者不尚賢是以不得褒美稱揚使後世泯沒無聞為可傷悼不寧唯是又因以知為善則一而得名於後者多挾權處勢髙明之徒而不獲見稱者類皆無勢位側陋隠微之士于是而得一賢子孫繼志述事不滅前人光廣其聲増其大業請文於朋友請傳於國史得諡於太常刻之金石播之無窮可尚也夫公諱政世為上黨人靖康之亂徙相之臨漳祖庭父元皆濳徳不耀妣李氏貞祐中金遷汴奉父母居陳之項城時衆以避兵失鄉井例不聊生公買田千頃因以致富仰食役力親依者如父母嵗久不忍相舎去金亡北渡流離頓挫之際罄囊橐以濟貧乏親戚鄉里老㓜困病難於徒歩者車載以歸既復桑梓時移世變田園廬舎已為豪强之所有因餘貲以通有無再致豐厚父年髙洊經䘮亂以公之賢足以付託故不事家人生産日招親友飲食歡笑道舊公能承意先志以致其樂事繼母李氏尤孝謹母亦盡其慈愛雖鄉井姻戚不知其為非所出也晚嵗貨殖充足樂復於農耕田鑿井相依者成市鄉人目之曰王氏井嘗戒其子可與曰吾不幸生長亂離不得讀書以儒學起宗又不獲務本力田晨昬具甘㫖夏秋供賦役以循天吾不忍復置汝於壟斷之間汝當力學以成吾志故於求師取友必端必慎卒成其子為名士材大夫享年七十有一至元七年五月二十有七日以疾卒於正寢娶呂氏婦徳母儀兩盡其道子一人即可與也孫男四人長曰黙侍御親軍都指揮使司令史餘㓜未名至元甲戍二月日袝葬於安陽成村之先塋禮也銘曰積而能散以財發身所居成市以徳致鄰無社無民而有循吏之仁孝能養志慈能成子敬以擇師誠以接士不經不史而得學道之㫖究其端倪天姿粹美動静語黙適義循理隆墓豐碑銘其可已百世千秋過者讀之猶足以激浮薄而愧貪鄙衞輝提領長官蕭公神道碑公諱璘字文玉姓蕭氏其先祖圖薩拉世遼之貴族贈奉國上將軍四世祖阿薩爾仕遼為羣牧使正隆中子孫以屯戍遷清平之杏園營遂為清平人髙祖竒拉爾贈鎮國上將軍上騎都尉河南縣開國子妣耶律氏河南縣太君曽祖栢徳本贈輔國上將軍輕車都尉河南縣開國伯妣耶律氏河南郡太君考徳亨奉國上將軍知彰徳路總管府兼行軍總帥府事公警頴辨利玉色揚休勇力騎射絶人能以禮自將不敢以富貴才美驕人嵗壬寅公年未弱冠奉國君異其不凡命提領本路司縣事臨政明敏雖老姦巨猾亦不敢欺剖决如流事無留滯奉國君知其可用未幾改授權知彰徳路總管府事南北要衝使者旁午事務殷繁代父兄之勞應期㑹簿書之劇雖老於吏事者不能堪公處之裕如也遷授新舊衞輝三州提領長官振領大綱簡而有要誠以御下三州之内屬吏效忠民用不擾朞嵗後賦稅増而獄訟簡上計於郡為他州最時江表未下糧餉切急民力不能支公輙立已劵稱貸於富室以供其兵役故事得辦集而民不告病嵗戊申南伐以材陞千夫長佩金符主將竒其軍功錫以名馬𤣥纁錦綺各有差用是知名諸軍上乎大理以扈從忠勤蒙寳劒之賜師還叙勞定功人將以為有不次之用以是年月違疾卒時年三十有二聞者莫不哀悼嗚呼公生而為貴公子畧無驕奢滛佚之習挺身立事早能有成其賢於一時閥閱子弟逺矣大勲異業其可量也哉惜乎天不假年遂以夭殞悲夫然而方諸恃財挾勢以墮志不自樹立不成一事荒湛於裘馬酒色之娛雖康寧無事而獲上夀何足貴哉夫人滿扎氏幽閒貞静端莊雅重失儷以來能以禮自防膏沐容飾屏絶不事子男一人名世傑有父風釋褐唐州判官自㓜孤以至成立皆母夫人教之之力也以至元七年某月日安厝於塾西北原豐安里又八年以公之神道碑來請銘銘曰魯莊之威儀技藝智伯之陵人五賢才則髙矣徳無有焉偉歟蕭公才兼二子以徳將之世濟其美鵬翼垂天一舉萬里豈其一疾而竟不起壯士聞之有淚如洗我思蕭公虎視鷹揚劔鋒一揮前驅莫當宜其佩金符之榮耀蒙寳刀之寵光一世之夭萬世之長骨朽名存公為不亡徳興燕京太原人匠達嚕噶齊王公神道碑公諱徳真字濟凖世為渾源人大父始遷隆興之豐利考諱資榮妣史氏公生九嵗而孤太祖皇帝提兵南下敗金軍於野狐嶺得公喜其頭顱不凡命宮掖撫養之三年通蒙古語言譯說辯利太祖出入提携之丁丑冬太祖巡狩於圖拉河匠官史大使帥羣工懇訴於公曰吾儕小人以絶食而殍者已十七八存者亦將垂死微公其誰救之公即言於上凡所獲獵獸盡以給餓者繼賜以牛羊又弛塔拉布哈松實之禁得采食用是困者起瘠者肥免扵溝壑者不知其幾嵗乙酉會同扵布哈綽克察太祖以官制未備凡當職分者稱集賽以公漢人定名為奉御實與伊蘇巴爾塔布岱扎固喇台同列三人者貴官勲臣也軍國重事悉委任焉公知無不言竭忠盡瘁事關利病有犯無隠或至夜分敷陳於御榻下太祖喜其忠直多允其奏又命公兼掌二皇后宫政后撫之如子嘗謂所親曰此吾之竒凌扣也丁亥春正月太祖征西夏嚴李王誅之怒其負固不服欲屠其城羣臣莫敢言公諫曰犯順效逆者既已就戮民各為其主百萬之罪宜活陛下同仁一視子憐萬國非敵百姓也幸寛天誅太祖恱悟遂赦之上欲伐鞏公曰西夏已平鞏不足㧞不必勞師用衆臣請諭之禍福遂持節以往鞏開門出降嵗庚寅太宗皇帝以公先朝舊臣服勞王家不欲勞以煩劇賜公金符授徳興燕京人匠達嚕噶齊嵗壬辰蘇布特圍南京城守崔立遣使納欵情偽未可知公與來使同往立出降時有詔命公集諸匠一日應募者數千適嵗飢人相食公出已財糧以食之脫死者不可計率諸匠北來至太原較其伎藝率多畏死冒充而實不能者公亦不之罪諭以溫語示以程法積以日月後皆為良工嵗丁酉後除徳興燕京太原人匠達嚕噶齊中書耶律公從容謂公曰公啓運勲舊宜侯牧一路不然公且留中相與同心協力匡輔聖政公力辭曰僕㓜蒙國恩撫養禁掖出入行陣粗有嵗年大政髙位實非敢居中書君知不可留乃止六皇后攝政執政者擬公為西京等路廉訪使先帝南征大臣又奏公可為平陽太原等路廉訪使皆以疾辭一日召諸子曰余以垂髫野竪被日月之光沾雨露之澤歴仕五朝而無纎芥之補今老矣不可厚積官謗遂上章告老朝廷憐公耆舊俾其子孫襲爵既得請燕居於太原之私第往來别業山水間讀書學養生十有餘年嫁妾三人放驅二十人焚毁諸人負錢劵二百餘張至元九年八月甲午以夀終於正寢享年七十有一夫人四李氏張氏劉氏呼嚕氏子男六人什喇哈斯張出也次曰納延次曰居實劉出也次曰曩嘉特次曰居廉居安女四人某適某次曰某適某人孫男八人某以某年月日葬於某里銘曰得君已久畏怯莫前諫聽計從顧忌弗言太祖天威百王凛然公之遭際未閱幾年活百萬命忠懇迴天扈從兩朝雨雪戈鋋武成告廟定功後先三土五爵烜赫聨翩何力之有願處卑偏緝熙百工曲盡精専優游常職百務棄捐晚年知書聞善拳拳恬淡虚静吐納希仙夀七十一正寢歸全生平手奏格言成編世雖莫聞後當有傳考始要終玉潤金堅汾水之湄東社之原喬木豐碑髙塜新阡陵移谷變不崩不穿舒穆嚕某神道碑侯諱某字某姓舒穆嚕氏其先遼貴族家於遼碣間髙祖阿薩爾仕為羣牧使正隆中子孫以屯戍遷清平之杏園營遂占籍焉曾祖竒拉爾妣耶律氏祖栢徳本妣耶律氏父圖薩拉妣耶律氏嵗丙午行省太師統諸道兵破大名侯遂𨽻帳下拜館陶招撫使俄遷東平大名招撫使元帥左監軍留事東平行臺嚴公以取磁州功遂兼知州事復以取林州功遷同知彰徳府總管事丁亥四月收復彰徳陞林州彰徳府事某年月日以事死於燕邦人悲之年五十有八夫人若干人子男若干人女若干人孫男若干人女若干人某年月日卜葬於某所某原銘曰金亡河朔兵塵紅天威張皇開四封網羅豪俊圖巨功割疆自立從羣雄趙南衞北實要衝十室九罄糜銛鋒失侯得將如萍蓬以暴易暴承僨蹤維侯孤騫逆長風提携猛將來羆熊撫摩痍瘵濡疲癃翦夷棘莽成桑農黄金臺髙心益恭幕賔濟濟人中龍嵗時朝覲或㑹同髙壓羣牧聲隆隆蒲鞭仁慈出天𠂻公私倉廪俱阜豐誘民以善民易從一緘幽恨埋閟宫英魂夜半號蒼穹吁嗟大福濳大㓙髙鳥既盡藏良弓太行西峙漳水東邦人思侯哀無窮故鎮國上將軍總管砲水手軍匠元帥府清州張侯神道碑銘天運人事否極則㤗亂極則治理固然爾然而開㤗定亂洗妖氛服羣雄千戰千勝一清四海乘時佐命立萬世太平之基苟非勇可以敵萬人智可以伐羣謀矯矯烈烈出羣命世之大才則不能也清河元帥砲手張侯當我朝開創智名勇功是諸大將之一也侯世為清州人諱榮體貎雄偉智勇超邁金主走汴嵗次甲戍侯以武勇選守戍燕都太祖皇帝整師南下侯揆以天時人事率衆同明安大保詣軍門請受命太祖皇帝壯其材志錫虎符授懐逺大將軍元帥左監軍侯感荷殊遇誓効死為國立功業每戰身先將校同勞苦士卒亦樂為之用戰勝攻取所向無敵首平河間下大名繼收東平濟南益都江郡聲日益振太祖皇帝征回鶻六師至莫蘭河流澌湍急衆莫能前侯立縳戰艦百艘全師畢渡直抵城下未合圍侯列樹危竿飛石石下如雨城不能堅回鶻請降由是忻都欽察諸國接踵納欵西戎遂平論功最諸軍未幾扈從取河西河西負固堅守侯如前攻城破衆潰以功陞鎮國上將軍總管砲水手軍匠元帥㧞關右五路攻鳯翔勇不顧身砲傷髀近侍尚醫勞問調䕶腹背相望疾愈嵗辛卯從太上皇由金昌取均州諸城明年壬辰以王事終於軍子忠仁襲爵勇畧如父從濶出太子進討兩淮經畧江漢取川蜀嵗不家食戊午先皇帝西征師次釣魚以將家子仍舊職㧞為上將冐險先驅所過戰功居多聖上即祚志在平南選將居邊被命戍守均房領漢軍萬户丁夘二月以疾卒於大都之行館孫男君佐承職散官如前仍兼利津海道糧運管軍萬户用兵臨政同符祖考君佐以某年某月某日遷葬於鎮定縣之某村從吉卜也既葬以神道碑來請銘銘曰乾坤草昧昌運開乘時佐命須雄才龍拏虎摶岳麓摧除㓙翦暴如蒿萊喑嗚叱咤生風雷廓清四海無纎埃戰功稠疊寵渥偕虎符錦綬光昭回忠武壯節髙崔嵬遺恩餘慶貽後來將門出將真將才子孫襲爵皆英哉鐡槍可埋名不埋豐碑髙塜西山隈彤弓家廟齊雲臺大元故元帥左都監曲周縣令杜公神道碑銘公諱泉其先潞人髙祖而上徙居廣平之曲梁祖榮善植生産年逾七十優游以夀終考貴承先業増崇生息遂以財雄鄉里積而不居推以濟不足人多徳之交游豪貴日滿門頗樂鷹犬中夀而殞公資禀俊偉㓜異凡兒宗族有識者曰此子必亢吾宗既長讀書略通大義遇事力行卓卓自持嵗庚辰我師南下公帥衆詣軍門降太祖皇帝姪王承制封拜嘉其義勇即署行軍提控以𨽻大將索和爾平山東下東平舎利等諸栅前鋒殿後勇冠諸軍辛巳秋七月征河東破青龍石家等堡越河中收撫關右定西夏招懐攻擊所向無敵公之力為多壬午三月還師秋從索和爾北拜王於行帳優蒙賞慰佩金符充曲周丞兼管軍民畏威慕徳不嚴而化甲申夏五月東山草冦奄至城下所過燒毁室廬驅掠人畜公奮身衞衆手殺數十人賊退門吏白令㫖金符為賊盗去帥猛士百人邀其歸路殄殱而還由是姦宄破膽不復侵軼戊子春二月王懋成績復賜令㫖金符光寵之升爵昭勇大將軍官曲周元帥監左都縣職如故辛夘冬征河南克鈞州平汴差次戰功諸將擢焉嵗乙未武成大定皇帝受羣臣朝割茅土以賜勲親邢洺等四州𨽻右壁萬户公任職如舊嵗庚子總府薦公勲舊升曲周令立市勸耕賑乏問疾不四三年視諸邑為樂土癸卯秋八月朔遘疾越三日終於私第之正寢春秋五十有四總府賵金以葬邑人路祭巷哭夫人王氏出衣冠盛族女則母儀内外慕效再娶趙氏侯氏俱名家淑靖懿恭子男六人海源淵珪演季曰𢎞毅海襲爵治大縣所在有聲去則民思之今任廣平路總管府判官源邢洺路鄂勒提領淵忠顯校尉出軍總把兼萬户府都鎮撫軍功將畧能世其家孫男十二人世傑世英國用國才君輔雲甫餘㓜未名公殁後四十年至元壬午春正月十二日安厝於新安鄉鄭晏里之新塋從吉卜也公生長兵革鞍馬間不資教養而踐履篤至事二兄極友愛樂赴人之急難惟義所在禍患不恤也嘗積粟數千嵗凶則借貸不責償初壬辰平河南迴俘以百餘口父子兄弟夫婦去就聚散之可哀憫者多縱遣之仍為經紀其生理握兵臨陣不妄誅戮一旦臨民専務撫養齊家教子不積貨財此人之所尤難者洺水簿林慮徐異狀公之平生也如是總判公奉狀以神道碑來請銘銘曰勇不嗜殺息亂底寧惠而知政煦煦無聲惜也跼驥足於百里匣鏌鎁於發硎夀不稱徳歿有餘馨用不盡才志其可平天其或者流於既濫之餘發於持柄之末積厚報於賢嗣享安富而居髙榮出總大府子為名卿蘭芽玉屑繼繼繩繩孝思起塜如崗如陵孝思刻石既堅既貞使過者拜手拊碑而歎曰有是父而有是子父種徳於子子揚名於父斯言也足為千秋百世之銘同知石州事髙公神道碑公諱岡字陟夫姓髙氏石州寧鄉三聖里人世世孝弟力農以徳以勤遂以土田緡錢雄鄉里考諱順妣郭氏謹厚勞苦増廣前業以公天資不凡不類農家兒夫婦相與謀曰教子訓孫固當不易世然是子終不可以服田畝即今治平無事國家以儒學官人苟使之從師讀書必能光大吾聞出幽谷而遷喬木不愈於以畎畝之不易為憂乎故公八嵗入小學十六而知為學之方自是日藏月修六經外傳及羣書釋老二書一一渉獵連射策於有司不合時好不中第泰和八年入粟補官監寧鄉酒稅事我朝兵南公帥衆降太師國王承制授寧鄉尉外户不閉累嵗無犬吠之警嵗戊子縣陞為州就陞軍判嵗庚申中統建元太原總管府申河東道宣撫司薦改授同知石州事公自等級積官知民情識時務老於吏事三年之内優游卧治不嚴而政舉五年二月四日以壽終於私第之正寢享年六十有九聞者莫不流涕夫人李氏生子男三人孟曰鳯仲曰彦英皆早卒季曰彦萃襲爵今累官承務郞同知磁州事一女適平陽太原路巡監視運官陳政再娶馮氏無子再娶楊氏生二女長適張暉次適郭邦寧孫男四瓚璲琬僧奴瓚主家事璲監本州酒稅琬本州孔目官僧奴尚㓜孫女四人曽孫一十五人以某年某月某日祔葬於三聖里之先塋彦萃狀公之生平請銘其墓碑銘曰學言有知為兒不嬉卓然秉彜晨昬趨庭自持自矜暮史朝經積而不居克諧時須起身亨衢殷墟麥秋挺身歸周邦人咸庥州縣翺翔春露秋霜白首馮唐中統飛龍選實論功榮拜新封載飛載揚桑梓有光死生故鄉子孫繩繩繡衣珠瓔克廣家聲故園故山松栢芄蘭神靈妥安豐碑嵳峩我銘可歌百世不劘王忠武墓碑銘朝列大夫尚書户部侍郎王桓桓母弟奉政大夫淮東道提刑按察司副使構同状西來曰我先人忠義事君棄藐諸孤八年於兹墓木已拱而經紀寂寥敢以再拜墓銘為請謹按張澤狀公之徳業曰公諱公淵字潤甫其先秦將翦之苗裔也世為濰之北海人七世祖徙居東平考鐸官忠顯校尉妣杜氏大父瑀正隆五年登進士第官奉訓大夫今妣范氏及其内皆文正公之後曽大父尚智金初登進士第官朝散大夫妣崔氏髙氏范氏興家五年東平内屬三兄避兵南遷公以死守宗祀嚴武惠承制授公忠武校尉從事戎幕十有餘年亂定得歸田里自號鳯山逸叟日課僮僕力田教子讀書每戒之曰自汝逺祖令公儒素超宗登仕版者代不乏人箕裘之業不可廢也三子遵之竟得成立至元十七年嵗庚辰以次子桓構共為朝官就禄養焉明年夏六月丁卯夫人薛氏以疾終命桓等歸葬於東平北乘丘山陽之先塋將行戒之曰封樹畢即俱來是嵗冬十月乙未與長子楨還家卒於行館辛亥祔葬焉享年八十有四公天資誠敬純善重厚寡言飲食不問美惡貧居晏如亦未嘗有不足之念犯而不校曰柔能勝剛僮僕不率教者諭以溫言終不加訶責與人交愈久愈敬平生無狎友性喜讀書尤嗜古文篆𨽻遂極其趣夫人亦士族為婦為母順姑敬夫慈子中表可法夀七十有四三男楨桓構楨為山東濵鹽司勾判官女二人長適商福次適蔣起男孫二人士煥士爚女孫六人先世舊徳備於三老堂永錫堂記兹不復云銘曰危檣巨舟勇回急流世繼其美不忮不求積而不廢雙鶚橫秋敭歴中外有為有猷扶揺天風一日九州雲路方始朱顔黑頭未見其止邈焉寡儔乘丘蒼蒼泉水悠悠王氏塋域羊虎松楸若堂之封纍纍塜丘五百年中大夫公侯表碣碑銘珠貝金璆我何人斯荒辭贅疣竊助孝思嵗時薦羞大元故順天路總管府權府事王公神道碑治亂廢興之氣機隠伏於冥冥而發見於昭昭惟明者見之才者因之或出或處與時偕行金主紹承世宗章宗五十年太平之緒優游踐祚而識者憂之知其無人君之度非南靣之器也未幾遇弑我太祖皇帝一舉而金祚不守是時屈伏草莽者齊舉並起雲㑹響應順天蔡國公羣豪之一也而權府王公實贊成之公名沂字振文童幼頴悟過人比冠通方識務金主走汴燕薊騷然順天迫於燕公揆以人情天意知帝王之有真天命之在北處身亂離中與人豈弟樂易不樹風岸人多愛慕願與之交遇事明敏謀議處决動合衆意時雖板蕩凶殘儕輩或語訟紛競必諄諄切切勸以徳義戒以法律使人和解而服罪以是人争歸之所居成聚蔡國張公起閭里相帥歸命我太祖皇帝謨畫軍事多從公出順天既内附蔡國公承制辟公録事判官兼規措大使不再朞流竄者還僉辭以幹局稱輿議請命改充本路總管府判官是時四方猶未平例以長官主征伐民政悉聽於倅貳公均租庸謹調度扶弱推强風雨寒暑不敢告勞屬郡鄜州號為難治加以蝗旱相仍流散未集以公廉能陞知鄜州事敦本抑末篤教緩刑吏不嚴而畏民不戒而勸未幾擢權順天府事同僚優游仰成府治當南北要衝郵傳如織而民不知擾退食雍容讀書學道煮茗賦詩延接賔友晚年詩益工以老致政一日寝疾遺訓諸子曰我白衣至此本無他能平日所守者報國以忠接物以誠而已言絶笑談而逝享年七十有三夫人艾氏婦徳母儀中表可法夀七十有八四子仲仁仲義仲禮仲智仲仁即同僉公也以書自東川來諭其子宏曰吾父子兄弟蒙國家福澤既優既渥誓以死報惟光昭先人之令徳無片石以旌紀負罪何言汝當承吾之志乞文以圖不朽使吾後嗣有以知祖考積徳累功之漸子孫蒙慶之自汝為我力成之宏既承命持侍衞親軍萬户府從事安陽王可與之狀來以神道碑請銘銘曰虎頥未鬚遭時艱虞枕戈講學弁武心儒衆不可失藏疾納汚識真歸命振袂亨衢良二千石聲流八區引年致仕左詩右書富貴夀考徳業聲譽人或不足公獨有餘孰謂渭釣而無逺圖孰謂莘耕老死犂鉏處不失義出應時須同我太平武畧文謨子孫繩繩玉佩瓊裾勒銘豐石光照幽墟百世不磷過者下車
