body:
  text: 紫山大全集卷十三元胡祇遹撰論君臣論聖王之疆理天下大則建邦設都小則封一城食一邑規模布置增損多寡各不同皆有良法美意未有泛與漫應輕以假人者也三代之州牧伯侯漢之大啓九州犬牙相制一郡一縣星分棊布唐之分天下為十道孰得孰失概可見矣聖王在上措民於無訟措天下於無事萬類熙熙各得其所大君大臣以及下官小吏皆優遊於其職無煩刑無苛法無冗文後世反是何以言之井田限田既定世守先疇之畎畝而無田訟居官者長子孫內則三公九卿外則郡縣而無後世循資遷轉二三年以轉官之繁冗百畝之田徹一為稅而無推排物力之煩碎山澤無禁而無苛法虐刑道路男女有别而無姦淫婚姻以禮以時而無淫奔犯非之罪強幹弱枝以重馭輕兵農有法而無背逆誅討之役為民者四而無無常産無恆心放僻邪侈之過賢不肖明白分定而無僥幸覬覦犯分越禮之愆人君宗廟宫室常制一定而無妄興之土工國家經費一定而無濫徴橫科之費官制一定而無十羊九牧之濫為人擇官之弊多欲則事繁文繁則吏冗吏冗則官冗官冗則議論紛紜政日紊亂政日紊亂則物物被擾物物被擾則禍不可逃矣一人寡欲萬方䝉恩國以永寧自古小人得君無他才術逢欲而巳禍亂之作固出於君昏亂淫虐於上而羣小在位綱紀壞而人心失然亦有不至此極而亂者公私空竭而飢寒切身水旱為災是也天地之道循環往返治極則亂泰極則否不能無也以耳目所覩聞三十年無饑饉流殍一旦有之則其禍不細務農蓄積豈細事哉君臣之情不親愛如父子不相信如符契不相得如魚水而冀庶績之咸熙尚且以尚父自負謂之盲聵可也若以堯舜禹湯文武周孔治天下之法言之則非聖人未易能也視後世治天下之法言之雖腐儒俗吏赤子健兒皆能之况良士乎况俊傑乎患用與不用耳以語言號令治天下已為循末言又不踐事何以責成言不順則事不成聖人豈欺我哉陸贄亦曰動人以言所感巳淺言又不切人誰肯懷傳曰不誠無物至哉言乎人主之心不可不誠至如為善推原本情為巳歟為天下歟為名歟為實歟矯飾歟誠圖一時歟為子孫後世歟是道也正人端士愛重惟恐其失反不致察女子小人一於逢迎不顯其敗反能識之見微知著惟漢二疏後世忠貞如陸贄而竟死於貶豈不知德宗性情猜疑嗜利與小人合也哉人君之於臣敬之至信之篤愛之深聽之允行之果庶幾志得道行保有令終五者或無一焉則不得全其道矣故曰聖賢千載一合以唐虞三代言之誠哉是言也以秦漢以下觀之至於今無一人焉士之讀書非徒慱聞強識而已也觀古人之出處事接物自始至終得失是非吉凶成敗因以為鑑一世之內先觀人主之性情作為何如次則大臣次則卿大夫羣臣不惟見一人之優劣成敗亦足以逆知一國之成敗人之作室審曲面勢有法柱礎壯實梁棟材大一椽一㯠修直堅密加以堊甓固緻周垣堅厚住室者日與守護防風雨雀鼠而預為之偹少有踈漏隨補隨葺祖傳之於父父傳之於子子傳之於孫孫傳之于曽𤣥而可以無壞天下社稷猶一室也聖臣都俞吁咈消患於未形揖讓詠歌論道於微妙推理性之土苴以治天下此聖臣也臯䕫稷契伊傅周召是也賢臣雍容和緩格君心之非不動聲響務引其君以當道措天下於泰山之安此賢臣也管仲晏子蕭曹丙吉魏徴姚宋是也李泌陸贄之徒能匡救一時之弊緩水火之急雖不能止君之惡而濟之一術危而持之顚而扶之苟延數世之厯數此能臣也王猛劉穆之具臣畏首畏尾既不能直諫以止君之惡又不肯退位而貪祿固位耳此庸臣也亂臣長君之惡逢君之過以私害公議沮忠臣斂怨積釁速亡激危此亂臣也禮樂論聖人教人溫溫雍容使人優柔自曉見學者務外而不求諸內不知禮樂之固有認玉帛鐘鼓以為禮樂故曰禮云禮云玉帛云乎哉樂云樂云鐘鼓云乎哉才有此性便有禮樂便具於中禮樂者中和而已中則有倫有序有序則不乖戾不乖戾則和中和存養乎內又假外物玉帛鐘鼓存養乎外此聖人制禮作樂之情也僕自入仕臨民傷禮樂之消亡哀民心之乖戾為政者直以刑罰使民畏威而不犯力務改過於箠楚之下杕痛未止惡念復起條法責吏曰詞訟簡盜賊息何不思之甚也禮樂教化既已消亡休養生息安寧富庶學校訓誨又不知務民生日用之間父子夫婦兄弟朋友愁苦悲怨逃亡貧困凍餓勞役居官府者晏然自得而以為治民撫字之功可哀也哉禮樂刑政論聖人代天理物身之以道德下觀而化無為而治尚恐身教之而不能齊一禮樂刑政由是而舉焉自人之始生至於終身匹夫之賤天子之貴一動一靜莫不有禮道之為冠婚喪祭貴之為朝覲㑹同生長見聞習熟於禮隆禮由禮則謂之有方之士不隆禮不由禮則謂之無方之民威儀進退升降揖讓周旋折旋之際可以見一國之盛衰一身之死生禍福禮立矣而和之以樂使天理之節文人事之儀則知出於自然不為嚴敬所苦粲然有文以相接歡然有恩以相愛此樂之所以作也觀帝命䕫之教胄子以至簫韶九成鳳凰來儀聖人豈欺我哉故孔子曰興於詩立於禮成於樂子路之鼓瑟子路之行行知其不得其死子擊磬於衛荷蕢者聞之曰有心哉擊磬乎喜怒哀樂之發於心形見於金石絲竹之不掩樂之成德也豈虛語哉樂之於人也豈虛器哉豈直悅耳娛心以助淫荒而已耶故曰審樂以知政因以知國祚之興亡今之老師宿儒禮學樂學絶口不談併以所假之器略不考較一聽於賤工俗子是將古人之飾文末節復不能舉明而併絶之也天秩天和與夫治政之美惡感於人心而發於聲音見於儀則未嘗斯須之間斷有學有道者自能知之得失興衰略不相貸然而使古人治身為政事神動天之要典掃蕩而無餘人無貴賤乖戾不和哀哉道德禮樂既廢所謂區區之刑政亦從而廢為善者未必賞為惡者未必刑棼絲沸羮梟鳳亂鳴賢不肖混淆而莫之能辨朝不信道工不信度君子犯義小人犯刑洪範八政無一政之舉彛倫之教無一典之明風淫俗靡上下相侵陵親戚相攻訐廉恥去身貪冒傾奪狗彘豺虎之不若幸而國力強盛年榖豐登為亂為惡者未敢舉發昧者因以為無事天災流行聖賢所不能免安不忘危存不忘亡治不忘亂防患於未然豈可忽諸禮樂固非庸儒之所能復亦非近世之所聽信曰刑曰政亦無定法使善人瘖啞凶人日熾暴官汚吏頑弟逆子戾妻僣妾強奴悍婢市井無賴日增月盛曷以為治興亡論三代迄於五季其興也祖考之聖明文武之謀臣䇿士熊虎將帥之同心協力其亡也先自承宗廟守大器者庸暗懦弱荒淫無度溺近姦邪故女子蠱惑於牀第宦官諂諛於朝廷聚斂興事之小人投隙而入逢迎諛媚成惡斂怨蠧政失衆以至於喪亡或以女色或以宦官或以權臣或以外戚或以藩鎮或以子孫封國彊大或以孤立幹弱枝強不出於是數者為君人者當著厯代興亡於屏幛大字真書以為鑑戒兢兢業業不蹈覆轍以持盈守成為可懼日日省察然則厯數之永不永人無愧焉歸之於天數可也以德服人者中心悅而誠服也祖宗穆德子孫雖不肖天下感戴思慕遺澤遺恩不忍擠排而遽絶尚冀其率德改行必若桀紂然後見棄於天見絶於人夏殷是也至於周祚綿延八百年猶以為共主浸微浸滅西漢為王莽竊篡已二十年民心思漢光武一舉中興莽賊身裂陵夷至於靈獻以曹操之姦雄尚不敢正據大位非不敢也亦有所自歉而不忍也尚恐天下之不與也先主以孤身狼狽孔明奮起田畝力欲興復漢室還於舊都然則髙帝之去秦苛法文景之慈愛養民豈不明效大驗歟至唐則不然乘以弒君殺父之賊殘虐不道之甚太宗奄寧神器濟世安民功固不小然武勇殺伐有餘而雍容招懷不足方之於漢似有可議以至手足相誅夷骨肉相殘滅二百九十年間內難外艱竟見廢於羣賊吁以力服人者非心服也力不贍也然而報怨之心曷嘗少忘於心哉一旦力衰則共起而斃之矣觀往古嬴秦是也故曰恃德者昌恃力者亡又曰兵猶火也弗戢將自焚也故曰君以此始亦以此終又曰好戰則亡進言論良醫之視疾曰不治則十年後病二十年後死後果如其言若是則可謂神醫矣其言又有徴矣然而得疾者莫之信莫之從何也豈甘心於死歟曰非也斷死於二十年之後其日月則逺其為害則不切其疾則未有所痛苦故聽者以為迂濶而莫之信遂至於死不治良臣之憂國也亦然越為吳所破勾踐以一旅之衆竄伏於㑹稽枕戈嘗膽舉吳國之人不以為憂而子胥獨憂之曰越十年生聚十年教訓二十年之外吳其為沼乎夫差怒而沉之江子胥死如其言而吳亡以余觀之子胥明於憂國而不明於保身越與吳為世讎未嘗一日少屈於吳一旦宗廟丘墟社稷平蕩地土人民甲兵皆為吳有勾踐肉袒請死夫差視以為不足致怒而舍之方且驕固自得以一旅敗亡殘滅之卒其奈我何子胥乃以二十年之逺禍諫之宜其以為迂濶不祥之言也諫而不入又不能去宜其死也正猶人之飲食如故精力如故四肢百脉如故有若楚醫疹其脉察其色曰汝有疾二十年後死莫之信也必矣庸人之不知病庸君之不知亡國一也人之有疾苟有良醫尚敢以言相告知國之有禍深識逺見如子胥者千百年無一二日與居者皆諂諛迎媚之人雖有如子胥之明者畏見踈害之禍卷舌而不敢言至忘國而不知非反不若匹夫之有良友也善夫東坡之言曰古之良臣憂治世而危明主明主有絶人之姿治世無可畏之防有絶人之姿必輕其臣無可畏之防必易其民此君子之所甚懼也又曰天下無事公卿之言輕於鴻毛有事則匹夫之言重於泰山言之於無事之時足以有所改常患於不見信言之於有事之際易以見言而患於不及改孔子曰中人以上可以語上也中人以下不可以語上也然則進言者當察其分限之髙下厚薄受言者之賢愚明暗庶幾免於失言失人之不知見踈見害之後禍焉耳說傳道統說堯舜禹湯四聖人之相傳以中者聖人德全同天地道行侔日月别無可言所患少有遲速耳速則過遲則不及故直曉之以中世衰德薄至孔子則語顔子以仁仁則復天理之公而去人欲之私全此心之德道日益微昧德日益漓故曽子告門人以忠恕欲其以誠接物以巳方人也子思則言誠見當時學者假仁者衆而無真實無妄之誠心也至此則人僞日甚漸至於難與言不可以語上故孟子直說以仁義恐其又不能曉不能行直曉之以四端因良心之暫發日用之不可缺跬步之不能無者明之執柯伐柯猶且不悟故孟子曉以柯則在手之理也觀此則足以見世變矣非前聖後聖固立異論也不仁不義一從血氣之利欲則入於禽獸矣禽獸之惡猶誠於惡今人之為惡雖誠於初展轉變化下逹而不已不能自保吁惡亦極矣善將復建極者豈無人焉性說呈鄭司直性也者與生俱生天之所以豫我虛靈秀發四肢百骸之生仁義禮樂萬善之府也感於物而動性之情也藴之於身與德為行施之於外成事成業性之才也寂然不動感而遂通無物不備配地參天者性之全體也性其性者堯舜也力行而慎思反身而踐形求全其性者湯武也以先覺覺後覺立言垂訓過化存神使人絶惡於未萌棄小人而成君子人倫日用之間曉然知性之理者孔子也闢楊墨之害以明先聖之道使人存心養性事天立命不失其正者孟子之功也噫楊墨甫息於前而佛老大熾於後性之理泯泯而無傳焉不惟無傳信其說而陷於邪悖其性者皆是也為佛之教者曰寂滅空虛無往無返者性教人枯木死灰舉天下萬事一歸之於無然則天地之性恆久而不巳生生而無窮必若是則是絶滅天地也為老氏之教者以長生久視清淨無為永福田利益為養性之說福果可求乎有物必有則人果可癡坐而無為乎人百年之物果可長生久視乎二氏謂之知性可乎二氏之說盛周孔之教衰宗公巨儒又從而主盟張大之不入於佛則入於老是以其放肆爛漫而不可遏也然則復性有道乎曰君君臣臣父父子子夫夫婦婦兄兄弟弟各盡其道者順性之用也居仁由義節之以禮和之以樂者養性之源也如是則窮通夀夭冨貴貧賤順受其正命之理亦昭昭矣佛老之所謂性與命者吾不知之矣司直先生善人也信人也以法律進身而無傷嚴寡恩之習悉其聰明致其忠愛蕩然有古良吏之風樂出善言行善事暇日語及性命之說以餂㒒故特舉所得於六經語孟之㫖與僕躬行心得之妙者以言上之某頓首上或問於胡子曰人果靈於物乎曰以天與言之物得其偏人得其全人固靈於物以人為觀之靈於物者十二不靈於物者十八或者又曰夫婦之有别雎鳩鴻雁鷙鳥之屬能之人雖有外來之分别則非禮之視非禮之情蒸通淫納姦私之惡往往有之父子之親天性也虎狼能之惟人也反漠然無情甚者責善怨懟至於逆弒者亦有之君臣之義如天尊地卑而不可易也蜂蟻能之惟人也載其位食其祿寵其名爵不知感恩戴德仗節守義至於仇怨逆殺亦有之昆弟朋友之愛天性也然鳲鳩鶯鹿能然惟人也甚者至於䦧墻紾臂老死不相往來者亦有之是數者禽獸能守其固有而人皆棄暴安在其靈於物也且以一身言之草木鳥獸自生而至於死莫不有所營為能鳴者鳴能飛走者飛走振刷其毛羽洗濯其文華營其巢窟求其飲食生生而不絶一步趨一飲啄擇安而避禍溫飽孶尾之外淡然而無欲今觀於人也不當言而言與當言而不言是不如鳥之鳴以時也怠惰嬉逰慱奕飲酒而不務學處家而不修身居官而不事事臨事應對矇然無所知是不若鳥獸振其羽毛營其巢穴各盡其材也知口體之欲見利而貪盈滿而不知懼禍至而不知逃安冨尊榮之外孜孜皇皇多欲而不知止是又不若禽獸之無欲也安在其為靈於物歟胡子應之曰過矣踐形率性修道立教此人之恆性也聖賢明哲何常斯須毫髮背之哉知而不遵固有而不守者衆也使聖教行而人知務學則人道燦然而備矣子毋以世變而昧其源或者曰唯尚智說為學莫先於智識故大學以格物致知為八目之首一物即具一理知之不明見之不審行之不著習之不察雖終身孜孜矻矻果何益哉故曰終身由之而不知其道者衆也察巳觀人觀事沉機先務逺見未然將然必然然不覺而獨覺見患於未萌絶惡於未形詐僞真實君子小人貌言視聽一動一靜之間洞徹其為人見禮知政聞樂知德故能避世避地避色避言不罹其禍非智周於世而能之乎魚麗於綱罟筌笱鈎餌人死於聲利權位不識不知故也智及之則此身與外物孰多哉不知者不知格物之用力加以物欲蔽於前攫金而不見人也物欲薄則天理明矣前人謂衆人之處世如燕子巢幕突焚其幕將及其巢猶以為安可以人而同於鳥乎故君子異於衆者見微而知著耳故曰一日二日萬幾幾者動之微吉凶之先見者也名子說古人名字不取美稱申繻之對魯桓公概可見矣後世率多張大夸美略無意義甚不足取法胡子有子四人各因性分之所短者而戒之庶幾勉勵強其不足以趨於中也長子和柔而少執持故名曰持字伯持次子剛决暴白而少藴藉故名曰藴字仲藴三子呐呐退縮而少振揚故名曰揚字叔揚季子凡庸淺小而乏宏毅故名曰宏字季宏余之命名者如此非夸美也汝四人者當知之王氏三子名字說彰德府掾王君國祥謹厚幹局甫中夀而殞嗣伯謙以才選升充御史臺掾蓋能世其業髙大門閭於先有光者也為其三子求立名字三子亦承述祖武因皆勉之以孝孟曰述字光甫仲曰遵字敬甫季曰邁字英甫善述人之事則光昭先人之令德矣遵祖考之訓則敬之至也當仁不讓邁往拔萃惟英特者能之三子其懋戒哉毋矜字之美而不踐名之實毋負汝賢父慈愛毋忘先輩命名字之忠厚功不百不變其法利不百不昜其業毋廢弓冶降而為箕裘焉富察提舉子名字說富察提舉為其子乞立名字名之曰伯奮字之曰鵬摶非許其已能勉其當如是也學校教養父兄俱賢此人生之所難遇也不遇而遂不知學庸人也不遇而能奮勵此豪傑也况幸之又幸而兩遇者哉遇兩難遇又不能成立民斯為下矣此聖人所謂吾末如之何也巳矣伯奮名家大族賢祖賢父賢昆季氣禀亦不碌碌故凡與汝祖汝父相識者皆以奮拔流俗望汝也紫山野老書髙夀之縣令五男孫名字說夀之縣令見五男孫乞立名字乃因其義訓而文之長曰元孫元者天地生物之始萬善之長名俶字敬初俶者人之動作之始敬者戒慎恐懼之嚴凡人視聽言動欲發未發之際先自敬慎可則行不可則止何敗錯之有易曰吉凶悔吝生乎動者也吉一而已可不慎乎慎始則庶得終吉書曰靡不有初鮮克有終况無初乎次曰慶孫名嘏字致逺子孫承祖考之慶福當作養器識以致逺則善積而慶有餘次曰繼孫名紹字克承祖宗積德於前繼緒思不忘庶幾善承人之志善述人之事次曰喜孫名豫字永錫孝子不匱永錫爾類可以得父母之歡心次曰履孫名蹈字從道履德之基也蹈道則不失其所履之正舍正路而不由近世父師之名子弟例取美稱而無戒辭舉過其實孔子曰名之必可言也言之必可行也五孫因名以求義循循勉勉毋敢失墜毫髮未至力趨其極庶幾不負父母玉汝於成罔極之恩焉夀之請書其說故書劉清甫子名字說鄉人劉清甫為其子求名字名之曰貞字之曰公幹又求說其字義貞正也固也四時之冬氣也幹者材也春元夏亨秋利冬貞則能復新嵗之元父兄之於子弟皆欲其材幹而不能養其正固之氣是猶欲其華實之盛而不培植其本根也是以浮薄膚淺淫麗立言則無義理無實用立事則權謀功利趨就無定立身則行險僥幸無所不至君子之棄而小人之歸人生得賢父兄者百不一二所仰望而成身者師也師席無人也久矣雖有天資髙邁之賢子弟誰為之陶鑄哉劉貞學儒者也儒以窮理養氣為主今之學儒者非知儒學者也貞其勉之李侯四孫名字說彰德路長官元帥李侯膽略武勇過人善騎射刀矟每戰必勝壯嵗遭際皇朝開創之昌運以武功授彰德路長官久於從軍樹勳業遂以元帥名當世第八子承祥昭德為其四子求立名字名其長曰震字伯威次曰克字仲桓次曰強字叔能次曰明字季昌因申其說曰人之行莫大於孝孝莫大於繼志述事元帥公以忠武為開國名臣一再傳而子孫不肖其德不世其業謂之有子有孫可乎賢公子奉承餘祥光昭先公之令德四孫有乃祖之風見之者望而知其為將家子名因實立其誰曰不可震起也能自振起則有威而可畏克巳復禮則桓武為義理之勇自強不息則無不能之事日進乎髙明則德業日昌此非老繆一巳之私意乃闔郡之公望也而字責以成人四孫其勉非敢諛佞漫為之說田氏昆季名字說田氏昆季五人求立名字長曰榮甫名沃次曰通甫名逹次曰敬甫名肅次曰直甫名端次曰良甫名懿五人者當因字以求訓詁因訓詁以求義理因義理以求命名立字之意日敬日戒日修日思所以稱之無矜誇其美呼而巳古人名字皆有說五人者皆識字不必字解故余所說如此朱昌國名孫說原道一篇萬世法程匪惟民則地義天經賢哉朱母孫以道名西溪立說表章煥明余欲何言孫其諦聽言以道出志以道寧事以道處身以道行進進不巳理明義精長才大器何憂晚成異端邪說我訓我刑與彼為師孫得誰稱病說余嘗思之自致之疾十九天與之疾十一心志飲食衣服起居皆能為疾皆自我而得自內而生豈非自致非天與也所謂心志之疾如七情百欲喜則氣散怒則氣上恐則氣下思想無窮遂成白淫妖淫則男化為女猛暴則人化為虎之類皆是也飲食之疾如醎傷筋酸傷骨因而飽食筋脉橫解腸癖為痔者皆是也衣服之疾富貴者溫厚過度賤貧者寒薄不足與夫增减不時者皆是也起居之疾如久坐久卧久立之各有所傷與夫衝寒冒暑不避虛邪賊風不知勞役之過度者皆是也天之所與不過六氣之邪淫勝復然而此二氣五行乖戾不正之氣亦豈嵗嵗之如是一極備以致舉國之人同病天下之人同病若是者百年中不一二者也人之得疾不出此五門暇日當於素問難經活人仲景諸醫經方論及吾儒書中論議病源處類編一集以為暮年養生之防置之風格曲盡戒慎以貽子孫亦不為無補大扺人能先知所以得病故能知所以治病草木生於土離土則死命係乎土也魚鱉生於水出水則死稟命於水也人得父母之精氣以生父母之精氣天地之精氣也三年而免於父母之懷食五榖之精氣以享百年故形不足溫之以氣氣體之充也精不足補之以味味能生精精能生神昜曰精氣為物遊魂為變蓋精氣聚盛則生消散則死故人當呼吸精氣持志平氣積聚精神內守則體強而神王以欲竭精以耗散真暴怒多言損氣則自速其死耳故飲食則當用有氣有味有夀之物腐敗氣絶夭折自死之物不可食不惟無益反為害也無事則當呼吸天地之精氣以實其真元伯有死而為厲鬼用物之精多也養生者形消而神不散者聚天地久長之氣也故曰食氣者夀易於復卦曰先王以至日閉關商旅不行后不省方者安靜而無擾乎陽也孟子曰夫志氣之帥也氣體之充也持其志無暴其氣食氣之法滿吸天地之氣入腹至踵盈滿充塞閉而勿出直至本身生氣盈餘不能容然後徐徐綿綿而出息息如是至於臨睡收斂卷局四肢握固存神毋使氣粗但覺而復如前法醫家要明五運六氣此治病務本之學也人賴天地氣運以生天地之氣和中正則人安而無疾否則隨其氣運之偏勝邪淫而疾知氣運則思患而預防之山河大地不泄不墜發生長養萬物者大氣舉之也大氣貫之也大氣包之也養生有道乎日月星辰得天之氣而明山川草木得地之氣而榮人得天地骨肉之氣而生五榖五肉者人之天也舍是而他求無是理也故古人循四氣之序而度五榖五肉之宜而食之月令中語此常法也又當自忖其氣之所宜而用之脾土生肌肉心火生脾土心勞則氣結火既先勞不能生土所以苦思癯悴服力無思之人少閒則易肥體強而夀古人多識前言往行以畜其德以養其性以致其夀發而為文章功業不勞而成今人每以文學事業勞悴病夭何其愚也哉是蓋不養其本而力求其末是以小大無成內外交病化書云形生而萬物所以塞也者才有是形便有巳私拘執意必固我為血氣骨肉執塞而不通所謂塞也又曰忘形以養氣氣得養則形夀神得養則氣充養神則猶有拘執不若養虛則天地與我為一氣萬物與我為一體太虛與我為一靈矣蓋虛者神之宅神者氣之帥氣者形之生培其根則幹柯枝葉花實不求榮而自榮矣人心本無憂患憂患之生始於悲貧賤而不知足終於貪欲而不知止良心一失萬慮奔馳而憂患氣至六氣邪淫本不能病人真氣失守故邪氣投間而入矣陽舒陰慘舒則散緩慘則凝束散緩則弛墮凝束則堅苦故南方之人弱而懦北方之人勇而悍氣使然也加以北方地髙水深脾土堅實南方土薄水淺脾土懦軟至於中夏之人秋冬則病少而康強春夏則病多而困怠故伐木於冬取其津液收斂於內脉理結實聖人之教又順天地搖落散伐之令也養生之道當閉藏培植於秋冬使精氣有餘以待春夏之散緩施發庶幾乎康強而少疾矣在昜之復卦先王以至日閉關商旅不行后不省方亦此意也農人安而夀者體勞而食昜消之故而又無思少欲貴人則反是身閒而堅飽苦思而多欲所以多病而年不永大扺動屬陽陽勝則安且夀素問四時調神論惟冬日大寒則早卧晚起餘三時皆晚卧早起又以流水不腐户樞不蠧為喻前人有云天之所以能載大地而長日久者健而不息以致然也故聖人戒人以自強不息驕樂佚遊宴閒非所以養生養德也養生之道莫先於薄滋味味薄則欲寡欲寡則神清體強立功立事無所倦怠正理之外無邪思體少勞而心長逸一可以少病二可以延年三可以成德性但患行之不力且久所以未有大效世之養身者見其肥白如瓠則喜何其謬哉血盛則肥氣盛則瘦血盛者安能得夀哉人之飲食當其心之勞逸而增減之余氣至弱安居則不敢過食過食則必病今嵗暑天馳驛閒居所不敢食者如冷水冷酪苽果過食之皆不為病以其冒暑而動所以勝之也形不足溫之以氣精不足補之以味養生之家咽津納氣以真補真醫家用氣味之藥至於五肉五榖蔬果新而有味者可食陳腐臭敗不惟不能養生反能害生沽酒市脯魚餒肉敗正此意也心火也火喜動則消耗人心不能斯須定靜才定則便昏昧而欲卧若能於定靜中不昏卧乃可入道東坡所謂無思而非木土者也故又曰丹砂伏火入頰紅腎水也水停滀則汚臭流行則不腐又能潤物故曰河車般水插腦黑火無靜而水欲行若火動而上澤動而下在昜卦為暌為未濟養生之要無出於此醫書謂心為君主之官神明出焉君主居尊處極靜鎮百骸從命腎者作強之官智慧出焉心欲長逸而形宜少勞能由之而不能知之者農人是也居官者反是孰夀孰夭孰安強孰多疾灼然可見伏火息心當自絶慮寡言為始絶慮則心不妄動寡言則真氣不耗更加以納氣調息則尤善行水補腦當自咽津粹味進退步趨為始咽津粹味為補精進退步趨則實下敬祝仲容病說病得於心思治之以心思病得於六氣治之以六氣病得於飲食勞逸治之以飲食勞逸是謂以天倫和天倫以類應平類應罔有不治不以類應則終莫能平治外病則昜治內病則難治內病者心思性情是也外病者六氣六味是也凡物有本有末本病而末不病治得其法尚且難愈末病而本不病不治而自愈故曰形病脉不病生脉病形不病死後世醫工治形而巳殊不知雖外來之疾亦當以心性治之必不能已而後用藥六氣莫盛於寒熱不曰靜勝熱躁勝寒歟不曰不火而熱不水而寒歟惟聖人為能窮理盡性知本末之先後重輕內外之合而為一靜生陰所以勝熱動生陽所以勝寒能如是則奚必以附子乾薑愈寒芒硝大黃治熱哉以此知一切外病苟能以心思自治有益而無損况所病得之於心思者耶內經之首篇則曰恬淡虛無真氣從之精神內守病安從來四氣調神論曰春則被髮緩形以使志生夏則使志無怒使氣得泄若所愛在外秋則使志安寧收斂神氣無外其志冬則使志若伏若匿若有私意若巳有得豈非平心志以順四時而防未然之疾歟陰陽應象論曰怒傷肝悲勝怒喜傷心恐勝喜思傷脾怒勝思憂傷肺喜勝憂恐傷腎思勝恐此豈非疾生於心志復以心志治之乎余觀仲容足下之疾以為寒耶服附子天雄乾薑大熱之劑而不能愈以為熱耶服芒硝大黃之劑而不能平以為脾腎之衰耶服沉香木香補精益氣之藥而不見效今乃神形不足顔色憔悴枯槁肌肉瘦减而不甘於飲食是蓋憂恐公務之不能辦不克有終思慮家事生理不能如父兄之在堂外內欲兩全而進退不能果古人之處窮身老尚當益堅益壯今仲容道通而不能堅身強而不能壯病於心志者念慮叢雜身處南方濕熱之地一人之身心勞形勞故得此疾今之為計既得還家和其心平其氣悅其情狀其志軟熱甘腴之飲食以補精之不足義理浩然之氣溫以不足之形忽然而肘為栁臂為雞而不亂然後以對證無毒之湯藥醪以助其天和則亦庶乎其可矣孔孟六經之言推擴充滿積實生則為聖賢死則為神明可以配天地贊化育可以模範帝王體大用周無施不可至於長生久視修養家之所學在孔孟視之反為土苴請試舉之孔子告顔子克巳復禮視聽言動告諸子之仁孝告曾子之一貫一話一言之垂戒門人無非內聖外王全天彛絶人欲知天命子思之中庸中和誠實孟子之存心養性持志養氣居仁由義合乎堯舜之惟精惟一允執厥中大抵此身之主心性而巳心能仁義中正飲食有節男女有别動容周旋無不中禮應物處事中節而和不為耳目口鼻喜怒哀樂愛惡欲所動如止水明鏡氣安得不和身安得不夀世之所謂醫經傾危而後扶病而後藥防慎六氣之外邪皆忘本而治末惟恬淡虛無精神內守為切身之學亦不免於枯木死灰非若吾儒舉大以兼小內外交養體立用行成巳成物之集大成也莊周以解牛喻養生良庖嵗更刀割也俗庖月更刀折也與物鬬敵奮爭其力安能不損屠牛坦之刀十九年其刃若新發於硎以無厚之刃投有間之郤因其自然之勢可開之路而施其刃故恢恢然有餘地養生治事亦然不與物競因自然之勢而利藥之我之神完而精力不耗事之勢自利而不忤故曰事至物來泛應曲當鏡明水清安靜如故故曰無為而天下治篤恭而天下平地以大氣舉之升降於大氣三萬里之中大氣吸而入故地升上三萬里晝短夜長大氣呼而出故地降下三萬里晝長夜短秋冬吸也萬物收藏春夏呼也萬物生長故人吸則腹髙呼則腹下世俗亦謂秋冬陽氣在內春夏陽氣在外在外地上也在內地下也地中也素問亦謂春三月之氣謂之發陳天地之氣絪緼而不猛暴人之養生者亦當無疾言遽色暴喜暴怒故老子戒人以調息養氣綿綿若存用之不勤多言語呌呼哀笑者用之過勤也志不持則氣隨而耗物之盛衰各隨其氣稟之先後先盛者先衰後成者後廢五行之生成水一火二木三金四土五異時天地將壞則水始竭涸火寒不燃水火陰陽之長子長女交相㴠養而生萬物水火絶則萬物枯而不潤凛而不溫生意衰矣生道絶木繼之而死金次之土又次之人之生死也亦然其生也首有腎其衰也天癸先竭其死也骨最後毁腎水也水氣也氣天一之貞也故養生者有辟榖錬氣忘形養氣忘氣養神養虛之說良有以也然而水火之相助而成物亦自相克蓋火能涸水水能滅火然陰柔終不勝陽剛故水必先絶有身者旦暮晝夜百慮千思悲憂怨怒熾心火而涸腎水自取衰枯可謂智乎東坡養生之說前後數千言殊無他法要妙處只在降心火火降則水自升坎離既濟內經所謂恬淡虛無真氣從之精神內守病安從來前賢為至人之心如玉在淵又謂至人之息以踵者正謂此也在我聖人名教則仁者靜仁者夀可謂又正大親切矣議堯舜議西山大學衍義帝王為治之序載堯之行事而不載舜濬哲文明溫恭允塞父頑母嚚象傲克諧以孝蒸蒸乂不格奸帝妻以二女能使二女嬪於虞受堯之命徽五典而五典克從納百揆而百揆時序賔四門而四門穆穆主大麓而風雨弗迷受堯之禪乃即帝位誅四凶而天下咸服命十二牧而庶績咸熙以是觀之舜之為治之序昭昭矣自好問而好察邇言樂取諸人以為善與書之載格物致知誠意正心修身齊家以及治國平天下節節有次案此下永樂大典原缺無别本可以校補姑仍其舊謹附識於此喻營室喻嘗觀乎富家巨室將營大厦不憂乎羣材之不足而憂夫梁棟之不可得不慮乎衆工之無人而憂梓人之不遇因是而悟為天下也亦然六卿之才難於州郡一相之任艱於六卿然而往古來今大臣之位未嘗虛席何也曰世無公輸子而未嘗露居時無王良而未嘗徒行然而欹傾無法之屋詭御紆轡之車亦無可奈何非為得人也今日朝廷為政雞未鳴而興晡而未退食可謂勤矣簿書不報期㑹之間不少容蔽可謂密矣勤則事當辦集而恆不集密則當無踈漏而恆久闕其故何哉舉其所事又皆末世之粗法細故一切文具而巳吏部銓選求仕者駢肩纍跡及其臨事不足於才能京師郡縣河漕上郡倉廪不足於食貨軍無征伐勞苦不免於竄亡民無橫斂而不安於鄉井胥吏填塞按房文字稽遲錯繆日不暇給時和嵗豐無水旱蝗疫田野市井不聞歡樂富足之音推原其故皆於誅名而不務實故人人一例苟且假公勤以濟貪競行督責而示剛直再求其故豈非營大厦而乏梓人御六轡者非王良歟升平奠枕尚且若是或天災或世變內憂外患不可必無瓦解土崩勢不難致吁位卑言髙罪孰大焉姑默筆之於草藁時開卷而三嘆焉使後世見之不謂秦無人也萍喻理一也得於細而失於大得於近而失於逺明於心目之所能包括而昧於耳目之所不能及萍生於水見者笑之曰何受形結根之薄也水增則隨之而髙水落則隨之而下水止則止水行則行水為物激風蕩則隨之而震亂分散何其不自由也若是奚不見夫大地乎力載華嶽振河海生萬物而不息德可謂厚形可謂大本可謂固矣然而有時而陷有時而震有時而裂升降於三萬里之中假舉於大氣若海之浮葉是豈能為自然也何以異乎萍水哉人生於世猶是也受命於君父寓性於形氣貴分賤分福我禍我者君父也我豈能為之哉飢則口驅我而求食寒則體驅我而求衣體欲安榮則驅我而求貴求富求名求利是皆莫由者也氣血既衰固焉而無營無思愚者昧之而曰我能執其權固其位長其生力求其名聖人所謂外物者我能挾手以固有聖人所謂命者我何區區而為之順受噫明於物而不明乎身誠愚也哉
