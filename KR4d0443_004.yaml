body:
  text: 紫山大全集卷四元胡祇遹撰七言古詩昊天觀羣鶴圖歌并序晉祠之北五里山曰龍山山巔有觀曰昊天殿閣金碧松檜隂森行人望之如在半空翠嵐晴潤白雲晚間鐘磬步虛之聲散落人間實為國祈天永命之福地也竊嘗思之敬鬼神事天地齋潔嚴肅誠一虔恭之心人皆有之然不擇其地雜於闤闠市井之間雞犬聲迹之外明神鑒之亦莫之臨若昊天觀之地靈境勝髙爽幽寂超出塵表宜乎百靈之降集羣仙之遊厯也至元十三年清明後三日羣鶴自西南來翔舞於壇墠飛鳴於殿墀前後頡頑各有行列移時方相率衝雲表入碧虛由東北而去河東士大夫賦詩成巨軸道士以為瑞應繪圖請序其端仍隨例韻語以歌之龍山昊天萬夀宫棟宇直欲摩蒼穹塵世殿閣非所同豈徒眩目誇青紅寶香窗户含天風簷牙朝暮白雲封霧迷松徑不可通仙境豈許人力窮人間時得聞磬鐘祥霏瑞靄常濛濛乘鸞翥鳯度碧空仙軿神駕相迎逢召公近奏平南功萬方賀表如山崇神人咸和喜時雍羣仙集慶欣相從萬鶴翔舞空明中法宫嘉宴不匆匆移時雲影回仙蹤吾皇萬夀居九重四海為家金四墉仙翮嵗嵗來朝宗又題六鶴圖心非青泉白石姿掌上丹砂亦徒施髙情愈逺愈難寫世無薛稷誰瑕疵常觀庸筆寫真李太白塵顔俗狀軒昂眉目何異醉飽屠沽兒九臯清唳勞我思觚哉觚哉鳯兮鳯兮奚止於是堪嗟咨農器嘆寄呈左丞公夜宿田家耿無寐窗外主人長嘆喟歎聲未絶還獨言言切音哀復歔欷國家敦本知愛農特設大司專保惠分司勸諭立課程朝送農官暮迎吏誡言諄諄不敢忘榜示門牆加勉勵小民衣食在田畝孰願飢寒仍負罪火雲赤日汗流土月落參橫手扶耒趂時投種惜雨乾泥淖耘苗恐荒穢繭絲租調僅供辦衆口嗷嗷憂卒歲火燒炕暖代衾裯藜藿何嘗識鹽味農家辛苦感國恩農具依前俱勿稅木根損鏵石損犂取與鄉鄰不難置行商到門問有無粟麥絲麻相換易有時負價卒莫償纍月經年不嗔恚農人種田爭寸隂農器易求無止滯年來貨賣拘入官苦窳偷浮價增倍賣物得鈔鈔買鏵又憂官局遲開閉入城最近百餘里數日遲留功漫費耕時不幸屢破損往返勞勞凡幾輩往來勞苦不憚煩一刻千金惜虛廢欲於農隙多置買粟帛無餘百無計農官農官助我耕何異奪薪催釡沸一鏵廢奪十農功辦與官家多少利勞形餒腹死甘心最苦官拘賣農器捕蝗行并序至元六年北自幽薊南抵淮漢右太行左東海皆蝗朝廷遣使四出掩捕僕奉命來濟南前後凡百日而絶故作是詩老農蹙額相告語不憚捕蝗受辛苦但恐妖蟲入田中緑雲秋禾一掃空敢言數口懸飢腸無秋何以實官倉奚待里胥來督迫長壕百里半夜撅村村溝塹互相接重圍曲陷仍橫截女看席障男荷鍤如敵強賊須盡殺鼓聲摧撲聲不絶暍死豈容時暫歇枯腸無水煙生舌赤日燒空火雲裂汗土成泥塵滿睫上下杵聲如搗帛一母百子何滋繁聚如羣蟻行驚湍嘉榖一葉忽中毒芃芃枝幹皆枯乾無乃民勞吏無德可能百郡俱貪殘廟堂調燮亦有道胡為凶􅖈來相干聖躬愛民夜坐起遣使日馳三百里太宗吞蝗那可比願隨時雨俱為水誰憐粒食誠艱食螟螣蟊賊口中得土戰勤勞血戰憂田家一飽豈易求今冬斗粟直三錢力回凶嵗成豐年公私倉廩兩充盈大車小車輸邊兵後捕蝗行飛蝗撲絶子復生脫卵出土頑且靈有如巨賊提羣朋羣止即止行則行過坎涉水不少停若奔期會趨逺程開林越山忘險平倍道夜走寂無聲纍纍禾穗近秋成利吻一過留枯莖生機殺機誰控衡強梁捕取理亦明深塹百里中有坑投軀一落不可升億萬鍤杵敵汝勍肝腦塗地如邱陵行人兩月增臭腥咄哉妖蟲竟何能火雲赤日勞羣氓征戍嘆吁嗟兵制胡不均富室益富貧益貧百丁萬畝不介胄重以髙爵榮其身鞭笞卒伍等徒配暴橫刮刻誰為嗔兩椽茅屋一孤影妻子寒餓常酸辛終年應役欲誰代窮邊刁斗昏復晨樞府哀憐立新法三家兩家為一門終竟富不與貧偶扶持支助徒虛文困弱相依日詞訟祗與案牘供錢緡病亡逃代姦百出勘會保結何紛紛一兵征行一夫送征人甘分嗟農民長途往返少違限追呼撻箠連比鄰積年逋竄不可復官吏負罪眉亦顰我無長䇿拯斯弊執筆判署空憂勤趙仲器冶古齋古人制器藏妙趣立法取象非徒為精堅密緻乃餘事象以形著義理隨斫耜揉耒取諸益網罟生自明兩離刳舟剡楫風水渙弦弧鏃矢火澤暌器成借力百工手其原聖哲勞深思嘗觀博古圖至理誰復推夏金鑄禹鼎萬怪不可欺湯盤及周敦形模亦多儀文章照欵識一一垂誡辭備物薦郊廟格天神地祗寶藏遺後嗣百世咸宗師唐王踐祚受册命東房西序何輝輝秦漢而下不遵古詭形怪狀逐意移浮華苦窳求悅目工不信度隨我宜朝嗟觚不觚暮嘆匜非匜干將鏌鋣聽呼索翻以古人為拙癡下不順物性上不循天時淫巧互凌跨小智爭自私隨成復隨敗所費恆不資周官考工篇迂濶何足規嗚呼百器尚如此禮樂刑政良可知鐘鏞誰復辨惉懘擊石拊石從髙卑偶因制器傷世變書作冶古齋中詩和婁參議詩韻困趨迎厭奔走對鏡茫然慙皓首正爾無物洗惡懷百韻新詩得元九薔薇佳酒清滿壺珍重相邀一開口下榻拂凝塵却掃降敝帚人生會合難多竒而少偶我思見君莫逆交君亦期豫嵗寒友風期相合不易得一笑一談寧肯負把臂細論文舉白豪吸酒忘形到爾汝苛禮不煩守玉纎瓊甲送觴來籌合新歡間袖手鱗錦駝酥厭八珍肴䔩雜陳集山藪餘馨剩馥飽僮僕白飯青芻及馬狗兀然一醉百念銷人間萬事無所有晉賢誠逹人飲不論石斗豈不自貴重誰與辨禾莠潘嶽一縣花陶令五株栁趣向既已定百欲不可誘胸次自涇渭口不出臧否花梢紅日上東軒竹影清風來北牖山鳥山花吾友于鶴唳猿吟和呼吼家奴種黍供糟床取足何須論百畝拘囚笑謝國中人放曠願同林下叟青田飛白鷺了不受塵垢肆志輕世懷肯以事掣肘嵗穰嵗凶儘百年不貪寅卯憂申酉雨足竹生孫霜餘芋依母舉觴酹先酒稷為百榖后遣興羞為李賀詩搯擢腎腸心欲嘔笑傲得此生乘化從老朽自知乍可為雞先附尾那能作牛後琴書及妻子擕抱從左右欲眠即過午思起何礙丑漁竿與耕鋤自視等草綬柴關晝掩無俗客雞犬依依成牝牡貧賤如磐誠自樂富貴浮雲非我厚坐憐門外趨迎者婢膝奴顔競妍醜道亦非吾道氣亦非吾耦多君髙志出冥鴻駟馬千金還弗受歸來暇日理田園菽粟豐穰積山阜床頭時自釀佳醪笑會賔朋享期夀未患莫知心匪石嵗寒後知松柏久送張子政君不見蕭何乘時起刀筆漢室開基功第一長才變化蛇作龍安敢區區較前迹身名勳業合俱髙滿眼黃金同瓦礫古人居官長子孫後人防下如防賊三年轉官復轉吏誰議姦生由法出法益精嚴情益偷治罪何如先養德丈夫此身當自重悖得到頭如順失誡君亷慎繼公勤邪正邇來分白黑松植蓬蒿易出羣木從繩墨何勞直簿書奚足老英雄舉首鳯池何咫尺送孫伯淵衰老無事門長扄扶杖起應敲門聲續孫二子來告别往應吏部三呼徵人才自古應世出山公啓事今公平不才廢黜能者進細木為桷大為杗妍醜詎可逃明鏡重輕未易欺權衡不患無位患難立二子素有亷幹稱但秉赤心思報國何憂不作貴公卿贈劉講師靈臺山下虛極觀主人劉姓字子真年登八十益強健道氣盎塞煙露身鄰家井深二百尺鑿井得水如有神志形絶學鍊精魄千年要作羲皇人松窗夢起笑人世蚍蜉擾擾爭紅塵有時隨俗入城市落花飛絮長安春嗟豫本非聲利士常懷漉酒淵明巾急流勇退會當遂杖履徑謁清渭濵贈默菴邢仙翁默菴仙翁吾不識趙佞作傳求詩什仙翁髙年今幾何童齒黃冠今八十無事經年不到城有脅平生不沾席養虛寥寥入至虛調息綿綿作胎息黃精肥甘松子香腐臭人間煙火食厭聞世上海飛塵飽見巖前松化石每將螻蟻等王侯直以春秋比朝夕回頭俯視長安城哀死榮生幾歌泣題所翁雙龍戲珠圖黑雲湧海雷破山兩龍出沒煙波間不思崇朝雨天下一珠為戲何癡頑所翁何處得此態三生海賈知妖姦澤能及物尚乃爾蛇蝎豺狼虎豹磨牙吮血口舌宜瀾翻詛桑葉蟲有蟲局行名步屈有蟲夜飛名黑蛛二蟲有吻食桑葉緑雲一掃成枯株朝才掩撲暮復盛感化生殖乃爾殊嗚呼天將祐凶物繁衍不許人力除密雲摶空不為雨爍爍旱火燒八區蠶生無食滿筐筥農人倚杖空咨吁公家繭絲不易辦奚憂夜臘砭肌膚里胥臨門急星火天網何地能逃逋蓬蒿荆棘不一食何獨兹木多甘腴我行聞是言舉手招田夫語汝造物理呪詛良踈迂桃將稿斃出桃虱瓜當爛熟生蟲蛆麥米到陳腐變化蟲百軀人生元氣衰九蟲來乘虛國家紀綱壞肘腋生姦諛有感那相應起伏隨機樞慎勿增怨歎二蟲素冥愚崔珏戳猛虎昌黎驅鱷魚異政能幾人熱中徒憂虞聖代新來下恩詔已賜今歲疲民蘇寄何中丞馬侍御取人以言已非法言亦見廢將何從正如茂林集烏鳥紛紛誰辨雌與雄於今憲臺議最公鏡明妍醜難為容一職得人百城治湯火息熖冰雪風田師孟寄紙索鄙俚以此寄贈河魚腹疾今兩冬閉門罕與人相從寄紙千里索鄙俚中心慙恧成衰慵往時馮婦善搏虎邇來袖手哀龍鍾重遺雅意覔塵藁醬瓿一覆無遺蹤古人立言至不苟要與天地傳無終德厚才雄出新意格言字字開盲聾正如造物氣坱圠吹噓萬物紛青紅豈同世儒尚剽竊抽籬徙壁西補東老來細嚼羣聖言愈覺造語難為工好名苦心續六經至今識者非王通昌黎老筆不作史自視難與春秋同今人下筆千萬字屋下架屋何重重有心作文已差謬聖門正學殊無功誠身治人兩無用道聽途説誇辭鋒不知中表自矛盾著書滿屋將何庸偶臨細事毛髮比汗顔血指招災凶斯文掃地何乃爾千載誰復悲麟窮至元壬午秋旱米湧貴人絶食禁糜黍作酒因以除酒課焉喜為之賦詩漢武窮兵𣙜酒酤糜榖漸多非法古後王踵習以為常藉酒豐財成典故嵗增月辦程式嚴億兆門門為酒户賢愚中酒得愆尤論法從輕歸過誤居官嗜酒日醺酣田畝銜杯廢農務竹林七賢稱逹士開元八仙爭效慕士風放曠亦如是四海巫風了晨暮一篇酒誥誰復讀子醉父前從噦吐今年秋旱人絶糧酒禁申明嚴律度外方郡縣內京畿不見青簾蔽街路殷周善政今復行萬事冥冥有天數臣鄰士庶總醒醒禮法從今敢移步和王誠甫村居韻桑柘隂連桃李樹人在翠微山下住水光林影讀書堂夢裏相尋時一去瘠磽莫厭山田荒不隨蟻穴蜂衙忙丈夫出處豈徒爾鄰野何慙緑野堂糊窗感懷六月開軒驅溽暑八月糊窗障風露暑寒相承一何速過眼春冬如旦暮人生得嵗數十周直與無窮鬬馳騖焉知氣數不可逃以力勝天矜智慮每將得失較賢愚一片驚心亂無緒藏金郿屋未厭多八百胡椒更貪慕我生天稟鈍且愚紛鬨羣雄事貴富偶為飢寒驅入官情味翛然一儒素有子已課學力農不才恐被功名悮四年京師觀物變造物戲人今乃悟安得心間日月長桑麻雞犬江村路徐熙桃花牡丹圖武陵溪頭千樹花和風麗日蒸朝霞洛陽花品成譜帙魏紫色香居第一徐熙僣竊東君職曉日未晞風露濕融融榖雨三月天愛花得花長眼前錦囊玉軸莫漫開恐引舞蝶遊蜂來跋石曼卿古檜詩卷辭希少陵古柏行字畫逺過歐率更玉鸞未返芙蓉城氣豪得酒河漢傾蚍蜉擾擾京塵腥世門兒女宜多驚後人有口能題評神遊八表君有靈拊掌一笑蒼蠅鳴中統季春二十八日雨亢陽不雨陽絶隂雨而不止名曰霪五日之禾十日麥過時而雨非甘霖始知天地至和之氣一乖戾咎徵凶嵗隨相尋古之