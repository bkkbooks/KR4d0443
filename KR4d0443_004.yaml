不收兹時孰與分薰蕕乾坤正氣豈絶休張綱范滂今有儔慨然再挾千年輈英氣攬轡橫清秋一洗豺虎消百憂畏首畏尾繞指柔浹背赧汗沾衣流姦邪富貴到白頭何如剛直卧巖丘登車行去悠悠排邪獲罪非所愁卵翼山東四百州題顔太師墨迹太師魯公忠義筆石刻重摹尚珍惜太師蓋棺六百年清節照人如昨日平生想像望風采生不並時那可得今晨異事非偶然盥手焚香拜真迹拜君心畫憶前事掩卷罷觀三嘆息河北名郡二十四逺識誰知復城壁當時豈無匡時言太平天子方驕佚兩京流血蜀道難僥幸中興豈人力老臣如公能幾人凛節四朝持一德杞賊姦邪四海知戲謾庸主排忠直自古如絃死道邊不覺歌詩淚沾臆至厯下憶子勉運使故人䇿鞭來東方五年千里遙相望今年以事走歷下又與故人成參商吁嗟不覩故人面惟有碑榜留文章心聲心畫得一見恍如把臂臨清光人生能消幾回别再會各憐鬢滿霜始知宦遊情味惡半生萍梗何奔忙誰能強健得告老杖屨鄉里間徜徉趙禹卿匏瓜齋詩君不見玉杯瓊斚黃金瓶玳甌象筯烏銀罌翠屏鈿兒奪眼明如意醉擊珊瑚莖一朝奴輩利財貨所寶適為他人營又不見昨日見逐今客卿髙簷危棟連飛甍方花古礎排七楹門楣大榜書佳稱繡衣絲履雜簮纓寶鞍朱鬛光照庭夜半大厲瞰門扃黃犬追嘆嗟虛鳴汚宫瀦室竟何有但見腐草飛流螢羡君閲世能自寧急飛勇退鞲脫鷹紛華美麗鴻毛輕髙齋命以匏瓜名巵匜隨形各天成枵然酒盡壺自傾不將不迎來佳朋醉者自醉醒者醒去城十里上馬到蕭然逺隔塵泥腥盤谷圖序書座右歸去來辭為東銘春課兒孫多種木秋催童僕更深耕一瓢陶然時自適髙秋擊壤樂升平西山罨畫雲間橫題醫者王庭訓素軒詩素軒與豫少平昔李侯德常擕紙來徵詩端人取友慎許可敢以不敏三致辭一篇黃帝書萬世醫者師素軒世醫業研究心孜孜尚友啓元子每恨不同時要當論難立新説一字廢睡終夜思學醫到如此人命誠所司乾坤造物或失中力與六氣調安危病來聞問識源委器使百藥如家兒古今方論充棟宇曲蹊方徑非所知當年有無上池水徒駭視聽誇神竒人生寧可食無肉不可一日無良醫節食服藥最我老來事安得移家相近朝暮相追隨哀飢民天災流行孰可禦水災何如旱災苦秋旱十日已成災自夏窮秋天不雨細民安敢厭藜藿榖菜無苗盡焦土誰能一日不再食火濕寒泉釡空煮義倉虛名固無用所費不資無寸補天下常平幾萬間公廩空厫走飢鼠千家一室粗儲畜亦豈有餘供貸舉山家入山收橡實不避林深遇熊虎平野村村食榆槐寒滑那能辭腫吐樹求葉實草尋根男執斧斤婦筐筥不憂湧貴憂無糴俗吏區區定時估一年凶荒遽如此再嵗何方逃死所牧民誰作父母官尚惜一言申省府前催和糴後催糧流殍遺民今幾户邇來馬牛皆半價芻豆俱無難作主何時斗米復三錢山積陳陳到紅腐息軒畫馬圖息軒筆端生萬象羣馬一幅尤神竒初疑天寶汧隴地無乃漢家金粟堆騰驤飲嚙各異態矯矯虎脊追龍媒雲煙慘淡水清淺渥窪髣佛臨天池天然間適發神駿不比伏櫪困銜羈牧兒乘髙喜蕃息長風剪剪吹貂旗先生房夢奪宿魄曹霸韓幹安足希秋山春水從天仗慣賦宣王考牧詩書生駑鈍例衰懶一馬欵假仍疲羸開圖愛玩不忍舍壯心感激將飛馳西極南荒未治化自憐黽勉持毛錐豈知吾謀適不用棘門霸上真兒嬉安得此馬二十萬立縛兩主趨丹墀因巡按至長清縣聞事自警中年以前月生光中年以後月光缺年登五十無所聞聖教難施宜見絶我生倐忽夀六秩悔悟前非生內熱氣血雖衰志不衰鍊事精炎心似鐵所求得路耳順成人十能之我千百正如行人能涉獵省悟迷途改前轍去非從是易為功聲入心通自澄徹貞婦救夫殺虎圖生民之天君父夫不幸搆難當捐軀壯哉野婦非知書救夫剛膽鐡不如正氣吞虎如狸狐精誠動天虎伏誅劍光怒髮衝雲衢英烈一日聲八區夫喜復讐三日蘇義士擊節成畫圖世復租稅光門閭照映史册激懦愚死節忠愛羞遲徐我朝人倫厚有餘殺身成仁匪干譽當熊馮媛無時無四門穆穆雲日舒祥麟瑞鳯生郊墟吏無苛政傷惸孤題右軍書扇圖中興有才無不許英氣橫空無著處會稽山水足間曠萬竹青青照庭户東山謝公亦髙人一起未易湔塵土蘭亭佳序寫幽懷殷浩何人知肺腑間窗弄筆作遊戲虎躍龍騰走風雨髙情已自過鍾張戲以百錢驚老姥當時墨妙墮渺茫畫圖想像開襟宇字字精嚴豈偶然至今池水元雲吐長才偉器百未施直以書名垂萬古題杜君復家藏王黃華雪梅圖玉堂仙人飽玉食倚風咳唾成珠璧散花天女不敢前瓊室瑶階衆香國却嫌太素苦清寒試手春風開玉粒欲書不書持醉筆抹畫氷綃三萬匹月明蓬萊水清淺偃亞寒梢幾千尺玄𡨕退席驚竒特揮斥氷花蒙玉質羅浮窗户愧庸俗江妃籬落羞寒乞趙昌徐熙塵土人辦與凡花逞顔色仙人飛升今幾秋髙氣清香尚蒸濕人間寶墨有如此錦囊玉軸加珍惜幽人不見林西湖誰有新詩能破得九原喚起花光僧茗碗分香照濃碧展卷相看洗塵臆題婁參議詩樹得名詩樹有二説為君注解在所擇作詩要使主意明根幹枝梢到花葉意明辭精興寄髙一樹瓊瑶萬花發漫無命脈百千韻敗葉飄零誰總攝正如富人號錢樹亂落分飛空瑣屑半山老人選唐詩一集百篇存一絶詩律貴工不貴多無使黃金雜銅鐵一聨一詠堪諷詠傳世誰能捫衆舌我言相敬不相欺深叩草堂當得法過王彥章墓墓在汶上城西虎臣剛中膽如鐵臨敵誓天甘死節梁室存亡係此身鐵鎗可折心不折朱溫父子自梟獍可憐力盡忠貞血五季君臣真傳郵假威視勢懷攘竊癡頑無恥馮瀛王更夫易主同娼妾汶陽城西一丘土起豫凛凛衝冠髮豹死留皮皮可朽人死留名名不滅威武那能屈壯懷至死名呼邈佶烈寄馬德昌遺安堂深有餘慶瑞世皇皇生五鳯文章官業兩崢嶸庸懦聞風亦飛動丈夫墮地豈偶然白璧黃金宜自重南風過雁得新詩字字鏗鏘堪詠諷想當談笑了官事髙齋坐受雲山供一時交友盡豪傑萬象無聲自嘲弄一江風月酒滿船世無謫仙誰與共大鵬扶搖九萬里斥鷃蓬蒿莫攀奉人生難忘父母邦何時定作還鄉夢題楊祕監畫裴晉公探梅圖晉公貌不踰中人有唐輕重係一身四朝顧命二十載千瘡萬孔俱彌綸功成不有若無事别業徜徉洛水濵四夷致問民戴慕祝公遐夀踰千春一遊一宴入傳詠到今陳迹猶如新息軒尚友志不淺思公恨不同朝紳探梅故事作橫幅堂開緑野延佳賔招之不來白少傅歸舟觸碎波心雲美人清唱梅花曲雪寒四座回春溫淮蔡誅夷太平後此樂未足酬公勳畫圖宜為什襲珍望之威重不敢親儼儼元和社稷臣鹿庵所藏戟枝峯詩鹿庵几石名戟枝金碧熖熖騰光輝前峰巖巖東魯聖楊休玉立冠峩巍後峰具體顔氏子拱手接武相追隨元氣純全入涵蓄詎如髙士軒鬚眉世人愛山徒悅目千巖萬竅誇新竒何如兹山不纎巧氣象直與恆華齊竒章甲乙固多品以志徇物何足規先生玩理不玩物岱山同此石一窺筠窗書几靜相對聳出物表無凡姿雲煙朝暮從萬變怡然坐對忘朝飢題儲天章菊軒詩揚州紅藥扶桑日香滿人間照天赤洛陽瓊英萬蝴蝶舞破霓裳羽衣白金盤一本直萬錢貴戚走馬爭後先珠簾玉階春晝長不煩纎手送瑶觴噴吐竒麗難再得弗念傾城與傾國奚須明眸映皓齒花妖醉人乃如此花中愛菊能幾人悠然公去無後身一杯坐對南山意直到儲侯知此味題田御史集瑞堂髙明之家鬼瞰室瀟然一堂羣瑞集無情草木寧有知和氣薰蒸昭令德散滿雲窗月户香一日嘉聲徹京國古人視履考貞祥誰謂前途黑如漆一篇嗟哉董生行不愧昌黎五色筆南鄰金珠塞華屋北里朱輪照金戟無德而祿殃必酬火臍襪口嗟何及後人勿廢前人光子孫世世其逢吉挽許左丞魯齋憶昔朝廷求直言竒謨偉畫爭後先對病之藥不易得大䇿與衆殊相懸不從事事論得失清流莫若先澄源曰心曰性開聖學敷陳詳悉登經筵惟先格王正厥事此心一片金石堅當年羣儒那解此迂濶譏議何綿綿陶鈞髙士惜未遂沁南養疾桑麻田聖情虛佇待可起台星頓減清光圓從今大政向誰問賴有遺藁留長編慶嗣能得雄嗣能茂異鬢欲絲著書五車需一兒今年釋褐作教官得雄佳應相追隨故人侍御送詩賀勸勿過愛宜寒飢友朋相愛恐衰暮仁必有後何憂遲鳯雛驥子自有種英氣已見浮修眉要於激怒聽聲響欲乳不與令號啼傳家嗣續豈細事奚止翁媪相娛嬉詵詵繩繩自兹始桑孤蓬矢嵗嵗懸門楣過平原天寶之政何淫昏卵翼蛇虺無遺恩逆情已露穢已聞寵錫兵柄開凶門兩京流血塗帝閽二十四郡同潰奔孤城獨有顔平原鐵腸不撓樓櫓存人心倚公不披紛池深如海城切雲羯羶惡念終日焚酸辛西來迎兩君老波一瀉長河翻四朝苦節德益尊賊臣姦舌孰可捫假手凶逆誅耆勳太師恩禮何虛文九江不洗忠血痕到今節士哀聲吞青天白日照忠魂雉堞是非餘短垣野煙村樹如荒村一廟血食誰與論扁題髙義張吾軍一洗萬古鴟梟羣題三蘇翰墨眉山巖巖挾雙峰西南陋邦豈能容地軸左轉來向東直與太華爭尊雄英偉驚倒六一翁京師多士為一空望塵羅拜趨下風姓名即日徹帝聰談屑散作香霧濛文章爛漫如長虹帝堯堂下添夔龍聖賢千載一相逢三更送歸蓮燭紅當時相業雖未終辨姦諸論萬世公遺墨一字摧羣凶過徂徠山謫仙乘龍去不還白雲空鎖徂徠山當年咳唾落巖壑至今澗草如幽蘭玉堂金鑾不伸肘醉遊萬里天風寒古風六十配風雅一唱一嘆清肺肝傳芳再得石守道正氣髙壓青雲端慶厯一詩無敢作表章忠正誅妖姦兹山自從得二賢拄天萬仞青琅玕書生朽骨億萬萬名與秋草隨霜殘乾坤清氣我不與坐長白髮凋朱顔一言蓋世不能辨自笑生死文字間王事有程前路永西風落日催歸鞍讀書堂基杳何許濯纓山下溪潺潺題石曼卿草聖烈風急雨驚四溟雷轟電掣神鬼驚萬字一息筆不停九天銀漢為一傾醉呼張旭不敢譍雄詞傑句江海聲腳蹴俗扎慕蘭亭劉潛佐酒飛巨觥百尺樓髙北斗橫人傳二仙臨帝京百年厭世還青冥白雲何處芙蓉城燕城中秋白露橫空洗秋碧清輝溢地升飛壁滿襟沆瀣消塵臆入地水光寒不濕孤客天涯有今夕惜無玉笋橫長笛百年好月不易得忍使流光駒過隙謫仙百杯盈一息庾樓去天不盈尺二賢髙逺能自適西風回首成陳迹前我好月嵗千億後我有月無終極人生此身非金石一刻千金良可惜古人誰得今誰失後人視今今視昔毋言酒石金幾直熖熖東天海波赤贈按察慶甫陳侯昔聞東原號殷庶五十四城桑柘土一朝被檄入城闉見與所聞何謬誤街衢十室九茅茨雨夜霜晨悲破露入雲髙第十餘區金碧崔嵬鎖煙霧野人君子同有分奉養相懸太踰度勢如豪貴三數人丐餓百千為從御兹時四海總同風急斂暴征那計數淫荒凶酗恣我為愛憎生殺夫誰懼天將悔禍良不難煌煌曉日開雲路貪者廢削強者誅立與貧寃除巨蠧陳侯按察來東方攬轡澄清酬所負豺狼辟易肝膽寒狐狸奔竄愁僵仆覃府髙懸一鏡明市獄何須求細故州縣追胥不下村荒逺農家無外户坐令懸罄積囷倉齊紈魯縞如山阜三年諸道細論功籍籍何能脫朝譽攀轅卧轍恐難留佇看催徵廟堂去
