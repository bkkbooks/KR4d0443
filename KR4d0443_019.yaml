body:
  text: 紫山大全集卷十九元胡祇遹撰祭文祭伏羲氏文四篇仰天俯地畫卦造書德通百神情類庶物發天人之奧妙開耳目於蒙聾百獸率馴羣生咸遂修燔炮以代血毛之食從簡朴以服皮羽之衣聖冠百王功垂萬世敬因秋祀式薦明禋代天而言作民之極誠孚德覆獸伏鳥馴法乾效坤開物成務前王無配後聖是師兹率舊章載嚴秋祀生民之初標枝野鹿不生大聖聾瞽孰開火化既修人倫既序有綱者政有璀者文獸不為災人貴於物為民立極惟皇之德神龍負圖人文斯定絡馬鼻牛以前民用燧火熟腥以濟民病倥侗顓蒙是彞是訓穴居豕遊有倫有政盛德大功孰非元聖祭神農文四篇斷耜揉耒教民務農飢而食寒而衣疾而醫病而藥五榖盈廩百草圖經通天下之財成日中之市天縱將聖福我後人澤流無窮禮宜通祀式因常報敬薦秋成火瑞格天太昊齊聖五榖既藝百藥備嘗克當天心以夀民命萬世永賴神功益彰稷黍西成敬陳常薦草食而毒鮮食則艱黎民阻飢皇則食之耒耜既陳黍稷藝之草木金石等差愈疾既飽而嬉既夀而安追本推原惟皇之恩襏襫耞耒教民粒食别味嘗藥人無夭疾化國樂郊虎豹逺迹居居于于民朴俗一教行化成莫知刑辟火瑞火紀萬世仰德祭黃帝文三篇鑄兵除暴垂衣御宸備百物以濟民生登九天而成聖業冕服有制禮樂用彰貽百篇藴奧之內經開萬世無窮之夀域恪遵祀典仰答神休兹因西成敬陳常薦雲瑞受命神化宜民中立兩儀正名百物力牧作相岐伯作師立政立言仁夀萬世爰因常祀敬薦庶羞聰明既開姦偽滋起惟皇作君威以弧矢垂衣而治禮樂亦明飽食逸居百疾交攻惟皇隱憂作為醫經扶危而安起死而生著書垂訓民無夭札後之為君仰茲成法宫室車輿裳衣軒冕百物咸備以濟時變定厯作樂談醫論道躋民仁夀既富而教創制立法畢具無缺後聖後臣無損無越祭五臺山神文某官某謹遣某致祭於五臺山神方今聖天子在上百神受職嶽瀆之外名山大川在一方者望秩禮畢守土官歲時致祭未嘗廢祀聖天子恐土人之不誠潔黍稷之非馨時遣名僧作佛事以祭國家敬恭明神匪懈匪怠惟神歆受明禋不可不垂報祐興雲霈雨潤枯蘇旱神之職也雨澤愆期年榖不登災及於民豈神之欲也至於獄寃滯而不理吏曠恣而弄法賦稅不均政治不舉寃憤充塞干犯和氣此土官之罪非民之罪也降災致罰請加諸身比歲秋旱太原一方之膏澤神實主之聖天子禱祀之誠惟神其鑒之深山大澤實生龍蛇既能生之必能役之起蟄龍飛瀚海一洗魃虐此神之賜也某等之望也尚饗祭汶水神文維大元歲次癸未四月乙酉朔越四日戊子某官某謹致祭昭告於汶水之神聖天子臨御二十五年於茲矣五行循序庶徴惟和聖算睿思以謂水由地中行猶血脈之榮一身大經綿絡一有溢滯則身為之失和所以敷平導決地平天成萬世永賴夏禹以為巳任八年於外而不辭也惟神載在經傳實為名水惟其開導修潔之不至障塞壅蔽曲為隄防不惟不盡神用而為民害是用命某等敬順神德轉失為功乘水潤下直走京師遐方異域月輸歲貢如山如阜不復告勞神之力也伏願祈寒不能凝其行秋潦不能鼓其勇載泛載浮有恆無替四時牲酒肥腯馨香著之祀典與國無疆尚饗祭泗水神文維大元歲次癸未四月乙酉朔越四日戊子某謹致祭昭告於泗水之神皇帝事天勤民神人咸喜六合之內名山大川能興雲致雨者罔不望秩禋祀海瀆受職川澤效靈九夷八蠻通道致貢陸行山宿輪蹄困憊浮重致逺無若水運是以按圖命官疏導穿決舟楫所通逺邇咸集惟神源髙委長徹達南服來威來庭萬里取便某等拜受廷命開除壅蔽疏導堙淤贊神功而舒民勞達方物而饒國用伏願旱不淺澀霖不濫溢溶溶漾漾不舍晝夜祥飈送帆棹歌奏功與國無窮廟貌血食尚饗西冶祭金火神文某年月日某官某謹致祭於火金之神惟神祝融正號蓐收表功炎熾而威從革而利成熟庶物剸裁萬堅列五材以養民分四時而成歲神功相協國用以饒方今我國家外修武偹內敦農桑欲成其功先利其器兵則戈矛劍戟農則耒耜鋤耰有備無虞闕一不可分命厥官大典諸冶某等董工就事備物具材有炬既明有槖斯舉謹占吉旦敬告明神伏願炭熾而堅礦銷而利出掃江河之決積金山嶽之髙恪遵彛儀式陳明薦尚饗皇城啓土祀神文奠安神鼎巳成萬雉之崇墉拱衛皇居宜亘重圍之禁宇土功率舉坤靈實司再獻明禋用符卜吉遵自周之宅洛肆於郊以用牲雖楨幹畚鍤之暫勞庶外內闕廷之咸偹邦基永固神庥是扶彰德路祈雨文闕潤民之實惠怨語升聞忤造物之至和亢陽示譴貪汙失德黎庶何辜黍稷吐穗而中乾麻豆成隂而半稿工商憂穀價之增貴田野懼嵗凶之死飢小大焦勞賢愚愁嘆某等任守土之切責先祈年之隱憂悔罪懷慙痛心疾首仰干慈造屈賜哀矜敕名山而詔大川起癡龍而誅旱魃曷勝慶幸無任恐惶祭杜元伯文菌耳無日蟪蛄無年人莫之恤各盡其天長松千尺可駕萬椽源泉混混可别萬川夭閼淤塞拔本塞源生也何厚廢也何偏天生蒸民衮衮同類愚蒙駑庸萬不一慧白玉樓成鵩鳥投墜與也何難奪也何易嗟嗟元伯百未一施玉冠而溫山立而儀童稚讀書警頴不疑一日千里迅不可追弄筆措辭汪洋陸離先覺有言杜氏有子過庭之訓曰詩曰禮業之後先學之源委業日益廣行日益成洗眼一飛傾耳一鳴一入京師四海知名孰謂一疾奄忽泉扄嗚呼造物各相乘除富貴夀考多歸魯愚才名一鍾命則不腴此何不足彼何有餘誰司權衡校錙量銖父兮爾思母兮爾哀過君之門愴余之懷人之有死如旦之暮死而無憾而謂之數獨於吾友怨激無訴有淚何窮一㵼君墓嗚呼哀哉尚饗祭趙繼先墓文某年月日某謹以清酌之奠祭於亡友繼先之墓君始自魏來相扶老携幼謁我先人先人指君呼余而言曰斯人也陵川趙會元公定先生之子也母李氏河中李金吾之孫欽止欽叔之妹欽若欽用之姊也爾祖治解欽止為縣屬公定為門客姻好締交爾祖實成之也三世通家親若同姓宜善交之故繼先稱我先人以舅不肖於君之母敬以姑禮拜之子姪輩歲時伏臘往來慶賀自時厥后僦舍同里氣相噓沫相濡若此者將十年吾友以世為西人還家之念日往來於心不肖輩懇不能留奉母氏挈妻子復歸故鄉後三祀以西州地僻土瘠生理艱苦舉家復東來行李囊槖敝廢無幾所可喜者母夀而康子孝而壯不肖一二友人謀曰繼先純誠仁厚執守有餘而變通不足蹉跎蹭蹬窮乏困苦我輩不得不任其責且善人信人人不知恤天必祐之茲議未乾而不肖應召東方私自喜曰拔茅連茹一二友舊亦庶幾脫窮苦矣如繼先者又窮苦之甚者也至則當立引之時異事異齟齬梗塞願莫之遂繼而聞吾友有喪偶之憂驚悼感嗟念君之老母在堂子女未婚嫁家四壁而中饋乏主計何以為懷也今未踰月吾友亦謝世嗚呼天乎報施善人誰其司之如無有司之者吾之哀鳴伸訴則亦已矣如其有之則生殺禍福之理何乖謬若是哉不然推窮斯人致疾之由取怨之故意無得而言乎嗚呼天地鬼神不可以忿激怨咎善人不夀求之人為則又無所愧憾焉然則哭友之哀何時而已耶霜風一肅千草萬木適足收藏之氣充然而誠實者幸也或花或蕾方向生榮隨時而枯落者不幸也然則生殺之於草木亦欲以善惡求之哉嗚呼吾友厄窮而死沉沉九原當自安之人之取友生不分財惠以相周死不知恤其家非友也問而老母撫而諸孤義也吾友之疾不知相扶持吾友之亡不得相付託雖然在不肖輩敢忘於心哉神靈其鑒之嗚呼哀哉尚饗祭王中丞子勉文我年十七君冠而婚君來自東識我先人命我以兄事君如神我於是時總角未巾雖曰為學罔有見聞觀君落筆湍水飛雲觀君立言天葩竒芬從君切磋脈理始分從君琢磨精粗有倫如醉而醒如夜而晨日往月來越十冬春秦王開府招賢禮賔明年渡江智勇獲伸君以才學拜首綸恩中統龍飛官制一新勳德譽望立朝名臣揚厯中外應瑞昌辰官三十年雍雍申申優遊耆舊詔掌絲綸豈其一疾絶筆獲麟四海知君莫如我真羣賢愛君莫如我親百犯不校量海無垠萬事無心性天安仁不加不損貴富賤貧與君交遊如酒飲醇將期暮年林下水濵一觴一詠不厭煩頻談天人學精義入神觀萬物變闢人易門言不虛立聖經翼輪行無妄動髙風絶塵嗚呼天乎奪我鎔鈞酹地呼天哀怨終身英靈在天聽我斯文祭宋海卯文不爵而貴其貴益尊世嗣宦達賢而有文先生間居家人嚴君不祿而富其富愈足風亭水軒夏清冬燠法書名畫牙籖寶軸先生燕居羲皇遐域八十康強孰謂不壽名卿才士半師半友譽望一時孰謂不偶天錫五福或薄或偏先生之身獨擅兼全先生觀化造物兒童海卯一點萬象皆空天上人間去住我從談笑易簀無喪無得嗟嗟後學失所矜式敬置几筵有淚沾臆哀辭李仲常哀辭觀林林之兆民兮紛如禾麻竭智盡力兮不能溫飽乎其家豈其忠之不欲兮蓋才能之靡加細民之愚拙固不必言兮又常觀夫在位之多士自矜自負兮謂舉世之不我似才足以王佐道足以命世及其食厚祿處大位兮曽不辨乎一事雖僥幸於一世兮而不知佩無窮之愧恥豈其情之樂然兮亦秉賦之不美天地生萬物而人為最靈兮何每每之若是無乃造化元氣迤邐而衰薄兮故生民之庸鄙不然何夔臯稷契伊傅周召無於此而萃於彼嗟人材之不生知兮學校教養之法安忍亦從而廢吾友仲常幹而亷才而知兮而又得乎展驥足之地方將與韓滉劉晏並驅而爭轡兮惜哉天不假年甫半塗而殞墜噫吁嚱才難之嘆方興兮又見斯人之長逝九原既不可起豈惟理滅乎成算心計之忠而已改使公帑私藏不得速覩夫錢流於地之治忍哭吞聲寫余之哀挽兮不覺霑臆從橫之老淚
