body:
  text: 紫山大全集卷二十四元胡祇遹撰語録中庸一編子思子為人之不知所以為人不自貴重而作也天生萬物人為最靈得天之全能循其天之命我全其性之良能明善正心修身非法不言非道不行夫婦别父子親兄弟睦長幼序朋友信自天子至於庶人盡其職分之所當為不少闕不踰越貧富貴賤順受其正如是而已偏為氣禀偏駁而不純全昏濁而不清明或過或不及而失中故聖人以身教之又擇其能全天德者為之師至於一家之內則父為子師夫為婦師兄為弟師長為幼師此自然之職分也以其間有頑父嚚母不能為子弟之師故使之家有孰以至國有學使人人孝悌忠信循序而和則天地位萬物育所以刑措而不用四海猶一家篤恭而天下平矣始言天以全德付人萬物皆備於我不可不存養省察中言聖人法天建功立事終言聖功神化卒肖天地而後己天命性道教中和庸忠恕鬼神孝知仁勇誠明聰明睿知寬裕溫柔發强剛毅齊莊中正文理密察溥博淵泉敬明勸威不大聲色無聲無臭中庸一書中為大本和為萬殊萬殊所以行其中也無所乖戾發而中節曰和中節者時中也中節則和和者中之功效也庸者平常不易也惟中則能如是一有偏倚過不及雖欲暫而不可况今日如是明日如是久久平常而不易者也庸者中之立也久也誠者實其中也明者中之鑑也人能中立則上下四方是非邪正情僞賢不肖莫能逃其鑑照推而至於參天地贊化育如堯舜文武周公孔子此中之聖功神化之極致皇極之全體也故孔子曰不得中行而與之孟子從而解之孔子豈不欲中道哉不可必得故思其次也中庸一篇天人為一本非二物以天理統人事明天理聖人則合乎天也大賢君子則克己復禮求同乎天也小人則不知而背乎天也天能賦與而不能言聖人代天理物心得躬行以立教垂訓使天下之人皆合乎天得自然之性行當然之道實固有之德亦若生知安行成己成物擴充推極養而無害聖功神化以至無聲無臭與天地同德而後巳天以大中至正停停當當無餘無缺無妄僞無乍作遽息無過不及無惡無凶無昏蔽無私無我無固滯不通無不仁不義無禮無智無乖戾不和周圓具備之理付與於人人反其天不能全其天而入於邪惡故子思明善消惡欲人人之復其天也中庸一篇只篇首三句命性道教四字該括已盡已後三十三章乃四字之發明子思子恐後學之不擴充以至其極故不免實之以前聖嘉言善行完備四字之體用耳至於伏羲文王周孔之於易諄諄切切丁寧反復縷陳數說恐後人之不能明了耳至於大學語孟詩書春秋亦此意也中庸綱領命性道教中庸和知仁勇忠恕鬼神孝郊社禘嘗誠聰明睿知臨寬裕溫柔容發强剛毅執齊莊中正敬文理密察别溥博淵泉尊德性道問學致廣大盡精微極高明道中庸溫故知新敦厚崇禮肫肫其仁淵淵其淵浩浩其天人之學道貴知原委貴得體用貴切已貴識權知是四者由博以求約萬而一一而萬有綱有目本末不紊則可以達道入德孔子沒周道陵夷民不興行賢智者失之太過愚不肖者失之不及不知道之大原出於天備於性成於我以口耳為學以計術為智才能為賢子思作為此篇首言命性道教皆出於天人肖天地以生當肖天地而成己成物毋墜天之降寶命聖人則不惟如是而已雖天地萬物賴聖人以位以育所以能如是者不在乎他循其性之自然適乎中而已性之所有者五接於人倫則為五典非知足以知仁足以守勇足以行誠足以成則不能全其天復其性矣故以舜之智顔子之仁子路之勇實之繼以舜文王武王周公受天之大命全天之至性行天之大道代天而立教四聖人者功及於一時故終之以孔子雖不得天位而立德立言垂教立功及於萬世集四聖為大成又有賢於四聖聖功神化天地造化之所不可及者孔子為之輔相裁成無聲無臭與天同德然則子思之言豈不昭昭矣乎天人果為二乎人之學道果能出於此乎靜能不偏不倚而大本立大本立則天地位故動能中節而達道行達道行則萬物育立之正謂之大本行之通謂之達道道也者不可須臾離也子曰誰能出不由户何莫由斯道也人無貴賤賢愚萬古一日萬人一人出必由户户即當出入之正路也人倫自有正路自有門户人而不由道出不由户也教衰俗惡可哀也哉戒慎乎其所不睹恐懼乎其所不聞耳目之所及不過百步已不詳審寡聞淺見日用當行者不著不察况耳目之所不見不聞者乎道之體用大包天地細入微塵無所不在可不戒慎恐懼乎視於無形聽於無聲賢者尚爾矧庸人乎此則當知道之無外廣見聞而逺視聽慎獨則當知道之無內一毫私邪不萌於心也暗室屋漏謂之隱念慮萌動之初謂之微孟子曰作於其心害於其事作於其事害於其政邵康節曰思慮一起鬼神已知此子思所以慎其獨也民鮮能久矣何也惟皇上帝降衷於下民雖於五常萬善反身而誠其氣質之偏賢者知者常失之過愚不肖者常失於不及或乍作而遽息日月至焉不能恆久而不易是所以民鮮久矣譬如飲食之美惡人皆知之亦有各嗜一味之偏不知酸苦甘辛鹹淡得中之正味况道之中庸乎故子思著中庸一書使人知道之體中而已道之用庸而已庸者平常恆久而不可易和在其中矣中之一字大矣廣矣天地萬物莫不在是一寒一暑中也一隂一陽中也日往則月來月往則日來中也五行相生相勝中也一晝一夜中也是所以謂之不偏也不倚也無過也無不及也大本之所以立也今日如是明日如是今月今歲如是至於萬萬歲恆久不改易而如是是所以謂之庸也逹道之所以行也所謂不易之定理也非中則不能庸非庸則中不立是謂大道之體用相生而相助也在天下則京師為中帝王為中在一人則心為中在一草木則幹為中帝王中天下而立定四海之民建中和之極心為人身之中建立萬事酬酢萬變幹為一草木之中則下植根本上達枝葉故一中立而萬殊生過者不及者偏者倚者東西南北上下亷隅皆歸極焉皆會極焉是以能無窮而不易五常萬善或過或不及或不能平常是所謂不合乎中庸然則孔子之時周道雖衰一時風俗民行恆性良德未盡斫喪但失於過不及不常之差耳未若後世不孝不悌不仁不義不忠不信全失其良心者也觀聖人嘆辭可以見世變子曰人皆曰豫知至而莫之知避也存心養性接物處事或過或不及或不恆久已悖物忤違錯乖戾內而此心外而庶類不位不育小則起爭訟大則犯義犯刑然則不能中庸者非罟擭陷阱而何故曰致中和天地位焉萬物育焉或失或不能盡則反是遂至放辟邪侈無不為己陷罪而受刑法不可宥此司徒職天敘有典所以不得不敦也世教既衰民不興行故曰如得其情則哀矜而勿喜道不逺人者身外無道身即道之體道即身之用也有耳目口鼻之體便有視聽言動之用視聽言動之則視聽言動之理既有此身便有父子兄弟夫婦長幼朋友君臣之倫類便各有自然之理當為之職分當行之路我身所具之理人亦具之物亦具之本不相逺人所以去道之逺者害於有我形氣之私不忠不恕故違道日逺已所欲者人亦欲之己所惡者人亦惡之知人與己同忠以盡已恕以及人則近道矣下文君子之道四以責人之心責已則盡道也德性之自然何逺之有以其不循自然有為之之心故愈為而愈逺故曰道者自然之理不可以為逺以人治人改而止改訓移移手中所執之柯之則於所伐之柯則能事畢矣既未能如堯舜之性之則當如湯武之身之反之人能以人之固有之善而治其不善則亦移而已矣故曰以人治人改而止聖人以高逺自負觀此謙退之辭意深警學者舍切近而慕高逺躐等凌節便欲升高陟遐而不知自下自邇之不可越也無憂者其惟文王乎舜以不順於頑父嚚母不信於傲弟貴為天子富有四海而不足以解憂文王處賢父之下居賢嗣之上故無憂思修身至不可以不知天孟子曰不得乎親不可以為人不順乎親不可以為子人之所以為人受形於父母受性命於天勸賢勸親親勸大臣勸士勸百姓勸百工勸之為義非諄諄喋喋家訓户曉蓋使人感恩戴德奮激勉勵各盡其職也氷炭不同處讒諂之小人夭淫之美女其志在於淫縱自恣所疾惡者有德之士投間扺隙獲明夷之心為正人之害人君誠能斥去讒人踈逺女色不貴竒珍異貨以德為貴則天下之士皆悅而願仕於朝矣來百工來者日省視其勞苦月考驗其巧拙餼廪溫厚與所作之事相稱感結人心使人人慕悅傾心竭力爭呈效其技能是之謂來近世以來疲􅉵困乏而不知所省工者不賞拙者不罰凍餒其妻子不逃遁逺去則咨嗟怨望欺詐託疾矣自誠明謂之性自明誠謂之教誠則明矣明則誠矣聖人生知安行便能實見實知實有其天德故自誠而明大賢己下不能齊聖必當推致委曲以盡其誠委曲有矯揉勉强克勝之謂也一念一言一行凡有不誠者淺則推致之深則委曲矯揉之自怨自艾自懲自創久則亦能誠矣感悟之深力變之篤遂有形著明動變化之效聖賢同歸矣上章天下至誠者聖人也不勉而中不思而得自然誠實降聖人一等不能性之必當擴充推致矯揉曲折凡有不誠者力反乎誠必至無一念一事之不誠固執凝定矣如自然故能發見乎外驗之行事誠不可掩顯著昭明矣中人所禀不能渾全從其性善之一偏推而致之觸類而長漸可以至於純顔子所偏者仁故由仁而成德造道以至於聖曾子由孝而入子路由勇而入皆致曲也尊德性而道問學天地之性人為貴夫仁天之尊爵也人人有貴於已者弗思耳矣為人而不自貴重自暴自棄自汚自賤悖德賊仁不才不肖是負天地之厚我也既知我有如是之德性可不自貴自重恭敬奉持惟恐失墜乎然而當求如何行善而有得於心如何作為行事而有得於身如何可以全此心之德而不至於不仁不智無禮無義行有不得先反求諸心後請教於父兄師友不知者敬問之不能者博學之孔子曰我非生而知之者好古敏以求之者也欲尊德性必先從事於問學不問不學則不知不能雖曰尊德性亦妄自尊大妄自貴重徒為一驕傲木偶人耳二者修德凝道之大端致廣大存心而盡精微致知廣大配天地然必自精微細密積日纍功擴而充之推而極之而後能之故曰切問而近思又曰守約而施博極高明存心而道中庸致知與日月合其明求能如是必當從事於不偏不倚無過不及恆久平常而不易其操守言顧行行顧言然後庶幾極乎高明敦厚存心以崇禮致知人生性質本厚因物有遷知自厚而著力以厚然質勝文則朴野庸鄙故博學於禮文以增崇其厚德文質彬彬然後君子天以善與我我得之而勿失故謂之德天以善生我我生生而不絶不悖故謂之性德性者物莫能全而人受之是之謂良貴尊爵當自貴重故曰尊德性然人非聖不能生知必從學問而後知故當道問學人配天地而三德如天地之廣大則可溥博如天淵泉如淵天行健君子以自强不息純亦不已地勢坤君子以厚德載物法效天地日復一日推而至其極故曰致廣大廣大者精微之極故曰盡精微懸象髙明無踰乎日月然其行也無過不及今歲如是千萬歲如是可不謂中歟常歟故曰極高明而道中庸故歲已去新歲復來故當溫故以知新體立用行質完文具故當敦厚以崇禮知天地之化育夫焉有所倚如知縣知州知府知事之知以配天助化育為己任功用在我何有倚賴中天下而立定四海之民正謂此也行有餘力則以學文詩書六藝之所載亦不外是數者但先能力行或過或不及躬行雖篤而中有未悟然後學文以為龜鑑凖繩以適其中而已不力行而先學文徒能騰口說而已民德歸厚矣子之於父母厚之至者不學而能者也於所厚者薄無所不薄也然則後世人君以日易月化行於上俗成於下天下之人視君長何有哉不學則心身茫然不知所立自十五志學念念不厭習熟倣效前賢之言行又十五年之久所學有諸己挺然植立而不遷徙立心有恆處身有道矣溫故而知新涵泳乎其所已知理義則日知其未知既得之而時習之月無忘其所已能未得者不可不知故日知其所無尋繹舊聞每有新得勿謂已能而不溫一事未知心為未盡知為未致故君子恥之故新不可不知道者理也路也一事自有一理一事自有當行之路不合正理不由當行之路是謂之畔然則何由而不至於畔經事多窮理明有要約以持守則自合乎道故當博文約禮二者廢一不可博而不守約則無綱領守約而不博如無一錢可穿何以知道欲知父子君臣夫婦昆弟朋友之道則博觀古人人倫嘉言善行之文而揆之以禮則合遵而行之不至於畔以博施濟衆言之非惟堯舜病其不足雖天地亦不能足旱乾水溢疾病灾疫山崩水涸皆是也庸人以口體為重心性為輕蔬水苦口體富貴悅口體故樂富貴而悲貧賤苟得富貴不義不恤也得之既不義其能安且久乎心性庸得乎養其大體為大人而况聖人乎子曰飯蔬食飲水曲肱而枕之樂亦在其中矣不義而富且貴於我如浮雲顔子一簞食一瓢飲在陋巷人不堪其憂回也不改其樂子曰賢哉回也孔顔之所樂於此槩可見矣世之人樂富貴而悲貧賤所樂者口體之樂耳孟子曰禮義之悅我心猶芻豢之悅我口又曰仰不愧於天俯不怍於人二樂也又曰舜之飯臭茹草也若將終身焉及其為天子也被紾衣鼓琴二女果若固有之君子所性雖大行不加窮居不損焉分定故也子思子曰素貧賤行乎貧賤故君子無入而不自得焉口體之樂肥甘輕暖二者而已心思之樂所樂豈有既哉濓溪每令門人尋孔顔所樂者何事以愚觀之顔子之所樂者欲罷不能也孔子之所樂者天生德於豫也無往而不樂也豈止三事乎游於藝游由同用藝當作義藝乃傳寫之誤以藝義音相近故也孟子曰居仁由義大人之事偹矣子曰吾不試故藝君子多乎哉不多也藝非聖人之所貴又非可以配乎道德仁也子曰立人之道曰仁與義道德仁義四者不可相離故韓文公曰仁與義為定名道與德為虛位心一身之主志又心之主用也不志於道則有是物而不知則也何以率性心無所主不知心之所以為心之理與木石何異焉惟能先明心之所以為心之理自然當行之路率性而行而得於心是之謂德理為我有腳踐實地有所憑據執守故曰志於道據於德然而仁義者又道德之實居仁由義則不悖德不畔道矣志道據德依仁游藝志道則循理得路心無邪慝據德則心有所得身有憑藉止其所矣依仁則至公無私無非天理之流行矣游藝則即藝明理小大交相養矣子於是日哭則不歌親戚朋友之死喪輕重厚薄固為有間其於遭變故則一也我以親戚朋友而哭之是日之內宜何如哉禮曰鄰有喪舂不相里有殯不巷歌方哭而遽有歡心豈性情之正也哉孔子之愛顔子愛其語之而不惰者於吾言無所不說顔子之愛敬聖人感佩其循循善誘使人欲罷而不能在他人則便不能然識其小而不識其大見其淺粗而不見其精微或喜聖人之博或慕聖人之言辭文章譬諸䝉天地生成之恩而止知其覆載受日月之照臨而止荷其光明聖人憫其狃於見聞之得而不求其充塞光輝自得大成之趣故曰豫欲無言以感悟子貢若於顔子不必言此子貢果不悟而發小子何述之對聖人恐其學者以子貢之言為然學止於言語文辭而已故直指明示而告之曰天何言哉四時行百物生非聖人不能如此訓人惜乎子貢之終不悟也聖人之學同天也如是故曰雨風露雷無非教也聖人動靜語默無非至訓無非可法如學者窺伺體認奚必以口舌為哉子曰可與共學未可與適道可與適道未可與立可與立未可與權適道悟說自得也道即理也雖能悟說其理未敢必其挺然持守不背畔也故曰未可與立雖能挺然卓立多固執而不通不能隨時而取中故曰未可與權人有志於學可與之共然其智識才能不逮其志亦不能與之得路而進執德不𢎞信道不篤中道而畫半途而背畔是未可與卓然立而不變就能堅定不變又多固執而不通方故未可與權然則學道豈易能哉孔子於齊衰冕衣裳失明之人禮貌若是惟顔子目擊道存見微知著見聖人之心德發於威儀動作不覺失聲而嘆曰敬而仰之則崇高宏大包天地而無外致力研求其底裏其小無內堅確而莫能破窮其首則已在吾之前不見其首究其尾則忽在吾之後不盡見其尾夫子之盛德如是哉及其施教俯隨人才之小大高下先傳示之以前言往行禮樂刑政與夫天文地理一物一事之光華昭著者使我因外以求內因用以求體因流以討源因末以尋本又恐我不能知萬殊之一本故要約我以天理之自然使知不能不如是之理必至一貫而後己聖人於我恩德勤懇如是我勉勵努力追逐企及而恨其力之微才欲少止則味濃厚而不能舍故不惜我之心力竭盡無餘得我意少生而後進見其卓然峻絶而不可攀躋此顔子已至於大而求化之歟道無不存無適非道費而隱語大天下莫能載語小天下莫能破鳶飛戾天魚躍于淵言其上下察也顔子見道如此故發此歎因言夫子善誘我先博我以文使我即物窮理而致吾之知後約我以禮使我收功守約克去己私復全天理學道至此自得居安資深欲罷而自不已盡我之力仰而視之巍巍乎無有邊際峻極于天不可以階升無由得從此顔子百尺竿頭更進一步之勇也必至於大而化聖而不可知而後己今之琴瑟古之鄭衛此樂音之與政通也由之瑟奚為於丘之門此氣志之形於物也故古之君子燕居養德假物之善鳴者以宣道純粹和平之氣今之君子隨俗進技以嫵媚哇淫之欲快耳而稱口噫其於樂以成德也不亦逺乎子張問士何如斯可謂之達矣至在家必達言行中節合理不違忤於物所向皆通無有滯礙是之謂達子張以虛譽聞通於逺近為達聖人知其情故為之問果以聞對子曰言忠信行篤敬雖蠻貊之邦行矣言不忠信行不篤敬雖州里行乎哉樊遲請學稼圃聖人以好禮義信答之富哉言乎上好禮使臣以禮御衆以禮以貴下賤大得民心上和下睦人非禽犢安得不以敬愛報上上好義舉措合宜小大無過舉允愜衆望安得不悅服上好信上下貴賤誠實交孚信如天地四時下安得不以情實事上四海之民敬愛如父母悅服如神明孚信如天地將見如獸走壙如蟻慕羶如魚聚淵如鳥歸林有人此有土有土此有財倉廩府庫充實富藏天子尊居民上咸知禮義而王道大人之事備矣何必區區以百畝不易為憂哉仕而優則學此句當在學而優則仕之後書曰學古入官政乃不迷又曰念終始典于學以此觀之學也者學為仕也故孔子以子路有民人有社稷何必讀書然後為學為佞世人要好文章不過效學前人陳言工字琢句鋪叙排布首尾腹心成章而已要優於政事不過廣覽前人陳跡效顰而已韓子曰不得其心而逐其跡吾未見其能旭也真知言哉朱文公亦謂後人學騷譬如無疾而呻吟正謂此也湯之於伊尹學焉而後臣之故不勞而王古之王者之於大臣有師事之禮文王之於吕尚命曰太公亦此意也下至齊桓之於管仲漢明帝之於桓榮師禮有在二君之德業方之殷周固不足言方之近世君人者求為齊桓漢明之罪人不可得也中庸之九經曰敬大臣體羣臣也漢高帝慢而侮人猶曰吾不如子房吾不如蕭何吾不如韓信推誠嘆服字子房而不名失蕭何如左右手拜韓信以壇轂使高帝若知學又豈止此而已乎厥後賈誼以漢於功臣少恩禮正救明辨大以為非宜以武帝之强雄嚴威整冠汲黯豈非知君臣之禮之不可失也聖如陶虞以君為元首臣為股肱耳目孜孜求助如恐不及者理勢然也降及叔世君尊如天視臣如地君以郎主自處呼臣為奴婢為大臣者淟涊亡恥處己以臺僕犬馬而不羞也嗚呼朝廷風俗之本禮樂教化之原今也至於上驕怠而自聖下頑鈍而無恥欲求夫庶事康百工熙親若同躬義若父子不亦難乎甚可畏也余讀商書見高宗之於傅說待之如砥礪舟楫霖雨麴蘖鹽梅譬如百工之於利器斯須而不可舍也親之如股肱耳目必仰以成身也敬之如師保惟恐其棄已而不言也傅說之於高宗祇若對揚告之以法天謹言慎行賞罰用人之明事事之備逺小人儉祭祀終之以遜志敏學道積于身德修罔覺君益聖臣益恭至嗣成湯而不祧踵伊尹而配饗不亦宜乎而又載之於書列二典三謨湯誓湯誥之後流芳萬世永久無窮使後世君臣取法之不暇慕君之士百讀而不能已然則聖人定書之㫖豈其微哉萬善在我知之非艱擴充為艱能暫而不能久見近而不能逺舉小以遺大窮明以昧幽是皆不能擴充故也展引推托之謂擴盈滿塞實之謂充故孟子以人能充無穿窬之心而義不可勝用人能充無欲害人之心而仁不可勝用所以不能擴充者天理才明即為人欲間斷山徑茅塞之喻豈不昭然易曉哉九層之臺一簣之積也千里之路一步之積也合抱之木毫萌之積也然則大者小之積逺者近之積幽者明之反死者生之復惡者善之悖消長對待一而二二而一故君子貴乎積學積德積行尚志尚友故孟子曰可欲之謂善有諸已之謂信充實之謂美充實而有光輝之謂大大而化之之謂聖聖而不可知之之謂神孟子七篇皆於人之良心發見處開導引掖若火始然而發之使明若泉始達而决之使行欲人自不能己推擴充滿以至於為堯舜深得孔子循循善誘之法若使學者苟能循序而進推救赤子入井惻隱之心事事如此而仁不可勝用矣如好色好貨好勇一出於義禮之正而不陷於人欲血氣之私存養夜氣培植朝聽晝訪之功以集義之直養浩然之氣必至於充塞天地而後己知舜跖之分只在義利之間而已知人性之本善不染乎人欲之惡知堯舜性之之真五伯假之之僞真則公僞則私知伯夷隘柳下惠不恭折衷於孔子之時知天爵之良貴居廣居立正位行大道晉楚趙孟失其富貴知正己以正人窮則獨行達則兼善凡孟子一話一言皆與論語詩書易春秋相合互相發明如是則安有學之不進者歟朱震泥象數盡易之變見伏互體世應至於再至於三反覆展轉變易究竟有不能通不相符者至如乾卦六爻周公爻辭各各分明各說一爻之義朱震取象不合揉亂錯雜而取故混雜交互而說反與爻辭相背戾且如說恆大象既以恆自震三變九三立而不易於爻辭初六復曰初本泰之六四成㢲九出六入有陰陽相求之象不知恆卦果自何卦而來觀震之解易因辭以求象卦辭大象辭爻辭既不一故展轉取象而亦不一易曰君子居其室出其言善則千里之外應之出其言不善則千里之外違之况其邇者乎以理觀之以一氣通之奚啻千里哉放四海際六合窮天地而凖故機心發而鷗逺至誠可以貫金石不可誣也簫韶作而鳳儀春秋成而麟至豈不昭昭矣乎外物之來趨同氣也外賔之來從主人之命也故曰和氣致祥乖氣致異以類而應也天體周匝三百六十五度四分度之一天行健日匝過一度故三百六十日為一歲以六日之零與日月㑹每二十九日過半相會又餘六日計一十二日為閏故三歲一閏五歲則再閏以五歲總而計之是一歲三百六十六日矣氣機周流無斯須之或息亦無斯須之不變故無斯須之同以大率分之則為春夏秋冬溫熱凉寒生長收藏更以大率言之則陰陽二氣耳更以大總言之則一氣之升降往來耳進退闔闢耳細分之則晝夜十二時百刻絪緼蒸化積而成歲故五日為一候三候為一氣六氣為一時四時為一歲故養生者於調氣呼吸起居寤寐一動一靜不敢過偏焉呼多吸少言語呌笑過多則氣耗散而衰損吸多呼少則氣壅滯而不流行動靜視聽亦然至於醫書所說五運六氣六味和平則生人淫邪則病物是又不可不知也一隂一陽理之自然無少偏勝氣之常也氣之反常則為淫邪勝復或以十年一紀甲子一周大數較之終亦均停竟不偏勝故曰其進鋭者其退速甚愛必大費深藏必厚亡氣數之不能不爾也凡民所見淺近既不觀物又不明理見得而不見失欲速而不務久知進而不知退故曰欲速則不達見小利則大事不成貨悖而入者亦悖而出言悖而出者亦悖而入又曰原始反終故知死生之說易中何故以陽為君子隂為小人乾陽物也乾道成男坤隂物也坤道成女此二氣之良能晝為陽夜為隂春夏為陽秋冬為隂晝明而夜暗春夏發生長養秋冬斂縮峭刻春夏為仁禮秋冬為義刑小人女子禀受晦暗峭刻得隂氣多不能不爾故二氣分為五行人禀二五之精故三命家以年月日時之支干演五行之性情甲乙木多者仁丙丁火多者禮戊己土多者信庚辛金多者義壬癸水多者智亦易之義也萬物一五行也五行一隂陽也隂陽一動靜也所謂靜者非謂氣機止息而如死灰槁木也動者升也靜者降也動者發生也靜者收斂也春夏屬陽動也秋冬屬隂靜也正如人之呼為春夏吸為秋冬吸則陽在腹內呼則散之於外秋冬氣收斂於地中春夏氣發生於地表孔子語常而不語怪者以為不足怪也怪者常之偏勝反悖之氣也人能知常則萬怪變生於前而不為皇惑皆知其有原也請於說卦通神明之德類萬物之情而觀之既曰生生而變化無窮何所不有而仁義禮智信五常也盡其常則義理無窮反其常則變怪亦無窮然一一皆有其原也乾坤三爻純隂純陽二氣不相雜外六子不過一隂二陽一陽二隂兩端而已天地竒偶之數五十五至於揲蓍則止用五十者何也蓋參天兩地而五十者天地之正數也衍而得之者餘數也尊其正數而不敢用故用其衍數也五十之中又尊一為太極而不用故用四十九也用九用六只是訓為處剛處柔也處剛則戒其無首處柔則戒其永貞亦抑其太過而强其不足也發此例於乾坤當於六十四卦爻中觀之然後見聖人用九六之道謂太極生兩儀亦可謂太極分兩儀則亦可一生二二生四四生八一分為二二分為四四分為八以天地觀之則生以卦畫觀之則分雖然言生不言分則不明言分不言生則不備一分為二一竒一偶二分為四太隂太陽少隂少陽既分則為四則每爻上又生一竒一偶四分為八亦然一分一加為十六十六為三十二三十二為六十四只是一分一加耳此聖人畫卦得生成之自然故曰分隂分陽迭用柔剛故易六位而成章詩書語孟之命意措詞不一體而足千變萬化觀之者當以意逆志况易乎有直陳其事直言其理者易見言在此而意在彼或比或類或嘆詠或竒或常或幽深或平易或警悟或戒勑然則聖人作意於文辭歟曰非也譬如雷霆雨露江漢河海潤澤聲響小大之不同顧所遇之地所遇之時何如耳論卦象而不係於義理之得失不關於實用之取舍者反對是也如朱震曰豫謙之反謙九三反而之四為豫何係於義理用舍哉以二卦論之謙何係於豫豫何係於謙哉朱震所以必從謙說者只欲就九三則互體上坤中坎坤中有水師之象耳師動而往行師也三公位反之則四四侯位有建侯之象坤伏乾天地也坎伏離日月也取象如是則與彖辭相合聖人之於易固觀象而繫辭然則必如是之牽合附會細碎曲折恐非聖人之本心也非義之正大也大而堯舜之授受湯武之征伐九年之水七年之旱細而一政一事之得失一草一木之生死皆孰使之然哉造物也孰為造物二氣也易以道陰陽之小大無遺變化無窮可以知未來內則修身外則治天下大則贊化育得天地之心類萬物之情君子可不朝夕洗心死而後己耶六十四卦卦辭每戒以利貞何也孝弟忠信吉德也仁義禮智恆性也當其理為正不當其理則邪枉偏陂則反為吉德恆性之害况外物歟故聖人於每卦之下必戒之以貞貞者無毫髮之偏倚四方望之以為表極至子思則名之曰中故曰人之生也直罔之生也幸而免直其正也貞者端正無偏倚無過不及而又常永堅固久之而如是是以無所不亨無所不利也先儒論卦變亦有太繁細而不切於實用求其所由來恐非聖人之本意亦無義理如云某卦自某卦來某卦復自某卦來難為確論一隂五陽一陽五隂二隂五陽二陽五隂何往何變而不可必曰某卦自某卦來求之義理則無定義較之實用則無所用本之聖人畫卦之始則繁碎而無統紀又不能加八而八之變而為六十四之有原有委有綱有目整齊窮盡不亂不滯也此無他因以易變易之書偶有所見移東易西拆南補北遂以為知易之變易曰變通莫大乎四時此聖人恐人妄以紛擾錯雜為變故揭此語以垂示使人觀四時之變則六十四卦之變天於四時而又繼之以通變而不能通非知天地四時之變者也故又曰易窮則變不窮則不變此天地物理之常也所以謂窮者無他陽極而隂隂極而陽本乎一氣之聚散生消而已故又言乾以易知坤以簡能何嘗細碎紛擾朝更暮改好變之不常也朱震以晉卦自臨來蹇之變又曰蹇六三之柔進而與君君同德故曰順布麗乎大明柔進而上行朱震卦變反復展轉止欲附會柔進上行之一言若自觀卦中來六四升於五九五降於四亦通謂自臨蹇中來於晉卦義理亦無關係謂自觀卦中來無矛盾然則卦變之說果何用哉蹇變而為臨也無義理臨反而成觀變愈多而義愈逺牽强太甚卦變之說類如此然則晉彖所謂柔進而上行者何也天尊地卑乾高坤下剛上柔下此正理也坤陰上交於乾為離乾陽下交於坤為坎又晉卦六五一爻當尊位故曰柔進而上行諸儒見卦之變或云此卦自某卦來所說雖不同以愚觀之似皆不求其原譬如論水不討其源隨其分派既多則曰此水自某所來此水又自某所來此水復自某所來殊不知萬派總出於一流一流出於一源以諸爻彖辭觀之六十四卦之變似皆出於乾坤二卦何以言之彖辭所論卦才卦德不過乎剛柔如曰柔來而文剛分剛上而文柔又曰剛上而柔下剛中正又曰內陰而外陽內陽而外陰剛柔既交則為健動止陰說伏麗明八物之性情為萬事之吉凶六十四卦之名固出於聖人之口然理以象著象以理實數以理定理以數顯易本於象數以聖人觀之不待言語文字則天地萬物之消長人事之進退存亡昭布森列而無一不備此邵子所謂若論先天一字無止有六十四卦而已聖人憂後人之不知不能推廣而至於變化之無窮故繫之以辭以為易之注腳故曰後天方始見功夫蕩蕩上帝下民之辟言天之廣大覆育乃下民之君也今人之為惡不惟不為天之弔恤反見疾惡見威怒於上帝故其命亦多邪僻而不正天命本可信今日似為不可信何則人受天命以生凡事皆有初而無終狂悖不恆不可救藥此亦詩無所歸咎而歸之於天也下七章假文王嘆紂之詞以譏厲王二章言用人之道當使賢者在位能者在職曷嘗以彊梁暴虐急斂之人在位任事莫非天降此慆慢之人以之害民歟無乃汝為君者以力助之歟三章嗟嘆殷紂曰汝執所見以為善人者不知皆强暴之人徒增多民之怨懟使下民流言以為對冦攘之惡用于內使下民興起詛祝無所不至而無有窮極四章嗟紂嚴猛為能舉怨為德紂不自明其明德賢者退而窮處故曰與讒諂靣諛之人居雖有左右前後侍御僕從之人而如無人也五章譏湎酒作狂所從所用皆不合於義舉止既愆不分晝夜而號呼歌舞白晝朋淫而無忌憚以晝為夜矣六章言小人乘是肆志口口爭鳴如蜩如螳紛亂辨競如沸如羮矣大臣小臣日趨於敗正人相尚從而行之此風內熾于中國而延及鬼方七章言既不用善人不遵先憲大命以之傾覆八章嘆其禍未及于四逺而宗國顛覆矣為殷之監豈逺哉胡不以夏桀之事觀之威儀抑抑敬慎也如書所謂克自抑畏嚴恭寅畏者也有諸內形諸外嚴於外所以養其中也德誠於中威儀嚴慎見乎外未有心不重慎而威儀之可畏可象者也既誠於中又謹於外交相涵養以為驗故曰惟德之隅靡哲不愚靡哲者不敢以明哲自居也不敢以明哲自居則窮理養性惟日不足故能不愚庶人之愚者其職分禀賦宜有此疾哲人而亦愚則反常矣肉食者鄙亦靡哲不愚之謂也蓋譏居高明者皆愚也亦通無競惟人競彊也不恃其力之彊大惟務于得人得人者得人心得賢人衆多故四方取以為訓有覺德行覺德行以先覺覺後覺之意上之人德行雖備於身又能以善及人養人使人皆覺悟遷善逺罪而不自知所謂以德服人中心悅服故四國順之訏謨定命訏者嘆嗟論難也謨謀議也一訏一謨莫不中理定為命令發號施令告于四方使人入耳銘心而不能忘雖隔歲年之逺猶若今辰之告言猶在耳銘豈忘心之謂也譬如書之誥訓誓命使萬世之下讀之聽之尚能竦動人心况當時之人乎唐德宗奉天一詔至今猶能感人然則王言之發豈可不誠不慎哉敬慎威儀維民之則以身教者自天子至於庶人皆以修身為本也二者言而世為天下法行而世為天下則之意也此二章既泛論在人上者不可不如是之修省三章乃言今日之失曰興迷亂于政興者相翼相助相尚相長之謂也政正也既昏迷紊亂不能自正又迷亂先王之政典以至顛覆其德而不修整荒湛于酒而縱恣沉湎汝輩惟耽樂是從不念承繼先業之重不能遍求先王之成憲其能執守其明法歟栽者培之傾者覆之人自喪德天亦不能加護而厭棄之故曰肆皇天弗尚使女如泉之流下而不反無乃淪陷相與以危亡自今已往夙興夜寐當嚴肅靖恭於朝廷之上立萬民之表章以至於修車馬備器械預戒戎兵之興作逺慮於蠻夷之遐荒五章六章復以敬身謹言為戒七章敬慎之功益密專以慎獨為戒八章言行修而人法之九章言聽之非艱行之維艱十章戒警勿以癡騃自處當以老成自警十一章言天明可畏我之所以不樂者觀爾所為夢夢然略不省悟是以我心憂慘雖前後誨爾諄諄而聽我則藐藐忽略不以我心為教反以我為相虐借曰年幼不知而今亦已耄矣十二章不勝嗟嘆而言曰告爾誨爾久矣汝若聽我用之謀議庶無大悔天運方入于艱危將喪亡其國我之取喻夫豈逺哉昊天之明命亦無差忒汝若回僻其德而不改使民大急于汝夫民今而後得反之也
